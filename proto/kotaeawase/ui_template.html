<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こたえあわせ（仮）</title>
<style>
  :root{
    --bg:#101418; --panel:#1a2027; --panel2:#232b34; --line:#33404d;
    --txt:#e8edf2; --dim:#8fa0b0; --acc:#ffb84d; --acc2:#5ec8ff; --win:#7dd87d; --bad:#ff7d7d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;line-height:1.6;}
  #app{max-width:760px;margin:0 auto;padding:12px 12px 90px;}
  header{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 2px;border-bottom:1px solid var(--line);margin-bottom:10px;}
  header h1{font-size:16px;margin:0;color:var(--acc);letter-spacing:2px;white-space:nowrap;}
  .stage{font-size:12px;color:var(--dim);text-align:right;}
  #sndbtn,#rulesbtn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px 6px;margin:0;}
  .verbadge{font-size:10px;color:var(--dim);border:1px solid var(--line);border-radius:6px;padding:1px 5px;}
  .board{display:flex;gap:8px;margin:8px 0 14px;}
  .score{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;text-align:center;}
  .score .nm{font-size:12px;color:var(--dim);} .score .pt{font-size:22px;font-weight:700;}
  .score.leader{border-color:var(--acc);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;}
  .center{text-align:center;}
  h2{font-size:15px;margin:0 0 10px;color:var(--acc2);}
  button{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:12px 18px;font-size:15px;cursor:pointer;margin:4px;transition:transform .06s, filter .12s;}
  button:active{transform:scale(.965);filter:brightness(1.15);}
  button:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.1);box-shadow:0 3px 10px rgba(255,184,77,.2);transition:transform .12s, filter .12s, box-shadow .12s;}
  button.primary{background:var(--acc);color:#20180a;font-weight:700;border:none;box-shadow:0 2px 10px rgba(255,184,77,.25);}
  button.big{width:100%;padding:16px;font-size:17px;}
  button:disabled{opacity:.35;cursor:default;transform:none;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
  .card{background:var(--panel2);border:1.5px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;position:relative;}
  .card.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc);}
  .card.static{cursor:default;}
  .card .nm{font-weight:700;font-size:13px;margin-bottom:4px;}
  .card .meta{font-size:11px;color:var(--dim);}
  .card .fx{font-size:10.5px;margin-top:6px;white-space:pre-wrap;color:#77879a;font-style:italic;}
  .card .fx::before{content:"（飾り）";color:#5a6a7a;font-size:9.5px;margin-right:2px;}
  .card .owner{position:absolute;top:-9px;right:8px;background:var(--acc2);color:#06202e;font-size:11px;font-weight:700;border-radius:8px;padding:0 8px;}
  .card .val{font-size:30px;font-weight:800;text-align:center;margin:6px 0 2px;color:var(--acc);}
  .card.winner{border-color:var(--win);box-shadow:0 0 0 2px var(--win);}
  .comment{background:#141a20;border-left:3px solid var(--acc2);border-radius:0 8px 8px 0;padding:6px 10px;font-size:12px;margin-top:8px;color:#b9c7d4;white-space:pre-wrap;}
  .cover{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:50;gap:18px;padding:20px;text-align:center;}
  .cover .who{font-size:26px;font-weight:800;color:var(--acc);}
  select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:16px;}
  label{font-size:13px;color:var(--dim);display:block;margin:10px 0 4px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .chip{font-size:12px;border-radius:99px;padding:3px 10px;border:1px solid var(--line);}
  .chip.hit{background:#153a15;border-color:var(--win);color:var(--win);}
  .chip.miss{background:#3a1515;border-color:var(--bad);color:var(--bad);}
  .banner{font-size:20px;font-weight:800;text-align:center;margin:12px 0;color:var(--win);}
  .half-tag{display:inline-block;background:var(--panel2);border:1px solid var(--acc2);color:var(--acc2);border-radius:8px;padding:2px 12px;font-size:13px;font-weight:700;}
  #gmbar{position:fixed;bottom:0;left:0;right:0;background:#0b0e11;border-top:1px solid var(--line);display:flex;justify-content:center;gap:8px;padding:8px;z-index:60;}
  #gmbar button{font-size:12px;padding:8px 14px;margin:0;}
  #gmdrawer{position:fixed;bottom:52px;left:0;right:0;max-height:55vh;overflow:auto;background:#0e1319;border-top:2px solid var(--acc);padding:14px;z-index:59;display:none;}
  #gmdrawer.open{display:block;}
  .gm-title{color:var(--acc);font-weight:700;font-size:13px;margin-bottom:8px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  td,th{border-bottom:1px solid var(--line);padding:5px 6px;text-align:left;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;justify-content:center;align-items:center;z-index:70;padding:16px;}
  .modal>div{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:560px;max-height:80vh;overflow:auto;padding:20px;}
  .timeline .round-log{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px;background:var(--panel2);}
  .muted{color:var(--dim);font-size:12px;}
  .rulebox p{margin:8px 0;} .rulebox li{margin:6px 0;}
  .tabbar{display:flex;gap:6px;margin-bottom:10px;}
  .tabbtn{flex:1;padding:8px;font-size:13px;background:var(--panel2);border:1px solid var(--line);border-radius:8px 8px 0 0;margin:0;}
  .tabbtn.active{background:var(--panel);border-bottom-color:var(--panel);color:var(--acc);font-weight:700;}
  .half-both .used{font-weight:700;color:var(--txt);} .half-both .unused{color:var(--dim);font-size:11px;}
  /* --- ルール説明の視覚化 --- */
  .goal-box{background:linear-gradient(135deg,#2a2415,#1f2a1a);border:1.5px solid var(--acc);border-radius:12px;padding:14px 16px;margin:6px 0 16px;}
  .goal-box .lbl{font-size:12px;color:var(--acc);font-weight:700;letter-spacing:1px;}
  .goal-box .txt{font-size:16px;font-weight:700;margin-top:4px;}
  .rsec{margin:16px 0 6px;font-size:14px;font-weight:700;color:var(--acc2);display:flex;align-items:center;gap:6px;}
  .flow{display:flex;flex-direction:column;gap:0;margin:8px 0;}
  .flow .step{display:flex;gap:10px;align-items:flex-start;padding:8px 0;}
  .flow .num{flex:0 0 26px;height:26px;border-radius:50%;background:var(--acc);color:#20180a;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .flow .stxt{font-size:13.5px;padding-top:2px;} .flow .stxt b{color:var(--txt);}
  .flow .arrow{color:var(--dim);margin-left:12px;font-size:12px;line-height:.6;}
  .sctbl{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px;}
  .sctbl th{background:var(--panel2);color:var(--acc2);} .sctbl td,.sctbl th{border:1px solid var(--line);padding:6px 8px;text-align:center;}
  .callout{background:#141a20;border-left:3px solid var(--acc);border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 0;font-size:13px;}
  .genre{display:inline-block;background:var(--panel2);border:1px solid var(--acc2);color:var(--acc2);border-radius:99px;padding:2px 12px;font-size:12px;font-weight:700;margin-bottom:8px;}
  .note-list{list-style:none;padding:0;margin:6px 0;} .note-list li{padding:4px 0 4px 22px;position:relative;font-size:12.5px;color:#b9c7d4;}
  .note-list li::before{content:"▸";position:absolute;left:6px;color:var(--acc2);}
  /* --- オンライン --- */
  .seatrow{display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:6px 0;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;}
  .dot.on{background:var(--win);box-shadow:0 0 6px var(--win);} .dot.off{background:#555;}
  .seatrow.me{border-color:var(--acc);}
  .waitbox{text-align:center;padding:24px 12px;} .waitbox .spin{font-size:30px;animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}
  .rc{font-family:monospace;font-size:26px;letter-spacing:6px;color:var(--acc);font-weight:800;}
  input[type=text]{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:16px;width:100%;}
  .banner-warn{background:#3a2a15;border:1px solid var(--acc);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--acc);margin:8px 0;}
  /* 段階公開アニメ */
  @keyframes rvIn{from{opacity:0;transform:translateY(14px) scale(.95);}to{opacity:1;transform:none;}}
  .rv{opacity:0;animation:rvIn .55s cubic-bezier(.2,.9,.3,1.2) forwards;}
  .rv1{animation-delay:.25s;} .rv2{animation-delay:1.25s;} .rv3{animation-delay:2.25s;}
  .rv-after{animation-delay:3.3s;} .rv-banner{animation-delay:3.8s;}
  .noanim .rv{animation-delay:0s !important;}
</style>
</head>

<script>
'use strict';
/* =============== ローカル試遊版 UI v0.2（ホットシート） =============== */
const E = window.Engine;
const A = E.Actions;
const PLAYERS = E.DEFAULT_CONFIG.players;
const HALF_LABEL = { zen: '前半', kou: '後半' };
/* ---------- 版番号（唯一の定義。titleもヘッダーバッジもここから生成） ---------- */
const VER = 'v0.8';
document.title = `こたえあわせ（仮）- ${VER}`;
function verNum(v) { const m = /v?(\d+)\.(\d+)/.exec(String(v || '')); return m ? Number(m[1]) * 1000 + Number(m[2]) : -1; }
/* ---------- 同点決着（tieBreakUsed）の表示文言（単一定義。ホットシート/オンライン/ネタばらし共用） ---------- */
function tieBreakText(t) {
  if (t === 'overall') return '同点 → 隠れた副基準で決着';
  if (t === 'split') return '副基準も同値 → 山分け';
  return '';
}
/* ---------- 前半/後半 併記（§3-4・ネタばらし画面専用）。判定に使った側は太字、使わなかった側は減光。
 * ラベルは「前」「後」の1文字のみ（意味に到達する語は書かない）。 ---------- */
function halfPairHtml(e, half) {
  const zenUsed = half === 'zen';
  return `<span class="half-both"><span class="${zenUsed ? 'used' : 'unused'}">前${esc(E.scoreLabel(e.scoreZen))}</span> <span class="${!zenUsed ? 'used' : 'unused'}">後${esc(E.scoreLabel(e.scoreKou))}</span></span>`;
}

let S = null;
let undoStack = [];
let ui = { solo: false, cover: null, gmOpen: false, gmUnlocked: false, deck: 'real', animOff: false };
let seatSel = null;

/* ---------- 効果音（WebAudio・全て失敗許容） ---------- */
const Snd = {
  on: true, ctx: null,
  ac() { try { this.ctx = this.ctx || new (window.AudioContext || window.webkitAudioContext)(); if (this.ctx.state === 'suspended') this.ctx.resume(); return this.ctx; } catch (e) { return null; } },
  tone(freq, dur, type = 'sine', gain = 0.12, when = 0) {
    if (!this.on) return;
    const c = this.ac(); if (!c) return;
    try {
      const o = c.createOscillator(), g = c.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(0, c.currentTime + when);
      g.gain.linearRampToValueAtTime(gain, c.currentTime + when + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + when + dur);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime + when); o.stop(c.currentTime + when + dur + 0.05);
    } catch (e) {}
  },
  click() { this.tone(880, 0.06, 'square', 0.05); },
  commit() { this.tone(220, 0.1, 'triangle', 0.12); this.tone(140, 0.16, 'sine', 0.1, 0.03); },
  swish() { this.tone(520, 0.16, 'sine', 0.07); this.tone(760, 0.2, 'sine', 0.06, 0.08); },
  pop(i) { this.tone(500 + i * 180, 0.16, 'triangle', 0.14); this.tone(750 + i * 180, 0.22, 'sine', 0.08, 0.06); },
  hit() { this.tone(1040, 0.12, 'sine', 0.14); this.tone(1560, 0.25, 'sine', 0.12, 0.1); },
  miss() { this.tone(190, 0.2, 'sawtooth', 0.05); },
  win() { [523, 659, 784, 1046].forEach((f, i) => this.tone(f, 0.28, 'triangle', 0.12, i * 0.11)); },
  fanfare() { [392, 523, 659, 784, 1046, 1318].forEach((f, i) => this.tone(f, 0.4, 'triangle', 0.12, i * 0.13)); },
  yourTurn() { this.tone(784, 0.12, 'sine', 0.11); this.tone(1047, 0.16, 'sine', 0.1, 0.1); },
};
try { const m = localStorage.getItem('kotaeawase:muted'); if (m !== null) Snd.on = m !== '1'; } catch (e) {}

/* ---------- 通知バナー（ブロッキングダイアログの代替。埋め込みiframeではダイアログが黙って握り潰されるため使わない） ---------- */
let bannerMsg = null, bannerTimer = null;
function flashBanner(msg) {
  bannerMsg = msg;
  render();
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(() => { bannerMsg = null; render(); }, 4000);
}
/* ---------- 確認モーダル（ブロッキング確認ダイアログの代替） ---------- */
let _confirmCb = null;
function confirmModal(msg, onYes) {
  _confirmCb = onYes;
  const r = document.getElementById('modal-root');
  r.innerHTML = `<div class="modal" onclick="if(event.target===this)UI.confirmNo()"><div>
    <p>${esc(msg)}</p>
    <div class="center" style="margin-top:14px">
      <button onclick="UI.confirmNo()">やめる</button>
      <button class="primary" onclick="UI.confirmYes()">実行する</button>
    </div>
  </div></div>`;
}

/* ---------- 基本機構 ---------- */
function dispatch(action) {
  undoStack.push(S);
  if (undoStack.length > 200) undoStack.shift();
  try {
    S = E.reduce(S, action);
  } catch (e) {
    undoStack.pop();
    flashBanner('操作エラー: ' + e.message); // ボタン無効化の復帰も兼ねる（内部でrender()する）
    return false;
  }
  render();
  return true;
}
function pendingPlayers() {
  if (!S) return [];
  if (S.phase === 'commit') return PLAYERS.filter((p) => !S.committed[p]);
  if (S.phase === 'declare') return PLAYERS.filter((p) => !S.declarations[p]);
  if (S.phase === 'decisionPick') return PLAYERS.filter((p) => !S.decisionState.picks[p]);
  if (S.phase === 'decisionDeclare') return PLAYERS.filter((p) => !(p in S.decisionState.guesses));
  return [];
}
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cardTile(card, opts = {}) {
  const cls = ['card', opts.sel ? 'sel' : '', opts.winner ? 'winner' : '', opts.static ? 'static' : '', opts.rv || ''].join(' ');
  return `<div class="${cls}" ${opts.onclick ? `onclick="${opts.onclick}"` : ''}>
    ${opts.owner ? `<div class="owner">${esc(opts.owner)}</div>` : ''}
    <div class="nm">${esc(card.name)}</div>
    <div class="meta">${esc(card.char || '')}${card.char ? '・' : ''}コスト${esc(card.cost)}・${esc(card.type)}</div>
    ${opts.value !== undefined ? `<div class="val">${esc(opts.value)}</div>` : ''}
    ${card.effect ? `<div class="fx">${esc(card.effect)}</div>` : ''}
    ${opts.comment ? `<div class="comment ${opts.rvc || ''}">💬 ${esc(opts.comment)}</div>` : ''}
  </div>`;
}
function scoreboard() {
  if (!S || !S.scores || Object.keys(S.scores).length === 0) return '';
  const max = Math.max(...Object.values(S.scores));
  return `<div class="board">${PLAYERS.map((p) => `
    <div class="score ${S.scores[p] === max && max > 0 ? 'leader' : ''}"><div class="nm">${esc(p)}</div><div class="pt">${S.scores[p]}</div></div>`).join('')}</div>`;
}
function stageLabel() {
  if (!S || S.setIndex < 0) return '';
  if (S.phase.startsWith('decision') || S.phase === 'final') return '決着ラウンド';
  const set = S.config.sets[S.setIndex];
  return `${set.label}（${S.roundIndex + 1}/${S.config.roundsPerSet}）`;
}
function frame(body) {
  return `<header><h1>こたえあわせ（仮）</h1><div style="display:flex;align-items:center;gap:4px"><span class="verbadge">${VER}</span><div class="stage">${stageLabel()}</div><button id="rulesbtn" onclick="UI.showRules()" title="ルール">❓</button><button id="sndbtn" onclick="UI.toggleSnd()">${Snd.on ? '🔊' : '🔇'}</button></div></header>${bannerMsg ? `<div class="banner-warn">⚠ ${esc(bannerMsg)}</div>` : ''}${S ? scoreboard() : ''}${body}`;
}
/* ---------- render()例外の可視化（実装技術知見§6-14相当） ----------
 * 「何も起きない」が最悪の状態。例外を握りつぶさず、必ず赤バナー＋console.errorで
 * 目に見える形にする。RTDBは空コレクションを保存しないため、renderは常にこの種の
 * 例外を起こしうる前提で書く。 */
function showCrashBanner(e) {
  console.error('render()で例外が発生しました:', e);
  const app = document.getElementById('app');
  if (!app) return;
  const msg = (e && e.message) ? e.message : String(e);
  app.innerHTML = `<div class="banner-warn" style="font-size:14px;padding:14px;margin:10px 0;white-space:pre-wrap">⚠ 画面の描画でエラーが発生しました。\n${esc(msg)}\n\nリロードしてください。エラーが続く場合はGMまたは開発者に連絡してください。</div>`;
}

function render() {
  const app = document.getElementById('app');
  if (ui.onlineActive) { Online.render(); return; }
  if (ui.cover) { renderCover(); return; }
  document.getElementById('cover-root')?.remove();
  const scrollY = window.scrollY; // 再描画でのスクロール飛び防止
  try {
    let body = '';
    if (!S) body = renderLobby();
    else switch (S.phase) {
      case 'basis': body = renderBasis(); break;
      case 'commit': body = renderSeatGate('コミット'); break;
      case 'faces': body = renderFaces(); break;
      case 'declare': body = renderSeatGate('宣言'); break;
      case 'scoresReady': body = renderScoresReady(); break;
      case 'roundEnd': body = renderRoundEnd(); break;
      case 'decisionPick': body = renderSeatGate('決着・札選択'); break;
      case 'decisionBasis': body = renderDecisionBasis(); break;
      case 'decisionDeclare': body = renderSeatGate('決着・予想'); break;
      case 'decisionReady': body = renderDecisionReady(); break;
      case 'final': body = renderFinal(); break;
      default: body = `<div class="panel">未対応フェーズ: ${S.phase}</div>`;
    }
    const prevPhase = app.dataset.phase;
    app.innerHTML = frame(body);
    app.dataset.phase = S ? S.phase : 'lobby';
    // 同一フェーズ内の再描画（選択・トグル等）はスクロール位置を維持、フェーズが変わったら先頭へ
    if (prevPhase === app.dataset.phase) window.scrollTo(0, scrollY);
    else window.scrollTo(0, 0);
    renderGM();
  } catch (e) {
    showCrashBanner(e);
  }
}
function renderSeatOnly(p) {
  const scrollY = window.scrollY;
  document.getElementById('app').innerHTML = frame(seatScreen(p));
  window.scrollTo(0, scrollY);
  renderGM();
}

/* ---------- 各画面 ---------- */
function renderLobby() {
  const hasReal = !!window.REAL_DECKS;
  return `<div class="panel center">
    <h2>${VER}（ローカル・ホットシート）</h2>

function renderGM() {
  const d = document.getElementById('gmdrawer');
  d.className = ui.gmOpen ? 'open' : '';
  const btn = document.querySelector('#gmbar button');
  if (btn) { btn.style.borderColor = ui.gmOpen ? 'var(--acc)' : ''; btn.style.color = ui.gmOpen ? 'var(--acc)' : ''; }
  if (!ui.gmOpen) { d.innerHTML = ''; return; }
  if (!S) {
    d.innerHTML = `<div class="gm-title">GM専用パネル <button style="float:right;font-size:11px;padding:4px 10px" onclick="UI.toggleGM()">閉じる</button></div>
      <div class="muted">ゲーム未開始です。開始するとここに「現在の答え」が表示されます。</div>`;
    return;
  }
  let rows = '';
  const half = S.currentHalf || S.decisionState?.half;
  const isDecision = S.phase.startsWith('decision');
  const committed = isDecision ? (S.decisionState?.picks || {}) : S.committed;
  for (const p of PLAYERS) {
    const id = committed[p];
    if (!id) continue;
    const c = S.cardsById[id];
    const rater = isDecision ? S.config.gmName : p;
    const z = c.scores.zen[rater], k = c.scores.kou[rater];
    rows += `<tr><td>${esc(p)}</td><td>${esc(c.name)}</td><td>${E.scoreLabel(z)}</td><td>${E.scoreLabel(k)}</td><td>${c.overall.zen.toFixed(2)}/${c.overall.kou.toFixed(2)}</td><td style="white-space:pre-wrap">${esc(c.comments?.[rater] ?? '')}</td></tr>`;
  }
  d.innerHTML = `<div class="gm-title">GM専用 — 現在の答え（判定者: ${isDecision ? 'マッチ' : '各自'} ／ 現基準: ${half ? HALF_LABEL[half] : '未宣言'}）<button style="float:right;font-size:11px;padding:4px 10px" onclick="UI.toggleGM()">閉じる</button></div>
    ${rows ? `<table><tr><th>出した人</th><th>札</th><th>前半</th><th>後半</th><th>副基準(全体) 前/後</th><th>コメント</th></tr>${rows}</table>` : '<div class="muted">コミット待ち</div>'}

}

    <li><b>章</b>：ゲーム全体を構成する3つの区切り（第1章・第2章・第3章）。各6ラウンドで、章ごとに判定基準の固定/可変が異なる。</li>

  </div>`;

/* ---------- 操作 ---------- */
function shuffled(arr) { const a = arr.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function readSel(id) { const el = document.getElementById(id); return el && el.value ? el.value : null; }

window.UI = {
  onModeChange(v) {
    ui.mode = v;
    render(); // ロビー再描画（ボタン文言など）
  },
  start() {
    ui.mode = readSel('mode-sel') || 'hotseat';
    ui.deck = readSel('deck-sel') || (window.REAL_DECKS ? 'real' : 'dummy');
    if (ui.mode === 'online') { Snd.click(); Online.openLobby(); return; }
    ui.solo = ui.mode === 'solo';
    const src = ui.deck === 'real' && window.REAL_DECKS ? window.REAL_DECKS : window.DUMMY_DECKS;
    try {
      // 平準化配札: 各自の「自分の点数」の手札平均差をほんのり縮める
      S = E.createGame(src.map((d) => E.balanceDeal(d, PLAYERS, E.DEFAULT_CONFIG.handSize)), null, {});
      S = E.reduce(S, { type: A.START_GAME });
      undoStack = [];
    } catch (e) { flashBanner('初期化エラー: ' + e.message); return; }
    Snd.click();
    render();
  },
  toggleSnd() { Snd.on = !Snd.on; try { localStorage.setItem('kotaeawase:muted', Snd.on ? '0' : '1'); } catch (e) {} render(); },
  basis(half) { Snd.click(); dispatch({ type: A.ANNOUNCE_BASIS, half }); },
  openSeat(p) { Snd.click(); ui.cover = p; render(); },
  enterSeat() {
    const p = ui.cover; ui.cover = null;
    document.getElementById('cover-root')?.remove();
    seatSel = null;
    Snd.click();
    renderSeatOnly(p);
  },
  pick(id, p) { seatSel = id; Snd.click(); renderSeatOnly(p); },
  commit(p) {
    if (!seatSel) return;
    const id = seatSel; seatSel = null;
    if (dispatch({ type: A.COMMIT, player: p, cardId: id })) Snd.commit();
  },
  toDeclare() { if (dispatch({ type: A.REVEAL_FACES })) { Snd.swish(); } },
  declare(p, btn) {
    // DOMから直接読む（内部状態との乖離バグを構造的に排除）
    const self = readSel('d-self');
    const tgt = readSel('d-tgt');
    const val = readSel('d-val');
    if (tgt && !val) { flashBanner('横予想の数字（1〜5）を選んでください'); return; }
    if (!tgt && val) { flashBanner('横予想の対象（誰の札か）を選んでください'); return; }
    if (btn) btn.disabled = true;
    const okd = dispatch({ type: A.DECLARE, player: p, self: self ? Number(self) : null, side: tgt ? { target: tgt, value: Number(val) } : null });
    if (okd) Snd.commit();
  },
  reveal() {
    if (!dispatch({ type: A.REVEAL_SCORES })) return;
    const r = S.roundResult;
    if (!ui.animOff) {
      [0.25, 1.25, 2.25].forEach((t, i) => setTimeout(() => Snd.pop(i), t * 1000));
      setTimeout(() => {
        const anyHit = PLAYERS.some((p) => r.declResults[p].self?.hit || r.declResults[p].side?.hit);
        const anyMiss = PLAYERS.some((p) => (r.declResults[p].self && !r.declResults[p].self.hit) || (r.declResults[p].side && !r.declResults[p].side.hit));
        if (anyHit) Snd.hit(); else if (anyMiss) Snd.miss();
      }, 3300);
      setTimeout(() => Snd.win(), 3800);
    }
  },
  next() { Snd.click(); dispatch({ type: A.NEXT }); },
  decisionPick(p) {
    if (!seatSel) return;
    const id = seatSel; seatSel = null;
    if (dispatch({ type: A.DECISION_PICK, player: p, cardId: id })) Snd.commit();
  },
  decisionBasis(h) { Snd.swish(); dispatch({ type: A.DECISION_ANNOUNCE, half: h }); },
  decisionGuess(p, btn) {
    const g = readSel('g-val');
    if (btn) btn.disabled = true;
    if (dispatch({ type: A.DECISION_DECLARE, player: p, guess: g ? Number(g) : null })) Snd.commit();
  },
  decisionReveal() {
    if (!dispatch({ type: A.DECISION_REVEAL })) return;
    if (!ui.animOff) {
      [0.25, 1.25, 2.25].forEach((t, i) => setTimeout(() => Snd.pop(i), t * 1000));
      setTimeout(() => Snd.fanfare(), 3800);
    }
  },
  toggleGM() {
    if (!ui.gmUnlocked) {
      confirmModal('GM専用パネルを開きます。プレイヤーは見ないでください。よろしいですか？', () => {
        ui.gmUnlocked = true; ui.gmOpen = true; renderGM();
      });
      return;
    }
    ui.gmOpen = !ui.gmOpen; renderGM();
  },
  confirmYes() { const cb = _confirmCb; _confirmCb = null; document.getElementById('modal-root').innerHTML = ''; cb && cb(); },
  confirmNo() { _confirmCb = null; document.getElementById('modal-root').innerHTML = ''; },
  undo() {
    if (undoStack.length === 0) { flashBanner('戻れる手がありません'); return; }
    confirmModal('直前の操作を1手巻き戻します（GM専用）。よろしいですか？', () => { S = undoStack.pop(); render(); });
  },
  exportState() {
    const blob = new Blob([JSON.stringify({ state: S, ts: new Date().toISOString() }, null, 1)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'kotaeawase_state.json'; a.click();
  },
  showRules() {
    modal(`<div class="tabbar">
      <button class="tabbtn active" id="tab-play" onclick="UI.rulesTab('play')">遊びかた</button>
      <button class="tabbtn" id="tab-gloss" onclick="UI.rulesTab('gloss')">用語集</button>
    </div>
    <div id="tabpane-play">${RULES_HTML}</div>
    <div id="tabpane-gloss" style="display:none">${GLOSSARY_HTML}</div>`);
  },
  rulesTab(which) {
    document.getElementById('tabpane-play').style.display = which === 'play' ? '' : 'none';
    document.getElementById('tabpane-gloss').style.display = which === 'gloss' ? '' : 'none';
    document.getElementById('tab-play').classList.toggle('active', which === 'play');
    document.getElementById('tab-gloss').classList.toggle('active', which === 'gloss');
  },
  closeModal() { document.getElementById('modal-root').innerHTML = ''; },
  showTimeline() {
    const rounds = S.history.filter((h) => h.kind === 'round');
    modal(`<h2>全ラウンドの記録</h2><div class="timeline">${rounds.map((r) => `
      <div class="round-log"><b>${S.config.sets[r.set].label} R${r.round + 1}</b> <span class="half-tag">${HALF_LABEL[r.half]}</span> → ${esc(r.winners.join('・'))}${r.tieBreakUsed ? ` <span class="muted">（${esc(tieBreakText(r.tieBreakUsed))}）</span>` : ''}
        ${r.entries.map((e) => `<div class="muted">${esc(e.player)}: ${esc(e.cardName)} = ${halfPairHtml(e, r.half)} ${e.comment ? '「' + esc(e.comment) + '」' : ''}</div>`).join('')}
      </div>`).join('')}</div>`);
  },
  showReserved() {
    modal(`<h2>温存札の公開</h2>${PLAYERS.map((p) => `<h2 style="color:var(--txt);font-size:13px">${esc(p)}</h2><div class="cards">${
      S.reserved[p].filter((id) => id !== S.decisionState?.picks?.[p]).map((id) => {
        const c = S.cardsById[id];
        return cardTile(c, { static: true, value: `${E.scoreLabel(c.scores.zen[p])} / ${E.scoreLabel(c.scores.kou[p])}`, comment: c.comments?.[p] });
      }).join('')}</div>`).join('')}
      <p class="muted">表示は 前半/後半 の順。</p>`);
  },
};

/* =========================================================
 * オンライン対戦コントローラ
 * ホスト権威（GM=ホスト）。プレイヤーは意図を送るだけ。net.js に依存。
 * ======================================================= */
const Online = {
  db: null, code: null, seat: null, name: null, uid: null,
  host: null, client: null, view: null, screen: 'role', role: null,
  deckKey: 'real', roomInfo: { seats: {}, presence: {}, meta: {} }, _roomUnsub: null,
  onlineSel: null,

  makeUid() { return 'u' + Math.random().toString(36).slice(2, 9); },
  makeCode() { const s = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c = ''; for (let i = 0; i < 4; i++) c += s[Math.floor(Math.random() * s.length)]; return c; },
  makeDb() {
    if (window.__MOCK_DB__) return window.__MOCK_DB__; // 自己テスト用共有モック
    if (window.__FB_FAIL__ || typeof firebase === 'undefined') throw new Error('オンライン機能の読み込みに失敗しました（ネット接続をご確認ください）。ホットシート/ソロは利用できます。');
    return window.Net.createFirebaseDb(window.FIREBASE_CONFIG);
  },

  openLobby() {
    ui.onlineActive = true;
    this.uid = this.uid || this.makeUid();
    this.screen = 'role';
    document.getElementById('gmbar').style.display = 'none';
    this.render();
  },
  exit() {
    try { this.host && this.host.stop(); this.client && this.client.stop(); this._roomUnsub && this._roomUnsub(); this._presenceUnsub && this._presenceUnsub(); } catch (e) {}
    this.host = this.client = this.view = null; this._roomUnsub = null; this._presenceUnsub = null;
    ui.onlineActive = false;
    document.getElementById('gmbar').style.display = '';
    render();
  },

  /* ---- ルーム作成/参加 ---- */
  async doCreate() {
    this.deckKey = 'real';
    let db; try { db = this.makeDb(); } catch (e) { this.flashError(e.message); return; }
    this.db = db; this.code = this.makeCode(); this.seat = PLAYERS.length >= 0 ? E.DEFAULT_CONFIG.gmName : null;
    this.seat = E.DEFAULT_CONFIG.gmName; this.role = 'gm'; this.name = this.seat;
    try {
      await window.Net.createRoom(db, this.code, { gmUid: this.uid, gmName: this.seat, deckKey: this.deckKey, now: this.now(), ver: VER });
    } catch (e) { this.flashError('作成失敗: ' + e.message); return; }
    this._presenceUnsub = window.Net.keepPresence(db, this.code, this.uid);
    this.saveLastGmCode(this.code);
    this.subscribeRoom();
    this.subscribeView();
    this.screen = 'wait';
    Snd.click(); this.render();
  },
  /* ---- 部屋コードのlocalStorage保持（§5・運用リスク対策） ----
   * 画面が壊れて部屋番号が見えなくなっても、GM復帰画面に前回のコードを引き継げるようにする。 */
  saveLastGmCode(code) { try { localStorage.setItem('kotaeawase:lastGmCode', code); } catch (e) {} },
  loadLastGmCode() { try { return localStorage.getItem('kotaeawase:lastGmCode') || ''; } catch (e) { return ''; } },
  async doJoin() {
    const code = (document.getElementById('ol-code')?.value || '').toUpperCase().trim();
    if (!code) { this.flashError('部屋コードを入力してください'); return; }
    let db; try { db = this.makeDb(); } catch (e) { this.flashError(e.message); return; }
    this.db = db; this.code = code; this.role = 'player';
    const meta = await db.ref(`rooms/${code}/meta`).get();
    if (!meta) { this.flashError('その部屋は見つかりません'); return; }
    if (meta.ver && meta.ver !== VER) { this.showVerMismatch(meta.ver); return; }
    this.subscribeRoom();
    this.screen = 'seatpick';
    Snd.click(); this.render();
  },
  async doClaim(seat) {
    // オフライン保持者がいる席は引き継ぎ可（リロード復帰対応）
    const db = this.db, code = this.code;
    const cur = await db.ref(`rooms/${code}/seats/${seat}`).get();
    if (cur && cur.uid && cur.uid !== this.uid) {
      const online = await db.ref(`rooms/${code}/presence/${cur.uid}`).get();
      if (online === true) { this.flashError('その席は使用中です'); return; }
    }
    this.name = seat; // 名前＝選んだ席
    await db.ref(`rooms/${code}/seats/${seat}`).set({ uid: this.uid, name: seat });
    this._presenceUnsub = window.Net.keepPresence(db, code, this.uid);
    this.seat = seat;
    this.subscribeView();
    this.screen = 'wait';
    Snd.click(); this.render();
  },
  showVerMismatch(roomVer) {
    const older = verNum(roomVer) < verNum(VER);
    this._verMismatchMsg = older
      ? `この部屋は古い版（${roomVer}）で作られています。部屋を作り直してください。`
      : `部屋の方が新しい版（${roomVer}）です。ページが古い版です。再読み込みしてください（Ctrl+F5 / スマホは再読み込み）。`;
    this.screen = 'verMismatch';
    this.render();
  },
  renderVerMismatch() {
    return `<div class="panel center">
      <h2>版が一致しません</h2>
      <div class="banner-warn">⚠ ${esc(this._verMismatchMsg || '')}</div>
      <p class="muted">このページの版: ${esc(VER)}</p>
      <button onclick="Online.screen='role';Online.render()">戻る</button>
    </div>`;
  },
  subscribeRoom() {
    if (this._roomUnsub) this._roomUnsub();
    this._roomUnsub = window.Net.watchRoom(this.db, this.code, (patch) => {
      Object.assign(this.roomInfo, patch);
      if (this.screen === 'wait' || this.screen === 'seatpick') this.render();
    });
  },
  subscribeView() {
    this.client = window.Net.RoomClient(this.db, this.code, this.seat);
    this.client.onView((v) => {
      const was = this._lastNeedsInput;
      const nowNeeds = this.needsMyInput(v);
      if (nowNeeds && !was) Snd.yourTurn();
      this._lastNeedsInput = nowNeeds;
      this.view = v; if (v) { if (this.screen !== 'game') { this.screen = 'game'; } this.render(); }
    });
    this.client.onError && this.client.onError((e) => { if (e && e.step === (this.view && this.view.step)) { this.flashError('操作できませんでした。もう一度お試しください。'); } });
  },
  /* 自分の入力待ちに変わった瞬間だけ手番通知音を鳴らすための判定（§5-1） */
  needsMyInput(v) {
    if (!v || v.isGM) return false;
    if (v.phase === 'commit') return !v.committedSeats[this.seat];
    if (v.phase === 'declare') return !v.declaredSeats[this.seat];
    if (v.phase === 'decisionPick') return !v.decision.pickedSeats[this.seat];
    if (v.phase === 'decisionDeclare') return !v.decision.guessedSeats[this.seat];
    return false;
  },
  flashError(msg) { this._err = msg; this.render(); setTimeout(() => { this._err = null; }, 2500); },
  now() { try { return firebase.database.ServerValue.TIMESTAMP; } catch (e) { return Date.now ? Date.now() : 0; } },

  seatsPresent() {
    const s = this.roomInfo.seats || {}, pr = this.roomInfo.presence || {};
    return PLAYERS.filter((p) => s[p] && pr[s[p].uid] === true).length;
  },

  /* ---- GMがゲーム開始 ---- */
  async startGame() {
    if (this._starting || this.host) return; // 二度押し防止
    this._starting = true;
    const src = this.deckKey === 'real' && window.REAL_DECKS ? window.REAL_DECKS : window.DUMMY_DECKS;
    const host = window.Net.RoomHost(this.db, this.code, { engine: E, deckSets: src, gmName: E.DEFAULT_CONFIG.gmName, now: this.now(), onPublish: () => {}, hostUid: this.uid });
    try { await host.start(); await window.Net.startRoom(this.db, this.code); this.host = host; }
    catch (e) { this._starting = false; this.flashError('開始失敗: ' + e.message); return; }
    Snd.win();
  },
  /* ---- GM復帰（§2-1）: 端末のローカル保存から、または状態ファイルから ---- */
  async doResumeGM() {
    const code = (document.getElementById('ol-resume-code')?.value || '').toUpperCase().trim();
    if (!code) { this.flashError('部屋コードを入力してください'); return; }
    let db; try { db = this.makeDb(); } catch (e) { this.flashError(e.message); return; }
    const meta = await db.ref(`rooms/${code}/meta`).get();
    if (!meta) { this.flashError('その部屋は見つかりません'); return; }
    this.db = db; this.code = code;
    if (meta.ver && meta.ver !== VER) { this.showVerMismatch(meta.ver); return; }
    const store = window.Net.defaultLocalStore();
    const saved = store.get(window.Net.hostStoreKey(code));
    this.role = 'gm'; this.seat = E.DEFAULT_CONFIG.gmName; this.name = this.seat;
    if (!saved || !saved.phase) {
      this._resumeCode = code;
      this.screen = 'gmResumeFile';
      this.render();
      return;
    }
    await this._startGmHost(null);
  },
  async resumeFromFile(inputEl) {
    const file = inputEl.files && inputEl.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      const state = parsed && parsed.state ? parsed.state : parsed;
      if (!state || !state.phase) throw new Error('状態ファイルの形式が不正です');
      this.role = 'gm'; this.seat = E.DEFAULT_CONFIG.gmName; this.name = this.seat;
      await this._startGmHost(state);
    } catch (e) { this.flashError('読み込み失敗: ' + e.message); }
  },
  async _startGmHost(preloadedState) {
    if (this.host) { try { this.host.stop(); } catch (e) {} this.host = null; }
    const db = this.db, code = this.code;
    try { await db.ref(`rooms/${code}/meta/hostUid`).set(this.uid); } catch (e) {} // 二重ホスト防止: 自分を最新のhostUidにする
    this._presenceUnsub = window.Net.keepPresence(db, code, this.uid);
    this.saveLastGmCode(code);
    this.subscribeView();
    const src = this.deckKey === 'real' && window.REAL_DECKS ? window.REAL_DECKS : window.DUMMY_DECKS;
    const host = window.Net.RoomHost(db, code, { engine: E, deckSets: src, gmName: E.DEFAULT_CONFIG.gmName, now: this.now(), onPublish: () => {}, hostUid: this.uid });
    try { await host.start(preloadedState); } catch (e) { this.flashError('復帰失敗: ' + e.message); return; }
    this.host = host;
    Snd.win();
  },
  exportState() {
    if (!this.host) return;
    const blob = new Blob([JSON.stringify({ state: this.host.state, ts: new Date().toISOString() }, null, 1)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = `kotaeawase_${this.code}_state.json`; a.click();
  },
  // GMアクション（安全ラッパ）
  async gm(fn) { try { await fn(); } catch (e) { this.flashError('操作エラー: ' + e.message); } },

  /* ---- プレイヤー操作 ---- */
  async commit() { if (!this.onlineSel) return; const id = this.onlineSel; this.onlineSel = null; await this.client.sendIntent('commit', { cardId: id }); Snd.commit(); this.render(); },
  async declare() {
    const self = readSel('ol-self'); const tgt = readSel('ol-tgt'); const val = readSel('ol-val');
    if (tgt && !val) { this.flashError('横予想の数字を選んでください'); return; }
    if (!tgt && val) { this.flashError('横予想の対象を選んでください'); return; }
    await this.client.sendIntent('declare', { self: self ? Number(self) : null, side: tgt ? { target: tgt, value: Number(val) } : null });
    Snd.commit(); this.render();
  },
  async decisionPick() { if (!this.onlineSel) return; const id = this.onlineSel; this.onlineSel = null; await this.client.sendIntent('decisionPick', { cardId: id }); Snd.commit(); this.render(); },
  async decisionGuess() { const g = readSel('ol-guess'); await this.client.sendIntent('decisionGuess', { guess: g ? Number(g) : null }); Snd.commit(); this.render(); },
  selCard(id) { this.onlineSel = id; Snd.click(); this.render(); },

  /* ================= 描画 ================= */
  card(id) { return (this.view && this.view.cardMeta && this.view.cardMeta[id]) || { id, name: '?', cost: '-', type: '-', effect: '' }; },
  render() {
    const app = document.getElementById('app');
    try {
      let body;
      if (this.screen === 'role') body = this.renderRole();
      else if (this.screen === 'joinform') body = this.renderJoinForm();
      else if (this.screen === 'seatpick') body = this.renderSeatPick();
      else if (this.screen === 'wait') body = this.renderWait();
      else if (this.screen === 'game') body = this.renderGame();
      else if (this.screen === 'gmResumeCode') body = this.renderGmResumeCode();
      else if (this.screen === 'gmResumeFile') body = this.renderGmResumeFile();
      else if (this.screen === 'verMismatch') body = this.renderVerMismatch();
      else body = '<div class="panel">…</div>';
      const err = this._err ? `<div class="banner-warn">⚠ ${esc(this._err)}</div>` : '';
      const gmCodeBadge = (this.role === 'gm' && this.code) ? `<span class="verbadge" style="font-family:monospace;letter-spacing:2px" title="部屋コード">${esc(this.code)}</span>` : '';
      app.innerHTML = `<header><h1>こたえあわせ（仮）</h1><div style="display:flex;align-items:center;gap:4px">
        <span class="verbadge">${VER}</span>
        ${gmCodeBadge}
        <div class="stage">${this.screen === 'game' && this.view ? esc(this.stageV()) : 'オンライン'}</div>
        <button id="rulesbtn" onclick="UI.showRules()" title="ルール">❓</button>
        <button id="sndbtn" onclick="UI.toggleSnd()">${Snd.on ? '🔊' : '🔇'}</button></div></header>
        ${this.view && this.screen === 'game' ? this.scoreV() : ''}${err}${body}`;
    } catch (e) {
      showCrashBanner(e);
    }
  },
  stageV() {
    const v = this.view; if (!v) return 'オンライン';
    if (v.phase.startsWith('decision') || v.phase === 'final') return '決着ラウンド';
    const set = v.config.sets[v.setIndex];
    return `${set.label}（${v.roundIndex + 1}/${v.config.roundsPerSet}）`;
  },
  scoreV() {
    const v = this.view, mx = Math.max(...Object.values(v.scores));
    return `<div class="board">${v.config.players.map((p) => `<div class="score ${v.scores[p] === mx && mx > 0 ? 'leader' : ''}"><div class="nm">${esc(p)}${p === this.seat ? ' (あなた)' : ''}</div><div class="pt">${v.scores[p]}</div></div>`).join('')}</div>`;
  },
  renderRole() {
    const hasReal = !!window.REAL_DECKS;
    return `<div class="panel center">
      <h2>オンライン対戦</h2>

      case 'faces': main = `<h2>一段目公開</h2>${this.facesBoard(v)}<div class="center" style="margin-top:12px"><button class="primary big" onclick="Online.gm(()=>Online.host.revealFaces())">宣言フェイズへ進める</button></div>`; break;
      case 'declare': main = `<h2>宣言待ち</h2>${this.facesBoard(v)}${this.declaredProgress(v)}<p class="muted center">全員宣言すると点数公開に進めます</p><div class="center" style="margin-top:8px"><button onclick="Online.gm(()=>Online.host.forceComplete())">⏭ 未提出者を自動で埋めて進む</button></div>`; break;
      case 'scoresReady': main = `<h2>全員の宣言完了</h2><div class="center"><button class="primary big" onclick="Online.gm(()=>Online.host.revealScores())">🃏 点数を公開</button></div>`; break;
      case 'roundEnd': { const r = v.roundResult; const wt = r.winners.length === 1 ? `${r.winners[0]} の勝利！` : `${r.winners.join('・')} 山分け！`; main = `<div class="banner">${esc(wt)} (+${r.winPoints})</div>${this.resultBoard(r)}<div class="center" style="margin-top:12px"><button class="primary big" onclick="Online.gm(()=>Online.host.next())">次へ</button></div>`; break; }
      case 'decisionPick': main = `<h2>決着 — 札選択待ち</h2><div class="chips center" style="justify-content:center">${v.config.players.map((p) => `<span class="chip ${v.decision.pickedSeats[p] ? 'hit' : ''}">${esc(p)} ${v.decision.pickedSeats[p] ? '✓' : '…'}</span>`).join('')}</div><div class="center" style="margin-top:8px"><button onclick="Online.gm(()=>Online.host.forceComplete())">⏭ 未提出者を自動で埋めて進む</button></div>`; break;
      case 'decisionBasis': main = `<h2>決着の基準宣言</h2><p>この札の強さは <b style="color:var(--acc)">マッチの点数</b> で決まる。</p><button class="primary" onclick="Online.gm(()=>Online.host.decisionAnnounce('zen'))">前半で判定</button><button class="primary" onclick="Online.gm(()=>Online.host.decisionAnnounce('kou'))">後半で判定</button>`; break;
      case 'decisionDeclare': main = `<h2>マッチ予想待ち</h2><div class="chips center" style="justify-content:center">${v.config.players.map((p) => `<span class="chip ${v.decision.guessedSeats[p] ? 'hit' : ''}">${esc(p)} ${v.decision.guessedSeats[p] ? '✓' : '…'}</span>`).join('')}</div><div class="center" style="margin-top:8px"><button onclick="Online.gm(()=>Online.host.forceComplete())">⏭ 未提出者を自動で埋めて進む</button></div>`; break;
      case 'decisionReady': main = `<h2>最後の公開</h2><div class="center"><button class="primary big" onclick="Online.gm(()=>Online.host.decisionReveal())">🏆 決着</button></div>`; break;
      case 'final': return this.renderFinalV(v);
      default: main = '…';
    }
    return `<div class="panel">${main}${this.gmAnswerPanel(v)}</div>${ctrlBar}`;
  },
  renderFinalV(v) {
    const res = v.decision && v.decision.result;
    const ranked = [...v.config.players].sort((a, b) => v.scores[b] - v.scores[a]);
    return `<div class="panel center"><h2>最終結果</h2>
      ${res ? `<div class="banner">決着: ${esc(res.winners.join('・'))} が制した！</div>
        <div class="cards">${res.entries.map((e) => cardTile(this.card(e.cardId), { owner: e.player, static: true, winner: res.winners.includes(e.player), value: E.scoreLabel(e.score), comment: e.comment })).join('')}</div>
        <div class="chips">${res.tieBreakUsed ? `<span class="chip">${esc(tieBreakText(res.tieBreakUsed))}</span>` : ''}${Object.keys(res.guessResults || {}).map((p) => { const g = res.guessResults[p]; return g ? `<span class="chip ${g.hit ? 'hit' : 'miss'}">${esc(p)} マッチ予想${g.value} ${g.hit ? '的中' : '外'}</span>` : ''; }).join('')}</div>` : ''}
      <div style="font-size:24px;margin:16px 0">🏆 優勝: <b style="color:var(--acc)">${esc(ranked[0])}</b>（${v.scores[ranked[0]]}点）</div>
      <button class="primary" onclick="Online.showTimelineV()">全ラウンドのネタばらし</button>
      <button onclick="Online.exit()">終了して戻る</button></div>`;
  },
  showTimelineV() {
    const v = this.view; const rounds = (v.history || []).filter((h) => h.kind === 'round');
    modal(`<h2>全ラウンドの記録</h2><div class="timeline">${rounds.map((r) => `<div class="round-log"><b>${v.config.sets[r.set].label} R${r.round + 1}</b> <span class="half-tag">${r.half === 'zen' ? '前半' : '後半'}</span> → ${esc(r.winners.join('・'))}${r.tieBreakUsed ? ` <span class="muted">（${esc(tieBreakText(r.tieBreakUsed))}）</span>` : ''}${r.entries.map((e) => `<div class="muted">${esc(e.player)}: ${esc(e.cardName)} = ${halfPairHtml(e, r.half)}${e.comment ? ' 「' + esc(e.comment) + '」' : ''}</div>`).join('')}</div>`).join('')}</div>`);
  },
};
window.Online = Online;

/* ===== オンラインUI自己テスト（モックDBで全走行＋全座席×全フェーズ描画） ===== */
window.__onlineSelfTest = async function (seed) {
  seed = seed || 42;
  const N = window.Net, EE = window.Engine;
  const P = EE.DEFAULT_CONFIG.players, GM = EE.DEFAULT_CONFIG.gmName;
  let checks = 0, errors = [];
  const tick = () => new Promise((r) => setTimeout(r, 0));
  function rngf(s) { s = s >>> 0; return () => ((s = (s * 1664525 + 1013904223) >>> 0) / 2 ** 32); }
  const rng = rngf(seed);
  const db = N.createMockDb();
  const code = 'SELF';
  const decks = window.DUMMY_DECKS;
  await N.createRoom(db, code, { gmUid: 'g', gmName: GM, deckKey: 'dummy', now: 1 });
  for (let i = 0; i < P.length; i++) { await N.claimSeat(db, code, P[i], 'u' + i, P[i]); await N.setPresence(db, code, 'u' + i); }
  const host = N.RoomHost(db, code, { engine: EE, deckSets: decks, gmName: GM, now: 1 });
  const clients = {}; for (const s of P) { clients[s] = N.RoomClient(db, code, s); clients[s].onView(() => {}); }
  await host.start(); await tick();

  /* Firebase相当のストリップ（test_resume_strip.jsのfbStrip()と同型）。
   * MockDBは空オブジェクト/空配列を保存し続けるため、本番RTDBが起こす「空コレクションの消失」
   * （v0.7・実機4窓テストで発生したgmAnswerPanelクラッシュの直接原因）を、このセルフテストは
   * 従来ストリップ無しで描画していたため検出できなかった。以降は毎回このストリップを通す。 */
  function fbStrip(x) {
    if (x === null || x === undefined) return undefined;
    if (Array.isArray(x)) { const a = x.map(fbStrip).filter((y) => y !== undefined); return a.length ? a : undefined; }
    if (typeof x === 'object') { const o = {}; for (const k of Object.keys(x)) { const sv = fbStrip(x[k]); if (sv !== undefined) o[k] = sv; } return Object.keys(o).length ? o : undefined; }
    return x;
  }

  // 各座席のビューを Online.render に流して描画エラーを検出
  const seenPhases = new Set();
  let basisCount = 0, sawZeroAnswers = false, sawCrashBanner = false;
  async function renderAllSeats(tag) {
    for (const seat of [...P, GM]) {
      const raw = await db.ref(`rooms/${code}/views/${seat}`).get();
      if (!raw) continue;
      const v = fbStrip(raw); // 本番相当にストリップしてから描画する（生のrawは使わない）
      if (seat === GM && v && v.gm && !v.gm.answers) sawZeroAnswers = true;
      try {
        Online.db = db; Online.code = code; Online.seat = seat; Online.view = v; Online.screen = 'game'; ui.onlineActive = true;
        Online.render();
        const html = document.getElementById('app').innerHTML;
        if (/undefined|NaN|\[object Object\]/.test(html)) errors.push(`${tag}/${seat}: 不正な描画(${html.match(/undefined|NaN|\[object Object\]/)})`);
        // render()は工程4でtry/catchされ、例外は投げずにエラーバナーへ置き換わる。
        // バナーが出ていること自体を検出漏れにしないよう、文言でも判定する。
        if (html.includes('画面の描画でエラーが発生しました')) { sawCrashBanner = true; errors.push(`${tag}/${seat}: render()がエラーバナーを表示した`); }
        checks++;
      } catch (e) { errors.push(`${tag}/${seat}: 例外 ${e.message}`); }
    }
    if (host.state.phase === 'basis' && Object.keys(host.state.committed || {}).length === 0) basisCount++;
    seenPhases.add(host.state.phase);
  }

  let guard = 0;
  while (host.state.phase !== 'final' && guard++ < 400) {
    const st = host.state;
    await renderAllSeats(st.phase);
    switch (st.phase) {
      case 'basis': await host.announceBasis(st.config.sets[st.setIndex].fixedHalf || (rng() < .5 ? 'zen' : 'kou')); break;
      case 'commit': for (const seat of P) { const v = await db.ref(`rooms/${code}/views/${seat}`).get(); await clients[seat].sendIntent('commit', { cardId: v.myHand[Math.floor(rng() * v.myHand.length)] }); await tick(); } break;
      case 'faces': await host.revealFaces(); break;
      case 'declare': for (const seat of P) { const others = P.filter((q) => q !== seat); await clients[seat].sendIntent('declare', { self: rng() < .7 ? 1 + Math.floor(rng() * 5) : null, side: rng() < .5 ? { target: others[Math.floor(rng() * 2)], value: 1 + Math.floor(rng() * 5) } : null }); await tick(); } break;
      case 'scoresReady': await host.revealScores(); break;
      case 'roundEnd': await host.next(); break;
      case 'decisionPick': for (const seat of P) { const v = await db.ref(`rooms/${code}/views/${seat}`).get(); await clients[seat].sendIntent('decisionPick', { cardId: v.myReserved[Math.floor(rng() * v.myReserved.length)] }); await tick(); } break;
      case 'decisionBasis': await host.decisionAnnounce(rng() < .5 ? 'zen' : 'kou'); break;
      case 'decisionDeclare': for (const seat of P) await clients[seat].sendIntent('decisionGuess', { guess: rng() < .8 ? 1 + Math.floor(rng() * 5) : null }); await tick(); break;
      case 'decisionReady': await host.decisionReveal(); break;
    }
    await tick();
  }
  await renderAllSeats('final');
  host.stop(); Object.values(clients).forEach((c) => c.stop());
  ui.onlineActive = false; Online.view = null;
  // カバレッジ表明（工程6）：
  //  ・全員着席→開始→GM画面描画 … basisCount>=1（初回のbasisで必ずGM描画を通る）
  //  ・回答ゼロ件の状態で全画面描画 … sawZeroAnswers（ストリップ後にv.gm.answersが欠落する瞬間を検出）
  //  ・章の切り替わり直後の描画 … basisCount>=3（第1〜3章それぞれの開始直後にbasisを踏む）
  const coverage = {
    allSeatedThenStartGmRenders: basisCount >= 1,
    zeroAnswersRendersCleanly: sawZeroAnswers && !sawCrashBanner,
    chapterTransitionsRendered: basisCount >= 3,
    basisPhaseHits: basisCount,
  };
  return {
    ok: errors.length === 0 && host.state.phase === 'final'
      && coverage.allSeatedThenStartGmRenders && coverage.zeroAnswersRendersCleanly && coverage.chapterTransitionsRendered,
    phase: host.state.phase, checks, phases: [...seenPhases], errors,
    rounds: host.state.history.filter((h) => h.kind === 'round').length,
    coverage,
  };
};

render();
</script>
</body>
</html>
