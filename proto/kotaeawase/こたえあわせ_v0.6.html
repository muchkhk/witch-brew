<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>こたえあわせ（仮）- v0.6</title>
<style>
  :root{
    --bg:#101418; --panel:#1a2027; --panel2:#232b34; --line:#33404d;
    --txt:#e8edf2; --dim:#8fa0b0; --acc:#ffb84d; --acc2:#5ec8ff; --win:#7dd87d; --bad:#ff7d7d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;line-height:1.6;}
  #app{max-width:760px;margin:0 auto;padding:12px 12px 90px;}
  header{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 2px;border-bottom:1px solid var(--line);margin-bottom:10px;}
  header h1{font-size:16px;margin:0;color:var(--acc);letter-spacing:2px;white-space:nowrap;}
  .stage{font-size:12px;color:var(--dim);text-align:right;}
  #sndbtn{background:none;border:none;font-size:18px;cursor:pointer;padding:2px 6px;margin:0;}
  .board{display:flex;gap:8px;margin:8px 0 14px;}
  .score{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;text-align:center;}
  .score .nm{font-size:12px;color:var(--dim);} .score .pt{font-size:22px;font-weight:700;}
  .score.leader{border-color:var(--acc);}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;}
  .center{text-align:center;}
  h2{font-size:15px;margin:0 0 10px;color:var(--acc2);}
  button{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:12px 18px;font-size:15px;cursor:pointer;margin:4px;transition:transform .06s, filter .12s;}
  button:active{transform:scale(.965);filter:brightness(1.15);}
  button.primary{background:var(--acc);color:#20180a;font-weight:700;border:none;box-shadow:0 2px 10px rgba(255,184,77,.25);}
  button.big{width:100%;padding:16px;font-size:17px;}
  button:disabled{opacity:.35;cursor:default;transform:none;}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
  .card{background:var(--panel2);border:1.5px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;position:relative;}
  .card.sel{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc);}
  .card.static{cursor:default;}
  .card .nm{font-weight:700;font-size:13px;margin-bottom:4px;}
  .card .meta{font-size:11px;color:var(--dim);}
  .card .fx{font-size:10.5px;margin-top:6px;white-space:pre-wrap;color:#77879a;font-style:italic;}
  .card .fx::before{content:"（飾り）";color:#5a6a7a;font-size:9.5px;margin-right:2px;}
  .card .owner{position:absolute;top:-9px;right:8px;background:var(--acc2);color:#06202e;font-size:11px;font-weight:700;border-radius:8px;padding:0 8px;}
  .card .val{font-size:30px;font-weight:800;text-align:center;margin:6px 0 2px;color:var(--acc);}
  .card.winner{border-color:var(--win);box-shadow:0 0 0 2px var(--win);}
  .comment{background:#141a20;border-left:3px solid var(--acc2);border-radius:0 8px 8px 0;padding:6px 10px;font-size:12px;margin-top:8px;color:#b9c7d4;white-space:pre-wrap;}
  .cover{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:50;gap:18px;padding:20px;text-align:center;}
  .cover .who{font-size:26px;font-weight:800;color:var(--acc);}
  select{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:16px;}
  label{font-size:13px;color:var(--dim);display:block;margin:10px 0 4px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .chip{font-size:12px;border-radius:99px;padding:3px 10px;border:1px solid var(--line);}
  .chip.hit{background:#153a15;border-color:var(--win);color:var(--win);}
  .chip.miss{background:#3a1515;border-color:var(--bad);color:var(--bad);}
  .banner{font-size:20px;font-weight:800;text-align:center;margin:12px 0;color:var(--win);}
  .half-tag{display:inline-block;background:var(--panel2);border:1px solid var(--acc2);color:var(--acc2);border-radius:8px;padding:2px 12px;font-size:13px;font-weight:700;}
  #gmbar{position:fixed;bottom:0;left:0;right:0;background:#0b0e11;border-top:1px solid var(--line);display:flex;justify-content:center;gap:8px;padding:8px;z-index:60;}
  #gmbar button{font-size:12px;padding:8px 14px;margin:0;}
  #gmdrawer{position:fixed;bottom:52px;left:0;right:0;max-height:55vh;overflow:auto;background:#0e1319;border-top:2px solid var(--acc);padding:14px;z-index:59;display:none;}
  #gmdrawer.open{display:block;}
  .gm-title{color:var(--acc);font-weight:700;font-size:13px;margin-bottom:8px;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  td,th{border-bottom:1px solid var(--line);padding:5px 6px;text-align:left;}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;justify-content:center;align-items:center;z-index:70;padding:16px;}
  .modal>div{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:560px;max-height:80vh;overflow:auto;padding:20px;}
  .timeline .round-log{border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:10px;background:var(--panel2);}
  .muted{color:var(--dim);font-size:12px;}
  .rulebox p{margin:8px 0;} .rulebox li{margin:6px 0;}
  /* --- ルール説明の視覚化 --- */
  .goal-box{background:linear-gradient(135deg,#2a2415,#1f2a1a);border:1.5px solid var(--acc);border-radius:12px;padding:14px 16px;margin:6px 0 16px;}
  .goal-box .lbl{font-size:12px;color:var(--acc);font-weight:700;letter-spacing:1px;}
  .goal-box .txt{font-size:16px;font-weight:700;margin-top:4px;}
  .rsec{margin:16px 0 6px;font-size:14px;font-weight:700;color:var(--acc2);display:flex;align-items:center;gap:6px;}
  .flow{display:flex;flex-direction:column;gap:0;margin:8px 0;}
  .flow .step{display:flex;gap:10px;align-items:flex-start;padding:8px 0;}
  .flow .num{flex:0 0 26px;height:26px;border-radius:50%;background:var(--acc);color:#20180a;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .flow .stxt{font-size:13.5px;padding-top:2px;} .flow .stxt b{color:var(--txt);}
  .flow .arrow{color:var(--dim);margin-left:12px;font-size:12px;line-height:.6;}
  .sctbl{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px;}
  .sctbl th{background:var(--panel2);color:var(--acc2);} .sctbl td,.sctbl th{border:1px solid var(--line);padding:6px 8px;text-align:center;}
  .callout{background:#141a20;border-left:3px solid var(--acc);border-radius:0 8px 8px 0;padding:10px 12px;margin:10px 0;font-size:13px;}
  .genre{display:inline-block;background:var(--panel2);border:1px solid var(--acc2);color:var(--acc2);border-radius:99px;padding:2px 12px;font-size:12px;font-weight:700;margin-bottom:8px;}
  .note-list{list-style:none;padding:0;margin:6px 0;} .note-list li{padding:4px 0 4px 22px;position:relative;font-size:12.5px;color:#b9c7d4;}
  .note-list li::before{content:"▸";position:absolute;left:6px;color:var(--acc2);}
  /* --- オンライン --- */
  .seatrow{display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:6px 0;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;}
  .dot.on{background:var(--win);box-shadow:0 0 6px var(--win);} .dot.off{background:#555;}
  .seatrow.me{border-color:var(--acc);}
  .waitbox{text-align:center;padding:24px 12px;} .waitbox .spin{font-size:30px;animation:pulse 1.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}
  .rc{font-family:monospace;font-size:26px;letter-spacing:6px;color:var(--acc);font-weight:800;}
  input[type=text]{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:10px;font-size:16px;width:100%;}
  .banner-warn{background:#3a2a15;border:1px solid var(--acc);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--acc);margin:8px 0;}
  /* 段階公開アニメ */
  @keyframes rvIn{from{opacity:0;transform:translateY(14px) scale(.95);}to{opacity:1;transform:none;}}
  .rv{opacity:0;animation:rvIn .55s cubic-bezier(.2,.9,.3,1.2) forwards;}
  .rv1{animation-delay:.25s;} .rv2{animation-delay:1.25s;} .rv3{animation-delay:2.25s;}
  .rv-after{animation-delay:3.3s;} .rv-banner{animation-delay:3.8s;}
  .noanim .rv{animation-delay:0s !important;}
</style>

<!-- Firebase SDK（オンライン対戦用。読み込めなくてもホットシート/ソロは動作） -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" onerror="window.__FB_FAIL__=1"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js" onerror="window.__FB_FAIL__=1"></script>
<script>
/* =========================================================
 * 『答え合わせ』(仮) ゲームエンジン v0.1
 * 純粋状態機械。UI/同期層から独立。ローカル試遊版・Firebase版で共用。
 *
 * 用語:
 *  half: 'zen'(前半) | 'kou'(後半)
 *  score: {base: 1..5, mod: -0.5 | 0 | +0.5}   // 4+ => {base:4, mod:+0.5}
 *  数値強度 = base + mod。宣言的中判定は base のみ比較（+/-は問わない）。
 * ========================================================= */
'use strict';

const ENGINE_VERSION = '0.3.0';

/* ---------- 設定（調整ノブは全部ここ） ---------- */
const DEFAULT_CONFIG = {
  players: ['からあげ', 'てかさ', '逆廻'],
  gmName: 'マッチ',
  sets: [
    { label: '第1章', winPoints: 3, fixedHalf: 'zen' },
    { label: '第2章', winPoints: 4, fixedHalf: 'kou' },
    { label: '第3章', winPoints: 5, fixedHalf: null }, // null = ラウンドごとにGMが宣言
  ],
  roundsPerSet: 6,
  handSize: 8,           // 8枚配布・6枚使用・2枚温存
  hitSelfPoints: 2,      // 自分宣言的中
  hitSidePoints: 2,      // 横予想的中
  decision: {
    enabled: true,
    label: '決着',
    winPoints: 6,        // 推奨値（v2の8から調整）
    hitPoints: 3,        // マッチ点数予想的中
  },
};

/* ---------- スコア表現ユーティリティ ---------- */
function numeric(score) {
  if (!score || typeof score.base !== 'number') return null;
  return score.base + (score.mod || 0);
}
function scoreLabel(score) {
  if (!score) return '—';
  const m = score.mod > 0 ? '+' : score.mod < 0 ? '-' : '';
  return `${score.base}${m}`;
}
/* 生文字列("4+","５-",3 等) → score オブジェクト。データ取込時に使用 */
function parseScoreStr(v) {
  if (v === null || v === undefined) return null;
  const s = String(v).trim().replace(/[０-９]/g, (c) => String.fromCharCode(c.charCodeAt(0) - 0xfee0)).replace(/＋/g, '+').replace(/－/g, '-');
  const m = s.match(/^([1-5])(?:\.(5))?\s*([+-])?$/);
  if (!m) return null;
  let base = parseInt(m[1], 10);
  let mod = 0;
  if (m[3] === '+') mod = 0.5;
  else if (m[3] === '-') mod = -0.5;
  else if (m[2] === '5') { mod = 0.5; } // 3.5 のような数値表現は +0.5 とみなし base は整数部
  return { base, mod };
}

/* ---------- カード形状 ----------
 * card = {
 *   id, name, cost, type, effect,
 *   scores: { zen: {<player|gm>: score}, kou: {...} },
 *   overall: { zen: number, kou: number },   // 4人平均（タイブレーク用）
 *   comments: { <player|gm>: string }
 * }
 */

/* ---------- 状態 ---------- */
function createGame(deckSets, decisionPoolIndependent, config) {
  const cfg = deepMerge(structuredCloneSafe(DEFAULT_CONFIG), config || {});
  if (deckSets.length !== cfg.sets.length) throw new Error(`deckSets数(${deckSets.length})がconfig.sets数(${cfg.sets.length})と不一致`);
  deckSets.forEach((deck, i) => {
    const need = cfg.players.length * cfg.handSize;
    if (deck.length < need) throw new Error(`セット${i + 1}のデッキが${deck.length}枚しかない（必要${need}枚）`);
    validateDeck(deck, cfg, i);
  });
  return {
    engineVersion: ENGINE_VERSION,
    config: cfg,
    cardsById: indexCards(deckSets.flat()),
    deckSets: deckSets.map((d) => d.map((c) => c.id)),
    phase: 'lobby', // lobby → deal → basis → commit → faces → declare → scores → roundEnd → (setEnd) → decisionPick → decisionDeclare → decisionReveal → final
    setIndex: -1,
    roundIndex: -1,          // セット内 0-origin
    currentHalf: null,
    hands: {},               // player -> [cardId]（未使用の手札）
    reserved: {},            // player -> [cardId]（温存として残った札; セット終了時に確定）
    committed: {},           // player -> cardId
    declarations: {},        // player -> {self: int|null, side: {target, value}|null}
    scores: {},              // player -> 総得点
    roundResult: null,       // 直近ラウンドの判定詳細
    history: [],             // 全ラウンドのログ（ネタばらし画面用）
    decisionState: null,
    rngLog: [],
  };
}

function validateDeck(deck, cfg, setIdx) {
  const seen = new Set();
  for (const c of deck) {
    if (!c.id) throw new Error(`セット${setIdx + 1}: idなしカード`);
    if (seen.has(c.id)) throw new Error(`セット${setIdx + 1}: id重複 ${c.id}`);
    seen.add(c.id);
    for (const half of ['zen', 'kou']) {
      for (const p of cfg.players) {
        const s = c.scores?.[half]?.[p];
        if (!s || typeof s.base !== 'number' || s.base < 1 || s.base > 5) {
          throw new Error(`カード「${c.name}」(${c.id}) の ${half}/${p} の点数が不正: ${JSON.stringify(s)}`);
        }
      }
      if (typeof c.overall?.[half] !== 'number') {
        throw new Error(`カード「${c.name}」(${c.id}) の overall.${half} 欠落`);
      }
      if (cfg.decision.enabled) {
        const g = c.scores?.[half]?.[cfg.gmName];
        if (!g || typeof g.base !== 'number') throw new Error(`カード「${c.name}」(${c.id}) の ${half}/${cfg.gmName}(GM) 点数欠落（決着ラウンドに必要）`);
      }
    }
  }
}

function indexCards(cards) {
  const m = {};
  cards.forEach((c) => { m[c.id] = c; });
  return m;
}

/* ---------- アクション ---------- */
const Actions = {
  START_GAME: 'START_GAME',           // {} lobby → セット1配札
  ANNOUNCE_BASIS: 'ANNOUNCE_BASIS',   // {half} GMが基準宣言（固定セットではhalf省略可）
  COMMIT: 'COMMIT',                   // {player, cardId}
  REVEAL_FACES: 'REVEAL_FACES',       // {} GM操作
  DECLARE: 'DECLARE',                 // {player, self, side}
  REVEAL_SCORES: 'REVEAL_SCORES',     // {} GM操作 → 判定確定
  NEXT: 'NEXT',                       // {} roundEnd → 次ラウンド or 次セット or 決着へ
  DECISION_PICK: 'DECISION_PICK',     // {player, cardId} 温存2枚から1枚
  DECISION_ANNOUNCE: 'DECISION_ANNOUNCE', // {half} 決着の基準宣言 → 表公開
  DECISION_DECLARE: 'DECISION_DECLARE',   // {player, guess: int|null} マッチ点数予想
  DECISION_REVEAL: 'DECISION_REVEAL', // {} 判定確定 → final
};

function reduce(state, action) {
  const s = structuredCloneSafe(state); // 破壊回避（呼び出し側の巻き戻し・保全のため）
  const cfg = s.config;
  const type = action.type;

  const expect = (...phases) => {
    if (!phases.includes(s.phase)) throw new Error(`${type} はフェーズ ${s.phase} では実行不可（許可: ${phases.join(',')}）`);
  };
  const isPlayer = (p) => cfg.players.includes(p);

  switch (type) {
    case Actions.START_GAME: {
      expect('lobby');
      startSet(s, 0);
      return s;
    }

    case Actions.ANNOUNCE_BASIS: {
      expect('basis');
      const fixed = cfg.sets[s.setIndex].fixedHalf;
      const half = fixed || action.half;
      if (half !== 'zen' && half !== 'kou') throw new Error(`基準が不正: ${action.half}`);
      if (fixed && action.half && action.half !== fixed) throw new Error(`このセットの基準は${fixed}固定`);
      s.currentHalf = half;
      s.committed = {};
      s.declarations = {};
      s.phase = 'commit';
      return s;
    }

    case Actions.COMMIT: {
      expect('commit');
      const { player, cardId } = action;
      if (!isPlayer(player)) throw new Error(`不明なプレイヤー: ${player}`);
      if (s.committed[player]) throw new Error(`${player} はコミット済み`);
      const hand = s.hands[player];
      const idx = hand.indexOf(cardId);
      if (idx < 0) throw new Error(`${player} の手札に ${cardId} がない`);
      s.committed[player] = cardId;
      if (Object.keys(s.committed).length === cfg.players.length) s.phase = 'faces';
      return s;
    }

    case Actions.REVEAL_FACES: {
      expect('faces');
      s.phase = 'declare';
      return s;
    }

    case Actions.DECLARE: {
      expect('declare');
      const { player } = action;
      if (!isPlayer(player)) throw new Error(`不明なプレイヤー: ${player}`);
      if (s.declarations[player]) throw new Error(`${player} は宣言済み`);
      const decl = { self: null, side: null };
      if (action.self !== null && action.self !== undefined) {
        const v = Number(action.self);
        if (!Number.isInteger(v) || v < 1 || v > 5) throw new Error(`自分宣言は1〜5の整数: ${action.self}`);
        decl.self = v;
      }
      if (action.side) {
        const { target, value } = action.side;
        if (!isPlayer(target) || target === player) throw new Error(`横予想の対象が不正: ${target}`);
        const v = Number(value);
        if (!Number.isInteger(v) || v < 1 || v > 5) throw new Error(`横予想は1〜5の整数: ${value}`);
        decl.side = { target, value: v };
      }
      s.declarations[player] = decl;
      if (Object.keys(s.declarations).length === cfg.players.length) s.phase = 'scoresReady';
      return s;
    }

    case Actions.REVEAL_SCORES: {
      expect('scoresReady');
      s.roundResult = judgeRound(s);
      applyRoundResult(s, s.roundResult);
      s.phase = 'roundEnd';
      return s;
    }

    case Actions.NEXT: {
      expect('roundEnd');
      // 手札から使用済みを除去
      for (const p of cfg.players) {
        s.hands[p] = s.hands[p].filter((id) => id !== s.committed[p]);
      }
      const lastRoundOfSet = s.roundIndex + 1 >= cfg.roundsPerSet;
      if (!lastRoundOfSet) {
        s.roundIndex += 1;
        s.currentHalf = null;
        s.committed = {};
        s.declarations = {};
        s.roundResult = null;
        s.phase = 'basis';
        return s;
      }
      // セット終了: 残り手札を温存として記録
      for (const p of cfg.players) {
        s.reserved[p] = (s.reserved[p] || []).concat(s.hands[p]);
        s.hands[p] = [];
      }
      const lastSet = s.setIndex + 1 >= cfg.sets.length;
      if (!lastSet) {
        startSet(s, s.setIndex + 1);
        return s;
      }
      if (cfg.decision.enabled) {
        s.decisionState = { picks: {}, guesses: {}, half: null, result: null };
        s.phase = 'decisionPick';
      } else {
        s.phase = 'final';
      }
      return s;
    }

    case Actions.DECISION_PICK: {
      expect('decisionPick');
      const { player, cardId } = action;
      if (!isPlayer(player)) throw new Error(`不明なプレイヤー: ${player}`);
      if (s.decisionState.picks[player]) throw new Error(`${player} は選択済み`);
      if (!s.reserved[player].includes(cardId)) throw new Error(`${player} の温存札に ${cardId} がない`);
      s.decisionState.picks[player] = cardId;
      if (Object.keys(s.decisionState.picks).length === cfg.players.length) s.phase = 'decisionBasis';
      return s;
    }

    case Actions.DECISION_ANNOUNCE: {
      expect('decisionBasis');
      const half = action.half;
      if (half !== 'zen' && half !== 'kou') throw new Error(`基準が不正: ${half}`);
      s.decisionState.half = half;
      s.phase = 'decisionDeclare';
      return s;
    }

    case Actions.DECISION_DECLARE: {
      expect('decisionDeclare');
      const { player } = action;
      if (!isPlayer(player)) throw new Error(`不明なプレイヤー: ${player}`);
      if (player in s.decisionState.guesses) throw new Error(`${player} は予想済み`);
      let g = null;
      if (action.guess !== null && action.guess !== undefined) {
        const v = Number(action.guess);
        if (!Number.isInteger(v) || v < 1 || v > 5) throw new Error(`予想は1〜5の整数: ${action.guess}`);
        g = v;
      }
      s.decisionState.guesses[player] = g;
      if (Object.keys(s.decisionState.guesses).length === cfg.players.length) s.phase = 'decisionReady';
      return s;
    }

    case Actions.DECISION_REVEAL: {
      expect('decisionReady');
      const res = judgeDecision(s);
      s.decisionState.result = res;
      for (const [p, pts] of Object.entries(res.pointsAwarded)) s.scores[p] += pts;
      s.history.push({ kind: 'decision', ...res });
      s.phase = 'final';
      return s;
    }

    default:
      throw new Error(`未知のアクション: ${type}`);
  }
}

function startSet(s, setIndex) {
  const cfg = s.config;
  s.setIndex = setIndex;
  s.roundIndex = 0;
  s.currentHalf = null;
  s.committed = {};
  s.declarations = {};
  s.roundResult = null;
  // 配札: deckSets[setIndex] の並び順どおりに配る（シャッフルは呼び出し側の責務。再現性のため）
  const ids = s.deckSets[setIndex].slice();
  const need = cfg.players.length * cfg.handSize;
  const dealt = ids.slice(0, need);
  cfg.players.forEach((p, i) => {
    s.hands[p] = dealt.filter((_, k) => k % cfg.players.length === i);
  });
  if (setIndex === 0) { s.scores = {}; cfg.players.forEach((p) => { s.scores[p] = 0; }); s.reserved = {}; cfg.players.forEach((p) => { s.reserved[p] = []; }); }
  s.phase = 'basis';
}

/* ---------- 判定 ---------- */
function judgeRound(s) {
  const cfg = s.config;
  const half = s.currentHalf;
  const entries = cfg.players.map((p) => {
    const card = s.cardsById[s.committed[p]];
    const sc = card.scores[half][p];       // 自分基準核: 出した本人の点数
    return { player: p, cardId: card.id, cardName: card.name, score: sc, value: numeric(sc), overall: card.overall[half], comment: card.comments?.[p] ?? null };
  });

  const maxV = Math.max(...entries.map((e) => e.value));
  let top = entries.filter((e) => e.value === maxV);
  let tieBreakUsed = null;
  if (top.length > 1) {
    tieBreakUsed = 'overall';
    const maxO = Math.max(...top.map((e) => e.overall));
    const top2 = top.filter((e) => e.overall === maxO);
    if (top2.length < top.length && top2.length === 1) top = top2;
    else { top = top2; tieBreakUsed = 'split'; }
  }

  const winPoints = cfg.sets[s.setIndex].winPoints;
  const pointsAwarded = {};
  cfg.players.forEach((p) => { pointsAwarded[p] = 0; });
  if (top.length === 1) {
    pointsAwarded[top[0].player] += winPoints;
  } else {
    const each = Math.ceil(winPoints / top.length); // 山分けは切り上げ
    top.forEach((e) => { pointsAwarded[e.player] += each; });
  }

  // 宣言判定（的中＝baseの整数一致。+/-は問わない）
  const declResults = {};
  for (const p of cfg.players) {
    const d = s.declarations[p] || { self: null, side: null };
    const own = entries.find((e) => e.player === p);
    const r = { self: null, side: null };
    if (d.self !== null) {
      const hit = d.self === own.score.base;
      r.self = { value: d.self, hit };
      if (hit) pointsAwarded[p] += cfg.hitSelfPoints;
    }
    if (d.side) {
      const tgt = entries.find((e) => e.player === d.side.target);
      const hit = d.side.value === tgt.score.base;
      r.side = { target: d.side.target, value: d.side.value, hit, actualBase: tgt.score.base };
      if (hit) pointsAwarded[p] += cfg.hitSidePoints;
    }
    declResults[p] = r;
  }

  return {
    kind: 'round',
    set: s.setIndex, round: s.roundIndex, half,
    entries, winners: top.map((e) => e.player), tieBreakUsed,
    declResults, pointsAwarded, winPoints,
  };
}

function applyRoundResult(s, res) {
  for (const [p, pts] of Object.entries(res.pointsAwarded)) s.scores[p] += pts;
  s.history.push(res);
}

function judgeDecision(s) {
  const cfg = s.config;
  const half = s.decisionState.half;
  const gm = cfg.gmName;
  const entries = cfg.players.map((p) => {
    const card = s.cardsById[s.decisionState.picks[p]];
    const sc = card.scores[half][gm];      // 決着: マッチ基準
    return { player: p, cardId: card.id, cardName: card.name, score: sc, value: numeric(sc), overall: card.overall[half], comment: card.comments?.[gm] ?? null };
  });
  const maxV = Math.max(...entries.map((e) => e.value));
  let top = entries.filter((e) => e.value === maxV);
  let tieBreakUsed = null;
  if (top.length > 1) {
    tieBreakUsed = 'overall';
    const maxO = Math.max(...top.map((e) => e.overall));
    const top2 = top.filter((e) => e.overall === maxO);
    if (top2.length === 1) top = top2; else { top = top2; tieBreakUsed = 'split'; }
  }
  const pointsAwarded = {};
  cfg.players.forEach((p) => { pointsAwarded[p] = 0; });
  if (top.length === 1) pointsAwarded[top[0].player] += cfg.decision.winPoints;
  else top.forEach((e) => { pointsAwarded[e.player] += Math.ceil(cfg.decision.winPoints / top.length); });

  const guessResults = {};
  for (const p of cfg.players) {
    const g = s.decisionState.guesses[p];
    if (g === null || g === undefined) { guessResults[p] = null; continue; }
    const own = entries.find((e) => e.player === p);
    const hit = g === own.score.base;
    guessResults[p] = { value: g, hit };
    if (hit) pointsAwarded[p] += cfg.decision.hitPoints;
  }
  return { half, entries, winners: top.map((e) => e.player), tieBreakUsed, guessResults, pointsAwarded };
}

/* ---------- 補助 ---------- */
function structuredCloneSafe(o) {
  return (typeof structuredClone === 'function') ? structuredClone(o) : JSON.parse(JSON.stringify(o));
}
function deepMerge(base, over) {
  if (Array.isArray(over)) return structuredCloneSafe(over);
  if (over && typeof over === 'object') {
    const out = { ...base };
    for (const k of Object.keys(over)) out[k] = deepMerge(base?.[k], over[k]);
    return out;
  }
  return over === undefined ? base : over;
}

/* ---------- 平準化配札 ----------
 * 各プレイヤーの「自分の点数での手札平均」（前後半の平均）の差を targetSpread 以下へ
 * 緩やかに近づける（ほんのり平等）。完全均一化はしない。
 * 戻り値: 配札順に並べ替えたデッキ（reduce側のラウンドロビン配札でこの手札になる）
 */
function balanceDeal(deck, players, handSize, rng, targetSpread = 0.4, maxIter = 400) {
  rng = rng || Math.random;
  const need = players.length * handSize;
  if (deck.length < need) throw new Error(`balanceDeal: デッキ不足 ${deck.length} < ${need}`);
  const pool = deck.slice();
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  const hands = players.map((_, i) => pool.slice(i * handSize, (i + 1) * handSize));
  const rest = pool.slice(need);
  const val = (card, p) => (numeric(card.scores.zen[p]) + numeric(card.scores.kou[p])) / 2;
  const avg = (i) => hands[i].reduce((a, c) => a + val(c, players[i]), 0) / handSize;
  const spread = () => { const as = players.map((_, i) => avg(i)); return Math.max(...as) - Math.min(...as); };
  for (let it = 0; it < maxIter && spread() > targetSpread; it++) {
    const as = players.map((_, i) => avg(i));
    const hi = as.indexOf(Math.max(...as)), lo = as.indexOf(Math.min(...as));
    // hiの高価値札とloの低価値札を交換候補としてランダムに試す
    const a = Math.floor(rng() * handSize), b = Math.floor(rng() * handSize);
    const ca = hands[hi][a], cb = hands[lo][b];
    const before = spread();
    hands[hi][a] = cb; hands[lo][b] = ca;
    if (spread() >= before) { hands[hi][a] = ca; hands[lo][b] = cb; } // 改善しなければ戻す
  }
  // ラウンドロビン(k % n == i)で hands[i] が再現される並びに編む
  const out = [];
  for (let k = 0; k < handSize; k++) for (let i = 0; i < players.length; i++) out.push(hands[i][k]);
  return out.concat(rest);
}

/* =========================================================
 * viewFor(state, seat): 座席別の秘匿ビュー（オンライン配信用）
 *
 * 目的: 非GM座席のクライアントには「未公開の点数」を一切渡さない。
 *   - カードのメタデータ（名前/コスト/種別/効果=飾り/キャラ）は非秘匿（物理カードに書いてある）
 *   - 点数(scores)・全体評価(overall)は秘匿。公開されるのは判定確定後の
 *     roundResult / history / decisionState.result の中の entries のみ。
 *   - 自分の手札は自分には見える（メタのみ、点数なし）。他人の手札は名前も渡さない
 *     （コミット前）。コミット表公開後は各札のメタ（名前）だけ渡す。
 * GM座席には答えパネル用に committed/picked 札の点数を付与する（GMは信頼されたホスト）。
 * これは純粋関数。テストで「非GMビューに未公開点数が無い」ことを不変条件として検証する。
 * ========================================================= */
function meta(card) {
  return { id: card.id, name: card.name, cost: card.cost, type: card.type, char: card.char || null, effect: card.effect || '' };
}
function publicConfig(cfg) {
  return {
    players: cfg.players.slice(), gmName: cfg.gmName,
    sets: cfg.sets.map((s) => ({ label: s.label, winPoints: s.winPoints, fixedHalf: s.fixedHalf })),
    roundsPerSet: cfg.roundsPerSet, handSize: cfg.handSize,
    hitSelfPoints: cfg.hitSelfPoints, hitSidePoints: cfg.hitSidePoints,
    decision: { enabled: cfg.decision.enabled, label: cfg.decision.label, winPoints: cfg.decision.winPoints, hitPoints: cfg.decision.hitPoints },
  };
}
function viewFor(state, seat) {
  const cfg = state.config;
  const isGM = seat === cfg.gmName;
  const P = cfg.players;
  // Firebase等が空オブジェクト/配列/nullを削除して読み戻すケースへの防御
  const committed = state.committed || {};
  const declarations = state.declarations || {};
  const hands = state.hands || {};
  const reserved = state.reserved || {};
  const phase = state.phase;
  const facesShown = ['faces', 'declare', 'scoresReady', 'roundEnd'].includes(phase);
  const cardMeta = {}; // id -> メタのみ（点数なし）
  const addMeta = (id) => { if (id && !cardMeta[id]) cardMeta[id] = meta(state.cardsById[id]); };

  const v = {
    engineVersion: state.engineVersion,
    seat, isGM,
    config: publicConfig(cfg),
    phase, setIndex: state.setIndex, roundIndex: state.roundIndex, currentHalf: state.currentHalf,
    scores: { ...state.scores },
    committedSeats: {},   // seat -> bool（誰が出したか。札の中身は含めない）
    declaredSeats: {},    // seat -> bool
    committedCards: null, // faces以降のみ: seat -> meta
    roundResult: null,    // roundEndのみ: 公開データ
    history: [],          // 公開済み（全ラウンド）
    myHand: null,         // 自分の手札メタ
    myReserved: null,     // 決着時: 自分の温存メタ
    decision: null,
    gm: null,             // GM専用の答えパネル
  };

  for (const p of P) {
    v.committedSeats[p] = !!committed[p];
    v.declaredSeats[p] = !!declarations[p];
  }
  if (facesShown && Object.keys(committed).length) {
    v.committedCards = {};
    for (const p of P) if (committed[p]) { addMeta(committed[p]); v.committedCards[p] = committed[p]; }
  }
  if (phase === 'roundEnd' && state.roundResult) {
    v.roundResult = sanitizeResult(state.roundResult, cfg, addMeta);
  }
  // history は全て公開済み（判定確定済のみ push される）
  v.history = state.history.map((h) => h.kind === 'decision' ? sanitizeDecision(h, cfg, addMeta) : sanitizeResult(h, cfg, addMeta));

  // 自分の手札（GMは手札なし）
  if (!isGM && hands[seat]) { v.myHand = hands[seat].map((id) => { addMeta(id); return id; }); }
  // 決着
  if (state.decisionState) {
    const ds = state.decisionState;
    const d = { half: ds.half, pickedSeats: {}, guessedSeats: {}, result: null, myPick: null };
    for (const p of P) { d.pickedSeats[p] = !!ds.picks[p]; d.guessedSeats[p] = (p in ds.guesses); }
    if (!isGM && reserved[seat]) v.myReserved = reserved[seat].map((id) => { addMeta(id); return id; });
    if (isGM) v.gmReserved = Object.fromEntries(P.map((p) => [p, (reserved[p] || []).map((id) => { addMeta(id); return id; })]));
    if (!isGM && ds.picks[seat]) { addMeta(ds.picks[seat]); d.myPick = ds.picks[seat]; }
    if (phase === 'final' && ds.result) d.result = sanitizeDecision({ kind: 'decision', ...ds.result }, cfg, addMeta);
    // 決着の札公開（picks）はfinalでのみ全公開。それ以前は自分のpickのみ。
    if (phase === 'final') { d.picks = {}; for (const p of P) if (ds.picks[p]) { addMeta(ds.picks[p]); d.picks[p] = ds.picks[p]; } }
    v.decision = d;
  }

  // GM専用: いま場に出ている札の答え（点数・コメント・全体評価）
  if (isGM) {
    v.gm = { answers: {}, hands: {} };
    const half = state.currentHalf || state.decisionState?.half;
    const isDec = phase.startsWith('decision') || phase === 'final';
    const committed = isDec ? (state.decisionState?.picks || {}) : state.committed;
    for (const p of P) {
      const id = committed[p]; if (!id) continue;
      const c = state.cardsById[id]; addMeta(id);
      const rater = isDec ? cfg.gmName : p;
      v.gm.answers[p] = { cardId: id, rater, zen: c.scores.zen[rater], kou: c.scores.kou[rater], overallZen: c.overall.zen, overallKou: c.overall.kou, comment: c.comments?.[rater] ?? null };
    }
    // GMは全員の手札も把握（進行補助）。メタのみ＋自分点(=各自の点)を付す。
    for (const p of P) v.gm.hands[p] = (hands[p] || []).map((id) => { addMeta(id); const c = state.cardsById[id]; return { id, zen: c.scores.zen[p], kou: c.scores.kou[p] }; });
  }

  v.cardMeta = cardMeta;
  return v;
}
/* 判定確定済ラウンドの entries は点数・コメント込みで公開してよい */
function sanitizeResult(r, cfg, addMeta) {
  return {
    kind: 'round', set: r.set, round: r.round, half: r.half,
    entries: r.entries.map((e) => { addMeta(e.cardId); return { player: e.player, cardId: e.cardId, cardName: e.cardName, score: e.score, comment: e.comment }; }),
    winners: r.winners.slice(), tieBreakUsed: r.tieBreakUsed,
    declResults: r.declResults, pointsAwarded: r.pointsAwarded, winPoints: r.winPoints,
  };
}
function sanitizeDecision(r, cfg, addMeta) {
  return {
    kind: 'decision', half: r.half,
    entries: r.entries.map((e) => { addMeta(e.cardId); return { player: e.player, cardId: e.cardId, cardName: e.cardName, score: e.score, comment: e.comment }; }),
    winners: r.winners.slice(), tieBreakUsed: r.tieBreakUsed,
    guessResults: r.guessResults, pointsAwarded: r.pointsAwarded,
  };
}

/* ---------- エクスポート（node / ブラウザ両対応） ---------- */
const EngineAPI = { ENGINE_VERSION, DEFAULT_CONFIG, Actions, createGame, reduce, judgeRound, judgeDecision, parseScoreStr, numeric, scoreLabel, balanceDeal, viewFor };
if (typeof module !== 'undefined' && module.exports) module.exports = EngineAPI;
if (typeof window !== 'undefined') window.Engine = EngineAPI;

</script>
<script>
/* =========================================================
 * net.js — オンライン対戦のトランスポート層（DOM非依存）
 *
 * 設計:
 *  - ホスト権威モデル。GM(マッチ)のクライアントが唯一の権威=ホスト。
 *  - プレイヤーは「意図(intent)」をDBに書くだけ。ホストが検証してエンジンに畳み込む。
 *  - ホストは座席別の秘匿ビュー(viewFor)をDBに公開。各クライアントは自分のビューだけ購読。
 *  - 畳み込みは冪等（state側で既適用を判定＋stepタグで別フェーズ混入を防止）。
 *  - ホストは復帰用に完全状態(hostState)も保存（答えを含む＝バンドルと同等の信頼前提）。
 *
 * DBアダプタ契約: ref(path) => {
 *   child(sub), set(v):Promise, update(obj):Promise, remove():Promise, get():Promise<value>,
 *   on('value', cb)=>unsub, push(v):Promise<{key}>, onDisconnect()=>{set(v),remove()} }
 * ========================================================= */
'use strict';

/* ---------------- 決定的ID（Date/Math.random非依存でも動く） ---------------- */
function makeId(prefix, seedBox) {
  seedBox.n = (seedBox.n || 0) + 1;
  return prefix + String(seedBox.n).padStart(6, '0');
}

/* ---------------- MockDB: RTDBの必要部分を忠実に模倣 ---------------- */
function createMockDb() {
  const root = {};                 // ツリー（プレーンオブジェクト）
  const listeners = [];            // {path, cb}
  const disconnects = new Map();   // uid相当キー -> [{path, action:'set'|'remove', value}]
  const pushSeed = { n: 0 };
  let pushCounter = 0;

  const clone = (v) => v === undefined ? null : JSON.parse(JSON.stringify(v));
  const parts = (p) => p.split('/').filter(Boolean);
  function getNode(path) { let n = root; for (const k of parts(path)) { if (n == null || typeof n !== 'object') return undefined; n = n[k]; } return n; }
  function setNode(path, value) {
    const ps = parts(path);
    if (ps.length === 0) { for (const k of Object.keys(root)) delete root[k]; if (value && typeof value === 'object') Object.assign(root, clone(value)); return; }
    let n = root;
    for (let i = 0; i < ps.length - 1; i++) { const k = ps[i]; if (n[k] == null || typeof n[k] !== 'object') n[k] = {}; n = n[k]; }
    const last = ps[ps.length - 1];
    if (value === null || value === undefined) delete n[last];
    else n[last] = clone(value);
  }
  function notify(changedPath) {
    const cp = changedPath.replace(/\/+$/, '');
    for (const l of listeners.slice()) {
      // value: リスナpathが変更pathの祖先or同一or子孫なら発火（RTDB近似）
      const lp = l.path.replace(/\/+$/, '');
      if (cp === lp || cp.startsWith(lp + '/') || lp.startsWith(cp + '/') || lp === '' ) {
        try { l.cb(clone(getNode(l.path))); } catch (e) { /* listener error ignored */ }
      }
    }
  }
  function ref(path) {
    return {
      path,
      child(sub) { return ref((path ? path + '/' : '') + sub); },
      async set(v) { setNode(path, v); notify(path); },
      async update(obj) { for (const k of Object.keys(obj)) setNode((path ? path + '/' : '') + k, obj[k]); notify(path); },
      async remove() { setNode(path, null); notify(path); },
      async get() { return clone(getNode(path)); },
      on(event, cb) {
        if (event !== 'value') return () => {};
        const l = { path, cb };
        listeners.push(l);
        Promise.resolve().then(() => { try { cb(clone(getNode(path))); } catch (e) {} }); // 初回発火
        return () => { const i = listeners.indexOf(l); if (i >= 0) listeners.splice(i, 1); };
      },
      async push(v) { const key = 'k' + String(++pushCounter).padStart(8, '0'); setNode((path ? path + '/' : '') + key, v); notify(path); return { key }; },
      onDisconnect() {
        return {
          set: async (v) => { const arr = disconnects.get(path) || []; arr.push({ path, action: 'set', value: v }); disconnects.set(path, arr); },
          remove: async () => { const arr = disconnects.get(path) || []; arr.push({ path, action: 'remove' }); disconnects.set(path, arr); },
        };
      },
    };
  }
  // テスト用: 切断シミュレーション
  ref.__simulateDisconnect = function (pathPrefix) {
    for (const [key, arr] of disconnects) {
      if (!pathPrefix || key.startsWith(pathPrefix)) {
        for (const d of arr) { if (d.action === 'remove') { setNode(d.path, null); } else { setNode(d.path, d.value); } notify(d.path); }
        disconnects.delete(key);
      }
    }
  };
  ref.__dump = () => clone(root);
  return { ref, _isMock: true };
}

/* ---------------- Firebase(compat)アダプタ（ブラウザのみ） ---------------- */
function createFirebaseDb(config) {
  if (typeof firebase === 'undefined') throw new Error('Firebase SDK未読込');
  if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(config);
  const db = firebase.database();
  function wrap(fref) {
    return {
      path: fref.toString(),
      child(sub) { return wrap(fref.child(sub)); },
      set(v) { return fref.set(v); },
      update(obj) { return fref.update(obj); },
      remove() { return fref.remove(); },
      async get() { const s = await fref.once('value'); return s.val(); },
      on(event, cb) { const h = fref.on(event, (snap) => cb(snap.val())); return () => fref.off(event, h); },
      async push(v) { const r = fref.push(); await r.set(v); return { key: r.key }; },
      onDisconnect() { const od = fref.onDisconnect(); return { set: (v) => od.set(v), remove: () => od.remove() }; },
    };
  }
  return { ref: (path) => wrap(db.ref(path)), _isMock: false, _serverTime: firebase.database.ServerValue ? firebase.database.ServerValue.TIMESTAMP : 0 };
}

/* ---------------- Firebase読み戻しの正規化 ----------------
 * RTDBは空オブジェクト/空配列/null値のキーを保存しない。hostStateを読み戻すと
 * committed:{} 等が丸ごと消え、viewFor/reduce が undefined を座席名で索引して落ちる。
 * 復帰時に状態の器を再構築する。 */
function hydrateState(state) {
  if (!state || !state.config) return state;
  const P = state.config.players || [];
  state.committed = state.committed || {};
  state.declarations = state.declarations || {};
  state.hands = state.hands || {};
  state.reserved = state.reserved || {};
  state.scores = state.scores || {};
  state.history = state.history || [];
  for (const p of P) {
    if (!Array.isArray(state.hands[p])) state.hands[p] = state.hands[p] ? Object.values(state.hands[p]) : [];
    if (!Array.isArray(state.reserved[p])) state.reserved[p] = state.reserved[p] ? Object.values(state.reserved[p]) : [];
    if (typeof state.scores[p] !== 'number') state.scores[p] = 0;
  }
  // deckSets は配列の配列。RTDBが疎配列をオブジェクト化した場合に備え正規化
  if (state.deckSets && !Array.isArray(state.deckSets)) state.deckSets = Object.values(state.deckSets);
  if (Array.isArray(state.deckSets)) state.deckSets = state.deckSets.map((d) => Array.isArray(d) ? d : (d ? Object.values(d) : []));
  // 決着フェーズでは decisionState 全体（picks:{},guesses:{},half:null,result:null）が
  // 空になり丸ごと消えることがある。フェーズから必要性を判断して器を復元。
  const inDecision = state.phase && (state.phase.startsWith('decision') || state.phase === 'final');
  if (!state.decisionState && inDecision) state.decisionState = { picks: {}, guesses: {}, half: null, result: null };
  if (state.decisionState) {
    state.decisionState.picks = state.decisionState.picks || {};
    state.decisionState.guesses = state.decisionState.guesses || {};
    if (!('half' in state.decisionState)) state.decisionState.half = null;
    if (!('result' in state.decisionState)) state.decisionState.result = null;
  }
  return state;
}

/* ---------------- ステップタグ（フェーズ混入防止） ---------------- */
function stepOf(state) {
  const p = state.phase;
  if (p.startsWith('decision') || p === 'final') return `D:${p}`;
  return `${state.setIndex}:${state.roundIndex}:${p}`;
}

/* ---------------- RoomHost（GMクライアントが所有） ---------------- */
function RoomHost(db, code, opts) {
  const E = opts.engine;
  const base = `rooms/${code}`;
  const self = {
    state: null, undoStack: [], _unsubs: [], _startedAt: opts.now || 0,
    deckSets: opts.deckSets, gmName: opts.gmName, deckKey: opts.deckKey,
    onPublish: opts.onPublish || (() => {}),
  };

  async function loadOrCreate() {
    const saved = await db.ref(`${base}/hostState`).get();
    if (saved && saved.phase) { self.state = hydrateState(saved); return 'resumed'; }
    const balanced = self.deckSets.map((d) => E.balanceDeal(d, E.DEFAULT_CONFIG.players, E.DEFAULT_CONFIG.handSize));
    self.state = E.reduce(E.createGame(balanced, null, {}), { type: E.Actions.START_GAME });
    return 'created';
  }

  async function publish() {
    const st = self.state;
    const step = stepOf(st);
    const seats = [...st.config.players, st.config.gmName];
    const updates = {};
    for (const seat of seats) {
      const v = E.viewFor(st, seat);
      v.step = step;
      updates[`views/${seat}`] = v;
    }
    updates['hostState'] = st;              // 復帰用（答え含む＝信頼前提）
    updates['meta/step'] = step;
    updates['meta/phase'] = st.phase;
    updates['meta/finished'] = st.phase === 'final';
    await db.ref(base).update(updates);
    self.onPublish(st);
  }

  function applyGm(action) {
    const next = E.reduce(self.state, action); // 先にreduce（例外はここで＝mutation前）
    self.undoStack.push(self.state);
    if (self.undoStack.length > 300) self.undoStack.shift();
    self.state = next;
  }

  self.forceComplete = async () => {
    const st = self.state, A = E.Actions; let changed = false;
    if (st.phase === 'commit') { for (const p of st.config.players) if (!st.committed[p]) { self.state = E.reduce(self.state, { type: A.COMMIT, player: p, cardId: st.hands[p][0] }); changed = true; } }
    else if (st.phase === 'declare') { for (const p of st.config.players) if (!st.declarations[p]) { self.state = E.reduce(self.state, { type: A.DECLARE, player: p, self: null, side: null }); changed = true; } }
    else if (st.phase === 'decisionPick') { for (const p of st.config.players) if (!st.decisionState.picks[p]) { self.state = E.reduce(self.state, { type: A.DECISION_PICK, player: p, cardId: st.reserved[p][0] }); changed = true; } }
    else if (st.phase === 'decisionDeclare') { for (const p of st.config.players) if (!(p in st.decisionState.guesses)) { self.state = E.reduce(self.state, { type: A.DECISION_DECLARE, player: p, guess: null }); changed = true; } }
    if (changed) await publish();
    return changed;
  };

  async function foldIntents(intents) {
    if (!intents) return;
    const st = self.state;
    const step = stepOf(st);
    let changed = false;
    const A = E.Actions;
    for (const seat of st.config.players) {
      const it = intents[seat];
      if (!it || it.step !== step) continue;
      try {
        if (it.kind === 'commit' && st.phase === 'commit' && !st.committed[seat]) { self.state = E.reduce(self.state, { type: A.COMMIT, player: seat, cardId: it.cardId }); changed = true; }
        else if (it.kind === 'declare' && st.phase === 'declare' && !st.declarations[seat]) { self.state = E.reduce(self.state, { type: A.DECLARE, player: seat, self: it.self ?? null, side: it.side ?? null }); changed = true; }
        else if (it.kind === 'decisionPick' && st.phase === 'decisionPick' && !st.decisionState.picks[seat]) { self.state = E.reduce(self.state, { type: A.DECISION_PICK, player: seat, cardId: it.cardId }); changed = true; }
        else if (it.kind === 'decisionGuess' && st.phase === 'decisionDeclare' && !(seat in st.decisionState.guesses)) { self.state = E.reduce(self.state, { type: A.DECISION_DECLARE, player: seat, guess: it.guess ?? null }); changed = true; }
      } catch (e) {
        // 不正意図: 無視し、当該座席に軽いフィードバックを残す
        await db.ref(`${base}/errors/${seat}`).set({ step, msg: String(e.message || e) });
      }
    }
    if (changed) { self.undoStack.push(st); await publish(); }
  }

  self.start = async function () {
    const how = await loadOrCreate();
    await publish();
    // フェーズが進むたびに古い意図は publish 内で消える。意図購読開始。
    self._unsubs.push(db.ref(`${base}/intents`).on('value', (intents) => { foldIntents(intents); }));
    return how;
  };
  // GMアクション
  self.announceBasis = async (half) => { applyGm({ type: E.Actions.ANNOUNCE_BASIS, half }); await publish(); };
  self.revealFaces = async () => { applyGm({ type: E.Actions.REVEAL_FACES }); await publish(); };
  self.revealScores = async () => { applyGm({ type: E.Actions.REVEAL_SCORES }); await publish(); };
  self.next = async () => { applyGm({ type: E.Actions.NEXT }); await publish(); };
  self.decisionAnnounce = async (half) => { applyGm({ type: E.Actions.DECISION_ANNOUNCE, half }); await publish(); };
  self.decisionReveal = async () => { applyGm({ type: E.Actions.DECISION_REVEAL }); await publish(); };
  self.undo = async () => { if (!self.undoStack.length) return false; self.state = self.undoStack.pop(); await publish(); return true; };
  self.resync = async () => { await publish(); };
  self.stop = () => { self._unsubs.forEach((u) => u()); self._unsubs = []; };
  return self;
}

/* ---------------- RoomClient（プレイヤー） ---------------- */
function RoomClient(db, code, seat) {
  const base = `rooms/${code}`;
  const c = { seat, _unsubs: [], view: null };
  c.onView = (cb) => { c._unsubs.push(db.ref(`${base}/views/${seat}`).on('value', (v) => { c.view = v; cb(v); })); };
  c.onError = (cb) => { c._unsubs.push(db.ref(`${base}/errors/${seat}`).on('value', (e) => { if (e) cb(e); })); };
  c.sendIntent = async (kind, payload) => {
    const step = c.view && c.view.step;
    await db.ref(`${base}/intents/${seat}`).set(Object.assign({ kind, step }, payload));
  };
  c.stop = () => { c._unsubs.forEach((u) => u()); c._unsubs = []; };
  return c;
}

/* ---------------- ルーム参加・在席・座席 ---------------- */
async function createRoom(db, code, { gmUid, gmName, deckKey, now }) {
  await db.ref(`rooms/${code}/meta`).set({ hostUid: gmUid, gmName, deckKey, engine: 'kotaeawase', createdAt: now || 0, started: false, finished: false });
  await claimSeat(db, code, gmName, gmUid, gmName);
  await setPresence(db, code, gmUid);
}
async function claimSeat(db, code, seat, uid, name) {
  const ref = db.ref(`rooms/${code}/seats/${seat}`);
  const cur = await ref.get();
  if (cur && cur.uid && cur.uid !== uid) throw new Error(`座席「${seat}」は使用中`);
  await ref.set({ uid, name: name || seat });
  return true;
}
async function setPresence(db, code, uid) {
  const ref = db.ref(`rooms/${code}/presence/${uid}`);
  await ref.set(true);
  try { await ref.onDisconnect().set(false); } catch (e) {}
}
function watchRoom(db, code, cb) {
  const unsubs = [
    db.ref(`rooms/${code}/seats`).on('value', (seats) => cb({ seats })),
    db.ref(`rooms/${code}/presence`).on('value', (presence) => cb({ presence })),
    db.ref(`rooms/${code}/meta`).on('value', (meta) => cb({ meta })),
  ];
  return () => unsubs.forEach((u) => u());
}
async function startRoom(db, code) { await db.ref(`rooms/${code}/meta/started`).set(true); }

/* ---------------- エクスポート ---------------- */
const NetAPI = { createMockDb, createFirebaseDb, RoomHost, RoomClient, createRoom, claimSeat, setPresence, watchRoom, startRoom, stepOf, makeId, hydrateState };
if (typeof module !== 'undefined' && module.exports) module.exports = NetAPI;
if (typeof window !== 'undefined') window.Net = NetAPI;

  tone(freq, dur, type = 'sine', gain = 0.12, when = 0) {

    try {
      const o = c.createOscillator(), g = c.createGain();
      o.type = type; o.frequency.value = freq;

      g.gain.linearRampToValueAtTime(gain, c.currentTime + when + 0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + when + dur);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime + when); o.stop(c.currentTime + when + dur + 0.05);
    } catch (e) {}
  },
  click() { this.tone(880, 0.06, 'square', 0.05); },
  commit() { this.tone(220, 0.1, 'triangle', 0.12); this.tone(140, 0.16, 'sine', 0.1, 0.03); },
  swish() { this.tone(520, 0.16, 'sine', 0.07); this.tone(760, 0.2, 'sine', 0.06, 0.08); },
  pop(i) { this.tone(500 + i * 180, 0.16, 'triangle', 0.14); this.tone(750 + i * 180, 0.22, 'sine', 0.08, 0.06); },
  hit() { this.tone(1040, 0.12, 'sine', 0.14); this.tone(1560, 0.25, 'sine', 0.12, 0.1); },
  miss() { this.tone(190, 0.2, 'sawtooth', 0.05); },

};

/* ---------- 基本機構 ---------- */
function dispatch(action) {
  undoStack.push(S);
  if (undoStack.length > 200) undoStack.shift();
  try {
    S = E.reduce(S, action);
  } catch (e) {
    undoStack.pop();
    alert('操作エラー: ' + e.message);
    render(); // ボタン無効化の復帰
    return false;
  }
  render();
  return true;
}
function pendingPlayers() {
  if (!S) return [];
  if (S.phase === 'commit') return PLAYERS.filter((p) => !S.committed[p]);
  if (S.phase === 'declare') return PLAYERS.filter((p) => !S.declarations[p]);
  if (S.phase === 'decisionPick') return PLAYERS.filter((p) => !S.decisionState.picks[p]);
  if (S.phase === 'decisionDeclare') return PLAYERS.filter((p) => !(p in S.decisionState.guesses));
  return [];
}
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function cardTile(card, opts = {}) {
  const cls = ['card', opts.sel ? 'sel' : '', opts.winner ? 'winner' : '', opts.static ? 'static' : '', opts.rv || ''].join(' ');
  return `<div class="${cls}" ${opts.onclick ? `onclick="${opts.onclick}"` : ''}>

    <div class="nm">${esc(card.name)}</div>
    <div class="meta">${esc(card.char || '')}${card.char ? '・' : ''}コスト${esc(card.cost)}・${esc(card.type)}</div>

}
function scoreboard() {
  if (!S || !S.scores || Object.keys(S.scores).length === 0) return '';

}
function stageLabel() {
  if (!S || S.setIndex < 0) return '';
  if (S.phase.startsWith('decision') || S.phase === 'final') return '決着ラウンド';
  const set = S.config.sets[S.setIndex];
  return `${set.label}（${S.roundIndex + 1}/${S.config.roundsPerSet}）`;

  return `<header><h1>こたえあわせ（仮）</h1><div style="display:flex;align-items:center;gap:4px"><div class="stage">${stageLabel()}</div><button id="sndbtn" onclick="UI.toggleSnd()">${Snd.on ? '🔊' : '🔇'}</button></div></header>${S ? scoreboard() : ''}${body}`;
}
function render() {
  const app = document.getElementById('app');

  document.getElementById('cover-root')?.remove();

    case 'faces': body = renderFaces(); break;
    case 'declare': body = renderSeatGate('宣言'); break;
    case 'scoresReady': body = renderScoresReady(); break;
    case 'roundEnd': body = renderRoundEnd(); break;
    case 'decisionPick': body = renderSeatGate('決着・札選択'); break;
    case 'decisionBasis': body = renderDecisionBasis(); break;
    case 'decisionDeclare': body = renderSeatGate('決着・予想'); break;
    case 'decisionReady': body = renderDecisionReady(); break;
    case 'final': body = renderFinal(); break;
    default: body = `<div class="panel">未対応フェーズ: ${S.phase}</div>`;
  }
  const prevPhase = app.dataset.phase;
  app.innerHTML = frame(body);
  app.dataset.phase = S ? S.phase : 'lobby';
  // 同一フェーズ内の再描画（選択・トグル等）はスクロール位置を維持、フェーズが変わったら先頭へ
  if (prevPhase === app.dataset.phase) window.scrollTo(0, scrollY);

  renderGM();
}

function renderSeatGate(what) {

  const p = q[0];

    return `<div class="panel center">

/* ---------- GMパネル ---------- */
function renderGM() {
  const d = document.getElementById('gmdrawer');
  d.className = ui.gmOpen ? 'open' : '';
  const btn = document.querySelector('#gmbar button');
  if (btn) { btn.style.borderColor = ui.gmOpen ? 'var(--acc)' : ''; btn.style.color = ui.gmOpen ? 'var(--acc)' : ''; }
  if (!ui.gmOpen) { d.innerHTML = ''; return; }
  if (!S) {
    d.innerHTML = `<div class="gm-title">GM専用パネル <button style="float:right;font-size:11px;padding:4px 10px" onclick="UI.toggleGM()">閉じる</button></div>
      <div class="muted">ゲーム未開始です。開始するとここに「現在の答え」が表示されます。</div>`;
    return;
  }
  let rows = '';
  const half = S.currentHalf || S.decisionState?.half;
  const isDecision = S.phase.startsWith('decision');
  const committed = isDecision ? (S.decisionState?.picks || {}) : S.committed;
  for (const p of PLAYERS) {
    const id = committed[p];
    if (!id) continue;
    const c = S.cardsById[id];
    const rater = isDecision ? S.config.gmName : p;
    const z = c.scores.zen[rater], k = c.scores.kou[rater];
    rows += `<tr><td>${esc(p)}</td><td>${esc(c.name)}</td><td>${E.scoreLabel(z)}</td><td>${E.scoreLabel(k)}</td><td>${c.overall.zen.toFixed(2)}/${c.overall.kou.toFixed(2)}</td><td style="white-space:pre-wrap">${esc(c.comments?.[rater] ?? '')}</td></tr>`;
  }
  d.innerHTML = `<div class="gm-title">GM専用 — 現在の答え（判定者: ${isDecision ? 'マッチ' : '各自'} ／ 現基準: ${half ? HALF_LABEL[half] : '未宣言'}）<button style="float:right;font-size:11px;padding:4px 10px" onclick="UI.toggleGM()">閉じる</button></div>
    ${rows ? `<table><tr><th>出した人</th><th>札</th><th>前半</th><th>後半</th><th>副基準(全体) 前/後</th><th>コメント</th></tr>${rows}</table>` : '<div class="muted">コミット待ち</div>'}
    <div class="muted" style="margin-top:8px">同点時は副基準（4人平均の全体評価）が高い札が勝ち。それも同点なら山分け。／ フェーズ: ${S.phase} ／ Engine ${S.engineVersion}</div>`;
}
