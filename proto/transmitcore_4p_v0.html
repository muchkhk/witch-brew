    betting.history.push({team, action:'call', amount:pay, allIn: pay<toCall});
    resolved = {method:'showdown'};
  } else if (action==='raise'){
    if (betting.currentBet===0) throw new Error('レイズ対象がありません');
    if (betting.raiseCount>=MAX_RAISES) throw new Error('レイズ上限に達しています');
    const rv = amount;
    const toCall = betting.currentBet - betting.contributions[team];
    const total = toCall+rv;
    if (!BET_OPTIONS.includes(rv) || total>remaining) throw new Error('不正なレイズ額です');
    betting.contributions[team]+=total; chips[team]-=total; pot+=total;
    betting.currentBet = betting.contributions[team];
    betting.raiseCount+=1;
    betting.history.push({team, action:'raise', amount:rv, totalPaid:total});
    betting.toActTeam = other;
  } else if (action==='fold'){
    betting.history.push({team, action:'fold'});
    resolved = {method:'fold', winnerTeam: other};
  } else {
    throw new Error('不明なアクション: '+action);
  }
  return { betting, chips, pot, resolved };
}

// ショーダウン判定（核仕様：2軸差分の暫定解決。報告書「最重要の暫定選択」参照）
// 同一動物は常に引き分け（ソロ版§4-5を継承）。それ以外はチームごとの自陣軸での順位を比較する。
function resolveShowdown(animalA, animalB, axisA, axisB){
  if (animalA === animalB) return { tie:true, winnerTeam:null };
  const rankA = RANK_OF[axisA][animalA];
  const rankB = RANK_OF[axisB][animalB];
  if (rankA === rankB) return { tie:true, winnerTeam:null }; // 数値偶然一致（構造上あり得る。引き分け扱い）
  return { tie:false, winnerTeam: rankA > rankB ? 'A' : 'B' };
}

/* ==================== NPC思考ロジック（Phase1・npc2モード。ソロ版v1.0の移植＋自陣軸限定に簡略化） ==================== */
const NPC_MIX_RATE = 0.15;
function npcCandidateSet(axis, anchors){
  // 4人版の暫定簡略化：NPCは「自陣の軸」のみを推論対象とし、相手陣営の軸は推測しない（報告書に明記）。
  // 伝達スクリプト用の候補集合は、自陣アンカー（消去された軸）を除いた残り軸。
  return AXES.filter(a => !anchors.includes(a) && a !== undefined);
}
function npcPickHint(trueAxis, tier, usedTexts){
  const candidates = HINT_TABLE.filter(h => h.axis===trueAxis && h.tier===tier && !usedTexts.has(h.text));
  if (!candidates.length) throw new Error('NPCヒント候補が枯渇（データ構造上通常発生しない状態）');
  return candidates[Math.floor(Math.random()*candidates.length)].text;
}
function npcChooseAnimal(remaining, oppRemaining, trueAxis){
  if (remaining.length===1 || Math.random() < NPC_MIX_RATE){
    return remaining[Math.floor(Math.random()*remaining.length)];
  }
  let best = remaining[0], bestScore = -1;
  for (const s of remaining){
    let wc = 0;
    for (const t of oppRemaining) if (RANK_OF[trueAxis][s] > RANK_OF[trueAxis][t]) wc++;
    const score = wc / oppRemaining.length;
    if (score > bestScore){ bestScore = score; best = s; }
  }
  return best;
}
function npcConfidence(animal, oppRemaining, trueAxis){
  let wc = 0;
  for (const t of oppRemaining) if (RANK_OF[trueAxis][animal] > RANK_OF[trueAxis][t]) wc++;
  return wc / oppRemaining.length;
}
function nearestAvailable(desired, list){
  return list.slice().sort((a,b)=>Math.abs(a-desired)-Math.abs(b-desired))[0];
}
function npcDecideAction(conf, opts){
  if (opts.kind==='open'){
    const bets = extractValues(opts.options,'bet');
    if (conf<0.45 || !bets.length) return {action:'check'};
    const desired = conf<0.60 ? 1 : (conf<0.72 ? 2 : (conf<0.85 ? 3 : 5));
    return {action:'bet', amount: nearestAvailable(desired, bets)};
  }
  const raises = extractValues(opts.options,'raise');
  if (conf<0.35) return {action:'fold'};
  if (conf<0.65 || !raises.length) return {action:'call'};
  const desired = conf<0.80 ? 1 : (conf<0.92 ? 3 : 5);
  return {action:'raise', amount: nearestAvailable(desired, raises)};
}

/* ==================== Firebase グルー ==================== */
let auth = null, db = null, user = null;
let ST = { room:null, seat:null, meta:null, seats:{}, game:null, myPrivate:null, oppNames:{} };
let listeners = [];
let heartbeatTimer = null;
let drainTickTimer = null;
let hostRelayUnsub = null;
let GEN = 0;

const SESSION_KEY = 'transmit4p_session_v0';
function saveSession(){ localStorage.setItem(SESSION_KEY, JSON.stringify({room:ST.room, seat:ST.seat})); }
function clearSession(){ localStorage.removeItem(SESSION_KEY); }

const CODE_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
function newCode(){
  let s = '';
  const arr = new Uint32Array(6);
  crypto.getRandomValues(arr);
  arr.forEach(x=> s += CODE_CHARS[x % CODE_CHARS.length]);
  return s;
}
function normalizeCode(v){ return String(v||'').toUpperCase().replace(/[^A-HJ-NP-Z2-9]/g,'').slice(0,6); }

function roomRef(path){ return db.ref(`${ROOT}/${ST.room}${path ? '/'+path : ''}`); }
function isHost(){ return !!(user && ST.meta && ST.meta.hostUid === user.uid); }

async function bootstrap(){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth(); db = firebase.database();
    const q = new URLSearchParams(location.search);
    const local = location.hostname === 'localhost' || /^127\./.test(location.hostname);
    if (local && q.get('emulator')==='1'){
      auth.useEmulator('http://127.0.0.1:9299', {disableWarnings:true});
      db.useEmulator('127.0.0.1', 9270);
    }
    await auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    auth.onAuthStateChanged(async u=>{
      if (!u){ await auth.signInAnonymously(); return; }
      user = u;
      await restoreSession();
      render();
    });
  } catch(e){ showError('初期化に失敗しました: '+(e && e.message ? e.message : e)); }
}

async function restoreSession(){
  let s = null;
  try{ s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); } catch(_){ clearSession(); }
  if (!s || !s.room) return;
  const code = normalizeCode(s.room);
  if (code.length !== 6) { clearSession(); return; }
  try{
    const meta = (await db.ref(`${ROOT}/${code}/meta`).get()).val();
    if (!meta){ clearSession(); return; }
    const seat = (await db.ref(`${ROOT}/${code}/seats/${s.seat}`).get()).val();
    if (seat && seat.uid === user.uid){ ST.room = code; ST.seat = Number(s.seat); attach(); }
    else clearSession();
  } catch(_){ clearSession(); }
}

async function createRoom(mode, drainSpeed, hintDrainToggle, name){
  const meta = { hostUid:user.uid, phase:'lobby', mode, drainSpeed, hintDrainToggle, version:VER, createdAt: nowMs() };
  let code = '', created = false;
  for (let i=0;i<8;i++){
    code = newCode();
    try{ await db.ref(`${ROOT}/${code}/meta`).set(meta); created = true; break; }
    catch(e){ if (e && e.code !== 'PERMISSION_DENIED') throw e; }
  }
  if (!created) throw new Error('ルームコードを確保できませんでした。もう一度お試しください');
  await db.ref(`${ROOT}/${code}/seats/0`).set({ uid:user.uid, name, lastSeen: nowMs(), isNpc:false });
  if (mode === 'npc2'){
    await db.ref(`${ROOT}/${code}/seats/2`).set({ uid:'NPC', name:'NPC観測員', lastSeen: nowMs(), isNpc:true });
    await db.ref(`${ROOT}/${code}/seats/3`).set({ uid:'NPC', name:'NPC潜水士', lastSeen: nowMs(), isNpc:true });
  }
  ST.room = code; ST.seat = 0; saveSession(); attach();
}

// 空席選択（純関数）：サーバー同期済みスナップショットから、未試行かつ空いている
// 最初の候補席を返す。候補を尽くしても空席がなければnull（＝満席）を返す。
// 4p-v0.2.2：ローカル未同期キャッシュ（＝空）を根拠に選ぶことが事故の原因だったため、
// 呼び出し側は必ずサーバー読み取り直後のsnapshotだけをここへ渡す。
function pickNextOpenSeat(seatsSnapshot, candidates, tried){
  const snap = seatsSnapshot || {};
  for (const i of candidates){
    if (TEAM_OF_SEAT[i] === undefined) continue;
    if (tried && tried.has(i)) continue;
    if (!snap[i]) return i;
  }
  return null;
}

function isRecoverableSeatClaimError(e){
  // 未同期ローカルキャッシュを根拠にした書き込みが、実際には占有済みの席へ
  // 衝突してpermission_deniedになるケース（4p-v0.2.2で特定）。次候補への
  // 再試行で回復可能なため、エラーバナーへは昇格させない。
  return !!(e && (e.code === 'PERMISSION_DENIED' || /permission_denied/i.test((e && e.message) || '')));
}

async function joinRoom(codeInput, seatChoice, name){
  const code = normalizeCode(codeInput);
  if (code.length !== 6) throw new Error('部屋コードは6文字です');
  const r = db.ref(`${ROOT}/${code}`);
  const meta = (await r.child('meta').get()).val();
  if (!meta) throw new Error('その部屋は見つかりません');
  const candidates = seatChoice!=null ? [seatChoice] : [0,1,2,3];
  const tried = new Set();
  let seatNo = null;
  let hadRecoverableError = false; // 4p-v0.3.0 §5-1: 「本当に満席」と区別するため
  for (let attempt=0; attempt<candidates.length; attempt++){
    // サーバーの最新値を都度読み直してから選ぶ（.get()はローカルキャッシュではなくサーバーへ問い合わせる）
    const seatsSnapshot = (await r.child('seats').get()).val();
    const candidate = pickNextOpenSeat(seatsSnapshot, candidates, tried);
    if (candidate === null) break;
    tried.add(candidate);
    try{
      const result = await r.child(`seats/${candidate}`).transaction(cur => cur || { uid:user.uid, name, lastSeen: nowMs(), isNpc:false }, undefined, false);
      if (result.committed && result.snapshot.val() && result.snapshot.val().uid === user.uid){ seatNo = candidate; break; }
      hadRecoverableError = true; // committed===falseは他クライアントとの競合で先に占有された、という回復可能なケース。次候補へ。
    } catch(e){
      if (!isRecoverableSeatClaimError(e)) throw e;
      hadRecoverableError = true; // 回復可能な競合。エラーバナーを出さず、次の候補席で再試行する。
    }
  }
  if (seatNo===null){
    // 4p-v0.3.0 §5-1: 最新スナップショット上で純粋に全席埋まっていた（衝突なし）場合だけ「満席」と表示する。
    // 途中で回復可能な衝突/permission_deniedを経験していた場合は、通信または設定の問題の可能性があるため文言を分ける。
    if (hadRecoverableError) throw new Error('部屋に参加できませんでした（通信または設定の問題の可能性があります。もう一度お試しください）');
    throw new Error('その部屋には空席がありません（満席です）');
  }
  ST.room = code; ST.seat = seatNo; saveSession(); attach();
}

// Firebase RTDBは空配列/空オブジェクトを書き込むと消滅させる（既知の仕様）。
// 読み込み側で必ずデフォルト値へフォールバックし、undefined参照を防ぐ。
function normalizeGame(g){
  if (!g) return g;
  g.usedAnimals = g.usedAnimals || {};
  g.usedAnimals.A = g.usedAnimals.A || [];
  g.usedAnimals.B = g.usedAnimals.B || [];
  g.hand = g.hand || {};
  g.hand.A = g.hand.A || ANIMALS.slice();
  g.hand.B = g.hand.B || ANIMALS.slice();
  g.publicHints = g.publicHints || [];
  g.publicConstraints = g.publicConstraints || [];
  g.roundHistory = g.roundHistory || [];
  g.log = g.log || [];
  g.chips = g.chips || { A: INITIAL_LIFE, B: INITIAL_LIFE };
  g.score = g.score || { A: 0, B: 0 };
  // cardsRevealedはA/Bどちらかがnullのままだと、そのキー単独がRTDBで刈り取られ得る
  // （片方が確定した後も、もう片方はundefinedとして返る）。=== null 判定を正しく保つため、
  // undefinedを明示的にnullへ補完する（配列/オブジェクト全体が空になる場合の刈り取りとは別枠）。
  g.cardsRevealed = g.cardsRevealed || {};
  if (g.cardsRevealed.A === undefined) g.cardsRevealed.A = null;
  if (g.cardsRevealed.B === undefined) g.cardsRevealed.B = null;
  if (g.betting){
    g.betting.history = g.betting.history || [];
    g.betting.contributions = g.betting.contributions || { A:0, B:0 };
  }
  if (g.hint){
    g.hint.lockedA = !!g.hint.lockedA;
    g.hint.lockedB = !!g.hint.lockedB;
  }
  g.drain = g.drain || { phaseEnteredAt: nowMs(), ticksApplied: 0 };
  return g;
}

function detach(){
  listeners.forEach(off=>{ try{ off(); } catch(_){} });
  listeners = [];
  if (heartbeatTimer){ clearInterval(heartbeatTimer); heartbeatTimer=null; }
  if (drainTickTimer){ clearInterval(drainTickTimer); drainTickTimer=null; }
  if (hostRelayUnsub){ hostRelayUnsub(); hostRelayUnsub=null; }
  resetUiTrackers();
}

function attach(){
  detach();
  GEN++;
  const gen = GEN;
  const metaRef = roomRef('meta');
  const onMeta = snap => { if (gen!==GEN) return; ST.meta = snap.val(); if (!ST.meta){ handleRoomGone(); return; } afterSync(); };
  metaRef.on('value', onMeta); listeners.push(()=>metaRef.off('value', onMeta));

  const seatsRef = roomRef('seats');
  const onSeats = snap => { if (gen!==GEN) return; ST.seats = snap.val() || {}; afterSync(); };
  seatsRef.on('value', onSeats); listeners.push(()=>seatsRef.off('value', onSeats));

  const gameRef = roomRef('game');
  const onGame = snap => { if (gen!==GEN) return; ST.game = normalizeGame(snap.val()); afterSync(); };
  gameRef.on('value', onGame); listeners.push(()=>gameRef.off('value', onGame));

  const myPrivRef = roomRef(`private/${user.uid}`);
  const onMyPriv = snap => { if (gen!==GEN) return; ST.myPrivate = snap.val(); afterSync(); };
  myPrivRef.on('value', onMyPriv); listeners.push(()=>myPrivRef.off('value', onMyPriv));

  const beat = ()=> roomRef(`seats/${ST.seat}`).update({lastSeen: nowMs()}).catch(()=>{});
  beat(); heartbeatTimer = setInterval(beat, 15000);

  // 酸素ドレインのティック音（演出のみ。実際の消費量計算とは独立。4p-v0.3.0 §3）
  drainTickTimer = setInterval(()=>{
    if (!ST.game || !ST.meta) return;
    const phase = ST.game.phase;
    if (phase === 'hint'){ if (ST.meta.hintDrainToggle !== 'off') playDrainTick(); }
    else if (phase === 'select_cards' || phase === 'betting'){ if (ST.meta.drainSpeed !== 'off') playDrainTick(); }
  }, 4000);

  startHostRelayIfHost();
}

function handleRoomGone(){
  clearSession();
  ST = { room:null, seat:null, meta:null, seats:{}, game:null, myPrivate:null, oppNames:{} };
  detach();
  render();
}

function afterSync(){
  render();
  if (isHost()){
    startHostRelayIfHost(); // ST.metaの初回到達がattach()より後になるため、同期の都度リトライする（冪等）
    hostRelayTick();
  }
}

function leaveRoom(){
  clearSession();
  detach();
  ST = { room:null, seat:null, meta:null, seats:{}, game:null, myPrivate:null, oppNames:{} };
  render();
}

/* ---------------- ホスト中継ロジック（秘匿真軸を必要とする処理は全てホストが担う） ---------------- */
function startHostRelayIfHost(){
  // 個々のprivateノードは自分のuidしか購読しないため、ホストは全体private/を購読して中継する
  if (!isHost()) return;
  if (hostRelayUnsub) return; // 二重登録防止
  const allPrivRef = roomRef('private');
  const cb = snap => { ST.allPrivate = snap.val() || {}; hostRelayTick(); };
  allPrivRef.on('value', cb);
  hostRelayUnsub = ()=> allPrivRef.off('value', cb);
}

let relayBusy = false;
let relayPending = false;
// hostRelayTick は各購読（meta/seats/game/private）のvalueイベントごとに再入されうる。
// 実行中に届いた再入は取りこぼさず「pending」として記録し、実行完了後に必ずもう一度回す
// （さもないと配布直後など、次のイベントが来ない限り進行が永遠に止まる競合が生じる）。
async function hostRelayTick(){
  if (!isHost()) return;
  if (relayBusy){ relayPending = true; return; }
  relayBusy = true;
  try{
    if (!ST.meta) return;
    if (ST.meta.phase === 'setup') { await hostPerformInitialDeal(); }
    else if (ST.meta.phase === 'playing' && ST.game) {
      await hostSettleDrain();
      await hostRelayInputs();
      await hostMaybeAdvancePhase();
      await hostDriveNpcIfNeeded();
    }
  } catch(e){ showError('内部処理エラー: '+(e && e.message?e.message:e)); }
  finally {
    relayBusy = false;
    if (relayPending){ relayPending = false; hostRelayTick(); }
  }
}

function allSeatsFilled(){
  for (let i=0;i<4;i++){ if (!ST.seats || !ST.seats[i] || !ST.seats[i].uid) return false; }
  return true;
}

async function hostStartSetup(){
  if (!isHost()) return;
  await roomRef('meta').update({ phase:'setup' });
}

async function hostPerformInitialDeal(){
  const existing = (await roomRef('secrets').get()).val();
  if (existing) { await roomRef('meta').update({phase:'playing'}); return; }
  const axesShuffled = shuffleArr(AXES);
  const axisA = axesShuffled[0], axisB = axesShuffled[1];
  const remaining6 = axesShuffled.slice(2);
  const anchorsDiverA = shuffleArr(remaining6).slice(0, ANCHOR_K);
  const rest = remaining6.filter(a=>!anchorsDiverA.includes(a));
  const anchorsDiverB = shuffleArr(rest).slice(0, ANCHOR_K);

  await roomRef('secrets').set({ axisA, axisB, createdAt: nowMs() });
  const seats = ST.seats;
  await roomRef(`private/${seats[0].uid}`).set({ axis: axisA });
  await roomRef(`private/${seats[1].uid}`).set({ anchors: anchorsDiverA });
  await roomRef(`private/${seats[2].uid}`).set({ axis: axisB });
  await roomRef(`private/${seats[3].uid}`).set({ anchors: anchorsDiverB });

  const gameInit = {
    roundNum: 0,
    phase: 'resolved', // hostMaybeAdvancePhase が最初のラウンドを開始する
    hint: { active:false, tier:null, deadlineAt:0, lockedA:false, lockedB:false },
    publicHints: [], publicConstraints: [], roundHistory: [],
    chips: { A: INITIAL_LIFE, B: INITIAL_LIFE }, score: { A:0, B:0 }, pot: 0,
    usedAnimals: { A: [], B: [] }, hand: { A: ANIMALS.slice(), B: ANIMALS.slice() },
    cardsRevealed: { A:null, B:null },
    betting: null,
    drain: { phaseEnteredAt: nowMs(), ticksApplied: 0 },
    log: [],
  };
  await roomRef('game').set(gameInit);
  await roomRef('meta').update({ phase:'playing' });
}

function logLine(gameObj, text){ gameObj.log = gameObj.log || []; gameObj.log.push(text); }

async function hostMaybeAdvancePhase(){
  const g = ST.game;
  if (!g || g.phase !== 'resolved') return;
  if (g.roundNum >= ROUNDS_TOTAL || g.chips.A<=0 || g.chips.B<=0){
    await hostFinalizeMatch();
    return;
  }
  const next = JSON.parse(JSON.stringify(g));
  next.roundNum += 1;
  const tier = HINT_SCHEDULE[next.roundNum];
  if (tier){
    next.phase = 'hint';
    next.hint = { active:true, tier, deadlineAt: nowMs()+HINT_LOCK_TIMEOUT_MS, lockedA:false, lockedB:false };
    next.drain.phaseEnteredAt = nowMs(); next.drain.ticksApplied = 0;
    logLine(next, `[R${next.roundNum}] ヒントフェーズ開始（等級:${tier}、締切60秒）`);
  } else {
    startAnteAndCards(next);
  }
  await roomRef('game').set(next);
}

function startAnteAndCards(g){
  g.chips.A -= ANTE_PER_TEAM; g.chips.B -= ANTE_PER_TEAM; g.pot += ANTE_PER_TEAM*2;
  logLine(g, `[R${g.roundNum}] アンティ 各${ANTE_PER_TEAM}（燃焼・ポット${g.pot}）`);
  g.phase = 'select_cards';
  g.cardsRevealed = { A:null, B:null };
  g.drain.phaseEnteredAt = nowMs(); g.drain.ticksApplied = 0;
  if (g.chips.A<=0 || g.chips.B<=0){ g.phase='resolved'; g.matchOverPending=true; }
}

async function hostRelayInputs(){
  const g = JSON.parse(JSON.stringify(ST.game));
  const priv = ST.allPrivate || {};
  let changed = false;

  if (g.phase === 'hint'){
    const seatA = ST.seats[0], seatB = ST.seats[2];
    const pA = priv[seatA && seatA.uid] || {};
    const pB = priv[seatB && seatB.uid] || {};
    if (pA.hintLocked && !g.hint.lockedA){ g.hint.lockedA = true; changed = true; }
    if (pB.hintLocked && !g.hint.lockedB){ g.hint.lockedB = true; changed = true; }
    const bothLocked = g.hint.lockedA && g.hint.lockedB;
    const timedOut = nowMs() >= g.hint.deadlineAt;
    if ((bothLocked || timedOut) && g.hint.active){
      const textA = (pA.hintText || '(無線沈黙)').slice(0, HINT_TEXT_MAX_LEN);
      const textB = (pB.hintText || '(無線沈黙)').slice(0, HINT_TEXT_MAX_LEN);
      g.publicHints.push({ round:g.roundNum, side:'A', text: pA.hintLocked ? textA : '(無線沈黙)' });
      g.publicHints.push({ round:g.roundNum, side:'B', text: pB.hintLocked ? textB : '(無線沈黙)' });
      logLine(g, `[R${g.roundNum}] ヒント公開：味方=${pA.hintLocked?textA:'(無線沈黙)'} ／ 敵=${pB.hintLocked?textB:'(無線沈黙)'}`);
      g.hint.active = false;
      startAnteAndCards(g);
      changed = true;
      await roomRef(`private/${seatA.uid}`).update({ hintLocked:null, hintText:null });
      await roomRef(`private/${seatB.uid}`).update({ hintLocked:null, hintText:null });
    }
  } else if (g.phase === 'select_cards'){
    const diverA = ST.seats[1], diverB = ST.seats[3];
    const pA = priv[diverA && diverA.uid] || {};
    const pB = priv[diverB && diverB.uid] || {};
    if (pA.pendingCard && g.cardsRevealed.A===null){ g.cardsRevealed.A = pA.pendingCard; changed = true; }
    if (pB.pendingCard && g.cardsRevealed.B===null){ g.cardsRevealed.B = pB.pendingCard; changed = true; }
    if (g.cardsRevealed.A!==null && g.cardsRevealed.B!==null && g.phase==='select_cards'){
      g.phase = 'betting';
      g.betting = { toActTeam: (g.roundNum % 2 === 1) ? 'A' : 'B', currentBet:0, contributions:{A:0,B:0}, raiseCount:0, history:[] };
      logLine(g, `[R${g.roundNum}] 両者提示完了。ベット開始（先手=${g.betting.toActTeam==='A'?'味方':'敵'}）`);
      changed = true;
      await roomRef(`private/${diverA.uid}`).update({ pendingCard:null });
      await roomRef(`private/${diverB.uid}`).update({ pendingCard:null });
    }
  } else if (g.phase === 'betting'){
    const team = g.betting.toActTeam;
    const diverSeat = ST.seats[diverSeatOf(team)];
    const p = priv[diverSeat && diverSeat.uid] || {};
    if (p.pendingBet && p.pendingBet.round === g.roundNum && p.pendingBet.betSeq === g.betting.history.length){
      try{
        const applied = applyBetAction({betting:g.betting, chips:g.chips, pot:g.pot}, p.pendingBet.action, p.pendingBet.amount);
        g.betting = applied.betting; g.chips = applied.chips; g.pot = applied.pot;
        logLine(g, `[R${g.roundNum}] ${team==='A'?'味方':'敵'}: ${describeBetAction(p.pendingBet)}`);
        changed = true;
        await roomRef(`private/${diverSeat.uid}`).update({ pendingBet:null });
        if (applied.resolved) await finishRoundInGame(g, applied.resolved);
      } catch(e){
        await roomRef(`private/${diverSeat.uid}`).update({ pendingBet:null });
      }
    }
  }
  if (changed) await roomRef('game').set(g);
}

function describeBetAction(pb){
  if (pb.action==='check') return 'チェック';
  if (pb.action==='bet') return 'ベット '+pb.amount;
  if (pb.action==='call') return 'コール';
  if (pb.action==='raise') return 'レイズ +'+pb.amount;
  if (pb.action==='fold') return 'フォールド';
  return JSON.stringify(pb);
}

async function finishRoundInGame(g, resolved){
  const secrets = (await roomRef('secrets').get()).val();
  const animalA = g.cardsRevealed.A, animalB = g.cardsRevealed.B;
  g.usedAnimals.A.push(animalA); g.usedAnimals.B.push(animalB);
  let tie=false, winnerTeam=null;
  if (resolved.method==='fold'){
    winnerTeam = resolved.winnerTeam;
  } else {
    const r = resolveShowdown(animalA, animalB, secrets.axisA, secrets.axisB);
    tie = r.tie; winnerTeam = r.winnerTeam;
  }
  if (tie){
    logLine(g, `[R${g.roundNum}] 決着(ショーダウン・引き分け)：味方=${animalA} ／ 敵=${animalB} → 同一動物。ポット${g.pot}は持ち越し`);
    g.roundHistory.push({round:g.roundNum, animalA, animalB, method:'showdown', tie:true, winnerTeam:null});
  } else {
    if (resolved.method!=='fold'){
      const winnerAnimal = winnerTeam==='A' ? animalA : animalB;
      const loserAnimal = winnerTeam==='A' ? animalB : animalA;
      g.publicConstraints.push({round:g.roundNum, winner:winnerAnimal, loser:loserAnimal});
    }
    g.score[winnerTeam] += g.pot;
    logLine(g, `[R${g.roundNum}] 決着(${resolved.method==='fold'?'フォールド':'ショーダウン'})：味方=${animalA} ／ 敵=${animalB} → ${winnerTeam==='A'?'味方':'敵'}の勝ち（ポット${g.pot}を得点化）`);
    g.roundHistory.push({round:g.roundNum, animalA, animalB, method:resolved.method, tie:false, winnerTeam});
    g.pot = 0;
  }
  g.phase = 'resolved';
  g.betting = null;
}

async function hostFinalizeMatch(){
  const g = JSON.parse(JSON.stringify(ST.game));
  let result;
  const humanOut = g.chips.A<=0, npcOut = g.chips.B<=0;
  if (humanOut || npcOut){
    if (humanOut && npcOut) result = g.score.A===g.score.B ? 'draw' : (g.score.A>g.score.B?'A':'B');
    else result = humanOut ? 'B' : 'A';
    logLine(g, `命の枯渇により終了。判定：${result==='draw'?'引き分け':(result==='A'?'味方の勝ち':'敵の勝ち')}`);
  } else {
    result = g.score.A===g.score.B ? 'draw' : (g.score.A>g.score.B?'A':'B');
    logLine(g, `8ラウンド終了。最終得点 味方=${g.score.A} 敵=${g.score.B} → ${result==='draw'?'引き分け':(result==='A'?'味方の勝ち':'敵の勝ち')}`);
  }
  g.matchResult = result;
  await roomRef('game').set(g);
  const secrets = (await roomRef('secrets').get()).val();
  await roomRef('reveal').set({ axisA: secrets.axisA, axisB: secrets.axisB, hints: g.publicHints, createdAt: nowMs() });
  await roomRef('meta').update({ phase:'ended' });
}

async function hostSettleDrain(){
  const g = JSON.parse(JSON.stringify(ST.game));
  if (!g || !g.drain) return;
  let rateMs = null, teamsAffected = [];
  if (g.phase === 'hint'){
    if (ST.meta.hintDrainToggle === 'equal'){ rateMs = HINT_AMBIENT_REFERENCE_MS * 4; teamsAffected = ['A','B']; }
  } else if (g.phase === 'select_cards' || g.phase === 'betting'){
    const speed = DRAIN_INTERVALS[ST.meta.drainSpeed];
    if (speed){
      rateMs = speed;
      const actingTeam = g.phase==='betting' ? g.betting.toActTeam : null;
      teamsAffected = actingTeam ? [actingTeam] : ['A','B']; // select_cards: 両ダイバーとも入力待ちなので両チーム
    }
  }
  if (!rateMs || !teamsAffected.length) return;
  const elapsed = nowMs() - g.drain.phaseEnteredAt;
  const ticksElapsed = Math.floor(elapsed / rateMs);
  if (ticksElapsed <= g.drain.ticksApplied) return;
  const delta = ticksElapsed - g.drain.ticksApplied;
  g.drain.ticksApplied = ticksElapsed;
  teamsAffected.forEach(team=>{
    g.chips[team] = Math.max(0, g.chips[team] - delta);
    g.vanished = (g.vanished||0) + Math.min(delta, INITIAL_LIFE);
  });
  logLine(g, `(ドレイン) ${teamsAffected.map(t=>t==='A'?'味方':'敵').join('・')}の命が${delta}減少`);
  if (g.chips.A<=0 || g.chips.B<=0){
    g.phase = 'resolved';
    g.betting = null;
  }
  await roomRef('game').set(g);
}

/* ---------------- NPC駆動（npc2モード。ホストのブラウザが代行） ---------------- */
async function hostDriveNpcIfNeeded(){
  if (ST.meta.mode !== 'npc2') return;
  const g = ST.game;
  if (!g) return;
  const secrets = (await roomRef('secrets').get()).val();
  if (!secrets) return;
  const npcObsSeat = ST.seats[2], npcDivSeat = ST.seats[3];

  if (g.phase === 'hint' && g.hint.active && !g.hint.lockedB){
    const usedTexts = new Set(g.publicHints.map(h=>h.text));
    const text = npcPickHint(secrets.axisB, g.hint.tier, usedTexts);
    await roomRef(`private/${npcObsSeat.uid}`).update({ hintText:text, hintLocked:true });
  } else if (g.phase === 'select_cards' && g.cardsRevealed.B===null){
    const remaining = g.hand.B.filter(a=>!g.usedAnimals.B.includes(a));
    const oppRemaining = g.hand.A.filter(a=>!g.usedAnimals.A.includes(a));
    const animal = npcChooseAnimal(remaining, oppRemaining, secrets.axisB);
    await roomRef(`private/${npcDivSeat.uid}`).update({ pendingCard: animal });
  } else if (g.phase === 'betting' && g.betting && g.betting.toActTeam === 'B'){
    const opts = computeBetOptions(g.betting, g.chips);
    const animal = g.cardsRevealed.B;
    const oppRemaining = g.hand.A.filter(a=>!g.usedAnimals.A.includes(a));
    const conf = npcConfidence(animal, oppRemaining, secrets.axisB);
    const decision = npcDecideAction(conf, opts);
    const applied = applyBetAction({betting:g.betting, chips:g.chips, pot:g.pot}, decision.action, decision.amount);
    const g2 = JSON.parse(JSON.stringify(g));
    g2.betting = applied.betting; g2.chips = applied.chips; g2.pot = applied.pot;
    logLine(g2, `[R${g2.roundNum}] 敵: ${describeBetAction(decision)}`);
    if (applied.resolved) await finishRoundInGame(g2, applied.resolved);
    await roomRef('game').set(g2);
  }
}

function el(tag, attrs, children){
  const e = document.createElement(tag);
  if (attrs) Object.keys(attrs).forEach(k=>{
    if (k==='class') e.className = attrs[k];
    else if (k==='value' && tag==='textarea') e.value = attrs[k];
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else if (attrs[k] === false || attrs[k] === undefined || attrs[k] === null) { /* 真偽値属性（disabled等）はfalsy値なら付与しない */ }
    else e.setAttribute(k, attrs[k]);
  });
  (children||[]).forEach(c=>{ if (c!=null) e.appendChild(typeof c==='string' ? document.createTextNode(c) : c); });
  return e;
}

let audioCtx = null;
let muted = (function(){ try{ return localStorage.getItem('transmit4p_mute') === '1'; } catch(_){ return false; } })();
function ensureAudioCtx(){
  if (audioCtx) return audioCtx;
  try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
  return audioCtx;
}
function updateMuteBtn(){
  const b = document.getElementById('muteBtn');
  if (b) b.textContent = muted ? '🔇 音声オフ' : '🔊 音声オン';

  muted = v;
  try{ localStorage.setItem('transmit4p_mute', v ? '1' : '0'); } catch(_){}
  updateMuteBtn();

function tone(freq, startOffset, duration, type, peak){
  if (muted) return;
  const ctx = ensureAudioCtx();
  if (!ctx) return;
  const t0 = ctx.currentTime + (startOffset || 0);
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.setValueAtTime(freq, t0);
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(peak != null ? peak : 0.12, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, t0 + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t0); osc.stop(t0 + duration + 0.02);
}

/* ==================== 4p-v0.3.0 §2/§3: 状態バー・手番検出・音とアニメーションのトリガー ====================
   render()はゲーム中は毎回DOMを作り直すため、これらのトラッカーは「前回描画からの変化」を
   モジュール変数で追跡し、変化があった回だけ音とアニメーションクラスを発火させる
   （自分の入力や無関係な再描画のたびに毎回鳴る／光る、という事故を防ぐため）。 */
let _lastIsMyTurn = false;
let _lastHintCount = 0;
let _lastRoundHistoryLen = 0;
let _lastRoundNumForPreview = null;
// 確定前プレビュー（4p-v0.3.0 §4）の一時状態。ロック／確定操作の直後、またはラウンドが
// 変わったタイミングでfalseへ戻す（次ラウンドに古いプレビュー状態を持ち越さないため）。
let hintLockPreviewArmed = false;
let betPreview = null; // {action, amount} | null
function resetUiTrackers(){
  _lastIsMyTurn = false; _lastHintCount = 0; _lastRoundHistoryLen = 0; _lastRoundNumForPreview = null;
  hintLockPreviewArmed = false; betPreview = null;
}
function computeIsMyTurn(g, team, role){
  if (!g) return false;
  if (g.phase === 'hint' && role === 'observer'){
    const locked = team==='A' ? g.hint.lockedA : g.hint.lockedB;
    return !!(g.hint.active && !locked);
  }
  if (g.phase === 'select_cards' && role === 'diver'){
    const mine = team==='A' ? g.cardsRevealed.A : g.cardsRevealed.B;
    return mine === null;
  }
  if (g.phase === 'betting' && role === 'diver'){
    return g.betting.toActTeam === team;
  }
  return false;
}
function updateReactiveTrackers(g, team, role){
  const isMyTurn = computeIsMyTurn(g, team, role);
  const justBecameMyTurn = isMyTurn && !_lastIsMyTurn;
  _lastIsMyTurn = isMyTurn;

  const hintCount = g.publicHints.length;
  const justRevealedHint = hintCount > _lastHintCount;
  _lastHintCount = hintCount;

  const rhLen = g.roundHistory.length;
  const justResolved = rhLen > _lastRoundHistoryLen;
  let justWonState = null;
  if (justResolved){
    const last = g.roundHistory[rhLen-1];
    justWonState = last.tie ? 'tie' : (last.winnerTeam===team ? 'win' : 'lose');
  }
  _lastRoundHistoryLen = rhLen;

  if (_lastRoundNumForPreview !== g.roundNum){
    _lastRoundNumForPreview = g.roundNum;
    hintLockPreviewArmed = false;
    betPreview = null;
  }

  if (justBecameMyTurn) playTurnNotify();
  if (justRevealedHint) playHintReveal();
  if (justResolved) playShowdownResult(justWonState === 'win');

  return { isMyTurn, justBecameMyTurn, justRevealedHint, justResolved, justWonState };
}
function statusLine(g, team, role, isMyTurn){
  if (g.phase === 'hint'){
    if (role === 'observer'){
      const locked = team==='A' ? g.hint.lockedA : g.hint.lockedB;
      return locked ? '相手観測員のロック待ち、または60秒経過待ち' : 'あなたの入力待ち（ヒントを書いてロックしてください）';
    }
    return '味方観測員の送信をお待ちください';
  }
  if (g.phase === 'select_cards'){
    if (role === 'diver'){
      const mine = team==='A' ? g.cardsRevealed.A : g.cardsRevealed.B;
      return mine === null ? 'あなたの入力待ち（動物を1体選んでください）' : '相手潜水士の提出待ち';
    }
    return '味方潜水士の選択をお待ちください';
  }
  if (g.phase === 'betting'){
    if (role === 'diver') return g.betting.toActTeam===team ? 'あなたの入力待ち（ベット応酬）' : '敵の手番をお待ちください';
    return g.betting.toActTeam===team ? '味方潜水士の手番です' : '敵の手番をお待ちください';
  }
  if (g.phase === 'resolved') return '決着。まもなく次のラウンドへ自動進行します';
  return '';
}
function renderStatusBar(g, team, role, isMyTurn){
  const phaseNames = { hint:'ヒント', select_cards:'カード選択', betting:'ベット応酬', resolved:'決着' };
  const bar = el('div', {class:'statusbar' + (isMyTurn ? ' my-turn' : '')});
  bar.appendChild(el('div', {}, [`フェーズ: ${phaseNames[g.phase] || g.phase}`]));
  bar.appendChild(el('div', {class:'who'}, [statusLine(g, team, role, isMyTurn)]));
  bar.appendChild(el('div', {}, [`${role==='observer' ? '📡 観測員' : '🤿 潜水士'}（チーム${team==='A'?'A(味方)':'B(敵)'}）`]));
  return bar;
}

function renderGameScreen(){
  const wrap = el('div', {});
  const g = ST.game;
  const team = myTeam(), role = myRole();
  const opp = otherTeam(team);

  const reactive = updateReactiveTrackers(g, team, role);
  wrap.appendChild(renderStatusBar(g, team, role, reactive.isMyTurn));

  const stat = el('div', {class:'statbar'});
  stat.appendChild(el('div', {class:'stat'}, [`ラウンド ${g.roundNum}/${ROUNDS_TOTAL}`]));
  stat.appendChild(el('div', {class:'stat'}, ['ポット(燃焼中): ', el('b',{},[String(g.pot)])]));
  wrap.appendChild(stat);

  const lsPanel = el('div', {class:'panel'});
  lsPanel.appendChild(el('h2', {}, ['命／得点（別勘定）']));
  const lsRow = el('div', {class:'row'});
  const mineBox = el('div', {});
  mineBox.appendChild(el('div', {}, [`🫧 味方 命=${g.chips[team]} ／ 得点=${g.score[team]}`]));
  mineBox.appendChild(gaugeEl(g.chips[team], INITIAL_LIFE));
  const oppBox = el('div', {});
  oppBox.appendChild(el('div', {}, [`🫧 敵 命=${g.chips[opp]} ／ 得点=${g.score[opp]}`]));
  oppBox.appendChild(gaugeEl(g.chips[opp], INITIAL_LIFE));
  lsRow.appendChild(mineBox); lsRow.appendChild(oppBox);
  lsPanel.appendChild(lsRow);
  wrap.appendChild(lsPanel);

  const infoPanel = el('div', {class:'panel'});
  if (role==='observer' && ST.myPrivate && ST.myPrivate.axis){
    infoPanel.appendChild(el('h2', {}, ['自陣営の軸（あなただけが知っている）']));
    infoPanel.appendChild(el('div', {class:'animalrow'}, [el('div', {class:'animal static'}, [ST.myPrivate.axis])]));
  }
  if (role==='diver' && ST.myPrivate && ST.myPrivate.anchors){
    infoPanel.appendChild(el('h2', {}, ['消去情報（この軸ではない、と分かっている軸）']));
    const row = el('div', {class:'animalrow'});
    ST.myPrivate.anchors.forEach(a=> row.appendChild(el('div', {class:'animal static'}, [a])));
    infoPanel.appendChild(row);
  }
  const oppRemainingRow = el('div', {class:'animalrow'});
  const oppRemaining = ANIMALS.filter(a=>!g.usedAnimals[opp].includes(a));
  oppRemaining.forEach(a=> oppRemainingRow.appendChild(el('div', {class:'animal mini static'}, [a])));
  infoPanel.appendChild(el('h2', {}, ['敵の残動物（公開情報）']));
  infoPanel.appendChild(oppRemainingRow);
  wrap.appendChild(infoPanel);

  const refPanel = el('div', {class:'panel'});
  refPanel.appendChild(el('h2', {}, ['全8軸 順位表（公開リファレンス）']));
  const refWrap = el('div', {class:'tablewrap'}, [renderAxisReferenceTable()]);
  refPanel.appendChild(refWrap);
  wrap.appendChild(refPanel);

  const hintPanel = el('div', {class:'panel'});
  hintPanel.appendChild(el('h2', {}, ['ヒントログ（R1〜R4のみ）']));
  if (!g.publicHints.length) hintPanel.appendChild(el('p', {class:'sub'}, ['まだヒントはありません。']));
  g.publicHints.forEach((ph, idx)=>{
    // 意味のある2アニメーションの1つ目：直前の描画で新規公開された分だけ出現アニメーションを付ける
    const isFresh = reactive.justRevealedHint && idx >= g.publicHints.length - 2;
    const line = el('div', {class:'hintline'+(isFresh?' hint-reveal-in':'')});
    const mine = ph.side === team;
    line.appendChild(el('span', {class:'tag '+(mine?'mine':'theirs')}, [mine?'味方':'敵']));
    line.appendChild(document.createTextNode(`R${ph.round}: ${ph.text}`));
    hintPanel.appendChild(line);
  });
  wrap.appendChild(hintPanel);

  // 公開制約ログUIは削除済み（v0.1差分指示書§3）。derived不等式（勝者動物>敗者動物）を
  // UI上に文章表示すると推理の肩代わりになるため。DBへの記録（g.publicConstraints）自体は継続。

  const histPanel = el('div', {class:'panel'});
  histPanel.appendChild(el('h2', {}, ['ラウンド履歴']));
  if (g.roundHistory.length){
    const tbl = el('table');
    tbl.appendChild(el('tr', {}, [el('th',{},['R']), el('th',{},['味方']), el('th',{},['敵']), el('th',{},['決着']), el('th',{},['結果'])]));
    g.roundHistory.forEach(h=>{
      const resultText = h.tie ? '引き分け（持ち越し）' : `${h.winnerTeam===team?'味方':'敵'}の勝ち`;
      tbl.appendChild(el('tr', {}, [el('td',{},[String(h.round)]), el('td',{},[h.animalA===undefined?'?':(team==='A'?h.animalA:h.animalB)]), el('td',{},[team==='A'?h.animalB:h.animalA]), el('td',{},[h.method==='fold'?'フォールド':'ショーダウン']), el('td',{},[resultText])]));
    });
    histPanel.appendChild(el('div', {class:'tablewrap'}, [tbl]));
  } else histPanel.appendChild(el('p', {class:'sub'}, ['まだ決着したラウンドはありません。']));
  wrap.appendChild(histPanel);

  const roundPanel = el('div', {class:'panel'});
  if (g.phase === 'hint'){
    roundPanel.appendChild(el('h2', {}, [`ヒントフェーズ（推奨等級：${g.hint.tier}）`]));
    if (role==='observer'){
      const already = ST.myPrivate && ST.myPrivate.hintLocked;
      const draft = (ST.myPrivate && ST.myPrivate.hintText) || '';
      const violation = hintFilterViolation(draft);
      if (!already && hintLockPreviewArmed){
        // 確定前プレビュー（4p-v0.3.0 §4）：ロック直前に内容を確認する一段クッション。判断は奪わない。
        const box = el('div', {class:'preview-box'});
        box.appendChild(el('div', {}, ['この内容でロックします：']));
        box.appendChild(el('div', {style:'font-weight:bold; margin:6px 0;'}, [draft]));
        const row = el('div', {class:'row'});
        row.appendChild(el('button', {class:'btn primary', onclick:safe(async ()=>{ hintLockPreviewArmed=false; await lockHint(); })}, ['ロックする']));
        row.appendChild(el('button', {class:'btn', onclick:safe(()=>{ hintLockPreviewArmed=false; render(); })}, ['編集に戻る']));
        box.appendChild(row);
        roundPanel.appendChild(box);
      } else {
        const ta = el('textarea', {rows:'2', value:draft, disabled: !!already, oninput:safe(e=>{ submitHintDraft(e.target.value); render(); })});
        roundPanel.appendChild(ta);
        roundPanel.appendChild(el('div', {class:'charcount'+(violation?' over':'')}, [`${ta.value.length}/${HINT_TEXT_MAX_LEN}文字${violation?' ― '+violation:''}`]));
        roundPanel.appendChild(el('button', {class:'btn primary', disabled: !!(already || violation), onclick:safe(()=>{ hintLockPreviewArmed=true; render(); })}, [already?'送信ロック済み':'送信ロック']));
      }
      if (already) roundPanel.appendChild(el('p', {class:'sub'}, ['相手チームの送信、または60秒経過をお待ちください。']));
    } else {
      roundPanel.appendChild(el('p', {class:'sub'}, ['潜水士は入力できません。観測員の送信をお待ちください。']));
    }
  } else if (g.phase === 'select_cards'){
    roundPanel.appendChild(el('h2', {}, ['動物を1体選んで伏せて出してください']));
    if (role==='diver'){
      const already = ST.myPrivate && ST.myPrivate.pendingCard;
      const remaining = ANIMALS.filter(a=>!g.usedAnimals[team].includes(a));
      const row = el('div', {class:'animalrow'});
      remaining.forEach(a=> row.appendChild(el('div', {class:'animal'+(already?' disabled':''), onclick: already?null:safe(async ()=>{ await submitCard(a); })}, [a])));
      roundPanel.appendChild(row);
      if (already) roundPanel.appendChild(el('p', {class:'sub'}, ['提出済み。相手の提出をお待ちください。']));
    } else {
      roundPanel.appendChild(el('p', {class:'sub'}, ['潜水士がカードを選んでいます…']));
    }
  } else if (g.phase === 'betting'){
    roundPanel.appendChild(el('h2', {}, ['ベット応酬']));
    roundPanel.appendChild(el('p', {class:'sub'}, [`手番: ${g.betting.toActTeam===team?'味方（あなたのチーム）':'敵'}`]));
    roundPanel.appendChild(renderBetLog(g.betting, team));
    if (role==='diver' && g.betting.toActTeam===team) roundPanel.appendChild(renderActionButtons(g));
  } else if (g.phase === 'resolved'){
    const last = g.roundHistory[g.roundHistory.length-1];
    if (last){
      const resultText = last.tie ? '同一動物・引き分け（ポット持ち越し）' : `${last.winnerTeam===team?'味方':'敵'}の勝ち（${last.method==='fold'?'フォールド':'ショーダウン'}）`;
      roundPanel.appendChild(el('h2', {}, ['決着']));
      // 意味のある2アニメーションの2つ目：この決着が今回の描画で新規に出た時だけ出現アニメーションを付ける
      roundPanel.appendChild(el('div', {class:'result-big'+(reactive.justResolved?' showdown-reveal-in':'')}, [`あなた側=${team==='A'?last.animalA:last.animalB} ／ 相手側=${team==='A'?last.animalB:last.animalA}　→　${resultText}`]));
    }
    roundPanel.appendChild(el('p', {class:'sub'}, ['まもなく次のラウンドへ進みます…']));
  }
  wrap.appendChild(roundPanel);

  const toolsPanel = el('div', {class:'panel'});
  toolsPanel.appendChild(el('h2', {}, ['行動ログ']));
  toolsPanel.appendChild(el('div', {id:'log'}, [(g.log||[]).join('\n')]));
  toolsPanel.appendChild(el('button', {class:'btn', style:'margin-top:10px;', onclick:safe(()=>{ leaveRoom(); })}, ['退室']));
  wrap.appendChild(toolsPanel);

  return wrap;
}

function gaugeEl(current, max){
  const pct = Math.max(0, Math.min(100, (current/max)*100));
  const cls = pct<=20 ? 'bad' : (pct<=50 ? 'warn' : '');
  return el('div', {class:'gauge'}, [el('div', {class:'gauge-fill '+cls, style:`width:${pct}%;`})]);
}
function renderAxisReferenceTable(){
  const tbl = el('table');
  const head = el('tr', {}, [el('th',{},['軸'])]);
  for (let v=8; v>=1; v--) head.appendChild(el('th', {}, [String(v)]));
  tbl.appendChild(head);
  AXES.forEach(axis=>{
    const row = el('tr', {}, [el('th', {}, [axis])]);
    AXIS_ORDER[axis].forEach(animal=> row.appendChild(el('td', {}, [animal])));
    tbl.appendChild(row);
  });
  return tbl;
}
function renderBetLog(betting, myTeamKey){
  const box = el('div', {class:'panel', style:'background:#161c22;'});
  box.appendChild(el('h2', {}, ['このラウンドのベット経過']));
  if (!betting.history.length){ box.appendChild(el('p', {class:'sub'}, ['まだアクションはありません。'])); return box; }
  const lines = betting.history.map(h=>{
    const who = h.team===myTeamKey ? '味方' : '敵';
    if (h.action==='check') return `${who}: チェック`;
    if (h.action==='bet') return `${who}: ベット ${h.amount}`;
    if (h.action==='call') return `${who}: コール ${h.amount}${h.allIn?'（オールイン）':''}`;
    if (h.action==='raise') return `${who}: レイズ +${h.amount}（支払${h.totalPaid}）`;
    if (h.action==='fold') return `${who}: フォールド`;
    return JSON.stringify(h);
  });
  box.appendChild(el('div', {style:'font-size:0.85rem; line-height:1.6;'}, [lines.join(' → ')]));
  return box;
}
function betActionLabel(action, amount, opts, g){
  if (action==='check') return 'チェック';
  if (action==='fold') return 'フォールド';
  if (action==='call'){
    const myChips = g.chips[myTeam()];
    return opts.toCall > myChips ? `コール（オールイン ${myChips}）` : `コール ${opts.toCall}`;
  }
  if (action==='bet') return 'ベット '+amount;
  if (action==='raise') return 'レイズ +'+amount;
  return action;
}
function renderActionButtons(g){
  const opts = computeBetOptions(g.betting, g.chips);
  const box = el('div', {class:'row', style:'margin-top:10px;'});
  if (betPreview){
    // 確定前プレビュー（4p-v0.3.0 §4）：ベット確定の直前に内容を確認する一段クッション。
    const previewBox = el('div', {class:'preview-box'});
    previewBox.appendChild(el('div', {}, ['このアクションを確定しますか？']));
    previewBox.appendChild(el('div', {style:'font-weight:bold; margin:6px 0;'}, [betActionLabel(betPreview.action, betPreview.amount, opts, g)]));
    const row = el('div', {class:'row'});
    row.appendChild(el('button', {class:'btn primary', onclick:safe(async ()=>{ const p=betPreview; betPreview=null; await submitBettingAction(p.action, p.amount); })}, ['確定']));
    row.appendChild(el('button', {class:'btn', onclick:safe(()=>{ betPreview=null; render(); })}, ['取り消し']));
    previewBox.appendChild(row);
    box.appendChild(previewBox);
    return box;
  }
  if (opts.kind==='open'){
    box.appendChild(el('button', {class:'btn', onclick:safe(()=>{ betPreview={action:'check'}; render(); })}, ['チェック']));
    extractValues(opts.options,'bet').forEach(v=>{
      box.appendChild(el('button', {class:'btn primary', onclick:safe(()=>{ betPreview={action:'bet', amount:v}; render(); })}, ['ベット '+v]));
    });
  } else {
    box.appendChild(el('button', {class:'btn danger', onclick:safe(()=>{ betPreview={action:'fold'}; render(); })}, ['フォールド']));
    const myChips = g.chips[myTeam()];
    const callLabel = opts.toCall > myChips ? `コール（オールイン ${myChips}）` : `コール ${opts.toCall}`;
    box.appendChild(el('button', {class:'btn primary', onclick:safe(()=>{ betPreview={action:'call'}; render(); })}, [callLabel]));
    extractValues(opts.options,'raise').forEach(v=>{
      box.appendChild(el('button', {class:'btn', onclick:safe(()=>{ betPreview={action:'raise', amount:v}; render(); })}, ['レイズ +'+v]));
    });
  }
  return box;
}

function renderEndScreen(){
  const wrap = el('div', {});
  wrap.appendChild(el('h1', {}, ['マッチ終了']));
  const g = ST.game;
  const team = myTeam();
  const result = g.matchResult;
  const msg = result==='draw' ? '引き分け' : (result===team ? 'あなたのチームの勝ち！' : '相手チームの勝ち');
  const panel = el('div', {class:'panel'});
  panel.appendChild(el('div', {class:'result-big'}, [msg]));
  panel.appendChild(el('p', {}, [`最終得点：味方=${g.score[team]} ／ 敵=${g.score[otherTeam(team)]}`]));
  panel.appendChild(el('button', {class:'btn primary', onclick:safe(()=>{ leaveRoom(); })}, ['退室']));
  wrap.appendChild(panel);

  db.ref(`${ROOT}/${ST.room}/reveal`).get().then(snap=>{
    const rv = snap.val();
    if (!rv) return;
    const revealPanel = el('div', {class:'panel'});
    revealPanel.appendChild(el('h2', {}, ['真軸の公開']));
    revealPanel.appendChild(el('p', {}, [`チームA(味方視点で${team==='A'?'あなた':'相手'})の軸：${rv.axisA}／チームB(味方視点で${team==='B'?'あなた':'相手'})の軸：${rv.axisB}`]));
    revealPanel.appendChild(el('h2', {}, ['全ヒント再掲']));
    (rv.hints||[]).forEach(h=> revealPanel.appendChild(el('div', {class:'hintline'}, [`R${h.round} [${h.side}]: ${h.text}`])));
    document.getElementById('app').appendChild(revealPanel);
  }).catch(()=>{});

  return wrap;
}

    'フォールド：ベット応酬を降りること。相手チームがそのラウンドの勝ちになります。',
  ]));
  box.appendChild(el('h3', {}, ['数値の目安']));
  const tbl = el('table');
  tbl.appendChild(el('tr', {}, [el('th',{},['項目']), el('th',{},['値'])]));
  [
    ['初期酸素', String(INITIAL_LIFE)],
    ['アンティ(毎ラウンド自動徴収)', `各チーム${ANTE_PER_TEAM}`],
    ['ベット額', BET_OPTIONS.join('・')],
    ['レイズ上限', `${MAX_RAISES}回`],
    ['ヒント文字数上限', `${HINT_TEXT_MAX_LEN}字`],
    ['送信ロック締切', `${HINT_LOCK_TIMEOUT_MS/1000}秒（両者ロックで早まる）`],
  ].forEach(([k,v])=>{
    tbl.appendChild(el('tr', {}, [el('td',{},[k]), el('td',{},[v])]));
  });
  box.appendChild(el('div', {class:'tablewrap'}, [tbl]));
  return box;
}
function openRuleModal(){
  const modal = document.getElementById('ruleModal');
  const body = document.getElementById('ruleModalBody');
  body.innerHTML = '';
  body.appendChild(ruleOverview());

  const tabsRow = el('div', {class:'modal-tabs'});
  const panes = {};
  const defs = [
    ['observer', '📡 観測員向け', ruleObserverTab],
    ['diver', '🤿 潜水士向け', ruleDiverTab],
    ['glossary', '📖 用語集', ruleGlossaryTab],
  ];
  const contentWrap = el('div', {});
  defs.forEach(([key,label,fn])=>{
    const pane = fn();
    pane.hidden = true;
    panes[key] = pane;
    contentWrap.appendChild(pane);
  });
  function selectTab(key){
    defs.forEach(([k])=>{ panes[k].hidden = (k!==key); });
    [...tabsRow.children].forEach(btn=> btn.classList.toggle('active', btn.dataset.tab===key));
  }
  defs.forEach(([key,label])=>{
    const btn = el('button', {class:'modal-tab', type:'button', onclick:()=>selectTab(key)}, [label]);
    btn.dataset.tab = key;
    tabsRow.appendChild(btn);
  });
  body.appendChild(tabsRow);
  body.appendChild(contentWrap);

  // 自分の役割のタブを最初に開く（着席前のホーム画面では観測員タブを既定にする）
  const defaultTab = (ST.seat!=null && myRole()==='diver') ? 'diver' : 'observer';
  selectTab(defaultTab);

  modal.hidden = false;
}
function closeRuleModal(){ document.getElementById('ruleModal').hidden = true; }
document.getElementById('ruleOpenBtn').addEventListener('click', openRuleModal);
document.getElementById('ruleCloseBtn').addEventListener('click', closeRuleModal);
document.getElementById('muteBtn').addEventListener('click', ()=> setMuted(!muted));
updateMuteBtn();

render();
bootstrap();
</script>
