<script>
/* ============================================================
   ★キャッシュ自己修復
   meta の Cache-Control は文書自体には効かない（ブラウザが無視する）。
   そこで：
     ① 残存する Service Worker を強制解除（「シークレットなら見える」の主犯）
     ② サーバから no-store で自分自身を取り直し、版番号を比較
     ③ 古ければ「?v=新版」という別URLへ飛ぶ → キャッシュが原理的に効かない
   ============================================================ */
(function(){
  const PAGE_VER = "1.2";

  // ① 残存 Service Worker を解除（過去の実験などで残っていると、強制リロードすら効かなくなる）
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then(rs => rs.forEach(r => r.unregister()))
      .catch(()=>{});
  }
  if (window.caches && caches.keys) {
    caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(()=>{});
  }

  // ② サーバの最新版を確認（キャッシュを完全に無視して取得）
  const url = location.pathname + "?cb=" + Date.now();
  fetch(url, { cache: "no-store" })
    .then(r => r.ok ? r.text() : null)
    .then(t => {
      if (!t) return;
      const m = t.match(/PAGE_VER\s*=\s*"([\d.]+)"/);
      if (!m) return;
      const latest = m[1];
      if (latest !== PAGE_VER) {
        // ③ 別URLへ飛ぶ（?v= が付くのでキャッシュが効かない）。無限ループ防止つき
        const done = sessionStorage.getItem("cb_" + latest);
        if (!done) {
          sessionStorage.setItem("cb_" + latest, "1");
          location.replace(location.pathname + "?v=" + latest);
        } else {
          console.warn("新しい版 v" + latest + " があります。手動で再読み込みしてください。");
        }
      }
    })
    .catch(()=>{});
})();
</script>

<script>
// ============ 効果音（Web Audio 合成）============
let audioCtx=null, muted=false;
function ac(){ if(!audioCtx){ try{audioCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(audioCtx&&audioCtx.state==="suspended"){ audioCtx.resume().catch(()=>{}); } return audioCtx; }
function tone(freq,dur,type,vol,delay,slideTo){const c=ac();if(!c||muted)return;const t0=c.currentTime+(delay||0);
  const o=c.createOscillator(),g=c.createGain();o.type=type||"sine";o.frequency.setValueAtTime(freq,t0);
  if(slideTo)o.frequency.exponentialRampToValueAtTime(slideTo,t0+dur);
  g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(vol||.14,t0+.012);g.gain.exponentialRampToValueAtTime(.0008,t0+dur);
  o.connect(g);g.connect(c.destination);o.start(t0);o.stop(t0+dur+.03);}
const SFX={
  cut(){tone(1400,.12,"triangle",.10,0,320);tone(220,.08,"sine",.06,0);},
  pick(){tone(360,.09,"sine",.12,0);tone(540,.10,"sine",.07,.02);},
  score(){[660,880,1100,1320].forEach((f,i)=>tone(f,.5,"sine",.06,i*.06));},
  good(){[523,659,784,1047].forEach((f,i)=>tone(f,.6,"triangle",.07,i*.08));},
  soft(){tone(300,.06,"sine",.07,0);},
  click(){tone(520,.05,"triangle",.09,0);tone(780,.04,"sine",.05,.01);},
  yourTurn(){tone(784,.16,"sine",.11,0);tone(1047,.22,"sine",.10,.12);}, // 手番通知：澄んだ二音
};
function toggleMute(){muted=!muted;const b=document.getElementById("muteBtn");if(b)b.textContent=muted?"🔇":"🔊";if(!muted){ac();SFX.soft();}}
// 全ボタンに共通クリック音
document.addEventListener("click",e=>{const b=e.target.closest("button");if(b&&!b.disabled){ac();SFX.click();}},true);
document.addEventListener("change",e=>{if(e.target.tagName==="SELECT"){ac();SFX.soft();}},true);
// ゲーム状態の遷移に応じた効果音（購読更新のたびに前回と比較）
let _sndPrev={key:"",myTurn:false};
function soundOnGameTransition(){
  const g=ST.game; if(!g||ST.meta&&ST.meta.phase!=="playing"){ return; }
  const order=chooseOrder(g.cutter,g.n);
  const myTurn=(g.phase==="cut"&&ST.mySeat===g.cutter)||(g.phase==="choose"&&order[g.chooseIdx]===ST.mySeat);
  const key=`${g.round}:${g.phase}:${g.chooseIdx}`;
  if(key!==_sndPrev.key){
    // 採点結果が出た瞬間
    if(g.phase==="score"&&g.roundEval){ ac(); SFX.score(); if(g.roundEval.pct>=80)setTimeout(()=>SFX.good(),350); }
    _sndPrev.key=key;
  }
  // 自分の手番になった瞬間（待ちからの切替）
  if(myTurn&&!_sndPrev.myTurn){ ac(); SFX.yourTurn(); }
  _sndPrev.myTurn=myTurn;
}
</script>

 {id:"cnt2_満火",type:"cnt2",a:0,b:1,pt:5},{id:"cnt2_影星",type:"cnt2",a:2,b:3,pt:5},{id:"cnt2_霜蛇",type:"cnt2",a:4,b:5,pt:5},{id:"cnt2_満霜",type:"cnt2",a:0,b:4,pt:5},
 {id:"solo_星",type:"solo",a:3,pt:3},{id:"solo_霜",type:"solo",a:4,pt:3},{id:"solo_満",type:"solo",a:0,pt:3},{id:"solo_火",type:"solo",a:1,pt:3},

const TYPE={pair:{jp:"同居",icon:"🤝"},cnt2:{jp:"個数",icon:"🔢"},solo:{jp:"単体",icon:"1️⃣"},abs2:{jp:"二種忌避",icon:"⛔"},abs:{jp:"忌避",icon:"🚫"},hard:{jp:"秘伝",icon:"🌟"}};
// 上級モードの高難度枠（「Xを2つ以上、Yを入れない」複合・+10・達成率35%前後で均一）
const HARD=[
 {id:"H_火2蛇無",type:"hard",a:1,b:5,pt:10},{id:"H_影2満無",type:"hard",a:2,b:0,pt:10},{id:"H_星2霜無",type:"hard",a:3,b:4,pt:10},
 {id:"H_霜2影無",type:"hard",a:4,b:2,pt:10},{id:"H_満2星無",type:"hard",a:0,b:3,pt:10},{id:"H_蛇2火無",type:"hard",a:5,b:1,pt:10}];
const byIdAny=id=>POOL.find(r=>r.id===id)||HARD.find(r=>r.id===id);
function recipeMats(r){return (r.type==="pair"||r.type==="cnt2"||r.type==="abs2"||r.type==="hard")?[r.a,r.b]:[r.a];}
function recipeText(r){const m=i=>`${MAT[i].icon}${MAT[i].name}`;
  if(r.type==="pair")return `${m(r.a)} と ${m(r.b)} を同じ坩堝に`;
  if(r.type==="cnt2")return `${m(r.a)} を2つ以上、または ${m(r.b)} を2つ以上`;
  if(r.type==="solo")return `${m(r.a)} をちょうど1つ`;
  if(r.type==="abs2")return `${m(r.a)} と ${m(r.b)} を両方入れない`;
  if(r.type==="hard")return `${m(r.a)} を2つ以上、かつ ${m(r.b)} を入れない`;
  return `${m(r.a)} を入れない`;}
function scoreRecipe(r,pile){const c=x=>pile.filter(m=>m===x).length;
  if(r.type==="pair")return (c(r.a)>=1&&c(r.b)>=1)?r.pt:0;
  if(r.type==="cnt2")return (c(r.a)>=2||c(r.b)>=2)?r.pt:0;
  if(r.type==="solo")return c(r.a)===1?r.pt:0;
  if(r.type==="abs2")return (c(r.a)===0&&c(r.b)===0)?r.pt:0;
  if(r.type==="abs")return c(r.a)===0?r.pt:0;
  if(r.type==="hard")return (c(r.a)>=2&&c(r.b)===0)?r.pt:0;
  return 0;}
function scorePile(rs,p){return rs.reduce((s,r)=>s+scoreRecipe(r,p),0);}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function comb(a,k){const r=[];(function rec(s,c){if(c.length===k){r.push(c.slice());return;}for(let i=s;i<a.length;i++){c.push(a[i]);rec(i+1,c);c.pop();}})(0,[]);return r;}
function permA(a){if(a.length<=1)return[a];const res=[];a.forEach((v,i)=>{const rest=[...a.slice(0,i),...a.slice(i+1)];permA(rest).forEach(p=>res.push([v,...p]));});return res;}
function makeBand(n){const bag=[];for(let m=0;m<6;m++)for(let k=0;k<3;k++)bag.push(m);return shuffle(bag).slice(0,n*3);}
function cutSets(len,nc){return comb([...Array(len-1).keys()].map(i=>i+1),nc);}
function toPiles(b,cs){const s=cs.slice().sort((a,b)=>a-b);const pts=[0,...s,b.length];const pl=[];for(let i=0;i<pts.length-1;i++)pl.push(b.slice(pts[i],pts[i+1]));return pl;}
function E_sb(p){let s=0;for(const r of POOL)s+=scoreRecipe(r,p);return 3*s/POOL.length;}
function dealConflicts(ch){const a=new Set(),w=new Set();for(const i of ch){const r=POOL[i];
  if(r.type==="abs")a.add(r.a); if(r.type==="abs2"){a.add(r.a);a.add(r.b);}
  if(r.type==="pair"||r.type==="cnt2"){w.add(r.a);w.add(r.b);} if(r.type==="solo")w.add(r.a);}
  for(const m of a)if(w.has(m))return true;return false;}
function dealRecipeIds(n){for(let t=0;t<600;t++){const c=shuffle(POOL.map((_,i)=>i)).slice(0,n*3);if(!dealConflicts(c))return Array.from({length:n},(_,p)=>c.slice(p*3,p*3+3).map(i=>POOL[i].id));}const c=shuffle(POOL.map((_,i)=>i)).slice(0,n*3);return Array.from({length:n},(_,p)=>c.slice(p*3,p*3+3).map(i=>POOL[i].id));}
function omniMax(band,players){const n=players.length;let best=-1e9;for(const cs of cutSets(band.length,n-1)){const piles=toPiles(band,cs);for(const pm of permA([...Array(n).keys()])){let t=0;for(let i=0;i<n;i++)t+=scorePile(players[pm[i]],piles[i]);if(t>best)best=t;}}return best;}
// その切り方（cuts）で、全員の好みを見て最適に割り当てたときのチーム点＝切り方そのものの実力
function bestForCut(band,cuts,players){const n=players.length;const piles=toPiles(band,cuts);let best=-1e9;
  for(const pm of permA([...Array(n).keys()])){let t=0;for(let i=0;i<n;i++)t+=scorePile(players[pm[i]],piles[i]);if(t>best)best=t;}
  return best;}
function seenBy(i,j,pl,pile){return i===j?scorePile(pl[j],pile):E_sb(pile);}
function bestAssign(ch,pi,idx,pl){let b=-1e9;for(const P of permA([...Array(idx.length).keys()])){let t=0;for(let k=0;k<idx.length;k++)t+=seenBy(ch,idx[k],pl,pi[P[k]]);if(t>b)b=t;}return b;}
function seqChoose(pi,pl,ct){const n=pl.length;const o=[];for(let i=0;i<n;i++){const x=(ct+1+i)%n;if(x!==ct)o.push(x);}let av=pi.map((p,i)=>({p,i}));const as={};for(let oi=0;oi<o.length;oi++){const me=o[oi];const ot=[...o.slice(oi+1),ct];let bv=-1e9,bp=null;for(const c of av){const rt=av.filter(x=>x.i!==c.i).map(x=>x.p);const lk=rt.length===ot.length?bestAssign(me,rt,ot,pl):0;const v=seenBy(me,me,pl,c.p)+lk;if(v>bv){bv=v;bp=c;}}as[me]=bp;av=av.filter(x=>x.i!==bp.i);}as[ct]=av[0];return as;}
function rationalReach(band,pl,ct){const n=pl.length;let bA=null,bE=-1e9;for(const cs of cutSets(band.length,n-1)){const piles=toPiles(band,cs);const asg=seqChoose(piles,pl,ct);let e=0;for(let i=0;i<n;i++)e+=seenBy(ct,i,pl,asg[i].p);if(e>bE){bE=e;bA=asg;}}let a=0;for(let i=0;i<n;i++)a+=scorePile(pl[i],bA[i].p);return a;}
function chooseOrder(cutter,n){const o=[];for(let i=0;i<n;i++){const idx=(cutter+1+i)%n;if(idx!==cutter)o.push(idx);}return o;}

// ============ 部屋操作 ============
// オンライン入口（作る／参加する／観戦する）共通の認証ゲート。
// 認証済みならそのまま、未認証なら匿名サインイン。失敗は握りつぶさず赤バナー（教訓#7）。
async function ensureAuth(){
  try{
    if(_auth.currentUser){ myUid=_auth.currentUser.uid; return true; }
    const cred=await withRetry(()=>_auth.signInAnonymously());
    myUid=cred.user.uid; return true;
  }catch(e){
    showError("匿名認証に失敗しました："+e.message+"（Firebaseコンソールで Authentication → 匿名ログイン が有効になっているか確認してください）");
    return false;
  }
}
function genCode(){ const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let c="";for(let i=0;i<4;i++)c+=A[(Math.random()*A.length)|0];return c; }

async function createRoom(){
  if(!requireFb()||!requireName())return;
  if(!(await ensureAuth()))return;
  try{
    let code=null;
    for(let attempt=0;attempt<6;attempt++){
      const cand=genCode();
      const res=await withRetry(()=>_db.ref("rooms/"+cand+"/meta").transaction(cur=>{
        if(cur!==null) return; // 既存の部屋→衝突→abort
        return {host:myUid,phase:"lobby",createdAt:Date.now()};
      }));
      if(res.committed){ code=cand; break; } // 作成成功
    }
    if(!code){ showError("部屋の作成に失敗しました。もう一度お試しください。"); return; }
    ST.room=code; ST.isHost=true;
    await claimSeat(0);
    subscribeRoom();
    ST.view="lobby"; render();
  }catch(e){ showError("部屋作成に失敗："+e.message); }
}
async function joinRoom(){
  if(!requireFb()||!requireName())return;
  if(!(await ensureAuth()))return;
  const el=document.getElementById("joincode");
  const raw=(el&&el.value)||_inJoin||"";
  const code=raw.toUpperCase().replace(/[^A-Z0-9]/g,"").slice(0,4);
  if(code.length!==4){ showError("4文字の合言コードを入力してください。"); return; }
  try{
    const metaSnap=await withRetry(()=>_db.ref("rooms/"+code+"/meta").get());
    if(!metaSnap.exists()){ showError("その合言コードの部屋が見つかりません。"); return; }
    if(metaSnap.val().phase!=="lobby"){ showError("その部屋は既にゲーム開始済みです。"); return; }
    ST.room=code; ST.isHost=(metaSnap.val().host===myUid);
    // 空席を探して着席（教訓#1: transactionで競合回避）
    const seat=await claimEmptySeat();
    if(seat===null){ showError("満席です（最大4人）。"); ST.room=null; return; }
    subscribeRoom();
    ST.view="lobby"; render();
  }catch(e){ showError("参加に失敗："+e.message); }
}
async function claimEmptySeat(){
  for(let s=0;s<4;s++){
    const res=await withRetry(()=>_db.ref(roomPath("seats/"+s)).transaction(cur=>{
      if(cur===null) return {uid:myUid,name:myName,lastSeen:now(),online:true};
      if(cur.uid===myUid) return cur; // 既に自分
      return; // 埋まってる→abort
    }));
    if(res.committed && res.snapshot.val() && res.snapshot.val().uid===myUid){ ST.mySeat=s; return s; }
  }
  return null;
}
async function claimSeat(s){
  const res=await withRetry(()=>_db.ref(roomPath("seats/"+s)).transaction(cur=>{
    if(cur===null||cur.uid===myUid) return {uid:myUid,name:myName,lastSeen:now(),online:true}; return;
  }));
  if(res.committed){ ST.mySeat=s; }
}

function subscribeRoom(){
  clearSubs();
  armPresence(ST.mySeat);
  startHeartbeat();
  // 共有情報の購読（meta/seats/game）— 秘匿でない部分のみ
  const onMeta=_db.ref(roomPath("meta")).on("value",s=>{ ST.meta=s.val(); touch(); });
  const onSeats=_db.ref(roomPath("seats")).on("value",s=>{ ST.seats=s.val()||{}; resyncMySeat(); touch(); });
  const onGame=_db.ref(roomPath("game")).on("value",s=>{ ST.game=s.val(); onGameUpdate(); touch(); });
  _roomRefs=[["meta",onMeta],["seats",onSeats],["game",onGame]];
  ensureRecipeSub();
}
// 生存フラグ＋切断検知（教訓#4）を指定席に張る
let _presenceSeat=null;
function armPresence(seat){
  if(seat==null)return;
  if(_presenceSeat!==null&&_presenceSeat!==seat){ try{_db.ref(roomPath("seats/"+_presenceSeat+"/online")).onDisconnect().cancel();}catch(e){} }
  _presenceSeat=seat;
  const ref=_db.ref(roomPath("seats/"+seat+"/online"));
  ref.onDisconnect().set(false); ref.set(true).catch(()=>{});
}
// 席データから自分の席番号を常に再導出（詰め直し・再編成に追従）
function resyncMySeat(){
  if(!ST.seats)return;
  let found=null;
  for(const s of Object.keys(ST.seats)){ if(ST.seats[s]&&ST.seats[s].uid===myUid){ found=parseInt(s); break; } }
  if(found!==null && found!==ST.mySeat){ ST.mySeat=found; armPresence(found); ensureRecipeSub(); }
}
// 表示分離: 自席の好みだけ購読（席が変わったら購読先を張り替える）
let _recipeSubSeat=null, _recipeCb=null;
function ensureRecipeSub(){
  if(ST.mySeat===_recipeSubSeat)return;
  if(_recipeSubSeat!==null && _recipeCb){ try{_db.ref(roomPath("recipes/"+_recipeSubSeat)).off("value",_recipeCb);}catch(e){} }
  _recipeSubSeat=ST.mySeat;
  _recipeCb=_db.ref(roomPath("recipes/"+ST.mySeat)).on("value",s=>{ ST.myRecipes=s.val()?s.val().map(byId):null; touch(); });
}
function clearSubs(){ _roomRefs.forEach(([p,cb])=>{ try{_db.ref(roomPath(p)).off("value",cb);}catch(e){} }); _roomRefs=[]; if(_recipeSubSeat!==null&&_recipeCb){try{_db.ref(roomPath("recipes/"+_recipeSubSeat)).off("value",_recipeCb);}catch(e){}} _recipeSubSeat=null; _recipeCb=null; if(_hbTimer)clearInterval(_hbTimer); }
function startHeartbeat(){ const beat=()=>{ if(ST.room&&ST.mySeat!=null) _db.ref(roomPath("seats/"+ST.mySeat)).update({lastSeen:now(),online:true}).catch(()=>{}); }; beat(); _hbTimer=setInterval(beat,HEARTBEAT_MS); }
function touch(){ ST.lastUpdate=Date.now(); render(); }
function seatActive(s){ const seat=ST.seats&&ST.seats[s]; if(!seat)return false; if(seat.online===false)return false; return (now()-(seat.lastSeen||0))<TIMEOUT_MS; }
function existingSeats(){ const r=[]; for(let s=0;s<4;s++)if(ST.seats&&ST.seats[s])r.push(s); return r; }
function liveSeats(){ const r=[]; for(let s=0;s<4;s++)if(seatActive(s))r.push(s); return r; }

// ============ ゲーム進行（全てtransaction＋権限ガード）============
async function startGame(rounds,advanced){
  if(!amResolver()){ showError("開始できるのは進行役（ホスト）だけです。"); return; }
  const seats=liveSeats();
  const n=seats.length;
  if(n<3||n>4){ showError("3〜4人で開始できます（現在"+n+"人）。"); return; }
  if(rounds!==n*2 && rounds!==n*3) rounds=n*2; // 人数に合わない儀式数を補正
  // 席番号を0..n-1へ詰め直し（途中の空席を除去）
  try{
    const seatData=(await _db.ref(roomPath("seats")).get()).val()||{};
    // 直前まで生存していた席のうち、実データが残っているものだけを詰める
    const compactArr=seats.map(oldS=>seatData[oldS]).filter(x=>x&&x.uid);
    const n2=compactArr.length;
    if(n2<3){ showError("開始直前に人数が減りました（現在"+n2+"人）。もう一度お試しください。"); return; }
    if(rounds!==n2*2 && rounds!==n2*3) rounds=n2*2;
    const compact={}; compactArr.forEach((seat,newS)=>{ compact[newS]=seat; });
    await withRetry(()=>_db.ref(roomPath("seats")).set(compact));
    for(let s=0;s<n2;s++)if(compact[s].uid===myUid)ST.mySeat=s;
    // 配布（ホストがゲームマスターとして配る）
    const ids = advanced
      ? dealAdvanced(n2).map(seat=>seat.map(r=>r.id))   // 上級：通常枠2＋秘伝枠1
      : dealRecipeIds(n2);                              // 通常
    const recipes={}; for(let s=0;s<n2;s++)recipes[s]=ids[s];
    await withRetry(()=>_db.ref(roomPath("recipes")).set(recipes));
    // ゲーム初期化
    const band=makeBand(n2);
    const game={n:n2,rounds,round:1,cutter:0,teamTotal:0,advanced:!!advanced,phase:"cut",band,cuts:null,assign:null,chooseIdx:0,roundEval:null,history:null};
    await withRetry(()=>_db.ref(roomPath("game")).set(game));
    await withRetry(()=>_db.ref(roomPath("meta/phase")).set("playing"));
    // 購読し直し（新席で自分の好みを取り直す）
    subscribeRoom();
  }catch(e){ showError("開始に失敗："+e.message); }
}

// 切る（切り役のみ）
async function confirmCut(cuts){
  const g=ST.game; if(!g)return;
  if(g.phase!=="cut"){ showError("今は分ける場面ではありません。"); return; }
  if(ST.mySeat!==g.cutter){ showError("分けられるのは調合師だけです。"); return; }
  if(cuts.length!==g.n-1){ return; }
  try{
    await withRetry(()=>_db.ref(roomPath("game")).transaction(cur=>{
      if(!cur||cur.phase!=="cut"||cur.round!==g.round)return; // 二重・競合防止
      cur.cuts=cuts.slice().sort((a,b)=>a-b); cur.phase="choose"; cur.chooseIdx=0; cur.assign={}; return cur;
    }));
  }catch(e){ showError("分割の送信に失敗："+e.message); }
}
// 選ぶ（手番の人のみ）
async function pickPile(pi){
  const g=ST.game; if(!g||g.phase!=="choose")return;
  const order=chooseOrder(g.cutter,g.n);
  const chooser=order[g.chooseIdx];
  if(ST.mySeat!==chooser){ showError("今はあなたの番ではありません。"); return; }
  ac(); SFX.pick();
  try{
    await withRetry(()=>_db.ref(roomPath("game")).transaction(cur=>{
      if(!cur||cur.phase!=="choose"||cur.round!==g.round)return;
      const ord=chooseOrder(cur.cutter,cur.n); const ch=ord[cur.chooseIdx];
      if(ch!==ST.mySeat)return; // 手番違い
      cur.assign=cur.assign||{};
      if(cur.assign[pi]!=null)return; // 既に取られている
      cur.assign[pi]=ch; cur.chooseIdx=(cur.chooseIdx||0)+1;
      if(cur.chooseIdx>=cur.n-1){ // 残り1つを切り役へ→採点待ちへ
        for(let k=0;k<cur.n;k++)if(cur.assign[k]==null){cur.assign[k]=cur.cutter;break;}
        cur.phase="await_score";
      }
      return cur;
    }));
  }catch(e){ showError("選択の送信に失敗："+e.message); }
}

// 採点（resolver＝ホスト、不在時は最小の生存席が担当）
function amResolver(){
  if(!ST.seats)return false;
  const hostUid=ST.meta&&ST.meta.host;
  const hostSeat=Object.keys(ST.seats).find(s=>ST.seats[s]&&ST.seats[s].uid===hostUid);
  if(hostSeat!==undefined && seatActive(parseInt(hostSeat))) return ST.mySeat===parseInt(hostSeat);
  // ホスト不在→最小の生存席
  for(let s=0;s<4;s++)if(seatActive(s))return ST.mySeat===s;
  return false;
}
async function resolveScore(){
  const g=ST.game; if(!g||g.phase!=="await_score")return;
  if(!amResolver())return; // resolverのみ
  try{
    // 採点時だけ全好みを一度読む（ゲームマスターの役割）
    const recSnap=await withRetry(()=>_db.ref(roomPath("recipes")).get());
    const rec=recSnap.val(); const n=g.n;
    const players=[];for(let p=0;p<n;p++)players.push(rec[p].map(byId));
    const piles=toPiles(g.band,g.cuts);
    const pp={};for(let pi=0;pi<n;pi++)pp[g.assign[pi]]=piles[pi];
    const totals=[];for(let p=0;p<n;p++)totals.push(scorePile(players[p],pp[p]));
    const rs=totals.reduce((a,b)=>a+b,0);
    const omni=omniMax(g.band,players), rat=rationalReach(g.band,players,g.cutter);
    const pct=omni>0?Math.min(100,Math.round(rs/omni*100)):(rs>=0?100:0);
    const contents={};for(let p=0;p<n;p++)contents[p]=pp[p]; // 中身のみ（内訳は含めない）
    const owners=[];for(let pi=0;pi<n;pi++)owners.push(g.assign[pi]); // 各塊の持ち主（順序付き）
    const orderedPiles=piles.map(p=>p.slice()); // 帯の並び順の塊
    // 切り方の質＝この切り方で最適に配れた場合のチーム点÷omni（選ぶ側のミスに非依存）
    const bestCut=bestForCut(g.band,g.cuts,players);
    const cutPct=omni>0?Math.min(100,Math.round(bestCut/omni*100)):100;
    // ★逆算対策：個人点(totals)も「叶った好み(fired)」もDBに保存しない。公開はチーム合計のみ。
    //   各自の点は各クライアントが自分の好み＋自分の坩堝からローカル計算する。
    //   名場面用の「叶った好み」は、終了時にreveal済みの好みから再計算する。
    await withRetry(()=>_db.ref(roomPath("game")).transaction(cur=>{
      if(!cur||cur.phase!=="await_score"||cur.round!==g.round)return; // 二重採点防止
      cur.teamTotal=(cur.teamTotal||0)+rs;
      cur.roundEval={roundScore:rs,omni,rational:rat,pct,cutPct};
      cur.history=cur.history||[];
      cur.history.push({round:cur.round,cutter:cur.cutter,contents,roundScore:rs,omni,rational:rat,pct,
        cutPct, band:g.band.slice(), cuts:g.cuts.slice(), piles:orderedPiles,owners});
      cur.phase="score"; return cur;
    }));
  }catch(e){ showError("採点に失敗："+e.message); }
}

async function nextRound(){
  // 誰でも進行できる（進行役の切断で止まらないように）。
  // 二重実行は下のtransaction内 phase ガードで防がれるため安全。
  const g=ST.game; if(!g||g.phase!=="score")return;
  try{
    if(g.round>=g.rounds){
      await withRetry(()=>_db.ref(roomPath("game/phase")).set("end"));
      await withRetry(()=>_db.ref(roomPath("meta/phase")).set("ended"));
      // 終了時のみ全好みを配信（秘匿解除）
      const rec=(await _db.ref(roomPath("recipes")).get()).val();
      await withRetry(()=>_db.ref(roomPath("reveal")).set(rec));
      return;
    }
    const band=makeBand(g.n);
    await withRetry(()=>_db.ref(roomPath("game")).transaction(cur=>{
      if(!cur||cur.phase!=="score")return;
      cur.round=cur.round+1; cur.cutter=(cur.cutter+1)%cur.n;
      cur.band=band; cur.cuts=null; cur.assign=null; cur.chooseIdx=0; cur.phase="cut"; cur.roundEval=null; return cur;
    }));
  }catch(e){ showError("進行に失敗："+e.message); }
}

    else { // プレイヤー順：席0,1,2… の順に、その席が受け取った塊を並べる

// ============ 名場面（各自が調合師だった最高の儀式・物語主体） ============
// allRecipes: 席ごとの好みID配列（終了時のみ利用可）
function highlightPanel(history,n,allRecipes){
  if(!history||!history.length||!allRecipes)return "";
  let html=`<div class="panel"><div class="eyebrow">✨ 語り継がれる調合</div>
    <div class="kv" style="margin-bottom:10px">それぞれの魔女が、調合師として最も見事に分けた儀式。</div>`;
  for(let seat=0;seat<n;seat++){
    const mine=history.filter(h=>h.cutter===seat);
    if(!mine.length)continue;
    // 切り方の質(cutPct)が最高の儀式。同率ならomniが高い(=難しい)局面を優先
    let best=mine[0];
    for(const h of mine){ const bq=best.cutPct!=null?best.cutPct:best.pct, hq=h.cutPct!=null?h.cutPct:h.pct;
      if(hq>bq || (hq===bq && (h.omni||0)>(best.omni||0))) best=h; }
    const piles=best.piles||[]; const owners=best.owners||[];
    // その儀式で叶った好みを再計算（終了時＝好みは公開済み）
    const feats=[];
    for(let pi=0;pi<piles.length;pi++){ const owner=owners[pi]; if(owner==null)continue;
      const recs=(allRecipes[owner]||[]).map(byIdAny).filter(Boolean);
      for(const r of recs){ if(scoreRecipe(r,piles[pi])!==0) feats.push({owner,r}); } }
    // 見せ場：秘伝＞高得点の順。「仲間の好みを叶えた」を主役に
    feats.sort((a,b)=>((b.r.type==="hard"?100:0)+b.r.pt)-((a.r.type==="hard"?100:0)+a.r.pt));
    const star=feats.find(f=>f.owner!==seat);
    html+=`<div class="miniboard" style="padding:12px 0">
      <div class="miniHead" style="margin-bottom:8px"><span><b style="color:${PCOL[seat]}">${nameOf(seat)}</b> の最高の調合 ・ <span class="kv">儀式${best.round}</span></span></div>
      <div class="miniRow">`;
    for(let pi=0;pi<piles.length;pi++){ const owner=owners[pi];
      html+=`<div class="miniPile"><div class="miniMats">${(piles[pi]||[]).map(m=>`<span class="miniGem" style="background:${MAT[m].color}">${MAT[m].icon}</span>`).join("")}</div>
        <div class="miniOwner"><span style="color:${PCOL[owner]}">${nameOf(owner).slice(0,3)}</span>${owner===seat?'<span style="color:var(--candle);opacity:.7">🔪</span>':''}</div></div>`; }
    html+=`</div>`;
    if(star){
      const tag=`<span class="tag ${star.r.type}">${TYPE[star.r.type].icon} ${TYPE[star.r.type].jp}</span>`;
      html+=`<div class="kv" style="margin-top:8px;line-height:1.7">沈黙のうちに <b style="color:${PCOL[star.owner]}">${nameOf(star.owner)}</b> の望みを見抜き、${tag} <b style="color:var(--candle-soft)">${recipeText(star.r)}</b> を叶えた。</div>`;
    } else if(feats.length){
      html+=`<div class="kv" style="margin-top:8px">この分配で ${feats.length}つの好みが叶った。</div>`;
    } else {
      html+=`<div class="kv" style="margin-top:8px">難しい素材の並びだった。それでも最善を尽くした。</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

// ============ ソロモード（Firebase不要・1人で全席・全情報表示） ============
let SOLO={active:false};
let soloCuts=[];
function openSolo(){ SOLO={active:true, phase:"setup", n:3, rounds:6}; soloCuts=[]; render(); }
function exitSolo(){ SOLO={active:false}; soloCuts=[]; render(); }
function dealAdvanced(n){
  // 通常枠2＋高難度枠1。通常枠は配布制約、高難度枠は各自ユニークに配る
  for(let t=0;t<600;t++){
    const idx=shuffle(POOL.map((_,i)=>i)).slice(0,n*2);
    const normPerSeat=Array.from({length:n},(_,p)=>idx.slice(p*2,p*2+2).map(i=>POOL[i]));
    // 高難度枠と通常枠の矛盾チェック（高難度=Xを集めYを避ける。同席の忌避と衝突しないよう緩く確認）
    const hards=shuffle(HARD).slice(0,n);
    let ok=true;
    for(let p=0;p<n;p++){ const want=new Set(), avoid=new Set();
      for(const r of normPerSeat[p]){ if(r.type==="abs")avoid.add(r.a); if(r.type==="abs2"){avoid.add(r.a);avoid.add(r.b);} if(r.type==="pair"||r.type==="cnt2"){want.add(r.a);want.add(r.b);} if(r.type==="solo")want.add(r.a); }
      // 高難度枠: a=集める(want) b=避ける(avoid)
      want.add(hards[p].a); avoid.add(hards[p].b);
      for(const m of avoid)if(want.has(m)){ok=false;break;}
      if(!ok)break;
    }
    if(ok)return normPerSeat.map((nm,p)=>[...nm,hards[p]]);
  }
  // フォールバック（制約無視）
  const idx=shuffle(POOL.map((_,i)=>i)).slice(0,n*2);const hards=shuffle(HARD).slice(0,n);
  return Array.from({length:n},(_,p)=>[POOL[idx[p*2]],POOL[idx[p*2+1]],hards[p]]);
}
function startSolo(n,rounds,advanced){
  const players = advanced ? dealAdvanced(n) : dealRecipeIds(n).map(seat=>seat.map(byId));
  SOLO={active:true, phase:"cut", n, rounds, advanced:!!advanced, round:1, cutter:0, teamTotal:0,
    players, band:makeBand(n), cuts:null, piles:null, assign:{}, chooseIdx:0, history:[], roundEval:null};
  soloCuts=[]; render();
}
function soloToggleCut(pos){ const i=soloCuts.indexOf(pos); if(i>=0)soloCuts.splice(i,1); else if(soloCuts.length<SOLO.n-1){soloCuts.push(pos);ac();SFX.soft();} render(); }
function soloConfirmCut(){ if(soloCuts.length!==SOLO.n-1)return; ac();SFX.cut(); SOLO.cuts=soloCuts.slice().sort((a,b)=>a-b); SOLO.piles=toPiles(SOLO.band,SOLO.cuts); SOLO.phase="choose"; SOLO.assign={}; SOLO.chooseIdx=0; render(); }
function soloPick(pi){ if(SOLO.phase!=="choose")return; if(SOLO.assign[pi]!=null)return;
  const order=chooseOrder(SOLO.cutter,SOLO.n); const chooser=order[SOLO.chooseIdx];
  ac();SFX.pick(); SOLO.assign[pi]=chooser; SOLO.chooseIdx++;
  if(SOLO.chooseIdx>=SOLO.n-1){ for(let k=0;k<SOLO.n;k++)if(SOLO.assign[k]==null){SOLO.assign[k]=SOLO.cutter;break;} soloScore(); }
  render();
}
function soloScore(){
  const n=SOLO.n; const pp={}; for(let pi=0;pi<n;pi++)pp[SOLO.assign[pi]]=SOLO.piles[pi];
  const totals=[]; for(let p=0;p<n;p++)totals.push(scorePile(SOLO.players[p],pp[p]));
  const rs=totals.reduce((a,b)=>a+b,0); SOLO.teamTotal+=rs;
  const omni=omniMax(SOLO.band,SOLO.players), rat=rationalReach(SOLO.band,SOLO.players,SOLO.cutter);
  const pct=omni>0?Math.min(100,Math.round(rs/omni*100)):(rs>=0?100:0);
  // 切り方の質＝この切り方で最適に配れた場合のチーム点 ÷ omni（選ぶ側のミスに影響されない）
  const bestCut=bestForCut(SOLO.band,SOLO.cuts,SOLO.players);
  const cutPct=omni>0?Math.min(100,Math.round(bestCut/omni*100)):100;
  // この儀式で叶った好み（各自）
  const fired=[]; for(let p=0;p<n;p++){ fired.push(SOLO.players[p].filter(r=>scoreRecipe(r,pp[p])!==0).map(r=>r.id)); }
  SOLO.roundEval={roundScore:rs,omni,rational:rat,pct,totals};
  SOLO.history.push({round:SOLO.round,cutter:SOLO.cutter,totals,roundScore:rs,omni,rational:rat,pct,
    cutBest:bestCut, cutPct, fired,
    band:SOLO.band.slice(), cuts:SOLO.cuts.slice(),
    piles:SOLO.piles.map(p=>p.slice()), owners:[...Array(n)].map((_,pi)=>SOLO.assign[pi])});
  SOLO.phase="score"; ac();SFX.score(); if(pct>=80)setTimeout(()=>SFX.good(),350);
}
function soloNext(){ if(SOLO.phase!=="score")return;
  if(SOLO.round>=SOLO.rounds){ SOLO.phase="end"; render(); return; }
  SOLO.round++; SOLO.cutter=(SOLO.cutter+1)%SOLO.n; SOLO.band=makeBand(SOLO.n); SOLO.cuts=null; SOLO.piles=null; SOLO.assign={}; SOLO.chooseIdx=0; SOLO.roundEval=null; SOLO.phase="cut"; soloCuts=[]; render();
}

function matChip(i,small){return `<span class="mat" style="background:${MAT[i].color}${small?';min-width:auto;height:26px;font-size:11px;padding:0 6px':''}"><span class="mi">${MAT[i].icon}</span>${MAT[i].name}</span>`;}
function bookList(recipes,pile){return recipes.map(r=>{const fired=pile?scoreRecipe(r,pile)!==0:null;const cls=r.pt<0?"rpt neg":"rpt";let mark="";if(pile)mark=fired?` <span class="fire">✦叶</span>`:` <span class="nofire">·</span>`;
  return `<div class="spellbook"><span><span class="tag ${r.type}">${TYPE[r.type].icon} ${TYPE[r.type].jp}</span> ${recipeText(r)}</span><span class="${cls}">${r.pt>0?"+":""}${r.pt}${mark}</span></div>`;}).join("");}
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function nameOf(s){ return esc((ST.seats&&ST.seats[s]&&ST.seats[s].name)||NAMES_FALLBACK[s]); }
function pill(s){ return `<b style="color:${PCOL[s]}">${nameOf(s)}</b>`; }

function renderBanner(){ document.getElementById("banner").innerHTML = ST.error ? `<div class="banner">⚠️ ${ST.error} <button class="ghost" onclick="ST.error='';renderBanner()" style="float:right">×</button></div>` : ""; }
function statusBar(){
  const c=ST.connected?`<span class="conn"><span class="dot on"></span>接続中</span>`:`<span class="conn"><span class="dot off"></span>切断（再接続待ち）</span>`;
  const ago=ST.lastUpdate?Math.max(0,Math.round((Date.now()-ST.lastUpdate)/1000)):null;
  const fresh=ago!=null?`最終同期 ${ago}秒前`:"";
  const room=ST.room?`部屋 <b style="color:var(--candle-soft);letter-spacing:.2em">${ST.room}</b>`:"";
  return `<div class="status">${c}<span>${fresh}</span><span>${room}</span>${ST.room?`<button class="ghost" onclick="leaveRoom()">退出</button>`:""}</div>`;
}
/* ★IME保護: 入力中(変換中/フォーカス中)の再描画は、入力欄をDOMごと壊し、
   日本語変換が途中で確定してしまう（例: 「あきら」と打つと「あ」だけ残る）。
   → 変換中は再描画を保留し、フォーカス中の input は値とカーソルを復元する。 */
let _ime=false, _pendingRender=false;
document.addEventListener("compositionstart",()=>{_ime=true;});
document.addEventListener("compositionend",()=>{_ime=false;if(_pendingRender){_pendingRender=false;render();}});
function _guardRender(fn){
  return function(){
    if(_ime){ _pendingRender=true; return; }                       // 変換中は描画しない
    const ae=document.activeElement;
    const keep=(ae&&ae.tagName==="INPUT")?{id:ae.id,v:ae.value,s:ae.selectionStart,e:ae.selectionEnd}:null;
    const r=fn.apply(this,arguments);
    if(keep&&keep.id){
      const el=document.getElementById(keep.id);
      if(el&&document.activeElement!==el){
        el.value=keep.v; el.focus();
        try{ el.setSelectionRange(keep.s,keep.e); }catch(_){}
      }
    }
    return r;
  };
}
function render(){
  renderBanner();
  const app=document.getElementById("app");
  if(SOLO.active){ app.innerHTML=soloHTML(); return; }
  if(!ST.room){ app.innerHTML=homeHTML(); return; }
  let html=statusBar();
  const phase=ST.meta&&ST.meta.phase;
  if(ST.spectator){ html+=spectatorHTML(); app.innerHTML=html; return; }
  if(phase==="lobby"){ html+=lobbyHTML(); }
  else if(phase==="playing"){ html+=gameHTML(); }
  else if(phase==="ended"){ html+=endHTML(); }
  else { html+=`<div class="panel"><div class="kv">部屋を同期中…</div></div>`; }
  app.innerHTML=html;
}

function gameHTML(){
  const g=ST.game; if(!g)return `<div class="panel"><div class="kv">同期中…</div></div>`;
  const n=g.n, myTurn_cut=(g.phase==="cut"&&ST.mySeat===g.cutter);
  const order=chooseOrder(g.cutter,n);
  const curChooser=(g.phase==="choose")?order[g.chooseIdx]:null;
  const myTurn_pick=(g.phase==="choose"&&ST.mySeat===curChooser);
  let html="";
  // ヘッダ
  html+=`<div class="panel"><div class="row spread">
    <div><span class="phase">🕯️ 儀式 ${g.round}/${g.rounds}</span> &nbsp;調合師 ${pill(g.cutter)}${g.cutter===ST.mySeat?' <span class="kv">(あなた)</span>':''}${g.advanced?' <span class="tag hard" style="font-size:11px">🌟 秘伝</span>':''}</div>
    <div class="kv" style="text-align:right">総魔力<br><span class="big" style="font-size:22px">${g.teamTotal||0}</span></div></div>`;
  // 手番ハイライト（誰の番か・自分の番か一目で）
  let turnWho="", isMine=false;
  if(g.phase==="cut"){ turnWho=`${pill(g.cutter)} が素材を分けています`; isMine=myTurn_cut; }
  else if(g.phase==="choose"){ turnWho=`${pill(curChooser)} が坩堝を選んでいます`; isMine=myTurn_pick; }
  else if(g.phase==="await_score"){ turnWho="調合の結果を確かめています"; }
  else if(g.phase==="score"){ turnWho="結果を確認中"; }
  if(turnWho){
    html+=`<div class="turnbar ${isMine?'active':''}" style="margin-top:10px"><span>${isMine?'✨':'⏳'}</span><span class="who">${isMine?'<span class="yourturn">あなたの番です</span>':turnWho}</span>`;
    // 座席チップ列（手番の人を強調）
    if(g.phase==="cut"||g.phase==="choose"){
      html+=`<span style="margin-left:auto;display:flex;gap:5px;flex-wrap:wrap">`;
      const nowSeat = g.phase==="cut"?g.cutter:curChooser;
      const picked = g.phase==="choose" ? Object.values(g.assign||{}) : [];
      for(let s=0;s<n;s++){ const done=picked.includes(s);
        html+=`<span class="seatchip ${s===nowSeat?'now':''}" style="color:${PCOL[s]};${done?'opacity:.5':''}">${nameOf(s).slice(0,3)}${s===g.cutter?'🔪':''}</span>`; }
      html+=`</span>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  // 自分の好み（表示分離：自席のみ）
  html+=`<div class="panel"><div class="eyebrow">📖 あなた（${pill(ST.mySeat)}）の好み <span class="kv">— あなただけに見えています</span></div>`;
  html+= ST.myRecipes?bookList(ST.myRecipes,null):`<div class="kv">好みを取得中…</div>`;
  html+=`</div>`;

  // 作業台
  html+=`<div class="panel"><div class="eyebrow">🪵 作業台の素材</div>`;
  const cuts = (g.phase==="cut" && myTurn_cut) ? localCuts : (g.cuts||[]);
  html+=`<div class="bench">`;
  for(let i=0;i<g.band.length;i++){ html+=`<div class="slot">${matChip(g.band[i])}</div>`;
    if(i<g.band.length-1){ const pos=i+1; const isCut=cuts.includes(pos); const dis=!myTurn_cut;
      html+=`<div class="gap ${isCut?'cut':''} ${dis?'disabled':''}" ${dis?'':`onclick="toggleLocalCut(${pos})"`}></div>`; }
  }
  html+=`</div>`;
  if(g.phase==="cut"){
    if(myTurn_cut){
      // 切り方プレビュー
      if(localCuts.length>0){
        const pv=toPiles(g.band,localCuts.slice().sort((a,b)=>a-b));
        html+=`<div style="margin-top:12px"><div class="kv" style="margin-bottom:5px">分かれ方（プレビュー・${localCuts.length+1}/${n}塊）：</div><div class="miniRow">`;
        for(let pi=0;pi<pv.length;pi++){ html+=`<div class="miniPile"><div class="miniMats">${pv[pi].map(m=>`<span class="miniGem" style="background:${MAT[m].color}" title="${MAT[m].name}">${MAT[m].icon}</span>`).join("")}</div><div class="miniOwner"><span class="kv">${pv[pi].length}個</span></div></div>`; }
        html+=`</div></div>`;
      }
      html+=`<div class="row" style="margin-top:12px"><span class="yourturn">あなたが分けます</span>
      <button class="primary" ${localCuts.length!==n-1?'disabled':''} onclick="submitCut()">🔪 この位置で分ける（刃 ${localCuts.length}/${n-1}）</button>
      <button class="ghost" ${localCuts.length===0?'disabled':''} onclick="localCuts=[];render()">刃を戻す</button></div>
      <div class="hint"><span class="hi">✎</span><span>仲間の好みは秘密。予想して分ける。自分は最後に残った坩堝を受け取る。無言で。</span></div>`;
    } else { html+=`<div class="hint" style="margin-top:10px"><span class="hi">⏳</span><span>${pill(g.cutter)} が素材を分けています…</span></div>`; }
  }
  html+=`</div>`;

  // 坩堝
  if(g.cuts){
    const piles=toPiles(g.band,g.cuts);
    html+=`<div class="panel"><div class="eyebrow">⚗️ ${n}つの坩堝</div>`;
    if(g.phase==="choose"){ html+=`<div class="kv" style="margin-bottom:8px">${myTurn_pick?'<span class="yourturn">あなたが受け取る番です</span>':`${pill(curChooser)} が選んでいます…`}（${g.chooseIdx+1}/${order.length}）</div>`; }
    html+=`<div class="row" style="align-items:stretch">`;
    const assign=g.assign||{};
    for(let pi=0;pi<n;pi++){ const taken=assign[pi]!=null; const pickable=myTurn_pick&&!taken;
      html+=`<div class="crucible ${pickable?'pickable':''} ${taken&&g.phase==='choose'?'taken':''}" ${pickable?`onclick="pickPile(${pi})"`:''}>
        <div class="cHead"><span>坩堝 ${["一","二","三","四"][pi]}</span>${taken?`<span style="color:${PCOL[assign[pi]]}">${nameOf(assign[pi])}</span>`:''}</div>
        <div class="mats">${piles[pi].map(m=>matChip(m,true)).join("")}</div>`;
      if(g.phase==="score"){ const owner=assign[pi];
        if(owner===ST.mySeat && ST.myRecipes){ const t=scorePile(ST.myRecipes,piles[pi]);
          html+=`<div style="margin-top:8px" class="kv">あなた：<b style="color:${t<0?'var(--bad)':'var(--good)'};font-family:var(--grimoire)">${t>0?'+':''}${t}</b></div>`; }
        else { html+=`<div style="margin-top:8px;opacity:.6" class="kv">${nameOf(owner)} が受け取った</div>`; } }
      html+=`</div>`; }
    html+=`</div></div>`;
  }

  // 採点結果（チーム合計のみ公開・個人点は本人だけ）
  if(g.phase==="score"&&g.roundEval){
    const e=g.roundEval;
    let myScoreLine="";
    if(g.cuts&&ST.myRecipes){ const pilesNow=toPiles(g.band,g.cuts); let myPile=null;
      for(let pi=0;pi<n;pi++)if((g.assign||{})[pi]===ST.mySeat)myPile=pilesNow[pi];
      if(myPile){ const mt=scorePile(ST.myRecipes,myPile); myScoreLine=`<div class="row spread" style="margin-top:4px"><div class="kv">あなたが得た魔力（あなただけに表示）</div><div style="font-family:var(--grimoire);font-size:20px;color:${mt<0?'var(--bad)':'var(--candle-soft)'}">${mt>0?'+':''}${mt}</div></div>`; } }
    html+=`<div class="panel"><div class="eyebrow">🌟 調合の結果</div>
      <div class="row spread"><div class="kv">この儀式でチームが得た魔力</div><div class="big scorepop" style="color:${e.roundScore<0?'var(--bad)':'var(--good)'}">${e.roundScore>0?'+':''}${e.roundScore}</div></div>
      ${myScoreLine}
      <div class="kv" style="margin-top:6px">完璧（全知最大）${e.omni}　冴え <b style="color:var(--candle)">${e.pct}%</b></div>
      <div class="meterwrap"><div class="meter" style="width:${Math.max(0,Math.min(100,e.pct))}%"></div></div>
      <div class="hint"><span class="hi">✎</span><span>公開されるのは<b>チーム合計だけ</b>。各自の点は本人にしか見えない。<b>誰がどう切り、どの塊を選んだか</b>——そこから仲間の好みを読む。</span></div>`;
    html+=`<div class="row" style="margin-top:14px"><button class="primary" onclick="nextRound()">${g.round>=g.rounds?'✦ 儀式を終える':'次の儀式へ →'}</button></div>
      <div class="hint"><span class="hi">✎</span><span>誰でも進められます。準備ができた人が押してください。</span></div>`;
    html+=`</div>`;
  }
  if(g.phase==="await_score"){ html+=`<div class="panel"><div class="kv">⚗️ 調合の結果を確かめています…</div></div>`; }

  // 記録（切り方履歴のミニ盤面・個人点は非公開＝B方式）
  html+=recordPanel(g.history, g.n, false);
  return html;
}
function toggleLocalCut(pos){ const g=ST.game; const i=localCuts.indexOf(pos); if(i>=0)localCuts.splice(i,1); else if(localCuts.length<g.n-1)localCuts.push(pos); render(); }
function submitCut(){ ac(); SFX.cut(); confirmCut(localCuts.slice()); localCuts=[]; }
function rankFor(pct){ if(pct>=92)return{t:"大魔女",i:"🌕",l:"沈黙のうちに、互いの心を読み切った。"};if(pct>=82)return{t:"熟達の魔女",i:"🌔",l:"言葉なくとも、意はよく通じていた。"};if(pct>=70)return{t:"一人前の魔女",i:"🌓",l:"良き調合であった。"};if(pct>=58)return{t:"見習いを抜けし者",i:"🌒",l:"まだ視えぬ好みがある。"};return{t:"駆け出しの魔女",i:"🌑",l:"沈黙は深く、心は遠かった。"}; }
function endHTML(){
  const g=ST.game; if(!g||!g.history)return `<div class="panel"><div class="kv">結果を集計中…</div></div>`;
  // 終了時は全好みを表示（秘匿解除）。reveal ノードから取得
  if(ST.allRecipes===null && _fbReady){ _db.ref(roomPath("reveal")).get().then(s=>{ if(s.exists()){ ST.allRecipes=s.val(); render(); } }); }
  const sa=g.history.reduce((s,h)=>s+h.roundScore,0), so=g.history.reduce((s,h)=>s+h.omni,0), sr=g.history.reduce((s,h)=>s+h.rational,0);
  const keen=so>0?Math.min(100,Math.round(sa/so*100)):100; const ratP=so>0?Math.round(sr/so*100):100;
  const rank=rankFor(keen);
  let html=`<div class="panel" style="text-align:center;border-color:var(--candle)">
    <div style="font-size:44px">${rank.i}</div>
    <div style="font-family:var(--grimoire);font-size:23px;letter-spacing:.12em;color:var(--candle-soft)">${rank.t}</div>
    <div class="kv" style="margin:8px 0">${rank.l}</div>
    <div class="meterwrap" style="max-width:420px;margin:12px auto 4px"><div class="meter" style="width:${Math.max(0,Math.min(100,keen))}%"></div></div>
    <div style="font-family:var(--grimoire);color:var(--candle)">通算の冴え ${keen}%</div></div>`;
  html+=`<div class="panel"><div class="eyebrow">🏁 総まとめ（${g.n}人・${g.rounds}儀式）</div>
    <div class="kv">総魔力 <b style="color:var(--good)">${g.teamTotal}</b>　通算冴え <b>${keen}%</b>（合理目安 ${ratP}%）</div>
    <div class="kv" style="margin-top:6px">儀式ごと：${g.history.map(h=>`${h.round}:${h.roundScore>0?'+':''}${h.roundScore}`).join("　")}</div></div>`;
  // 名場面（好みが公開された後のみ）
  if(ST.allRecipes) html+=highlightPanel(g.history, g.n, ST.allRecipes);
  html+=`<div class="panel"><div class="eyebrow">📖 明かされる好み</div>`;
  if(ST.allRecipes){ for(let p=0;p<g.n;p++){ html+=`<div style="margin-top:6px" class="kv">${pill(p)}</div>`+bookList((ST.allRecipes[p]||[]).map(byIdAny).filter(Boolean),null); } }
  else html+=`<div class="kv">好みを取得中…</div>`;
  html+=`</div>`;
  // 工房の記録（終了後：好みが公開されたので個人点も表示し、答え合わせできる）
  if(ST.allRecipes) html+=recordPanel(g.history, g.n, true, ST.allRecipes);
  else html+=recordPanel(g.history, g.n, false);
  html+=`<div class="row"><button class="primary" onclick="leaveRoom()">↻ 部屋を出る</button></div>`;
  return html;
}

// 定期再描画（鮮度表示の更新・タイムアウト反映）
setInterval(()=>{ if(ST.room){ if(ST.game&&ST.game.phase==="await_score"&&amResolver()) resolveScore(); render(); } }, 3000);
render=_guardRender(render);
render();
</script>
