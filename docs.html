 [ ] 核となる行動を取らない方が強い\n- [ ] 読みや情報が利益へ変換されない\n- [ ] 想定したシグナルが論理的に発生しない\n- [ ] 初回だけ面白く数回で解ける\n- [ ] 対症療法を重ねないと成立しない\n- [ ] 上流問題をUIや数値で隠している\n\n---\n\n# 最終結論\n\n成功するボードゲームに共通するのは、バランスの良さ、ルールの少なさ、ランダム性の低さではない。\n\n> プレイヤーが、理解できる状況の中で、完全には分からない未来へ何かを賭け、その結果から学び、次は別の決断をしたくなること。\n\n失敗するゲームに共通するのは、欠点があることではない。\n\n> プレイヤーの判断が、理解、結果、感情、学習のいずれかへ変換されないこと。\n\nさらに圧縮すると、成功作とは、\n\n> 答えを与えず、考える理由を与え、決断の結果を返し、その結果によって次の問いを生むゲームである。\n\n失敗作とは、\n\n> 問いがない、答えが決まっている、答えがどうでもよい、または答えても何も返ってこないゲームである。\n\n---\n\n# 関連するプロジェクト文書\n\n本書の理論・事例をさらに確認する場合は、次を参照する。\n\n- `docs/ボードゲーム設計論_理論編.md`\n- `docs/ボードゲーム設計論_実践記録集.md`\n- `docs/ボードゲーム制作_プロセス検証知見.md`\n- `docs/ボードゲーム制作_実装技術知見.md`\n- `docs/影の競り_読み利益変換_原因分解報告.md`\n- `docs/影の競り_私的価値倍率と位置公開_要因分解報告.md`\n- `docs/影の競り_負のシグナル読み_人間テスト計画.md`\n"}, {"id": "情報系ボードゲーム設計_利得内蔵シグナルの原則_md", "file": "情報系ボードゲーム設計_利得内蔵シグナルの原則.md", "title": "利得内蔵シグナルの原則", "sub": "情報系・心理戦系ゲームの設計原則（Payoff-bearing Signal）", "icon": "🎯", "md": "# 情報系ボードゲーム設計の教訓\n<!-- TOC -->\n## 目次\n\n- [―― シグナル行動には、本人の実利を内蔵する](#-シグナル行動には本人の実利を内蔵する)\n- [本人にとっての役割](#本人にとっての役割)\n- [他者にとっての役割](#他者にとっての役割)\n- [弱い構造](#弱い構造)\n- [強い構造](#強い構造)\n- [『影の賽』](#影の賽)\n- [『影の競り』](#影の競り)\n- [『遅信』](#遅信)\n- [『共犯』](#共犯)\n- [6-1. 行動単体の実利](#6-1-行動単体の実利)\n- [6-2. 機会費用](#6-2-機会費用)\n- [6-3. 秘密との因果関係](#6-3-秘密との因果関係)\n- [6-4. 複数解釈](#6-4-複数解釈)\n- [6-5. 行動変更への変換](#6-5-行動変更への変換)\n- [6-6. 利益への変換](#6-6-利益への変換)\n- [6-7. 答え合わせ](#6-7-答え合わせ)\n- [原則1](#原則1)\n- [原則2](#原則2)\n- [原則3](#原則3)\n- [原則4](#原則4)\n- [原則5](#原則5)\n\n<!-- /TOC -->\n\n---\n\n## ―― シグナル行動には、本人の実利を内蔵する\n\n作成日：2026年7月19日  \n対象：オリジナルボードゲーム制作プロジェクト\n\n---\n\n# 1. 結論\n\n情報系・心理戦系のゲームでは、他者に情報を伝える行動を用意するだけでは不十分である。\n\n> **観察される行動は、情報発信のために行うのではなく、まず本人に実際の得点・資源・取得物・勝利上の利益を与える行動でなければならない。**\n\nその結果として、本人の選好や判断が行動へ自然に表れ、他者がそれをシグナルとして読む構造が強い。\n\nこの原則を、本書では次のように呼ぶ。\n\n> **利得内蔵シグナル**  \n> Payoff-bearing Signal\n\n---\n\n# 2. なぜ「本人に実際の得点を与える行動」が重要か\n\n情報を伝えるためだけの行動には、次の問題が起きやすい。\n\n- 情報を伝える合理的な理由が弱い\n- 発信しない方が有利になる\n- 嘘やノイズを混ぜるコストがない\n- 行動と本人の本当の選好が結びつかない\n- 他者が観察しても、何を意味するのか分からない\n- 情報を得ても、次の選択が変わらない\n\n一方、本人へ直接の利益を与える行動は、次の性質を持つ。\n\n1. **プレイヤーが自然に選ぶ**\n2. **選好や内部状態と因果的につながる**\n3. **別の選択肢を捨てるため、コミットになる**\n4. **他者に観察する価値が生まれる**\n5. **読みが当たったか、後で検証できる**\n6. **情報を使わなくても、ゲーム上の行動として成立する**\n\n重要なのは、\n\n> 「情報を送るために得点行動を付ける」\n\nことではない。\n\n正しい順序は、\n\n```text\n本人が利益を得るために行動する\n↓\nその行動に本人の選好が反映される\n↓\n他者が行動を観察する\n↓\n他者が選好を推測する\n↓\n他者の次の選択が変わる\n```\n\nである。\n\n---\n\n# 3. 『魔女の調合』で成立した構造\n\n『魔女の調合』では、プレイヤーが坩堝を選ぶ行動に二つの役割がある。\n\n## 本人にとっての役割\n\n- 自分の秘密の好みに合う素材を得る\n- 実際に自分の得点を得る\n- 他の坩堝を取る機会を放棄する\n\n## 他者にとっての役割\n\n- その人が何を欲しがっているかを推測する材料になる\n- 次の儀式で切り方や残す坩堝を変える理由になる\n\nつまり、坩堝選択は、\n\n> **本人に実際の得点を与える行動であると同時に、秘密の好みを不完全に表す証拠である。**\n\nプレイヤーは「好みを伝えるため」に坩堝を選んでいるのではない。\n\n自分の得点のために選んだ結果として、好みが行動へ漏れ出している。\n\nこの順序が重要である。\n\n---\n\n# 4. 単なる情報発信との違い\n\n## 弱い構造\n\n```text\n情報を伝えるボタンを押す\n↓\n相手が意味を推測する\n```\n\n問題：\n\n- 押す利益がない\n- 押さない方が情報を隠せる\n- 嘘をつくコストがない\n- 発信理由がゲーム上の利益と結びつかない\n\n## 強い構造\n\n```text\n得点・取得・生存・順位のために行動する\n↓\nその行動が本人の内部状態を反映する\n↓\n相手が副産物として情報を得る\n```\n\n強み：\n\n- 行動が自然に発生する\n- シグナルがゲームの外付け機能にならない\n- 行動のコストが信頼性を生む\n- 読む側も「なぜその選択をしたか」を考えられる\n- 読みと通常プレイが分離しない\n\n---\n\n# 5. 過去作との対比\n\n## 『影の賽』\n\n「同じサイコロを何度も調べる」ことを、サイコロへの高評価のシグナルと想定した。\n\nしかし実際には、\n\n> 何度も調べている  \n> ＝まだ判断できていない\n\n可能性が高く、選好のシグナルとして論理的に成立しなかった。\n\n調査行動そのものが本人へ最終利益を与える取得行動ではなく、選好と直接結びついていなかった。\n\n---\n\n## 『影の競り』\n\n入札は本人に落札利益を与えるため、利得内蔵シグナルの条件を一部満たしている。\n\nただし高い入札には、\n\n- 見えた面が高い\n- 私的価値が高い\n- 共通価値が高いと思った\n- 楽観的である\n- 資金を使ってよい局面だった\n- 相手を降ろしたい\n- 誤読している\n\nなど複数の原因が混在した。\n\nさらに読みを使って追うと、\n\n- 価格が上がる\n- 情報利益が価格へ吸収される\n- 前半に資金を失う\n- 後続機会を逃す\n\nため、推定精度が勝利利益へ十分に残らなかった。\n\nここから得られる補足原則は、\n\n> **本人に実利があるだけでは足りない。  \n> その実利と、読み取らせたい秘密概念が強く結びついている必要がある。**\n\n---\n\n## 『遅信』\n\n古い情報を復元することはできたが、復元結果が一意の行動を示した。\n\n情報は存在したものの、情報以前の葛藤が弱く、行動を選ぶ余地がなかった。\n\n---\n\n## 『共犯』\n\n投入量は報酬順へ影響したため利得行動だったが、深海版ではゲームを成立させるため毎回最大値を出す必要があり、実質的な選択が消えた。\n\n利得内蔵シグナルが成立するには、\n\n> **複数の投入量が、状況によって合理的に選ばれる**\n\n必要がある。\n\n形式上の選択肢だけでは不足する。\n\n---\n\n# 6. 利得内蔵シグナルの成立条件\n\n次の条件をすべて確認する。\n\n## 6-1. 行動単体の実利\n\n観察者が存在しなくても、その行動には本人にとって意味があるか。\n\n- 得点を得る\n- 品物を取得する\n- 資源を守る\n- 将来の行動権を確保する\n- 危険を避ける\n- 勝利条件へ近づく\n\nこれがない場合、行動は人工的な情報発信になりやすい。\n\n---\n\n## 6-2. 機会費用\n\nその行動によって、他の選択肢を失うか。\n\n- 別の品物を取れない\n- 資金を消費する\n- 手番を使う\n- 情報を公開する\n- 将来の能力を失う\n- 撤退できなくなる\n\n失うものがなければ、シグナルの信頼性は弱い。\n\n---\n\n## 6-3. 秘密との因果関係\n\nその行動は、本当に読み取らせたい秘密と結びついているか。\n\n良い例：\n\n> 火素材を欲しい人ほど、火を含む坩堝を選ぶ理由が強い。\n\n悪い例：\n\n> 何度も調べた人ほど、その対象を欲しがっているはずだ。\n\n後者は「欲しい」ではなく「分からない」を示している可能性がある。\n\n---\n\n## 6-4. 複数解釈\n\n行動から完全な答えが一意に出ないか。\n\n『魔女の調合』で火を含む坩堝を選んだ理由は、\n\n- 火が欲しい\n- 別素材を避けたい\n- 他人へ別の坩堝を残した\n- 選択順上、それが最善だった\n- 複合条件を狙った\n\nなど複数残る。\n\nこの曖昧さが、逆算計算ではなく人物読みを生む。\n\n---\n\n## 6-5. 行動変更への変換\n\n観察者が読み取った情報によって、次の行動が変わるか。\n\n- 分割位置を変える\n- 取る対象を変える\n- 残す対象を変える\n- 入札上限を変える\n- 協力・撤退の時期を変える\n\n情報を得ても同じ行動になるなら、シグナルはゲーム上無意味である。\n\n---\n\n## 6-6. 利益への変換\n\n読みで変えた行動が、最終的に利益または満足へつながるか。\n\n```text\n観察\n↓\n推測\n↓\n行動変更\n↓\n局所利益\n↓\n資源・後続機会\n↓\n得点・勝率・満足\n```\n\n途中で、\n\n- 価格に吸収される\n- 追加支出で相殺される\n- 後続機会を失う\n- 成功が小さすぎる\n- 本人が成功を認識できない\n\n場合は、情報構造が成立していてもゲームの核にはならない。\n\n---\n\n## 6-7. 答え合わせ\n\n後から、\n\n- 読みが当たったか\n- なぜその行動をしたか\n- 別の行動なら何が起きたか\n\nを確認できる必要がある。\n\n完全な答え合わせが即時に起こると逆算ゲームになることがあるため、公開時期も設計する。\n\n---\n\n# 7. 設計時の最短チェック\n\n新しい情報系ゲームでは、次を数値調整より前に確認する。\n\n- [ ] この行動は、本人に実際の得点・資源・取得物を与えるか\n- [ ] 他人が見ていなくても選ぶ価値があるか\n- [ ] 他の選択肢を失うコミットがあるか\n- [ ] 読ませたい秘密と行動が因果的につながっているか\n- [ ] 同じ行動に複数の合理的理由が残るか\n- [ ] 観察した人の次の行動が変わるか\n- [ ] 行動変更の利益が最終結果まで残るか\n- [ ] 結果公開後に読みの正誤を説明できるか\n- [ ] 複数回遊んでも単純な閾値戦略へ収束しないか\n\n---\n\n# 8. 即時停止条件\n\n次のいずれかが成立した場合、情報量の調整へ進まず構造へ戻る。\n\n- 行動が本人の利益に結びついていない\n- 情報発信のためだけに存在する操作である\n- 行動しない方が有利である\n- 行動と秘密の因果関係が弱い\n- 行動理由の未知変数が多すぎて仮説化できない\n- 情報を得ても次の選択が変わらない\n- 読みを使う方が得点・勝率で不利になる\n- 正確に読めても本人が成功を認識できない\n- 完全情報下では選択肢が一つしかない\n- 情報を隠すことで一択を見えにくくしているだけである\n\n---\n\n# 9. 今後の設計原則\n\n## 原則1\n\n> **情報は葛藤を作るために置かない。  \n> 既に成立している葛藤の、どちらを選ぶべきか分からなくするために置く。**\n\n## 原則2\n\n> **シグナルは専用の発信操作にしない。  \n> 本人が得点・取得・生存のために行う実利行動から自然に発生させる。**\n\n## 原則3\n\n> **行動の実利と、読み取らせたい秘密を因果的に結びつける。**\n\n## 原則4\n\n> **推定精度だけで成功判定しない。  \n> 読みが行動、利益、勝利、満足へ変換される全経路を確認する。**\n\n## 原則5\n\n> **完全情報下でも二つ以上の合理的選択がなければ、情報を隠してはいけない。**\n\n---\n\n# 10. 一文総括\n\n> **強い情報ゲームでは、プレイヤーは情報を伝えるために行動するのではない。  \n> 自分の利益のために行動した結果として、隠れた選好が他者へ漏れ、その漏れを読んだ相手の選択が変わる。**\n\nこの構造が成立したとき、行動、得点、情報、推測、相互作用が一つのメカニクスへ統合される。\n"}, {"id": "影の競り_オンライン版_引き継ぎ資料_md", "file": "影の競り_オンライン版_引き継ぎ資料.md", "title": "影の競り 引継", "sub": "現行プロジェクトの運用文書", "icon": "💎", "md": "# 影の競り — オンライン版 セットアップ＆設計 引き継ぎ資料\n\n`seri.html` v2.0 security candidate は、solo・オンライン対戦・観戦を単一ファイルで提供する。2026-07-14現在はローカル候補であり、main統合、push、GitHub Pages公開、Firebase Rules deployは未実施。\n\n<!-- TOC -->\n## 目次\n\n- [1. 現在の公開状態](#1-現在の公開状態)\n- [2. 入口と正式ルール](#2-入口と正式ルール)\n- [3. solo・C1の互換仕様](#3-soloc1の互換仕様)\n- [4. v2データ構造](#4-v2データ構造)\n- [5. 認証・権限・信頼境界](#5-認証権限信頼境界)\n- [6. 表示安全性](#6-表示安全性)\n- [7. テストとローカル起動](#7-テストとローカル起動)\n- [8. 公開手順の境界](#8-公開手順の境界)\n- [9. 既知の制限](#9-既知の制限)\n- [10. 読み構造の検証結果と次の段階（2026-07）](#10-読み構造の検証結果と次の段階2026-07)\n\n<!-- /TOC -->\n\n---\n\n## 1. 現在の公開状態\n\n- 本番公開中の旧版とv2候補は互換性がない。\n- v2候補の作業ブランチは `fix/seri-v2-security`。\n- P0緊急封鎖は完了済み。v2候補を `boadgame2` へdeployしてはならない。\n- 公開時はPages反映と `firebase/seri_v2_rules.json` のdeployを同日に連続して行う。\n- `firebase.json` の既定Rulesは『魔女の調合』用であり、『影の競り』v2のdeployには専用configを使う。\n\n## 2. 入口と正式ルール\n\n- **solo・C1**：人間1人＋NPC3人、4面、8ラウンド、初期資金34。Firebase AuthとRealtime Databaseを使わない。\n- **オンライン標準**：3人は3面・6ラウンド・資金30、4人は3面・8ラウンド・資金34。\n- **オンラインC1**：3人は3面・6ラウンド・資金28、4人は4面・8ラウンド・資金34。\n- **観戦**：共有情報だけを購読し、プレイ中のprivateと操作UIを持たない。終了後はreveal、順位、履歴を表示する。\n- **series**：廃止。C2/C3などの実験モードはv2候補へ追加しない。\n\nルームコードは6文字。旧4文字コードと旧 `rooms` は使用しない。\n\n## 3. solo・C1の互換仕様\n\nsoloとC1の正本はP0前のコミット `9c99921e5e139a29acf40a5e85b4053038c9b59f`。\n\n- 面の値は各面 `-2..6`。\n- C1の個人価値は「全4面の合計＋本人の盲点面をさらに2回加算」。盲点面は実質3倍。\n- 開始席は `round % 4`。入札は1刻みで、最後に残った者が落札価格を支払う。\n- 得点は残金＋落札した原石の個人価値。資金のある参加者が2人未満、または8ラウンド終了で終局。\n- 同点は席順で安定して表示する。\n- NPCは本人の盲点真値を判断へ使用せず、公開入札と見えている値から判断する。\n- 旧正本に存在したsolo途中保存を、v2専用localStorageキーで維持する。onlineのUID・ルーム・privateとは混在させない。\n\n## 4. v2データ構造\n\n```text\nseriRoomsV2/{6文字コード}/\n  meta       hostUid, phase, n, rounds, money, nc, rule, version, createdAt\n  seats      {seat}: uid, name, lastSeen\n  game       round, phase, price, curSeat, starter, live, lastActionId\n  money      {seat}: number\n  actions    {seat}: id, type, round, price, createdAt\n  private    {uid}: ownerUid, seat, lens, see, hostだけlots\n  history    {round}: winnerSeat, price, values, createdAt\n  reveal     lenses, createdAt\n```\n\n`totals`、`fired`、`series` は保存しない。C1の `see/{round}` はカンマ区切りで、本人の盲点1面だけを `x` とし、それ以外を数値で持つ。\n\n## 5. 認証・権限・信頼境界\n\n- Firebase匿名認証の `auth.uid` を席所有者IDにする。localStorageの自己申告値を権限に使わない。\n- プレイヤーは自UIDの `private/{uid}` だけを読める。ホストは進行・採点のため全privateを読める信頼主体。\n- 一般プレイヤーは自席 `actions/{seat}` だけを書き、game・history・revealを直接変更しない。\n- 観戦者と非着席者はgame/actions/seats/privateへ書き込めない。\n- Rulesは許可フィールド、型、文字数、値域、人数別設定、席所有、ホスト権限を検証する。\n- ホスト不在中は採点と進行を停止し、同一匿名UIDの再接続後に再開する。\n- 匿名認証は本人確認ではなく、ブラウザプロファイル単位の識別である。\n\n## 6. 表示安全性\n\n- DB値、プレイヤー名、NPC名、履歴は `createTextNode`／`textContent` 相当の安全なDOM APIで表示する。\n- `innerHTML` へユーザー入力やDB値を連結しない。\n- 観戦者はプレイ中の盲点、個人価値、他人のprivateを表示しない。\n- 本番URLで `?emulator=1` を付けても、localhost／127.0.0.1以外ではEmulatorへ接続しない。\n\n## 7. テストとローカル起動\n\n```powershell\nnpm ci\nnpm run test:seri-v2-static\nnpm run test:seri-solo-c1\nnpm run test:seri-v2-rules\n```\n\nブラウザ受入は同一オリジンに対し、独立BrowserContextまたは独立プロファイルを使用する。各環境の匿名UIDが異なることを確認する。Rules受入は本番と同じ `boadgame2-default-rtdb` namespaceになるよう、`npm run emulators:seri-v2` を使用する。\n\n2026-07-14のローカル受入では、solo 8ラウンド、標準3人＋観戦6ラウンド、C1 4人＋観戦8ラウンド、ホスト／プレイヤー再接続、Permission denied、保存型XSS代表入力を確認済み。これは本番公開の承認ではない。\n\n## 8. 公開手順の境界\n\n1. 作業ツリーと対象コミットを固定し、全自動テストを再実行する。\n2. 明示承認後にmainへ統合し、pushする。\n3. Pagesでv2反映を確認する。\n4. 対象Firebaseプロジェクトが `boadgame2` であることを再確認する。\n5. 匿名認証を確認し、`firebase/seri_v2_rules.json` を変更せずdeployする。\n6. 独立UIDで本番スモークテストを行う。\n\n公開前にpush、main統合、Rules deploy、本番DB書込みを行わない。\n\n## 9. 既知の制限\n\n- ホストは全原石と全privateを読める。\n- ホスト不在中は採点とラウンド進行が停止する。\n- Rulesで許可された本人actionsの範囲まで、悪意ある着席プレイヤーの全操作を排除するものではない。\n- v2は旧 `rooms`、4文字コード、旧キャッシュと非互換。\n- GitHub管理画面のSecurity設定は、管理者ログイン状態で別途確認する。\n\n## 10. 読み構造の検証結果と次の段階（2026-07）\n\n観測位置の公開方法A（現行非公開）・B・B-lite・B-historyを比較し、標準4人卓を中心に600,000ゲームを検証した。続いて読み利益の原因分解90,000ゲームと、私的価値倍率×位置公開の2×2要因検証80,000ゲームを実施した。\n\n- Bは推定精度を改善したが、局所利益・最終得点・勝率へ十分変換されなかった。\n- B-liteは平均1.86個目で全員の位置が判明し、ほぼ早期B化した。\n- B-historyで全位置に十分な履歴が揃ったゲームは44.4%で、情報が遅く弱かった。\n- B2、B3、A2は採用しない。現行A3を維持する。\n- 位置公開には小さな局所改善があったが、十分な利益や2倍時に特に強くなる交互作用はなかった。\n- 以前の**現行A混合卓ではS2が勝率29.36%・平均得点41.94で最高**だったが、今回のA3では再現しなかった。履歴読みの優位は実装・対戦構成に敏感で、頑健性未確認。\n- 2倍化は勝率だけでなく、平均得点・落札利益の低下、過払い率上昇、私的価値余剰の縮小も併記する。\n- 負のシグナルから悪石を避ける経路は、人間テスト対象の低リスクな仮説として残る。\n\n次は現行A3・標準4人・同じメンバーで3～5戦する人間プレイテスト。詳細は観測位置公開、読み利益変換、私的価値倍率、負のシグナル読みの各報告書を参照する。\n"}, {"id": "魔女の調合_オンライン版_引き継ぎ資料_md", "file": "魔女の調合_オンライン版_引き継ぎ資料.md", "title": "魔女の調合 引継", "sub": "現行プロジェクトの運用文書", "icon": "🧪", "md": "# 魔女の調合 オンライン版 — セットアップ＆設計 引き継ぎ資料\n\n`witch.html` は、Firebase Realtime Database を使った実オンライン対戦版。\n**対戦・ソロ検証・観戦・ルール説明が単一ファイルに統合**されている（二重管理の解消）。\n\n---\n\n<!-- TOC -->\n## 目次\n\n- [1. Firebase セットアップ（初回のみ・10分）](#1-firebase-セットアップ初回のみ10分)\n  - [1-1. ローカルEmulator受入試験](#1-1-ローカルemulator受入試験)\n- [2. 遊び方（プレイヤー視点）](#2-遊び方プレイヤー視点)\n- [3. 状態スキーマ（Firebase `roomsV2/{CODE}/`）](#3-状態スキーマfirebase-roomsv2code)\n- [4. 設計上の要点（前作の教訓の組込み先。教訓#1〜7 = 「実装技術知見」§2）](#4-設計上の要点前作の教訓の組込み先教訓17--実装技術知見2)\n- [5. 🔑 逆算対策＝B方式（チーム合計のみ公開）](#5--逆算対策b方式チーム合計のみ公開)\n- [6. 好みプール＝V3（発火率再調整済み）](#6-好みプールv3発火率再調整済み)\n- [7. 上級ルール＝秘伝枠（任意・設計論で穴を検証済み）](#7-上級ルール秘伝枠任意設計論で穴を検証済み)\n- [8. 工房の記録（表示切替）と名場面](#8-工房の記録表示切替と名場面)\n- [9. シミュレーションでは見えない、人間テストで確かめる層](#9-シミュレーションでは見えない人間テストで確かめる層)\n- [10. 既知の制限・今後](#10-既知の制限今後)\n- [11. v1.3 公開移行 ― 現状とカットオーバー手順](#11-v13-公開移行--現状とカットオーバー手順)\n  - [現状](#現状)\n  - [★ 最終ルールを先に適用してはいけない](#-最終ルールを先に適用してはいけない)\n  - [カットオーバー順序（この順を守る）](#カットオーバー順序この順を守る)\n- [12. ソロモード検討（NPC方策計測 v1〜v3 → タイプ開示方式への転換・2026-07）](#12-ソロモード検討npc方策計測-v1v3--タイプ開示方式への転換2026-07)\n  - [経緯（要約）](#経緯要約)\n  - [NPCタイプ3種の固定（v3計測済み組のみから構成・パラメータ変更禁止）](#npcタイプ3種の固定v3計測済み組のみから構成パラメータ変更禁止)\n  - [確定済みの設計裁定](#確定済みの設計裁定)\n  - [プロトタイプの位置づけ（人間テストで役目を終えた・参照専用）](#プロトタイプの位置づけ人間テストで役目を終えた参照専用)\n  - [witch.html本体実装（v1.5・`NSOLO`/`nsolo*`）](#witchhtml本体実装v15nsolonsolo)\n  - [成果物の所在](#成果物の所在)\n\n<!-- /TOC -->\n\n---\n\n## 1. Firebase セットアップ（初回のみ・10分）\n\n1. https://console.firebase.google.com/ で無料プロジェクトを新規作成\n2. 左メニュー「Realtime Database」を作成（**テストモード**でOK・ロケーションは近い地域）\n3. **「Authentication」→「Sign-in method」→「匿名」を有効化**（v1.2以降は必須）\n   - 無効のままだと、オンラインの全入口（作る／参加する／観戦する）で「匿名認証に失敗しました」の赤バナーが出る\n4. Realtime Database の「ルール」タブに **`firebase/witch_rules.json`** の中身を貼って公開：\n   - **公開前セキュリティ完成版（v1.3）**：`roomsV2/{6文字コード}` を使い、共有ノードは認証済みユーザーだけが読む。好みは `privateRecipes/{uid}` に分離し、本人とホスト以外は読めない。\n   - `game` は着席者だけ、`reveal` はゲーム終了後のホストだけが書ける。席は「空席への本人着席／自席更新／開始前のホストによる席詰め」に限定する。\n   - 旧 `rooms/{4文字}` は最終ルールでは読書きとも拒否される。\n   - 簡易設定（非推奨・旧）：`{ \"rules\": { \".read\": true, \".write\": true } }` はDB全体が無制限開放になるため使わない。\n5. 「プロジェクト設定 → 全般 → マイアプリ」で **ウェブアプリを追加**\n6. SDK設定で **「Config」を選択**（npm/CDNではない）。`const firebaseConfig = {...}` の中身が出る\n7. その中身を、`witch.html` 冒頭の **`FIREBASE_CONFIG`** に貼る\n   - **重要**：変数名は `FIREBASE_CONFIG` のまま。`firebaseConfig` に変えると動かない\n8. ファイルを GitHub Pages か Netlify Drop に置く\n   - Netlify は **ファイル名を `index.html`** にリネームしてからアップロード\n   - 更新時は Netlify の「Deploys」から再アップロード（新規Dropは別URLになる）\n\n未設定のまま開くと、画面に「Firebase未設定」と出る（ローカルで開いても同じ）。\n**ソロモードはFirebase不要**で動く（ホーム画面から直接遊べる）。\n\n### 1-1. ローカルEmulator受入試験\n\n本番Firebaseへ接続せず実ゲームHTMLを試験する場合は、リポジトリ直下で `npm run emulators:witch` を実行する。Authentication Emulatorは9099、Realtime Database Emulatorは9150で、クライアント設定と同じ `balance-simulator-firebase` プロジェクトIDを使う。ルール単体試験の `witch-rules-test` とは用途を分ける。別ターミナルからローカルHTTPサーバーを起動し、`http://127.0.0.1:<port>/witch.html?emulator=1` を開く。`file://`では試験しない。\n\nEmulator接続は `?emulator=1` と、hostnameが `localhost` または `127.0.0.1` であることの両方を満たす場合だけ有効になる。接続時は画面右上に `LOCAL EMULATOR` を表示する。本番ドメインへ `?emulator=1` を付けてもEmulatorへは接続しない。\n\n---\n\n## 2. 遊び方（プレイヤー視点）\n\nホーム画面に5つの入口がある：\n\n- **🚪 部屋を作る（ホスト）**：名前を入れて「部屋を作る」→ 合言コード（6文字）が出る → 仲間に伝える → 3〜4人揃ったら儀式数・上級モードの有無を選んで「開始」\n- **参加する**：名前を入れて合言コードを入力\n- **🎭 ひとりで遊ぶ（NPC対戦）**：Firebase不要。人間1人＋NPC2体（3人固定・6儀式）。NPCの性格タイプ\n  （世話焼き/欲張り/気分屋）は対戦前から常時表示。本番と同じくチーム合計のみ公開（B方式）。詳細は§12\n- **🧪 ソロで試す**：Firebase不要。1人で全席を操作する検証モード。全員の好み・全個人点を常時表示（本番のB方式とは別に、確認用に全部見える）\n- **👁 観戦する**：合言コードで席に着かず入室。プレイ中は共有盤面だけを見られ、好み・個人点・発火状況は見えない。ゲーム終了後に `reveal` が作成されると全好み・個人点・名場面を見られる。書き込み権限はない\n\n対戦中は、手番が来たら操作（切り役＝分ける、手番＝坩堝を選ぶ）。それ以外は待機。**無言で**遊ぶのが本体。\n右上の **❓ ボタン**でルール説明（用語ツールチップ付き）がいつでも開ける。\n\n---\n\n## 3. 状態スキーマ（Firebase `roomsV2/{CODE}/`）\n\n- `meta`：`{host:uid, phase:\"lobby\"|\"playing\"|\"ended\"}`\n- `seats/{0..3}`：`{uid, name, lastSeen, online}`（生存報告）\n- `privateRecipes/{uid}`：`[好みID×3]`（本人とホストだけが読める。通常プレイヤーは常に自分のUID配下だけを購読。上級モードは通常枠2＋秘伝枠1）\n- `game`：`{n, rounds, round, cutter, teamTotal, phase, band, cuts, assign, chooseIdx, roundEval, history}`\n  - `game.phase`：`cut → choose → await_score → score →`（次の儀式）`cut` または `end`\n  - `roundEval`：`{roundScore, omni, rational, pct}` — **個人点(totals)は含まない**（B方式・下記§5参照）\n  - `history[]` の各儀式：`{round, cutter, contents, roundScore, omni, rational, pct, cutPct, band, cuts, piles, owners}`\n    - `cutPct`：**切り方そのものの質**（後述§7）。個人点は含まない\n    - `band`/`cuts`：名場面の再現用に、その儀式の帯と切れ目を保存\n- `reveal/{席}`：`game.phase === \"end\"` 後にホストだけが `privateRecipes` を席番号へ対応させて公開する。終了画面はここから個人点・名場面を再計算する\n\n`roomsV2/{CODE}` の親には `.read` を置かない。`meta` / `seats` / `game` / `reveal` は各ノードで共有読取を許可し、`privateRecipes` はホストだけが親読取、本人だけが自UID子ノード読取を持つ。\n\n---\n\n## 4. 設計上の要点（前作の教訓の組込み先。教訓#1〜7 = 「実装技術知見」§2）\n\n| 教訓 | 実装 |\n|---|---|\n| #1 read-modify-write競合 | 全状態変更を **Firebase transaction** で原子的に。手元stateは直書きしない |\n| #2 権限チェック | `confirmCut`(切り役のみ)・`pickPile`(手番のみ)・`startGame`(ホストのみ)。クライアント入口＋transactionに加え、Firebaseルールで未着席者の `game` 書込みを拒否 |\n| #3 秘匿の構造漏洩 | プレイ中は**自UIDの好みしか購読しない**。他人の好み・発火内訳・**個人点も一切**DBに出さない（下記§5 B方式）。全好みを読めるのは採点・終了公開を担うホストだけ |\n| #4 幽霊対策 | 12秒ごとの生存報告 + `onDisconnect` + 30秒タイムアウト（`seatActive`） |\n| #5 同期鮮度 | Firebase接続状態 +「最終同期 n秒前」を常時表示 |\n| #6 リトライ | 全通信を `withRetry`（1回失敗→0.7秒→再試行）で共通化 |\n| #7 エラー可視化 | 握りつぶさず、画面上部の赤バナー（`showError`）に表示 |\n\n**採点の権威（resolver）**：最終選択で `phase=await_score` になると、ホストだけが全好みを一度だけ読んで採点し、transaction で `phase=score` にする。ホスト不在中は「進行役の再接続を待っています」と表示して停止し、再接続時に同じ `phase === \"await_score\"` ガードから再開する。二重採点はtransactionのphaseガードで防止。\n\n**再接続**：Auth永続性を `LOCAL` に設定し、ゲーム識別子・部屋コード・参加種別・最後の席だけをlocalStorageへ保存する。本人確認に保存UIDは使わず、認証確定後の `auth.uid` と `seats` のUIDを毎回照合する。同じブラウザプロファイル・同じ匿名UIDなら開始後も元の席と名前、ホスト権限、自分の好み購読へ復帰する。別プロファイルやストレージ削除後は別UIDになり、開始済みルームへ新規プレイヤーとして途中参加できない。観戦復帰は共有ノードだけを購読し、`privateRecipes` を購読しない。\n\n---\n\n## 5. 🔑 逆算対策＝B方式（チーム合計のみ公開）\n\n**背景**：個人点を毎儀式正確に公開すると、盤面と照らして「発火した好みの組み合わせ」が数手で一意に絞られ、6儀式でほぼ好みが公開状態になることがシミュレーションで判明した（点数方式をどう変えても、点を揃えても1点固定にしても効果は薄い。真因は「盤面＋正確な個人点」を毎回見ること自体の情報量）。\n\n**対策**：**個人点はDBに一切保存しない**。公開は `roundEval.roundScore`（チーム合計）・`omni`・`rational`・`pct` のみ。各自の点は、各クライアントが**自分の好み＋自分の坩堝からローカル計算**する（`scorePile(ST.myRecipes, myPile)`）。他人の坩堝は「◯◯が受け取った」とだけ表示（点は出さない）。\n\n**効果**（シミュレーション実測）：3人・6儀式後、観測者が対象の手札候補を絞れる数\n- 個人点を全公開（旧方式）：約7通り（ほぼ特定）\n- **チーム合計のみ（B方式）：約438通り（読めるが特定不可）**\n\n> 【注記 2026-07-15】上記の約7通り／約438通りという数値は、現行実装（V3プール）では再現しない。\n> リバランス前の旧プールに対する値だった可能性が高い。現行実装での再計算値と検証手法は\n> `sim/witch_privacy/魔女の調合_秘匿性数値再現_結果.md` を参照。定性的結論（チーム合計のみの公開は\n> 個人点全公開より秘匿性が高い）は現行実装でも支持される。\n\n読みの手がかりは「相手がどう切ったか」「どの塊を選んだか」という**行動**に一本化される。これは検証の結果、「発火個数のみ公開」等の中間案よりも効果的だった（個数を出しても選択情報と組み合わさるとほぼ特定できてしまうため）。\n\n**終了後は解除**：`reveal` ノードで全好みが公開されるため、終了画面では個人点・名場面ともに表示してよい（プレイ中のみ隠す設計）。\n\n---\n\n## 6. 好みプール＝V3（発火率再調整済み）\n\n初期プール（隣接・個数固定2）は、切り役が「タイルを並べ替えられず切るだけ」という制約下では、隣接が運ゲー（達成可能率35.7%止まり）、個数が達成困難（44%止まり）という欠陥があった。V3で全型を「腕で狙えば達成可能」75〜100%に再設計済み。\n\n| 型 | 定義 | 点 | 3人達成可能率 |\n|---|---|---|---|\n| 🤝 同居 pair | XとYが同じ坩堝 | +4 | 79.7% |\n| 🔢 個数 cnt2 | Xを2つ以上、またはYを2つ以上 | +5 | 75.1% |\n| 1️⃣ 単体 solo | Xをちょうど1つ | +3 | 90.5% |\n| ⛔ 二種忌避 abs2 | XとYを両方入れない | +3 | 100% |\n| 🚫 忌避 abs | Xを入れない | +2 | 100% |\n\n18枚・各型を上記比率で構成。NPC冴え（合理）：3人86.2%／4人82.1%。称号閾値（大魔女92/熟達82/一人前70/見習い58/駆け出し）は据え置きで機能。\n\n配布制約 `dealConflicts`：「入れたい素材」と「入れたくない素材」が同一人物に配られないよう保証。\n\n---\n\n## 7. 上級ルール＝秘伝枠（任意・設計論で穴を検証済み）\n\n**内容**：上級モードでは各自の好みが「通常枠2枚＋🌟秘伝枠1枚」になる。秘伝枠は「Xを2つ以上、かつYを入れない」の複合条件・**+10点**・達成困難（3人34%前後、4人50%前後で6種とも均一）。\n\n```\n🔥火竜2つ以上+🐍蛇毒なし／🍄影茸2つ以上+🌙満月草なし／✨星屑2つ以上+❄️霜結晶なし\n❄️霜結晶2つ以上+🍄影茸なし／🌙満月草2つ以上+✨星屑なし／🐍蛇毒2つ以上+🔥火竜なし\n```\n\n**設計検証**（方法論編の観点で全て確認済み）：\n- 上位互換でない：EV≈3.4〜5.0が安全枠EV≈3.2〜3.6と拮抗し、真の二択として機能\n- 配布バランス：omni天井は通常とほぼ不変（18.1→18.5）\n- 達成率の均一性：単一テンプレート（cnt+abs型）に統一したことで3人・4人とも数pt以内に収束（当初は型混在で26〜63%とばらついていたため統一した）\n- 難易度上昇を実証：合理NPC冴え 通常83%台→上級72%（3人）／79%→67%（4人）\n- omni評価は高難度枠も自動的に織り込むため、評価式の変更は不要だった\n\n`dealAdvanced(n)` が通常枠と秘伝枠の配布制約（矛盾回避＋フォールバック）を担う。\n\n---\n\n## 8. 工房の記録（表示切替）と名場面\n\n- **工房の記録**：全儀式のミニ盤面を振り返れる。🔀ボタンで「帯の並び順（切り方・読みの主材料）」⇄「魔女順（A→B→C固定・追いやすさ優先）」を切替可能。魔女順では塊の隣接関係が失われるため、切れ目の光る演出は消している。プレイ中・終了後の両方で見られる（プレイ中は個人点非表示、終了後は個人点も表示）。\n- **✨ 語り継がれる調合（名場面）**：終了画面で、各自が調合師だった儀式のうち「切り方の質」が最も高かった1回を紹介する。\n  - **切り方の質**＝ `bestForCut(band, cuts, players) ÷ omniMax(band, players)`。その切り方に対して全員が最適に選択した場合のチーム点で測るため、**選ぶ側のミスに影響されない**（切り役の切り方そのものを純粋に評価）。omniで正規化するため局面の難易度にも依存しない。\n  - 表示は**物語主体・ベストのみ・数字（%）は出さない**：「沈黙のうちに◯◯の望みを見抜き、〈好み〉を叶えた」という叙述のみ。協力ゲームでの個人比較・戦犯化を避けるための意図的な設計（ワーストは一切出さない）。\n  - 「叶った好み」はDBに保存せず、終了時に `reveal` の好みから再計算する（B方式の秘匿を維持したまま実現）。\n\n---\n\n## 9. シミュレーションでは見えない、人間テストで確かめる層\n\n数値・バランス・評価の健全性はシミュレーションで検証済み。オンラインで**実際に人間と無言で回して初めて分かる**のは：\n\n1. **無力感**：最悪の坩堝を取らされる悔しさが、面白さになっているか\n2. **吊るし上げ**：切り役が読み違えたときの空気\n3. **無言のもどかしさ**：伝えたいのに伝えられない緊張が、心地よいか苦痛か\n4. **他人予想の解読感**：回を重ねて仲間の好みが「読めてくる」実感が、実際に起きるか\n5. **秘伝枠の手触り**：達成率35%前後という数字が「悔しいけど狙える」に感じるか「無理ゲー」に感じるか\n6. **名場面の空気**：個人のベストを称える表示が、協力ゲームの空気を壊さないか\n\nここが良ければ設計は成功。ダメなら、儀式数・素材数・好みの型の比率・秘伝枠の点数などを調整する（ロジックはすべてシミュレーションで再検証可能）。\n\n---\n\n## 10. 既知の制限・今後\n\n- 「もう一度」は部屋を出て作り直し（同一部屋での連戦は未実装）\n- **公開前セキュリティ完成版（v1.3）**：匿名認証＋6文字コード＋UID別 `privateRecipes`＋着席者だけの `game` 書込み＋終了後ホストだけの `reveal` を実装。ルール自動テストは `tests/witch_rules.test.mjs`。\n- **ホストは全好みを知りうる**：配布・採点・終了公開を担うゲームマスターとして信頼する。ホストからの完全秘匿は対象外。\n- **ホスト不在中は採点が停止する**：`await_score` のまま待機し、ホスト再接続後に一度だけ再開する。\n- **再接続は同一プロファイル・同一匿名UIDが条件**：別プロファイル、サイトデータ削除後、認証状態を引き継がないブラウザでは新UIDとなる。開始後の新UIDは空席へ入れず、観戦だけが可能。\n- **招待された着席プレイヤーによる悪意ある直接操作を完全には防いでいない**：未着席者・観戦者は `game` を書けないが、着席者は共有ゲーム状態を書ける信頼境界が残る。クライアントの手番ガードとtransactionは誤操作・競合防止であり、悪意ある着席者への完全防御ではない。\n- 上級モード（秘伝枠）はソロ・オンライン双方に実装済み。難易度・値付けは実プレイのフィードバック次第で調整余地あり\n\n---\n\n## 11. v1.3 公開移行 ― 現状とカットオーバー手順\n\n### 現状\n\n| 要素 | 状態 |\n|---|---|\n| ローカルの `witch.html` | **v1.3 実装済み**（`roomsV2`・UID別好み・ホスト採点・6文字コード） |\n| `firebase/witch_rules.json` | **最終版作成済み・コンソール未適用**（旧 `rooms` は拒否） |\n| Firebase コンソールの匿名ログイン | **有効化済み** |\n| 本番（GitHub Pages）の `witch.html` | **v1.2**。v1.3は未push |\n\n### ★ 最終ルールを先に適用してはいけない\n\n本番v1.2は旧 `rooms/{4文字}` を使うため、先に最終版 `witch_rules.json` を適用すると旧部屋が即座に読書き不能になる。v1.3は `roomsV2/{6文字}` だけを使い、旧部屋との互換性はない。\n\n### カットオーバー順序（この順を守る）\n\n| # | 作業 | 本番への影響 |\n|---|---|---|\n| 0 | コンソール → Authentication → 匿名ログインが有効か再確認 | 無効ならオンライン入口が停止 |\n| 1 | ローカルでFirebase Emulatorを起動し、ルール自動テストと3人＋観戦の多窓完走を実施 | 本番影響なし |\n| 2 | 誰も遊んでいない時間帯を確保し、進行中の旧 `rooms/` がないことを確認 | 旧部屋は移行しない |\n| 3 | v1.3をpushしてPages反映を確認 | この時点ではコンソールの旧ルール次第で `roomsV2` が拒否されるため、新規対戦は開始しない |\n| 4 | Realtime Databaseの「ルール」に最終版 `firebase/witch_rules.json` を貼り、公開 | `roomsV2` が有効化、旧 `rooms` は拒否 |\n| 5 | 本番で3人＋観戦のスモークテストを行い、他人の `privateRecipes` と観戦者の書込みが Permission denied になることを確認 | 公開確認 |\n\n旧 `rooms` のデータは削除しなくても最終ルールから到達不能になるが、コンソール上には残る。不要なら移行完了後に人間が削除する。旧4文字コードはv1.3では入力できず、旧キャッシュのv1.2クライアントは最終ルール適用後に Permission denied になる。キャッシュ解除と `?v=1.3` 導線はあるが、進行中の旧卓は救済されない。\n\n**運用メモ:** 匿名アカウントは溜まる。自動クリーンアップ（30日で自動削除）は\nFirebase Authentication with Identity Platform へのアップグレードが必要なため、現時点では未設定。\n友人内プレイの規模では実害はない。\n\n---\n\n## 12. ソロモード検討（NPC方策計測 v1〜v3 → タイプ開示方式への転換・2026-07）\n\n**v1.5でwitch.html本体に実装済み。** ホーム画面「🎭 ひとりで遊ぶ（NPC対戦）」から遊べる。\n人間テスト（プロトタイプ・タイプ表示ON・3ゲーム）を事前登録済みkill/keep条件に照らして判定し、\n(a)タイプ活用感3/3・(b)退屈な確信0/3・(c)継続意欲「思う」の3条件すべて成立で**KEEP**（実装フェーズへ移行）\nと判定された（判定基準は`sim/witch_solo_npc/事前登録_witch_ソロ人間テスト_killkeep条件.md`）。\n理論的な背景（方策既知NPCの透明性、行動/評価ノイズの非対称性など）は\n`docs/ボードゲーム設計論_理論編.md` §3-13 を参照。\n\n### 経緯（要約）\n\nプレイヤー1＋NPC2のソロモードで「NPCの手札を解読する楽しさ」が成立するかを、\nNPC方策のパラメータ（softmax温度による行動ノイズ）を変えながらシミュレーションで検証した\n（v1: 15組、v2: A3基準を置換して12組）。いずれも「早期に特定されすぎない」ことと\n「最終的にNPCとして機能する（チーム性能が崩壊しない）」ことを両立できず、\n事前登録済みの撤退条件が発動。行動ノイズの代わりに評価値ノイズ（気まぐれカードによる\n疑似好みバイアス）を使う方式（v3: 8組）に切り替えたが、こちらも「解読の楽しさ」自体は\n成立しなかった（詳細・数値は `sim/witch_solo_npc/` 配下の各結果MD参照）。\n一方、「タイプの一貫性に応じてNPCが反応する」という機能的価値は3方策族すべてで頑健に\n成立したため、design chatは**「NPCの性格タイプを対戦前から開示する」方式**に転換した。\n\n### NPCタイプ3種の固定（v3計測済み組のみから構成・パラメータ変更禁止）\n\n| タイプ | 表示名 | λ | q | w | τ |\n|---|---|---|---|---|---|\n| 世話焼き | ミラ | 0.65 | 1 | 0.5 | 0.3 |\n| 欲張り | ゾラ | 0.8 | 1 | 0.5 | 0.3 |\n| 気分屋 | ルゥ | 0.65 | 2 | 1.0 | 0.3 |\n\nこのパラメータ組はv3計測（`sim/witch_solo_npc/魔女の調合_ソロNPC方策_計測結果_v3.md`）で\nD（能力下限）・B1（読まれる甲斐）を実測済みの組み合わせに限定している。\n**値の変更は計測による保証の範囲外に出るため禁止。**\n\n### 確定済みの設計裁定\n\n- **v1.1裁定**：切り役の意思決定にλ（自己利益/チーム利益の混合）は適用しない\n  （チーム期待値のみで評価。協力ゲームの切り役の合理行動として妥当と判断）。\n  チーム合計を用いた信念更新は、他プレイヤーの得点分布の畳み込み近似を使う\n  （joint厳密解ではないが、相対比較目的では判断を歪めないと確認済み）\n- **人間プレイヤーの信念更新モデル**：NPCがプレイヤーの手札を推定する際の尤度計算には、\n  「一貫プレイヤー」定義（λ=1.0・気まぐれ無し・τ=0.3）を仮定として流用する\n  （design chat承認済み。プレイヤー自身は実際にはこの方策に従わないが、\n  NPCの意思決定に必要な近似としての位置づけ）\n\n### プロトタイプの位置づけ（人間テストで役目を終えた・参照専用）\n\n`proto/witch_solo_proto.html` は人間テスト用に作った**使い捨てプロトタイプ**。Firebase不使用・\nwitch.html本体とは無関係の単一HTMLファイル。NPC2体は**異なるタイプから選出する制約**があり\n（同一タイプ2体は不可）、「タイプ表示」トグルで性格情報の表示/非表示を切り替えられる\n（人間テストでの比較用。本体には表示トグルは搭載していない＝常時表示）。NPC方策・推定エンジンは\nPython版（`sim/witch_solo_npc/`）からJS移植し、固定シード3ケース・6儀式フルの同値性検証で\n完全一致を確認済み（`proto/verify_final.log`）。KEEP判定後は下記のwitch.html本体実装に\n役目を引き継いだため、**削除はしないが以後の変更は行わない**（参照専用）。詳細は `proto/README.md`。\n\n### witch.html本体実装（v1.5・`NSOLO`/`nsolo*`）\n\n- ホーム画面に「🎭 ひとりで遊ぶ（NPC対戦）」ボタンを追加（既存の「🧪 ソロで試す（検証用・全情報表示、\n  `SOLO`/`solo*`）」とは別モードとして共存。目的が異なるため識別子も分離した）\n- NPC方策・信念推定エンジン（`combinations`〜`rngSample`まで）はプロトタイプの検証済みJSを無改変で移植\n- ゲーム進行（切る・選ぶ・採点・次の儀式へ）は`witch.html`の既存の凍結コアロジック\n  （`POOL`/`scoreRecipe`/`makeBand`/`cutSets`/`toPiles`/`dealRecipeIds`/`omniMax`/`bestForCut`/\n  `rationalReach`/`chooseOrder`）をそのまま再利用し、フォークしていない\n- Firebase・`roomsV2`・`privateRecipes`等は一切使用しない完全ローカル完結（`seri.html`のsolo実装と同様、\n  第4作の「soloはFirebase DB不使用」という既存方針を踏襲）\n- 公開情報は本番のB方式と同じく**チーム合計のみ**。NPCの手札・個人点は途中では一切表示しない\n  （「解読の楽しさ」自体は不成立だったが、「行動から読む」という核の体験は損なわない設計とした）\n- 実装時に見つけた罠：Firebase接続コールバックが起動直後に`render()`を呼ぶため、`NSOLO`の`let`宣言を\n  遅い位置に置くとTDZ（一時的死角）で`ReferenceError`になる。既存の`SOLO`と同じ理由で、\n  グローバル状態の宣言はFirebase購読登録より前に置く必要がある（`CLAUDE.md`§7-w参照）\n- ヘッドレス6儀式完走検証（3方策族の組み合わせ×複数回）と実ブラウザでの手動プレイスルーの両方で確認済み\n\n### 成果物の所在\n\n- シミュレーション計測結果・生データCSV・パラメータ間の合否マトリクス・検算ログ：\n  `sim/witch_solo_npc/`（`solo_npc_sim.py`／`solo_npc_sim_v3.py`／各結果MD・CSV・JSON／\n  `事前登録_witch_ソロ人間テスト_killkeep条件.md`）\n- プロトタイプ本体・README・同値性検算ログ（参照専用・以後変更しない）：`proto/`\n- 本体実装：`witch.html`内 `NSOLO`/`nsolo*`（コメント「ソロNPC対戦」節）\n\n**本節および他の知見文書で上記の数値（D=66〜77%、58.5%天井、35組、Δ≈0 等）を引用する際は、\n算出根拠としてこれらのファイルへの参照を添えること**（`docs/ボードゲーム制作_プロセス検証知見.md`\nの「数値には算出根拠を添える」原則に従う）。\n"}, {"id": "魔女の調合_v1_3_最終受入試験記録_md", "file": "魔女の調合_v1.3_最終受入試験記録.md", "title": "魔女の調合 v1.3 受入試験", "sub": "4環境・6ラウンド・切断再接続の最終記録", "icon": "✅", "md": "# 『魔女の調合』v1.3 最終受入試験記録\n\n<!-- TOC -->\n## 目次\n\n- [試験概要](#試験概要)\n- [試験環境](#試験環境)\n- [受入試験結果](#受入試験結果)\n- [ホスト切断・再接続](#ホスト切断再接続)\n- [終了時確認](#終了時確認)\n- [自動検証](#自動検証)\n- [補足](#補足)\n\n<!-- /TOC -->\n\n---\n\n## 目次\n\n- [試験概要](#試験概要)\n- [試験環境](#試験環境)\n- [受入試験結果](#受入試験結果)\n- [ホスト切断・再接続](#ホスト切断再接続)\n- [終了時確認](#終了時確認)\n- [自動検証](#自動検証)\n- [補足](#補足)\n\n## 試験概要\n\n- 試験日: 2026-07-14（JST）\n- 正式作業フォルダ: `D:\\ゲーム\\ボドゲ\\オリジナル用ローカル\\original`\n- ブランチ: `fix/witch-v1.3-reconnect-emulator`\n- 対象コミット: `0ef38723aa3ef9147cdc600069f455914da73216`\n- 部屋コード: `DHRMCK`\n- 結果: 合格\n\n初回の完走確認でブラウザコンソールに `Cannot access '_inJoin' before initialization` が検出されたため、その結果は不合格として破棄した。描画状態の初期化順序だけを修正し、回帰テストを追加した対象コミットで、自動検証と本受入試験を最初から再実施した。\n\n## 試験環境\n\nFirebase Authentication Emulator（127.0.0.1:9099）と Realtime Database Emulator（127.0.0.1:9150）を使用した。Codex In-app Browser上で、認証ストレージを共有しない4つのHTTP originを使用した。\n\n| 環境 | 役割 | origin | 匿名UID末尾 |\n|---|---|---|---|\n| A | ホスト HostA | `127.0.0.1:8133` | `SGSMRe` |\n| B | プレイヤー2 PlayerB | `127.0.0.1:8134` | `cYPZ79` |\n| C | プレイヤー3 PlayerC | `127.0.0.1:8135` | `3r6qdv` |\n| D | 観戦者 | `127.0.0.1:8136` | `MYDt2C` |\n\n3席のUIDはすべて異なり、同一UIDの重複着席はなかった。観戦者UIDは席へ保存されていない。\n\n## 受入試験結果\n\n- A・B・Cはそれぞれ自分自身の好み3件だけを表示した。\n- 他プレイヤーの好みはプレイ中の画面に表示されなかった。\n- Dにはプレイ中、好み・個人点・失敗情報・好み発火情報が表示されなかった。\n- Firebaseルールテストで、観戦者および他プレイヤーによる `privateRecipes` 読み取りが Permission denied になることを確認した。\n- 各ラウンドで切り役の分割、2人の坩堝選択、ホストによる一度だけの採点、履歴1件追加、次ラウンドへの一度だけの進行を確認した。\n\n| ラウンド | 切り役 | ラウンド得点 | 累計 | 履歴件数 |\n|---:|---|---:|---:|---:|\n| 1 | HostA | +5 | 5 | 1 |\n| 2 | PlayerB | +3 | 8 | 2 |\n| 3 | PlayerC | +8 | 16 | 3 |\n| 4 | HostA | +5 | 21 | 4 |\n| 5 | PlayerB | +4 | 25 | 5 |\n| 6 | PlayerC | +11 | 36 | 6 |\n\n## ホスト切断・再接続\n\n第3ラウンドでHostAが坩堝を選択した後、PlayerBの最終選択前にホストタブを閉じた。\n\n- 切断中: `phase=await_score`、総魔力8、履歴2件のまま停止した。\n- BとDの双方に「進行役の再接続を待っています」が表示された。\n- プレイヤー2・3側で採点やラウンド進行は発生しなかった。\n- 同じorigin・同じ匿名認証状態でホストを再接続すると、元のHostA席とホスト権限へ復帰した。\n- 再接続後: `phase=score`、総魔力16、履歴3件、席3件となった。\n- 第3ラウンド得点+8、履歴追加、第4ラウンド進行はいずれも一度だけだった。\n\n## 終了時確認\n\n- 第6ラウンド終了後、`meta.phase=ended`、`game.phase=end` へ遷移した。\n- revealは3人分だけ作成され、A・B・C・Dの終了画面で全員の好みが公開された。\n- 全プレイヤーと観戦者に総魔力36、6ラウンド履歴、個人点、名場面が表示された。\n- プレイ中に各本人だけが確認した好みと、終了後に公開された好みが一致した。\n- オンラインDB全体に `totals` および `fired` キーは存在しなかった。\n- 最終再接続後のA・B・C・Dのコンソールエラーは0件だった。\n\n## 自動検証\n\n- Firebase Realtime Databaseルールテスト: 15/15 合格\n- HTML内JavaScript構文・静的回帰テスト: 12/12 合格\n- `firebase.json` JSONチェック: 合格\n- `firebase/witch_rules.json` JSONチェック: 合格\n- Markdown目次チェック: 合格\n- `docs.html`生成整合性チェック: 合格\n- `git diff --check`: 合格\n\n文書追加後にも上記を再実行し、最終状態を確認した。\n\n## 補足\n\n- push、mainへのマージ、Firebase Console変更、GitHub Pages公開は行っていない。\n- 匿名認証は本人確認ではなくブラウザ単位のUID識別である。\n- ホストは配布と採点のため全プレイヤーの好みを扱う信頼主体である。\n- ホスト不在中は採点とラウンド進行が停止する。\n- 旧`rooms`形式および4文字コードとは互換性がない。\n"}, {"id": "情報系新作_現行入口_md", "file": "情報系新作_現行入口.md", "title": "情報系新作 現行入口", "sub": "連続KILL監査・探索方針v2・現役ゲートv2・必須知見パック", "icon": "🚦", "md": "# 情報系新作・現行入口\n\n状態：`ACTIVE / CANONICAL`\n適用日：2026-07-19\n\n> 情報系新作に関する新規作業は、必ず本書から開始する。\n\n<!-- TOC -->\n## 目次\n\n- [1. 正式判定](#1-正式判定)\n- [2. 現行文書への入口](#2-現行文書への入口)\n- [3. Work／Codex開始条件](#3-workcodex開始条件)\n- [4. 場面証拠と試行管理](#4-場面証拠と試行管理)\n- [5. 現在許可されている範囲](#5-現在許可されている範囲)\n\n<!-- /TOC -->\n\n---\n\n## 1. 正式判定\n\n```text\nKILL_GATE_V1 = SUPERSEDED\nKILL_GATE_V2 = ACTIVE\nSELF_BINDING_ATTEMPT_3 = CANCELLED\nSUPER_LINEAGE_STATE_RECONSTRUCTION = CLOSED\nSUPER_LINEAGE_BEHAVIOR_TO_HIDDEN_MIND = CLOSED\nSUPER_LINEAGE_STANDALONE_INFORMATION_MARKET = CLOSED\nINFORMATION_FIRST_DESIGN = PROHIBITED\n```\n\n旧KILLゲートv1.0と旧知見パックv1.0は、過去の検死手順・履歴を確認するための参照専用である。新規作業の開始判定には使用しない。\n\n## 2. 現行文書への入口\n\n| 順序 | 文書 | 役割 |\n|---:|---|---|\n| 1 | [連続KILL横断監査](#情報系新作-連続kill横断監査-v10) | 21停止単位と探索上の反復を横断監査する |\n| 2 | [探索方針改訂v2](#情報系新作-探索方針改訂-v20) | 情報OFF土台、人間テスト、情報変換の順序を定める |\n| 3 | [現役KILLゲートv2](#情報系新作-現役killゲート-v20) | 新規作業とシミュレーションの開始条件を定める |\n| 4 | [Work／Codex必須知見パックv2](#information-game-knowledge-pack-v20) | 開始ACK、停止コード、監査用正本をまとめる |\n\n原本パス：\n\n```text\ndocs/情報系新作_連続KILL横断監査_v1.0.md\ndocs/情報系新作_探索方針改訂_v2.0.md\ndocs/情報系新作_現役KILLゲート_v2.0.md\ndocs/info_game_knowledge_pack_v2/00_README_FIRST.md\ndocs/info_game_knowledge_pack_v2.zip\n```\n\n## 3. Work／Codex開始条件\n\n完全列挙・合理性NPC・方策比較・市場監査を開始できるのは、次のすべてがPASSした場合だけである。\n\n```text\nX0 = PASS\nX1 = PASS\nB1 = PASS\nI1 = PASS\nS0 = PASS\n```\n\n一つでも欠ける場合は、次の停止コードで止める。\n\n```text\nSTOP_PREHUMAN_SIMULATION\n```\n\nB1／I1を行うための最小限の人間マイクロテスト器具は例外とする。情報OFF／ON人間マイクロテスト前に、完全列挙・合理性NPC・方策比較・市場監査へ進んではならない。\n\n開始ACKの正本は `docs/info_game_knowledge_pack_v2/06_Work_Codex作業開始プロトコル_v2.0.md` とする。\n\n## 4. 場面証拠と試行管理\n\n- `DESIRED_SCENE`：設計前に望む場面。仮説であり、PASS証拠ではない\n- `OBSERVED_SCENE`：人間マイクロテストで実際に起き、本人の言葉とともに記録された場面。S0の証拠に使える\n- 試行番号は作品名・親系統名ではなく、中心動詞／対象／情報発生源／情報後の行動／利益経路からなる超系譜ハッシュで管理する\n- 名前変更で試行番号をリセットしない\n- 閉鎖済み超系譜の救済案と自己拘束型試行3を開始しない\n\n## 5. 現在許可されている範囲\n\n- 正式文書の機械的統合\n- 人間マイクロテスト用の最小器具\n- `X0/X1/B1/I1/S0` 全PASS後の完全列挙・構造監査\n\n新作案の作成、閉鎖済み超系譜の再命名・救済、試行3の開始は許可されていない。\n"}, {"id": "情報系新作_連続KILL横断監査_v1_0_md", "file": "情報系新作_連続KILL横断監査_v1.0.md", "title": "連続KILL横断監査", "sub": "21停止単位と閉鎖済み超系譜の横断監査", "icon": "🧭", "md": "# 情報系新作 連続KILL横断監査 v1.0\n\n作成日：2026-07-19  \n対象：オリジナルボードゲーム制作における、情報・秘匿・推理・ブラフ・通信制限を中心とした停止／KILL履歴  \n目的：個別案の検死ではなく、探索方法そのものが過去の教訓を反映しているかを監査する\n\n---\n\n<!-- TOC -->\n## 目次\n\n- [0. 正式結論](#0-正式結論)\n- [最重要の集中](#最重要の集中)\n- [4-1. 得られていた教訓](#4-1-得られていた教訓)\n- [4-2. 得られていなかった教訓](#4-2-得られていなかった教訓)\n- [5-1. 負の選別器であり、正の探索器ではない](#5-1-負の選別器であり正の探索器ではない)\n- [5-2. 親系統の粒度が細かすぎた](#5-2-親系統の粒度が細かすぎた)\n- [5-3. 「一矢印を交換」を新系譜と認めた](#5-3-一矢印を交換を新系譜と認めた)\n- [5-4. 場面起点が願望作文を通した](#5-4-場面起点が願望作文を通した)\n- [5-5. G1の全公開葛藤を机上説明だけでPASSにした](#5-5-g1の全公開葛藤を机上説明だけでpassにした)\n- [5-6. 検証の順序が「モデル→人間」のままだった](#5-6-検証の順序がモデル人間のままだった)\n- [7-1. 状態復元・固定写像系](#7-1-状態復元固定写像系)\n- [7-2. 利益行動から内面を読む系](#7-2-利益行動から内面を読む系)\n- [7-3. 純情報市場系](#7-3-純情報市場系)\n- [7-4. 情報先行プロセス](#7-4-情報先行プロセス)\n\n<!-- /TOC -->\n\n---\n\n## 0. 正式結論\n\n```text\nLOCAL_LEARNING = CONFIRMED\nGLOBAL_SEARCH_PROGRESS = INSUFFICIENT\nCURRENT_SUPER_LINEAGE = CLOSED\nATTEMPT_3 = CANCELLED\nNEW_IDEA_GENERATION = TEMPORARILY_STOPPED\nNEXT_REQUIRED_STEP = SEARCH_POLICY_V2\n```\n\n過去案から局所的な教訓は多数得られている。\n\n- 一意解と無差別の両方を検出できるようになった\n- 想定シグナルの論理前提を先に疑えるようになった\n- 推定精度、行動変更、局所利益、最終勝率を分離できるようになった\n- 死亡対照・生存対照、事前登録、完全列挙、早期停止を導入した\n- KILL後の数値調整・追加ルールによる延命を止められるようになった\n\nしかし、探索全体では同じ上位因果鎖の近傍を反復している。\n\n> **検死能力は大きく進歩したが、新しい探索空間へ移動する能力は十分に進歩していない。**\n\n直近の試行1・試行2は、親系統名と受信者の応答を変更したものの、どちらも次の上位因果鎖を保持していた。\n\n```text\n本人の利益を伴う観察可能な行動\n↓\n相手の隠れた価値・タイプ・方策・将来意図を推測\n↓\n受信者が後続行動を変更\n↓\n読みを最終利益へ換金\n```\n\nしたがって「自己拘束型共同事業シグナル」「自己拘束型戦略意図シグナル」を別の新系譜と数えず、上記超系譜の継続試行として扱う。\n\n---\n\n# 1. 監査範囲\n\n本監査では、同一作品内の大きく異なるプロトタイプを別の「停止単位」として数える。\n\n| 区分 | 件数 | 意味 |\n|---|---:|---|\n| 監査済みKILLまたは正式KILL | 8 | 数値・完全列挙・事前登録等を伴う正式停止 |\n| 開発中止・埋葬・手順0停止 | 13 | 人間テスト、論理検査、ソロ切片等による停止 |\n| **合計** | **21** | 連続探索を評価する単位 |\n\n「21作品を完成させた」という意味ではない。  \n同じ作品内の別土台・別プロトタイプを含むため、**どの因果鎖を何回試したか**を見るための単位である。\n\n---\n\n# 2. 停止単位一覧\n\n| # | 停止単位 | 中心動詞・狙った体験 | 最初または決定的な死因 | 超系譜 |\n|---:|---|---|---|---|\n| 1 | 針の上の女神たち | 分担して均衡を保つ | 多人数の行動が一つの値へ混ざり、誰の判断が結果を生んだか帰属できない | A 集計型協力 |\n| 2 | 案A「見なかったことの証明」 | 見る／見ないを賭ける | 公開シグナルと全面非公開の土台が噛み合わず、受信者が判断へ使えない | B 情報環境不一致 |\n| 3 | 遅信 | 古い情報から現在を復元する | 決定論的な外挿により答えが一意の計算になる | C 状態復元 |\n| 4 | 共犯・遺跡版 | 敵対を明確にする時期を選ぶ | 投入力の駆け引きはあるが、プレイ体験の説明に裏切りが登場しない | D 核の代用品 |\n| 5 | 共犯・深海版 | 協力を続けるか手を離す | 毎回最大投入が実質一択。期待値均衡は「どちらでもいい」を生んだ | D 核の代用品 |\n| 6 | 影の賽 | 調査行動から相手の評価を読む | 調べる行為が示すのは選好ではなく不確実性 | E 行動シグナル読解 |\n| 7 | フリーサイコロ | 自由を不可逆に消費する | 罰する未来は成立したが、決断時に緊張がなく後悔が物語にならない | F 不可逆・未来後悔 |\n| 8 | 思考課金ポーカー | 命を使って事実を買う | 情報が行動を変えても、無料推定との差・命中率・反転利得が価格を上回らない | G 純情報市場 |\n| 9 | 案D「シュレディンガー×ロンデル」 | 覗きと移動から出し抜く | 覗きは私的情報購入で読み合いを生まず、ロンデルが装飾 | G 純情報市場 |\n| 10 | ブラフ核v0 | ベットから意味を読む | 読む対象がベット額しかなく意味の層がない。命の経済も名目的 | H 情報先行の土台不足 |\n| 11 | 伝達核v0.1 | 秘密写像をヒントで伝える | 順列秘密の制約帳簿づけになり、意味理解でなく計算へ退化 | C 状態復元 |\n| 12 | 深度信号v0.1 | 送信者と受信者で意味を伝える | 送受双方の中心判断が弱く、何をしたいゲームか理解しにくい | H 情報先行の土台不足 |\n| 13 | 深度信号・共有市場土台 | 公開ヒントを共有市場へ使う | 手順0で「何をしたいゲームか分からない」 | H 情報先行の土台不足 |\n| 14 | プロトコル市場 | 相手タイプを読んで市場へ追加する | タイプを知っても大半の状態で最善行動が変わらず、差も小さい | C 状態復元 |\n| 15 | 分岐船団 | 履歴から秘密写像を復元する | 固定写像の復元は人物読みでなく、動的対戦で履歴戦略が勝てない | C 状態復元 |\n| 16 | パララックス・ロット | 利益行動から私的価値を読む | 組単位シグナルと個体単位判断の解像度が不一致 | E 行動シグナル読解 |\n| 17 | 偏光コンベア | 交換から価値差を読む | 読みは有用でも、可逆な逐次編集で最終手番が勝敗を支配 | E 行動シグナル読解 |\n| 18 | 交差認証 | 不可逆認証から価値を読む | 発信者が固定閾値センサーとなり、人物読み・ブラフが消える | E 行動シグナル読解 |\n| 19 | ステーク・リレー | 配分から私的価値を読む | 合理化で全投入へ収束し、読む側より発信者が得る | E 行動シグナル読解 |\n| 20 | 自己拘束型共同事業シグナル・試行1 | 初期投資から将来の協力意思を読む | 公開された機械効果が後続手を決め、読む側の勝率が下がる | E 行動シグナル読解 |\n| 21 | 自己拘束型戦略意図シグナル・試行2 | 初手から切返し意図を読み阻止する | 人物別読みと固定表で受信者の行動が十分に分岐しない | E 行動シグナル読解 |\n\n---\n\n# 3. 超系譜別集計\n\n| 超系譜 | 件数 | 共通因果 | 正式判定 |\n|---|---:|---|---|\n| A 集計型協力 | 1 | 多人数の判断→単一結果 | 棚上げ。再開には個人判断と結果の直接因果が必要 |\n| B 情報環境不一致 | 1 | 公開シグナル→受信者に文脈がない | 土台交換なしの再開禁止 |\n| C 状態復元・固定写像 | 4 | 履歴／ヒント→隠れ状態・写像を復元→一意手 | **CLOSED** |\n| D 核の代用品 | 2 | 狙った体験とは別の土台が面白さを代行 | 原体験だけ保存。旧構造はCLOSED |\n| E 利益行動から内面を読む | 7 | 実利行動→隠れた価値・意図→応答 | **CLOSED / ATTEMPT_3_CANCELLED** |\n| F 不可逆・未来後悔 | 1 | 現在の刻印→未来の罰 | 現在の緊張を先に証明できる場合のみ再訪可 |\n| G 純情報市場 | 2 | コスト→私的事実購入→意思決定改善 | **CLOSED** |\n| H 情報先行の土台不足 | 3 | 情報機構→後から目的・葛藤を付与 | **CLOSED AS PROCESS** |\n\n## 最重要の集中\n\n21停止単位のうち、C・E・Gの13単位は、表現は違っても次の問題を中心に置いていた。\n\n```text\n隠れた状態・価値・方策・意図がある\n↓\n何らかの情報を観測・購入・解読する\n↓\n真実に近づく\n↓\n行動を変えれば面白くなるはず\n```\n\nさらにHの3単位も、ゲームの葛藤より情報機構を先に設計していた。\n\n> **少なくとも16/21停止単位で、情報が「既存の面白い葛藤を変形する層」ではなく、「面白さをゼロから作るエンジン」として置かれていた。**\n\nこれは作品別の偶然ではなく、探索の癖である。\n\n---\n\n# 4. 教訓は得られていたか\n\n## 4-1. 得られていた教訓\n\n次の順に、死因の検出深度は確実に上がっている。\n\n```text\n情報が判断に使われない\n↓\n情報で行動は変わるが、局所利益へ変わらない\n↓\n局所利益はあるが、最終勝率へ残らない\n↓\nブラフが可能でも最善にならない\n↓\n固定方策・閾値表へ収束する\n↓\n想定シグナルの論理前提自体が成立しない\n↓\n検査器具・指標自体が壊れていないかを先に検品する\n```\n\nこの進歩により、KILLまでの開発コストと誤判定は減った。\n\n## 4-2. 得られていなかった教訓\n\nしかし、各KILL後に行った変更は、多くの場合「死んだ矢印を一本だけ交換する」局所探索だった。\n\n```text\n固定タイプ → 私的価値\n私的価値 → 将来意図\n追随 → 阻止\n二択 → 配分\n可逆 → 不可逆\n```\n\nこれらは下流の重要な改善ではあるが、上流の前提、\n\n> **相手の隠れた内面を読み、それを後続行動へ換金することを中心体験にする**\n\nを維持していた。\n\nしたがって評価は次になる。\n\n```text\nLESSON_ACQUISITION = STRONG\nLESSON_GENERALIZATION = WEAK\nSEARCH_SPACE_UPDATE = FAILED\n```\n\n---\n\n# 5. 現役KILLゲートv1.0が防げなかった理由\n\nv1.0は、存在する案を安く検死する装置としては機能した。  \n試行1・2とも、G2で早期停止できている。\n\nしかし、次の欠陥があった。\n\n## 5-1. 負の選別器であり、正の探索器ではない\n\n10個の質問は「死んでいないか」を判定する。  \n「なぜこの領域に成功確率があるのか」「何を根拠にここを掘るのか」は要求しない。\n\nそのため、似た案を高精度でKILLし続けられる。\n\n## 5-2. 親系統の粒度が細かすぎた\n\n`自己拘束型共同事業シグナル`と`自己拘束型戦略意図シグナル`を別の親系統候補と扱ったが、上位因果鎖は同じだった。\n\n親系統名を変更すれば、試行番号を事実上リセットできる構造だった。\n\n## 5-3. 「一矢印を交換」を新系譜と認めた\n\n新系譜判定が、因果グラフ全体ではなく変更点の存在だけを見ていた。\n\n追随を阻止へ変えても、\n\n```text\n実利行動→内面推定→受信者応答\n```\n\nは残っていた。\n\n## 5-4. 場面起点が願望作文を通した\n\nG0の場面は、実際に発生した場面でなく「発生してほしい場面」でもPASSにできた。\n\n試行2では、\n\n> 人物別の読みで阻止先を変え、逆転する\n\nという場面を先に書いたが、完全列挙では人物別読みと固定表の行動変更が不合格だった。\n\n場面は証拠ではなく仮説だった。\n\n## 5-5. G1の全公開葛藤を机上説明だけでPASSにした\n\n『魔女の調合』の成功との差は、全公開なら葛藤を説明できることではない。\n\n> **情報を外した分割統治そのものが、実際に人間の選択として既に機能していたこと**\n\nである。\n\nv1.0は、表を埋めればG1をPASSできた。人間がその二択を本当に候補にする証拠を要求しなかった。\n\n## 5-6. 検証の順序が「モデル→人間」のままだった\n\n完全列挙は早期KILLに有効だったが、人工的な効用表の中で希望する場面を成立させる作業になった。\n\n人間が実際に何を比較するかを確認する前に、モデルの合理性を精密化していた。\n\n---\n\n# 6. 『魔女の調合』を生存対照にした差分\n\n| 項目 | 連続KILL系 | 魔女の調合 |\n|---|---|---|\n| 情報を外した土台 | 一意解、無差別、目的不明、または机上仮定 | 分割統治だけで選択と利害が成立 |\n| 情報の役割 | 葛藤をゼロから作る | 既存の分割葛藤をどちらへ傾けるか不確実にする |\n| 行動 | 発信・観測・購入・推定のために設計 | 自分の坩堝を取る直接利益行動 |\n| シグナル | 狙って設計した信号 | 利益行動から副産物として好みが漏れる |\n| 成功の証拠 | Oracle差、行動変更率、完全列挙 | 人間が実際に切り、選び、再戦を望んだ |\n| 答え合わせ | 数値・隠れ状態の正解 | 終了後に好みと各選択の意味を振り返れる |\n| 複雑性 | 情報機構を成立させるために増える | 情報が土台の同じ行動へ重なる |\n\n最も重要な差は次である。\n\n> **魔女の調合は「情報ゲームを作ろう」として情報から始めていない。  \n> 先に機能する分割統治があり、秘密の好みが後からその決断を変形した。**\n\n---\n\n# 7. 正式な超系譜閉鎖\n\n## 7-1. 状態復元・固定写像系\n\n```text\nSUPER_LINEAGE_C_STATE_RECONSTRUCTION = CLOSED\n```\n\n次を再開しない。\n\n- 固定タイプ、秘密写像、順列、既知方策を履歴から復元する\n- 復元精度を人物読みと呼ぶ\n- 写像数、タイプ数、履歴長だけを増やす\n\n## 7-2. 利益行動から内面を読む系\n\n```text\nSUPER_LINEAGE_E_BEHAVIOR_TO_HIDDEN_MIND = CLOSED\nATTEMPT_3 = CANCELLED\n```\n\n次を再開しない。\n\n- 入札、配分、投資、認証、交換、初期配置から静的価値を読む\n- 同じ行動から将来意図・協力意思へ読み替える\n- 受信者の応答を追随、阻止、転進へ変更するだけ\n- 人物プロフィールを増やし、固定表との差を作ろうとする\n\n## 7-3. 純情報市場系\n\n```text\nSUPER_LINEAGE_G_STANDALONE_INFORMATION_MARKET = CLOSED\n```\n\n事実・思考・覗き自体を単独商品として売買する核を再開しない。\n\n## 7-4. 情報先行プロセス\n\n```text\nINFORMATION_FIRST_DESIGN_PROCESS = PROHIBITED\n```\n\n情報機構を先に作り、後から目的・資源葛藤・得点を付ける工程を禁止する。\n\n---\n\n# 8. 再開条件\n\n新しい情報系新作を開始するには、次の順を守る。\n\n```text\n情報を外した、完全公開の最小ゲーム\n↓\n人間が実際に5～10回選ぶ\n↓\n複数の選択が本当に候補になった証拠\n↓\n選択と結果の直接因果・後悔\n↓\n同じ土台へ情報変換を1個だけ追加\n↓\n同じ人間テストで、どの選択がどう変わったか確認\n↓\nその後に完全列挙・シミュレーション\n```\n\n情報を追加する前の土台が通らなければ、その案は情報系新作候補にならない。\n\n---\n\n# 9. 次工程\n\n本監査を受け、次を作成する。\n\n1. `情報系新作_探索方針改訂_v2.0.md`\n2. `情報系新作_現役KILLゲート_v2.0.md`\n3. Work/Codex必須最新版知見パックv2.0\n4. 旧v1.0を`SUPERSEDED`へ変更する運用指示\n\n新案作成は、上記の改訂が完了するまで禁止する。\n"}, {"id": "情報系新作_探索方針改訂_v2_0_md", "file": "情報系新作_探索方針改訂_v2.0.md", "title": "情報系新作 探索方針v2", "sub": "情報OFF土台・人間マイクロテストを先行する現行方針", "icon": "🧱", "md": "# 情報系新作 探索方針改訂 v2.0\n\n作成日：2026-07-19  \n前提文書：`情報系新作_連続KILL横断監査_v1.0.md`  \n状態：`ACTIVE / CANONICAL`\n\n---\n\n<!-- TOC -->\n## 目次\n\n- [0. 目的](#0-目的)\n- [旧順序](#旧順序)\n- [新順序](#新順序)\n- [新系譜と認める最低条件](#新系譜と認める最低条件)\n- [必須条件](#必須条件)\n- [禁止](#禁止)\n- [最小実施](#最小実施)\n  - [質問](#質問)\n- [PASS条件](#pass条件)\n- [必須記述](#必須記述)\n- [PASS条件](#pass条件-1)\n- [DESIRED_SCENE](#desired_scene)\n- [OBSERVED_SCENE](#observed_scene)\n- [規則](#規則)\n- [ChatGPT本体で行う](#chatgpt本体で行う)\n- [Codexへ投げてよい](#codexへ投げてよい)\n- [Codexへ投げてはいけない](#codexへ投げてはいけない)\n\n<!-- /TOC -->\n\n---\n\n## 0. 目的\n\n本書は、KILLを早く出すためだけの文書ではない。\n\n> **同じ失敗領域の近傍探索を止め、成功確率のある異なる探索空間へ移動するための運用規則である。**\n\n---\n\n# 1. 正式停止事項\n\n```text\nSELF_BINDING_STRATEGIC_INTENT_SIGNAL_ATTEMPT_3 = CANCELLED\nSUPER_LINEAGE_STATE_RECONSTRUCTION = CLOSED\nSUPER_LINEAGE_BEHAVIOR_TO_HIDDEN_MIND = CLOSED\nSUPER_LINEAGE_STANDALONE_INFORMATION_MARKET = CLOSED\nINFORMATION_FIRST_DESIGN = PROHIBITED\n```\n\n次の3探索サイクルでは、中心動詞を以下にしてはならない。\n\n- 読む\n- 見抜く\n- 推測する\n- 解読する\n- 正体を当てる\n- 相手の価値・タイプ・意図を復元する\n\n情報は存在してよいが、**プレイヤーの主要な仕事を内面推定にしない。**\n\n---\n\n# 2. 新しい設計順序\n\n## 旧順序\n\n```text\n魅力的な情報機構\n↓\n発信者・受信者\n↓\n利益構造\n↓\nゲームの目的\n```\n\n## 新順序\n\n```text\n情報なしで面白い一手\n↓\nその一手を繰り返す最小土台\n↓\n人間による選択・後悔の確認\n↓\n情報がその一手をどう変形するか\n↓\n必要なら数値監査\n```\n\n---\n\n# 3. Phase 0：探索距離ゲート\n\n新案を考える前に、因果鎖を次の5要素で表す。\n\n```text\n中心動詞：\n隠れている／変化する対象：\n情報の発生源：\n情報を受けた後の行動：\n最終利益への経路：\n```\n\n過去の最も近い停止単位と比較する。\n\n## 新系譜と認める最低条件\n\n次の両方を満たす。\n\n1. **中心動詞が異なる**\n2. 5要素中3要素以上が因果的に異なる\n\nテーマ、人数、値域、カード名、UI、公開範囲の変更は差分に数えない。\n\n満たさなければ、\n\n```text\nSTOP_SUPER_LINEAGE_REPEAT\n```\n\nで開始禁止とする。\n\n---\n\n# 4. Phase 1：情報OFF土台\n\n情報、秘匿、人物タイプ、秘密価値、ヒント、履歴推定をすべて外す。\n\nその状態で、最小ゲームを作る。\n\n## 必須条件\n\n- プレイヤーが目指すことを一文で言える\n- 一手で比較する候補が2～4個ある\n- 候補は同じ希少資源・位置・時間・勝ち筋を奪い合う\n- 局面で最善が反転する\n- 選択結果が次の手へ残る\n- 他者の行動で最善が変わる、または他者との競合が直接発生する\n\n## 禁止\n\n- 秘密を隠したことでしか二択が生じない\n- 「後で情報を足せば面白くなる」として土台を仮合格にする\n- 数値表だけでPASSする\n\n---\n\n# 5. Phase 2：人間による土台マイクロテスト\n\n完全列挙より先に、人間が情報OFF土台を操作する。\n\n## 最小実施\n\n- 2人以上\n- 5～10回の中心決断\n- 完成ゲームでなく、紙・表・簡易UIでよい\n- 各決断後に一言だけ記録する\n\n### 質問\n\n1. 何と何を比べたか\n2. 実際に迷ったもう一方は何か\n3. 結果を見て変えたい判断はあるか\n4. 次も同じ答えになると思うか\n\n## PASS条件\n\n- 少なくとも2種類の選択が、理解不足でなく実際の候補として選ばれる\n- 「別の選択なら結果が変わった」と具体的に説明できる\n- 5～10回の後にも一意の固定手へ崩れていない\n- 参加者がゲームの目的を同じ意味で説明できる\n\n通らなければ情報を追加しない。\n\n---\n\n# 6. Phase 3：情報変換を一つだけ追加\n\n情報は、新しいパズルを追加するためでなく、Phase 2で確認した同じ決断を変形するために使う。\n\n許可される情報の役割例：\n\n- 行動可能な場所・接続先・順序を変える\n- 権利、期限、利用可能性を非対称にする\n- 公開情報の到着時刻を変える\n- 同じ資源の用途をプレイヤーごとに変える\n- 将来の選択肢を直接増減させる\n\n次の3サイクルでは禁止：\n\n- 隠れた人物タイプを当てる\n- 行動から秘密価値・将来意図を推定する\n- 事実を単独で購入する\n- 固定写像・順列・方策を復元する\n\n## 必須記述\n\n```text\n情報OFFで確認済みの中心決断：\n追加した情報変換：\n情報によって変更される同じ決断：\n情報がなくても残る葛藤：\n追加前後の人間の選択差：\n```\n\n---\n\n# 7. Phase 4：情報ONマイクロテスト\n\n同じ土台・同じ参加者で、情報変換を一つだけ追加して5～10回選ぶ。\n\n## PASS条件\n\n- 情報OFFと比較して、中心決断の選択分布または理由が変わる\n- 新しい帳簿づけ・暗記・確率計算が主作業にならない\n- 元の土台の面白さが残る\n- 情報の成功・失敗を結果から説明できる\n- 情報を無視する固定手が支配しない\n\nここまで通過して初めて、Codexによる完全列挙・シミュレーションを許可する。\n\n---\n\n# 8. 場面起点の扱い変更\n\nv1.0の「ゲーム後に語られる一場面」は二種類へ分ける。\n\n## DESIRED_SCENE\n\n設計前に望む場面。仮説であり証拠ではない。\n\n## OBSERVED_SCENE\n\n人間マイクロテストで実際に起き、本人の言葉で記録された場面。\n\n現役ゲートでPASSに使えるのは`OBSERVED_SCENE`だけとする。\n\n望む場面を書けても、観測されるまでは`HOLD`である。\n\n---\n\n# 9. 超系譜単位の打切り\n\n試行数は作品名・親系統名でなく、Phase 0の5要素ハッシュで管理する。\n\n```text\nLINEAGE_HASH =\n中心動詞 |\n対象 |\n情報発生源 |\n受信後行動 |\n利益経路\n```\n\n## 規則\n\n- 同じハッシュまたは3要素以上一致する案は同一超系譜\n- 2回連続で同じゲートに落ちたら、3回目を使わず閉鎖できる\n- 3回目は「権利」ではなく絶対上限\n- 名前変更で試行番号をリセットしない\n- 閉鎖後の再訪には、5要素中3要素以上と中心動詞の変更が必要\n\n---\n\n# 10. 正の選定基準\n\nKILLゲートだけでなく、次のどれか一つを開始理由として必要とする。\n\n1. 情報OFF土台が人間マイクロテストで既に機能した\n2. 既存の生存ゲームから、中心決断だけを抽出している\n3. デジタル固有の操作が、情報でなく行動可能性を直接変える\n4. 既存成功作『魔女の調合』と同じく、情報が既存の葛藤へ重なる\n\n「空白のメカニクス表に見つけた」「新規性が高い」「名場面を想像できる」だけでは開始理由にしない。\n\n---\n\n# 11. Codexへ投げる境界\n\n## ChatGPT本体で行う\n\n- 超系譜照合\n- 中心動詞と因果鎖の選定\n- 情報OFF土台の設計\n- 人間マイクロテストの解釈\n- KILL／KEEPの最終判断\n\n## Codexへ投げてよい\n\n- Phase 2またはPhase 4を通過した後の完全列挙\n- 支配戦略、席順、最終手番、役割交代の監査\n- 対照条件の実装\n- 再現ログ・JSON・CSV・監査パッケージ作成\n- 文書・知見パックのリポジトリ統合\n\n## Codexへ投げてはいけない\n\n- 人間が一度も選んでいない効用表から名場面を生成する\n- 情報OFF土台が未検証のまま合理性モデルを精密化する\n- KILL後の救済案を自動生成する\n- 閉鎖超系譜の試行3を作る\n\n---\n\n# 12. 次の3サイクルの制約\n\n```text\nCYCLE_1_TO_3:\n  central_verb_not_in:\n    - 読む\n    - 推測する\n    - 解読する\n    - 見抜く\n    - 当てる\n  hidden_player_mind: FORBIDDEN\n  standalone_information_purchase: FORBIDDEN\n  information_off_human_test: REQUIRED\n  observed_scene_before_simulation: REQUIRED\n```\n\nこの制約は情報ゲームを禁止しない。\n\n情報を、\n\n- 行動権\n- 接続\n- 時間\n- 利用可能性\n- 順序\n- 共有範囲\n\nとして直接ゲーム状態へ作用させる方向へ探索を移すためのものとする。\n\n---\n\n# 13. 成功判定の階段\n\n```text\n情報OFF土台が人間に選ばれる\n↓\n情報ONで同じ決断が変形する\n↓\nOBSERVED_SCENEが発生する\n↓\n数値的に核が最終利益へ残る\n↓\n複数戦で固定手へ崩れない\n↓\n完成ゲームとして再戦される\n```\n\n手前のPASSは次を保証しない。\n\n---\n\n# 14. 現在位置\n\n```text\nCROSS_KILL_AUDIT = COMPLETE\nSEARCH_POLICY_V2 = ACTIVE\nKILL_GATE_V1 = SUPERSEDED\nNEW_IDEA = NOT_STARTED\nNEXT_ALLOWED_WORK = KILL_GATE_V2_AND_KNOWLEDGE_PACK_V2\n```\n"}, {"id": "情報系新作_現役KILLゲート_v2_0_md", "file": "情報系新作_現役KILLゲート_v2.0.md", "title": "情報系新作 現役KILLゲートv2", "sub": "X0/X1/B1/I1/S0を先行するACTIVEゲート", "icon": "⛔", "md": "# 情報系新作 現役KILLゲート v2.0\n\n作成日：2026-07-19  \n前提：\n\n- `情報系新作_連続KILL横断監査_v1.0.md`\n- `情報系新作_探索方針改訂_v2.0.md`\n\n状態：`ACTIVE / CANONICAL`  \n旧版：`情報系新作_現役KILLゲート_v1.0.md = SUPERSEDED`\n\n---\n\n<!-- TOC -->\n## 目次\n\n- [0. v2.0の変更点](#0-v20の変更点)\n- [X0. 超系譜距離](#x0-超系譜距離)\n  - [PASS](#pass)\n  - [KILL](#kill)\n- [X1. 正の探索根拠](#x1-正の探索根拠)\n- [B0. 情報なしでゲームか](#b0-情報なしでゲームか)\n  - [PASS](#pass-1)\n- [B1. 情報OFF人間マイクロテスト](#b1-情報off人間マイクロテスト)\n  - [PASS](#pass-2)\n  - [KILL](#kill-1)\n- [I0. 情報変換は一つか](#i0-情報変換は一つか)\n  - [PASS](#pass-3)\n  - [KILL](#kill-2)\n- [I1. 情報ON人間マイクロテスト](#i1-情報on人間マイクロテスト)\n  - [PASS](#pass-4)\n- [S0. OBSERVED_SCENE](#s0-observed_scene)\n  - [PASS](#pass-5)\n  - [HOLD](#hold)\n\n<!-- /TOC -->\n\n---\n\n## 0. v2.0の変更点\n\nv1.0は案の検死には機能したが、同じ上位系譜の反復を止められなかった。\n\nv2.0では、従来のKILLゲートより前に次を追加する。\n\n- X0 超系譜距離\n- X1 正の探索根拠\n- B0 情報OFF土台\n- B1 情報OFF人間マイクロテスト\n- I0 情報変換の単一性\n- I1 情報ON人間マイクロテスト\n- S0 OBSERVED_SCENE\n\nこれらを通るまで、従来G2～G8のシミュレーション監査へ進まない。\n\n---\n\n# 1. 停止コード\n\n| コード | 意味 |\n|---|---|\n| `STOP_SUPER_LINEAGE_REPEAT` | 閉鎖済み超系譜または近傍探索 |\n| `STOP_NO_POSITIVE_SEARCH_REASON` | 生存根拠がなく、死因回避だけで開始 |\n| `STOP_BASE_NOT_PLAYABLE` | 情報OFF土台が人間の選択として不成立 |\n| `STOP_SCENE_UNOBSERVED` | 望む場面しかなく、実際の場面がない |\n| `STOP_INFORMATION_PARALLEL_PUZZLE` | 情報が元の決断でなく別パズルを追加 |\n| `STOP_INFORMATION_NO_EFFECT` | 情報ON/OFFで中心決断が変わらない |\n| `STOP_GATE_KILL` | 従来の構造ゲートでKILL |\n| `STOP_MEASUREMENT_INVALID` | 物差し検品失敗 |\n\n---\n\n# 2. Phase X：探索開始ゲート\n\n## X0. 超系譜距離\n\n次を記入する。\n\n```text\n中心動詞：\n対象：\n情報発生源：\n情報後の行動：\n利益経路：\n最も近い停止単位：\n一致する要素数：\n```\n\n### PASS\n\n- 中心動詞が最も近い停止単位と異なる\n- 5要素中3要素以上が異なる\n- 閉鎖済み超系譜C・E・G・Hに該当しない\n\n### KILL\n\n- 「価値」を「意図」に変えただけ\n- 追随を阻止へ変えただけ\n- テーマ、人数、倍率、UIだけの変更\n- 中心因果が`行動→隠れた内面→応答`のまま\n\n## X1. 正の探索根拠\n\n次の一つ以上が必要。\n\n- 人間に機能すると確認済みの情報OFF土台\n- 既存の生存ゲームから抽出した中心決断\n- 情報が行動可能性を直接変えるデジタル固有操作\n- 『魔女の調合』型の「成立済み葛藤＋情報変形」\n\n「既知の死因に当たらなさそう」だけならHOLD。\n\n---\n\n# 3. Phase B：情報OFF土台ゲート\n\n## B0. 情報なしでゲームか\n\n秘密、履歴推定、人物差を全て外して記入する。\n\n| 選択 | 得るもの | 失うもの | 正しくなる局面 |\n|---|---|---|---|\n| A |  |  |  |\n| B |  |  |  |\n\n### PASS\n\n- 目的が一文で明確\n- A/Bが同じ希少資源・時間・位置・勝ち筋を奪い合う\n- 局面で優劣が反転\n- 選択が次局面へ残る\n\n机上表だけでは`PROVISIONAL`。B1なしでは次へ進めない。\n\n## B1. 情報OFF人間マイクロテスト\n\n- 2人以上\n- 中心決断5～10回\n- 各回で理由を一言記録\n\n### PASS\n\n- 2種類以上の選択が実際に候補となる\n- 別手による具体的な結果差を説明できる\n- 固定手へ即収束しない\n- 何をしたいゲームか一致して説明できる\n\n### KILL\n\n- 一意手\n- どちらでも同じ\n- 目的不明\n- 初見の理解不足だけが迷いを作る\n\n---\n\n# 4. Phase I：情報追加ゲート\n\n## I0. 情報変換は一つか\n\n記入する。\n\n```text\n情報OFFの中心決断：\n追加する情報変換：\n同じ決断のどの比較が変わるか：\n情報なしでも残る葛藤：\n```\n\n### PASS\n\n- 情報が元の決断を変形する\n- 情報処理専用の別フェーズを作らない\n- 人物内面の復元を中心にしない\n- 情報は1種類・1作用に限定\n\n### KILL\n\n- 新しい帳簿づけ、暗記、写像復元を追加\n- 情報を読めても元の決断が同じ\n- 情報機構のために土台の目的を変更\n- 事実を単独商品として売る\n\n## I1. 情報ON人間マイクロテスト\n\nB1と同じ参加者・土台で5～10回選ぶ。\n\n### PASS\n\n- 選択分布または理由が情報OFFから変わる\n- 元の葛藤が残る\n- 情報が別パズルを支配しない\n- 成否を結果から説明できる\n\n---\n\n# 5. Phase S：場面証拠ゲート\n\n## S0. OBSERVED_SCENE\n\n次の形式で、実際のテストで起きた場面を書く。\n\n> P1が【実際に見た状態】を見て、【実際に候補だったA】ではなく【B】を選んだ。  \n> その結果【具体的な変化】が起き、本人は「【実際の発言】」と説明した。\n\n### PASS\n\n- ログ・盤面状態・本人発言がある\n- 本人が結果を見る前に比較理由を説明できる\n- 望んだ場面の創作ではない\n\n### HOLD\n\n- DESIRED_SCENEしかない\n\n---\n\n# 6. Phase G：従来構造ゲート\n\nB1・I1・S0を通過後、従来v1.0の以下を適用する。\n\n- G2 双方向の生きた選択\n- G3 シグナル因果\n- G4 ブラフ生存\n- G5 利益変換\n- G6 独自性支配\n- G7 手番支配\n- G8 習熟後生存\n- G9 超系譜打切り\n\nただし、次の3サイクルではG3・G4の「隠れた人物内面を読む」案自体をX0で開始禁止とする。\n\n---\n\n# 7. Codex開始条件\n\nCodexへ完全列挙・方策シミュレーションを依頼できるのは、次をすべて満たす場合だけ。\n\n```text\nX0 = PASS\nX1 = PASS\nB1 = PASS\nI1 = PASS\nS0 = PASS\n```\n\n例外は、B1の器具を動かすための最小UI実装だけ。  \nその場合も、合理性NPC・完全列挙・大規模監査は作らない。\n\n---\n\n# 8. 最短票\n\n```markdown\n## X：探索距離\n- 中心動詞：\n- 最も近い停止単位：\n- 5要素中の差分：\n- X0：PASS / HOLD / KILL\n- X1：PASS / HOLD / KILL\n\n## B：情報OFF\n- 目的：\n- 中心二択：\n- 人間決断回数：\n- 実際に選ばれた選択：\n- B0：PASS / HOLD / KILL\n- B1：PASS / HOLD / KILL\n\n## I：情報ON\n- 追加した情報変換：\n- 情報OFFとの選択差：\n- I0：PASS / HOLD / KILL\n- I1：PASS / HOLD / KILL\n\n## S：観測場面\n- OBSERVED_SCENE：\n- 本人発言：\n- S0：PASS / HOLD\n\n## G：構造監査\n- 最初に落ちたゲート：\n- 最終判定：\n- 次に許可される作業：\n```\n\n---\n\n# 9. 現在の正式状態\n\n```text\nKILL_GATE_V1 = SUPERSEDED\nKILL_GATE_V2 = ACTIVE\nSELF_BINDING_ATTEMPT_3 = CANCELLED\nNEW_IDEA_GENERATION = WAITING_FOR_PHASE_X\n```\n"}, {"id": "info_game_knowledge_pack_v2_00_README_FIRST_md", "file": "info_game_knowledge_pack_v2/00_README_FIRST.md", "title": "Work/Codex必須知見パックv2", "sub": "ACTIVE/CANONICAL・ハッシュ検証済みの開始資料", "icon": "📦", "md": "# Information Game Knowledge Pack v2.0\n\n状態：`ACTIVE / CANONICAL`  \n作成日：2026-07-19\n\n## 最初に確認すること\n\n```text\nKILL_GATE_V1 = SUPERSEDED\nKILL_GATE_V2 = ACTIVE\nSELF_BINDING_ATTEMPT_3 = CANCELLED\nSUPER_LINEAGE_STATE_RECONSTRUCTION = CLOSED\nSUPER_LINEAGE_BEHAVIOR_TO_HIDDEN_MIND = CLOSED\nSUPER_LINEAGE_STANDALONE_INFORMATION_MARKET = CLOSED\nINFORMATION_FIRST_DESIGN = PROHIBITED\n```\n\n本パックは、新案をすぐ考えるための資料ではない。\n\n> 連続KILLを個別案の問題でなく探索方針の問題として扱い、情報OFF土台と人間マイクロテストを、数値監査より前へ移すための最新版知見である。\n\n## 読む順序\n\n1. `01_連続KILL横断監査_v1.0.md`\n2. `02_探索方針改訂_v2.0.md`\n3. `03_現役KILLゲート_v2.0.md`\n4. `04_旧KILL系譜マトリクス_v1.0.md`\n5. `05_試行2_GPT向け引き継ぎ報告書.md`\n6. `06_Work_Codex作業開始プロトコル_v2.0.md`\n\n## 旧版との関係\n\n- v1.0のKILLゲートは、候補案の検死資料として参照可能\n- 新規作業の開始判定にはv2.0だけを使用\n- 旧版の「名場面起点PASS」は無効。望む場面は`DESIRED_SCENE`であり、実際に起きるまで`HOLD`\n- Codexによる完全列挙は、情報OFF／ONの人間マイクロテスト後に限定\n"}]</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script>
const DOCS = JSON.parse(document.getElementById("DATA").textContent);
const $ = id => document.getElementById(id);
let cur = 0;

/* GitHub互換のアンカー生成（MD内のリンクと一致させる） */
const STRIP = /[\u0000-\u001F!-,.\/:-@\[-\^`{-~\u00A0-\u00BF\u00D7\u00F7\u2000-\u206F\u2E00-\u2E7F\u3000-\u303F\uFE10-\uFE1F\uFE30-\uFE6F\uFF00-\uFFEF]/gu;
function slug(t, seen){
  let s = t.trim().toLowerCase().replace(STRIP,"").replace(/\s+/g,"-");
  if(seen[s]!==undefined){ seen[s]++; s = s+"-"+seen[s]; } else seen[s]=0;
  return s;
}
const stripMd = t => t.replace(/\*\*(.+?)\*\*/g,"$1").replace(/`(.+?)`/g,"$1").replace(/\[(.+?)\]\(.+?\)/g,"$1").trim();

marked.setOptions({ gfm:true, breaks:true, headerIds:false, mangle:false });

/* 各文書をレンダリングし、見出しにidを振り、TOCを作る */
DOCS.forEach(d=>{
  const seen = {};
  const heads = [];
  const renderer = new marked.Renderer();
  renderer.heading = (text, lvl)=>{
    const plain = stripMd(String(text).replace(/<[^>]+>/g,""));
    const id = slug(plain, seen);
    if(lvl<=3) heads.push({lvl, text:plain, id});
    return `<h${lvl} id="${id}">${text}</h${lvl}>`;
  };
  d.html = marked.parse(d.md, {renderer});
  d.heads = heads;
  d.plain = d.md.replace(/```[\s\S]*?```/g,"").replace(/[#*`>|\-]/g," ");
});

/* サイドバー */
function buildSide(){
  $("docs").innerHTML = DOCS.map((d,i)=>`
    <div class="doc">
      <div class="dh ${i===cur?'on':''}" onclick="open_(${i})">
        <span class="ic">${d.icon}</span>
        <span><span class="t">${d.title}</span><div class="s">${d.sub}</div></span>
      </div>
      <div class="toc ${i===cur?'open':''}" id="toc${i}">
        ${d.heads.map(h=>`<a class="h${h.lvl}" href="#${h.id}" onclick="jump(${i},'${h.id}',event)">${h.text}</a>`).join("")}
      </div>
    </div>`).join("");
}
function open_(i, anchor){
  cur = i;
  $("main").innerHTML = DOCS[i].html;
  document.querySelectorAll(".dh").forEach((e,k)=>e.classList.toggle("on",k===i));
  document.querySelectorAll(".toc").forEach((e,k)=>e.classList.toggle("open",k===i));
  localStorage.setItem("doc_cur", i);
  if(anchor){ const el=document.getElementById(anchor); if(el){ el.scrollIntoView(); return; } }
  window.scrollTo(0,0);
  closeSide();
}
function jump(i, id, e){
  if(e) e.preventDefault();
  if(cur!==i){ open_(i, id); } else { const el=document.getElementById(id); if(el) el.scrollIntoView(); closeSide(); }
  history.replaceState(null,"","#"+id);
}

/* 文書内リンク（#xxx）を、現在の文書内で解決する */
document.addEventListener("click", e=>{
  const a = e.target.closest("main a[href^='#']");
  if(!a) return;
  e.preventDefault();
  const id = decodeURIComponent(a.getAttribute("href").slice(1));
  let el = document.getElementById(id);
  if(el){ el.scrollIntoView(); history.replaceState(null,"","#"+id); return; }
  // 他の文書にあるかも
  for(let i=0;i<DOCS.length;i++){
    if(DOCS[i].heads.some(h=>h.id===id)){ open_(i, id); return; }
  }
});

/* 全文検索 */
let qT=null;
$("q").addEventListener("input", ()=>{ clearTimeout(qT); qT=setTimeout(search,180); });
function esc(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function search(){
  const q = $("q").value.trim();
  const res = $("res"), docs = $("docs");
  if(q.length<2){ res.innerHTML=""; docs.style.display=""; return; }
  docs.style.display="none";
  const rx = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi");
  const hits = [];
  DOCS.forEach((d,i)=>{
    let m, n=0;
    const txt = d.plain;
    rx.lastIndex = 0;
    while((m = rx.exec(txt)) && n < 6){
      const s = Math.max(0, m.index-42), e = Math.min(txt.length, m.index+q.length+56);
      let x = esc(txt.slice(s,e)).replace(/\s+/g," ");
      x = x.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi"), mm=>`<mark>${esc(mm)}</mark>`);
      // 直前の見出しを探す
      const before = txt.slice(0, m.index);
      let head = d.title;
      for(const h of d.heads){ if(before.indexOf(h.text)>=0) head = h.text; }
      hits.push({i, head, x, id:(d.heads.find(h=>h.text===head)||{}).id});
      n++;
    }
  });
  res.innerHTML = hits.length
    ? hits.map(h=>`<div class="hit" onclick="jump(${h.i},'${h.id||''}')">
        <div class="hd">${DOCS[h.i].icon} ${DOCS[h.i].title} ・ ${esc(h.head)}</div>
        <div class="hx">…${h.x}…</div></div>`).join("")
    : `<div class="nores">見つかりませんでした</div>`;
}

/* 現在位置に応じてTOCをハイライト */
let ticking=false;
window.addEventListener("scroll", ()=>{
  if(ticking) return; ticking=true;
  requestAnimationFrame(()=>{
    const h = document.documentElement.scrollHeight - innerHeight;
    $("prog").style.width = (h>0 ? (scrollY/h*100) : 0) + "%";
    $("top").classList.toggle("show", scrollY>400);
    const hs = [...document.querySelectorAll("main h1,main h2,main h3")];
    let act=null;
    for(const el of hs){ if(el.getBoundingClientRect().top < 120) act = el.id; else break; }
    document.querySelectorAll("#toc"+cur+" a").forEach(a=>
      a.classList.toggle("act", a.getAttribute("href")==="#"+act));
    ticking=false;
  });
});
$("top").onclick = ()=> scrollTo({top:0,behavior:"smooth"});

/* モバイル */
const openSide  = ()=>{ $("side").classList.add("open"); $("veil").classList.add("show"); };
const closeSide = ()=>{ $("side").classList.remove("open"); $("veil").classList.remove("show"); };
$("burger").onclick = ()=> $("side").classList.contains("open") ? closeSide() : openSide();
$("veil").onclick = closeSide;

/* 起動 */
const saved = parseInt(localStorage.getItem("doc_cur")||"0");
cur = (saved>=0 && saved<DOCS.length) ? saved : 0;
buildSide();
const hash = decodeURIComponent(location.hash.slice(1));
if(hash){
  const i = DOCS.findIndex(d=>d.heads.some(h=>h.id===hash));
  if(i>=0){ open_(i, hash); } else open_(cur);
} else open_(cur);
</script>
