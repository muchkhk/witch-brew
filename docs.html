. 手番通知音：オンラインでは「待ち」が長いので必須](#6-3-手番通知音オンラインでは待ちが長いので必須)\n  - [6-4. ミュート切替は必ず用意する（そして状態を目で見せる）](#6-4-ミュート切替は必ず用意するそして状態を目で見せる)\n  - [6-5. 色設計：CSS変数で一元管理し、意味と色を対応させる](#6-5-色設計css変数で一元管理し意味と色を対応させる)\n  - [6-6. フォント：テーマ用と実用UI用を分ける](#6-6-フォントテーマ用と実用ui用を分ける)\n  - [6-7. ボタンのフィードバック：3状態を必ず作る](#6-7-ボタンのフィードバック3状態を必ず作る)\n  - [6-8. アニメーション：意味のある2つだけ](#6-8-アニメーション意味のある2つだけ)\n  - [6-9. 説明はいつでも開ける（❓ボタン＋用語ツールチップ）](#6-9-説明はいつでも開けるボタン用語ツールチップ)\n  - [6-10. 確定前プレビュー：不安を消すが、判断は奪わない](#6-10-確定前プレビュー不安を消すが判断は奪わない)\n  - [6-11. 手番の明示：オンラインは「今どうなってる？」が最大のストレス](#6-11-手番の明示オンラインは今どうなってるが最大のストレス)\n  - [6-12. 観戦モードは「デバッグ・運用の道具」として強力](#6-12-観戦モードはデバッグ運用の道具として強力)\n  - [6-13. ソロ（1人回し）モードは最初に作るべきだった](#6-13-ソロ1人回しモードは最初に作るべきだった)\n  - [6-14. エラーは握りつぶさず、目に見える場所に出す](#6-14-エラーは握りつぶさず目に見える場所に出す)\n  - [6-15. テーマの一貫性：用語を最後まで統一する](#6-15-テーマの一貫性用語を最後まで統一する)\n  - [6-16. アイコン・絵文字の使い方](#6-16-アイコン絵文字の使い方)\n  - [6-17. モバイル対応（最低限やること）](#6-17-モバイル対応最低限やること)\n  - [6-18. UX改善の優先順位（今回の実感）](#6-18-ux改善の優先順位今回の実感)\n\n<!-- /TOC -->\n\n---\n\n## 1. 基盤設計の原則(イベントソーシング・権威・同期)\n\n> **前提(第1作で実証):** React(または素のJS)ベースの**単一HTMLファイル**でシミュレーターを作る手法は、\n> 対話ベースで盤面ゲームのデジタルプロトタイプを高速に作るのに有効。ルール変更のたびに\n> 実際に手を動かして試せる状態を保てることが、設計判断のスピードに大きく寄与する。\n\n\n### 基盤設計\n- **「アクション=イベントの列」設計(イベントソーシング的)** を最初に固める。\n  → ログ・リプレイ・Undo・アニメーション・セーブ・オンライン同期が**すべて同じ土台**に乗る。\n- 状態そのものを同期せず、`games/{gameId}/events` にアクションを追記 → 各クライアントが同じイベント列から状態を再生。\n- **「イベントを適用して次の状態を返す純粋関数」を独立**させる(オンライン非依存でテスト可/ルール変更が容易)。\n- 構成は「ゲームロジック / Firebase同期 / UI描画」を分離(部分修正の指示が明確になり破壊的変更が減る)。\n\n### Firebase特有の要点\n- **権威(source of truth)をどこに置くか**を最初に決める。\n  - Security Rules で「自分の手番の正当なアクションだけ書ける」よう制限、または\n  - **Cloud Functions をサーバー権威**にし、クライアントは申請 → 関数が検証して確定イベントを書く。\n- **非公開情報(手札・山札)は最大の落とし穴。** 全状態をクライアントに配ると開発者ツールから丸見え=発見/正体隠匿系が即死。\n  → 各プレイヤーには見てよい情報だけ配信。シャッフル結果はサーバー(Functions)で管理。非公開情報が絡むならサーバー権威は事実上必須。\n\n### リアルタイム同期の注意\n- onSnapshot は非同期に届くため、演出中に次状態が来て競合しうる。\n  → イベントを即反映せず**アニメーションキューに積んで順次処理**。\n- 楽観的更新(自分のアクションは即ローカル反映、サーバー確定で整合)でプレイフィールが軽くなるが、**非公開情報が絡む部分では避ける**。\n\n### この構成で作りやすいUI改善(実装しやすさ順)\n1. 盤面ハイライト付きログ / 状態の二層表示(通常は要約、ホバーで詳細)\n2. インタラクションのプレビュー(ホバーで結果を半透明表示 = イベントの仮適用→破棄)\n3. イベント起点のアニメーション(状態diffではなくイベントから発火)\n4. 有効手のフィルタリング(「違法手を弾く」までに留め「良い手を勧める」には踏み込まない)\n\n---\n\n## 2. 共有状態(オンライン対戦)設計の教訓 ― 『針の上の女神たち』(第1作)より\n\nFirebase／`window.storage`のような**シンプルなキーバリュー型の永続ストレージだけを使って、複数端末がリアルタイムに同じゲーム状態を共有する**仕組みを作る過程で得た、実装パターンの知見。技術基盤（Firebase移行そのもの）とは別に、「共有状態の設計」そのものに関する教訓としてまとめる。\n\n---\n\n### 2-1. 「最後に書き込んだクライアントが勝つ」問題（read-modify-write競合）\n\n### 起きたこと\n参加者リストのような共有データを更新する処理を、**各クライアントが手元にキャッシュしている（古いかもしれない）データを元に上書き保存**する実装にしていたところ、2人が同時に参加・操作すると、**片方の変更がもう片方の書き込みで消えてしまう**不具合が起きた。\n\n### 教訓・パターン\n共有データを変更する処理は、**変更の直前に必ず最新のデータを取得し直してから、それを元に上書きする**。手元の状態（Reactのstateなど）を信用して直接書き込んではいけない。\n\n```\n悪い例：ローカルのstateを直接書き込む\n  nextList = localPlayers.map(...)\n  save(nextList)\n\n良い例：保存直前に必ず最新を取得\n  latest = await fetchLatest()\n  nextList = latest.map(...)\n  save(nextList)\n```\n\nこの手のバグは、**1人でテストしている時には絶対に再現しない**（同時アクセスが起きないため）。複数端末での同時操作を意図的に再現するテストが必要になる。\n\n---\n\n### 2-2. 「見えなくする」だけでは「操作できなくする」ことにはならない\n\n### 起きたこと\n役割ごとに見える情報を制限する実装は早い段階でできていたが、**「その役割の人にしかできないはずの操作」を、実は誰でも実行できてしまう**状態が長く残っていた（カード担当以外でもカードを割り当てられる、サイコロ担当以外でも出目を選べる、等）。UIの見た目上は「自分には関係なさそうな画面」に見えても、ボタンやドラッグ操作自体は機能してしまっていた。\n\n### 教訓・パターン\n共有状態を操作する**全ての関数の入り口で、「今この操作をしているのは、正当な権限を持つ人か」を明示的にチェックする**。UIを見せる/隠すだけでなく、**実際に状態を変更する関数自体にガードを入れる**（例：`if(!canActAs(\"card\")) return;` を関数の最初の行に必ず入れる）。\n\n見た目を制限しただけで満足せず、「この機能を持つボタンや要素は、他の全端末から見て本当に無害か」を、実装が増えるたびに横断的に洗い出す作業が必要だった。\n\n---\n\n### 2-3. 秘密情報は「見た目を隠す」だけでなく「構造で漏らさない」\n\n「プロセス検証知見」§9(ルール説明)の原則2-8と関連するが、共有状態システム特有の側面として：**シークレットなデータも、結局は全クライアントに配信されている**（表示を制限しているだけ）ため、UIの些細な作り込みの差（要素のサイズ、有無、配置）から、本来隠したいはずの情報が透けてしまうリスクが常にある。「値を隠す」実装をしたら、**その値に依存する他の見た目の要素が無いか**、逆算的に確認する習慣が必要。\n\n---\n\n### 2-4. 「幽霊」対策は、性善説では機能しない\n\n### 起きたこと\nタブを閉じる・電波が切れるなど、明示的な「退出」操作を経ずに離脱するプレイヤーは避けられない。これを放置すると、**役割を持ったまま応答しない参加者が残り続け、他の誰もその役割を選び直せず、ゲームが進行不能になる**リスクがあった。\n\n### 教訓・パターン\n- 各クライアントが**一定間隔（今回は12秒）で「生存報告」を書き込み続ける**仕組みを入れる\n- 一定時間（今回は30秒）反応がない参加者は、**他の全クライアント側で自動的に「いないもの」として扱う**（表示から外す、役割の必須人数カウントから除外する）\n- 明示的な退出処理だけでなく、**タイムアウトによる自動的な離脱検知**を必ずセットで用意する\n\n---\n\n### 2-5. 「同期しているはずなのに、本当に同期しているか分からない不安」への対処\n\nポーリング方式（数秒おきに取得しにいく）でリアルタイム性を模擬する場合、**ユーザーからは「今の状態が最新なのか、通信が止まっているだけなのか」が区別できない**。「同期済み」という表示だけでは不十分で、**「最終更新：n秒前」のような、鮮度が経過時間で分かる表示**を足すことで、不安をかなり軽減できた。\n\n---\n\n### 2-6. 一時的な通信エラーは、自動リトライで多くが解決する\n\nFirebase・Claudeストレージいずれでも、**プラットフォーム側の一時的な不調によるエラーは珍しくない**。全ての通信処理を、「1回失敗したら少し待って1回だけ再試行する」という薄いラッパーで包んだだけで、体感の安定性がかなり向上した。エラーハンドリングを個別の処理ごとに書くのではなく、**通信処理そのものを共通化した上で、リトライを1箇所に実装する**のが効率的だった。\n\n```\nwithRetry(fn, retries=1, delayMs=700) {\n  try { return await fn() }\n  catch(e) {\n    if (retries<=0) throw e\n    await sleep(delayMs)\n    return withRetry(fn, retries-1, delayMs)\n  }\n}\n```\n\n---\n\n### 2-7. エラーを握りつぶさない\n\n`catch(e){}` のように**エラーを無言で握りつぶす実装は、「原因不明の無反応」という、最もデバッグしづらい不具合を生む**。今回、「ボタンを押しても何も起きない」という報告の実態は、`window.storage` が使えない環境で例外が発生し、それが握りつぶされていただけだった。**catchした例外は、最低限ユーザーに見える形で表示する**（トーストやエラーメッセージ欄など）。これだけで「原因不明」の状態を大幅に減らせる。\n\n---\n\n### 2-8. まとめ（次回への適用チェックリスト）\n\n1. 共有データの更新は、必ず「直前に最新を取得→それを元に更新」の順で行う\n2. 状態を変更する全ての関数に、権限チェックを入れる（UIを隠すだけでは不十分）\n3. 秘密情報は、値だけでなく「見た目の構造」からの漏洩も確認する\n4. 生存報告＋タイムアウトによる、自動的な離脱検知を用意する\n5. 同期の鮮度（最終更新からの経過時間）をユーザーに見せる\n6. 通信処理は共通化し、リトライを1箇所に実装する\n7. エラーは握りつぶさず、必ずユーザーに見える形で表示する\n\n---\n\n## 3. Firebase・秘匿・状態管理の追加知見\n\n> **【理論編との接続】** 秘匿情報の実装で繰り返し問題になる「意図しない漏洩」(見た目のサイズ・\n> メーターの位置・処理順序・手札枚数)は、理論編・第4部§3-8 **「意図しない影」** として一般化されている。\n> **秘匿すべき情報は「送らない」。「送るが隠す」は秘匿ではない。**\n\n### 3-1. Firebase 実装の追加知見(第3作『魔女の調合』・§2の7教訓に加えて)\n\n### 秘匿情報は「UIで隠す」だけでは不十分\nUIで他人の好みを描画しなくても、**DBに保存されていれば開発者ツールで見える**。\n本当の秘匿には：\n- **そもそもDBに書かない**（今回：個人点をDBに保存せず、各クライアントがローカル計算）\n- または匿名認証＋セキュリティルールで読取制限\n\n> **設計原則：秘匿すべき情報は「送らない」。「送るが隠す」は秘匿ではない。**\n\n### 派生データは「終了時に再計算」で秘匿を保てる\n「その儀式で叶った好み」は、プレイ中に保存すると逆算材料になる。\n→ **保存せず、終了時（好み公開後）に再計算する**。\nこれで秘匿を保ったまま、終了画面での豊かな振り返り（名場面・個人点）が実現できた。\n\n> **パターン：秘匿情報から導かれる派生データは、秘匿解除後に再計算する。**\n\n### Firebase のセキュリティルール警告\n`{ \"rules\": { \".read\": true, \".write\": true } }` は「DB全体が誰でも読み書き可能」という警告が来る。\n**最小対処**（コード改修なし）：\n```json\n{\n  \"rules\": {\n    \".read\": false, \".write\": false,\n    \"rooms\": {\n      \"$code\": {\n        \".read\": true, \".write\": true,\n        \"meta\": { \"host\": {\".validate\": \"newData.isString() && newData.val().length <= 40\"}, ... },\n        \"seats\": { \"$seat\": { \".validate\": \"$seat.matches(/^[0-3]$/)\", ... } },\n        \"$other\": { \".validate\": false }\n      }\n    }\n  }\n}\n```\n- ルート直下を false にし、`rooms/{コード}` 配下だけ許可 → DB全体の無制限開放を塞ぐ\n- 形と文字数を検証 → ゴミ・巨大データを拒否\n- **ただし認証を使わないので「誰でも読み書き可能」自体は残り、警告は消えない可能性がある**（正直に伝えるべき）\n- 完全対処には匿名認証（Anonymous Auth）＋ uid ベースの読取制限が必要\n\n### ホスティング先の選択（実務）\n- **Netlify Drop**：手軽だが、**再アップロードで別URLになる**＋デプロイ回数の無料枠に上限（超えるとブロックされる）\n- **GitHub Pages**：**URLが固定**（更新しても同じURL）、デプロイ回数の制限が実質なし、更新履歴が残る → **反復開発に最適**\n  - ファイル名を `index.html` にする必要がある\n  - Public リポジトリが必要（Firebase の apiKey はクライアント公開前提なので問題ない）\n\n### 3-2. 第2作『握るか、逃げるか』で新たに得られた知見\n\n- **Claudeアーティファクトの`window.storage`は、公開後に更新されない・真っ白になるという既知の不具合が再発した**。本ファイル§4に記録されていた症状と完全に一致し、**過去の記録が実際に役立った**。この移行手順は今後も再利用価値が高い\n- **秘匿情報（ほころびトークン）は`window.storage`の非共有領域（`shared: false`）に置くことで、多人数間の秘密情報を自然に実装できる**：各プレイヤーのブラウザ/アカウントに紐づくローカル領域に置くだけで、他プレイヤーからは物理的に見えない設計になる。検証イベントなど「発覚した結果だけを公開領域に書き込む」形にすれば、秘匿→公開の流れも綺麗に実装できる\n- **JSON経由の状態複製（`JSON.parse(JSON.stringify(state))`）は関数を保持できない**：NPCの戦略を関数ごとオブジェクトに持たせていたところ、複製のたびに関数が消えるバグが発生した。**戦略やロジックは「文字列キー」で持たせ、複製されないマップ（定数）から都度引き直す設計にする**のが安全\n- **ラウンド解決（誰がどの処理を担当するか）は、「最新状態を再取得→未処理なら処理→書き込む」というガード付きの楽観的ロックで十分機能する**：完全な排他制御がなくても、小規模な友人間プレイでは実用上問題にならなかった\n\n---\n\n## 4. アーティファクト → Firebase 移行リファレンス\n\nClaudeアーティファクト(`window.storage`)で作ったアプリを、外部ホスティング+Firebaseの\nスタンドアロン版に移行する実践済み手順。第1作で確立し、第2作で同じ症状が再発した際に\n**この記録がそのまま役立った**(再利用価値が実証済み)。\n\nClaudeのアーティファクト上で動くWebアプリ（ゲームなど）が、オンラインでの複数人同期機能（部屋を作って共有する、など）を必要とする場合の、実践済みの移行手順。`window.storage`という同じ形のAPIをそのまま使えるようにする「差し替え層（シム）」を使うことで、**アプリ本体のロジックには一切手を加えずに**、通信の土台だけをFirebaseに置き換えられる。\n\n---\n\n### 4-1. この移行が必要になるサイン（症状）\n\n以下のいずれかが起きたら、この移行を検討する：\n\n- ブラウザのコンソールに `Failed to execute 'postMessage' on 'DOMWindow': The target origin provided ('https://www.claudeusercontent.com') does not match the recipient window's origin` というエラーが出て、公開済みのアーティファクトが真っ白になる、または更新されない\n- `window.storage` の操作で `Storage get failed: Internal server error while processing action` のようなエラーが出る\n- 参加者から「Claudeへのログインを求められた」という報告がある（永続ストレージを使う操作には、閲覧専用の公開アーティファクトであっても認証が必要になる場合がある）\n- 新規に公開しようとすると「このコンテンツは既に共有されています」と表示される\n\nこれらは基本的に**コード側の不具合ではなく、Anthropicのプラットフォーム側の問題**であることが多い。自分のコードを疑う前に、まずこの移行で解決するかを試す価値がある。\n\n---\n\n### 4-2. 移行の考え方\n\n1. アプリのロジックは `window.storage.get/set/delete/list` という4つのメソッドだけを通信に使うように統一しておく（すでにそうなっているなら、この後の作業は差し替え層の追加だけで完結する）\n2. Claudeのアーティファクトとしてではなく、**外部の無料ホスティング（GitHub Pages、Netlify Dropなど）に置く、独立したスタンドアロンHTMLファイルにする**\n3. `window.storage` と全く同じ形のAPIを、Firebase Realtime Database（複数人で共有するデータ）＋ ブラウザの `localStorage`（個人のデータ、例えば「自分のID」など）で実装した「差し替え層」を追加する\n4. アカウント登録・ログインは一切不要。リンクを開くだけで誰でも参加できる状態になる\n\n---\n\n### 4-3. Firebaseセットアップ手順\n\n1. https://console.firebase.google.com/ にアクセスし、無料プロジェクトを新規作成\n2. 左メニューの「Realtime Database」を作成（テストモードでOK。ロケーションは近い地域を選ぶ）\n3. 「ルール」タブを以下のように設定して公開（**身内の短期テスト用の簡易設定**。長期運用や機密情報を扱う場合は要見直し）：\n   ```json\n   {\n     \"rules\": {\n       \".read\": true,\n       \".write\": true\n     }\n   }\n   ```\n4. 「プロジェクト設定 → 全般 → マイアプリ」で **ウェブアプリを追加**する\n5. SDKの設定画面が出たら、**「Config」を選択**する（npm・CDNではなく）。`import`文などが混ざらない、シンプルな `const firebaseConfig = {...}` の形だけが表示される\n6. 表示された設定オブジェクトの中身を、下記テンプレートの `FIREBASE_CONFIG` にそのまま貼り付ける（**変数名を `firebaseConfig` のまま貼ってしまうと動かないので要注意。必ず `FIREBASE_CONFIG` に統一する**）\n7. 完成したHTMLファイルを、GitHub PagesかNetlify Dropにアップロードする\n   - Netlifyの場合、**ファイル名を `index.html` にリネームしてからアップロード**しないと「ページが見つかりません」となる\n   - 既存サイトを更新する場合は、Netlify管理画面の「Deploys」タブから再アップロードする（新しくNetlify Dropに置くと、別サイト・別URLになってしまうので注意）\n\n---\n\n### 4-4. 差し替え層（シム）の実装テンプレート\n\n以下をHTMLファイルの `<head>` 内、アプリ本体のスクリプトより**前**に挿入する。\n\n```html\n<script src=\"https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js\"><\/script>\n<script src=\"https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js\"><\/script>\n<script>\n  // ▼▼▼ ここに、Firebaseコンソールで発行された設定をそのまま貼り付ける（Configタブの内容） ▼▼▼\n  const FIREBASE_CONFIG = {\n    apiKey: \"YOUR_API_KEY\",\n    authDomain: \"YOUR_PROJECT.firebaseapp.com\",\n    databaseURL: \"https://YOUR_PROJECT-default-rtdb.firebaseio.com\",\n    projectId: \"YOUR_PROJECT\",\n    storageBucket: \"YOUR_PROJECT.appspot.com\",\n    messagingSenderId: \"YOUR_SENDER_ID\",\n    appId: \"YOUR_APP_ID\"\n  };\n  // ▲▲▲ ここまで ▲▲▲\n\n  firebase.initializeApp(FIREBASE_CONFIG);\n  const _db = firebase.database();\n\n  // window.storage と同じ形のAPIを、Firebase Realtime Database（共有データ）と\n  // localStorage（個人データ）で実装するシム。アプリ本体のコードは一切変更不要。\n  window.storage = {\n    async get(key, shared){\n      if(!shared){\n        const v = window.localStorage.getItem(\"bw_\"+key);\n        return v===null ? null : {key, value:v, shared:false};\n      }\n      const snap = await _db.ref(\"shared/\"+key).get();\n      if(!snap.exists()) return null;\n      return {key, value: snap.val(), shared:true};\n    },\n    async set(key, value, shared){\n      if(!shared){\n        window.localStorage.setItem(\"bw_\"+key, value);\n        return {key, value, shared:false};\n      }\n      await _db.ref(\"shared/\"+key).set(value);\n      return {key, value, shared:true};\n    },\n    async delete(key, shared){\n      if(!shared){\n        window.localStorage.removeItem(\"bw_\"+key);\n        return {key, deleted:true, shared:false};\n      }\n      await _db.ref(\"shared/\"+key).remove();\n      return {key, deleted:true, shared:true};\n    },\n    async list(prefix, shared){\n      if(!shared){\n        const keys = [];\n        for(let i=0;i<window.localStorage.length;i++){\n          const k = window.localStorage.key(i);\n          if(k.startsWith(\"bw_\")){\n            const realKey = k.slice(3);\n            if(!prefix || realKey.startsWith(prefix)) keys.push(realKey);\n          }\n        }\n        return {keys, prefix, shared:false};\n      }\n      const snap = await _db.ref(\"shared\").get();\n      if(!snap.exists()) return {keys:[], prefix, shared:true};\n      const allKeys = Object.keys(snap.val());\n      const keys = allKeys.filter(k=>!prefix || k.startsWith(prefix));\n      return {keys, prefix, shared:true};\n    }\n  };\n<\/script>\n```\n\n### この実装のポイント\n\n- `shared=true` で呼ばれた場合はFirebase（全員で共有）、`shared=false`（省略時含む）の場合はlocalStorage（その端末だけの個人データ）に振り分けている\n- キーに `.` `#` `$` `[` `]` `/` を含む場合はFirebase側でエラーになる（今回のアプリでは `room:CODE:state` のようなコロン区切りのキーのみ使っていたため問題なかった）。もし将来的にこれらの文字を含むキーを使うなら、サニタイズ処理を追加すること\n- 通信失敗時の自動リトライは、この層ではなく**アプリ側のロジックで実装するのがおすすめ**（1回失敗したら0.7秒待って再試行、など。プラットフォーム側の一時的な不調を吸収できる）\n\n---\n\n### 4-5. Claudeアーティファクトから抜け出す：HTML全体の構造\n\nアーティファクト用のコードは `<!DOCTYPE html>` や `<html>` `<head>` `<body>` タグを持たない断片であることが多い。単独のHTMLファイルとして配布するには、以下のように包む：\n\n```html\n<!DOCTYPE html>\n<html lang=\"ja\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>アプリ名</title>\n</head>\n<body>\n<div id=\"root\"></div>\n<style>\n  /* ここに既存のCSSをそのまま */\n</style>\n\n<!-- ここに上記4-4のFirebaseシムを挿入 -->\n\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js\"><\/script>\n<script src=\"https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js\"><\/script>\n<script type=\"text/plain\" id=\"app-source\">\n  // ここにReactアプリ本体のコード（JSX込み）をそのまま\n<\/script>\n<script>\n  var src = document.getElementById(\"app-source\").textContent;\n  var compiled = Babel.transform(src, { presets: [[\"react\", {runtime:\"classic\"}]] }).code;\n  (0, eval)(compiled);\n<\/script>\n</body>\n</html>\n```\n\nこの構造なら、Reactアプリの中身（JSXコード）は一切変更せずに、Claudeアーティファクト版とFirebase版の両方で同じロジックを使い回せる。\n\n---\n\n### 4-6. 運用上の注意点\n\n- **無料枠（Sparkプラン）で身内のテスト用途なら十分**足りる\n- テスト後は、Realtime Databaseの「データ」タブから古い部屋のデータを手動整理すると見通しが良い\n- `.read: true, .write: true` は部屋番号さえ知っていれば誰でも読み書きできる設定。長期公開・不特定多数への公開には不向きなので、その場合はセキュリティルールを見直す\n- HTMLファイルを更新する際、**Firebaseの設定（`FIREBASE_CONFIG`）を上書きしないよう注意**（新しいテンプレートを渡す/受け取る際は、既存ファイルに差分だけ当てる形が安全）\n\n---\n\n## 4.5. 静的ホスティング運用の罠（GitHub Pages / Netlify）\n\n第4作『影の競り』の公開時に実際に踏んだ罠。**どれもコードのバグではなく、運用・環境の問題**であり、\n「自分のコードを疑う前に、ここを確認する」チェックリストとして残す。\n\n### 4.5-1. 【最重要】ブラウザキャッシュで「更新したのに反映されない」\n\n**症状:** ファイルを更新してアップロードしたのに、URLを開くと古いまま。\n**シークレットウィンドウでは新しい版が見える**（＝ファイルは正しく更新されている）。\n\n**その場しのぎ:** スーパーリロード（Windows: `Ctrl+Shift+R` / Mac: `Cmd+Shift+R`）\n\n> **だが、これは根本解決にならない。**\n> **仲間に配ったURLでも同じことが起きる。「更新したよ」と伝えても、相手は古い版を開いたまま。**\n> **そして毎回「スーパーリロードして」と言わなければならない。**\n\n**構造的対処①：キャッシュ無効化メタ**（全HTMLの `<head>` に）\n\n```html\n<meta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\">\n<meta http-equiv=\"Pragma\" content=\"no-cache\">\n<meta http-equiv=\"Expires\" content=\"0\">\n```\n\n単一HTMLファイル（数十KB〜100KB）なら、毎回読み直しても体感差はない。**開発中はこれが正解。**\n\n### 4.5-2. 【オンライン対戦では致命的】版の食い違いが「原因不明の不具合」になる\n\n**キャッシュ対処だけでは、\"既に古い版を開いている仲間\" を救えない。**\n\n> **あなたが新版、相手が旧版 → 通信の形（スキーマ）が食い違う → 原因不明のバグ。**\n> **これは最もデバッグしづらい不具合の一つ。**\n\n**構造的対処②：版番号をDBに記録し、食い違いを自動検出する**\n\n```js\nconst VER = \"1.0\";                       // ★更新のたびに上げる\n\n// 部屋を作るとき\nmeta: { ..., ver: VER }\n\n// 参加者側の描画で\nif (DB.meta.ver && DB.meta.ver !== VER) {\n  showBanner(`⚠️ 版が食い違っています ―― この卓は v${DB.meta.ver}、あなたのページは v${VER}。\n    ページを再読み込みしてください（Ctrl+Shift+R）。`);\n}\n```\n\n**さらに、画面の隅に版番号を常時表示**しておくと、口頭でも食い違いを即座に確認できる。\n\n> **原則：オンライン対戦を作るなら、\"版番号をDBに書いて突き合わせる\" を最初から入れる。**\n> **後から入れると、その時点で古い版を持っている人には警告が出せない（＝入れ得ない）。**\n\n### 4.5-3. GitHub Pages が `index.html` を無視して README を表示する\n\n**症状:** `https://user.github.io/repo/` を開くと、`index.html` ではなく `README.md` が表示される。\n\n**原因:** GitHub Pages が **Jekyll** として動いている。\n\n**対処:** リポジトリのルートに **`.nojekyll`**（先頭にドット・拡張子なし・**中身は空**）を置く。\n素のHTMLサイトに Jekyll は不要なので、無効化して構わない。1〜2分で再ビルドされる。\n\n**併せて確認:** `Settings → Pages` の **Source = `Deploy from a branch`** / **Branch = `main` / `(root)`**。\n\n### 4.5-4. `index.html` をリネームしてはいけない\n\n`index.html` は「そのフォルダを開いたときに暗黙で表示されるファイル」という**特別な名前**。\nリネームすると **`https://user.github.io/repo/` が 404 になり、配布済みのリンク・ブックマークが全部切れる。**\n\n**正しい手順（一瞬もリンクを切らない）:**\n1. 今の `index.html` を**コピーして `witch.html` として追加**（この時点で両方が存在＝安全）\n2. `witch.html` が動くことを確認\n3. **`index.html` の中身を、ゲーム一覧のトップページに置き換える**（Edit → 全選択 → ペースト）\n4. 新作を `seri.html` として追加\n\n**結果:** `index.html` = 入口ページ / `witch.html` / `seri.html` = 各ゲーム。\n**古いURLを踏んだ人も、一覧から辿り着ける。何も壊れない。**\n\n### 4.5-5. 【前提】Firebase プロジェクトは、作品ごとに分ける\n\n両作とも `rooms/{4文字コード}` を使うため、**同じFirebaseプロジェクトだと衝突する**（同じ合言葉が生成されると、互いのデータを破壊する）。**セキュリティルールも DB 単位なので衝突する。**\n\n- **推奨：作品ごとに新規プロジェクトを作る**（無料枠で複数作れる。作業は `FIREBASE_CONFIG` の貼り替えだけ）\n- **⚠️「マイアプリ → アプリを追加」では解決しない。**アプリを追加しても `databaseURL` は同じ＝DBは共有のまま。\n  **分けたいのはDBであり、DBはプロジェクトに紐づく。**\n- 確認方法：`FIREBASE_CONFIG` の **`databaseURL` が作品ごとに違うこと**\n\n### 4.5-7. ホスティングの選択が、開発速度を左右する\n\n**第3作で実際に詰まった:** Netlify Drop を使っていたが、\n**「アカウントのクレジット使用量が上限を超えました。新規デプロイはブロックされます」** で停止した。\n\n> **反復開発では1日に何度もデプロイするため、デプロイ回数に制限があるサービスは向かない。**\n\n| サービス | URL | デプロイ制限 | 反復開発向き |\n|---|---|---|---|\n| Netlify Drop | **再アップロードで変わる** | あり（実際に詰まった） | ✕ |\n| **GitHub Pages** | **固定** | 実質なし | **◎** |\n\n### 4.5-6. 運用チェックリスト\n\n- [ ] `<head>` にキャッシュ無効化メタを入れたか\n- [ ] `VER` を定義し、DBの `meta.ver` に書いて突き合わせているか（オンライン対戦なら必須）\n- [ ] 画面隅に版番号を表示しているか\n- [ ] `.nojekyll` を置いたか（GitHub Pages）\n- [ ] `index.html` を消さず、入口ページとして維持しているか\n- [ ] Firebase プロジェクトは作品ごとに別か（`databaseURL` を確認）\n- [ ] アップロード前に `FIREBASE_CONFIG` を貼り込んだか（空のままだと「未設定」表示になる）\n\n---\n\n## 4.9. 統合・リファクタで踏んだ落とし穴（第3作『魔女の調合』）\n\n**「統合したつもりで漏れていた」「動いているように見えて壊れていた」類の失敗の記録。**\n**どれもプレイヤーからのフィードバックで発覚した。自分では気づけなかったのが共通点。**\n\n### 4.9-1. 「統合した」は「全機能が移った」を意味しない ― 移植漏れ\n\nローカル検証版 → オンライン版へ統合したとき、**複数の機能が静かに消えていた**（ルール説明ページ全体／トップのSVGイラスト／上級モードのオンライン実装）。\n\n**なぜ気づけなかったか:**\n- 統合作業では「ロジックが動くか」に注意が向き、**装飾・補助機能の有無をチェックしない**\n- ソロには実装したので「実装した」と記憶が上書きされ、**オンライン側の配線を忘れた**\n- **構文チェックは通る**（関数が存在しないのではなく、**呼ばれていないだけ**）\n\n**対策：統合時に「機能インベントリ」を作って照合する**\n\n```\n[ ] ゲームロジック（採点・配布・評価）\n[ ] ルール説明・ヘルプ・ツールチップ\n[ ] イラスト・装飾・アニメーション\n[ ] 効果音\n[ ] 各モード（対戦/ソロ/観戦）すべてで、上記が動くか\n[ ] 新機能を追加したら、全モードに配線したか  ← ★最も漏れる\n```\n\n> **教訓：新機能を片方のモードに実装したら、その場で全モードへの配線を確認する。「あとで入れる」は「入れない」になる。**\n\n**機械的な検出法:**\n```bash\ngrep -c 'function dealAdvanced' file.html   # → 1（定義あり）\ngrep -c 'dealAdvanced(' file.html           # → 1（定義のみ＝呼び出しゼロ！）\n```\n**定義数と呼び出し数を比較すると、配線漏れが機械的に見つかる。**\n\n### 4.9-2. 【原則】権限は「不正を防ぐため」に付ける。「進行を独占するため」ではない\n\n当初「次のラウンドへ」をホストのみ押せる設計にしていた（権限管理の定石に従った）。**これは悪手だった:**\n- **ホストが離席・切断すると、全員が待たされて進行不能**\n- 進行を独占する理由がそもそも無い\n- 「早く押して」と催促する空気が生まれる（**奉行問題の温床**）\n\n| | 権限が必要か |\n|---|---|\n| **他人になりすます操作**（他人の手番で選ぶ、他人の秘匿情報を書く） | **必要** |\n| **誰がやっても同じ結果になる操作**（次へ進む、採点を実行する） | **不要** |\n\n**対策：進行は誰でもできるようにし、二重実行は transaction のガードで防ぐ。**\n\n```javascript\nasync function nextRound(){\n  // 権限チェックなし。誰でも押せる\n  await db.ref(path).transaction(cur => {\n    if(!cur || cur.phase !== \"score\") return;   // ★これで二重実行は防がれる\n    return nextState;\n  });\n}\n```\n\n**採点処理も同様に、ホスト不在時は「最小の生存席」が代行する設計にする。冗長性を持たせる。**\n\n### 4.9-3. 観戦モードは「作る」より「何を見せるか」が本体\n\n観戦モードを実装したが、最初は**盤面しか出しておらず、実質使い物にならなかった。**\n\n> **原則：観戦モードの価値は「全部見える」ことではなく、「異常が一目で分かる」こと。**\n\n| 観戦者が本当に見たいもの | なぜ要るか |\n|---|---|\n| **各席の接続状態**（在席/切断・最終生存報告からの秒数） | **★必須。**「止まってる」のか「切断してる」のか判別できないと、何も分からない |\n| **今誰の番か**（フェーズ＋何番目か） | 進行が正常か、固まっているかの判断 |\n| **獲得・確保の状況** | 進行状況をリアルタイムで追える |\n| **全員の秘匿情報と、その発火状況** | バランスの目視確認 |\n| **履歴** | 「さっき何が起きたか」の遡り |\n| **接続鮮度**（最終同期n秒前） | 観戦者自身のデータが古くないかの確認 |\n\n> **接続状態がないと「バグで止まった」のか「誰かが切断した」のか区別できず、デバッグにならない。**\n\n### 4.9-4. リファクタで壊れる典型パターン（3種）\n\n**パターン1：関数の抽出時に、変数宣言を巻き込んで消す**\n置換のアンカーを誤り、`let localCuts = []` ごと消滅。**ReferenceError にならず、暗黙のグローバルとして動くこともあり、発見が遅れる。**\n→ **対策：置換後に `grep -c 'let localCuts'` で宣言数を確認する（1であるべき）。**\n\n**パターン2：状態遷移の初期化を1つ忘れる**\n```javascript\nfunction nextRound(){\n  round++; cutter = (cutter+1) % n; band = makeBand(n);\n  cuts = null; assign = {}; chooseIdx = 0;\n  // phase = \"cut\";  ← ★これを忘れて、儀式が進まないバグに\n}\n```\n→ **発見方法：ヘッドレスで通しゲームを回し、「N ラウンド完走するか」を自動検証する。**\n\n**パターン3：型を追加したのに、一部の分岐で未対応**\n新しい型を追加し、採点関数には足したが、参照関数が旧プールしか見ておらず `undefined` に。\n→ **対策：型を追加したら、その型に触る全関数をリストアップして潰す。**\n\n---\n\n## 5. UI/UX設計の原則\n\n### 5-1. 原則:判断の「補助」は足すほど良い、「肩代わり」は楽しさを殺す\n\n判断の**補助**は足すほど良い。判断の**肩代わり**(最善手サジェスト・自動プレイ)は楽しさを殺す。この境界が最重要。\n\n- **履歴・ログ** — 直前アクションを盤面ハイライトで一瞬表示。捨て札もいつでも確認可。ダウンタイム後の復帰を助ける。\n- **状態の可視化** — 得点差・残リソース・勝利条件までの距離を暗算させない。ただし「事実は見せるが最善手は教えない」。\n- **フィードバック(ジュース)** — 効果音・アニメで感覚(Sensation)を補う。頻繁な操作ほど演出は短く軽く。\n- **操作の摩擦を減らす** — 定型動作をワンクリック化、スナップ。意味のない手作業を削る。\n- **取り消し・確認(Undo)** — 探索的プレイを後押し。ただし非公開情報を伴う操作のUndoは不可(巻き戻し悪用対策)。\n- **手番・順序の明示** — 「今誰の番か/次は誰か/何をすべきか」を常時表示。\n\n**落とし穴:** 情報を出しすぎ・自動化しすぎると盤面を「読む」時間が消え思考が浅くなる。何を自動化し、何をあえて手作業(=思考の時間)として残すかは主軸の楽しさで決める。\n\n### 5-1b. 【実バグ】`confirm()` / `alert()` / `prompt()` は、埋め込み環境でブロックされる\n\n第4作で「新規ボタンを押しても何も起きない」という不具合が出た。原因は:\n\n> **サンドボックス化された iframe（`allow-modals` なし）では、`window.confirm()` が**\n> **ダイアログを出さずに、黙って `false` を返す。**\n\n`if (confirm('やり直す？')) { reset(); }` → **確認も出ず、リセットもされず、エラーも出ない。**\n**「ボタンが反応しない」不具合の、典型的な原因のひとつ。**\n\n**対処：ネイティブダイアログを使わず、UI内で完結させる。**\n\n| 操作の重さ | 実装 |\n|---|---|\n| **軽い**（やり直し等・押し間違えても損が小さい） | **確認を出さず、即実行**（`confirm` を消すだけ） |\n| **重い**（退室・他人に影響する） | **2段階クリック** ―― 1回目で文言が「本当に？（もう一度押す）」に変わり、色も変える。数秒で自動キャンセル |\n\n```js\nlet _ask=false, _t=null;\nfunction askLeave(){\n  if(_ask){ clearTimeout(_t); _ask=false; leaveRoom(); return; }   // 2回目 → 実行\n  _ask=true; render();                                              // 1回目 → 確認状態へ\n  _t=setTimeout(()=>{_ask=false;render();},4000);                   // 4秒で自動キャンセル\n}\n```\n\n**併せて発見した関連バグ:** 状態を `null` にした後、**残っていた `setTimeout(npcTurn)` が発火してクラッシュ**する。\n**非同期処理の入口には必ず `if(!S) return;` のガードを入れる。**\n\n### 5-1c. 【実バグ】全体 `innerHTML` の再描画は、モーダルのスクロール位置を破壊する\n\n**症状:** ルール説明を読んでいる最中に再描画が走ると、**スクロールが先頭に戻る。**\n\n**原因:** `render()` が `#app` を丸ごと `innerHTML` で書き換えており、その中にモーダルが含まれていた。\n\n**対処：モーダルを、再描画の対象外のDOMに分離する。**\n\n```html\n<div id=\"app\"></div>\n<div id=\"modal\"></div>   <!-- ★ render() は触らない -->\n```\n\n```js\nfunction render(){\n  app.innerHTML = ...;    // #app だけ\n  syncModal();            // モーダルは「開閉時のみ」書き換える\n}\nfunction syncModal(){\n  if(help && !_open){ modal.innerHTML = helpHTML(); _open = true; }\n  else if(!help && _open){ modal.innerHTML = \"\"; _open = false; }\n  // ★開いている間は一切触らない = scrollTop が維持される\n}\n```\n\n> **原則：「開いている間、DOMが不変であること」がスクロール保持の条件。**\n> 個別に `scrollTop` を保存・復元するより、**そもそも書き換えない構造**にする方が確実。\n\n**⚠️ この不具合は「別の症状」として報告される。**\n第3作でのプレイヤーからの報告は **「遊び方のスクロールが、全員で同期してる」** だった。\n実際には同期などしていない。**他人の操作でDBが更新される → 再描画 → 自分のスクロールが先頭に戻る**\n――それが「他人に合わせて動いている」ように見えていた。\n**開発中は一人で試すので、再描画が起きず、絶対に気づけない。**\n\n**同じ根を持つ問題（すべて同時に直る）:**\n- 入力欄の文字が、再描画で消える／**日本語変換（IME）が「あ」だけ残して壊れる**（§5-1d）\n- ドロップダウンの選択が戻る\n- チェックボックスが外れる\n\n> **一般原則：リアルタイム更新される領域と、ユーザーの操作状態を持つ領域**\n> **（スクロール位置・入力中の文字・開閉状態・選択状態）は、DOMを分離する。**\n> **分離できないものは、再描画で失われるUI状態をJS変数に退避する。**\n\n### 5-2. 致命的だった実装ミス(第2作・要注意・再発防止)\n\n- **このアーティファクト環境では、Tailwindの任意値クラス（`bg-[#0B0E11]`のような角括弧記法）はコンパイルされない**。背景・文字色・枠線のほとんどが表示されず、「画面が真っ暗で何も反応しない」という重大な不具合を引き起こした。**次回は最初から、カスタム色は全てインラインstyleで指定する**（`className=\"bg-[#hex]\"`を一切使わない）ことを徹底する\n- **危険度メーターに「正確な位置を示す白い線」を実装してしまい、隠しているはずの正確な数値を視覚的に漏らしていた**。**「情報を隠す」設計をした要素については、見た目の演出（アニメーション、位置、サイズなど）が精度の高い情報を副次的に漏らしていないか、都度確認する**（「プロセス検証知見」§9・原則5「秘匿UIは見た目の構造まで確認する」の再確認）\n\n---\n\n## 6. UX実装レシピ集 ― 『魔女の調合』(第3作)より\n\n「面白いルール」と「遊んでいて気持ちいい」は別物。ここは**次回コピペで使える実装**をコード片ごと残す。\n本ファイル§5の原則（**判断の補助は足すほど良い／判断の肩代わりは楽しさを殺す**）を前提に、\nその境界を守りながら快適性を上げる具体策。\n\n---\n\n### 6-1. 効果音：Web Audio の合成音だけで完結させる\n\n音声ファイル不要。**単一HTMLのまま音が出せる**ので、配布が楽で読み込み遅延もない。\n\n```javascript\nlet audioCtx=null, muted=false;\n// AudioContext は「ユーザー操作後」でないと started にならない。毎回 resume を試みる\nfunction ac(){\n  if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }\n  if(audioCtx && audioCtx.state===\"suspended\"){ audioCtx.resume().catch(()=>{}); }\n  return audioCtx;\n}\n// 汎用トーン：周波数・長さ・波形・音量・遅延・スライド先\nfunction tone(freq,dur,type,vol,delay,slideTo){\n  const c=ac(); if(!c||muted) return;\n  const t0=c.currentTime+(delay||0);\n  const o=c.createOscillator(), g=c.createGain();\n  o.type=type||\"sine\"; o.frequency.setValueAtTime(freq,t0);\n  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,t0+dur);\n  // ★ゲイン包絡：立ち上がりを12msにすると「プチッ」というクリックノイズが消える\n  g.gain.setValueAtTime(0,t0);\n  g.gain.linearRampToValueAtTime(vol||.14, t0+.012);\n  g.gain.exponentialRampToValueAtTime(.0008, t0+dur);  // 指数減衰＝自然な余韻\n  o.connect(g); g.connect(c.destination);\n  o.start(t0); o.stop(t0+dur+.03);\n}\nconst SFX={\n  cut(){  tone(1400,.12,\"triangle\",.10,0,320); tone(220,.08,\"sine\",.06,0); }, // 高→低スライドで「切る」感\n  pick(){ tone(360,.09,\"sine\",.12,0); tone(540,.10,\"sine\",.07,.02); },        // 二音重ねで「取る」感\n  score(){[660,880,1100,1320].forEach((f,i)=>tone(f,.5,\"sine\",.06,i*.06)); }, // 上昇アルペジオ＝達成\n  good(){ [523,659,784,1047].forEach((f,i)=>tone(f,.6,\"triangle\",.07,i*.08)); }, // 高得点時の追加ファンファーレ\n  soft(){ tone(300,.06,\"sine\",.07,0); },   // 軽い操作（刃を置く等）\n  click(){tone(520,.05,\"triangle\",.09,0); tone(780,.04,\"sine\",.05,.01); }, // 汎用クリック\n  yourTurn(){ tone(784,.16,\"sine\",.11,0); tone(1047,.22,\"sine\",.10,.12); }, // 手番通知：澄んだ二音\n};\n```\n\n**音作りのコツ（実践で効いたもの）:**\n- **立ち上がり12ms・指数減衰**：これをやらないと「プチッ」とノイズが乗る。最重要\n- **音量は控えめ（.05〜.14）**：頻繁に鳴る音ほど小さく。うるさいと即ミュートされる\n- **意味と音色を対応させる**：切る＝高→低スライド、取る＝二音重ね、達成＝上昇アルペジオ\n- **段階的な報酬**：普通の採点音（score）＋高得点時だけ追加のファンファーレ（good）で「やった感」に差をつける\n\n```javascript\n// 高得点のときだけ追加で鳴らす\nif(pct>=80) setTimeout(()=>SFX.good(), 350);  // 少し遅らせて重ねると豪華になる\n```\n\n---\n\n### 6-2. 全ボタンに自動でクリック音（イベント委譲）\n\n各ボタンに個別に音を仕込むと漏れる。**イベント委譲で一括**が確実。\n\n```javascript\n// capture=true で、他のハンドラより先に確実に拾う\ndocument.addEventListener(\"click\", e=>{\n  const b=e.target.closest(\"button\");\n  if(b && !b.disabled){ ac(); SFX.click(); }\n}, true);\ndocument.addEventListener(\"change\", e=>{\n  if(e.target.tagName===\"SELECT\"){ ac(); SFX.soft(); }\n}, true);\n```\n- `closest(\"button\")` でボタン内の子要素（アイコン等）をクリックしても拾える\n- **`!b.disabled` の確認が重要**：無効ボタンを押したのに音が鳴ると「押せた？」と誤解させる\n\n---\n\n### 6-3. 手番通知音：オンラインでは「待ち」が長いので必須\n\n自分の番になった**瞬間だけ**鳴らす。鳴らしすぎると邪魔。\n\n```javascript\nlet _sndPrev={key:\"\", myTurn:false};\nfunction soundOnGameTransition(){\n  const g=ST.game; if(!g) return;\n  const order=chooseOrder(g.cutter,g.n);\n  const myTurn = (g.phase===\"cut\" && ST.mySeat===g.cutter)\n              || (g.phase===\"choose\" && order[g.chooseIdx]===ST.mySeat);\n  // 局面が変わった瞬間だけ採点音（同期のたびに鳴らさない）\n  const key=`${g.round}:${g.phase}:${g.chooseIdx}`;\n  if(key!==_sndPrev.key){\n    if(g.phase===\"score\" && g.roundEval){ ac(); SFX.score(); }\n    _sndPrev.key=key;\n  }\n  // 「待ち → 自分の番」に切り替わった瞬間だけ通知\n  if(myTurn && !_sndPrev.myTurn){ ac(); SFX.yourTurn(); }\n  _sndPrev.myTurn=myTurn;\n}\n```\n> **原則：リアルタイム同期では「前回の状態と比較」して、変化の瞬間だけ演出する。**\n> 状態を購読するたびに鳴らすと、再描画のたびに音が鳴って地獄になる。\n\n---\n\n### 6-4. ミュート切替は必ず用意する（そして状態を目で見せる）\n\n```javascript\nfunction toggleMute(){\n  muted=!muted;\n  const b=document.getElementById(\"muteBtn\");\n  if(b) b.textContent = muted ? \"🔇\" : \"🔊\";\n  if(!muted){ ac(); SFX.soft(); }  // ★解除時に小さく鳴らす＝「音が戻った」フィードバック\n}\n```\n- アイコン自体が現在の状態を表す（🔊＝音あり／🔇＝ミュート）\n- **解除時に音を鳴らす**のが地味に大事。無音のままだと解除されたか分からない\n\n---\n\n### 6-5. 色設計：CSS変数で一元管理し、意味と色を対応させる\n\n```css\n:root{\n  /* 背景の階層（暗→明） */\n  --night:#1a1526; --night2:#251d38; --night3:#31264a;\n  /* テーマ色（蝋燭の灯り・月光） */\n  --candle:#e8b45a; --candle-soft:#f5d89a; --moon:#c3cdea;\n  /* テキスト */\n  --ink:#f2eefa; --muted:#a69dc7; --line:#493d68;\n  /* 意味の色（万国共通） */\n  --good:#84e0ac; --bad:#ef9494;\n  /* 素材6種（識別しやすく、かつテーマに沿う） */\n  --m0:#86c96f; --m1:#e5745a; --m2:#b183d6; --m3:#f0d165; --m4:#79cbe4; --m5:#6a9a7c;\n  /* 好みの型ごとの色 */\n  --t-pair:#f0b45a; --t-cnt2:#7fb0e8; --t-solo:#c79ae0; --t-abs2:#e58a8a; --t-abs:#d98f8f;\n}\n```\n\n**要点:**\n- **CSS変数で一元管理**：後からテーマ全体の色を調整できる。JSからも `MAT[i].color` として参照\n- **素材の色は「識別性」優先**：6色が一目で区別できること。似た色を並べない\n- **良い/悪いは緑/赤**（`--good`/`--bad`）：文化を問わず伝わる\n- **プレイヤー色（PCOL）を全画面で統一**：名前・盤面・履歴・名場面で常に同じ色 → 誰の話か一瞬で分かる\n\n---\n\n### 6-6. フォント：テーマ用と実用UI用を分ける\n\n```css\n:root{\n  /* 世界観用：明朝＝「魔導書」の質感。見出し・数値・称号に */\n  --grimoire:\"Yu Mincho\",\"Hiragino Mincho ProN\",\"Songti SC\",serif;\n  /* 実用UI用：ゴシック＝可読性。本文・ボタン・説明に */\n  --ui:\"Yu Gothic\",\"Hiragino Kaku Gothic ProN\",system-ui,sans-serif;\n}\n```\n- **Webフォントを読み込まない**（単一HTMLの利点を殺さない・オフラインでも動く）\n- **OSごとのフォールバックを並べる**：Win（Yu Mincho）→ Mac（Hiragino）→ 中華圏（Songti SC）→ serif\n- **使い分けの原則**：**雰囲気を出す場所は明朝、読む場所はゴシック**\n  - 明朝：タイトル、称号、得点の大きな数字、見出し、儀式番号\n  - ゴシック：本文、ボタン、ルール説明、注意書き\n- `letter-spacing:.1em` を明朝の見出しに足すと、格調が出る\n\n---\n\n### 6-7. ボタンのフィードバック：3状態を必ず作る\n\n```css\nbutton{\n  background:var(--night3); color:var(--ink); border:1px solid var(--line);\n  border-radius:9px; padding:9px 16px; cursor:pointer;\n  transition:transform .12s, box-shadow .12s, border-color .12s, background .12s;\n}\n/* hover：浮き上がる＋発光 */\nbutton:hover:not(:disabled){\n  border-color:var(--candle); transform:translateY(-1px) scale(1.03);\n  box-shadow:0 4px 14px rgba(232,180,90,.22); background:#3a2e56;\n}\n/* active：沈む（押した感） */\nbutton:active:not(:disabled){ transform:scale(.98); }\n/* disabled：明確に薄く＋カーソルも変える */\nbutton:disabled{ opacity:.35; cursor:default; }\n```\n\n**要点:**\n- **hover で浮き、active で沈む**：この対比が「押した」感触を作る\n- **`:not(:disabled)` を必ず付ける**：無効ボタンが反応すると混乱する\n- **disabled は opacity .35 くらい強めに**：薄すぎるくらいでちょうどいい\n- **transition は .12s**：速すぎると気づかず、遅いともっさりする\n- モバイル対策：`html{-webkit-tap-highlight-color:transparent}` でタップ時の青い矩形を消す\n\n---\n\n### 6-8. アニメーション：意味のある2つだけ\n\n```css\n/* 自分の番：ゆっくり脈動して注意を引く（急かさない速度） */\n@keyframes pulseGlow{\n  0%,100%{ box-shadow:0 0 0 rgba(232,180,90,0) }\n  50%{ box-shadow:0 0 18px rgba(232,180,90,.32) }\n}\n.turnbar.active{ animation:pulseGlow 2.2s ease-in-out infinite; }\n\n/* 得点の出現：跳ねて登場（達成感） */\n@keyframes pop{\n  0%{ transform:scale(.5); opacity:0 }\n  55%{ transform:scale(1.18); opacity:1 }  /* ★一度オーバーシュートさせる */\n  100%{ transform:scale(1) }\n}\n.scorepop{ animation:pop .45s ease-out; }\n```\n- **オーバーシュート（1.18倍まで膨らんでから戻る）**が「跳ねた」感触の正体。これがないと平板\n- **脈動は2秒以上のゆっくりした周期に**：速いと急かされて不快\n- アニメは**増やさない**。多用すると安っぽくなる。「手番」「得点」の2箇所に絞った\n\n---\n\n### 6-9. 説明はいつでも開ける（❓ボタン＋用語ツールチップ）\n\n**ルール説明は「最初に読むもの」ではなく「プレイ中に何度も参照するもの」。**\nどの画面（ホーム・ロビー・対戦中・ソロ・観戦）からも開けるようにする。\n\n```javascript\n// render() の全経路にモーダルを重ねる\nfunction render(){\n  const help = helpOpen ? helpHTML() : \"\";\n  if(SOLO.active){ app.innerHTML = soloHTML() + help; return; }\n  if(!ST.room){   app.innerHTML = homeHTML() + help; return; }\n  // ... 各画面 ...\n  app.innerHTML = html + help;\n}\n```\n\n**用語ツールチップ**（hover でもタップでも出る）：\n```javascript\nfunction term(label,desc){\n  return `<span class=\"term\" onclick=\"\n    const s=this.classList.contains('show');\n    document.querySelectorAll('.term.show').forEach(e=>e.classList.remove('show'));\n    if(!s) this.classList.add('show'); event.stopPropagation();\n  \">${label}<span class=\"tip\">${desc}</span></span>`;\n}\n// 使い方：専門用語を初出のたびに包む\nconst T = {\n  cutter: ()=>term(\"調合師\",\"素材を分ける係。坩堝を選べず、残り一つを受け取る。毎儀式で交代。\"),\n  keen:   ()=>term(\"冴え\",\"完璧（全てを見通した最適）に対する達成度。100%が真の熟達。\"),\n};\n```\n```css\n.term{ border-bottom:1px dashed var(--candle); color:var(--candle-soft); cursor:help; }\n.tip{ visibility:hidden; opacity:0; position:absolute; bottom:135%; left:50%;\n      transform:translateX(-50%); width:210px; z-index:60; transition:opacity .15s;\n      pointer-events:none; /* ★これがないとツールチップ自体にhoverして無限ループ */ }\n.term:hover .tip, .term.show .tip{ visibility:visible; opacity:1; }\n/* モーダル内では上に出すと画面外に出るので、下に出す */\n.modal .tip{ bottom:auto; top:135%; }\n```\n- **hover（PC）とタップ（モバイル）の両対応**：`:hover` と `.show` クラスの二段構え\n- **他のツールチップを閉じてから開く**：複数開くと画面が汚れる\n- **`pointer-events:none`** を忘れない（ツールチップにマウスが乗ると挙動が壊れる）\n\n> **原則：専門用語を作ったら、その場で説明にアクセスできるようにする。**\n> 用語集を別ページに置くと、誰も読まない。\n\n---\n\n### 6-10. 確定前プレビュー：不安を消すが、判断は奪わない\n\n「刃を置く → こう分かれる」を**確定前に見せる**。状態を変えず、その場で計算するだけ。\n\n```javascript\nif(localCuts.length>0){\n  const preview = toPiles(band, localCuts.slice().sort((a,b)=>a-b));  // 仮適用\n  html += `<div class=\"kv\">分かれ方（プレビュー）：</div><div class=\"miniRow\">`;\n  for(const pile of preview){\n    html += `<div class=\"miniPile\">${pile.map(m=>gem(m)).join(\"\")}<span class=\"kv\">${pile.length}個</span></div>`;\n  }\n  html += `</div>`;\n}\n```\n\n**境界線が重要:**\n- ✅ **見せる**：「どう分かれるか」（事実）\n- ❌ **見せない**：「この分け方は何点になるか」（判断）\n\n得点を先出しすると、プレイヤーは「盤面を読む」のをやめて「表示を見る」だけになる。\n**主軸の楽しさが思考なら、思考の結果を先出ししてはいけない。**\n\n---\n\n### 6-11. 手番の明示：オンラインは「今どうなってる？」が最大のストレス\n\n対面と違い、**オンラインでは他人が何をしているか見えない**。常時表示で解消する。\n\n```javascript\n// 1. 誰の番か・自分の番か（大きく）\nif(isMine) → `<span class=\"yourturn\">✨ あなたの番です</span>`（光って脈動）\nelse       → `⏳ ${pill(currentPlayer)} が坩堝を選んでいます…`\n\n// 2. 席チップ列で全体を一望\nfor(let s=0;s<n;s++){\n  const done = picked.includes(s);         // 選択済み → 薄く\n  const now  = (s === currentSeat);        // 手番 → 枠が光る\n  const cut  = (s === g.cutter);           // 切り役 → 🔪\n  html += `<span class=\"seatchip ${now?'now':''}\" style=\"opacity:${done?.5:1}\">\n             ${nameOf(s)}${cut?'🔪':''}</span>`;\n}\n```\n**さらに接続の健全性も見せる:**\n```javascript\n`🟢 接続中 ・ 最終同期 ${Math.round((Date.now()-ST.lastUpdate)/1000)}秒前`\n```\n> **原則：オンラインでは「待たされている理由」を常に示す。**\n> 無言の待ちは、故障と区別がつかない。\n\n---\n\n### 6-12. 観戦モードは「デバッグ・運用の道具」として強力\n\n席に着かず、全情報（全員の秘匿情報・全個人点）を見られるモードを作った。\n当初はテストプレイ監視のためだったが、**開発中の価値が非常に高い**：\n\n- **バグの再現・観察**：プレイヤーとして参加すると自分の情報しか見えないが、観戦なら全部見える\n- **バランスの目視確認**：「今のは理不尽な配布だったのでは？」をその場で検証できる\n- **配信・実況**にも転用可能（ただしその場合は秘匿を伏せる版が要る）\n- **書き込みをしない**ので、進行に一切影響しない（安全）\n\n```javascript\nasync function spectate(){\n  ST.room=code; ST.spectator=true; ST.mySeat=null;  // 席に着かない\n  // 全ノードを購読（秘匿情報も含む）。ただし書き込みは一切しない\n  _db.ref(roomPath(\"recipes\")).on(\"value\", s=>{ ST.allRecipes=s.val(); render(); });\n  // ...\n}\n```\n> **実装コスト（1〜2時間）に対して、開発効率の見返りが大きい。早い段階で作る価値がある。**\n\n---\n\n### 6-13. ソロ（1人回し）モードは最初に作るべきだった\n\nオンライン対戦をテストするには、本来3〜4人が必要で、毎回集めるのは非現実的。\n**1人で全席を操作できるモードがあれば、ロジックの検証が一瞬で終わる。**\n\n- Firebase不要で動く（ネットワーク層の問題と切り分けられる）\n- 全情報を表示（デバッグに最適）\n- **採点・評価・プールのロジックを本番と共有する**（ここが重要）\n\n> **⚠️ 失敗した点：最初「ローカル検証版」と「オンライン版」を別ファイルで作ってしまい、\n> 片方を直すともう片方が古くなる二重管理地獄に陥った。**\n> 途中で**単一ファイルに統合**し、ソロ/対戦/観戦がロジックを共有する形にして解決。\n\n> **原則：検証モードは、本番と同じコードを使う「モード」として実装する。別ファイルにしない。**\n\n---\n\n### 6-14. エラーは握りつぶさず、目に見える場所に出す\n\n```javascript\nfunction showError(msg){ ST.error=msg; render(); setTimeout(()=>{ ST.error=\"\"; render(); }, 6000); }\n// 画面上部に赤バナー\nif(ST.error) html += `<div class=\"errbanner\">⚠️ ${ST.error}</div>`;\n```\n- **try/catch で握りつぶすと、デバッグ不能になる**（前作の最大の教訓）\n- ユーザーにも「何が起きたか」が分かる（「反応しない」より遥かにマシ）\n- 6秒で自動的に消える（残り続けると邪魔）\n\n---\n\n### 6-15. テーマの一貫性：用語を最後まで統一する\n\n機能名を、テーマの言葉に統一した：\n\n| 一般的な言葉 | このゲームでの呼び方 |\n|---|---|\n| ラウンド | **儀式** |\n| 得点 | **魔力** |\n| 切り分ける人 | **調合師** |\n| 分けられた塊 | **坩堝（るつぼ）** |\n| 履歴・ログ | **工房の記録** |\n| 達成度・スコア率 | **冴え** |\n| 上級ルール | **秘伝** |\n| ハイライト・名場面 | **語り継がれる調合** |\n| プレイヤー | **魔女** |\n\n**効果:**\n- 世界観への没入が段違いに上がる（LeBlanc の Fantasy＝幻想）\n- **ただし、初出時に必ずツールチップで説明する**（§6-9）。用語だけ独自にすると、意味不明になる\n- ボタンのラベルも統一（「次のラウンドへ」ではなく「次の儀式へ →」）\n- 効果音・色・アイコンも世界観に沿わせる（蝋燭色 `--candle`、明朝体、🕯️⚗️🔪）\n\n> **原則：テーマは「塗装」ではなく、用語・色・音・フォント全てに一貫して通す。**\n> 中途半端だと「後付けのテーマ」がバレる（理論編・付録A-2「幻想の壊し方＝テーマが後付けの塗装」）。\n\n---\n\n### 6-16. アイコン・絵文字の使い方\n\n- **素材は絵文字で識別**（🌙🔥🍄✨❄️🐍）：色＋形の二重符号化で、色覚に依存しない\n- **役割にも絵文字**：🔪＝切り役、👁＝観戦、🧪＝ソロ、❓＝ヘルプ、🔊＝音、🔀＝表示切替\n- **絵文字はフォント依存なし**で、どの環境でも出る（アイコンフォントの読み込みが不要）\n- ただし**多用しすぎると散らかる**。1画面に登場する種類を絞る\n\n---\n\n### 6-17. モバイル対応（最低限やること）\n\n```css\nhtml{ -webkit-tap-highlight-color:transparent; }  /* タップ時の青い矩形を消す */\nbody{ padding:16px 14px 60px; }                    /* 下部に余白＝誤タップ防止 */\n.miniRow{ overflow-x:auto; }                       /* 横長の盤面はスクロール可能に */\nbutton{ padding:9px 16px; }                        /* タップ領域を十分に（最低44px推奨） */\n```\n- ツールチップは **hover が効かない**ので、タップでも開くようにする（§6-9）\n- `.row{ flex-wrap:wrap }` で、狭い画面でも折り返す\n\n---\n\n### 6-18. UX改善の優先順位（今回の実感）\n\n実装コストに対する効果の大きさで並べると：\n\n| 優先 | 施策 | コスト | 効果 |\n|---|---|---|---|\n| 1 | **手番の明示**（誰の番か・自分の番か） | 小 | **極大**（オンラインでは必須） |\n| 2 | **ソロモード**（1人で全席操作） | 中 | **極大**（開発効率が激変） |\n| 3 | **説明の常時アクセス**（❓＋ツールチップ） | 中 | 大 |\n| 4 | **効果音**（Web Audio 合成） | 小 | 大（手触りが激変する） |\n| 5 | **ボタンの3状態**（hover/active/disabled） | 小 | 大（「触れる」感触） |\n| 6 | **観戦モード** | 中 | 大（開発・運用で効く） |\n| 7 | **確定前プレビュー** | 小 | 中（不安を消す） |\n| 8 | **履歴の表示切替** | 中 | 中 |\n| 9 | **アニメーション** | 小 | 中（2箇所に絞る） |\n| 10 | テーマの一貫性（用語統一） | 小 | 中〜大（没入感） |\n\n> **最も費用対効果が高いのは「手番の明示」と「ソロモード」。**\n> 前者は数十行で書けてストレスが激減し、後者は開発効率を何倍にもする。\n"}, {"id": "影の競り_オンライン版_引き継ぎ資料_md", "file": "影の競り_オンライン版_引き継ぎ資料.md", "title": "影の競り 引継", "sub": "現行プロジェクトの運用文書", "icon": "💎", "md": "# 影の競り — オンライン版 セットアップ＆設計 引き継ぎ資料\n\n`kage_no_seri.html` は単一ファイル。**ソロ(NPC) / オンライン対戦 / 観戦 / ルール説明**が統合されている\n（前作の教訓「検証モードは別ファイルにしない」の実践）。\n\n<!-- TOC -->\n## 目次\n\n- [1. Firebase セットアップ（初回のみ・10分）](#1-firebase-セットアップ初回のみ10分)\n- [2. 4つの入口](#2-4つの入口)\n- [3. 状態スキーマ（`rooms/{CODE}/`）](#3-状態スキーマroomscode)\n- [4. 🔑 秘匿の設計 ― 「送らない」](#4--秘匿の設計--送らない)\n  - [⚠️ 正直な限界（身内プレイ前提）](#️-正直な限界身内プレイ前提)\n- [5. 👁 観戦モードは「全情報が見える」](#5--観戦モードは全情報が見える)\n- [6. 前作の実装ミスへの対処（3点）](#6-前作の実装ミスへの対処3点)\n- [7. 前作の7教訓の組込み先](#7-前作の7教訓の組込み先)\n- [8. 人数と面の数（設計上の要点）](#8-人数と面の数設計上の要点)\n- [9. 既知の制限・今後](#9-既知の制限今後)\n\n<!-- /TOC -->\n\n---\n\n## 1. Firebase セットアップ（初回のみ・10分）\n\n1. https://console.firebase.google.com/ で無料プロジェクトを新規作成\n2. 左メニュー「Realtime Database」を作成（テストモードでOK・ロケーションは近い地域）\n3. 「ルール」タブに、同梱の `firebase_rules.json` の中身を貼って公開\n4. 「プロジェクト設定 → 全般 → マイアプリ」で **ウェブアプリを追加**\n5. SDK設定で **「Config」を選択**（npm/CDNではない）\n6. その中身を、`kage_no_seri.html` 冒頭の **`FIREBASE_CONFIG`** に貼る\n   - **重要**: 変数名は `FIREBASE_CONFIG` のまま（`firebaseConfig` に変えると動かない）\n7. GitHub Pages に置く（ファイル名を `index.html` に。URLが固定され、更新履歴も残る）\n\n**ソロモードは Firebase 不要**で動く。未設定でもホーム画面から遊べる。\n\n---\n\n## 2. 4つの入口\n\n- **🚪 卓を作る** … 名前＋人数(2〜6)を選ぶ → 合言葉(4文字)が出る → 仲間に伝える → 全席が埋まったら開始\n- **参加する** … 名前＋合言葉\n- **👁 観戦する** … 席に着かず入室。**全員の目と、現在の原石の全面が見える**（下記§5）\n- **🧪 ひとりで試す** … NPC対戦。Firebase不要\n\n---\n\n## 3. 状態スキーマ（`rooms/{CODE}/`）\n\n- `meta` : `{host, phase:\"lobby\"|\"playing\"|\"ended\", n, nc, rounds, money}`\n- `seats/{0..5}` : `{uid, name, lastSeen}` （12秒ごとの生存報告＋30秒タイムアウト）\n- `priv/{席}` : `{lens, see:{round:値}}` ← **その席が見える面と、その面の値だけ**\n- `money/{席}` : 数値\n- `game` : `{round, price, cur, last, live(csv), phase:\"auction\"|\"hammer\"|\"reveal\"|\"end\", bids}`\n- `hist/{round}` : `{v(csv), total, w, price, bids}` ← **落札後にのみ書かれる**\n- `reveal/lens` : 終了時に全員の目を公開\n\n---\n\n## 4. 🔑 秘匿の設計 ― 「送らない」\n\n> **秘匿すべき情報は「送らない」。「送るが隠す」は秘匿ではない。**（前作の結論）\n\n- **原石の全面の値は、DBに一切書かない**（落札されるまで）\n- ホストが開始時に全原石を生成し、**自分の localStorage に保持**\n- 各席には `priv/{席}` に **「見える面のインデックス」と「その面の値だけ」** を配る\n- 槌が落ちた瞬間、ホストが `hist/{round}` に全面の値を書く（＝答え合わせ）\n\n### ⚠️ 正直な限界（身内プレイ前提）\n- **ホストは全原石を知りうる**（生成者だから）。UIには一切出さないが、devtools/localStorage を見れば分かる。\n  → **厳密にやるなら、遊ばない人がホストになり「観戦」する**のが最も安全\n- `priv/{席}` は認証なしでは他人も読める（RTDBの制約）。**完全対処には匿名認証＋uidベースの読取制限が必要**\n- **ホストが離脱すると、以降の原石が開けられない**（localStorage に持っているため）。\n  ホストが再入場すれば復帰する\n\n---\n\n## 5. 👁 観戦モードは「全情報が見える」\n\n**前作の実装ミス（観戦で情報が拾えない）を修正済み。**\n\n- 全席の `priv` を購読し、**「誰がどの目を持つか」を常時表示**\n- 現在の原石について、**各面を「その面を見ている誰か」の観測から復元して表示**\n- **誰の目にも映っていない面だけは `？` のまま** ← これは卓の全員も知らない情報なので、正しい挙動\n- 書き込みは一切しない（進行に影響しない）\n\n---\n\n## 6. 前作の実装ミスへの対処（3点）\n\n| 前作のミス | 本作での対処 |\n|---|---|\n| **観戦で情報が拾えない** | 全 `priv` を購読し、全員の目＋現在の原石の全面を復元して表示（§5） |\n| **ルール説明のスクロールがリセットされる** | **モーダルを `#app` の外（`#modal`）に分離。**`render()` は `#app` しか触らず、モーダルは開閉時のみ書き換える → **開いている間はDOMが不変＝スクロール位置が保たれる** |\n| **「次へ」をホストしか押せない** | `oNext()` を**誰でも呼べる**ようにし、`transaction` で「既にラウンドが進んでいたら何もしない」ガード → **二重進行しない** |\n\n---\n\n## 7. 前作の7教訓の組込み先\n\n| 教訓 | 実装 |\n|---|---|\n| #1 read-modify-write競合 | 競り・槌・次へ を全て **Firebase transaction** で原子的に |\n| #2 権限チェック | `oBid`/`oDrop` は関数入口＋**transaction内**で `g.cur!==ON.seat` を二重ガード |\n| #3 秘匿の構造漏洩 | 原石の全値をDBに出さない（§4）。各席は自分の面の値しか受け取らない |\n| #4 幽霊対策 | 12秒ごとの生存報告 + `onDisconnect` + 30秒タイムアウト（`seatAlive`） |\n| #5 同期鮮度 | 「🟢 接続中 ・ 最終同期 n秒前」を常時表示 |\n| #6 リトライ | 全通信を `withRetry`（1回失敗→0.7秒→再試行）で共通化 |\n| #7 エラー可視化 | 握りつぶさず、画面上部の赤バナー（`showError`）に表示 |\n\n---\n\n## 8. 人数と面の数（設計上の要点）\n\n**人数が増えるほど「誰の目にも映らない面」が減り、核（ウィナーズ・カース）が薄まる。**\nそこで面の数を人数に応じて増やす。\n\n| 人数 | 面 | 原石 | 資金 | 「誰の目にも映らない面」の発生率 |\n|---|---|---|---|---|\n| 2人 | 3面 | 6 | 30 | 100% |\n| 3人 | 3面 | 6 | 30 | 78% |\n| **4人** | **3面** | **8** | **34** | **56%（標準）** |\n| 5人 | **4面** | 10 | 38 | 77% |\n| 6人 | **4面** | 12 | 38 | 62% |\n\n4つ目の面 = **💎大きさ（カラット）**。**宝石の4C がそのまま拡張になっている。**\n\n---\n\n## 9. 既知の制限・今後\n\n**v1.4 で入ったもの（この資料の更新点）:**\n\n- **同一卓での連戦を実装**（`rematchOnline()`）。ホストが決算で「↺ 同じ卓でもう一度」を押すと、合言葉はそのまま、目も原石も引き直して次戦へ進む。前戦の得点は `series/{世代}` に積まれ、決算に**通算得点・優勝回数**が並ぶ（非ホストはページを閉じずに待つ）。\n- **終了時の「目」公開バグを修正**：非ホストが終幕させると `reveal/lens` を `null` で上書きしていた → 全席の目を持つ**ホスト／観戦のみが条件付きで書き込み**、冪等な `maybeRevealLens()` が取りこぼしを自己修復する。\n- **決算の得点計算を `calcOnlineScores()` に関数化**（通常の決算と連戦の集計が同一経路を通る）。\n\n**残る制限:**\n\n- ホスト依存（§4の限界）。**匿名認証＋セキュリティルール**への移行が本格対処\n- 人数の推奨上限は6人（英式競りは人数が増えるほど待ち時間が伸びる）\n"}, {"id": "魔女の調合_オンライン版_引き継ぎ資料_md", "file": "魔女の調合_オンライン版_引き継ぎ資料.md", "title": "魔女の調合 引継", "sub": "現行プロジェクトの運用文書", "icon": "🧪", "md": "# 魔女の調合 オンライン版 — セットアップ＆設計 引き継ぎ資料\n\n`witch_online.html` は、Firebase Realtime Database を使った実オンライン対戦版。\n**対戦・ソロ検証・観戦・ルール説明が単一ファイルに統合**されている（二重管理の解消）。\n\n---\n\n<!-- TOC -->\n## 目次\n\n- [1. Firebase セットアップ（初回のみ・10分）](#1-firebase-セットアップ初回のみ10分)\n- [2. 遊び方（プレイヤー視点）](#2-遊び方プレイヤー視点)\n- [3. 状態スキーマ（Firebase `rooms/{CODE}/`）](#3-状態スキーマfirebase-roomscode)\n- [4. 設計上の要点（前作の教訓の組込み先。教訓#1〜7 = 「実装技術知見」§2）](#4-設計上の要点前作の教訓の組込み先教訓17--実装技術知見2)\n- [5. 🔑 逆算対策＝B方式（チーム合計のみ公開）](#5--逆算対策b方式チーム合計のみ公開)\n- [6. 好みプール＝V3（発火率再調整済み）](#6-好みプールv3発火率再調整済み)\n- [7. 上級ルール＝秘伝枠（任意・設計論で穴を検証済み）](#7-上級ルール秘伝枠任意設計論で穴を検証済み)\n- [8. 工房の記録（表示切替）と名場面](#8-工房の記録表示切替と名場面)\n- [9. シミュレーションでは見えない、人間テストで確かめる層](#9-シミュレーションでは見えない人間テストで確かめる層)\n- [10. 既知の制限・今後](#10-既知の制限今後)\n\n<!-- /TOC -->\n\n---\n\n## 1. Firebase セットアップ（初回のみ・10分）\n\n1. https://console.firebase.google.com/ で無料プロジェクトを新規作成\n2. 左メニュー「Realtime Database」を作成（**テストモード**でOK・ロケーションは近い地域）\n3. 「ルール」タブを設定して公開：\n   - **最小対処（推奨・現状）**：`firebase_rules_最小対処.json` の中身を貼る。\n     `rooms/{4文字コード}` 配下のみ読み書き許可、ゴミ・巨大データを拒否。コード無改修。\n     ただし認証は使わないため「rooms配下は誰でも読み書き可能」自体は残る（身内プレイ想定）。\n   - 簡易設定（非推奨・旧）：`{ \"rules\": { \".read\": true, \".write\": true } }` はDB全体が無制限開放になるため使わない。\n4. 「プロジェクト設定 → 全般 → マイアプリ」で **ウェブアプリを追加**\n5. SDK設定で **「Config」を選択**（npm/CDNではない）。`const firebaseConfig = {...}` の中身が出る\n6. その中身を、`witch_online.html` 冒頭の **`FIREBASE_CONFIG`** に貼る\n   - **重要**：変数名は `FIREBASE_CONFIG` のまま。`firebaseConfig` に変えると動かない\n7. ファイルを GitHub Pages か Netlify Drop に置く\n   - Netlify は **ファイル名を `index.html`** にリネームしてからアップロード\n   - 更新時は Netlify の「Deploys」から再アップロード（新規Dropは別URLになる）\n\n未設定のまま開くと、画面に「Firebase未設定」と出る（ローカルで開いても同じ）。\n**ソロモードはFirebase不要**で動く（ホーム画面から直接遊べる）。\n\n---\n\n## 2. 遊び方（プレイヤー視点）\n\nホーム画面に4つの入口がある：\n\n- **🚪 部屋を作る（ホスト）**：名前を入れて「部屋を作る」→ 合言コード（4文字）が出る → 仲間に伝える → 3〜4人揃ったら儀式数・上級モードの有無を選んで「開始」\n- **参加する**：名前を入れて合言コードを入力\n- **🧪 ソロで試す**：Firebase不要。1人で全席を操作する検証モード。全員の好み・全個人点を常時表示（本番のB方式とは別に、確認用に全部見える）\n- **👁 観戦する**：合言コードで席に着かず入室。全員の好み・盤面・全個人点をリアルタイム監視（デバッグ・配信監視用に全部見える）。書き込みはしない\n\n対戦中は、手番が来たら操作（切り役＝分ける、手番＝坩堝を選ぶ）。それ以外は待機。**無言で**遊ぶのが本体。\n右上の **❓ ボタン**でルール説明（用語ツールチップ付き）がいつでも開ける。\n\n---\n\n## 3. 状態スキーマ（Firebase `rooms/{CODE}/`）\n\n- `meta`：`{host:uid, phase:\"lobby\"|\"playing\"|\"ended\"}`\n- `seats/{0..3}`：`{uid, name, lastSeen, online}`（生存報告）\n- `recipes/{席}`：`[好みID×3]`（**各自は自席のみ購読**。上級モードは通常枠2＋秘伝枠1）\n- `game`：`{n, rounds, round, cutter, teamTotal, phase, band, cuts, assign, chooseIdx, roundEval, history}`\n  - `game.phase`：`cut → choose → await_score → score →`（次の儀式）`cut` または `end`\n  - `roundEval`：`{roundScore, omni, rational, pct}` — **個人点(totals)は含まない**（B方式・下記§5参照）\n  - `history[]` の各儀式：`{round, cutter, contents, roundScore, omni, rational, pct, cutPct, band, cuts, piles, owners}`\n    - `cutPct`：**切り方そのものの質**（後述§7）。個人点は含まない\n    - `band`/`cuts`：名場面の再現用に、その儀式の帯と切れ目を保存\n- `reveal`：終了時のみ全好みを配信（秘匿解除）。終了画面はここから個人点・名場面を再計算する\n\n---\n\n## 4. 設計上の要点（前作の教訓の組込み先。教訓#1〜7 = 「実装技術知見」§2）\n\n| 教訓 | 実装 |\n|---|---|\n| #1 read-modify-write競合 | 全状態変更を **Firebase transaction** で原子的に。手元stateは直書きしない |\n| #2 権限チェック | `confirmCut`(切り役のみ)・`pickPile`(手番のみ)・`startGame`/`nextRound`(ホストのみ)。UIだけでなく関数入口＋transaction内で二重ガード |\n| #3 秘匿の構造漏洩 | プレイ中は**自席の好みしか購読しない**。他人の好み・発火内訳・**個人点も一切**DBに出さない（下記§5 B方式）。全好みを読むのは採点時の resolver（ホスト）のみ |\n| #4 幽霊対策 | 12秒ごとの生存報告 + `onDisconnect` + 30秒タイムアウト（`seatActive`） |\n| #5 同期鮮度 | Firebase接続状態 +「最終同期 n秒前」を常時表示 |\n| #6 リトライ | 全通信を `withRetry`（1回失敗→0.7秒→再試行）で共通化 |\n| #7 エラー可視化 | 握りつぶさず、画面上部の赤バナー（`showError`）に表示 |\n\n**採点の権威（resolver）**：最終選択で `phase=await_score` になると、resolver（ホスト、不在時は最小の生存席）が全好みを一度だけ読んで採点し、transaction で `phase=score` に。二重採点は phase ガードで防止。\n\n---\n\n## 5. 🔑 逆算対策＝B方式（チーム合計のみ公開）\n\n**背景**：個人点を毎儀式正確に公開すると、盤面と照らして「発火した好みの組み合わせ」が数手で一意に絞られ、6儀式でほぼ好みが公開状態になることがシミュレーションで判明した（点数方式をどう変えても、点を揃えても1点固定にしても効果は薄い。真因は「盤面＋正確な個人点」を毎回見ること自体の情報量）。\n\n**対策**：**個人点はDBに一切保存しない**。公開は `roundEval.roundScore`（チーム合計）・`omni`・`rational`・`pct` のみ。各自の点は、各クライアントが**自分の好み＋自分の坩堝からローカル計算**する（`scorePile(ST.myRecipes, myPile)`）。他人の坩堝は「◯◯が受け取った」とだけ表示（点は出さない）。\n\n**効果**（シミュレーション実測）：3人・6儀式後、観測者が対象の手札候補を絞れる数\n- 個人点を全公開（旧方式）：約7通り（ほぼ特定）\n- **チーム合計のみ（B方式）：約438通り（読めるが特定不可）**\n\n読みの手がかりは「相手がどう切ったか」「どの塊を選んだか」という**行動**に一本化される。これは検証の結果、「発火個数のみ公開」等の中間案よりも効果的だった（個数を出しても選択情報と組み合わさるとほぼ特定できてしまうため）。\n\n**終了後は解除**：`reveal` ノードで全好みが公開されるため、終了画面では個人点・名場面ともに表示してよい（プレイ中のみ隠す設計）。\n\n---\n\n## 6. 好みプール＝V3（発火率再調整済み）\n\n初期プール（隣接・個数固定2）は、切り役が「タイルを並べ替えられず切るだけ」という制約下では、隣接が運ゲー（達成可能率35.7%止まり）、個数が達成困難（44%止まり）という欠陥があった。V3で全型を「腕で狙えば達成可能」75〜100%に再設計済み。\n\n| 型 | 定義 | 点 | 3人達成可能率 |\n|---|---|---|---|\n| 🤝 同居 pair | XとYが同じ坩堝 | +4 | 79.7% |\n| 🔢 個数 cnt2 | Xを2つ以上、またはYを2つ以上 | +5 | 75.1% |\n| 1️⃣ 単体 solo | Xをちょうど1つ | +3 | 90.5% |\n| ⛔ 二種忌避 abs2 | XとYを両方入れない | +3 | 100% |\n| 🚫 忌避 abs | Xを入れない | +2 | 100% |\n\n18枚・各型を上記比率で構成。NPC冴え（合理）：3人86.2%／4人82.1%。称号閾値（大魔女92/熟達82/一人前70/見習い58/駆け出し）は据え置きで機能。\n\n配布制約 `dealConflicts`：「入れたい素材」と「入れたくない素材」が同一人物に配られないよう保証。\n\n---\n\n## 7. 上級ルール＝秘伝枠（任意・設計論で穴を検証済み）\n\n**内容**：上級モードでは各自の好みが「通常枠2枚＋🌟秘伝枠1枚」になる。秘伝枠は「Xを2つ以上、かつYを入れない」の複合条件・**+10点**・達成困難（3人34%前後、4人50%前後で6種とも均一）。\n\n```\n🔥火竜2つ以上+🐍蛇毒なし／🍄影茸2つ以上+🌙満月草なし／✨星屑2つ以上+❄️霜結晶なし\n❄️霜結晶2つ以上+🍄影茸なし／🌙満月草2つ以上+✨星屑なし／🐍蛇毒2つ以上+🔥火竜なし\n```\n\n**設計検証**（方法論編の観点で全て確認済み）：\n- 上位互換でない：EV≈3.4〜5.0が安全枠EV≈3.2〜3.6と拮抗し、真の二択として機能\n- 配布バランス：omni天井は通常とほぼ不変（18.1→18.5）\n- 達成率の均一性：単一テンプレート（cnt+abs型）に統一したことで3人・4人とも数pt以内に収束（当初は型混在で26〜63%とばらついていたため統一した）\n- 難易度上昇を実証：合理NPC冴え 通常83%台→上級72%（3人）／79%→67%（4人）\n- omni評価は高難度枠も自動的に織り込むため、評価式の変更は不要だった\n\n`dealAdvanced(n)` が通常枠と秘伝枠の配布制約（矛盾回避＋フォールバック）を担う。\n\n---\n\n## 8. 工房の記録（表示切替）と名場面\n\n- **工房の記録**：全儀式のミニ盤面を振り返れる。🔀ボタンで「帯の並び順（切り方・読みの主材料）」⇄「魔女順（A→B→C固定・追いやすさ優先）」を切替可能。魔女順では塊の隣接関係が失われるため、切れ目の光る演出は消している。プレイ中・終了後の両方で見られる（プレイ中は個人点非表示、終了後は個人点も表示）。\n- **✨ 語り継がれる調合（名場面）**：終了画面で、各自が調合師だった儀式のうち「切り方の質」が最も高かった1回を紹介する。\n  - **切り方の質**＝ `bestForCut(band, cuts, players) ÷ omniMax(band, players)`。その切り方に対して全員が最適に選択した場合のチーム点で測るため、**選ぶ側のミスに影響されない**（切り役の切り方そのものを純粋に評価）。omniで正規化するため局面の難易度にも依存しない。\n  - 表示は**物語主体・ベストのみ・数字（%）は出さない**：「沈黙のうちに◯◯の望みを見抜き、〈好み〉を叶えた」という叙述のみ。協力ゲームでの個人比較・戦犯化を避けるための意図的な設計（ワーストは一切出さない）。\n  - 「叶った好み」はDBに保存せず、終了時に `reveal` の好みから再計算する（B方式の秘匿を維持したまま実現）。\n\n---\n\n## 9. シミュレーションでは見えない、人間テストで確かめる層\n\n数値・バランス・評価の健全性はシミュレーションで検証済み。オンラインで**実際に人間と無言で回して初めて分かる**のは：\n\n1. **無力感**：最悪の坩堝を取らされる悔しさが、面白さになっているか\n2. **吊るし上げ**：切り役が読み違えたときの空気\n3. **無言のもどかしさ**：伝えたいのに伝えられない緊張が、心地よいか苦痛か\n4. **他人予想の解読感**：回を重ねて仲間の好みが「読めてくる」実感が、実際に起きるか\n5. **秘伝枠の手触り**：達成率35%前後という数字が「悔しいけど狙える」に感じるか「無理ゲー」に感じるか\n6. **名場面の空気**：個人のベストを称える表示が、協力ゲームの空気を壊さないか\n\nここが良ければ設計は成功。ダメなら、儀式数・素材数・好みの型の比率・秘伝枠の点数などを調整する（ロジックはすべてシミュレーションで再検証可能）。\n\n---\n\n## 10. 既知の制限・今後\n\n- 「もう一度」は部屋を出て作り直し（同一部屋での連戦は未実装）\n- 長期公開する場合は、匿名認証＋`recipes/{席}`をuid制限する**本格対処**への移行を検討（現状は§1の最小対処のみ。DBを直接覗けば技術的には好みが見える点は残る）\n- 上級モード（秘伝枠）はソロ・オンライン双方に実装済み。難易度・値付けは実プレイのフィードバック次第で調整余地あり\n"}]</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script>
const DOCS = JSON.parse(document.getElementById("DATA").textContent);
const $ = id => document.getElementById(id);
let cur = 0;

/* GitHub互換のアンカー生成（MD内のリンクと一致させる） */
const STRIP = /[\u0000-\u001F!-,.\/:-@\[-\^`{-~\u00A0-\u00BF\u00D7\u00F7\u2000-\u206F\u2E00-\u2E7F\u3000-\u303F\uFE10-\uFE1F\uFE30-\uFE6F\uFF00-\uFFEF]/gu;
function slug(t, seen){
  let s = t.trim().toLowerCase().replace(STRIP,"").replace(/\s+/g,"-");
  if(seen[s]!==undefined){ seen[s]++; s = s+"-"+seen[s]; } else seen[s]=0;
  return s;
}
const stripMd = t => t.replace(/\*\*(.+?)\*\*/g,"$1").replace(/`(.+?)`/g,"$1").replace(/\[(.+?)\]\(.+?\)/g,"$1").trim();

marked.setOptions({ gfm:true, breaks:true, headerIds:false, mangle:false });

/* 各文書をレンダリングし、見出しにidを振り、TOCを作る */
DOCS.forEach(d=>{
  const seen = {};
  const heads = [];
  const renderer = new marked.Renderer();
  renderer.heading = (text, lvl)=>{
    const plain = stripMd(String(text).replace(/<[^>]+>/g,""));
    const id = slug(plain, seen);
    if(lvl<=3) heads.push({lvl, text:plain, id});
    return `<h${lvl} id="${id}">${text}</h${lvl}>`;
  };
  d.html = marked.parse(d.md, {renderer});
  d.heads = heads;
  d.plain = d.md.replace(/```[\s\S]*?```/g,"").replace(/[#*`>|\-]/g," ");
});

/* サイドバー */
function buildSide(){
  $("docs").innerHTML = DOCS.map((d,i)=>`
    <div class="doc">
      <div class="dh ${i===cur?'on':''}" onclick="open_(${i})">
        <span class="ic">${d.icon}</span>
        <span><span class="t">${d.title}</span><div class="s">${d.sub}</div></span>
      </div>
      <div class="toc ${i===cur?'open':''}" id="toc${i}">
        ${d.heads.map(h=>`<a class="h${h.lvl}" href="#${h.id}" onclick="jump(${i},'${h.id}',event)">${h.text}</a>`).join("")}
      </div>
    </div>`).join("");
}
function open_(i, anchor){
  cur = i;
  $("main").innerHTML = DOCS[i].html;
  document.querySelectorAll(".dh").forEach((e,k)=>e.classList.toggle("on",k===i));
  document.querySelectorAll(".toc").forEach((e,k)=>e.classList.toggle("open",k===i));
  localStorage.setItem("doc_cur", i);
  if(anchor){ const el=document.getElementById(anchor); if(el){ el.scrollIntoView(); return; } }
  window.scrollTo(0,0);
  closeSide();
}
function jump(i, id, e){
  if(e) e.preventDefault();
  if(cur!==i){ open_(i, id); } else { const el=document.getElementById(id); if(el) el.scrollIntoView(); closeSide(); }
  history.replaceState(null,"","#"+id);
}

/* 文書内リンク（#xxx）を、現在の文書内で解決する */
document.addEventListener("click", e=>{
  const a = e.target.closest("main a[href^='#']");
  if(!a) return;
  e.preventDefault();
  const id = decodeURIComponent(a.getAttribute("href").slice(1));
  let el = document.getElementById(id);
  if(el){ el.scrollIntoView(); history.replaceState(null,"","#"+id); return; }
  // 他の文書にあるかも
  for(let i=0;i<DOCS.length;i++){
    if(DOCS[i].heads.some(h=>h.id===id)){ open_(i, id); return; }
  }
});

/* 全文検索 */
let qT=null;
$("q").addEventListener("input", ()=>{ clearTimeout(qT); qT=setTimeout(search,180); });
function esc(s){ return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function search(){
  const q = $("q").value.trim();
  const res = $("res"), docs = $("docs");
  if(q.length<2){ res.innerHTML=""; docs.style.display=""; return; }
  docs.style.display="none";
  const rx = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi");
  const hits = [];
  DOCS.forEach((d,i)=>{
    let m, n=0;
    const txt = d.plain;
    rx.lastIndex = 0;
    while((m = rx.exec(txt)) && n < 6){
      const s = Math.max(0, m.index-42), e = Math.min(txt.length, m.index+q.length+56);
      let x = esc(txt.slice(s,e)).replace(/\s+/g," ");
      x = x.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi"), mm=>`<mark>${esc(mm)}</mark>`);
      // 直前の見出しを探す
      const before = txt.slice(0, m.index);
      let head = d.title;
      for(const h of d.heads){ if(before.indexOf(h.text)>=0) head = h.text; }
      hits.push({i, head, x, id:(d.heads.find(h=>h.text===head)||{}).id});
      n++;
    }
  });
  res.innerHTML = hits.length
    ? hits.map(h=>`<div class="hit" onclick="jump(${h.i},'${h.id||''}')">
        <div class="hd">${DOCS[h.i].icon} ${DOCS[h.i].title} ・ ${esc(h.head)}</div>
        <div class="hx">…${h.x}…</div></div>`).join("")
    : `<div class="nores">見つかりませんでした</div>`;
}

/* 現在位置に応じてTOCをハイライト */
let ticking=false;
window.addEventListener("scroll", ()=>{
  if(ticking) return; ticking=true;
  requestAnimationFrame(()=>{
    const h = document.documentElement.scrollHeight - innerHeight;
    $("prog").style.width = (h>0 ? (scrollY/h*100) : 0) + "%";
    $("top").classList.toggle("show", scrollY>400);
    const hs = [...document.querySelectorAll("main h1,main h2,main h3")];
    let act=null;
    for(const el of hs){ if(el.getBoundingClientRect().top < 120) act = el.id; else break; }
    document.querySelectorAll("#toc"+cur+" a").forEach(a=>
      a.classList.toggle("act", a.getAttribute("href")==="#"+act));
    ticking=false;
  });
});
$("top").onclick = ()=> scrollTo({top:0,behavior:"smooth"});

/* モバイル */
const openSide  = ()=>{ $("side").classList.add("open"); $("veil").classList.add("show"); };
const closeSide = ()=>{ $("side").classList.remove("open"); $("veil").classList.remove("show"); };
$("burger").onclick = ()=> $("side").classList.contains("open") ? closeSide() : openSide();
$("veil").onclick = closeSide;

/* 起動 */
const saved = parseInt(localStorage.getItem("doc_cur")||"0");
cur = (saved>=0 && saved<DOCS.length) ? saved : 0;
buildSide();
const hash = decodeURIComponent(location.hash.slice(1));
if(hash){
  const i = DOCS.findIndex(d=>d.heads.some(h=>h.id===hash));
  if(i>=0){ open_(i, hash); } else open_(cur);
} else open_(cur);
</script>
</body>
</html>
