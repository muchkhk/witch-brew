グナルの三条件**\r\n\r\n発信型の影が決断を生むには、①だけでは足りない。3条件すべてが要る:\r\n\r\n> **① 発信にコストがある**(§6-15の原理)\r\n> **② 受信者が解読可能である**(未知数が多すぎない)\r\n> **③ 解読が均衡上報われる**\r\n\r\n影の競りは①のみ満たした。\r\n- **②の欠落**:「どの面を見ているか」×「その値がいくらか」の**二重未知**に加え、自面3倍の私的価値が入札額を支配する\r\n- **③の欠落**: シミュ自身が「追随は負け」を示していた\r\n  (2026-07 の検証シミュで確定: 理想的なベイズ読み手(レンズ特定99%・総額推定誤差-17〜24%)を実装しても、\r\n  勝率は盲目閾値と有意差なし。負のシグナル(降り値)に限定した読みは平均得点を+0.35上げるが「買い控え」になり、\r\n  勝率には転化しない。**情報は抽出できても、報酬に変換される経路が構造上ない**)\r\n\r\n**3. ブラフの価値は、読みの価値の従属変数**\r\n\r\n> **偽装は、本物の情報が読まれて初めて意味を持つ。解読が報われない影の層では、偽の発信も自動的に無価値になる。**\r\n> 送信側と受信側は**同じ経済圏** ―― 受信側が死ねば送信側も死ぬ。\r\n\r\n裏返せば、受信側(解読の報酬)を直せばブラフ側は自動的に蘇り**得る**。\r\nただし「掴まされるリスク」に見合うかは別途検証が要る。\r\n(出典: 影の競り 2026-07 プレイテスト「目の偽装のための突っ張りに意味がない」。\r\n2026-07 の検証シミュでは、目を全公開して読みを成立させた世界でも、ブラフは掴まされ率22〜38%・\r\n勝率-1.8〜-3.1ptでリスクが報酬を上回った。ブラフの利得(相手の高値掴み)は**卓の他全員に均等に波及**するのに、\r\nコストはブラファーだけが払う ―― 1対多の外部性が、送信側の均衡をさらに不利にする)\r\n\r\n#### 中止までに得た、生きている発明(捨てない)\r\n\r\n1. **サイコロの影** = 乱数を「リスク(分布既知)」から「曖昧性(分布未知)」へ変える(§6-3)\r\n   → **どの土台にも載せられる状態で生きている**\r\n2. **取得型の影 / 光源の選択**(§3-12) → 概念としては有効。ただし**選好のシグナルにはならない**という限界が判明\r\n3. **一次の情報 vs 二次の情報**(§6-11) → 知識状態の秘匿がなければブラフは立たない\r\n4. **検証の落とし穴**(§6-14) → NPCが互いを見ていないシミュレーションは心理戦を測れない\r\n5. **得点構造が情報を殺す**(§6-13) → 「稼働期間」を得点に乗せると、情報の価値が時間の価値に200倍負ける\r\n6. **影の漏れの閾値はほぼゼロ**(§6-13) → 少しでも観測結果が漏れると、タダ乗りで探索が死ぬ\r\n\r\n#### 検討した代替の土台(核を活かす仕組み)\r\n\r\n原理「選好を漏らすのはコストを払う行為だけ」から逆算した候補:\r\n\r\n| 案 | 内容 | A曖昧 | B希少 | C選好の露見 |\r\n|---|---|---|---|---|\r\n| **競り** | 入札額が選好そのもの。ウィナーズ・カースが構造的に湧く | ◎ | ○ | ◎ |\r\n| **賭け(予測市場)** | 早く賭けるほど高配当。待てば確信は増すが配当が下がる | ◎ | ◎ | ◎ |\r\n| **共有の賽 × 消耗** | 賽は誰のものでもない。使えば得点。**だが出目が公開され、使用回数が枯渇する** | ◎ | ◎ | **◎(利得=露見)** |\r\n| 奪える確保 | より大きなコストを払えば他人から奪える | ◎ | ◎ | ◎ |\r\n| 宣言(リーチ型) | 狙いを宣言すると優先権。だが撤回不能・全公開 | ◎ | ○ | ○ |\r\n\r\n**「共有の賽 × 消耗」の構造的美点:**\r\n> **「利益を得る行為」と「秘密を漏らす行為」が、完全に同一。**\r\n> **稼げば稼ぐほど、稼げなくなる。**\r\n> ―― 共犯の独自性(協力と裏切りが同じ一つの行為に判別不能に重なる)と**同型**。\r\n\r\n**いずれも設計者の指は止まらず、保留。**\r\n\r\n---\r\n\r\n### 6-16. 【保留中のアイデア】シュレディンガーのサイコロ\r\n\r\n> **出目がすべて異なる6面ダイス。全ての面は非公開。**\r\n> **振るたびに、数字が一つずつ明らかになっていく。**\r\n\r\n#### なぜ強いか\r\n\r\n**1. 「振る」が、不可逆に価値を消費する**\r\n\r\n> **未知の面こそが、価値である。振ることは、その価値を消費することである。**\r\n\r\n- 1面も割れていない賽 → 「まだ9が眠っているかもしれない」\r\n- 5面割れた賽 → もう驚きがない。ただの既知の乱数\r\n\r\n**振る行為が、期待を換金すると同時に、期待を破壊する。** 同じ一つの行為に、利得と損失が重なる。\r\n→ **§2-2の収穫逓減が、情報の枯渇として自動発生する**(歯止めを外付けする必要がない)。\r\n\r\n**2. 「重複なし」が、ここでは正しく機能する**\r\n\r\n§6-12で「重複なしは演繹になるから死ぬ」と結論したが、**それはあの設計での話だった。**\r\n\r\n| | 目的 | 確定することの意味 |\r\n|---|---|---|\r\n| **影の賽(中止)** | **分布を推定する**(帰納) | 確定すると**終わる** → 重複ありが必須だった |\r\n| **シュレディンガーの賽** | **残りの面を推理する**(演繹) | **確定していくこと自体が、ゲームの進行** → 重複なしが必須 |\r\n\r\nさらに **6面が全て異なる**ため、**判明した面が残りの面を制約する**(「4が出た → もう4は出ない」)。\r\n**山札の性質(記憶のある乱数・カウンティング)を、サイコロに移植している** ―― §5-2の行列の空白が埋まる。\r\n\r\n**3. テーマとメカニクスが融合している(§6-③)**\r\n「観測が状態を確定させる」はフレーバーではなく**メカニクスそのもの**。テーマを差し替えられない。\r\n\r\n#### 決定的な空白 ―― 「振る」ことに、なぜ緊張があるのか\r\n\r\n**ここが空白のままだと、影の賽と同じ死に方をする。** 答えは3通りあり、**どれを選ぶかで全く別のゲームになる。**\r\n\r\n| | 「振る」とは | 生まれる緊張 | 判定 |\r\n|---|---|---|---|\r\n| **A: 出た目が得点** | 換金 | **PYL** ―― 振り続けるか、降りるか | ○ |\r\n| **B: 出た目が全員に見える** | 情報公開 | **✕ 影の賽の死因の再来**(振る=選好のシグナルにならない) | **✕** |\r\n| **C: 出た目が自分だけに見える** | **私的な調査** | **取引・売買** ―― 知る者と、知らぬ者 | **◎(下記)** |\r\n\r\n#### 【C】が孕む構造 ―― レモン市場(逆選択)\r\n\r\n> **各自が「自分の賽」を持つ。振ると、自分だけが面を知る。**\r\n> **だが「何回振ったか」は全員に見えている。**\r\n> **そして、賽は交換・売買できる。**\r\n\r\n> **「よく調べた賽を、手放そうとしている」= 「調べた結果、悪いと分かったのだ」**\r\n\r\n**アカロフの中古車市場(逆選択)が、そのままゲームになる。**\r\n- 情報を持つ者が売る → 買い手は疑う\r\n- 疑われるから、良い賽も売れない\r\n- **「調べていない賽」の方が、かえって高く売れる**\r\n\r\n> **【最重要】影の賽の死因(「調べる」は選好のシグナルにならない)を、この構造は突破している。**\r\n> **「調べた上で手放す」は、選好の\"負の\"シグナルとして正しく機能する。**\r\n> **調査は選好を伝えないが、\"調査した上での処分\"は伝える。**\r\n\r\n#### 危険(未検証)\r\n\r\n1. **演繹の重さ** ―― 「残り3面のうち、まだ出ていない数字は何か」の計算が**AP地獄**になりうる(§3-2)。\r\n   数字の範囲を狭める等の抑制が要る\r\n2. **枯渇後の平坦化** ―― 全ての賽が割れきると、ゲームが計算問題に落ちる。\r\n   **終了条件と枯渇のタイミングを一致させる**必要がある(§5)\r\n3. **「私的に振る」の実装** ―― 物理では不可能。**デジタルネイティブ確定**\r\n\r\n**保留。設計者の判断待ち。**\r\n\r\n---\r\n### 6-17. 【開発中止】フリーサイコロ ―― 自由を消費するダイス\r\n\r\n> **⚠️ 2026-07 開発中止。** 本節は探索当時の設計仮説の記録として残す。\r\n> 実装・プレイテストの結果と死因は **[死因5](#死因5フリーサイコロ--罰は建ったが緊張が現在に来なかった2026-07)**（本部末尾）\r\n> および実践記録集「フリーサイコロ探索の記録」を参照。\r\n\r\n> **6面すべてが白紙のダイス。**\r\n> **振って白紙が出たら、好きな数字として使える。**\r\n> **そして、使った数字が、その面に永久に刻まれる。**\r\n\r\n**「自由を使うことが、自由を消費することである。」**\r\n\r\n#### 【重要】設計の到達点(検討の最終形)\r\n\r\n```\r\n・各自が「フリーサイコロ」を1個持つ(6面すべて白紙で開始)\r\n・全員のサイコロの中身は、常に公開されている\r\n・共通のダイスを振り、出るのは「面の番号」(1〜6)\r\n  → 全員が、自分のサイコロの\"その面\"を見る\r\n  → 数字が刻まれていれば、その数字を使う\r\n  → 白紙なら、好きな数字として使い、その面に永久に刻まれる\r\n・毎手番、面番号を2回呼ぶ → 各自、どちらの面を使うか選ぶ\r\n・(土台=未決定。エリアマジョリティ or 共有の注文が候補)\r\n```\r\n\r\n#### なぜ強いか\r\n\r\n**1. 「今か将来か」(§2-4a)が、コンポーネントに物理的に埋め込まれている**\r\n\r\n> **白紙の面 = 未確定の自由。刻むこと = 今の必要を満たすと同時に、将来の自由を永久に失う。**\r\n\r\n一つの行為が、利得と損失を同時に生む。**デッキ構築の「今強いカードは将来デッキを薄める」と同型だが、より純粋** ―― あちらは*足す*、こちらは**消費する**。\r\n**収穫逓減(§2-2)が構造的に内蔵され、歯止めを外付けする必要がない。**\r\n\r\n**2. Dice Forge との決定的な違い**\r\n\r\n| | Dice Forge | **フリーサイコロ** |\r\n|---|---|---|\r\n| 何をするか | **良い面を足す**(強化) | **自由を消費する**(拘束) |\r\n| 曲線 | 右肩上がり | **右肩下がり** |\r\n\r\n**「だんだん不自由になる」ダイスは、既存作に見当たらない。**\r\n\r\n**3. 【最重要】影の賽の死因(§6-15)を、構造的に回避している**\r\n\r\n> **原理:選好を信頼できる形で伝えるのは、「コストを払う行為」だけ。**\r\n\r\n**「刻む」は、まさにそれ。不可逆・自由を消費・取り消し不能。**\r\n\r\n| | 影の賽(死) | **フリーサイコロ** |\r\n|---|---|---|\r\n| 行為 | **調べる** | **刻む** |\r\n| コスト | ほぼ無料 | **不可逆に自由を失う** |\r\n| 何を伝えるか | **不確実性**(=平凡な賽) | **必要**(=今それが要る) |\r\n| シグナル | **成立しない** | **成立する** |\r\n\r\n> **サイコロが、公開された\"自伝\"になる。**\r\n> 「あいつは白紙を3回、すべて6として使った」= **信頼できるシグナル**。\r\n> **しかも嘘にもコストがかかる**(必要ない数字を刻めば欺けるが、白紙を1枚失う)\r\n> → **costly signaling。ブラフ成立の絶対条件(§5-4「時々成功し、時々見破られる」)が、追加ルールなしで満たされる。**\r\n\r\n**4. 核が自動的に立つ**\r\n\r\n> **特化すれば強い。だが、バレる。散らせば隠せる。だが、弱い。**\r\n> **§2-4(b)「幅か深さか」が、そのまま秘匿のジレンマに変換されている。**\r\n\r\n**5. アークが自動生成される(§5)**\r\n\r\n| | サイコロ | 状態 | 情報 |\r\n|---|---|---|---|\r\n| **序盤** | 白紙だらけ | **全能。だが、まだ何者でもない** | **何も読めない** |\r\n| **中盤** | 半分刻まれた | **★毎手番、自由を払うか問われる** | **全員の自伝が読めてくる** |\r\n| **終盤** | 刻まれ尽くした | **過去の決断が、あなたの牢獄** | **全員の運命が見えている** |\r\n\r\n**自由と知識が、逆向きに推移する。** テーマではなく、メカニクスが直接生成している(§6-③ 融合)。\r\n\r\n#### 【決定的な発見】「共通ダイスで\"面番号\"を振る」\r\n\r\n当初「各自が自分のサイコロを振る」としたが、**紙ペンゲームの美点を捨てていた**:\r\n> **紙ペンの核 = 「運は共有。判断は個人。だからダウンタイムがゼロで、しかも公平。」**\r\n\r\n**解:サイコロは個人。「振る」のは共有。出るのは\"数字\"ではなく\"面の番号\"。**\r\n\r\n| | |\r\n|---|---|\r\n| **運は完全に共有** | 全員が同じ面番号を参照(§2-6「実力と運の両立が最もクリーン」) |\r\n| **結果は完全に非対称** | 各自のサイコロの中身が違うから |\r\n| **ダウンタイムゼロ** | 全員が同時に処理 |\r\n\r\n> **「面4が呼ばれた。私の面4は白紙。だが彼の面4は【6】だ。」**\r\n> **同じ運命が、人によって全く違う意味を持つ。**\r\n\r\n**そして最大の副産物:**\r\n> **全員のサイコロが公開されている → 「次に面4が呼ばれたら、あいつは白紙だ」**\r\n> **= 他人の\"運命の分岐点\"が、全部見えている。未来の読み合いが、盤面から直接立ち上がる。**\r\n\r\n#### 検討の過程で棄却した案(記録)\r\n\r\n| 棄却案 | 棄却理由 |\r\n|---|---|\r\n| **初期に9面を埋めておく**(白紙を希少化) | **フリーサイコロを殺していた。** 核を守るために核を捨てる本末転倒 |\r\n| **「書く」と「使う」を分離** | ルールが増え、序盤に「両方白紙」で決断が消える(69%) |\r\n| **特殊な出目(ワイルド面)** | 核が薄まる。白紙自体が既に特殊な目である |\r\n| **パスを許す** | **終了条件が「白紙の枯渇」だと、全員パスで無限に膠着する**(設計者の指摘) → **終了は固定ラウンド数に** |\r\n| 各自が自分のダイスを振る | 運が個人化し、紙ペンの美点(共有の運)を失う |\r\n\r\n#### 土台の候補(未決定)\r\n\r\n**【必須制約】数字は「強さ」ではなく「種類」でなければならない。**\r\n> 大きい数字が強いなら(レース/入札/数比べ)、**全面に9を刻むのが支配戦略**になり、フリーサイコロは即死する。\r\n> **数字は序数ではなく、名詞でなければならない。**「6」は「5より大きい」のではなく「6という場所」。\r\n> → **レース・オークション・トリテ系は全滅。**\r\n\r\n| | **A:エリアマジョリティ** | **B:共有の注文/契約** |\r\n|---|---|---|\r\n| 内容 | 数字=エリア。影響力を置き、多数派が支配 | 場に注文が並ぶ(「6を3つ」)。早い者勝ちで達成 |\r\n| 分散への罰 | **◎ 構造的**(僅差の2位が最損) | ○ 注文次第 |\r\n| 特化の露見が痛い | ◎ 対抗が集まる | **◎ 先回りされる** |\r\n| 相互作用 | ○ 間接(陣取り) | **◎ 直接(早取り)** |\r\n| 「色んな目が要る」 | ○ | **◎ 最も素直** |\r\n| **刻んだ数字の陳腐化** | ✕ 静的 | **◎ 需要が動く** |\r\n| 敗北感(§4-1) | ○ | **⚠️ 早取りで詰むと理不尽** |\r\n\r\n**Bの決定的な強み:**\r\n> **「需要が動く」ことが、刻んだ過去を裏切る。**\r\n> **自由を払って手に入れた特化が、時間とともに牢獄になっていく。**\r\n> ―― **フリーサイコロの主題(不可逆な自己決定)を、最も残酷に増幅する = 掛け算(§第5部)。**\r\n\r\n**Bの危険:** 早取りで詰む理不尽 / 需要をランダムに動かすと出力ランダム性の暴発\r\n→ **需要の変化を予告する**(次の注文が見えている)必要がある。\r\n\r\n#### 未解決の懸念\r\n\r\n1. **⚠️【最大】自由は、多すぎても少なすぎても、決断を殺す**\r\n   - **序盤 = 全能ゆえに考えなくていい / 終盤 = 硬直ゆえに考えられない**\r\n   - **濃い決断は、その中間の狭い帯にしか存在しない**(3つの実践記録の総括と同じ形)\r\n   - **生命線は「白紙の減り方」。ゲーム全体を、その帯の中に保ち続けられるか**\r\n   - 緩和候補:2個振って1個選ぶ(選択が最後まで残る) / 白紙の回復 / 短く終わらせる\r\n2. **「1〜6を1面ずつ」= ただの普通のサイコロ、という支配戦略**\r\n   → エリアマジョリティなら**構造的に殺せる**(分散=全エリアで2位=全部損)\r\n3. **完全情報ゆえのAP(§3-2)** ―― 全サイコロが公開。救いは「次にどの面が呼ばれるか」が読めないこと\r\n4. **書き換えた1面の重み** ―― 6面中1面を変えても確率は約17%しか動かない。**「劇的な決断」に感じられるか**\r\n5. **土台が未決定**(§0の設計順序を守る。構造が決まるまでメカニクスを足さない)\r\n\r\n**→ その後、土台B（共有の注文）で実装・検証し、2026-07 開発中止。**\r\n懸念1「自由は多すぎても少なすぎても決断を殺す」は的中した（序盤の思考停止として実測）。\r\nただし最終死因はさらに深く「罰を建てても、決断の瞬間に緊張が無ければ後悔は生まれない」だった（死因5）。\r\n\r\n---\r\n### 6-18. 【★成立】影の競り ―― 初めて「面白い」に到達した設計\r\n\r\n**案A・遅信・共犯・影の賽 ―― 4つが全てこの段階で死んだ。本案は、初めて生き残った。**\r\n\r\n#### 出発点:影の賽の死因から、原理で逆算した\r\n\r\n> **原理(§6-15):情報を集める行為は選好のシグナルにならない。選好を伝えるのはコストを払う行為だけ。**\r\n> **→ 入札は、コストを払う行為である。**\r\n\r\n| | 影の賽(死) | **影の競り** |\r\n|---|---|---|\r\n| 行為 | 調べる | **入札する** |\r\n| コスト | ほぼ無料 | **払う** |\r\n| 伝えるもの | **不確実性**(=平凡) | **選好**(=価値を認めている) |\r\n\r\n**論理の病が、存在しない。**\r\n\r\n#### 核 ―― 設計者が固まった瞬間\r\n\r\n> **「あいつが高く入れた。あいつには何が見えている? 追うか、降りるか。」**\r\n\r\n**この一言が、競りの形式まで決定した:**\r\n- 「高く**入れた**」(=見てから判断)＋「**追うか、降りるか**」(=逐次の二択)\r\n- → **同時秘密入札では、この瞬間は起きない。競り上げ式(イングリッシュ・オークション)しかない。**\r\n- **核が形式を決めた。理屈で選んだのではない。**\r\n\r\n#### 確定した骨格\r\n\r\n```\r\n・品の価値 = 3成分の合計（🎨色 + 🔢数 + ✦印。各 -2〜+6）\r\n・各プレイヤーに見えるのは、3成分のうち1つだけ（ゲームを通じて固定・非公開）\r\n・★ダブりあり ―― 誰がどれを見ているかは分からない。同じ成分を見ている人がいるかもしれない\r\n・★見える成分は、自分にとって3倍の価値を持つ（私的価値）\r\n・競り上げ式。追うか、降りるか。降りたら戻れない\r\n・落札の瞬間、全成分が公開される（＝答え合わせ）\r\n・開始入札者は毎品ランダム（席の有利不利を消す）\r\n・得点 = 残金 + 落札した品の「自分にとっての価値」\r\n```\r\n\r\n#### 【重要】「ダブりあり」が生む、3つの効果\r\n\r\n1. **演繹を不能にする** ―― ダブりなし(3成分・3人が1対1)だと、「あいつは色」と割れた瞬間に\r\n   残りも確定する = **遅信の死因(答えが計算で一意)**。ダブりありなら原理的に不可能。\r\n2. **「誰も見ていない成分」が生まれる** ―― 4人が3成分からランダムに1つ見るとき、\r\n   **約56%の局で、誰も見ていない成分が存在する**(実測 56.8%)。\r\n   → **全員が読み切ったつもりで競り上げ、蓋を開けたら誰も見ていなかった成分が最悪だった。**\r\n   → **ウィナーズ・カースが、本物になる。**\r\n3. **最深の読みが生まれる** ―― **「あいつは、私と同じものを見ているのか?」**\r\n   - 同じ成分 → あいつの入札に**情報価値はない**(同じことを知っているだけ)。単なる競合相手\r\n   - 違う成分 → あいつの入札は**私が見えない世界からの報せ**\r\n   - **そのどちらかが、分からない。「高く入れた」の意味が、根本から不確定になる。**\r\n\r\n#### 自動的に湧いた層（追加ルール、ゼロ）\r\n\r\n1. **降りることも情報になる** ―― 「見た上で降りた」= その成分は低い。\r\n   **しかも降りたら戻れないので、\"降りたフリ\"ができない = シグナルが構造的に誠実。**\r\n2. **ブラフの代償が内蔵されている** ―― 吊り上げれば釣れるが、**吊り上げすぎれば自分が落札してしまう。**\r\n   → **嘘をつくほど、自分が呪いを引き受ける確率が上がる。**\r\n   §5-4「嘘が時々成功し、時々見破られる」が**無料で満たされる。**\r\n3. **読むことと読まれることが、同じ行為の中にある** ―― 他人の入札から学べるが、自分が入札すれば漏れる。\r\n   **共犯の独自性(協力と裏切りが同じ行為に判別不能に重なる)と同型。**\r\n4. **答え合わせが構造的に起きる** ―― 落札の瞬間に全成分公開。\r\n   **第1作の最大の教訓(秘匿情報は答え合わせとセットでないと機能しない)が無料で満たされる。**\r\n5. **「あいつは何を見ているか」が、ゲームを重ねると読めてくる** ―― 過去の品の表(真の成分 × 誰がどこまで競ったか)\r\n   の積み重ねからしか読めない。**リプレイで育つ理解。しかも計算では埋まらない**(規則でなく事実だから)。\r\n\r\n#### 【最重要】プレイテストの結果 ―― 4つとも通った\r\n\r\n設計者が実際に遊んで確認:\r\n\r\n| 検査項目 | 結果 |\r\n|---|---|\r\n| 「あいつが高く入れた」で**指が止まるか** | **✓ 止まる** |\r\n| 「**あいつは私と同じものを見ているのか?**」という疑いが湧くか | **✓ 湧く** |\r\n| **降りた相手の情報が読めるか** | **✓ 読める** |\r\n| **過去の表から、他人の目が読めてくるか** | **✓ 読めてくる** |\r\n| **総評** | **「結構面白い」** |\r\n\r\n> **共犯の検出器を適用:「このゲームを一言で説明したら、核が登場するか?」**\r\n> **「あいつが高く入れた。あいつには何が見えている? 追うか、降りるか。」**\r\n> **―― 説明の中心に、核がある。代用品ではない。**\r\n\r\n#### 数値検証で解決した2つの罠(記録)\r\n\r\n**罠1:純粋な共通価値オークションでは、競りが死ぬ**\r\n- 落札者は必ず**最も楽観的な者 = 最も過大評価した者** → **期待利益が構造的にマイナス**\r\n- 実測:平均得点 32.7 < 初期資金 34 → **「何も買わない」が最強になりかけた**\r\n- **✗ 誤った修正:残金を0点にする** → 金を使うしかなくなり、慎重派の勝率が **1.5%** に崩壊。ただの消化試合に\r\n- **✓ 正しい解:私的価値を混ぜる**(見える成分は自分にとって3倍)\r\n  → 平均得点 39.7 > 34。**落札が利益になり、かつ「あいつが高く入れた」の解釈が二重に割れる(核も強化)**\r\n\r\n**罠2:固定ローテーションの席差**\r\n- 開始入札者を `round % P` で回すと、実測で **3.8pt の席差**(統計的に有意)\r\n- **解:開始入札者を毎品ランダムに** → 席差 **1.2pt**(誤差範囲)に収束\r\n\r\n#### 最終バランス(600戦・私的価値あり)\r\n\r\n| NPC | 勝率 | 平均得点 |\r\n|---|---|---|\r\n| 鳶(慎重・安く買いたい) | **31.5%** | **41.2** |\r\n| 席0(標準) | 30.7% | 39.8 |\r\n| 鴉(標準) | 29.3% | 39.3 |\r\n| **梟(強気)** | **12.0%** | **32.3** |\r\n\r\n> **慎重が最強、強気が最弱 ―― ウィナーズ・カースが、罰として正しく機能している。**\r\n> **(ただし梟12%は罰が強すぎる可能性あり。要調整)**\r\n\r\n#### バランス調整の完了(4項目)\r\n\r\n**① 強気の罰が強すぎた問題 → NPC実装のバグが原因だった**\r\n修正後、4体の勝率が **23〜31%** に収束(基準25%)。健全。\r\n\r\n**② 【最重要】「読む」ことの正しい形が判明した**\r\n\r\n初期のNPCは「他人が高く入れた → 価値が高い → 自分も上げる」という**追随型**だった。\r\n**実測:追随するほど負ける。**\r\n\r\n| 追随の度合い | 勝率 |\r\n|---|---|\r\n| **0(追随しない)** | **32.4%** |\r\n| 0.35 | 26.1% |\r\n| 1.0(強く追随) | **13.7%** |\r\n\r\n> **オークション理論的に正しい現象:**\r\n> **「落札できた」= 「自分が最も楽観的だった」。他人の入札に乗ると、ウィナーズ・カースが悪化する。**\r\n\r\n**→ 正しい読みは3層である:**\r\n1. **「降りた」情報を読む** ―― 見た上で降りた = その成分は低い。**降りは嘘をつけない**(不可逆)\r\n2. **「あいつは何を見ているか」を履歴から推定する** ―― **これが核。**\r\n   過去の記録(割られた石の中身 × 誰がどこまで追ったか)の積み重ねからしか読めない\r\n3. **「あいつは私と同じ目か?」で情報価値を割り引く** ―― 同じなら情報ゼロ、違うなら新情報\r\n4. **呪いを警戒する** ―― 落札できるということは、自分が最も楽観的だったということ\r\n\r\n**→ 「追随は罠」であることが、そのまま学習曲線になる。** これは設計上の美点。\r\n\r\n**③ パラメータ検証**\r\n\r\n| 検証 | 結果 |\r\n|---|---|\r\n| **負の成分を無くす**(0〜8) | 呪い率 **3.6%** → **負の値は必須**(現行 -2〜+6 を維持) |\r\n| 私的価値 TASTE | 1→呪い20% / **2→12.7%** / 3→8.7% ⇒ **現行 2 が適正** |\r\n| 割引率(opt)の均衡 | **内点均衡あり(支配戦略なし)** ✓ / 慎重すぎ(0.6)は勝率12.8%で罰される |\r\n| 所持金・品数 | 金34 / 8品 で健全(金24では競りが冷える) |\r\n\r\n**④ テーマ確定:『盲目の宝石商たち』**\r\n\r\n| 抽象 | 宝石 |\r\n|---|---|\r\n| 品 | **未研磨の原石** |\r\n| 3成分 | **🔴色味・💧透明度・✨輝き** |\r\n| 見える成分 | **鑑定士の「目」**(ひとつの目しか持たない) |\r\n| 私的価値(3倍) | **自分の工房は、その面を活かす技を持つ** |\r\n| 落札時の全公開 | **石が割られ、すべてが明かされる** |\r\n\r\n> **テーマがメカニクスを説明してくれる。**\r\n> 「なぜ1つしか見えないのか」「なぜ自分の見える面が3倍なのか」に、**追加のルール説明が要らない。**\r\n> (§6-② 調和以上。私的価値という最も説明しにくい要素が、テーマで自然に解ける)\r\n\r\n#### 次の課題\r\n\r\n- [ ] **複数人での実プレイ**(オンライン化) ―― 人間同士の読み合いは未検証\r\n- [ ] 2回目・3回目でも面白いか(最適解が固まらないか)\r\n\r\n---\r\n\r\n## 死因5：フリーサイコロ ―― 罰は建ったが、緊張が現在に来なかった（2026-07）\r\n\r\n**核:** 6面すべて白紙のダイス。使った数字が、その面に永久に刻まれる。\r\n「自由を使うことが、自由を消費することである。」\r\n\r\n**土台:** 共有の注文（早取り）。エリアマジョリティとの比較の末に採用。\r\n\r\n**経過:** 骨だけ版で「刻む瞬間に指が止まる」を確認（→後に初回の新規性による\r\n偽陽性と判明）。反復プレイで中心の決断が思考停止の2分岐に潰れた：\r\n既刻の面が使えるなら使う（コストゼロの支配手）／使えないなら需要の数字を刻む\r\n（需要が一意に決定）。診断は「不可逆はあるが、不可逆を後悔させる未来が無い」。\r\n土台Bの選定理由だった「需要の変動が過去を裏切る」が未実装（churn≠drift）と\r\n判明したため、殺す基準を事前登録した上で、蘇生試行を1回だけ実施：\r\n需要に季節（drift）を導入した。\r\n\r\n**結果:** driftは機械的には完全に機能した。「過去に裏切られる手番」（詰み手番）は\r\n第1季36 → 第3季3131（1000戦計）と激増し、罰する未来は物理的に建った。\r\n帰属も正しく働いた（プレイヤーは「数字を集中させすぎた」と自分に帰属した）。\r\n**それでも、面白くなかった。**\r\n\r\n**死因:**\r\n\r\n> **後悔の強度は、罰の大きさではなく、決断の瞬間に感じた緊張に比例する。**\r\n> 不可逆・罰する未来・正しい帰属をすべて建てても、決断時に緊張が無ければ、\r\n> 罰は「後悔」ではなくただの「結果」として処理される。\r\n> 「そこまで考えなかった」選択は、どれだけ痛い帰結を生んでも、ドラマにならない。\r\n\r\n緊張が生まれなかった理由は2つ：\r\n1. **貪欲な現在手が、常に利用可能・十分・認知的に安価だった。** 未来（次の季）は\r\n   存在したが、現在の決断に割り込む強制力を持たなかった。考えなくても打て、\r\n   考えなくてもそこそこ勝てる。\r\n2. **賭け金が分散していた。** 6面×12手×3〜4点の注文では、1回の刻みが背負う\r\n   重みが小さく、代替が利く。緊張は賭け金の集中から生まれる。\r\n   （対比：影の競りは緊張を「入札の瞬間」の一点に集中させている）\r\n\r\n**中心原理との対:**\r\n\r\n> 「コストを払う行為だけが、選好を伝える」（シグナルの原理）\r\n> 「緊張を払った決断だけが、後悔を生む」（ドラマの原理）\r\n\r\n前者は情報の側、後者は感情の側。両方を満たして初めて、決断は「重く」なる。\r\n次に「不可逆」系の核を検討するときは、罰の設計より先に、\r\n**決断の瞬間に緊張を強制する仕組み**（現在手の否定・賭け金の集中・時間圧など）が\r\nあるかを確認すること。動く反例として dice.html v0.3 を保存してある。\r\n\r\n**脚注（テスト設計の交絡・死因ではない）:** v0.3では第3季の需要がR5まで伏せられて\r\nおり、刻みの最盛期（R1〜4）に最も罰してくる未来が見えなかった。帰属を断絶させうる\r\n設計ミスだったが、実プレイでは帰属は正常に働いたため、死因への寄与は小さいと判断。\r\n事前登録に従い、この欠陥を理由とした再試行は行わなかった。\r\n\r\n---\r\n\r\n## 死因6：思考課金ポーカー ―― 無料の推定が、有料の事実を駆逐した（2026-07）\r\n\r\n**核:** 嘘喰い「エアポーカー」由来。生存=分析力=賭け金が単一プールを共有する三位一体\r\n（「命の資源で賭け金が吊り上がる構造」）。思考を外部化し、「覗き」（コスト焼却で相手の\r\n伏せ札1枚をランダム閲覧、事実は公開・中身は非公開）と「晒し」（実物のみ公開可=嘘は\r\n「何を晒すか」の選択に宿る）で実装。判定基準はA（課金:熟考が勝利資源を消費）/\r\nB（可視:消費が相手に見える=コスト済みシグナル）/C（誘惑:考えれば精度が上がるが\r\n収束しない）。\r\n\r\n**土台:** 2人ポーカー骨格。専用山（1〜6）から3枚、合計値で勝負。EV常時表示\r\n（素朴一様仮定のみで計算、推奨行動は出さない）——「計算は無料、事実は有料」の分離。\r\n\r\n**経過:** v0-Aモンテカルロで kill 1（即断支配）/3（シグナル無価値）/4（経費化）/\r\n7（EV追従が搾取されない）が発動。ただし判断転換率〜50%（限界帯で買った情報の半分が\r\n実際に行動を覆した）という生きた素材を確認。死因を「ポット過小=賭け金の分散」に\r\n一元化する仮説を立て、kill基準を事前登録の上で蘇生試行を1回実施（v0-B:\r\nエスカレーティング・アンテ、プール25、レイズ単位=現在アンテ。新メカニクス追加ゼロ、\r\n経済パラメータのみの最小修正）。\r\n\r\n**結果:** 経済修正は機械的に完全に機能した。タイムアウト率17.79%→1.63%、平均12.8\r\nラウンド、終盤平均ポット18.9まで成長。それでも死んだ。 S1（覗かない・晒さない\r\n素朴EV追従）が覗き系最良と同等以上（kill 1'再発動）、虚勢系最良の対S1勝率42.3%\r\n（kill 7'再発動）。「全死因はポット過小に還元される」仮説は棄却された。事前登録に従い\r\n埋葬。\r\n\r\n**死因:**\r\n\r\n公開情報からの無料の最良推定が真実に近すぎると、有料の事実に市場が立たない。\r\n買える情報の価値 =（素朴推定と真実の乖離）×（判断を覆したときの利得）。\r\n1〜6の3枚合計という手の分布はコンパクトすぎ、伏せ札1枚の開示がequityを大きく\r\n動かさない。覗きは限界帯でこそ判断を半々で覆したが、限界帯自体が稀で、焼却コストが\r\n微益を食い潰した。ポーカーの隠匿が機能するのはホールカードが80/20を作るから——\r\n「買える事実」は、勝敗を反転させる振れ幅を持たねばならない。\r\n\r\n**副死因（晒し攻撃の構造欠陥、事前登録により確定）:** 晒し+レイズの虚勢は、正しい\r\nポットオッズで受ける相手に長期で勝てない。特筆すべきは、ポット感応の「合理的」虚勢\r\n（S9: 対フィールド.354）が固定30%の無作為虚勢（S4: .474）に明確に劣ったこと——\r\n公開状態に条件づけた虚勢は、その条件ごと読まれる。ブラフの価値は無作為性（混合戦略）\r\nにしか宿らない。 ブラフ系の核を扱う際の恒久参照点。\r\n\r\n**生きて出たもの:**\r\n\r\n- デススパイラル（負ける→資源減→思考力減→さらに負ける）は懸念に反して不発\r\n  （2:1劣勢からの逆転率21.9〜25.1%）。骨格に減衰器が内蔵されていた:フォールド出血の\r\n  遅さ+焼却による総プール単調減少=傾いたゲームほど速く終わる。\r\n- 窮鼠プッシュ（短スタック押し引き）は両版とも総合首位だが支配的でない——追い詰め\r\n  られた側の「押し引きへの相転移」は健全に創発する。核(c)系の骨格を再訪する際、\r\n  この2点は再利用できる資産。\r\n- EV常時表示は「確率計算に思考を盗られない」という導入目的自体は達成。覗きを殺した\r\n  のは表示ではなく手の分布の狭さ（表示が無くてもNPC=電卓は同じ推定に到達する）。\r\n\r\n**中心原理との対:**\r\n\r\nシグナル原則（コストを払う行為だけが選好を伝える）、ドラマ原理（緊張を払った決断\r\nだけが後悔を生む）に続く第三項の候補——市場原理:情報に値札を付けるなら、\r\n「無料推定との乖離 × 判断反転時の利得」が価格を上回る構造を先に用意せよ。\r\nフリーサイコロが「罰の設計より先に、緊張の強制を確認せよ」を遺したのと対になる:\r\n「課金の設計より先に、買う価値の実在を確認せよ。」\r\n\r\n**核(c)の再訪条件（埋葬でなく条件付き棚上げ）:** 手(または覗く対象)の価値分布が\r\nワイドまたは二峰性で、1回の開示がequityを大きく振る土台を先に用意し、「買える\r\n決定的事実の実在」を最初に検証してから核を招請すること。土台が先、核が後——遅信・\r\n案Aの教訓（核と土台の情報環境の相性が生死を分ける）と同じ順序に帰着した。\r\n\r\n**【追記 2026-07-16】工程1（買える事実の実在検証）—— 再訪条件は満たされた:**\r\n\r\n再訪条件に従い、核を招請する前に「開示1枚の価値」だけを7土台で測定した\r\n（sim/info_geometry_probe/、ゲーム・経済・コストは一切実装しない純粋な情報幾何の測定）。\r\n対照は三点測量（死亡対照F0=旧1〜6×3枚合計 / 縮退対照F9=コイン1枚 / 生存対照F+=Leduc型\r\nミニポーカー）。判定指標はM2'（見立ての改善量＝予想反転率×反転の深さ。市場原理の\r\n「乖離×判断反転時の利得」を1つの数値に写像したもの）とM3（めくりどきの局面依存性）。\r\n\r\n**結果:二山土台（FB）のみがPass。** 仕様:毎ディール各自独立50%でH山{4..9}またはL山{1..6}を\r\n秘密裏に割当、自山から3枚、合計勝負。M2'=0.0968（F0の3.79倍・F+の95%）、M3=3.58。\r\n反転札（FA）と役型2種（FC1/FC2:場札との組み合わせ）はKill-L（市場不在）で死亡。\r\n\r\n**新知見（隠れ変数の原理）:** 開示1枚の価値は、その札が「それ自身」を語るか、\r\n「見えていない残り全部」まで語るかで決まる。FCの1枚は場との一致しか語らず局所的。\r\nFBの1枚は「どちらの山か」という隠れた大元の変数の証拠となり、推定が相手の手全体へ\r\n伝播して深く刺さる（反転の深さ=F0の3.5倍。M2'の差は反転の回数ではなく深さに由来する。）\r\n**買える事実を設計するなら、個々の札の背後に、全体を束ねる隠れ変数を置け。**\r\nポーカーのホールカードが機能する理由（80/20を作る）の、もう一段深い言語化である。\r\n\r\n工程1が証明したのは「原料の実在」まで。工程2（v0-C = v0-Bの経済＋FB土台＋覗きのみ・\r\n晒しは副死因により切除）へ持ち越した設計課題:①山が一度割れると以後の覗き価値が急減する\r\n（覗き回数・価格設計に直結）②中間札4〜6の開示は山を割らない「不発」がある（欠陥でなく\r\n賭けの手触りの素材として扱う）③「動き幅と改善量の乖離」（F+で観測:針が大きく動くことと\r\n形勢が覆ることは別の性質）がFBでも出るかをkill基準設計時に考慮すること。\r\n\r\n**【追記 2026-07-16・同日】工程2（v0-C）—— 埋葬確定:**\r\n\r\n工程1をPassしたFB（二山）土台の上に、v0-Bの経済（凍結）＋覗きのみでv0-Cを構築し、\r\n事前登録済みkill基準で機械判定した（`sim/thinking_tax/事前登録_v0C_kill基準.md`、\r\n実行前コミットで凍結）。結果、K1（市場不在）が発動：覗き系最良S2（常時覗き）の\r\n対S1勝率0.5024、Wilson95%CI下限0.4926≤0.500。事前登録に従い、蘇生手続き全体を終了し、\r\n核(c)（三位一体＋思考の外部化）を正式に埋葬する。\r\n\r\n**死因の最終所在——判別実験の系譜の完結:**\r\n\r\nv0-Bで経済を直しても死に（死因は経済の外）、v0-Cで情報幾何を直しても死んだ\r\n（死因は情報幾何の外でもある）。決定的なのはK2が非発動だったこと——転換率18.59%、\r\nつまり情報は買われ、判断を実際に変えていた。それでも勝率に換金されなかった。\r\n\r\n> 見立てが改善し（工程1 Pass）、行動が反転しても（K2 Pass）、\r\n> 反転の利得が価格を上回る「利ざや」がなければ、市場は立たない。\r\n\r\n数値の証拠：S3（限界帯選別覗き）は動き幅→改善量の転化効率0.90と、最も「本物の動き」\r\nだけを買っていた。それでも対S1勝率0.4995——覗き1回コスト2を、ぎりぎり回収できない。\r\nまた不発率50.07%（開示札4〜6は山を割らない）が実効価格を約2倍にしていた。\r\n工程2設計時に「賭けの手触りの素材」と呼んだ不発は、市場の側から見れば税だった。\r\n\r\n**市場原理の完成形（第三項の更新）:**\r\n\r\n> 買える情報の価値 ＝（無料推定との乖離）×（判断反転時の利得）×（開示の命中率）＞ 価格。\r\n\r\n工程1が測ったのは第1項のみ。第2項は土台の賭け構造が、第3項は開示の解像度が決める。\r\n次に情報市場系の核を扱うときは、3項すべてを事前に見積もること。\r\n\r\n**残された未検証枝（記録のみ・行動には変換しない）:** 価格2が高すぎた可能性は\r\n本手続きでは検証していない（事前登録はK3＝価格過小側の救済のみを用意した）。\r\nただしS3の対S1が0.4995である以上、価格をほぼゼロにしない限り正転しない構造であり、\r\nほぼ無料の事実は「課金」の核と定義上両立しない。埋葬判断は動かない。\r\n\r\n**再利用可能な資産:** FB（二山）土台そのものは「1枚の開示が全体推定へ伝播する」\r\n情報幾何として計測済み（M2'＝F+の95%）。コストを焼却して事実を買う核とは相性が\r\n悪かったが、開示が行動の副産物として起きる核（入札・競りなど、コストを払う行為自体が\r\n情報を漏らす系）とは未検証のまま残る。影の競りが既にこの形で成立していることは傍証。\r\n\r\n**【追記 2026-07-16・同日その2】核の解剖——三本柱の個別判決と第四の暗黙仮定:**\r\n\r\n埋葬後の解剖として、核(c)の三本柱に個別の判決を下しておく。\r\n\r\n- **C（誘惑）——無罪。本物だった。** 工程1で乖離はF+の95%、K2で転換率18.59%。\r\n  「考えれば精度が上がる局面が実在する」は実験で最も強く裏付けられた柱。\r\n- **B（可視）——無罪。ただし審理未了。** シグナルが読める前提として、誰かが合理的に\r\n  コストを払っている必要がある。Aが市場を立てられなかった以上、可視化すべき支払いが\r\n  発生せず、Bは一度も負荷試験を受けないまま道連れになった。既存原則「受信側が機能\r\n  しなければ送信側も死ぬ」の逆向きの系：**送信が経済的に成立しなければ、受信の設計は\r\n  永遠に空転する。**\r\n- **A（課金）——有罪。ただし罪状は価格の置き所ではない。** 判別実験の消去法\r\n  （経済を直しても死に、情報幾何を直しても死んだ）が追い詰めた病巣は、Aの内部の\r\n  板挟みである：Aの定義上、価格は「意味のある大きさ」でなければならない。一方、\r\n  システムが配達できる思考1単位の価値には天井がある（情報幾何・賭け構造・命中率の\r\n  三重）。**「意味のある最低価格」≧「配達可能な価値の上限」となった瞬間、利ざやの帯は\r\n  消滅する。** S3が転化効率0.90でなお対S1勝率0.4995だったのは、帯の中に立って測ったら\r\n  幅がゼロだったという報告である。\r\n\r\n**第四の暗黙仮定こそが偽だった:** 三本柱の記述自体に誤りはない。偽だったのは、\r\n柱の外にあった暗黙の実装仮定——「熟考への課金は、思考の外部化（事実の購入）として\r\n実装できる」——である。本物の熟考の価値分布は裾が重い（ときに一手で勝敗そのものを\r\n見つける）。しかし購入できる事実1個の価値は三重の天井で必ず有界になる。外部化とは\r\n価値分布の裾を切る操作であり、裾を切られた分布に意味のある価格をくぐらせる隙間は\r\nなかった。Cの牙は、土台に移植するための外部化の時点で抜けていた。\r\n\r\n**生息地の原理:** この三位一体が完全に機能している実例は現実に存在する——将棋・\r\nチェスの持ち時間である（A：時間は負けに直結する資源、B：残り時間は丸見え、\r\nC：長考は本当に勝ち筋を見つける）。成立条件は、思考が外部化されず、価値の裾が\r\n重いままであること。すなわち三位一体は原理として死んだのではなく、**「思考がゲーム\r\nそのものである土台」を生息地とする原理**だった。生息地の外へ運ぶために思考を\r\n商品に変換した時点で、原理は原形を失っていた。\r\n\r\n**純粋情報購入は最難の市場形態:** 影の競りでは、支払い（入札）は位置を取る行為であり、\r\n情報はその副産物として漏れる（原則「コストを払う行動だけが好みを信頼できる形で\r\n伝達する」の順方向）。思考課金はこれを裏返し、情報を単独の商品にした。純粋な\r\n情報購入は、情報価値だけで価格を上回る必要がある——市場として最も成立条件が厳しい\r\n形態である。情報系の核を設計するときは、情報を単独商品にする前に、**別の目的を持つ\r\n行動の副産物として情報が漏れる形**にできないかを先に検討すること。\r\n\r\n**脚注（手法）:** 蘇生試行を「単一原因仮説の判別実験」として設計した（経済のみを直し、\r\nそれでも死ねば死因は経済の外と確定する）。結果は仮説棄却だったが、死因の所在を\r\n情報幾何（手の分布の狭さ）に局在化することに成功した。蘇生の成否と診断の成否は別物。\r\n動く反例として sim/thinking_tax/ に v0-A/v0-B 両シミュレータを保存してある。\r\n\r\n---\r\n\r\n## 情報経済設計の原則 ―― ブラフ核/伝達核系譜からの帰納（2026-07）\r\n\r\nブラフ核v0の検死・案Dの覗き市場の死因の一般化・伝達核v0.1の死因とv1.0の治療を経て、\r\ndesign chatで確定した一般原則群。個別の検死は実践記録集の該当節を参照。\r\n\r\n### 私的購入と公的シグナルの区別\r\n\r\nコストを払って自分だけが確定情報を得る行為（覗き）はソリティア最適化を生む。\r\nコストを払う行動が公的な信号になる構造（ベット）だけが読み合いを生む。\r\n情報購入を設計するときは「その支払いは相手から見えるか・相手の推理材料になるか」を\r\n必ず問う（出典：ブラフ核v0の検死および案Dの覗き市場の死因の一般化）。\r\n\r\n### 秘密は圧縮可能な1概念にする\r\n\r\nN個の独立な事実（順列等）を秘密にすると、解読は制約の帳簿づけ＝確率計算に退化する。\r\n秘密が1個の圧縮可能な概念（評価軸等）なら、良いヒント1つで全体が開くエウレカ構造に\r\nなる（出典：伝達核v0.1の死因とv1.0の治療）。\r\n\r\n### 伝達の非対称性には機械的な鍵が要る\r\n\r\n公開チャネルで「味方にだけ通じる」を成立させるには、チームごとの私的な鍵\r\n（Decryptoのキーワードカード、伝達核のアンカー）を機構として持たせる。属人的な\r\n共有文脈に依存すると形式化不能で、文脈の薄いペアで崩壊する。\r\n\r\n### 相関する評価軸の設計\r\n\r\n候補となる評価軸同士を意図的に相関させると、結果の論理だけでは切り分けが遅くなり、\r\n意味の理解だけが速く抜けられる。「論理より意味が速い」状況は軸設計で保証できる。\r\n\r\n### 燃焼式生命経済\r\n\r\nゼロサムのチップ往復では掛金は命にならない。賭けた資源が戻らず（燃焼）、勝利は\r\n別勘定（得点）に変換される構造にすると、全ベットが寿命を削り、ゲーム全体が死へ\r\n向かう緊張曲線を持つ。\r\n\r\n### 記録は自動・推論は手動\r\n\r\n公開情報の記憶を強いるのは「記憶税」であり、狙った思考を圧迫する雑味。生の事実\r\n（履歴・結果）は機械や卓上の物理配置が覚え、結論（推理）だけを人間に残す。\r\n\r\n### フォールド＝代金を払った情報拒否権\r\n\r\n両者チェックで判定が起きる構造なら、公開情報の発生を止める唯一の手段は「ベットに\r\n降りてポットを譲る」ことになり、霧は購入物になる。副次ループとして、解読済みの側\r\nこそ判定を避けたがり（判定は遅れた側の追い上げ燃料）、大きく張って降ろしたいが、\r\n大きなベットは解読済みの信号として漏れる。\r\n\r\n---\r\n---\r\n\r\n# 第5部 方法論編(新メカニクス設計)\r\n\r\n「新しいメカニクスをどう発想し、どう評価し、どう土台に乗せるか」という**メタな設計方法論**を扱う。\r\n\r\n> **本編の中心命題(まず結論):**\r\n> 新しい核メカニクスを最大化する土台を選ぶとき、\r\n> **「別の面白さを足す」土台(足し算)より、「同じ面白さを増幅する」土台(掛け算)を選ぶ。**\r\n> 核を主役にしたいなら掛け算。\r\n\r\n---\r\n\r\n## 1. 「全く新しい」への正直な前提\r\n\r\n- **完全な新規性は検証不可能。** 登録ゲームは十数万作、メカニクス分類だけで約200。「新しい」と思っても既存の同人・絶版作にある可能性は排除できない。\r\n- **「新メカニクス」の大半は、既存要素の未踏の組み合わせ。** デッキ構築(ドミニオン)ですら「TCGのデッキ調整をゲーム内に圧縮した」再結合だった。\r\n- したがって目標は「無から創る」ことでなく、**「未踏の組み合わせ/未踏の素材を、体系的に探す」**こと。\r\n\r\n## 2. 新規性の鉱脈は「新しい素材/媒体」に眠る\r\n\r\n本当に新しいメカニクスが生まれるのは、**新しい素材か媒体が現れたとき**。\r\n- レガシー = 「物理的な不可逆性(破壊・恒久改変)」という素材の発見。\r\n- **最大の未開拓地 = デジタルネイティブ。** 物理では原理的に不可能なことが可能になる。\r\n\r\n**探索法:物理の制約を列挙し、「それが外れたら何ができるか」を問う。**\r\n物理ボードゲームの原理的制約の例:\r\n- 「覗いていないこと」を証明できない → 外すと:**見なかったことへの報酬**(試案A)\r\n- 全員が同じ盤面を見る → 外すと:**プレイヤーごとに歪んだ知覚**(試案B)\r\n- 状態を隠したまま更新できない/情報は常に最新 → 外すと:**情報の遅延を資源化**(試案C)\r\n\r\n体系の地図(素材=空間/資源/時間/人間関係)に照らし、「この素材を物理で扱えない理由」を一つずつ潰していくと、探索が体系的に回せる。\r\n\r\n## 3. 新メカニクスの評価 ― 体系をチェックリストに使う\r\n\r\n思いつきを「体系のチェックリスト」に通す。試案A・B・Cを検査した結果、有効だった順序:\r\n\r\n1. **ジレンマの質(§2-4):** 上位互換がないか/最適解が状況で入れ替わるか/天秤が見えているか。\r\n2. **フィードバックと独走(§2-2):** 正のループの歯止めが内蔵されているか。\r\n3. **認知負荷/AP(§3):** 読み切れなさで長考を抑えるか、それとも計算地獄になるか。\r\n4. **敗北感(§4-1):** ← **最強のフィルター(後述)**。\r\n5. **穴は塞げるか:** その欠点は、長所を殺さずに直せるか。\r\n\r\n### 決定的な判定基準:「穴が既知技法で塞げるか」\r\n- **生き残る案:** 穴を、体系が用意した道具(動的値付け・手がかりの可視化・UIでの認知補助)で塞げる(試案A・C)。\r\n- **死ぬ案:** 穴が**面白さと不可分**で塞げない(試案B ―― 多層の他者モデリング負荷を下げると魅力も消える)。\r\n\r\n> **問い:「その欠点は、長所を殺さずに直せるか?」** これが生死を分ける。\r\n\r\n## 4. 敗北感(§4-1)が、新規考案の最強フィルター\r\n\r\n3試案を最も鮮明に分けたのは、派手なジレンマや相互作用でなく ――\r\n**「負けたとき、敗因を自分の判断に帰属でき、かつ次に活かせるか」**だった。\r\n- 試案A:帰属(自分の賭け)と緩衝(見なかった逃げ場)を**両立** → ◎\r\n- 試案B:敗因が霧の中で特定不能(§4の⑤)→ ✕\r\n- 試案C:両立可能 → ○\r\n\r\n> **面白いメカニクスとは、勝ち方が魅力的なものでなく、負け方が納得できるもの。**\r\n> 体系の\"出口\"(§4敗北感)が、新規考案の\"入口の判定基準\"に戻ってくる。円環が閉じる。\r\n\r\n## 5. 検査で得た副次的教訓\r\n\r\n- **「相互作用が濃い」ことは、面白さを保証しない。** 試案Bは相互作用最強だったが土台が破綻。濃い相互作用も、認知負荷・検証可能性・敗因追跡可能性の土台の上でしか機能しない。派手な長所に惑わされず土台(§3, §4)を検査する。\r\n- **アイデア1割・調整9割。** 「理屈で美しい」と「遊んで面白い」の間に深い谷。値付け(倍率・コスト・比率の均衡=§2-4c)はプロトタイプを回さないと分からない。\r\n- **スコープを間違えると死ぬが、正しく絞ると生きる。** 試案Bは全面適用で破綻するが、核の一部を限定的な一軸に絞ればハナビ系の変種として成立。\r\n\r\n---\r\n\r\n## 6. 【中心命題】核を活かす土台の選び方 ― 足し算 vs 掛け算\r\n\r\n新しい核メカニクスを、どの既存メカニクスの上に乗せるか。ここに一般原則がある。\r\n\r\n### 選定の4条件(核が「リスク選択」型の場合の例)\r\n核メカニクスが最大化される土台の条件(試案A「見る/見ない=リスクを取るか避けるか」の場合):\r\n1. **賭けの結果に幅がある**(均質だと賭ける意味がない)\r\n2. **確実な選択肢との差が効く**(安全と博打の差が勝敗に響く)\r\n3. **局面で賭けの重みが変わる**(いつも同じリスクでなく濃淡が出る=§2-4「最適解が入れ替わる」)\r\n4. **賭けの成否が自分の判断に帰属する(§4-1)**(核の美点を殺さない)\r\n\r\n### 足し算の土台 vs 掛け算の土台\r\n候補の土台を、核との関係で2種類に分ける。\r\n\r\n- **足し算の土台:核に「別の面白さ」を追加する。**\r\n  例:試案A(リスクの核)× セットコレクション(収集の面白さ)。\r\n  → 核に収集の楽しさが**加わる**。悪くないが、**核が脇役になりがち**。別の主題に核を\"乗せる\"形。\r\n\r\n- **掛け算の土台:核と「同じ面白さ」を増幅する。**\r\n  例:試案A(リスクの核)× プレス・ユア・ラック(リスク累積管理そのもの)。\r\n  → 両者が「リスクとの付き合い方」という**同じ主題を共有**し、相乗する。**核が主役になる。**\r\n\r\n> **原則:核を主役にしたいなら、掛け算(同じ面白さを増幅する土台)を選ぶ。**\r\n> 足し算は核に別の魅力を\"足す\"、掛け算は核の魅力を\"増幅する\"。\r\n> 「この核を最も活かす土台は?」への構造的な答え = 核と同じ主題を扱う土台を探せ。\r\n\r\n### 噛み合いの正体\r\n試案Aの「見る/見ない」は本質的に**リスクを取るか避けるかの選択**。\r\nプレス・ユア・ラックは**リスクの累積管理そのもの**をゲームにしたメカニクス。\r\n両者は「リスクとの付き合い方」という**同じ主題**を扱う → 接続すると相乗する。\r\nこれが「噛み合い」の構造的な正体。核の主題を言語化し、その主題を共有する土台を探すのが、掛け算の土台選びの実践手順。\r\n\r\n### ただし:足し算と掛け算は排他ではない\r\n掛け算の土台(骨格)に、足し算の要素(目的意識)を**重ねられる**。\r\n例:プレス・ユア・ラック(骨格=リスク累積)× セットコレクション(目的=何を集めるか)。\r\n→ インカの黄金がまさに「遺跡を進む(PYL)× 宝石を集める(コレクション)」の合わせ技。\r\n**土台を掛け算で、目的を足し算で** ―― という二層構造が、核の決定版に近づくことが多い。\r\n\r\n### 土台候補の評価例(核=「盲目取得×高倍率」)\r\n| 土台 | 幅 | 確実との差 | 局面の濃淡 | 帰属(§4-1) | 核は主役か | 関係 |\r\n|---|---|---|---|---|---|---|\r\n| セットコレクション | ○ | △ | ○ | ○ | 脇役 | 足し算 |\r\n| **プレス・ユア・ラック** | ◎ | ◎ | ◎ | ◎ | **主役** | **掛け算** |\r\n| バッグビルド | ○ | ○ | △ | ○ | 脇役 | 足し算 |\r\n| オークション | ◎ | ◎ | ○ | △ | 主役 | 掛け算(心理戦特化・人を選ぶ) |\r\n\r\n→ 最適 = プレス・ユア・ラック(核と同じ「リスク」主題を掛け算で増幅)。\r\n\r\n---\r\n\r\n## 7. 方法論のまとめ ― 新メカニクス設計の手順\r\n\r\n1. **探索:** 物理(または既存媒体)の制約を列挙し「外れたら何ができるか」を問う。デジタルネイティブが最有力の鉱脈。\r\n   → **実行手段:第4部§5の「操作 × コンポーネント」行列で空白のマスを探す。**\r\n2. **発想:** 体系の素材地図(空間/資源/時間/人間関係)に照らし、未踏の組み合わせ・素材を探す。\r\n3. **評価:** 体系をチェックリストに(§2-4→§2-2→§3→§4-1)。特に**敗北感(§4-1)が最強フィルター**。\r\n4. **選別:** 「穴は長所を殺さずに塞げるか?」で生死を判定。\r\n5. **土台選び:** 核の主題を言語化し、**同じ主題を増幅する土台(掛け算)**を選ぶ。目的意識は足し算で重ねてよい。\r\n6. **調整:** アイデア1割・調整9割。値付け(§2-4c均衡)はプロトタイプで。デジタル環境(HTML+Firebase)は値を振って試すのに好適。\r\n\r\n> **全体を貫く再帰性:** 新メカニクスを\"創る\"方法論は、結局これまでの設計論(§0〜§6)を\"評価器\"として使う。\r\n> 良い設計を語る体系は、そのまま良い設計を生む道具になる ―― 分析の言語が、創造の言語でもある。\r\n\r\n\r\n---\r\n\r\n# 付録 クイックリファレンス\r\n\r\n第1部の内容を実務用に圧縮した早見表(旧「知見まとめ」§2・§4より)。理屈は第1部参照。\r\n\r\n### A-1. ゲームを「つまらなくする」設計(実例つき)\r\n\r\n| 罠 | 内容 | 実例 | 対策の方向 |\r\n|---|---|---|---|\r\n| **独走(ランナウェイリーダー)** | 先行者がますます有利になり中盤で勝敗が確定するのにゲームは続く | モノポリー | 終盤のまとめ得点で逆転余地を残す/リーダーへの干渉手段(カタンの盗賊等) |\r\n| **キングメイク** | 勝てないプレイヤーの選択が他人の勝敗を決める | リスク | 最後まで全員に自分の得点を伸ばす動機を残す/攻撃の見返りを「自分の得」に寄せる |\r\n| **偽の選択肢** | 選択肢はあるが最適手が一つに決まっている | 支配的カードのある技術ツリー | 状況で最適解が入れ替わる設計(プエルトリコの役割選択) |\r\n| **マルチプレイヤー・ソリティア** | 各自が自分の盤面を最適化するだけで相互作用がない | エンジンビルド系全般 | 共有の早取りボーナス、共通資源の奪い合い |\r\n| **ダウンタイム(手番待ち)** | 一人の長考で他が待つ | 重量級ユーロ | 同時アクション選択/割り込み要素/1手番の情報量を絞る |\r\n| **後半の消化試合化** | 面白い決断が序盤に集中し終盤は作業 | 一本道のエンジン運用 | 終盤に新しい判断材料を投入 |\r\n\r\n**共通の根:**「意味のある選択肢が、ゲームを通じて途切れないか」。\r\nつまらなさの多くは「選ばされている(=選択肢が偽)」か「もう選んでも結果が変わらない(=結果の早期確定)」に還元できる。\r\n\r\n---\r\n\r\n### A-2. 8つの楽しさの「保ち方」と「壊し方」\r\n\r\n| 楽しさ | 保ち方 | 壊し方 |\r\n|---|---|---|\r\n| 感覚 | 繰り返しに耐える手触り | 初見のインパクトだけ/扱いにくく面倒に |\r\n| 幻想 | テーマとメカニクスの一致 | テーマが後付けの「塗装」(乖離) |\r\n| 物語 | 劇的な瞬間が生まれる余地(逆転・裏切り) | 結果の早期確定/ランダム過多で無関係化 |\r\n| 挑戦 | 難易度を実力にフィット(フロー)、最適解が入れ替わる | 支配的戦略が一つ見つかり作業化 |\r\n| 交流 | 他人と関わる理由を最後まで全員に | 独走・ソリティア化/協力ゲームの奉行問題 |\r\n| 発見 | 未知を何度も供給(モジュール式・大量バリエ) | 情報が割れると陳腐化(消耗する資源) |\r\n| 自己表現 | 幅のある道筋で個性ある結果へ | 最適な作り方が一本道になる |\r\n| 没入 | 心地よい反復を程よい分量で | 全体を占めて退屈な作業ゲー化 |\r\n\r\n**壊し方の3つの根:**\r\n- **支配的戦略**(挑戦・自己表現・偽の選択肢を殺す)\r\n- **結果の早期確定**(物語・交流・挑戦を殺す独走/キングメイク)\r\n- **主軸への過度な依存**(発見・感覚を初回だけで燃やし尽くす)\r\n\r\n**保つ原則:** 意味のある選択肢を途切れさせない + 主軸の楽しさをリプレイに耐えるだけ供給し続ける。\r\n\r\n**テスト時のチェック:** 同じ面子で3回以上遊び「2回目に最適解が固まっていないか」「勝敗がいつ見えるか」「静かになる時間帯はどこか」を観察する。\r\n\r\n---\r\n"}, {"id": "ボードゲーム設計論_実践記録集_md", "file": "ボードゲーム設計論_実践記録集.md", "title": "実践記録集", "sub": "案A / 遅信 / 共犯 / 影の賽 ― 失敗と、その診断", "icon": "📔", "md": "# ボードゲーム設計論 ― 実践記録集(案A / 遅信 / 共犯)\n\n旧「実践記録_案A」「実践記録_案C遅信」「実践記録_共犯」「実践記録_共犯2」の4ファイルを統合したもの。\n§記号・「体系まとめ」「方法論編」への参照は「理論編」ファイルの該当部を指す。\n\n**⚠️ 読み方の注意:** 各記録は執筆時点の判定を含む(遅信「成立」・共犯第1報「成立」)。\n**最終状態は下表が正**であり、記録内の楽観的な総括より優先する。\n\n## 到達状況の総覧(最終)\n\n| | 第1記録 案A | 第2記録 遅信(案C) | 第3・4記録 共犯 | 第5記録 影の賽 |\n|---|---|---|---|---|\n| 核 | 見なかったことの証明 | 情報の鮮度の資源化 | 敵対を明確化するタイミング | 調べれば確信は増すが、調べれば奪われる |\n| 到達点 | 机上で中止 | 実装したが体験が失敗 | 実装2回、どちらも体験が失敗し中止 | 実装2回、どちらも体験が失敗し中止 |\n| 死因 | 核と土台の情報環境が不一致 | **答えが計算で一意に出る** | **答えがどちらでもいい** | **前提が論理的に成り立たない**(調査は選好のシグナルにならない) |\n| 核の生死 | 核は生きている(土台replace候補あり) | ― | 核(A・B・C)は生きている | 発明(サイコロの影)は生きている。核の前提は死んだ |\n\n> **3本の記録が指し示す単一の結論:**\n> **「意味のある選択」とは、\"選ぶ余地がある\"ことではなく、\n> \"選び方によって結果が変わり、しかも正解が事前に分からない\"ことである。**\n> 答えが一意でも(遅信)、答えがどちらでもよくても(共犯)、選択は死ぬ。\n> 生きた選択は、その両極の間の狭い帯にしか存在しない。\n\n<!-- TOC -->\n## 目次\n\n- [到達状況の総覧(最終)](#到達状況の総覧最終)\n- [0. この記録の価値](#0-この記録の価値)\n- [1. 出発点:案Aの核とは何だったか](#1-出発点案aの核とは何だったか)\n- [2. 土台選び:足し算 vs 掛け算(方法論編§6の実例)](#2-土台選び足し算-vs-掛け算方法論編6の実例)\n- [3. 変形の軌跡 ― 核を巡る往復(記録の核心)](#3-変形の軌跡--核を巡る往復記録の核心)\n  - [往復1:上位互換の穴](#往復1上位互換の穴)\n  - [往復2:同時性 vs 反応の駆け引き](#往復2同時性-vs-反応の駆け引き)\n  - [往復3:即死バーストの矛盾](#往復3即死バーストの矛盾)\n  - [往復4:倍率のフレーバーと「見る」の死(二重の指摘)](#往復4倍率のフレーバーと見るの死二重の指摘)\n  - [往復5:核(要素2)の喪失と回収](#往復5核要素2の喪失と回収)\n- [4. 競争構造の欠落(§1への差し戻し)](#4-競争構造の欠落1への差し戻し)\n- [5. 行き詰まり:なぜインカ型を中止したか(最重要の教訓)](#5-行き詰まりなぜインカ型を中止したか最重要の教訓)\n  - [この行き詰まりの教訓(汎用)](#この行き詰まりの教訓汎用)\n- [6. 最終評価(中止時点)](#6-最終評価中止時点)\n- [7. この実践記録から得た、汎用的な設計教訓(まとめ)](#7-この実践記録から得た汎用的な設計教訓まとめ)\n- [0. この記録の価値](#0-この記録の価値-1)\n- [1. 出発点:案Cの核](#1-出発点案cの核)\n- [2. 土台の再検討(案Aの教訓の適用)](#2-土台の再検討案aの教訓の適用)\n- [3. 方向i vs 方向ii の厳密検証(分岐点)](#3-方向i-vs-方向ii-の厳密検証分岐点)\n  - [方向i(陣取り×遅延)の診断](#方向i陣取り遅延の診断)\n  - [方向ii(協力×通信途絶)の診断](#方向ii協力通信途絶の診断)\n- [4. 仮ルール骨格:「遅信 / Delayed Signal」](#4-仮ルール骨格遅信--delayed-signal)\n- [5. 机上シミュレーション検証](#5-机上シ ネタ本番の記録2026-07-22開発終了)\n  - [開発終了とv0.10の棚上げ（2026-07-23）](#開発終了とv010の棚上げ2026-07-23)\n\n<!-- /TOC -->\n\n---\n\n# 第1記録 案A「見なかったことの証明」(机上で中止)\n\nひとつの新メカニクス案を、思いつきから検証・変形・行き詰まりまで\n実際に辿った過程の記録。**完成品でなく「設計の生きた軌跡と教訓」**として残す。\n\n---\n\n## 0. この記録の価値\n\n案Aは最終的に「完成した名作」には至らず、主軸(インカの黄金型)を一旦中止した。\nだが**この過程そのものが、方法論編の「アイデア1割・調整9割」を最も生々しく実演した記録**であり、\n「良い核が、実装の詰めで何度も殺されかけ、その都度引き戻される」設計の実体を示している。\n完成より、この往復のパターンにこそ再利用可能な学びがある。\n\n---\n\n## 1. 出発点:案Aの核とは何だったか\n\n**案A「見なかったことの証明(Committed Blindness)」の当初の核は2要素あった:**\n- **要素1:「見る/見ない」の選択そのもの**(確実性を取るか、賭けるか)\n- **要素2:「見なかったこと」をシステムが証明・保証する**(デジタルだからこそ「覗いていない」を担保でき、盲目の決断が能動的戦略になる=方法論の「デジタルネイティブの鉱脈」)\n\n方法論編の検査(3試案の比較)で、案Aは最有力と判定された。理由:\n- ジレンマ(§2-4):推論への賭け ◎\n- 敗北感(§4-1):帰属(自分の賭け)と緩衝(見なかった逃げ場)の**両立** ◎(3案中唯一)\n- AP抑制(§3-2):見ない=分析不能で構造的に長考を封じる ◎\n- 穴が既知技法で塞げる ◎\n\n---\n\n## 2. 土台選び:足し算 vs 掛け算(方法論編§6の実例)\n\n案Aの核「見る/見ない=リスクを取るか避けるか」を最も活かす土台を検討。\n- セットコレクション(足し算=別の面白さを追加)→ 核が脇役になりがち\n- **プレス・ユア・ラック(掛け算=同じ「リスク」主題を増幅)→ 核が主役に** ← 採用\n\n→ **教訓:核を主役にしたいなら、核と同じ主題を扱う土台(掛け算)を選ぶ。** 案Aとインカ型PYLは「リスクとの付き合い方」を共有する。\n\n---\n\n## 3. 変形の軌跡 ― 核を巡る往復(記録の核心)\n\n仮ルールを具体化するたびに穴が出て、潰すたびに核を見失いかけ、設計者の差し戻しで引き戻された。\nこの往復のパターンこそ再利用可能。\n\n### 往復1:上位互換の穴\n- **問題:** 「見て降りる」が「見ないで降りる」の上位互換に(降りる局面では見て危険回避が常に得)。\n- **誤った対策:** 「潜る=必ず盲目」に→ **核(見る/見ないの選択)を殺した。**\n- **正しい対策:** 「見る」の利点を\"危険回避\"から**\"価値確定\"**に付け替える。見ても呪物は見分けられない設定にすれば、降りる局面でも「確実な等倍 vs 賭けたまま高倍率」の真の二択が残る。核を保持したまま穴だけ塞げる。\n- **教訓:穴を塞ぐとき、修正が長所(核)を殺していないか常に問う(方法論§3)。** 塞ぐべき一点だけを外科的に潰す。\n\n### 往復2:同時性 vs 反応の駆け引き\n- **問題:** 同時公開だと「他人が降りたのを見てから自分が判断」ができない。\n- **対策:** 一潜航を**複数の同時ラウンド**で構成。各ラウンドは同時公開(ダウンタイムなし§1)だが、ラウンド間で前ラウンドの浮上者が判明→反応の連鎖が作れる(インカの黄金の構造)。\n- **教訓:同時性(ダウンタイム解消)と逐次性(反応の駆け引き)はトレードオフ。ラウンド分割で両取りに近づける。**\n\n### 往復3:即死バーストの矛盾\n- **問題:** 「危険を抱えたまま迷う」緊張を謳ったのに「危険=即バースト」では、掴んだ瞬間に終わり、迷う局面が存在しない。\n- **対策:** 危険を**即死でなく累積型**(閾値でバースト)に。見ないで抱えると自分の危険蓄積が不確実になり「もう一段いくか」の緊張が生まれる。\n- **教訓:謳った体験(抱えたまま迷う)と、罰の即時性が矛盾していないか点検する。**\n\n### 往復4:倍率のフレーバーと「見る」の死(二重の指摘)\n- **問題A:** 「見ないで拾う=高倍率」のフレーバー的理屈が素直に出ない。\n- **問題B:** ノルマ等がないと、見ないが常に得で「見る」が死んだ選択肢(§2-4偽の選択肢)になる。\n- **根の共通性:** 「見ないの高倍率」という前提自体が無理をしていた。\n- **対策:** ①目標(ノルマ)を導入し「見る=狙った値を確実に」に存在意義を与える。②倍率を捨て、見ない=「速い/安い/ブレる」、見る=「遅いが確実」に。フレーバーも「封を解くと目減り/封じたまま漁ると手早いがブレる」で素直に。\n- **教訓:調整には「最初の核の一部(倍率)を捨てる」ことも含まれる。案Aの真の核は「見る/見ないの選択」であって「高倍率」ではなかった。** 前提を疑う勇気。\n\n### 往復5:核(要素2)の喪失と回収\n- **問題:** 変形の過程で「見る/見ない」を私的な効率選択に閉じ込め、**要素2(見なかったことの証明)を殺していた。** 私的な盲目引きは物理のバッグビルドでも可能で、デジタル固有の新規性が消えていた。\n- **対策(概念上):** 「見ずに取った事実を公開し、システムが保証する」→ 豪胆さのシグナル/ブラフ(§5-4)として機能させる。\n- **教訓:要素2が輝くのは「他者に対して意味を持つ」とき。私的選択に閉じると死ぬ。**\n\n---\n\n## 4. 競争構造の欠落(§1への差し戻し)\n\n- **問題:** ここまで「一人の潜航をどう面白くするか」に集中し、**プレイヤー同士が何を競うか(§1)が未定義**だった=マルチプレイヤー・ソリティア(§0)。\n- **原因:** 魅力的な核(見る/見ない)に引っ張られ、§0の順序「主軸→**構造**→メカニクス」の\"構造\"を飛ばした。\n- **対策:** インカの黄金型の競争骨格を借用(共有リスクプール＋残留者ボーナス＋目玉の早取り)。直接妨害は共有プールに吸収しキングメイク(§1)回避。\n- **接合部の衝突:** 目玉の早取り(即時精算)と「見ないで取る(浮上まで価値未確定)」が精算タイミングで衝突→「見ずに奪う=中身は宙吊りのハイリスク奪取」として、衝突を核の見せ場に転化。\n- **教訓:魅力的な核はメカニクスから設計を始めさせ、上位の構造(§1)を空白にしがち。§0の順序を守る。複数メカニクスの合成は\"接合部\"の矛盾を必ず点検。**\n\n---\n\n## 5. 行き詰まり:なぜインカ型を中止したか(最重要の教訓)\n\n**最終的な問題(設計者の直感):**\n「見なかったことの証明」がなされても、このシステムでは**相手の魔力値もノルマ進捗も非公開**。\n相手の内部状態が見えない中で「あいつは見ずに取った」という一点だけ公開されても、\n**受け手はそれを判断に組み込む土台(文脈)がない** → シグナルが「で?」となり「どっちでもいい」に潰れる。\n\n**根本原因:要素2(公開シグナル)と、インカ型の全面非公開性が、根で噛み合っていなかった。**\n- 要素2が輝くには「他の情報はある程度見えていて、その中で\"見た/見なかった\"だけが未知」という情報環境が要る。\n- 全部が霧の中では、一点の光は機能しない。\n\n→ **決定:インカの黄金方針を一旦中止。**\n\n### この行き詰まりの教訓(汎用)\n1. **メカニクスには「相性の良い情報環境」がある。** 単体で優れた要素(要素2)も、土台の情報公開度と噛み合わないと死ぬ。要素2は「大半が見えて一点だけ隠れる」環境向きで、全面非公開のインカ型とは逆だった。\n2. **独自性の重心がどこにあるかを見極める。** この案の独自性の重心は要素2(見なかったことの証明)にあった。それが土台と噛み合わず機能しないなら、残るのは「PYLに見る/見ないを足したインカの亜種」で独自性が薄まる。**独自性を担う部分が機能しないなら、土台ごと選び直す判断が要る。**\n3. **「直感で\"どっちでもいい\"と感じる」は強い危険信号。** プレイヤーがある選択を「どちらでも大差ない」と感じたら、それは§2-4の偽の選択肢化のサイン。理屈が通っていても、選択が意思決定に影響しないなら死んでいる。\n\n---\n\n## 6. 最終評価(中止時点)\n\n| 問い | 評価 | 補足 |\n|---|---|---|\n| ゲームとして成立するか | ○ | 骨格は立つが、一手の過積載(見る/見ない・呪い管理・降り読み・目玉奪取の4緊張)と数値未検証が課題 |\n| 要素1(見る/見ないの選択) | ○ | 堅持できた |\n| 要素2(見なかったことの証明) | ✕(この土台では) | 全面非公開のインカ型と噛み合わず機能しない |\n| 独自性 | △ | 重心の要素2が機能せず、「インカの亜種」に留まるリスク |\n\n---\n\n## 7. この実践記録から得た、汎用的な設計教訓(まとめ)\n\n1. **良い核ほど、実装の詰めで繰り返し殺されかける。** 設計者が核を握り、実装の便宜で削られるたびに引き戻す往復が、良い設計を守るプロセスそのもの。\n2. **穴を塞ぐとき「長所を殺していないか」を毎回問う**(方法論§3)。塞ぐべき一点だけを外科的に。\n3. **調整には「当初の核の一部を捨てる」勇気も含む**(倍率を捨てて核が救われた)。核の本質と、それに付随していた仮定を切り分ける。\n4. **魅力的な核は§0の設計順序(主軸→構造→メカニクス)を狂わせ、競争構造(§1)を空白にしがち。**\n5. **複数メカニクスの合成は\"接合部\"で矛盾する**(精算タイミング等)。合成時は接合部を点検。\n6. **メカニクスには相性の良い情報環境がある。** 単体で優れた要素も、土台の情報公開度と噛み合わないと死ぬ。\n7. **「どっちでもいい」という直感は、偽の選択肢化の最強の検出器。** 理屈が通っていても、選択が結果に影響しなければ死んでいる。\n8. **独自性の重心を特定し、それが機能しないなら土台ごと選び直す。**\n\n> **総括:** 案Aは中止に至ったが、核(要素1)の筋の良さは検証済みで、失われていない。\n> 行き詰まったのは核ではなく「土台(インカ型の情報環境)との相性」。\n> 次に活かすなら ―― **要素2(見なかったことの証明)が輝く情報環境=「大半が公開され、\"見た/見なかった\"だけが隠れる」土台**を、改めて探すのが筋。\n> 核は生きている。土台を替えれば、まだ道はある。\n\n\n---\n\n# 第2記録 案C「鮮度市場」→「遅信」(実装後、体験が失敗)\n\n> **【最終状態の注記】** 本記録は「机上シミュレーションで成立」と判定した時点の記録。\n> **その後 HTML+Firebase で実装しプレイした結果、体験としては失敗**(「答えが計算で一意に出るためジレンマが生まれない」)。\n> 失敗の診断は第3記録§1を参照。本文中の「成立」は机上検証時点の判定として読むこと。\n\n第1記録(案A)と対をなす、**「土台を選び直して(机上検証としては)成立まで到達した」記録**。\n核は同じ探索プロセスでも、土台との相性次第で結末が変わることを、案Aとの対比で示す。\n\n---\n\n## 0. この記録の価値\n\n案Cは「情報の鮮度の資源化」という核から出発し、当初の土台(相場)を**検証によって乗り換え**、\n協力×通信途絶の「遅信」として、2〜4人の机上シミュレーションまで通した。\n**案Aの教訓(核と情報環境の相性・土台の選び直し)を最初から適用したことで、\n同じ「アイデア1割・調整9割」でも、往復の空転が大幅に減った** ―― 方法論が学習として機能した記録。\n\n---\n\n## 1. 出発点:案Cの核\n\n**案C「情報の鮮度市場(Latency Economy)」の核:**\n情報の鮮度そのものを資源化し、**「いつの世界を見て意思決定するか」を戦略にする**。\n各プレイヤーは遅延Nを持ち、Nターン前の世界を見て動く。デジタルでしか成立しない(方法論の「デジタルネイティブの鉱脈」)。\n\n**当初の土台(相場ゲーム)での着地(初期検証時):**\n低遅延=最新が見えるが約定は変動リスク / 高遅延=古いが見えた過去価格で約定保証(安定)。\n検査は通過したが、懸念2つが残っていた:①高遅延ポジションが本当に選ばれるか(最新の価値が高すぎないか) ②時間補正の読みが「面白い難しさ」か。\n\n---\n\n## 2. 土台の再検討(案Aの教訓の適用)\n\n案A記録の教訓「核と土台の情報環境の相性が生死を分ける」「土台ごと選び直す判断」を先に適用。\n**核が輝く3条件**を逆算:\n1. 遅延した情報にも行動根拠としての価値が残る\n2. 「外挿の推理」が可能(古い情報から現在を推測する手がかりがあり、巧拙で差がつく)\n3. 全員が同じ時点を見ないことが駆け引きを生む\n\n**土台候補の比較:**\n| 土台 | 評価 | 要点 |\n|---|---|---|\n| 相場(当初案) | ○ | 価格の連続性が傾向値を残すが、「最新の価値が高すぎ」の綱渡り |\n| 陣取り×遅延(方向i) | 一長一短 | 外挿が幾何学的論理パズル=核の魅力。だが**可能盤面の網羅列挙=AP地獄と表裏一体** |\n| レース | ○ | 条件3(駆け引き)が弱い |\n| **協力×通信途絶(方向ii)** | ◎ | 下記 |\n\n---\n\n## 3. 方向i vs 方向ii の厳密検証(分岐点)\n\n### 方向i(陣取り×遅延)の診断\n- 外挿=「敵の可能手の網羅列挙」→ **核の魅力と最大の病(§3 AP)が同じ場所にある**(案Bと同型の危険構造)。\n- 塞ぐ手段はあるが代償が大きい:規模縮小→「2人用遅延アブストラクト」に痩せる/UIで可能範囲表示→**推理の肩代わり=核の空洞化**。\n- 読み切りが相手の非合理で覆る対人の苛立ち(§4)。実質2人用。\n\n### 方向ii(協力×通信途絶)の診断\n- 外挿=「仲間ならどう動くかの**共感的一点推定**」(味方の合理性が手がかり)→ 網羅爆発が構造的に起きない(§3◎)。\n- **奉行問題(§1)を時間で構造的に解決** ―― 誰も全体の「今」を知れないので指揮の座が存在しない。協力ゲームの宿痾への構造的解答。\n- 敗北感:「信じた判断」への帰属+「通信が遅いから」の逃げ場が両立(§4-1◎)。\n- テーマ融合:遅延がテーマ上の必然(§6の③)。\n- 穴も塞げる:①敵は決定論的成長にすれば遅延下でも外挿可能 ②外部チャット問題→「通信自体もNターン遅延で届く」に昇華(**穴の対策が核を拡張する稀な好相性**)。\n\n**判定:方向ii採用。** 決め手=①方向iは核と病が不可分 ②方向iiは穴対策が核を豊かにする ③奉行問題への解答という二枚目の独自性。\n**特筆:案Aで断念した「信頼のコミットメント」が、正体の霧でなく時間の霧として方向iiで自然に実現** ―― 2つの試案の探索がここで合流した。\n\n---\n\n## 4. 仮ルール骨格:「遅信 / Delayed Signal」\n\n- **構造:** 純粋協力(3〜4人)。各自が離れた艦を預かる艦長。規定ターン全艦守り切れば勝利、**1艦でも陥落で全員敗北**(「一番危ない艦」が全員の関心事=遅延の緊張が勝利条件から直接生まれる)。\n- **情報:** 自艦=リアルタイム/**他艦=Nターン前(基本N=2)のスナップショット**/通信・物資・移動もNターン遅延。\n- **脅威(侵蝕):** 発生のみランダム、**成長は決定論的**(規則的拡大)→ 遅延下でも「今ごろここまで広がっているはず」と外挿可能。\n- **手番:** 全員同時(§4-1、盤面が別なので自然)。浄化/強化/送信/移動(他艦支援=数ターンかかり、留守中は自艦が無防備)。\n- **実装:** イベントソーシング基盤で「他艦はNターン前までのイベントだけ配信」。既存のFirebase知見と完全に地続き。**物理では運用不可能=デジタルネイティブ。**\n\n---\n\n## 5. 机上シミュレーション検証\n\n### 2人版(思考の芯の確認)\n**成立した固有の思考:**\n1. **外挿の二層構造:** 規則計算(決定論)+人物推定(「彼女なら初手浄化のはず」)。後者は検証されるたび確度が上がる=**仲間への理解が外挿精度として育つ**(リプレイでのメタ成長)。\n2. **行動の痕跡から読む:** 「強化を積んだ=暇だった=脅威なし」―― 遅延盤面でも相手の手が状況の証言になる(想定外の創発)。\n3. **「まだ見ぬSOSへの先回り」:** 「SOSは来ていないが、来るなら今発たないと遅い」―― 遅延でしか生まれない賭け。\n4. **敗北時刻の計算:** 決定論ゆえ自分の限界が計算でき、SOS発信と遅滞戦術が論理的に組める=計算された綱渡り(§4-1の帰属)。\n\n**懸念:** ①平時が暇(危機密度が薄い) ②外挿が当たりすぎ(不確実性が発生ランダム一本に痩せている) ③2人は下限。\n\n### 3人版(分担の創発)\n**新たに生まれた思考層:**\n1. **危険度ランキング推定** ―― 古い情報同士を突き合わせ「今どこが一番危ないか」を序列化。\n2. **再帰的外挿による暗黙の役割分担** ―― 「彼も同じ計算をするはず」で通信なしに分担が創発(責任分散も重複も、合理性の共有前提が防いだ)。\n3. **二次の情報管理** ―― 「彼はまだ知らないはず」という各人の知識状態の追跡。\n4. **空白を埋める仕事** ―― 救援に行かない人にも「留守艦のカバー」という能動的役割(平時の暇の構造的緩和)。\n\n**§4対策(実装必須):** 全滅後に**各人がその時何を見ていたかを並べる敗北リプレイ** → 戦犯探しを「全員があの霧の中で最善を打った」物語に変換。デジタルならではの§4緩衝。\n\n### 4人版(境界の確認)\n**豊かになったもの:**\n1. 複数危機の同時発生が常態化 → 平時の暇が解消。\n2. **距離構造による認知の自動分業** ―― 環状配置で「両隣は精読・対角は粗読」が合理的に成立、負荷の線形増加を地形が抑えた。**4人成立の最大の理由。**\n3. **救援のリレー(玉突き)** ―― 全員の視界がずれたままの多段協調。成立時のカタルシス最大。\n\n**確認された軋み:**\n1. **対称配置での調整問題** ―― 完全対称の局面では複数均衡が併存し、合理性だけでは分担が決まらない(「両方北へ」の事故が構造的に可能)。艦の状態差などの非対称が対称を破る手がかりになるが、常には無い。→ 対策:事故を「霧の物語」として許容(敗北リプレイが回収)+軽い行き先宣言通信でリカバリー手段を薄く用意。完全防止は霧の意味を消す。\n2. リレー局面の追跡は4人が上限。**5人以上は破綻確実。**\n3. **定型通信の語彙がコアシステム**に昇格(2人では飾り、4人では調整の生命線)。\n\n**人数別の位置づけ:** 2人=入門・思考の芯/3人=バランス最良の標準/**4人=調整の緊張が最大の上級**/5人以上=非推奨。人数で体験が変わるが、劣化でなく**難度の階調**として機能(§1の「対応人数のばらつき」の健全な形)。\n\n---\n\n## 6. 残る調整点(未検証・正直に)\n\n- **N(遅延の深さ):** N=2仮置き。難易度設定化(初級N=1/上級N=3)の余地。\n- **危機密度:** 人数×発生率の釣り合い。少人数ほど暇になりやすい。\n- **霧の濃度:** 外挿が当たりすぎ問題 → 侵蝕成長に分岐(現地でしか分からない要素)を足す。ただし方向iの教訓(濃すぎるとAP)とのさじ加減。\n- **籠城ソリティア防止:** 支援が「時々は絶対に必要」になる仕掛け(単独対処不能な大型発生など)。ここが最大の綱渡り。\n- **定型通信の語彙設計:** 行き先宣言・危険度・対処可否。自由すぎると外部チャット問題、狭すぎると意思疎通の妙が死ぬ。\n- **遅延の距離依存**(近い艦ほど新しい情報):中央=情報ハブの地形的役割を生む拡張候補。まず一律Nで作り、拡張ルール化が安全。\n\n---\n\n## 7. 案Aとの対比が示すもの(この記録の総括)\n\n| | 案A(中止) | 案C→遅信(成立) |\n|---|---|---|\n| 核 | 見なかったことの証明 | 情報の鮮度の資源化 |\n| 死因/勝因 | 核と土台(全面非公開の競争)の情報環境が不一致 | 核が輝く条件を逆算し土台を選び直した |\n| 土台選定 | 魅力(PYL)に引かれて選び、後から不一致が露呈 | 3条件の逆算→候補比較→厳密検証→採用 |\n| 検証の順序 | メカニクスから入り構造(§1)を後回し→競争未定義が露呈 | 構造(協力)を最初に固定 |\n| 教訓の適用 | (この経験が教訓を生んだ) | 案Aの教訓を最初から適用し空転が減った |\n\n**汎用的な教訓(追加分):**\n1. **「核が輝く条件」を先に逆算してから土台を比較すると、選定の空転が激減する。**(案Aは土台を選んでから条件不一致に気づいた)\n2. **「核の魅力と最大の病が同じ場所にある」案は切る**(方向i=案Bと同型)。塞ぐと核が痩せる構造は救えない。\n3. **穴の対策が核を拡張する案は、強い**(遅延通信)。「塞げるか」の上位判定として「塞ぐと豊かになるか」がある。\n4. **机上シミュレーションは人数ごとに別の検証**。人数で創発する思考層(分担・二次情報管理・リレー)と壊れる境界(調整問題・追跡上限)は、回さないと見えない。\n5. **配置・地形が認知負荷を編成する**(環状=両隣精読・対角粗読)。多人数化の負荷は、ルールでなく地形で抑えられることがある。\n6. **合理性の共有は暗黙の調整メカニズムとして機能するが、対称局面と初心者混在で崩れる**。事故を防ぎ切らず「霧の物語」として許容する設計判断もある。\n7. 断念した案の核は消えない ―― **案Aで追った「信頼」が、案Cで時間の霧として結実した**。探索は合流する。\n\n> **総括:** 案Aが「良い核でも土台と噛み合わなければ死ぬ」ことを示したのに対し、\n> 遅信は「土台を条件から選び直せば、同じ方法論で成立まで届く」ことを示した。\n> 2つの記録は対で読むことで、方法論編の実効性の証明になっている。\n> 遅信の骨格は検証済み ―― 次の段階は、§6の調整点を実プロトタイプ(HTML+Firebase)で回すこと。\n\n\n---\n\n# 第3記録 「共犯」第1報 ― 遺跡・入札版の設計\n\n> **【最終状態の注記】** 本記録は「遺跡・入札版が成立に到達した」と判定した時点の記録。\n> **その後のプレイで核(A・B・C)が入っていないことが判明し、深海版への再設計を経て最終的に中止**。\n> 経緯と診断は第4記録を参照。設計の詳細(言い訳システム・修正表・独自性の分析)は本記録が正。\n\n**「実際に遊んで面白くなかった」という最も重い失敗(遅信)から、設計者自身の\"悩んだ瞬間\"を起点に\n再出発した記録。**\n\n---\n\n## 0. この記録の最大の価値\n\n遅信は理論的検証をすべて通過し、実装まで到達したが、**遊んだら面白くなかった。**\n「情報が絞られているだけで、結局は計算。ジレンマが生まれない」という設計者の率直な感想が出発点。\n\nそこから **「あなたが実際に悩んだゲーム体験は何か」** を棚卸しし、\n設計者自身の原体験を核に据え直すことで、成立に至った。\n\n> **最大の教訓:理論的検証を全て通過しても、面白くないことがある。\n> 設計の芯は、理論からではなく「自分が実際に固まった瞬間」から取り出せ。**\n\n---\n\n## 1. 遅信の失敗診断\n\n**症状(設計者の言葉):**\n「情報が絞られているため、とりあえず通信や浄化連打するだけ。自分が侵蝕されておらず、近くに救難信号が出たら移動するだけ。ジレンマが生まれている気がしない」\n「ターン数的に足りそうなら無視、足りなさそうなら助けに行くという判断が単調」\n\n**根本原因:決定論が両刃だった。**\n- 決定論的成長は「外挿できる=読みが効く」土台として設計された\n- **だが計算できるということは、答えが一意に定まるということ**\n- 外挿が「読みの技術」でなく「引き算の作業」になり、行動も一意に決まった\n- **悩みとは、天秤が釣り合っているときにしか生まれない。** 遅信の天秤は片方に錘が乗っていた\n\n**構造的欠陥:**\n- 各艇が独立していて、自艇を守る資源と他艇を助ける行動がトレードオフでない\n- **二つの欲しいものが同じ資源を奪い合っていないと、ジレンマは生まれない**\n- 遅延の「わからなさ」は、人間の心の読めなさでなく**単に情報が古いだけ** ―― 引き算で埋まる\n\n> **教訓:情報を絞る/遅らせること自体は、面白さを保証しない。\n> 絞られた情報の上で、答えの割れる選択を用意できて初めて機能する。**\n\n---\n\n## 2. 原体験の棚卸し ― 設計の芯を見つける\n\n設計者が「悩ましい」と感じたゲーム体験:\n- Hanabi:ヒントを送るべきか、誰に何を送るか\n- Nemesis:目標選択、敵対か協力か\n- デクリプト:どういうヒントを出すか\n- コヨーテ:相手の宣言から自分を推測し、何を宣言するか\n- スカル:相手を紛らわせるため、あえて定石を外すか\n\n**共通項の分析:**\n- 表面的には「情報系」だが、芯は違う\n- **共通するのは「他人の心を読む」こと** ―― 自分の選択の良し悪しが、他人がどう考え動くかに依存し、確定的に計算できない\n- **答えを割っているのは、常に「他者という読み切れない存在」**\n\n**遅信との対比:**\n- 遅信の他艇は「読み切れない他者」でなく「計算で復元できる決定論的な状態」だった\n- 同じ\"わからない\"でも、**質が正反対**\n\n**さらなる絞り込み(設計者の追加証言):**\n- 「受信側と送信側は両方やりたい。強いて言えば受信側」\n- 「協力と敵対が切り替わる/混在する方が好み。**敵か味方か確定していないなら、大枠の動きの方向性が大きく変わるから**」\n- Nemesisの目標選択は「達成しやすさで選んでいただけ」= そこはジレンマになっていなかった\n- **最も固まる瞬間:「自分の敵対的行動を明確に行動に移して、敵であることを今明確にしてよいか否か」**\n\n> **芯の確定:「いつ牙を剥くか」という、正体開示のタイミングの決断。**\n> 早すぎれば奇襲の利を失い、遅すぎれば好機を逃す。\n> 天秤の傾きは「相手が今どれだけ自分を疑っているか」に依存し、計算できない。\n> 全員が同時にこの決断を抱え、互いの牙の予兆を読み合う ―― **送信と受信が一つの決断の中で統合される。**\n\n---\n\n## 3. 土台の選定\n\n**基底構造の選択:** 「共に守る/築くものを裏切る」(信頼の破壊) vs **「元々競争関係だが表向き手を組み、抜け駆けする」(同盟の解消)** → **後者を採用**\n- 打算的な共闘。全員が敵だと分かった上で組む\n- 裏切りに道徳的な重さがなく、乾いた緊張になる(§4-1として健全)\n\n**設計者による2つの必須要件:**\n1. **裏切りまでに、判断材料になる前兆が得られるターンがあること**(前兆なしの不意打ちは運と同じ)\n2. **全員が抜け駆けモードになった後は、速やかにゲームが終わること**(核が尽きたら終わるべき)\n\n**共闘の型:** 相互利益型 vs 共同戦線型 → **相互利益型を採用**\n| | 相互利益 | 共同戦線 |\n|---|---|---|\n| 牙を剥く劇性 | ◎ | △ |\n| 前兆システム | ◎ 準備が両義的 | ✕ 行動が均質化し読めない |\n| 終了の加速 | ✕ 膠着の危険 | ◎ |\n| 核との相性 | ◎ | ✕ |\n→ 共同戦線型は**前兆が作れない=核が死ぬ**(核の魅力と欠陥が同じ場所にある=案B・方向iと同型の危険)\n\n**題材:「建てる」vs「潜る」** → **「潜る」を採用**\n- 建てる:**積み上げる行為と奪う行為が物理的に逆方向** → 両義性が作れない → 核が死ぬ\n- 潜る:「もう一段深く潜る」が**協力の継続とも抜け駆けの準備とも読める** → **両義性が行動に内蔵されている**\n\n**テーマ:崩れゆく遺跡で、盗人たちが略奪する**\n- 「なぜ協力するか」= 一人では持ち上がらない(打算)\n- 「なぜ裏切るか」= 元々仲間ではない(説明不要)\n- 「なぜ急ぐか」= 遺跡が崩れる(時間圧)\n- 「なぜ手を離す言い訳が立つか」=「崩れる、もう無理だ」\n\n---\n\n## 4. 「言い訳」システム(設計者の発案 ― 設計の柱)\n\n> 「裏切る言い訳も用意しておきたい。深海なら酸素の残量が全員バラバラで、『自分は限界だと思ったから浮上した』みたいな」\n\n**言い訳が果たす3つの機能:**\n1. **曖昧さを作り、読みを成立させる** ―― 言い訳がなければ「浮上=裏切り」と確定し、読む必要がない。**確定できる前兆は通知であって読みではない**\n2. **敗北感の緩衝(§4-1)** ―― 裏切られた側が怒りを宙吊りにでき、裏切る側も心理的コストが下がる。**卓の空気を守りながら背信を促進する**\n3. **裏切る側の意思決定を複雑にする** ―― 「言い訳が立つタイミングまで待つ」という駆け引き。**言い訳の有無自体がシグナルの強度になる**\n\n**言い訳が機能する条件:**\n- **推定はできるが確定はできない**(完全公開だと曖昧さが消え、完全非公開だと言い訳が万能になり、やはり読みが死ぬ)\n- **時間とともに正当性が増す**(利得と正当性が逆方向に働く美しいトレードオフ)\n- **事後に検証される**(答え合わせが読みの巧拙を確定させ、学習を成立させる)\n\n---\n\n## 5. 確定した設計:「共犯」\n\n### コンセプト\n崩れゆく遺跡。盗人たちがたまたま居合わせた。互いに仲間ではない。だが重い財宝は一人では運べない ―― だから打算で組む。**全員が、いつ手を離すかだけを考えている。**\n\n### 手番の流れ\n1. **財宝が提示される**(必要力、トークン構成 例:[5][3][2][1])\n2. 全員が**体力を秘密裏に投入し、同時公開**\n3. 合計が**必要力に達すれば成功** → **投入の多い順にトークンをドラフト**(1枚ずつ順に取る)\n4. 達しなければ**失敗**(投入した体力は戻らない)\n5. または **脱出を宣言して離脱**(以降参加不可。崩落が加速)\n\n### 核となる要素\n- **体力の二重性:** 投入にも脱出にも使う。**協力するほど退路が消える**\n- **体力の初期値は秘密:** 「限界だ」が真実か嘘か、推定はできるが確定できない\n- **必要力は人数で割り切れない値**(3人なら10, 11, 13)→ **均等では届かず、誰かが踏み込む必要がある**(安全均衡の排除)\n- **トークンに価値差**([5][3][2][1])→ 「1番手を取るためにいくら出すか」の争い\n- **同数時の裁定:** 体力の少ない者が優先(負のFB。「相手の体力を推定して同数なら勝てるか」という読みも生む)\n\n### ノルマ(秘密)\n- **絶対ノルマ**(「価値12以上を持ち帰る」)― 他人と両立。協力が純粋に得\n- **相対ノルマ**(「他の誰よりも多く」)― 他人と衝突。協力しつつ出し抜く必要がある\n- **どちらを持つかは非公開** → 「こいつは協力しても損しない相手か、出し抜く気か」が最後まで読めない\n- **ノルマは共同運搬なしには達成できない高さ** ← 協力を構造的に強制する\n- **ノルマ未達でも、脱出できれば持ち帰った分が部分点**(最下位の詰み=消化試合を防ぐ)\n\n### 崩落\n- 時間圧。**誰かが脱出を宣言すると加速** → 離脱の連鎖が起き、**霧が晴れると同時にゲームが終わりに向かって雪崩れる**(設計者の要件2を構造的に実現)\n\n### 事後の答え合わせ\n終了時、**体力の真の残量とノルマを公開。**\n「あいつ、まだ体力が9もあったのに『限界だ』と言って抜けたのか」―― **裏切りが確定する瞬間。**\n\n---\n\n## 6. 独自性\n\n**部品はすべて既存**(秘密同時入札、公共財ゲーム、PYL、裏切り者もの)。独自性は**組み合わせから創発した構造**にある。\n\n1. **投入量が「貢献・前兆・言い訳の布石」の三役を同時に担う**\n   - 普通の公共財ゲームでは投入量は単なる貢献度\n   - ここでは**同一の数字が三つの意味を持ち、体力非公開ゆえに判別不能に絡まる**\n   - 「少なく出した」が貢献の失敗か、抜ける前兆か、体力不足か、**誰にも分からない**\n\n2. **体力が、協力への投資と離脱の手段の両方の原資**\n   - 普通の裏切りゲームでは協力と裏切りは別リソースを使う\n   - ここでは**協力すればするほど、逃げられなくなる**\n   - PYLの構造を「協力行為そのもの」に埋め込み、**累積するのは運のリスクでなく\"他人に裏切られるリスク\"**\n\n3. **「手を離す」が、離脱であると同時に攻撃である**\n   - **不作為が攻撃と同一**であり、しかも**攻撃であることを不作為として言い逃れできる**\n\n> **独自性の重心:「協力すること」と「裏切ること」が、同じ一つの資源(体力)と\n> 同じ一つの行為(投入量の決定)の中で、判別不能に重なっている。**\n> 普通のゲームは協力と裏切りを別の行動として用意する(協力ボタンと裏切りボタン)。\n> この設計では**協力の度合いを調整することが、そのまま裏切りの準備であり実行でもある。**\n> 連続的で境界がなく、「今、あいつは裏切ったのか?」が最後まで確定しない。\n\n---\n\n## 7. 机上シミュレーションで実証されたもの\n\n**作動した核:**\n1. **投入量の決断が計算で解けなかった** ―― 他人の出方に完全依存し、他人の体力も見えない\n2. **「協力すると退路が消える」が痛みとして機能** ―― 「5出したら逃げられない」\n3. **出し渋りが判別不能な形で読まれた** ―― 「体力が乏しいのか、抜ける気か、判別できない」\n4. **「誰が余分に出すか」のチキンレース** ―― 均等では届かない必要力が生む緊張\n5. **相対ノルマが敵対を生んだ** ―― 「他人が稼げなくなること」が勝利条件に直結\n\n**予期しなかった創発:**\n- **出し渋りの連鎖の恐怖:** 「私が出し渋れば、他人も『あいつも抜ける気だ』と読み、連鎖的に運搬が失敗する」\n- **言い訳の温存:** 「今、余裕を見せると、後で抜けるときの言い訳を失う」―― 将来の裏切りのために現在の貢献を抑える\n- **妨害の裏目:** 出し渋りによる妨害が、他人が予想以上に出したため失敗し、逆に分配で損をした\n- **同数時の体力推定:** 「相手の体力を推定して、同数なら勝てるか」\n\n---\n\n## 8. 設計過程で発見・修正した致命傷\n\n| # | 発見された問題 | 原因 | 修正 |\n|---|---|---|---|\n| 1 | 大物(巨大閾値)が構造的に不可能 | 参加すると全員の体力が尽き、誰も脱出できない | **大物を廃止。** 必要力にばらつきを持たせる |\n| 2 | 稼ぎすぎると持ち帰れない | 積載コストが重すぎ、勝者が自動的に詰む | 積載を軽量化 |\n| 3 | **言い訳が言い訳でなく真実になった** | 体力が枯渇し、全員が「本当に限界」に | **体力を潤沢化**(2.5倍)。嘘と真実が混ざる帯域へ |\n| 4 | 「一番稼ぐ」勝利条件だと協力が無意味 | 相対評価では「二人とも稼ぐ」に意味がない | **ノルマ制へ** |\n| 5 | 排他ノルマ(同じアイテムの奪い合い)は駆け引きを終わらせる | 衝突判明後は奪い合うだけ | **相対条件**(他人より多く)へ |\n| 6 | **分配が軍拡競争を生む** | 「投入の多い順に取る」だと出しすぎが常に有利 | 超過罰則 → **さらにドラフト方式へ簡素化** |\n| 7 | **安全均衡の存在** | 必要力が割り切れると「全員均等」で誰も損しない | **必要力を割り切れない値に** |\n| 8 | 超過処理・4段階優先順位が複雑すぎ、テーマから乖離 | 分配を精密化しようとして肥大 | **ドラフト方式**で計算を消滅させる |\n| 9 | 「奪い」ルールが意味不明 | ドラフトでは未取得トークンが存在しない | **奪いを廃止**(複数ターン運搬とセットでないと成立しない) |\n| 10 | 最下位が詰み、消化試合化 | ノルマ未達が確定すると動機が消える | **部分点**を導入 |\n\n---\n\n## 9. 汎用的な教訓(この記録から)\n\n1. **理論的検証を全て通過しても、面白くないことがある。** 遅信は体系のチェックリストを全通過したが、遊ぶと単調だった。**机上の検証には限界がある。**\n2. **設計の芯は「自分が実際に固まった瞬間」から取り出せ。** 好きなゲームを列挙し、その中の**どの瞬間**で心臓が動いたかを特定する。「Nemesisが好き」ではなく「敵対を明確化してよいか迷う瞬間」まで降りる。\n3. **「答えが計算で一意に出るもの」はジレンマではない。** 悩みは天秤が釣り合っているときにしか生まれない。**答えを割るのは、読み切れない他者。**\n4. **穴を塞ぐたびに核が死んでいないか、毎回確認せよ。** この設計では10個の致命傷を修正したが、**そのたびに核5項目を再検証した。**\n5. **簡素化は、面白さを削らない。** ドラフト方式への変更で計算が消え、テーマ整合が回復し、**駆け引きはむしろ濃くなった**(トークン価値差)。**複雑なルールは、たいてい設計の失敗を糊塗している。**\n6. **「使われない選択肢」は疑え。** 奪いルールはシミュレーションで一度も使われず、検証したら構造的に成立していなかった。\n7. **安全均衡を探せ。** 「全員がこう動けば誰も損しない」という均衡が存在すると、駆け引きが死ぬ。\n\n\n---\n\n# 第4記録 「共犯」最終報 ― 深海版と中止の診断\n\n**プロトタイプを2つ(遺跡・入札版=第3記録/深海・持ち上げ版=本記録)作り、\n2つとも核が入らずに中止した記録。**\nだが「なぜ入らなかったか」が正確に特定できたため、次に直接活かせる形で残す。\n\n---\n\n## 0. 出発点 ― 設計者の原体験から核を取る\n\n遅信の失敗(「情報を絞っただけで、結局は計算。ジレンマが生まれない」)を受け、\n**設計者自身が実際に固まった瞬間**から核を取り直した。\n\n好きなゲーム(Hanabi / Nemesis / デクリプト / コヨーテ / スカル)を棚卸しし、\n「どの瞬間に心臓が動いたか」まで降ろした結果:\n\n> **「自分の敵対的行動を明確に行動に移して、敵であることを今明確にしてよいか」という瞬間。**\n\nこれを分解すると、核は3要素:\n\n- **A(加害):** 敵対的行動が、相手に明確な損害を与える\n- **B(公然):** それが公然と「敵対」として認識される\n- **C(タイミング):** いつ引き金を引くか、自分で選べる\n\n**A・B・C が揃わなければ、核ではない。** これが以降すべての判定基準になった。\n\n> **手法として有効だった:「好きなゲーム」ではなく「固まった瞬間」まで具体化する。**\n> 「Nemesisが好き」では足りない。「敵対を明確化してよいか迷う瞬間」まで降りて初めて、設計の核になる。\n\n---\n\n## 1. 第1のプロトタイプ:遺跡・入札版\n\n### 構造\n崩れゆく遺跡。盗人3人。財宝を持ち上げるのに必要な力に、各自が体力を秘密裏に投入し同時公開。\n多く出した者から宝をドラフト。**体力は脱出にも要る**(協力するほど退路が消える)。\n秘密の目当て5種(蓄財家/出し抜き/目利き/逃げ足/完遂)。\n\n### 実装で発見・修正した問題(13件)\n大物が構造的に不可能 / 稼ぎすぎると持ち帰れない / 体力枯渇で「言い訳」が真実になってしまう /\n「一番稼ぐ」勝利条件だと協力が無意味 / 分配が軍拡競争を生む / 安全均衡の存在 /\n超過処理が複雑すぎテーマから乖離 / 「奪い」ルールが構造的に成立していない /\n最下位が詰み消化試合化 / 深度メカニクスが未設計だった / 脱出のダウンタイム / 情報漏洩(同数時の順序から体力が漏れる)…\n\n**修正のたびに核(A・B・C)を再検査した。この規律は正しかった。**\n\n### 結果:「一定の面白さ」で頭打ち\n- 投入量の読み合いは成立(**指が止まる瞬間はあった**)\n- 出し渋りが前兆として読まれ、フリーライダーの誘惑がチキンレースを生んだ\n- **だが核が入っていなかった**\n\n### 診断 ―― 設計者の一言が正確だった\n> 「今は、大きな宝は協力して発掘して、バラバラにして、貢献度が高い人から拾い集めるという風に見える」\n\n**この描写に、裏切りが一切登場しない。**\n公正な分配の物語であって、背信の物語ではない。\n\n- **A:** 脱出は「離脱」であって加害ではない。残された者が困るだけ\n- **B:** 脱出は「敵対の表明」に見えない\n- **C:** 「降りるタイミング」であって「牙を剥くタイミング」ではない\n\n> **教訓:核の代用品が面白いと、核が無いことに気づけない。**\n> 「投入量の駆け引き」は確かに面白かった。だからこそ、核の不在が隠れた。\n\n---\n\n## 2. 第2のプロトタイプ:深海・持ち上げ版\n\n### 引き算による再設計\n**A・B・Cに奉仕しない要素を、すべて削除した。**\n体力回復トークン、目玉★、5種の目当て、価値の異なるトークン、ドラフトの巡回、同数時の判定 ―― 全部切った。\n\n### 構造(核だけ)\n沈没船。ダイバー3人。宝石で覆われた箱を持ち上げる。\n- 各自が**込める力(0〜4)を秘密裏に決める。公開されるのは合計だけ**\n- 力を込めると **「込めた力 + 1」の酸素**を失う(★疲労)\n- 酸素は**浮上にも要る** ―― 込めるほど、逃げられなくなる\n- **累積が箱の重さに達すれば持ち上がる。** 宝石は持ち上げた比率で分配\n- **手を離せる。** 持ち上げた分÷2の宝石を毟り、**箱は闇の底へ落ちる**(累積が全損)\n- 箱を掴んだままでは浮上できない。**持ち上げ切るか、手を離すか**\n\n### テーマの完全一致 ―― ここは成功した\n| 抽象 | 深海 |\n|---|---|\n| 体力 | **酸素** |\n| 疲労 | **力むと余分に消費** |\n| 情報の隠蔽 | **濁った水。互いの姿は見えない** |\n| 累積 | **持ち上げた高さ** |\n| 加害 | **手を離す。箱は闇へ落ちる** |\n| 脱出 | **浮上** |\n| 時間切れ | **潮が変わる** |\n| 全損 | **溺死** |\n\n**「酸素」という一語が、それまで曖昧だった「体力とは何か」を解決した。**\n疲労・二重性・秘匿・時間制限のすべてが酸素で説明できる。**§6のテーマ融合としては理想形だった。**\n\n> **手法として有効だった:メカニクスが要求する条件を列挙し、テーマを逆算する。**\n> 7条件(一人では無理/少しずつ/手を離すと全損/一部を持ち去れる/力むと余分に消耗/\n> 消耗すると逃げられない/時間制限)を全て自然に満たすテーマとして深海が導出された。\n\n### シミュレーション上は「成功」していた\n- 持ち上げ成功 54%(綱渡り)\n- **協力 19.9宝石 / 裏切り 19.8宝石 ―― 紙一重**\n- 疲労により、誠実な者の投入も自然に落ちる(4→4→4→3.4→2.2→0.6)\n  → **「苦しいだけだ」が構造的に真実になり、手抜きと区別がつかない**\n- 「頂点で手を離す」サンプルは、設計意図そのものに見えた\n\n### だが、遊んだら失敗していた\n> **「4連打で裏切られてから離すだけ」**\n\n---\n\n## 3. 【最重要】なぜ失敗したか ― 2つの誤り\n\n### 誤り1:「期待値を紙一重にすれば悩ましくなる」は間違い\n\n協力19.9 vs 裏切り19.8。**期待値をほぼ同点にすれば決断が悩ましくなる**と考えた。\n\n**実際には ―― 紙一重 = どちらでもいい = 選択が死ぬ。**\n\n> **正しくは:局面によって、正解が鮮明に入れ替わるべきだった。**\n> 「今は協力が正しい」「今は裏切りが正しい」が状況次第で明確に分かれ、\n> **かつ、今どちらの局面にいるかが読めない**から悩む。\n>\n> **期待値を均衡させることと、選択を悩ましくすることは、まったく別物である。**\n\nこれは遅信の失敗の**裏返し**だった:\n- **遅信:** 答えが計算で一意に出る → 悩まない\n- **共犯:** 答えがどちらでもいい → 悩まない\n- **共通の病:** **選択が意思決定に影響しない**\n\n### 誤り2:「じわじわ抜く」が数値的に不可能だった\n\n設計者の原イメージは「バレないように少しずつ力を抜く」。\n疲労システムはそれを構造的に支えるはずだった。\n\n**だが ―― 抜けば確実に失敗するので、抜けない。**\n\n必要な力(箱の重さ) ÷ 潜行数 が「全員が毎ターン全力」とほぼ等しく設定されていたため、\n**0〜4の選択肢は実質「4」の一択**だった。\n\n> **教訓:「選択肢がある」ことと「選択肢が生きている」ことは違う。**\n> 最適値が一つに固定される数値設計では、選択肢は飾りになる。\n> **余裕(スラック)がなければ、選択は生まれない。**\n\n---\n\n## 4. 失敗の中でも、正しく機能したもの(再利用可能)\n\n1. **原体験からの核の抽出** ―― 「好きなゲーム」ではなく「固まった瞬間」まで降ろす\n2. **A・B・Cによる判定基準** ―― 核を3要素に分解し、追加要素をすべてこれで検査した\n3. **引き算の設計** ―― A・B・Cに奉仕しない要素を全削除した判断は正しかった\n4. **テーマの逆算** ―― メカニクスが要求する条件から深海を導出した手順\n5. **キングメイク回避** ―― 全体攻撃にすれば狙い撃ちできない\n6. **「どっちでもいい」検出器** ―― 設計者がこれを働かせて中止を決めた(遅信の教訓が生きた)\n\n---\n\n## 5. 次に活かす教訓\n\n1. **期待値の均衡 ≠ 悩ましい選択。**\n   均衡させると「どちらでもいい」になる。**局面ごとに正解が鮮明に入れ替わり、\n   かつ今どの局面かが読めない**構造を作れ。\n\n2. **選択肢に余裕(スラック)を持たせよ。**\n   最適値が一つに固定されるなら、その選択肢は飾りである。\n   「最適解が常に同じ」になっていないか、数値設計の段階で必ず検査する。\n\n3. **核の代用品に注意せよ。**\n   面白い代用品があると、核が無いことに気づけない。\n   **「このゲームを一言で説明したら、核が登場するか?」**で検査する。\n   (共犯の説明:「協力して発掘して、貢献度順に拾い集める」← 裏切りが登場しない = 核が無い)\n\n4. **プレイテストは、シミュレーションでは代替できない。**\n   共犯(深海)はシミュレーション上、すべての指標が理想的だった。だが遊ぶと「4連打」。\n   **統計は「何が起きるか」を教えるが、「どう感じるか」は教えない。**\n   → **もっと早い段階で、粗くてもいいから遊ぶべきだった。**\n\n5. **設計者の「なんか変」は、ほぼ常に構造的な問題を指す。**\n   (魔女の調合の知見§8と一致。3回連続で裏付けられた)\n\n---\n\n## 6. 核は、まだ生きている\n\n**A・B・C(加害・公然・タイミング)という核の定義は、失敗していない。**\n失敗したのは、それを実装する**構造**の方だった。\n\n次に挑むなら:\n- **「じわじわ抜く」が数値的に可能な余裕**を、最初から設計に組み込む\n- **期待値を均衡させず、局面依存で正解を鮮明に入れ替える**\n- **早期にプレイテストする**(シミュレーションを信用しすぎない)\n\n> **中止は後退ではない。**\n> 「4連打で裏切られてから離すだけ」と即座に言語化できる設計者がいる限り、\n> 次はもっと早く、もっと正確に、失敗を見つけられる。\n\n---\n\n## 7. 3つの実践記録の総括\n\n| | 案A | 案C(遅信) | 共犯 |\n|---|---|---|---|\n| 核 | 見なかったことの証明 | 情報の鮮度の資源化 | 敵対を明確化するタイミング |\n| 到達点 | 机上で中止 | 実装したが体験が失敗 | 実装2回、どちらも体験が失敗 |\n| 死因 | 核と土台の情報環境が不一致 | **答えが計算で一意に出る** | **答えがどちらでもいい** |\n| 共通の病 | ― | 選択が意思決定に影響しない | 選択が意思決定に影響しない |\n\n> **3本の記録が指し示す、単一の結論:**\n> **「意味のある選択」とは、\"選ぶ余地がある\"ことではなく、\n> \"選び方によって結果が変わり、しかも正解が事前に分からない\"ことである。**\n>\n> 答えが一意でも(遅信)、答えがどちらでもよくても(共犯)、選択は死ぬ。\n> **生きた選択は、その両極の間の、狭い帯にしか存在しない。**\n\n---\n\n# 第5記録 「影の賽」(実装2回・中止)\n\n**詳細は理論編・第4部 §6(掘削記録)に全記録がある。** 本記録は要点のみ。\n\n## 0. 経緯\n\n理論編・第4部で確立した**「影」**(情報の粗い層だけを公開する技法)から、\n**§5-2の行列の空白「サイコロ × 影」** を掘って生まれた案。\n\n**発明そのものは本物だった:**\n> **乱数を「リスク(分布既知・結果未知)」から「曖昧性(分布未知・結果観測可能)」へ変える。**\n> ボードゲーム史上、サイコロは例外なく「分布既知」の装置だった。これを反転させると、\n> **見極めが技術になり、§2-5(実力と運の両立)と§4-1(帰属できる敗北)が同時に解ける。**\n\n## 1. 核(A・B・C)\n\n- **A(曖昧)**:賽の強さは観測からしか推定できない。確定できない\n- **B(希少)**:確保できるのは1人。待てば失う\n- **C(伝播)**:調べる行為が、選好を漏らす ← **これが崩れた**\n\n**一言:「調べれば確信は増す。だが調べれば奪われる。」**\n\n## 2. 死因 ―― 前提が論理的に成り立っていなかった\n\n**設計者の言葉(2回、同じことを言われていた):**\n> 1回目:「同じサイコロを振って執着していることが、強いダイスという風につながってない」\n> 2回目:「ダイスを再度振る事が、その人のダイスに対する評価のシグナルにならない」\n\n**1回目の診断を受け取らず、構造をいじって延命させた。これが最大の失敗。**\n\n**論理的な死因:**\n> **人は、確信できないものを調べる。確信したものは、調べない。**\n> → **「たくさん調べている」= 「判断がつかない」= 「たぶん平凡」**\n> → **探索行動は\"不確実性\"のシグナルであって、\"選好\"のシグナルではない**\n\n**ベイズ更新の論理的帰結であり、パラメータをどう振っても絶対に反転しない。**\n**§6-6で自ら「核と病が同じ場所にあるかもしれない」と警告しておきながら、\nそれを言いくるめて進めた。方法論編の判定に素直に従うべきだった。**\n\n## 3. 【最重要】この失敗が生んだ、汎用原理\n\n> ## **「情報を集める行為」は、選好のシグナルにならない。**\n> ## **選好を信頼できる形で伝えるのは、「コストを払う行為」だけである。**\n\n| 行為 | 何のシグナルか |\n|---|---|\n| 調べる・観測する | **不確実性** |\n| 賭ける・入札する・支払う | **選好** |\n| 麻雀の副露・リーチ | **コミット**(資源を払った/後戻りできない) |\n\n**§3-10で「動的な影」と呼んだものの正体は、実は「コストを払った行為の影」だった。**\n\n## 4. 検証プロセスで得た教訓(独立して価値がある)\n\n1. **NPCが互いを見ていないシミュレーションは、心理戦の核を測れない。**\n   核の3分の1(C=伝播)を実装せずに「核が弱い」と結論しかけた。\n   → **「核が弱い」という結果が出たら、まず「核を実装したか」を疑え**\n2. **得点構造が情報を殺す。** 得点に「稼働期間」を乗せると、\n   時間の価値が情報の価値の**200倍**になり、探索が構造的に敗北する\n3. **影の\"漏れ\"の許容量はほぼゼロ。** 観測結果が少しでも他人に漏れると(leak≥0.15)、\n   タダ乗りが最適になり、誰も探索しなくなる\n4. **「見極めの価値」を決めるのは、選択肢の総数ではなく「余りの数」。**\n   賽の数 ≤ 確保総数 だと、見極めの価値は**ゼロ**になる(全部取られるので選ぶ余地がない)\n\n## 5. 生きているもの(捨てない)\n\n- **サイコロの影**(リスク → 曖昧性) ―― どの土台にも載せられる\n- **取得型の影 / 光源の選択** ―― 概念は有効。ただし「選好のシグナルにはならない」限界が判明\n- **一次の情報 vs 二次の情報** ―― 知識状態が隠れていなければブラフは立たない\n- **シュレディンガーのサイコロ**(保留・理論編§6-16) ―― 「調べた上で手放す」がレモン市場を作り、\n  **影の賽の死因を構造的に突破する可能性がある**\n\n## 6. 5つの記録が指し示すもの(更新)\n\n| | 死因 |\n|---|---|\n| 案A | 核と土台の**情報環境**が不一致 |\n| 遅信 | 答えが**計算で一意**に出る |\n| 共犯 | 答えが**どちらでもいい** |\n| **影の賽** | **核の前提が、論理的に成り立たない** |\n\n> **新しい層の失敗だった。** 遅信・共犯は「選択が意思決定に影響しない」という**バランスの病**だった。\n> 影の賽は **「そもそも、その行動がそのシグナルを持たない」という論理の病**。\n> **バランス調整では絶対に直らない。前提を疑う以外に道はない。**\n>\n> **教訓:核を立てたら、\"その行動が本当にそのシグナルを持つか\"を、**\n> **数値検証の前に、論理として検査せよ。**\n\n---\n\n## 7. 中止後の再探索(終了・次章に記録)\n\n『影の賽』の中止後、**「サイコロの影」という発明は生かしたまま、土台を選び直す**探索を続けた。\n**案Aの教訓「独自性の重心が機能しないなら、土台ごと選び直す」の実践。**\n\n| 案 | 内容 | 状態 |\n|---|---|---|\n| **シュレディンガーのサイコロ**(理論編§6-16) | 出目が全て異なる6面。全面が非公開。振るたびに1面ずつ判明する | **保留** |\n| **フリーサイコロ**(理論編§6-17) | 6面すべて白紙。使った数字が永久に刻まれる。**自由を使うことが、自由を消費すること** | **2026-07 開発中止**(次章・理論編 死因5) |\n\n**フリーサイコロが有望と判断した理由（当時）:**\n> **影の賽の死因(「調べる」は選好のシグナルにならない)を、構造的に回避している。**\n> **「刻む」は不可逆で、自由を消費し、取り消せない ―― コストを払う行為であり、選好を確実に伝える。**\n> **サイコロが「公開された自伝」になる。**\n\n→ この判断は半分正しかった。シグナルの原理は満たしていた。**足りなかったのは感情の側**\n（「緊張を払った決断だけが、後悔を生む」＝ドラマの原理。理論編・死因5）。探索の顛末は次章。\n\n**中止は後退ではなかった:**\n> 影の賽が生んだ原理(**「情報を集める行為は、選好のシグナルにならない。選好を伝えるのはコストを払う行為だけ」**)が、\n> **次の案の生死判定を、設計の最初の5分で可能にした。**\n> ―― 失敗が、次の探索の速度を上げている。\n\n---\n\n## フリーサイコロ探索の記録（2026-07・開発中止）\n\n**時系列:**\n1. 土台比較（エリアマジョリティ vs 共有の注文）。新しい比較軸「決断の帯をどちらが\n   広く保つか」で B（共有の注文）を採用。\n2. モンテカルロ検証：同着が全達成の36%（エッジケースではなくコア）と判明。\n   割当ONE化・重注文化で23%まで低減。同時解決は「白紙の多い方が独占（BLANK規則・\n   刻み反映後に計数）」を採用 ―― 温存の支配化は起きず、内点均衡を形成。\n3. 序盤同着の対策：初期k面配布は用量反応が悪く棄却（1面で効果薄、3面で核が半減）。\n   個人注文（目標側の非対称）が同着9.6%・コア無傷で圧勝。報酬をワイルドトークンに\n   すると得点の競争由来100%・4戦略が22〜29%で拮抗（数値上の最良構成）。\n   → 採用保留とし、骨だけで人間プレイへ。\n4. 骨だけ版プレイ：Q1「指が止まる」YES ―― 後に初回新規性の偽陽性と判明。\n   同着は「不快」（病と認定）。\n5. 可視化版（グリッド・列ハイライト）：反復プレイで中心の決断が空洞と判明。\n   「不可逆はあるが、後悔させる未来が無い」。churn≠drift の発見。\n6. 蘇生試行（1回限り・殺す基準を事前登録）：季節＝需要driftを導入。\n   詰み手番 36→1364→3131 と罰は機械的に成立。**それでも面白くなく、事前登録に従い\n   土台Bを廃棄、核を棚に戻した。** 死因は理論編・死因5を参照。\n\n**この探索が残した資産:**\n- 理論編・死因5（緊張と後悔の原理、シグナル原理との対）\n- プロセス検証知見 §12-5〜12-16（12件の一般知見）\n- dice.html v0.3（動く反例・標本として保存）\n- 個人注文＋ワイルドトークン構成の数値プロファイル（別の競争ゲームに転用可能：\n  ソリティア化ゼロ・柔軟性報酬は硬直戦略の弱点を正確に補填する）\n\n**総括:** ゲームは死んだが、5回の判定すべてが「遊んだ人間の体感」で下され、\n数値は判定を支える側に回った。過去作（シミュレーションの成功を成立と誤認）からの\nプロセス上の前進は確認できた。\n\n---\n\n## 案D〜伝達核v1.0 設計チャット記録（2026-07-17〜18）\n\n案D埋葬から伝達核v1.0のソロフィルタ通過までを1セッションで駆け抜けた記録。\n発生順（案D埋葬が起点）に並べる（元の知見テキストでは列挙順が異なるが、\n起点となった判断を先頭に置く方が経緯を追いやすいため、体裁として並べ替えた）。\n\n**案D「シュレディンガー×ロンデル」**：埋葬確定（2026-07-17）。死因：覗き市場が私的情報\n購入であり読み合いを生まない／ロンデルは装飾。体験目標（エアポーカーの出し抜き）は\n案Dが一度も実装していなかったため、体験目標のみ持ち出して伝達核系譜へ再出発。\n\n**ブラフ核v0**（2026-07-17）：公開有限プール秘匿分割×1枚出し×段階ベット。ソロ下見\n（実プレイ）で埋葬。死因：読みの対象がベット額のみで意味の層が不在（終盤はただの\n確率計算）／チップ＝命が名目だけ。持ち越し部品：ベット額{1,2,3,5}の段階構造のみ。\n成果物：`proto/bluffcore_solo_v0.html`\n\n**伝達核v0.1**（2026-07-17）：写像（順列）の秘匿伝達×形式ヒント×アンカー。ソロ切片\n（実プレイ）で「微妙」。死因：順列秘密の帳簿づけ化・ゼロサム経済の命の軽さ――ブラフ核v0\nと同一死因の再指摘であり、照準の収束と判断して核改訂へ。\n\n**伝達核v1.0 動物軸版**（2026-07-17〜18）：秘密を評価軸1本に変更・燃焼式経済・時間\nドレイントグル。系譜最終改訂として事前宣言の上でソロ切片実プレイ→**通過**。芽：\n①エウレカ・③解読前後のベット変化（＝2大死因に対応する2項目）。未確定：②命の重み\n（対人成分待ち）・④終盤の出し合い（正直NPCでは原理的に薄い）・⑤テンポ、および\nドレイン各速度の快/不快。テーマ第一候補：深海サルベージ（潜水士＝対戦者・酸素＝命、\n船上観測員＝伝達者、無線＝公開ヒント）\n\n**検問記録（不採用2件・理由つき）**：(1) ヒントの私的チャネル化＝不採用。ヒントの\nコストは「敵にも聞こえること」であり、私的化は核の切除（コストゼロの完全情報\nチャネル化・傍受の消滅・並行ソリティア化）。(2) 並び順の完全ランダム化＝不採用。\n順列秘密＝帳簿づけの死因の再来。覚えゲー懸念への治療は核を変えず「カードプール\n量産＋数値印刷（毎試合8枚配布・秘密は有効軸のみ）」で行う（製品段階方針として採用）。\n\n**フリーサイコロ（Foundation B）**：正式埋葬。経緯の詳細は本記録集内の既存節\n「フリーサイコロ探索の記録（2026-07・開発中止）」（前節）を参照。\n\n---\n\n## 『こたえあわせ（仮）』一発ネタ本番の記録（2026-07-22・開発終了）\n\n身内限定・一回性の余興として実施し、完遂した。次回以降このコードを土台にする予定はない\n（v0.9をもって開発終了。詳細は`proto/kotaeawase/`配下の各版報告書、および棚上げ記録は\nプロセス検証知見側を参照）。ここには**核（気づき）の予測と実測のズレ**のみを記録する。\n\n**一回性の核（気づき）は、単発とは限らない。**\n\n「プレイヤーの気づき」を核に据えた設計は、各人につき一生に一度しか発火しないため、被験者は\n使い捨てになり、反復テストのプロトコルが適用できない（「3戦以上」型の検証設計が原理的に\n使えない）。\n\ndesign chatの事前予測は「1問目で発火し、以後は単調減衰する一発芸（死体A）」だった。\n**実測ではこの予測が部分的に外れた：** 2〜3問目に、1問目とは別種の（構造そのものへの）\n気づきが発生した（具体的な観察内容は理論編§3-4を参照）。\n\n**設計レバーとしての示唆：** 気づき型の核は、気づきを多層に仕込むことで階段にできる可能性が\nある。1段目＝ゲームの意味への気づき、2段目＝構造・メタルールへの気づき、という層構造。\nただし各段が理論編§3-4(b)（仮説空間の縮退）を招かないかは別途検証を要する。\n\n**外れた予測として記録する**（§12-14「外れた予測も記録する」の運用）：死体A（単発一発芸）\nという予測そのものが誤りだったとは断定しない。2段目の気づき以降も体験が持続したかは\n未確認であり、n=1・事前登録なしのため、本項は「予測が外れる余地がある」という事実の\n記録にとどめる。\n\n### 開発終了とv0.10の棚上げ（2026-07-23）\n\n『こたえあわせ（仮）』は**v0.9をもって開発終了**とする。本番セッションは実施済み\n（2026-07-22・一発ネタ・完遂）。\n\n実プレイで報告された欠陥2件は、**修正せず棚上げ**とする：\n1. 他プレイヤーの入力完了で、自分の未確定入力がリセットされる（死因は本記録集\n   前節「リモート状態更新は、ローカルの未確定入力を所有してはならない」＝\n   実装技術知見§5-1dを参照）\n2. 他プレイヤーの入力完了状況が見えない\n\n**棚上げの理由：** 一発ネタとして本番が完了しており、このコードを次回以降の土台にする\n予定がないため。知見（実装技術知見§5-1d）のみを資産として回収した。\n\n**`指示書_こたえあわせ_v0_10_入力破壊修正_v1_2026-07-23.md` は発行したが、引き渡していない。**\n§14-5「指示書の引き渡し確認 ―― 発行済みと受領済みは別」に従い、記録上も**未引き渡し**として扱う。\n"}, {"id": "ボードゲーム制作_プロセス検証知見_md", "file": "ボードゲーム制作_プロセス検証知見.md", "title": "プロセス検証", "sub": "設計・検証・秘匿・ルール説明", "icon": "🔬", "md": "# ボードゲーム制作 プロセス・検証知見(プロジェクト横断)\r\n\r\n設計プロセス・テーマ選定・シミュレーション検証・秘匿情報設計・ルール説明など、\r\n**「ゲームを設計・検証するときに使う」知見**をプロジェクト横断で統合したもの。\r\n実装(Firebase/UI/コード)は「実装技術知見」、理論は「理論編」、個別案の記録は「実践記録集」を参照。\r\n\r\n対象プロジェクト:\r\n- **第1作**『針の上の女神たち』(3〜4人協力・中止) … 根本原因分析は§10\r\n- **第2作**『握るか、逃げるか』(ミームコイン共犯者ゲーム)\r\n- **第3作**『魔女の調合』(3〜4人協力・無言・カット&チューズ・現行)\r\n\r\n統合元: 旧「ボードゲーム設計_知見まとめ」§1 / 「ボードゲーム制作_総合知見まとめ」 /\r\n「balance_of_the_world_postmortem」 / 「rules_explanation_lessons」 / 「秘匿協力ゲーム設計_実践知見」§1〜4・7・8\r\n\r\n<!-- TOC -->\r\n## 目次\r\n\r\n- [1. 使用モデルの選び分け(Claude)](#1-使用モデルの選び分けclaude)\r\n- [2. 設計プロセスの原則](#2-設計プロセスの原則)\r\n  - [2-3. 【最重要】「完成した」と思った時点が、最も危険](#2-3-最重要完成したと思った時点が最も危険)\r\n- [3. テーマ選定](#3-テーマ選定)\r\n  - [判断基準として機能したもの（第2作6章）](#判断基準として機能したもの第2作6章)\r\n  - [見落としていたテーマ選定の注意点（今回発覚）](#見落としていたテーマ選定の注意点今回発覚)\r\n- [4. シミュレーション駆動開発と検証手法](#4-シミュレーション駆動開発と検証手法)\r\n  - [4-1. シミュレーション駆動開発(第1作・第2作)](#4-1-シミュレーション駆動開発第1作第2作)\r\n  - [4-2. 検証手法の型（第3作）](#4-2-検証手法の型第3作)\r\n  - [【最重要】NPCが互いを見ていないシミュレーションは、心理戦の核を測れない](#最重要npcが互いを見ていないシミュレーションは心理戦の核を測れない)\r\n  - [【最重要】シミュ結果の楽観的再解釈は禁じ手（第4作・2026-07）](#最重要シミュ結果の楽観的再解釈は禁じ手第4作2026-07)\r\n  - [【追加知見】推定精度と勝利利益の間を分解する（第4作・2026-07）](#追加知見推定精度と勝利利益の間を分解する第4作2026-07)\r\n  - [4-3. NPC・シミュレーションで検証できる範囲の限界](#4-3-npcシミュレーションで検証できる範囲の限界)\r\n- [5. 【最重要】秘匿情報は「点数」から逆算される ― 見落としやすい構造的リーク](#5-最重要秘匿情報は点数から逆算される--見落としやすい構造的リーク)\r\n  - [発見した問題](#発見した問題)\r\n  - [対策として効かなかったもの（重要）](#対策として効かなかったもの重要)\r\n  - [効いた対策](#効いた対策)\r\n  - [副次的発見：選択行動そのものが強い情報](#副次的発見選択行動そのものが強い情報)\r\n  - [【重要】「
