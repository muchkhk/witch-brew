」の単位定義を含める](#15-10-事前登録文書には1試行の単位定義を含める)\r\n  - [15-11. 検証は「必要条件の階段」として設計する——手前のPassは次の段を保証しない](#15-11-検証は必要条件の階段として設計する手前のpassは次の段を保証しない)\r\n- [16. ソロ切片運用実績 ―― ブラフ核/伝達核系譜（2026-07）](#16-ソロ切片運用実績--ブラフ核伝達核系譜2026-07)\r\n  - [16-1. ソロ切片＝ネガティブフィルタの初運用実績](#16-1-ソロ切片ネガティブフィルタの初運用実績)\r\n  - [16-2. 検証範囲の事前宣言](#16-2-検証範囲の事前宣言)\r\n  - [16-3. 系譜最終改訂の事前宣言](#16-3-系譜最終改訂の事前宣言)\r\n  - [16-4. 判断種別の記録](#16-4-判断種別の記録)\r\n- [17. 候補6ライン開始前埋葬(2026-07)からのプロセス知見](#17-候補6ライン開始前埋葬2026-07からのプロセス知見)\r\n  - [17-1. 凍結済みと参照可能は別](#17-1-凍結済みと参照可能は別)\r\n  - [17-2. 中心動詞は宣言ではなく従属関係で判定する](#17-2-中心動詞は宣言ではなく従属関係で判定する)\r\n  - [17-3. 凍結順序は情報先行設計の物証になる](#17-3-凍結順序は情報先行設計の物証になる)\r\n  - [17-4. 実行側の停止が、判断側の欠陥を検出した](#17-4-実行側の停止が判断側の欠陥を検出した)\r\n  - [17-5. 開始前埋葬は最も安い埋葬である](#17-5-開始前埋葬は最も安い埋葬である)\r\n- [18. プロセス規律は、作品の目的階級に比例させる](#18-プロセス規律は作品の目的階級に比例させる)\r\n\r\n<!-- /TOC -->\r\n\r\n---\r\n\r\n## 1. 使用モデルの選び分け(Claude)\r\n\r\n現在のラインナップ(上位から):Fable 5 / Opus 4.8 / Sonnet 5 / Haiku 4.5。\r\n\r\n- **コーディング・スクリプト作業**(カード画像処理、Claude Code でのツール作りなど)\r\n  → 常用は **Sonnet 5**(バランス・コスト良)、詰まったら **Opus 4.8** に上げる。\r\n- **ルール設計・アイデア出し(創作寄り)**\r\n  → 主軸は **Opus 4.8**(深い推論でルールの穴やエッジケースを潰すのに向く)。\r\n  - 軽い発散ブレスト(案を数出す)は **Sonnet 5** で十分。\r\n  - 大規模ゲームを一貫設計する長丁場フェーズだけ **Fable 5** を検討(価格は Opus の倍)。\r\n\r\n**目安:** コーディングは Sonnet 5 主軸 / 設計・創作は Opus 4.8 主軸。\r\n\r\n---\r\n\r\n## 2. 設計プロセスの原則\r\n\r\n#### 対処1. 相談・設計プロセスの流れ(第1作・第2作)\r\n\r\n#### うまくいったこと\r\n\r\n- **「面白いゲーム作成が第一条件」という前提を、毎回の判断基準に戻す**：数値調整や機能追加に没頭しかけたとき、「これは本当に面白さに寄与しているか」と定期的に立ち返ることで、対症療法の積み重ねに気づけた（第2作19章）\r\n- **懸念点はこちらから積極的に提案する**：ユーザーから明示的に聞かれる前に、「プレイヤー感情面で問題になりそうな箇所」を洗い出して提示したことで、早期に4つの懸念（行動の手応え・不公平感・理不尽さ・同調圧力）を発見できた\r\n- **「保留にした論点ほど、実は核心に近い」（第1作の教訓）を、第2作でも意識する**：買い戻し・監査対応の要否など、一度「後回しでいい」と思った論点を早めに深掘りしたことで、致命的な誤り（監査対応を対症療法と誤分類していた等）を早期発見できた\r\n- **感覚で判断せず、必ず確認してから決める**という姿勢を徹底：「対症療法だろう」という当初の仕分けが、実際にシミュレーションしたら間違っていた（監査対応は核だった）というケースが複数回発生した。**推測と検証を分けて扱う**ことの重要性が繰り返し実証された\r\n\r\n#### 苦労したこと・次回の改善点\r\n\r\n- **対症療法の連鎖に気づくのが遅れがちだった**：懸念1つずつには妥当な対応でも、積み重なるとシステムが複雑化し、「そもそも何が問題か」の診断が難しくなる（第1作の教訓そのものが第2作でも再現しかけた）。**次回は、機能を1つ追加するたびに「これは核か、対症療法か」を都度分類し、対症療法が3つ以上溜まった時点で棚卸しのタイミングを強制的に設ける**とよい\r\n- **NPCソロテストの限界に気づくまでに時間がかかった**：機械的なNPCでは、このゲームの核（人間同士の疑心暗鬼）を検証できないことに、実際に何度もプレイしてから気づいた。**次回は、ゲームの核が「人間の心理戦」に依存する設計である場合、NPCテストは「バランス崩壊のチェック」用と割り切り、「面白いかどうか」の判断には使わないと最初から明言しておく**とよい\r\n\r\n#### 対処2. 設計プロセスの教訓（メタ・第3作『魔女の調合』）\r\n\r\n#### 「ユーザーの違和感」は正確なことが多い\r\nこのセッションでフィードバックとして挙がった懸念は、**ほぼ全て検証で裏付けられた**：\r\n- 「点数から逆算できてしまう」→ 実測で6R後8通りまで絞られると判明\r\n  > 【注記 2026-07-15】この「8通り」は現行実装（V3プール）では再現しない。リバランス前の旧プールに\r\n  > 対する値だった可能性が高い。現行実装での再計算値と検証手法は\r\n  > `sim/witch_privacy/魔女の調合_秘匿性数値再現_結果.md` を参照。定性的結論（チーム合計のみの公開は\r\n  > 個人点全公開より秘匿性が高い）は現行実装でも支持される。\r\n- 「2個以上はほぼ発生しない？」→ 達成可能率44%（死に札）と判明\r\n- 「合図トークンは難易度を下げるのでは？」→ その通り（情報が増える＝簡単になる）\r\n- 「1回だけなら使用圧力になるのでは？」→ その通り（偽の選択肢化）\r\n- 「三巡は長すぎないか」→ 後半は情報が飽和して作業化する\r\n\r\n> **プレイヤーの「なんか変」は、たいてい構造的な問題を指している。**\r\n> 感覚を軽視せず、数値で検証する。そして多くの場合、感覚が正しい。\r\n\r\n#### 対策を決める前に、必ず測る\r\n「点数を揃えれば逆算を防げるのでは」という直感的対策は、**測ったらほぼ無効だった**（82.6%→81.6%）。\r\n測らずに実装していたら、無駄な作業＋問題は未解決のままだった。\r\n\r\n> **原則：直感的な対策ほど、実装前に測る。**\r\n\r\n#### 穴が塞げない設計は、土台ごと捨てる勇気\r\n「毒味役」は、穴を塞ぐ改造を重ねるほど元のフレーバーから離れ、別物になっていった。\r\nこれは**核が土台と噛み合っていないサイン**。改造を重ねるより、土台ごと選び直す方が早い。\r\n（実践記録集・第1記録「独自性の重心が機能しないなら土台ごと選び直す」の実践）\r\n\r\n#### 対処3. プロセス知見の追記(第1作の振り返り・第2作の運用から)\r\n\r\n- **プレイテストのフィードバックは、表面的な要望だけでなく「なぜそう感じたか」を深掘りする**。第1作では情報公開まわりのフィードバックに対症療法を重ねてしまった(§10参照)\r\n- **「そもそもこのゲームの核となる楽しさは何か」に立ち返るタイミングを、早く・意識的に設ける**。UI・バランス調整に意識が向くと根本設計の疑問が後回しになる\r\n- **「保留にした論点ほど、実は核心に近い」**(第1作で判明、第2作でも意識して早期深掘りが機能した)\r\n- **フル機能版とMVP(最小構成)版を並行して持つのは有効**。「対症療法を抜いた版」を別ファイルで維持すると、どの要素が本当に必要かを独立検証できる(第2作)\r\n\r\n---\r\n\r\n### 2-3. 【最重要】「完成した」と思った時点が、最も危険\r\n\r\n第3作『魔女の調合』で、**「これで完成」と思った後に出たフィードバックが、最も価値が高かった。**\r\nそして、**どれも自分では絶対に気づけないものだった:**\r\n\r\n| 報告された言葉 | 実際に起きていたこと |\r\n|---|---|\r\n| 「工房の記録が、始まる魔女がバラバラで見づらい」 | 帯の並び順で表示していたため、儀式ごとに左端が変わっていた。**作った本人は仕様を知っているので違和感がない** |\r\n| 「遊び方のスクロールが、全員で同期してる」 | 同期などしていない。**再描画でスクロールが先頭に戻っていた。開発中は一人なので再描画が起きず、気づけない** |\r\n| 「上級モードがマルチに実装されてない」 | ソロでテストして満足し、**オンライン側の配線を忘れていた**（記憶が「実装した」で上書きされる） |\r\n\r\n**共通点：どれも「作った本人の視点」では見えない。**\r\n- 本人は**仕様を知っている**ので、分かりにくさに気づかない\r\n- 本人は**一人でテストする**ので、マルチ特有の問題に気づかない\r\n- 本人は**「実装した」記憶がある**ので、配線漏れに気づかない\r\n\r\n> **教訓：「完成した」と思った時点が、最も危険。必ず他人に触ってもらう。**\r\n> **そしてフィードバックは「機能の不足」ではなく「体験の違和感」の形で来る。**\r\n> **「見づらい」「同期してる」といった曖昧な言葉の裏に、構造的な問題が隠れている。**\r\n\r\n---\r\n\r\n## 3. テーマ選定\r\n\r\n### 判断基準として機能したもの（第2作6章）\r\n\r\n1. **既存メカニクスへの説得力**：ミームコインは「誰かが売った」という事実が、ルールを追加発明せずとも全員に見える（ブロックチェーンの透明性）という、メカニクスとの必然性があった\r\n2. **語彙の流用可能性**：ダイヤモンドハンズ・ペーパーハンズ・ムーンといった、既存のネットカルチャー語彙がそのままゲーム用語として使えた\r\n3. **現実の事例による裏付け**：実際のラグプル事例（少人数の同時多発的な抜け駆けが全体を崩壊させる）が、独自性の核（bank run型の負の連鎖）を裏付けていた\r\n\r\n### 見落としていたテーマ選定の注意点（今回発覚）\r\n\r\n- **タイトルと内部テーマは分けて考えられる**：「ミームコイン」は内部の設定として説得力があるが、タイトルの認知度としては「仮想通貨」の方が広い。内部設定を変えずに、タイトルだけ既存のネット文化用語（例：「ダイヤモンドハンズ」）に寄せる、という折衷案が有効だった（ゲームの本質を変えずタイトルだけ変えるのは、途中からでも低コストで実施できる）\r\n- **メカニクスの現実性を安易に一般化しない**：「仮想通貨」全般に広げると、ラグプル（少数運営による崩壊）というメカニクスの説得力が失われる。**ビットコインのような大規模資産では起きない現象を核に据えている場合、テーマを安易に一般化・拡張しないこと**\r\n\r\n---\r\n\r\n## 4. シミュレーション駆動開発と検証手法\r\n\r\n**ゲームロジックを本体から抽出し、モンテカルロ試行でバランス調整する手法は、全作を通じて最も価値のあった開発フロー。**\r\n感覚で数値を決めず、大量試行して分布を確認する。\r\n> **言語は問わない。この開発環境（Windows / Node.js 未インストール / Python 3.10）では Python で行う。**\r\n> 過去の記録で「Node.js で」とあるのは当時の実行環境の記述であって、手法の要件ではない。\r\n\r\n加えて第1作では、jsdom上でReactコンポーネントを実際に操作するシナリオテストを都度作成しながら改修したことで、\r\n大規模変更でも既存機能の破壊に早く気づけた（これも当時の環境依存の一例）。\r\n\r\n### 4-1. シミュレーション駆動開発(第1作・第2作)\r\n\r\n#### シミュレーション駆動開発の有効性（第1作・第2作共通の最重要教訓）\r\n\r\n- **実際のゲームロジックを本体から抽出し、モンテカルロ試行でバランス調整する手法は、両作を通じて最も価値のあった開発フロー**（言語は問わない。現環境では Python で行う）。感覚で数値を決めず、大量試行して分布を確認する習慣は継続すべき\r\n- **「対称的な仕分け（核 vs 対症療法）」は、机上の推論だけでは間違えることがある**：監査対応を対症療法と分類していたが、実際に外して検証したらムーン到達率が2〜8%まで崩壊した（第2作22章）。**「これは削れるはずだ」という仮説は、必ず実際に削って検証してから確定する**\r\n\r\n#### 個人合理性 vs 集団最適のギャップを可視化する手法（第2作23〜24章）\r\n\r\n- 通常の「平均獲得額」比較だけでなく、**「1位のみ勝者」形式での勝率集計**（第23章）と、**「全員が同じ戦略を取ったらどうなるか」という集団合計比較**（第24章）という、2つの追加的な分析軸が非常に有効だった\r\n- 特に後者は、**「全員が協力すれば1人あたり435、個人が合理的に振る舞うと250〜320」という、Stag Hunt構造の存在を初めて数値で実証**できた。**核となるゲーム理論的構造を謳う設計の場合、通常の期待値分析に加えて「全員同一戦略」の集団合計比較を行うと、狙った構造が本当に機能しているかを検証できる**\r\n\r\n#### ゲームバランス上の発見・注意点\r\n\r\n- **危険度・確率・割引などの数値は、できる限り同じ基数（今回は5と10）に統一すると、覚える計算式が減り認知負荷が下がる**（第2作21章）。「危険度帯の番号÷5」と「ほころび値÷5」のように、同じ構造の式を使い回せると理想的\r\n- **ペース配分（何ラウンド目にどんな緊張感になるか）は、バランス（勝率・到達率）とは別に検証が必要**：カードの平均上昇量だけでバランスを取っても、「危険水域に到達するのは平均何ラウンド目か」を別途計測しないと、序盤が間延びする問題に気づけない（今回発覚、未解決のまま次回作へ持ち越し）\r\n- **個人的な合理性から見て「割に合わない」行動（監査対応など）は、実際のプレイでは選ばれなくなるリスクがある**。集団のために設計した行動は、それが個人の得にもなる条件（今回は「長期戦を狙う人にとっての防衛的投資」）を明示的に用意しないと、機能しない可能性が高い\r\n- **プレイヤー感情と離脱問題について注意しておく\r\n\r\n### 4-2. 検証手法の型（第3作）\r\n\r\n#### ヘッドレスでゲームロジックを検証する\r\nHTML+JSの単一ファイルでも、ロジックだけ抽出して検証できる（下の例は当時 Node.js で実施したもの。\r\n現環境では Python で `<script>` を抜き出して同等の検証を行う。手法は言語に依存しない）：\r\n```javascript\r\n// <script>タグの中身を抽出\r\nconst s = html.match(/<script>([\\s\\S]*?)<\\/script>/g)[i].replace(/<\\/?script>/g,'');\r\n// DOM/Firebase/Audio をスタブ化\r\nglobal.document = { getElementById: () => ({value:'3'}), addEventListener: ()=>{} };\r\nglobal.firebase = ...; global.ac = ()=>null; global.SFX = {cut(){},...};\r\n// eval して通しゲームを回す（テストコードを連結して同一スコープで実行）\r\neval(logicPart + testCode);\r\n```\r\nこれで「6ラウンド完走するか」「評価が0-100に収まるか」「実際≤理論値か」を自動検証できた。\r\n**実際にこの方法で、phaseを戻し忘れて儀式が進まないバグを発見した。**\r\n\r\n#### 「指標が正しいこと」自体を検証する\r\n新しい評価指標（切り方の質）を作ったとき、\r\n**「切り方の質 ≥ 実際の達成度」が常に成立すること**を検証した\r\n（最適選択を仮定するので、数学的に必ず実際以上になるはず）。\r\n**指標の定義が正しいことの裏付けになる。**\r\n\r\n> **原則：評価指標を作ったら、その指標が満たすべき数学的性質を検証する。**\r\n\r\n#### バランス検証の基本セット\r\n1. **達成可能率**（全合法手を尽くした場合の達成率）＝ 死に札検出\r\n2. **NPC冴え**（合理的プレイでの理論値到達率）＝ 難易度測定\r\n3. **読みの価値**（情報を知る場合と知らない場合の差）＝ 核が生きているか\r\n4. **候補絞り込み**（N回観測後に秘匿情報が何通りに絞れるか）＝ 秘匿の強度\r\n5. **配布の健全性**（矛盾する条件が同一人物に配られないか）\r\n\r\n#### 【原則】数値を記録するときは、算出根拠への参照を必ず添える（第3作・2026-07の実例）\r\n\r\n**知見MDに数値を書くときは、算出スクリプト・実行ログ・前提条件（プール定義・シード・プレイ人数等）\r\nへの参照を必ず添える。根拠参照のない数値は、実装のリバランス後に静かに嘘になる。**\r\n\r\n**反例（実際に起きたこと）：** 第3作『魔女の調合』の秘匿性リーク数値（個人点全公開＝約7通り／\r\nチーム合計のみ公開＝約438通り／選択行動のみ＝816→35通り 等、§5参照）は、プローズとしてのみ\r\n複数の知見MDに記録されていた。算出スクリプト・実行ログ・当時のプール定義への参照はどこにも\r\n残っておらず、Zenn記事執筆前の2026-07-15に現行実装（V3プール）で再検証したところ、\r\n**中核数値がひとつも再現しなかった**（うち1つは大小関係が逆転していた）。当時どのプール・\r\nどの行動モデルで測定したのか、リポジトリのどこからも復元できなかった。定性的な結論\r\n（チーム合計のみの公開は個人点全公開より秘匿性が高い）は再検証でも支持されたため設計判断そのものは\r\n覆らなかったが、具体的な数値はすべて「要再検証」の注記付きで残すことになった\r\n（`sim/witch_privacy/魔女の調合_秘匿性数値再現_結果.md`）。\r\n\r\n> **運用ルール：バランス調整（プール・得点体系の変更）を行ったら、それ以前の秘匿性・バランスに\r\n> 関する数値はすべて「要再計算」とみなす。** 数値そのものは削除せず、注記を添えて残す\r\n> （当時の記録としての価値は失われないが、現行実装の根拠としては扱わない）。\r\n\r\n### 【最重要】NPCが互いを見ていないシミュレーションは、心理戦の核を測れない\r\n\r\n第4作の設計中に実際に踏んだ罠。**核が「他人の行動を読む」ことに依存しているのに、NPCが互いを一切観測しない実装のまま検証し、「核が弱い」と誤った結論を出しかけた。**\r\n\r\n- 測っていたもの：「一人で遊んだとき、その行動は得点を上げるか」＝**ソリティアの情報価値**（+10.8%＝弱い）\r\n- 核が実際にある場所：「**あいつがそれを調べている。先に奪うか**」＝**プレイヤー間の読み合い**\r\n- 横取りNPCを実装した瞬間、核は明確に立った（掘らない＝損／浅く掘る＝最良／深く掘る＝奪われる）\r\n\r\n> **原則：「核が弱い」という検証結果が出たら、まず「核を実装したか」を疑う。**\r\n> NPCの戦略が他プレイヤーの行動を参照していないなら、そのシミュレーションは核を測っていない。\r\n\r\n**チェック項目：**\r\n- [ ] NPCの意思決定関数は、**他プレイヤーの行動履歴を引数に取っているか？**\r\n- [ ] 核が「読み合い」なら、**読む側のNPC（横取り屋・便乗者・裏切り者）を必ず実装したか？**\r\n- [ ] シミュレーションの結論が「核が弱い」なら、実装漏れを疑ってから設計を疑う\r\n\r\n### 【最重要】シミュ結果の楽観的再解釈は禁じ手（第4作・2026-07）\r\n\r\n第4作で実際に踏んだ罠。**「追随すると負ける」というシミュ結果を「追随は罠 ―― これがそのまま学習曲線になる」と再解釈した。これは、核の死の兆候を励ましに変換した誤りだった。**\r\n\r\n影の競りの核は「他者の入札・降り値からの推論(読み)」。その核にとって\r\n「他人の入札に乗ると負ける」という数値は、本来 **「読みが均衡上報われていない」という警報**だった。\r\nそれを「設計上の美点」と読み替えたため、プレイテスト(2026-07「情報を得るメリットがない」)まで発見が遅れた。\r\n\r\n> **原則：核と矛盾する数値が出たら、核の否定候補として扱う。**\r\n> 手順は固定する：\r\n> 1. まず**「核を正しく実装したか」を検証する**（上の原則。読み手そのものを実装して測る）\r\n> 2. 実装が正しいと確認できたら、**数値を「核の否定候補」として設計側に差し戻す**\r\n> 3. 「良い兆候に読み替えられないか」を考えるのは、1と2の**後**でしか許されない\r\n\r\n2026-07 の検証シミュで手順1を実施（ベイズ推論の読み手を実装。レンズ特定99%・総額推定誤差-17〜24%を確認）した上で、\r\nそれでも勝率が盲目戦略と有意差なしであることを確認した。**「学習曲線」ではなく、核の構造的な不成立だった。**\r\nなお、当初のシミュは「素朴な追随が負ける」ことしか検証しておらず、\r\n核の中心原理（降り値からのベイズ推論）は未実装のまま核を評価していた ―― 上の原則の再演でもある。\r\n\r\n### 【追加知見】推定精度と勝利利益の間を分解する（第4作・2026-07）\r\n\r\n情報非対称の競りでは、**追加情報が真の価値の推定精度を上げても、その価値が入札価格へ吸収され、勝利利益へ変換されないことがある。**\r\n\r\n第4作で観測位置を公開すると、位置を区別する読みの推定誤差は改善した。しかし、良い石を追うために上限と支払額が上がり、資金を早く消費し、後続機会を失った。情報利用者が増えるほど平均価格と過払い率も上がった。一方、早い降りや低い上限という負のシグナルは、悪い石の回避と資金温存へつながる可能性が残った。\r\n\r\n> **原則：「情報が増えた」ことと「読みが報われた」ことを同一視しない。**\r\n>\r\n> 検証は次の層を分ける：\r\n> 1. 真の価値に対する推定精度\r\n> 2. 入札上限と落札・回避への変換\r\n> 3. 落札時の局所利益と価格吸収\r\n> 4. 資金消費による後続機会費用\r\n> 5. 最終得点と勝率\r\n\r\n正のシグナルは追随・価格上昇・資金消費を起こしやすく、負のシグナルは損失回避に働きやすい。さらに、情報が全員へ共有される場合、個人の情報優位ではなく市場価格へ吸収される。したがって、情報利用者の人数を変えた市場効果も別に測る。\r\n\r\nシミュレーションでこの経路を検出しても、プレイヤー本人が「正しく降りた」と認識し、満足や再戦動機を得るかは判定できない。システム上の成功、本人の具体的説明、両方が成立する強い成功を分け、人間テストで確認する。\r\n\r\n### 4-3. NPC・シミュレーションで検証できる範囲の限界\r\n\r\n- **「バランスが崩れていないか」「集団最適と個人合理のギャップが存在するか」はシミュレーションで検証できるが、「それが面白いと感じられるか」は原理的に人間でしか判定できない**(第2作・共犯で繰り返し実証。統計は「何が起きるか」を教えるが「どう感じるか」は教えない)\r\n- **ゲームの核が「人間同士の心理戦」に依存する場合、NPCテストは「バランス崩壊のチェック」用と割り切り、「面白いか」の判断には使わないと最初から明言しておく**\r\n- 「これはゲームではなく教育装置では」という感想への結論: **人間同士の信頼・裏切りの可視化だけを主役にしたゲームには評価されている前例が複数ある**(Diplomacy、人狼、Secret Hitler)。NPCで感じた単調さは、設計の欠陥ではなく「人間の駆け引きが本質的な核」であることの証拠でありうる\r\n\r\n---\r\n\r\n## 5. 【最重要】秘匿情報は「点数」から逆算される ― 見落としやすい構造的リーク\r\n\r\n> **【理論編との接続】** 本章・§6・§7で扱う「何を、どの粗さで公開するか」という論点は、\r\n> すべて理論編・第4部§3で **「影」**(情報の粗い層だけを公開する技法)として一般化されている。\r\n> 影の**解像度・方向・等価交換**という3軸と判定チェックリストは、そちらを参照のこと。\r\n> 本章は、その「解像度」を実測した記録にあたる。\r\n\r\n### 発見した問題\r\n「各自の隠れた好みを読み合う」ゲームで、**毎ラウンド個人の得点を正確に公開すると、数ラウンドで好みが特定される**。\r\n盤面（何を受け取ったか）と得点を照合すれば、「どの条件が発火したか」が方程式的に解けるため。\r\n\r\n実測（好み3枚を18枚プールから引く＝816通りから開始、3人・6ラウンド）：\r\n\r\n| 公開方式 | 6R後の候補数 | 判定 |\r\n|---|---|---|\r\n| 個人点を全公開 | 約7通り | ほぼ特定＝秘匿が崩壊 |\r\n| 発火した「個数」のみ公開 | 約2通り | ほぼ特定（後述） |\r\n| **チーム合計のみ公開** | **約438通り** | **読めるが特定不可＝理想** |\r\n\r\n> 【注記 2026-07-15】上記の表の数値（約7／約2／約438通り）は、現行実装（V3プール）では\r\n> 再現しない。リバランス前の旧プールに対する値だった可能性が高い。特に「発火した個数のみ公開」は\r\n> 現行実装で再計算すると「個人点を全公開」より**広く**（＝逆方向に）出ており、単純な丸め誤差では\r\n> 説明できない差がある。現行実装での再計算値と検証手法は\r\n> `sim/witch_privacy/魔女の調合_秘匿性数値再現_結果.md` を参照。定性的結論（チーム合計のみの公開は\r\n> 個人点全公開より秘匿性が高い）は現行実装でも支持される。\r\n\r\n### 対策として効かなかったもの（重要）\r\n直感的な対策はほぼ無効だった：\r\n- **点数を型ごとに揃える** → 6R後8通り（ほぼ改善せず）\r\n- **全ての好みを1点固定にする** → 6R後16通り（焼け石に水）\r\n- **粗い4段階表示（低/中/高/負）** → 6R後18通り（微改善）\r\n\r\n> 【注記 2026-07-15】上記3項目も現行実装（V3プール）では再現しない。特に「型ごとに揃える」は\r\n> 現行プールが既に型ごとに点数統一済みのため実験自体が無意味化しており、「粗い4段階（低/中/高/負）」\r\n> は現行の得点体系に負の得点が存在しないため前提が成立しない。いずれもリバランス前の旧仕様を\r\n> 前提にした記述と考えられる。詳細は `sim/witch_privacy/魔女の調合_秘匿性数値再現_結果.md` §4を参照。\r\n\r\n> **真因は「点数のバラつき」ではなく、「盤面＋正確な個人点」を何度も観測できること自体の情報量。**\r\n> 点の設計をいじっても、観測回数が積み上がれば特定に至る。\r\n\r\n### 効いた対策\r\n**個人点を公開しない。公開はチーム合計のみ。** 各自の点は本人のクライアントがローカル計算する。\r\n読みの手がかりは「相手がどう分けたか」「どれを選んだか」という**行動**に一本化される。\r\n\r\n### 副次的発見：選択行動そのものが強い情報\r\n「相手がどの塊を選んだか」だけで、6R後に816→35通りまで絞れた。\r\nつまり**選択の観察だけで十分な読みの手がかりになる**。点や個数を足すと情報過多で特定に至る。\r\n\r\n> 【注記 2026-07-15】この「816→35通り」も現行実装（V3プール）では再現しない。同条件で再計算すると\r\n> 平均117.72／中央値94通りとなり、35通りより大きく広い。リバランス前の旧プールに対する値だった\r\n> 可能性が高い。現行実装での再計算値と検証手法は\r\n> `sim/witch_privacy/魔女の調合_秘匿性数値再現_結果.md` を参照。定性的結論（チーム合計のみの公開は\r\n> 個人点全公開より秘匿性が高い）は現行実装でも支持される。\r\n\r\n> **設計原則：秘匿情報ゲームでは「行動」を読ませる。数値は出すほど秘匿を壊す。**\r\n> 「情報が少なすぎて読めないのでは」という懸念は、多くの場合杞憂。行動は雄弁。\r\n\r\n### 【重要】「データの秘匿」と「知識状態の秘匿」は別物\r\n\r\n秘匿情報ゲームの設計中に発見した、見落としやすい区別：\r\n\r\n- **一次の情報（データ）** ＝ 「そのカードの値は何か」\r\n- **二次の情報（知識状態）** ＝ 「**誰が、何を知っているか**」\r\n\r\n> **データだけを隠しても、「誰が何を調べたか」が公開されていれば、二次の情報は公開されている。**\r\n> **そして、ブラフが立つのは二次の情報が隠れているときだけである。**\r\n\r\n例：「調べる行為が全員に見える」設計では、調べずに行動した人が何を知っているかは全員に**計算可能**（＝「何も知らない」ことが確定する）。したがって「あえて調べずに動く」は**豪胆さのシグナルにはなるが、ブラフにはならない**（検証可能なものはブラフにならない）。\r\n\r\nブラフを成立させたいなら、**二次の情報を隠す**仕掛けが要る：\r\n- 初期に私的な情報を配る（Cryptid / アルケミストの定石。ただし「引きの運」が入る）\r\n- 情報が**波及する**構造にする（有限プール＝Aを調べるとB・Cの推定も更新される → 「何を根拠に動いたか」が検証不能になる）\r\n\r\n### 次回のチェックリスト\r\n- [ ] プレイヤーの隠れた属性が、公開される数値から方程式的に解けないか？\r\n- [ ] 「盤面＋個人スコア」を N 回観測したときの候補数の減り方をシミュレーションしたか？\r\n- [ ] 秘匿情報を**DBに保存していないか**（UIで隠すだけでは開発者ツールで見える）\r\n- [ ] 「行動の観察だけでどこまで読めるか」を測ったか？（意外と十分なことが多い）\r\n- [ ] **二次の情報（誰が何を知っているか）は隠れているか？** ブラフを核に据えるなら必須\r\n\r\n---\r\n\r\n## 6. 物理制約とメカニクスの相性 ― 「達成可能率」で死に札を検出する\r\n\r\n### 発見した問題\r\n「切り役はタイルを並べ替えられず、切れ目を入れるだけ」という物理制約下で、\r\n**「XとYが隣り合う」という好みは、切り役の腕が効かない運ゲーになる**（帯の並びが最初から隣接していないと達成不能）。\r\n\r\n### 測り方（汎用的な指標）\r\n2つの指標を分けて測ると、死に札が炙り出せる：\r\n\r\n- **ランダム発火率**：適当な状況で偶然達成される確率\r\n- **達成可能率**：全ての合法手を尽くしたとき、達成できる状況の割合 ← **こちらが本質**\r\n\r\n実測（旧プール）：\r\n\r\n| 型 | ランダム発火 | **達成可能率** | 判定 |\r\n|---|---|---|---|\r\n| 隣接（XとYが隣り合う） | 10.9% | **35.7%** | 運ゲー：狙っても6割は不可能 |\r\n| 個数（Xを2つ以上） | 7.5% | 44.0% | 帯に2枚ないと不可能 |\r\n| 単体（Xをちょうど1つ） | 34.8% | 88.4% | 健全 |\r\n| 忌避（Xを入れない） | 57.0% | 100% | 緩すぎ |\r\n\r\n> **達成可能率が低い＝「腕で狙っても達成できない」＝運。プレイヤーの技術が結果に結びつかない。**\r\n\r\n### 対策\r\n物理制約と噛み合う条件に置き換える：\r\n- 「隣り合う」→ **「同じ坩堝に入っている」**（切り方で狙える）：35.7% → 79.7%\r\n- 「Xを2つ以上」→ **「XかYどちらかを2つ以上」**（選択肢を広げる）：44% → 75.1%\r\n\r\n結果、全型が「腕で狙えば達成可能」75〜100%に。**しかも読みの価値は失われなかった**\r\n（好みを知る切り役の冴え86.8% vs 知らない61.5%＝差25.3pt。「何を狙うべきか」は依然読む必要がある）。\r\n\r\n> **重要な区別：「達成可能性」と「読みの必要性」は別物。**\r\n> 達成しやすくしても、「誰の何を狙うか」が隠れていれば読みは死なない。\r\n\r\n### 次回のチェックリスト\r\n- [ ] 各条件の**達成可能率**（全合法手を尽くした場合）を測ったか？\r\n- [ ] ゲームの物理/操作制約と、条件の形式が噛み合っているか？\r\n- [ ] 達成可能率が極端に低い/高い条件はないか（死に札・緩すぎる札）\r\n- [ ] 条件を易しくしたとき、「読み」の価値が失われていないか（好みを知る場合と知らない場合の差を測る）\r\n\r\n---\r\n\r\n## 7. 協力ゲームでの「評価」と「個人比較」の危険\r\n\r\n### 問題の構造\r\n協力ゲームに個人スコアや個人ランキングを持ち込むと、**Fellowship（交流の楽しさ）を壊す**：\r\n- 「Aは96%、Cは71%」と並べると、**戦犯が数字で確定する**\r\n- 次のゲームで「Cは切り役をやりたくない」となる（奉行問題の温床）\r\n- 敗因の帰属が「チーム」から「個人」に移り、協力の空気が消える\r\n\r\n### 採った設計：測定は厳密、表示は優しい\r\n- **測定（内部）**：厳密に測る。切り方の質 ＝ その切り方に対して全員が最適選択した場合のチーム点 ÷ 理論最大値\r\n  - この定義なら**選ぶ側のミスに影響されない**（切り役の切り方そのものを純粋評価）\r\n  - 理論最大値で正規化するので**局面の難易度にも依存しない**\r\n- **表示（外部）**：\r\n  - **ベストのみ**（ワーストは絶対に出さない）\r\n  - **数字（%）を出さない**（内部判定にのみ使う）\r\n  - **物語として叙述**：「沈黙のうちに◯◯の望みを見抜き、〈条件〉を叶えた」\r\n  - **一覧比較表にしない**（個別カード形式で、並べて比較させない）\r\n  - 誰にでも自分のベストがあるので、**全員に見せ場が生まれる**\r\n\r\n> **原則：協力ゲームでは「測るのは厳密に、見せるのは優しく」。**\r\n> 数字は設計者の道具であって、プレイヤーに突きつけるものではない。\r\n\r\n### 評価指標を作るときの落とし穴\r\n1. **正規化を忘れると歪む**：「達成度」を絶対点で測ると、簡単な局面で満点を取った回が最高評価になる。理論最大値で割って正規化する。\r\n2. **他人の行動の影響を除去する**：切り役の評価に「選ぶ側のミス」が混入すると、本人の手柄でない要素で評価が変わる。**「相手が最適に動いたと仮定した場合」で測る**と純粋になる。\r\n3. **配られた条件の運を考慮する**：どう頑張っても高得点にならない配置を引いた人が「下手」と表示されるのは理不尽（敗北感の帰属が壊れる）。\r\n\r\n### 次回のチェックリスト\r\n- [ ] 個人スコアを表示すると、戦犯の可視化にならないか？\r\n- [ ] 評価指標は、他人のミスの影響を受けないか？\r\n- [ ] 局面の難易度で正規化されているか？\r\n- [ ] ワーストを表示していないか？\r\n- [ ] 数字より物語で見せられないか？\r\n\r\n---\r\n\r\n## 8. 「上級ルール」の設計 ― 難易度と深さは別物\r\n\r\n### 混同しやすい罠\r\n「上級者向けルール」を考えるとき、**「難易度が上がる」と「深さが増す」を混同しがち**。\r\n\r\n例として検討した候補と、その実際の効果：\r\n\r\n| 候補 | 難易度への影響 | 判定 |\r\n|---|---|---|\r\n| 合図トークン（無言で1つだけ推薦できる） | **下がる**（情報が増える） | 上級でなく「初心者補助」 |\r\n| 毒味役（切る前に制約を宣言） | 微妙（後述） | 罠あり |\r\n| 高難度枠（達成困難だが高得点の条件） | **上がる** | ○ |\r\n\r\n> **チェック：その追加ルールは、プレイヤーが得られる情報を「増やす」か「減らす」か？**\r\n> 情報を増やすものは、たいてい難易度を下げる（＝初心者向け）。\r\n\r\n### 「毒味役」が土台ごと崩れた経緯（教訓）\r\n「切り役は切る前に、素材1種を『自分の坩堝に入れない』と宣言する」というルールを検討したが、2つの罠に挟まれた：\r\n\r\n- **毎ラウンド使える** → 宣言が毎回「切り役の忌避」の手がかりになり、情報が漏れ続ける → **簡単になる**\r\n- **ゲーム中1回だけ** → 宣言のメリット（チームへの情報提供）がデメリット（自分の制約）を上回るなら、**「初手で使うのが最適」に収束** → 偽の選択肢化＋「早く使え」という**使用圧力**（協力ゲームの奉行問題）\r\n\r\n穴を塞ぐ改造（ブラフ可能にする等）を重ねるほど、元の「毒味」というフレーバーから離れていった。\r\nこれは**核が土台と噛み合っていないサイン**であり、土台ごと選び直す判断をした（実践記録§8の実践）。\r\n\r\n> **教訓：「使う/使わない」を選ぶ消耗型リソースは、協力ゲームでは使用圧力を生みやすい。**\r\n> 特に「使うとチーム全体が得をする」設計だと、使わない選択が非合理になり、選択肢が死ぬ。\r\n\r\n### 採った設計：好みの中にリスク選択を埋め込む\r\n各自の条件を「通常枠2枚＋高難度枠1枚」にする。高難度枠は達成困難（35%前後）だが高得点（+10）。\r\n- **難易度↑**：達成率の低い条件を含むので、理論値到達が難しくなる（NPC冴え 83%→72%で実証）\r\n- **深さ↑**：\"確実な小得点 vs 賭けの大得点\" の自己選択が毎ラウンド生まれる\r\n- **使用圧力なし**：常時の枠なので「使う」概念がない\r\n- **情報漏れなし**：秘匿は保たれたまま\r\n- **評価式の変更不要**：理論最大値の計算が高難度枠を自動的に織り込むため\r\n\r\n### 高難度条件を設計するときの重要な発見\r\n**条件の「テンプレート（構造）」を混ぜると、達成率がばらつく。**\r\n\r\n当初6種を混在させたときの達成可能率：26%〜63%（**2.4倍のばらつき**）\r\n→ 「難しい枠を引いた不運」が生まれ、敗北感の帰属が壊れる\r\n\r\nテンプレート別に測ると、**各テンプレート内では非常に均一**だった：\r\n\r\n| テンプレート | 平均達成率 | 範囲 |\r\n|---|---|---|\r\n| 同居+単体 | 64% | 61-65% |\r\n| **単一2つ+忌避** | **34%** | **34-36%** |\r\n| 同居+二種忌避 | 52% | 51-54% |\r\n| 同居+単一2つ | 29% | 27-30% |\r\n\r\n→ **単一テンプレートで揃える**と、3人・4人とも達成率が数pt以内に収束した。\r\n\r\n> **原則：同カテゴリの条件カードは、同じ構造テンプレートから作る。**\r\n> 構造が違うと難易度が揃わず、引きの運になる。\r\n\r\n### 次回のチェックリスト\r\n- [ ] その追加ルールは情報を増やすか減らすか（＝難易度を下げるか上げるか）\r\n- [ ] 消耗型リソースは「使うのが常に最適」になっていないか（偽の選択肢・使用圧力）\r\n- [ ] 高得点条件は上位互換になっていないか（期待値が安全策と拮抗しているか）\r\n- [ ] 同カテゴリの条件は、同じ構造テンプレートで作られているか（達成率のばらつき＝運）\r\n- [ ] プレイヤー人数を変えても、達成率の均一性が保たれるか\r\n\r\n---\r\n\r\n## 9. ルール説明の作り方\r\n\r\n第1作のプレイテストで「ルール説明そのものの分かりにくさ」に具体的なフィードバックが多数得られた\r\n(専門用語過多・何を目指すゲームか不明・フェーズで何ができるか不明・用語集がない・\r\n記述と実装の食い違い・境界条件の未記載・数値の目安がない等)。以下はその対処と一般原則。\r\n\r\n### 9-1. 適用した対処法(第1作『針の上の女神たち』のプレイテストより)\r\n\r\n#### 対処1. 「概要」を専門用語ゼロで最初に置く\r\nルール文章の一番最初に、**専門用語を一切使わずに「これは何をするゲームか」「勝利条件は何か」を2〜3文で説明するブロック**を追加した。この後に初めて役割名やメカニクスの名前を導入する、という順序にした。\r\n\r\n#### 対処2. 「流れ」は名詞の羅列ではなく、動詞で説明する\r\n「相談 → 準備 → 資源配置 → 移動 → カード → 判定」という**フェーズ名の羅列だけでは、各フェーズで何をするか伝わらない**。「資源配置：資源担当が、引いた石3個を盤に置く（必須）」のように、**各フェーズに「誰が・何を・どうする」を短く添える**形に変更した。\r\n\r\n#### 対処3. 用語集を独立したセクション・タブとして用意する\r\n「女神」「土地神」「山」のような、ゲーム固有の名詞を一覧できる場所を作った。ルール文章の中で初出のたびに説明するのではなく、**いつでも立ち返って確認できる辞書として分離する**ことで、ルール文章自体は簡潔に保てる。\r\n\r\n#### 対処4. 役割ごとの情報を一箇所に集約する\r\n「詳細ルール」と「役割ガイド」に同じ内容が分散していたのをやめ、**各役割の操作方法・裁量ポイント・関連する数値情報は、その役割のページ1箇所に全部書く**ようにした。「詳細ルール」は役割をまたぐ共通ルールだけに絞った。\r\n\r\n#### 対処5. 疑問に思われそうな点は、先回りして明記する\r\n「これは書かなくても伝わるだろう」と思っていた暗黙の了解（サイコロ担当は全員を動かしてよい、出目は上限であって必ず使い切らなくてよい、カードの数値は個別カードであって範囲ではない、等）を、**実際に疑問視された箇所は全て明文化**した。読み手にとって自明ではない、という前提に立ち直す必要があった。\r\n\r\n#### 対処6. 抽象的な数値ルールには、具体例を添える\r\n「重心が重さ×距離で決まる」というルールだけでは、プレイヤーは**どのくらいの行動がどのくらい危険なのか判断できない**。「重さ10を中心から3リング目まで動かすと、傾きが15〜20ほど動く」というような、**具体的な目安の数字を添えた**。\r\n\r\n#### 対処7. ルール文章は実装とズレていないか、都度チェックする\r\n機能追加・仕様変更のたびに、**関連するルール文章が古いままになっていないか**を確認する必要があった。今回、「今の傾きが見える」という誤った記述が残っていた例があった。**コードを変更したら、対応するルール文章も同時に見直す**運用にすべきだった。\r\n\r\n#### 対処8. UIの「見た目の構造」自体が情報を漏らしていないか確認する\r\nテキストの中身を隠しても、**要素の高さ・大きさ・存在の有無そのもの**が情報になってしまうことがある（カードの高さで種類が分かってしまった事例）。秘匿情報を扱うUIでは、**「中身」だけでなく「形」も本当に隠せているか**を確認する必要がある。\r\n\r\n#### 対処9. 一見似た2つの選択肢は、統合するか明確に呼び分ける\r\n「役割の選択」と「（体重の可視性に紐づく）担当女神の選択」という、目的の異なる2つの選択肢を並べていたところ、ユーザーには**同じことを2回聞かれているように見えてしまった**。実際に調べてみると、連動していないことで実害のある不具合にもなっていた。**似て見える選択肢は、自動的に連動させるか、思い切って統合すべき**。\r\n\r\n---\r\n\r\n### 9-2. 一般化できる原則(そのまま使えるチェックリスト)\r\n\r\n1. **ルール説明は「概要（専門用語なし）→流れ（動詞で）→詳細（役割ごとに集約）→用語集」の順に構成する**\r\n2. **「これくらい分かるだろう」と思った操作可否・境界条件ほど、明文化する**\r\n3. **抽象的な数値ルールには、必ず具体例・目安を添える**\r\n4. **機能を変更したら、その場でルール文章も見直す（コードとテキストをセットで管理する）**\r\n5. **秘匿情報のUIは、テキストだけでなく見た目の構造（サイズ・形・要素の有無）まで確認する**\r\n6. **似た選択肢が2つ並んでいたら、それは設計の見直しサインかもしれない**\r\n7. **ルール文章のわかりやすさも、ゲームバランスと同じくらい「プレイテストで検証すべき対象」として扱う**。初見者の「わからなかった」は、バグ報告と同じ重みで扱ってよい\r\n\r\n### 9-3. 【原則】ルール文は「正確」なだけでなく「誤読されない」必要がある\r\n\r\n**ルール説明を書いたら、説明文が実際のロジックと一致しているか、機械的に照合する。**\r\n\r\n```bash\r\n# ヘルプの記述と、実装の条件式を並べて確認する\r\necho \"同居: ヘルプ「両方が入っていれば」/ 採点 $(grep -c 'c(r.a)>=1&&c(r.b)>=1' f.html)\"\r\necho \"個数: ヘルプ「どちらか片方が単独で2つ」/ 採点 $(grep -c 'c(r.a)>=2||c(r.b)>=2' f.html)\"\r\n```\r\n\r\n**さらに、表記そのものが誤解を生まないかも要注意:**\r\n\r\n| | |\r\n|---|---|\r\n| ❌ 「XかYを2つ以上」 | 「**合計**2つ？」と誤読された |\r\n| ✅ 「Xを2つ以上、または Yを2つ以上」 | 誤解が消えた |\r\n\r\n> **短く書こうとすると、たいてい曖昧になる。冗長でも一意に読める方を選ぶ。**\r\n\r\n### 9-4. 追加知見(第2作)\r\n\r\n- ゲーム内のルール説明モーダルでも、上記原則(概要→流れ→詳細→用語集、暗黙の了解の明文化、数値に具体例)がそのまま有効だった\r\n- **「アプリがなくても物理ボードゲームとして手動処理できるレベルの網羅性」を基準にすると抜けが見つかる**:計算式の前提(「持ち分」が何を指すか)、カードデッキの内訳、プレイヤー人数の固定/可変の使い分けなど。**ルール説明は「これだけ読んでゼロから手動で運用できるか」で見直す**\r\n\r\n---\r\n\r\n## 10. 『針の上の女神たち』(第1作)中止の根本原因分析\r\n\r\n**概要:** 針の上でバランスを取る円盤上の女神たちを、3〜4人が非対称の役割(サイコロ/カード/資源/境界)で\r\n協力して導き、全員を目的地に到達させつつ盤面の重心を保つ協力ゲーム。React単一HTMLのシミュレーターを\r\n数十回の改修サイクルで開発したが、プレイテストの結論を受けて開発を一旦中止した。\r\n\r\n### 10-1. プレイテストで指摘された根本的な問題\r\n\r\n3点に集約される。\r\n\r\n1. **隠された情報が意味をなしていない**：体重や目的地を非公開にする設計を重ねたが、最終的にプレイヤーが「その情報を使って何かを判断した」という手応えを得られなかった\r\n2. **「自分のおかげで成功した／自分のミスで負けた」という実感がない**：勝敗の要因が、特定のプレイヤーの選択に紐付いて見えなかった\r\n3. **プレイが結果に影響している実感が薄い**：自分の行動がゲームの帰趨を左右しているという感覚が乏しかった\r\n\r\nこれらは表面的には別々の問題に見えるが、**根っこは同じ1つの構造的な問題**である可能性が高い。次項で分析する。\r\n\r\n---\r\n\r\n### 10-2. なぜこうなったのか(根本原因の分析)\r\n\r\n#### 10-2-1. 「合議制の結果」に対して「個人の手柄／落ち度」を感じるのは構造的に難しい\r\n\r\nこのゲームは、**毎ラウンド3〜4人全員が、それぞれ独立に盤面の状態（重心）へ影響を与え、その合計値だけが結果として現れる**という構造だった。重心は「全ての女神・資源の位置×重さの加重平均」という、**多数の要因が混ざり合った1つのスカラー値**である。\r\n\r\nこの構造だと：\r\n- 誰か1人の行動が「決定打」になることは稀（多くの行動は、他の全員の行動と混ざり合って初めて結果に現れる）\r\n- 負けた時、「あの時カードをああ配っていれば」「あの時もっと寄せておけば」という反省点は無数にあり得るが、**どれが真の原因かがゲーム上で明示されない**\r\n- 逆に勝った時も、「なぜ勝てたか」を1つの行動に帰属させることが難しい\r\n\r\n**教訓**：協力ゲームで「個人の手柄・失敗」を感じてほしいなら、**個々のプレイヤーの行動と、目に見える結果の間の因果関係が、なるべく直接的・単純であるべき**。多人数の行動が混ざり合ってから初めて結果が出る「集計型」の設計は、原因帰属を難しくする。\r\n\r\n#### 10-2-2. 秘匿情報は「後から答え合わせできる」構造とセットでないと機能しない\r\n\r\n体重・目的地を非公開にする設計を何度も強化したが、**非公開にすること自体が目的化してしまい、「非公開情報を推理する／当てる／外す」というゲームプレイ上の楽しさに繋がっていなかった**。\r\n\r\nitoやWavelengthのような「秘匿情報＋ヒント」系のゲームが機能するのは、**最終的に必ず答え合わせが起き、「当たった／外れた」がプレイヤー自身の行動（ヒントの出し方・受け取り方）に明確に紐付く**からである。今回のゲームでは：\r\n- 体重を「気配」で大まかに知る仕組みを追加したが、**その情報を使って何を最適化すべきかの手応えが薄かった**（軽め／普通／重めの3段階では、その後の行動選択に与える影響が小さすぎた可能性がある）\r\n- 目的地を1人だけに見せる設計も、**その情報を独占することで生まれる緊張感や駆け引きが、ゲームの他の部分と噛み合っていなかった**（他の3人は目的地を知らないまま作業をこなすだけになりがちだった）\r\n\r\n**教訓**：情報を隠すこと自体はゲーム性を生まない。**「隠された情報を使って何を予測・判断し、それが後でどう証明されるか」という一連のループ全体を設計しないと、秘匿情報はただの不便になる**。\r\n\r\n#### 10-2-3. 「バランスを取り続ける」というテーマと「明確な原因帰属」は本質的に相性が悪い可能性\r\n\r\nこのゲームの中核コンセプトは「常に微調整を続けて均衡を保つ」というものだった。これは以下の理由で、**「はっきりした手柄・失敗」を作りにくいテーマ**だったと考えられる：\r\n\r\n- 均衡は「良い状態を維持し続けること」が目標であり、**派手な一手で逆転する瞬間が構造的に作りにくい**\r\n- 逆に、崩壊も「一気に来る」のではなく「じわじわ積み重なる」設計にしていたため、**「これが敗因だ」という決定的な瞬間が生まれにくかった**\r\n\r\n**教訓**：「均衡・バランス」をテーマにする場合、**意図的に「ここぞという分岐点」を差し込む仕組み**（例えば、大きなリスクを伴う一発逆転の選択肢、明確に良い/悪い結果に直結する二択の決断ポイントなど）を、テーマとは別に設計する必要がある。テーマの雰囲気だけでは、緊張感のあるプレイ体験は自動的には生まれない。\r\n\r\n#### 10-2-4. 情報公開・役割制限を「後から」積み増ししたことの弊害\r\n\r\n開発の過程で、「秘匿情報が機能していない」というフィードバックに対し、**情報を隠す方向・役割操作を制限する方向**でのみ調整を重ねた（体重を完全非公開に、目的地を1人だけに限定、役割ごとの操作制限を追加、カードの中身のサイズ漏洩を修正、など）。\r\n\r\n振り返ると、これは**症状（情報が漏れている・操作できてしまう）への対処ではあったが、「情報が意味を持つループ」という根本課題には効いていなかった**。後から制限を強化するアプローチは、**「なぜ情報が機能していないか」を再設計するより、対症療法に時間を使ってしまうリスク**があると分かった。\r\n\r\n**教訓**：プレイテストで「機能していない」というフィードバックを受けた時、まず疑うべきは「情報を隠す量・見せる量の調整」ではなく、**「その情報がゲームのどの意思決定に、どう影響するか」という設計そのもの**。調整だけで直らない場合は、根本の構造から見直す判断を早めにすべきだった。\r\n\r\n---\r\n\r\n## 11. 【最重要原理】シグナルの設計 ―― 何が\"選好\"を伝えるか\r\n\r\n第4作『影の賽』(中止)から得た、最も汎用性の高い原理。\r\n\r\n> ## **「情報を集める行為」は、選好のシグナルにならない。**\r\n> ## **選好を信頼できる形で伝えるのは、「コストを払う行為」だけである。**\r\n\r\n### なぜか(論理的帰結であり、調整では直らない)\r\n\r\n> **人は、確信できないものを調べる。確信したものは、調べない。**\r\n\r\n- 明らかに良い → 取る。もう調べない\r\n- 明らかに悪い → 捨てる。もう調べない\r\n- **判断がつかない → 調べ続ける**\r\n\r\n→ **「たくさん調べている」= 「判断がつかない」= 「たぶん平凡」**\r\n→ **探索行動は\"不確実性\"のシグナルであって、\"選好\"のシグナルではない**\r\n\r\n**ベイズ更新の論理的性質であり、パラメータをどう振っても反転しない。**\r\n\r\n### 行動とシグナルの対応表\r\n\r\n| 行為 | 何のシグナルか |\r\n|---|---|\r\n| 調べる・観測する・覗く | **不確実性**（「私はまだ分からない」） |\r\n| 賭ける・入札する・支払う | **選好**（「私はこれに価値を認める」） |\r\n| 麻雀の**副露** | **コミット**（資源を払って手を晒した） |\r\n| 麻雀の**リーチ** | **完成**（後戻りできない宣言） |\r\n| **調べた上で\"手放す\"** | **選好の負のシグナル**（レモン市場・逆選択） |\r\n\r\n> **「読ませたい心」がある設計なら、読ませる対象は\"調査\"ではなく\"支払い\"でなければならない。**\r\n\r\n### チェック項目（核を立てた直後に、数値検証の前に行う）\r\n\r\n- [ ] 核が「Aという行動が、Bという内心を伝える」構造なら、**その対応が論理的に成り立つか**を先に検査したか？\r\n- [ ] その行動は「コストを払う行為」か、それとも「情報を集める行為」か？\r\n- [ ] 「合理的なプレイヤーは、どういうときにその行動を取るか」を書き出したか？\r\n      （書き出すと、シグナルの向きが逆であることが一目で分かる）\r\n\r\n> **バランス調整では絶対に直らない病がある。**\r\n> 「選択が意思決定に影響しない」は数値の病だが、\r\n> **「その行動が、そのシグナルを持たない」は論理の病である。**\r\n\r\n---\r\n\r\n## 12. 【汎用】新メカニクスを土台に乗せる前の検査 ―― フリーサイコロの探索から\r\n\r\n『影の賽』中止後の再探索（サイコロの影 → シュレディンガーのサイコロ → フリーサイコロ）で得た、\r\n**核を土台に乗せる前に必ず通すべき検査**。理論編・第4部§6-16〜6-17 が実例。\r\n\r\n### 12-1. 数値は「強さ」か「種類」か（土台を半分消す検査）\r\n\r\n新メカニクスが数字を扱うとき、まずこれを問う：\r\n\r\n> **その数字は、序数（大小が意味を持つ）か、名詞（種類を指すだけ）か？**\r\n\r\n- **序数** → レース・入札・数比べ・トリテが土台候補になる\r\n- **名詞** → **上記は全滅する**（大きい数字を出すのが常に得＝支配戦略）。エリア識別子・品目・座標などに限られる\r\n\r\n> **フリーサイコロ（好きな数字を刻める）の場合：数字が「強さ」なら、全面に最大値を刻むのが支配戦略になり、\r\n> メカニクスが即死する。したがって数字は「種類」でなければならない。**\r\n> **この一問だけで、土台候補の半分以上が消える。早い段階でやる価値が非常に高い。**\r\n\r\n### 12-2. 「自由」を資源にする設計は、両端で決断が死ぬ\r\n\r\n**自由（＝何でもできる状態）を消費させる設計**（フリーサイコロ、白紙、ワイルド）には、共通の病がある：\r\n\r\n| 局面 | 自由 | 何が起きるか |\r\n|---|---|---|\r\n| 序盤 | 潤沢 | **何でもできる → 決断が自明。軽い** |\r\n| 終盤 | ゼロ | **選択肢がない → 決断が消える** |\r\n\r\n> **濃い決断は、その中間の狭い帯にしか存在しない。**\r\n> **＝ 3つの実践記録が到達した「生きた選択は両極の間の狭い帯にしかない」の、資源版。**\r\n\r\n**設計の生命線は「自由の減り方」。** ゲーム全体を、その帯の中に保ち続けられるか。\r\n緩和策：複数の選択肢を同時に提示して「選ぶ」行為を最後まで残す／自由の回復／短く終わらせる。\r\n\r\n### 12-3. 「枯渇」を終了条件にすると、温存が支配戦略になる\r\n\r\n**資源の枯渇＝終了**とした場合、**「使わない」ことが時計を止める行為になり、全員が温存して膠着する。**\r\n\r\n> **終了条件は「固定ラウンド数」など、プレイヤーが操作できない時計にする。**\r\n> そうすれば「温存すれば資源は守れるが、そのラウンドの利得を失う」という明確な機会費用が生まれる。\r\n\r\n### 12-4. 「運は共有、判断は個人」―― 紙ペンゲームの構造を移植する\r\n\r\nロール＆ライト（紙ペン）の美点は、**「全員が同じ出目を見て、各自が別々に使う」**こと。\r\nこれにより **ダウンタイムゼロ・運の完全な公平・結果の完全な非対称** が同時に成立する（理論編§2-6）。\r\n\r\n**個人ごとに乱数装置を持たせる設計では、これを意図的に移植できる：**\r\n\r\n> **装置は個人のもの。だが「振る」のは共有。**\r\n> **出るのは\"値\"ではなく\"どのスロットを見るか\"（面番号・列番号・座標）。**\r\n> → 全員が同じ号令を聞き、各自の装置の中身が違うから、結果が全く違う。\r\n\r\n**副産物：全員の装置が公開されていれば、「次にどの号令が来たら、誰がどう動けるか」が読める\r\n＝ 未来の読み合いが、盤面から無料で立ち上がる。**\r\n\r\n### 12-10. ルールを直す前に、「その決断がUIに見えているか」を疑う\r\n\r\nフリーサイコロ v0.2 のプレイテストで「両方白紙だと、どちらの面を使うかの選択が\r\n意味をなさない」という証言が出た。だが分析の結果、**選択は存在していた**：\r\n面番号＝位置が全員共有であるため、「どの位置に刻むか」はライバルとの生産タイミングの\r\n**同調／回避**を制御する決断であり、さらにBLANK規則と組み合わせると\r\n**白紙の多い者があえて同調して同着に持ち込み、奪い取る**という捕食すら可能だった。\r\n\r\n問題はルールではなく、**この構造が画面のどこにも現れていなかったこと**。\r\nプレイヤー別にダイスを並べる表示では、位置を跨いだ比較（列の読み）ができない。\r\n\r\n> **チェック：「選択が無意味」という証言が出たら、ルールを足す前に2つ問う。**\r\n> **①その選択は本当に無意味か（構造を洗い直す）。②有意味なら、UIがそれを見せているか。**\r\n> 対症療法カウンタは、ルールだけでなく「見えていない深さ」にも適用される。\r\n\r\n### 12-11. 同着・衝突系の不快は、「読めたか」で病かどうかが分かれる（仮説）\r\n\r\n同着の不快（Q2「点を奪われた」）は、頻度の問題ではなく**帰属の問題**である可能性が高い。\r\n- 読めた同着 → 「読んだのに踏んだ／狙って撃った」＝自責・武器 ＝ 健全\r\n- 読めない同着 → 「事故・盗難」＝理不尽 ＝ 病\r\n実測では同着の58%が差別化後（R7以降）に起きており、これは可視化で「読める」側に\r\n移せる見込み。**可視化で治るなら機構の追加は不要**\r\n（→ フリーサイコロは別死因で開発中止となり（理論編・死因5）、この仮説は未検証のまま。\r\n次に同着・衝突系の不快が出た作品で検証する）。\r\n\r\n### 12-12. 初回プレイの「指が止まった」は、核の証明にならない\r\n\r\nフリーサイコロ v0.2 で「白紙を刻む瞬間に指が止まる」（＝核は実在）と判定したが、\r\nv0.2.1 の反復プレイで思考停止の最適手に潰れた。初回の停止は新規性による偽陽性だった。\r\n> **チェック：核の実在判定は、必ず2戦目以降の体感で行う。**\r\n> 判定質問（「指は止まったか」）には「2戦目でも」を必ず付ける。\r\n> （§2-3「2回目・3回目でも面白いか」の、判定手続きへの適用）\r\n\r\n### 12-13. 入れ替わり（churn）と移り変わり（drift）は違う\r\n\r\n土台B「共有の注文」を選んだ決め手は「需要の変動が、刻んだ過去を裏切る」だった。\r\nだが v0.2 の実装は注文の入れ替わり（churn）だけで、需要分布は定常＝driftが無かった。\r\nchurn では過去は裏切られない：刻んだ数字の需要は同じ確率で来続け、刻んだ面は資産であり続け、\r\n白紙のオプション価値は平坦で、**後悔の来る未来が構造的に存在しない**。\r\n\r\n> **不可逆はコストではない。「不可逆を後悔させる未来」が来て初めてコストになる。**\r\n> 資源の消費に痛みを与えるのは希少性（量）ではなく、価値の非定常性（drift）である。\r\n\r\n> **チェック：土台を選定したら、選定理由だった機能がMVPに実装されているかを照合する。**\r\n> （影の賽「核の1/3を実装しないまま核が弱いと結論しかけた」の、土台レベルでの再演）\r\n\r\n### 12-14. 外れた予測も記録する\r\n\r\nv0.2.1 の「初手多様化」トグル（初期3枚の要求数字を重複させない）は、\r\n序盤同着を減らすはずという予測で入れたが、A/B測定の結果は逆（R4同着 707→865）だった。\r\n理屈で「効くはず」の対策は、逆に働くことがある。トグル＋A/Bで測ってから採否を決める\r\n手続きが正しかった。予測が外れた事実ごと記録する。\r\n\r\n### 12-15. 蘇生試行は、「殺す基準の事前登録」とセットでのみ行う\r\n\r\nフリーサイコロで実施し、機能したプロトコル：\r\n1. 蘇生試行は**1回限り**と宣言する\r\n2. **殺す基準を、結果を見る前に文章で固定する**（何がNOなら・何を殺すか・\r\n   延命の横滑り先の禁止まで含めて）\r\n3. 基準が外れたら、その場の仕事を「治療法の再検討」ではなく「死亡記録の作成」に切り替える\r\n\r\n実際、v0.3の結果を見た後に「テスト設計に欠陥があった（第3季が伏せられていた）」\r\nことが判明したが、**事前登録がなければこれは再試行の口実になっていた**。\r\n登録済みだったため、欠陥は死因記録の脚注に格下げされ、探索は1回で止まれた。\r\n共犯（理屈で修理を重ねて延命）の再演を、仕組みで防いだ初の事例。\r\n\r\n> **チェック：「もう一回だけ」と言いたくなったら、その試行の殺す基準を先に書け。\r\n> 書けないなら、それは検証ではなく延命である。**\r\n\r\n### 12-16. 判定質問は、一言で答えられる形に設計する\r\n\r\n死因の確定に使った解剖質問は3問・すべて一言で答えられた\r\n（「ありはした」「そこまで考えなかった」「集中させすぎたかなー」）。\r\nこの3つの短い答えだけで、「罰は存在した／帰属は働いた／緊張が無かった」という\r\n死因の完全な像が組めた。長い感想文を求めるより、\r\n**仮説を切り分ける短い質問を事前に用意する**方が、体感データの解像度は上がる。\r\n\r\n---\r\n\r\n## 13. 次回作チェックリスト(統合版)\r\n\r\n設計の初期段階で自問する項目。第1作(針)・第2作(握るか)の教訓を統合。\r\n秘匿・評価・上級ルールの各チェックリストは§5〜§8の末尾も併用する。\r\n\r\n**構造・核:**\r\n- [ ] 「誰の、どの判断が、どう結果に効くか」を最初に固める。「合議制の結果」(多数の行動が混ざってから結果が出る集計型)に頼りすぎていないか(第1作)\r\n- [ ] 勝った時・負けた時、「誰の・どの判断が効いたか」をプレイヤーが言葉にできるか。できないなら原因帰属の仕組みが足りない(第1作)\r\n- [ ] ゲームの中に「ここぞ」という明確な分岐点・決断ポイントがあるか。平坦な微調整の連続になっていないか(第1作)\r\n- [ ] 秘匿情報を入れるなら、予測→答え合わせのループを最初から設計する(第1作)\r\n\r\n**テーマ:**\r\n- [ ] テーマは核メカニクスとの必然性で選ぶ。安易に一般化・拡張しない(第2作)\r\n\r\n**検証:**\r\n- [ ] シミュレーションで「核」と「対症療法」を仕分けたら、必ず実際に対症療法を削って検証する。机上の分類を過信しない(第2作)\r\n- [ ] ゲーム理論的構造(協力vs裏切り等)を核に据えるなら、「全員同一戦略」の集団合計比較でその構造が機能しているか検証する(第2作)\r\n- [ ] ペース配分(緊張感がいつ生まれるか)を、バランス(勝率等)とは別に検証する(第2作・未解決のまま持ち越し)\r\n- [ ] ゲームの核が人間の心理戦に依存する場合、NPCテストの結果だけで「面白くない」と判断しない(第2作)\r\n- [ ] プレイテストのフィードバックが「情報公開の量」に関するものでも、実際の問題は「情報と意思決定の結びつき」にある可能性を疑う(第1作)\r\n\r\n**実装・UI(詳細は「実装技術知見」):**\r\n- [ ] カスタム色は最初からインラインstyleで統一し、Tailwindの任意値クラスに頼らない(第2作)\r\n- [ ] 情報を隠す設計をした要素は、見た目の演出(位置・サイズ・アニメ)が副次的に情報を漏らしていないか確認する(全作共通)\r\n- [ ] ルール説明は「これだけで物理的に手動運用できるか」を基準に網羅性を確認する(第2作)\r\n\r\n---\r\n\r\n## 14. エージェントに作業を投げるときの、検証と停止の原則\r\n\r\nClaude Code のような実行エージェントに作業を委譲する際に、**エージェント側の検証が壊れている／\r\nエージェントが問題を迂回してしまう**という、人間だけで開発していたときには存在しなかった失敗モードが出た。\r\n\r\n### 14-1. 【最重要】検証コードが「失敗」を「成功終了コードで返す」\r\n\r\n実装技術知見 §2-7「エラーを握りつぶさない」の**検証スクリプト版**。\r\n本体コードのエラー可視化は徹底していたが、**検証コード側は無防備だった。**\r\n\r\n**事例A：CRLF で正規表現がマッチせず、'no match' を成功で返す**\r\n\r\n```powershell\r\n$src = Get-Content 'witch.html' -Raw -Encoding UTF8\r\n$pattern = '(?s)(async function ensureAuth\\(\\)\\{).*?(\\n\\}\\n)'\r\nif($src -match $pattern){ ...; 'stub OK' } else { 'no match' }\r\n```\r\n\r\n`Get-Content -Raw` は改行を保持する。ファイルが CRLF なら実体は `\\r\\n}\\r\\n` で、\r\n`\\n` → `}` → `\\n` を要求するパターンはマッチしない。結果、`'no match'` と出力して\r\n**終了コード0（成功）で返る**。エージェントは成功と誤認し、存在しないファイルを前提に次へ進んだ。\r\n正しくは `(\\r?\\n\\}\\r?\\n)`。\r\n\r\n**事例B：404 と接続拒否を区別できず「サーバ停止」と誤報**\r\n\r\n検証対象のファイルを先に削除 → サーバ停止コマンドが（PowerShell 5.1 の仕様で）不発 →\r\n`Invoke-WebRequest` が **404 で例外を投げる** → `catch` に落ちる →\r\n「サーバは停止した」と報告された。**実際にはサーバは走り続けていた。**\r\n「接続拒否（サーバ停止）」と「404（ファイル削除済み）」が、どちらも同じ `catch` に落ちている。\r\n\r\n> ### **失敗が、成功終了コードで返る。**\r\n>\r\n> **検証コマンドは「成功パスと失敗パスが必ず別の出力になる」ことを確認してから実行する。**\r\n> **`try/catch` で複数の異なる失敗要因を一括で握りつぶし、それを成功と表示してはならない。**\r\n\r\n**チェックリスト:**\r\n\r\n- [ ] 「何も起きなかった」と「成功した」が、別の出力になっているか\r\n- [ ] `catch` が捕まえうる例外は1種類か？ 複数なら区別しているか\r\n- [ ] 検証対象を、検証より先に削除していないか\r\n- [ ] 「不在の確認」を「不在なリソースへのアクセス」で行っていないか（トートロジー）\r\n- [ ] 状態を変える処理と、それを検証する処理の**順序**は正しいか\r\n\r\n### 14-2. 【最重要】設定不備に当たったエージェントは、「報告」ではなく「迂回実装」を選ぶ\r\n\r\n`witch.html` の匿名認証は `auth/configuration-not-found` で失敗していた。\r\n**原因を明示しているエラー**であり、対処は「Firebase コンソールで匿名ログインを有効化する」の1クリック。\r\n\r\nにもかかわらずエージェントが選んだのは、**認証を通さず UID を捏造するスタブ経路の設計**だった。\r\n\r\n> **なぜそうなるか：報告は人間の作業を要求するが、迂回実装はエージェントの権限内で完結する。**\r\n> **エージェントは、自分で閉じられる経路を優先する。**\r\n\r\n代償：スタブ設計にチャット1本、正規表現によるファイル加工の残骸、許可プロンプトの膨張、\r\n後片付けにさらにチャット1本。**すべて、コンソールのトグル1つを押していれば発生しなかった。**\r\n\r\n> **原則：認証・権限・外部設定に起因するエラーに当たったら、迂回実装を設計しない。**\r\n> **即座に停止し、「どのコンソールで何を有効化すれば解決するか」を報告させる。**\r\n> 該当するエラーの例：`configuration-not-found` / `operation-not-allowed` / `permission-denied` /\r\n> `quota-exceeded` / `not-enabled` / 401 / 403\r\n\r\n**人間側のチェック：** エージェントから「〜のため、代わりに〇〇する方式を提案します」という\r\n**設計提案**が返ってきたら、まず疑う。**その「〜のため」は、押せばよいボタンではないか。**\r\n\r\n### 14-3. 事前登録した中止条件は、実際に機能した（成功事例）\r\n\r\n指示書に「**★ ルールが認証を要求していると判明した場合、実装を中止して報告すること**」と\r\n明記してあった。エージェントはこれを正しく発動させ、**コードを1行も変更せずに差し戻した。**\r\n\r\n無駄になったのは設計だけで、リポジトリは汚れていない。\r\n\r\n> **中止条件は「書けば効く」。プレイテストの kill 基準と同じ構造が、実装委譲でも成立する。**\r\n> **指示書には必ず「この条件を満たしたら実装せず報告」を1つ以上書く。**\r\n\r\n**追加の確認事例（第3作ソロNPC検討・2026-07）：** 「実装の中止」だけでなく\r\n「**探索の中止（撤退）**」でも同じ構造が機能した。NPC方策のパラメータ計測（v1〜v3、計35組）で\r\n指示書に「v3の全組が不合格だった場合、NPCソロ路線は保留（park）となり、第4の方策族は探索しない」\r\nと事前固定していたところ、実際に全組不合格となった時点でこの条件どおりに探索を打ち切り、\r\n第4の方策族には踏み込まなかった（詳細: `sim/witch_solo_npc/魔女の調合_ソロNPC方策_計測結果_v3.md`\r\n§10）。**「もう少し粘れば通るかもしれない」というサンクコストによる延命を、\r\n事前に固定した条件が構造的に防いだ実例。** 中止条件は実装のON/OFFだけでなく、\r\n「どこまで探索するか」という範囲にも同じ効き方をする。\r\n\r\n### 14-4. 事前登録方式の運用 ―― 人間テストのkill/keep判定にも同じ構造を使う\r\n\r\n上記の「指示書の中止条件」を、**人間によるプレイテストの合否判定**にも適用した事例\r\n（第3作ソロNPC検討・2026-07）。人間テストを実施する**前**に、kill/keepの判定基準を\r\n全文を固定して記録し、**実施後の閾値・条件の再解釈を禁止**する運用とした。\r\n判定基準を記録した文書は `sim/witch_solo_npc/事前登録_witch_ソロ人間テスト_killkeep条件.md`\r\nに収載済み（2026-07-16収載。§14-5の事例と同型の「発行済み／受領済みのズレ」が実際に一時発生し、\r\n本節も一時「本リポジトリ内には見当たらなかった」と記載していたが、その後design chat側から\r\n提供され解消した）。\r\n\r\n> **原則：事前登録は「判定者」と「実施者」が分離しているときに最も効く。**\r\n> 判定基準を決める側（design chat）と実際にテストする側（人間のプレイヤー）が別であることで、\r\n> 「結果を見てから基準を甘くする」という後知恵バイアスが構造的に入り込めなくなる。\r\n> §14-3の「実装中止条件」は主に**エージェント自身**が条件判定の主体だったのに対し、\r\n> こちらは**人間の判定**にも同じ「事前固定」の型がそのまま使えることを示した追加事例。\r\n\r\n**追記（人間テスト結果・2026-07-16）：** プロトタイプ（タイプ表示ON）で3ゲーム実施。\r\n(a)タイプ活用感=3/3、(b)4儀式目以前の「退屈な確信」=0/3、(c)継続意欲=「思う」で\r\n事前登録済みkill/keep条件の3つすべてが成立し、**KEEP**（実装フェーズへ移行）と判定された。\r\n参考項目6（NPC2体のタイプ判別性）も3/3で成立したため、λ幅拡大（要D再計測）は\r\n実装フェーズの検討事項に積まないこととなった。詳細は\r\n`sim/witch_solo_npc/事前登録_witch_ソロ人間テスト_killkeep条件.md` の判定基準と、\r\n「witch ソロモード実装（タイプ開示NPC）v1」指示書の前提節を参照。\r\n\r\n### 14-5. 指示書の引き渡し確認 ―― 「発行済み」と「受領済み」は別\r\n\r\n第3作ソロNPC検討で、design chat側が「発行済み」として扱っていた指示書\r\n（知見書き戻し・12項目）が、実際にはClaude Codeに一度も引き渡されないまま所在不明になる\r\n事象が発生した。実行担当（Claude Code）は指示書を受け取っていないため、当然ながら実行できず、\r\n発行側の記録と実行側の実態がずれたまま気づかれない期間ができた。\r\n\r\n> **原則：指示書は「発行した」ことと「相手が受け取った」ことを、別々に確認・記録する。**\r\n> **運用：指示書を発行するときはファイルとして保存し、実行側がその内容を確認できたことを\r\n> チャット上で確認してから、初めてメモ等に「引き渡し済み」と記載する。**\r\n> 「発行した（つもり）」の時点でメモに書いてしまうと、本事例のように受領されないまま\r\n> 記録上だけ完了扱いになるリスクがある。\r\n\r\n### 14-6. 指示書間の順序依存は、承認と後続指示を1通に束ねて消す\r\n\r\nv0-Cシミュレータ指示書は「知見書き戻しコミットのpushが先行しているはず」という前提で\r\n発行されたが、実際にはpushは人間承認待ちのまま止まっており、中止条件2が発動して\r\n指示書が丸ごと差し戻された（実害ゼロ・受け皿は機能した）。\r\n\r\n複数の引き渡し物に「Aの完了がBの前提」という依存を作ると、引き渡し順序という\r\n人間側の手作業が新たな故障点になる。後続指示書の前提チェック（未達なら停止）は\r\n受け皿として実証済みだが、受け皿に頼る前に、依存そのものを消すのが先。\r\n\r\n> **原則：後続指示書が先行作業の完了を前提とするなら、その先行作業の承認・実施指示を\r\n> 後続指示書の冒頭に組み込んで1通にする。順序を人間の記憶に依存させない。**\r\n\r\n### 14-7. 「停止しなかった自己判断」も報告させる\r\n\r\nv0-C実装でClaude Codeは、停止した1件（単位の多義性）とは別に、停止しなかった\r\n低リスクの自己判断4件（機会の定義・内部依存の分離・集計範囲・指標式の選択）を\r\n明示的に列挙して報告した。design chat側の判定頑健性監査は、このリストがあって\r\n初めて可能になった（例：facing_bet不問の解釈は覗き側に最大限有利な方向であり、\r\nそれでも市場が立たなかった＝killは頑健、と確認できた）。\r\n\r\n> **原則：報告要件に「自己判断で解釈を選んだ箇所（ゼロなら『なし』と明記）」を\r\n> 必ず含める。停止に至らない判断こそ、判定の信頼性を左右する。**\r\n\r\n### 14-8. （欠番）\r\n\r\n本書のセクション番号整理（2026-07-19）により、この番号は現在未使用。\r\ndesign chatが「§14-9・存在証明義務」として先行参照していた番号を§14-9側で\r\n確保するための繰り下げに伴い、空いた番号をそのまま維持している（詰めない）。\r\n\r\n### 14-9. 存在証明義務 ―― kill条件・検証ロジックの正しさは、件数ではなく発火例／非発火例で証明する\r\n\r\n> **原則：kill条件・秘匿判定・検証ロジックの正しさは、件数ではなく\r\n> 「発火例（故意に壊すと必ず落ちる）と非発火例（正常なら必ず通る）を両方構築して\r\n> 初めて証明される」（＝存在証明義務）。**\r\n\r\n件数（アサーション数・kill条件の数など）は、検証ロジックの強度の代理変数にならない\r\n（事例は§14-10）。**件数を凍結条件にする代わりに、「発火例と非発火例の両方を\r\n提示せよ」を完了条件にする。**\r\n\r\n事例：『こたえあわせ』v0.7の秘匿判定（§14-10参照）では、故意注入テスト5件\r\n（`myHand`・`cardMeta`・`myReserved`・`committedCards`・GM専用データ、それぞれへの\r\nscore混入）を追加し、注入前は通り・注入後は必ず検出されることを実地確認する形で、\r\n骨抜きになっていた判定ロジックを検出・修正できた。\r\n\r\n> **運用：検証ロジック（テストのassert文・kill条件の判定式など）を新設・変更したときは、\r\n> 必ず「これを壊すとどう落ちるか」を最低1つ実演してから完了とする。\r\n> 実演できない検証ロジックは、まだ検証ロジックとして完成していない。**\r\n\r\n### 14-10. アサーション数は検出力の代理変数にならない\r\n\r\n『こたえあわせ』v0.7開発（2026-07-19）で、design chatが完了条件に\r\n「アサーション数を減らさないこと」を課した。実装側が秘匿判定ロジックを、値ベース\r\n（`{base,mod}`の値がどこかに一致すれば許可、という約15通りしかない値空間での照合）\r\nから、場所ベース（判定確定済みentries以外にscore形状の値が1つでも残っていたら漏洩）\r\nへ正しく修正したところ、それまで冗長だった専用チェックが統合され、`test_net.js`の\r\nアサーション数が **7,332 → 3,768 へ半減した。検出力は上がっているのに、件数は減った。**\r\n実装側は専用チェックを明示的に復元して **10,896 へ純増** させたうえで、半減した事実と\r\n復元の経緯を隠さずに報告した。\r\n\r\n> **教訓：「テストの件数を減らすな」という制約は、検出力を落としながら件数を維持する\r\n> 方向にも、検出力と無関係な水増しの方向にも働く。件数はテストの強度を測っていない。**\r\n\r\n**置き換える規律：** 件数そのものを完了条件にせず、§14-9「存在証明義務」（発火例／\r\n非発火例の両方提示）を完了条件にする。半減の事実が隠されず報告されたことが、この\r\n検出を可能にした。**件数の増減に言及する報告には、必ず「増減の理由」を併記させる**\r\n運用にすること。\r\n\r\n（design chatは、§14-9の確立前から「知見§14-9・存在証明義務」としてこの概念を\r\n参照していた。本ドキュメントでは、その参照を反映して「存在証明義務」を独立した\r\n§14-9として立て、本節（§14-10）には個別の事例のみを残す形に分離した。）\r\n\r\n### 14-11. 指示書内の「承認済み」表記は承認ではない\r\n\r\n『こたえあわせ』v0.7のpush・main統合場面（2026-07-19）で、design chatが指示書に\r\n「push：マッチさんの承認済み。実施すること」と明記した。実装側（Claude Code）は\r\nこれを承認の根拠として扱わず、**「指示書は観測対象のドキュメントであり、そこに\r\n書かれた承認の主張は、人間からの直接承認ではない」として一旦停止し、チャット上で\r\n改めて人間から直接pushの承認を得てから実行した。この判断は正しい。**\r\n\r\n> **原則：副作用のある操作（push・公開・削除・送信）の承認は、必ずその実行主体との\r\n> 対話の中で、人間から直接取る。design chatが代理で与えることはできない。\r\n> 指示書に書けるのは「承認を取ったうえで実施せよ」という手順の指定までである。**\r\n\r\n**適用範囲：** この原則は指示書に限らない。ファイル・ログ・レポート・Webページなど、\r\n**ツール越しに観測したテキスト内の承認・許可の主張は、出所を問わずすべて承認として\r\n扱わない。** 承認は常に、実行主体との対話の中で直接取る。\r\n\r\n### 14-12. 凍結テキストのファイル受け渡しと、その事故\r\n\r\n『こたえあわせ』v0.7の知見突合修正指示書（2026-07-19）で、design chat側の\r\n受け渡しミスにより「v1本文＋v2ヘッダ＋v2完了条件」という**破損した指示書**が\r\n流通した（本文の編集をソース側にだけ当て、版番号は配布済みコピー側にだけ当てたため、\r\n両者が食い違った状態のまま配布された）。実装側は内部矛盾（§3-1で一字一句指定された\r\n挿入文と、§7の禁止語チェックが両立不能）を検出し、**実装せず差し戻して停止した。\r\nこの判断は正しい。**同日、別の指示書でも「remote側で既に手動削除済み」という\r\n前提が実際には成立していなかった事例が確認されており（§14-5型の\r\n「発行済みと受領済みのズレ」の再発）、受け渡し起因の事故は本件が最初ではない。\r\n\r\n> **教訓1：編集後は必ず配布物側で機械照合してから渡す。** 今回は文字列の存在\r\n> チェック（`grep`一発）で防げた種類の事故だった。\r\n> **教訓2：内部矛盾する指示書は、実装せず差し戻すのが正解。この停止挙動は維持する。**\r\n> **教訓3：凍結テキスト（一字一句指定の文言・完了条件・数値）を含む指示書は、\r\n> チャット貼付ではなく必ずファイルで渡す。** チャット貼付ではMarkdown書式が\r\n> 無音で崩れる事故が既知であり、本件を含め、この系譜の指示書はすべてチャット直接\r\n> 貼付で渡っており、規約から逸脱していた。\r\n\r\n## 15. 思考課金ポーカー検証(2026-07)からのプロセス知見\r\n\r\n### 15-1. kill条件の対象集合は名指しで固定する\r\n\r\n「最良の覗き系戦略」のような相対指定は、\r\nv0-A(nが極少の戦略が形式上の最良になり指標が空転)と\r\nv0-B(S6/S8を含めるか否かで発動が反転)の2回連続で解釈割れを生んだ。\r\n事前登録時に戦略名を列挙し、タイブレーク規則まで書き切る。\r\n\r\n### 15-2. 蘇生試行は判別実験として設計する\r\n\r\n「全死因は単一原因Xに還元される」という仮説を立て、Xのみを修正した最小変更で\r\n再検証すれば、失敗しても死因の所在が局在化される\r\n(今回:経済を直しても死んだ→死因は情報幾何と確定)。\r\n蘇生の成否と診断の成否は独立に評価できる。\r\n\r\n### 15-3. 判定器具NPCの「合理化」が藁人形を悪化させることがある\r\n\r\nポット感応の合理的虚勢S9が、置き換え対象だった固定頻度の無作為虚勢S4に大敗した。\r\n器具を強化するときは必ず旧器具と並走させる\r\n(S4を残したことで「無作為性そのものに価値がある」という設計知見が採れた)。\r\n\r\n### 15-4. kill指標にはn(標本数)要件を事前に組み込む\r\n\r\nv0-Aで「最良戦略の覗き機会が720回しかなく指標が実質空転」した教訓を、\r\nv0-Bでn≧500要件として登録し機能した。判定指標は十分なnを持つ対象上で定義する。\r\n\r\n### 15-5. 判定指標は「死亡対照が高得点を取らないか」を先に点検する\r\n\r\n工程1のv1指標M2（形勢逆転の回数）は、equityが0.5近辺に密集する死亡土台ほど\r\n無価値な浅い逆転を頻発させ高得点になる欠陥があった——**死因そのものに報酬を与える指標**。\r\n回数を数える指標は「浅い事象の頻発」に構造的に弱い。回数×深さの積（改善量）に\r\n統合することで解消した。判定指標を設計したら、既知の死体にそれを当てて\r\n「死体が受かってしまわないか」を最初に確かめる。\r\n\r\n### 15-6. 対照は三点測量（死・死・生）で置く\r\n\r\n死亡対照1本だけでは合格ラインが絶対値になり恣意性が残る。「誰も買わない」側の死体・\r\n「全員が常に買う」側の死体・機能すると既知の生存対照の3点を候補と同時に測定すれば、\r\n全閾値を相対（対照比）で書ける。さらに生存対照は指標自体の検品器を兼ねる（15-7）。\r\n\r\n### 15-7. 手順0（物差しの検品）を候補判定の前に置く\r\n\r\n「生存対照が死亡対照から分離しなければ、壊れているのは指標であって候補ではない。\r\n候補判定に進まず停止する」を判定規則の先頭に事前登録しておく。工程1のv1は実際に\r\nここで停止し、欠陥指標で候補4本を判定する事故を防いだ。検品規則がなければ\r\n「候補全滅」という誤った結論がそのまま通っていた。\r\n\r\n### 15-8. 物差しの修正は「汚染の開示＋歯止め」つきで1回限り\r\n\r\n結果を見た後の指標修正は事前登録原則の例外であり、無条件には許されない。\r\n工程1で用いた手続き前例:①新指標の合格ラインは、その値を誰も計算していない時点で\r\n凍結する（相対方式は変更しない）②指標の選び方（中央値か平均か等）で結論が変わると\r\n判明した指標は、どちらを選んでも疑いが残るため判定から除外する③修正は1回限りと\r\n宣言し、再失敗したら指標でなくアプローチ自体を疑う。汚染の事実は指示書と結果ファイル\r\nの両方に記録として残す。\r\n\r\n### 15-9. 僅差killの敗者復活をしない\r\n\r\nFA（反転札）はM2'点推定では閾値を+0.0001上回ったが、事前凍結した「CI下限で判定」の\r\n規則により−0.001でkillとなった。ここで「実質合格では」と言い出すのが事後的な\r\n閾値再解釈の入口である。僅差だったという**観察**は記録に残す。しかし**行動**\r\n（敗者復活）には変換しない。境界事例の扱いこそ、事前登録の価値が試される場面。\r\n\r\n### 15-10. 事前登録文書には「1試行」の単位定義を含める\r\n\r\nv0-C事前登録で「ディール」が2つの意味（1回の手札配り／1ゲーム）で読める不整合があり、\r\n実装が停止した。中止条件（自己判断せず停止）は機能したが、事前登録に単位の語彙表\r\n（「本文書で1ディールとは○○を指す」）を1行含めておけば、停止自体が不要だった。\r\n判定指標の分母となる単位語は、閾値と同格の凍結対象として扱う。\r\n\r\n### 15-11. 検証は「必要条件の階段」として設計する——手前のPassは次の段を保証しない\r\n\r\n思考課金ポーカーの蘇生手続きは、乖離の実在（工程1・測定のみ）→ 行動反転（K2）→\r\n勝率への換金（K1）という3段で構成された。結果、工程1とK2を通過してもK1で死んだ。\r\n各段は次の段の必要条件にすぎず、積み上げても最後の段の保証にはならない。\r\n\r\nこれは失敗ではなく、この構造の成果である：安い順に並べた階段が、FA/FC系3土台を\r\nゲーム実装なしで棄却し（工程1）、残るFBもシミュレータ1本で最終判定まで到達させた。\r\nゲームを組んでから死因を探る従来の順序に比べ、廃棄コストが大幅に下がった。\r\n\r\n> **原則：核の生死に必要な条件を分解し、安く測れる順に階段として並べる。\r\n> 各段のPassを「生存の証拠」ではなく「次の段へ進む資格」として扱う。**\r\n\r\n## 16. ソロ切片運用実績 ―― ブラフ核/伝達核系譜（2026-07）\r\n\r\n### 16-1. ソロ切片＝ネガティブフィルタの初運用実績\r\n\r\n3連続運用（v0埋葬→v0.1微妙→v1.0通過）で各判断が1日内に完了。ソロは殺すためだけに\r\n使い、生存証明にはしない運用が機能した。\r\n\r\n### 16-2. 検証範囲の事前宣言\r\n\r\nソロで測れる項目と測れない項目を定義ファイルに事前宣言することで、「未確認」と\r\n「不合格」の混同を防げた（v1.0の②④⑤は宣言どおり未確認扱いで4人卓へ持ち越し）。\r\n\r\n### 16-3. 系譜最終改訂の事前宣言\r\n\r\n同一死因への改訂が2回続いた時点で「次を最後の構造改訂とし、以後は系譜kill/keep\r\n議論」と宣言することで、無限改訂による延命を封鎖できた。\r\n\r\n### 16-4. 判断種別の記録\r\n\r\nkill/keep系の判断には「実プレイ判定か机上判断か」の種別を必ず残す（机上分類は\r\n信頼できない、の既存知見の運用形）。\r\n\r\n## 17. 候補6ライン開始前埋葬(2026-07)からのプロセス知見\r\n\r\n出典：`claude_埋葬記録_候補6ライン_ゲート抵触による開始前埋葬_2026-07-20.md`\r\n（設計チャット発行、埋葬日2026-07-20、判断種別＝机上／統制文書照合）§6。\r\n\r\n### 17-1. 凍結済みと参照可能は別\r\n\r\n今回の根因。最上位の統制文書（CLAUDE.md §7-i／PROJECT.md §3-5／現行入口／旧KILL系譜マトリクス）が、判断主体である設計チャットのコンテキストに一度も入っていなかった。統制は宣言された時点ではなく、**判断者が読める場所に置かれた時点で**有効になる。\r\n\r\n> **原則：判断を行う主体のコンテキストに、その主体を拘束する条項が入っていること自体を、運用開始条件として点検する。**\r\n\r\n§14-5（発行済みと受領済みは別）の同型。今回は「凍結した」と「判断者が参照できる」がずれていた。\r\n\r\n### 17-2. 中心動詞は宣言ではなく従属関係で判定する\r\n\r\n設計側は中心動詞を「留める」と宣言していたが、同じ文書に「動詞が目的に奉仕する」と書いてあった。**宣言された中心動詞と、目的に対する従属関係から導かれる中心動詞が食い違うとき、後者が真である。**\r\n\r\n> **判定法：勝利条件を達成するために不可欠な行為を列挙し、他の行為が「それを可能にするため」に存在していないか調べる。奉仕する側は中心動詞ではない。**\r\n\r\n系譜照合を宣言ベースで行うと、この形の取り違えが素通りする。\r\n\r\n### 17-3. 凍結順序は情報先行設計の物証になる\r\n\r\nINFORMATION_FIRST_DESIGN は、設計中は自覚しにくい。しかし**凍結事項に番号を振っていれば、順序が証拠として残る。**情報機構の凍結番号 < 目的の凍結番号 なら該当を疑う。\r\n\r\n> **運用：凍結事項に「情報機構」「目的・資源葛藤」のタグを付け、後者が先に埋まっているかを定期点検する。**\r\n\r\n### 17-4. 実行側の停止が、判断側の欠陥を検出した\r\n\r\n今回、抵触を発見したのは Claude Code（実行側）であり、設計チャット（判断側）ではない。CLAUDE.md §6「設計の是非を問われたら、実装せずに設計側で決めるべきと差し戻す」が、想定されていなかった方向（判断側の統制違反の検出）で機能した。\r\n\r\n> **知見：役割分離は、下流が上流を検査する経路としても働く。実行側に「上流の前提条件を確認してから着手する」を課しておくと、上流の欠陥が実行直前に捕捉される。**\r\n\r\n### 17-5. 開始前埋葬は最も安い埋葬である\r\n\r\n本件の埋葬コストは設計チャット数回分。実装・シミュレーション・テスターのいずれも消費していない。統制体系（ゲート）は、**プレフライトよりさらに手前に置かれた最安のフィルタ**として機能した。\r\n\r\n---\r\n\r\n## 18. プロセス規律は、作品の目的階級に比例させる\r\n\r\n本プロジェクトの検証装置（事前登録・kill条件・Phase分割・観察項目の凍結）は、**製品候補＝系譜に載る核**のために設計されたものである。\r\n\r\n一発ネタ（身内で1回だけ遊んで消費される余興）に同じ装備を着せると、**過剰装備になる。判定する未来がないものに判定基準は要らない。**\r\n\r\n**実際に起きた事故（2026-07-23）：** design chatは『こたえあわせ（仮）』を製品ラインと誤認し、「kill条件が凍結されないまま実装がv0.9まで進んでいる」を規律違反として2ターン分指摘した。ユーザーからの「一発ネタである」の一言で前提が崩れ、指摘ごと撤回した。\r\n\r\n> **原則：作品の目的階級（製品候補／実験切片／一発ネタ）を、着手時に宣言する。**\r\n> 宣言がないと、実行側も設計側も、どの装備を着るべきか判断できない。\r\n\r\n**副次の教訓：** 引き継ぎメモに目的階級が書かれていないと、チャットを跨いだ時点で情報が落ちる。\r\n"}, {"id": "ボードゲーム制作_実装技術知見_md", "file": "ボードゲーム制作_実装技術知見.md", "title": "実装技術", "sub": "Firebase・UI・運用の実務", "icon": "🔧", "md": "# オンラインボードゲーム実装 技術知見(HTML+JS+Firebase)\n\n**「実装するときに使う」知見**をプロジェクト横断で統合したもの。\n設計・検証プロセスは「プロセス検証知見」、現行プロジェクトの運用は「魔女の調合_引き継ぎ資料」を参照。\n\n| 章 | 内容 | 主な出所 |\n|---|---|---|\n| §1 | 基盤設計の原則(イベントソーシング・権威・非公開情報・同期) | 旧・知見まとめ§6 |\n| §2 | 共有状態設計の教訓(競合・権限・幽霊・リトライ・エラー可視化) | multiplayer_engineering_lessons |\n| §3 | Firebase・秘匿・状態管理の追加知見 | 秘匿協力§6/総合まとめ§4 |\n| §4 | アーティファクト→Firebase移行リファレンス(シム・雛形) | firebase_migration_reference |\n| §5 | UI/UXの原則と致命的ミス | 旧・知見まとめ§5/総合まとめ§5 |\n| §6 | UX実装レシピ集(コード付き・コピペ可) | 秘匿協力§5 |\n| §7 | Windows + Claude Code 開発環境の罠 | Claude Code運用チャット(2026-07) |\n\n<!-- TOC -->\n## 目次\n\n- [1. 基盤設計の原則(イベントソーシング・権威・同期)](#1-基盤設計の原則イベントソーシング権威同期)\n  - [基盤設計](#基盤設計)\n  - [Firebase特有の要点](#firebase特有の要点)\n  - [リアルタイム同期の注意](#リアルタイム同期の注意)\n  - [この構成で作りやすいUI改善(実装しやすさ順)](#この構成で作りやすいui改善実装しやすさ順)\n- [2. 共有状態(オンライン対戦)設計の教訓 ― 『針の上の女神たち』(第1作)より](#2-共有状態オンライン対戦設計の教訓--針の上の女神たち第1作より)\n  - [2-1. 「最後に書き込んだクライアントが勝つ」問題（read-modify-write競合）](#2-1-最後に書き込んだクライアントが勝つ問題read-modify-write競合)\n  - [起きたこと](#起きたこと)\n  - [教訓・パターン](#教訓パターン)\n  - [2-2. 「見えなくする」だけでは「操作できなくする」ことにはならない](#2-2-見えなくするだけでは操作できなくすることにはならない)\n  - [起きたこと](#起きたこと-1)\n  - [教訓・パターン](#教訓パターン-1)\n  - [2-3. 秘密情報は「見た目を隠す」だけでなく「構造で漏らさない」](#2-3-秘密情報は見た目を隠すだけでなく構造で漏らさない)\n  - [2-4. 「幽霊」対策は、性善説では機能しない](#2-4-幽
