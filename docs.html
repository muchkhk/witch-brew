<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ボードゲーム設計論 — 資料</title>
<meta name="theme-color" content="#12141a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2312141a'/><path d='M8 7h16M8 13h16M8 19h11M8 25h11' stroke='%23e0b352' stroke-width='2.4' stroke-linecap='round'/></svg>">
<style>
:root{
 --bg:#12141a; --bg2:#181c23; --bg3:#222732; --bg4:#2b3140;
 --line:#333a49; --line2:#454e60;
 --ink:#e9edf4; --ink2:#c3cbd8; --muted:#8d95a5;
 --gold:#e0b352; --gold2:#f5d99a; --good:#7fd6a0; --bad:#e88b8b; --blue:#6cb6e8;
 --ui:"Yu Gothic","Hiragino Kaku Gothic ProN",-apple-system,system-ui,sans-serif;
 --ttl:"Yu Mincho","Hiragino Mincho ProN",serif;
 --mono:"SF Mono",Consolas,"Courier New",monospace;
 --side:290px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);line-height:1.85;font-size:15px}
a{color:var(--gold2)}

/* 進捗バー */
#prog{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));z-index:100;width:0;transition:width .1s}

/* サイドバー */
#side{position:fixed;left:0;top:0;bottom:0;width:var(--side);background:var(--bg2);
 border-right:1px solid var(--line);overflow-y:auto;z-index:50;transition:transform .25s}
#side::-webkit-scrollbar{width:8px}
#side::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.brand{padding:18px 16px 12px;border-bottom:1px solid var(--line)}
.brand h1{font-family:var(--ttl);font-size:16px;letter-spacing:.14em;margin:0;color:var(--gold2)}
.brand .b2{font-size:11px;color:var(--muted);margin-top:2px}
#q{width:100%;margin-top:12px;background:var(--bg3);border:1px solid var(--line);color:var(--ink);
 border-radius:8px;padding:8px 11px;font:inherit;font-size:13px}
#q:focus{outline:none;border-color:var(--gold)}
.docs{padding:8px 0 60px}
.doc{border-bottom:1px solid var(--line)}
.dh{display:flex;gap:9px;align-items:flex-start;padding:11px 14px;cursor:pointer;transition:.12s}
.dh:hover{background:var(--bg3)}
.dh.on{background:var(--bg3);border-left:3px solid var(--gold);padding-left:11px}
.dh .ic{font-size:15px;line-height:1.5}
.dh .t{font-weight:700;font-size:13.5px;color:var(--ink)}
.dh.on .t{color:var(--gold2)}
.dh .s{font-size:10.5px;color:var(--muted);line-height:1.5;margin-top:1px}
.toc{display:none;padding:2px 0 10px}
.toc.open{display:block}
.toc a{display:block;text-decoration:none;color:var(--ink2);font-size:12px;line-height:1.55;
 padding:4px 14px 4px 0;transition:.1s;border-left:2px solid transparent}
.toc a:hover{color:var(--gold2);background:var(--bg3)}
.toc a.h1{padding-left:20px;font-weight:700;color:var(--ink);margin-top:6px;font-size:12.5px}
.toc a.h2{padding-left:30px}
.toc a.h3{padding-left:42px;color:var(--muted);font-size:11.5px}
.toc a.act{color:var(--gold2);border-left-color:var(--gold);background:rgba(224,179,82,.07)}

/* 本文 */
main{margin-left:var(--side);padding:34px 40px 120px;max-width:900px}
h1,h2,h3,h4{font-family:var(--ttl);letter-spacing:.04em;scroll-margin-top:20px}
main>h1{font-size:27px;color:var(--gold2);border-bottom:2px solid var(--line2);padding-bottom:12px;margin:34px 0 18px}
main>h2{font-size:21px;color:var(--gold2);margin:38px 0 12px;padding-left:11px;border-left:4px solid var(--gold)}
main>h3{font-size:17px;color:var(--ink);margin:28px 0 8px}
main>h4{font-size:15px;color:var(--ink2);margin:20px 0 6px}
main p{margin:12px 0}
main ul,main ol{padding-left:24px}
main li{margin:5px 0}
main strong{color:var(--gold2)}
main em{color:var(--blue);font-style:normal}
blockquote{margin:16px 0;padding:12px 16px;background:var(--bg2);border-left:4px solid var(--gold);
 border-radius:0 9px 9px 0}
blockquote p{margin:6px 0}
blockquote strong{color:var(--gold2)}
code{background:var(--bg3);padding:2px 6px;border-radius:5px;font-family:var(--mono);font-size:.88em;color:var(--gold2)}
pre{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow-x:auto;margin:16px 0}
pre code{background:none;padding:0;color:var(--ink2);font-size:12.5px;line-height:1.65}
table{border-collapse:collapse;width:100%;margin:18px 0;font-size:13.5px;display:block;overflow-x:auto}
th,td{border:1px solid var(--line);padding:8px 11px;text-align:left;vertical-align:top}
th{background:var(--bg3);color:var(--muted);font-weight:400;font-size:12.5px;white-space:nowrap}
tr:nth-child(even) td{background:rgba(255,255,255,.014)}
hr{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--line2),transparent);margin:36px 0}
main a{text-decoration:none;border-bottom:1px dotted var(--gold)}
main a:hover{border-bottom-style:solid}
mark{background:rgba(224,179,82,.3);color:var(--gold2);padding:1px 2px;border-radius:3px}

/* 検索結果 */
#res{padding:6px 0}
.hit{padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--line);transition:.1s}
.hit:hover{background:var(--bg3)}
.hit .hd{font-size:10.5px;color:var(--gold);margin-bottom:2px}
.hit .hx{font-size:12px;color:var(--ink2);line-height:1.55}
.hit mark{font-weight:700}
.nores{padding:16px 14px;font-size:12px;color:var(--muted)}

/* モバイル */
#burger{display:none;position:fixed;left:10px;top:10px;z-index:60;background:var(--bg3);
 border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 12px;cursor:pointer;font-size:15px}
#veil{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:45}
#top{position:fixed;right:16px;bottom:16px;z-index:40;background:var(--bg3);border:1px solid var(--line);
 color:var(--muted);border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:15px;
 opacity:0;transition:.2s;pointer-events:none}
#top.show{opacity:.85;pointer-events:auto}
#top:hover{color:var(--gold2);border-color:var(--gold)}
@media(max-width:900px){
 #side{transform:translateX(-100%)}
 #side.open{transform:none;box-shadow:0 0 50px rgba(0,0,0,.7)}
 main{margin-left:0;padding:60px 18px 100px}
 #burger{display:block}
 #veil.show{display:block}
 main>h1{font-size:22px}main>h2{font-size:18px}
}
@media print{#side,#burger,#top,#prog{display:none}main{margin:0;max-width:none}}
</style>
</head>

<button id="burger">☰</button>
<div id="veil"></div>

フはどこにあったか--知識状態は公開されている)\r\n  - [6-12. 【設計決定】ダイスの面は「重複あり」―― 演繹でなく帰納にする](#6-12-設計決定ダイスの面は重複あり-演繹でなく帰納にする)\r\n  - [6-13. 【シミュレーション実測】核の修正 ―― C(伝播)は毒だった](#6-13-シミュレーション実測核の修正--c伝播は毒だった)\r\n  - [6-14. 【核の実証】横取りNPCを入れた瞬間、核が立った ―― そして重大な検証ミスの記録](#6-14-核の実証横取りnpcを入れた瞬間核が立った--そして重大な検証ミスの記録)\r\n  - [6-15. 【中止】『影の賽』―― 死因と、そこから得た最重要原理](#6-15-中止影の賽-死因とそこから得た最重要原理)\r\n  - [6-16. 【保留中のアイデア】シュレディンガーのサイコロ](#6-16-保留中のアイデアシュレディンガーのサイコロ)\r\n  - [6-17. 【開発中止】フリーサイコロ ―― 自由を消費するダイス](#6-17-開発中止フリーサイコロ--自由を消費するダイス)\r\n  - [6-18. 【★成立】影の競り ―― 初めて「面白い」に到達した設計](#6-18-成立影の競り--初めて面白いに到達した設計)\r\n- [死因5：フリーサイコロ ―― 罰は建ったが、緊張が現在に来なかった（2026-07）](#死因5フリーサイコロ--罰は建ったが緊張が現在に来なかった2026-07)\r\n- [死因6：思考課金ポーカー ―― 無料の推定が、有料の事実を駆逐した（2026-07）](#死因6思考課金ポーカー--無料の推定が有料の事実を駆逐した2026-07)\r\n- [情報経済設計の原則 ―― ブラフ核/伝達核系譜からの帰納（2026-07）](#情報経済設計の原則--ブラフ核伝達核系譜からの帰納2026-07)\r\n  - [私的購入と公的シグナルの区別](#私的購入と公的シグナルの区別)\r\n  - [秘密は圧縮可能な1概念にする](#秘密は圧縮可能な1概念にする)\r\n  - [伝達の非対称性には機械的な鍵が要る](#伝達の非対称性には機械的な鍵が要る)\r\n  - [相関する評価軸の設計](#相関する評価軸の設計)\r\n  - [燃焼式生命経済](#燃焼式生命経済)\r\n  - [記録は自動・推論は手動](#記録は自動推論は手動)\r\n  - [フォールド＝代金を払った情報拒否権](#フォールド代金を払った情報拒否権)\r\n- [1. 「全く新しい」への正直な前提](#1-全く新しいへの正直な前提)\r\n- [2. 新規性の鉱脈は「新しい素材/媒体」に眠る](#2-新規性の鉱脈は新しい素材媒体に眠る)\r\n- [3. 新メカニクスの評価 ― 体系をチェックリストに使う](#3-新メカニクスの評価--体系をチェックリストに使う)\r\n  - [決定的な判定基準:「穴が既知技法で塞げるか」](#決定的な判定基準穴が既知技法で塞げるか)\r\n- [4. 敗北感(§4-1)が、新規考案の最強フィルター](#4-敗北感4-1が新規考案の最強フィルター)\r\n- [5. 検査で得た副次的教訓](#5-検査で得た副次的教訓)\r\n- [6. 【中心命題】核を活かす土台の選び方 ― 足し算 vs 掛け算](#6-中心命題核を活かす土台の選び方--足し算-vs-掛け算)\r\n  - [選定の4条件(核が「リスク選択」型の場合の例)](#選定の4条件核がリスク選択型の場合の例)\r\n  - [足し算の土台 vs 掛け算の土台](#足し算の土台-vs-掛け算の土台)\r\n  - [噛み合いの正体](#噛み合いの正体)\r\n  - [ただし:足し算と掛け算は排他ではない](#ただし足し算と掛け算は排他ではない)\r\n  - [土台候補の評価例(核=「盲目取得×高倍率」)](#土台候補の評価例核盲目取得高倍率)\r\n- [7. 方法論のまとめ ― 新メカニクス設計の手順](#7-方法論のまとめ--新メカニクス設計の手順)\r\n  - [A-1. ゲームを「つまらなくする」設計(実例つき)](#a-1-ゲームをつまらなくする設計実例つき)\r\n  - [A-2. 8つの楽しさの「保ち方」と「壊し方」](#a-2-8つの楽しさの保ち方と壊し方)\r\n\r\n<!-- /TOC -->\r\n\r\n---\r\n\r\n# 第1部 体系まとめ\r\n\r\nこのドキュメントは、ボードゲーム設計に関する議論を体系的に整理したものです。\r\n機構(メカニクス)から認知・心理・体験の設計まで、一本の背骨に沿って構成しています。\r\n\r\n> **全体を貫く背骨:**\r\n> 「**意味のある選択を、リプレイに耐える形で、時間を通じて途切れさせず、意味(テーマ)を伴わせる**」\r\n> 本ドキュメントの全技法は、この一文に奉仕している。\r\n\r\n---\r\n\r\n## 0. 前提:面白さの8分類(LeBlanc)\r\n\r\n設計の出発点。ゲームが提供する快感を8つに分類したもの。**主軸を1〜2個に絞る**のが鉄則(全部盛りは焦点がぼやける)。\r\n\r\n1. **感覚(Sensation)** — 見た目・手触りそのものの快感\r\n2. **幻想(Fantasy)** — 別の何かになりきる楽しさ(テーマ)\r\n3. **物語(Narrative)** — プレイ中に立ち上がる劇的な展開\r\n4. **挑戦(Challenge)** — 障害を乗り越える手応え\r\n5. **交流(Fellowship)** — 人と一緒にいること自体の楽しさ\r\n6. **発見(Discovery)** — 未知を探る楽しさ\r\n7. **自己表現(Expression)** — 自分らしさを盤面に刻む\r\n8. **没入(Submission)** — 頭を空にして手続きに身を委ねる心地よさ\r\n\r\n**設計の起点順序:** 主軸の楽しさ → 構造 → メカニクス → 対応人数。上流から降りると矛盾が出にくい。\r\n\r\n---\r\n\r\n## 1. 骨格 ― プレイヤー人数と対戦/協力の構造\r\n\r\n人数と構造は独立でなく、**互いに強く縛り合う**。\r\n\r\n### 構造のスペクトラム\r\n- **全面対戦(競争)** — 全員が敵。独走・キングメイク・ダウンタイムが集中する。**人数が増えるほど設計難度が跳ね上がる。**\r\n- **協力(全員 vs ゲーム)** — ダウンタイム・キングメイクは消えるが、**奉行問題**(一番上手い人が全員を指示)が固有の病。非公開情報・同時進行・時間制限で「一人の脳に支配させない」のが定石。\r\n- **半協力・チーム戦** — 最もリッチ。下位パターン:\r\n  - チーム対チーム(情報共有の範囲が勘所)\r\n  - 一人 vs 全員(非対称の緊張。孤独な側の力とわくわくが核心)\r\n  - 裏切り者・正体隠匿(発見に依存 → 情報が割れると死ぬ。少人数では成立しにくく5人以上を要求しがち)\r\n  - \"半協力\"(表は協力・裏に自分の勝利。例:ネメシス。「協力しないと全滅、しすぎると勝てない」綱渡り)\r\n\r\n### 人数と構造の縛り合い\r\n- **2人** — 対戦は最もクリーン(キングメイク・ダウンタイムが原理的に起きにくい)。協力・正体隠匿は成立しにくい。\r\n- **3〜4人** — 幅広いが、**3人competitiveはキングメイクの温床**。\r\n- **5人以上** — 正体隠匿・チーム戦・パーティの本領。ただし重量級全面対戦はダウンタイムが致命的。同時性・短い手番が構造的に要求される。\r\n\r\n**注意:** 「その構造は、想定する全人数で同じくらい面白いか?」対応人数を広げるほど、人数ごとの微調整が必要になる。\r\n\r\n---\r\n\r\n## 2. メカニクスの動態\r\n\r\n個別部品を知るのは入口。設計の勝負は「**部品が組み合わさると何が起きるか**」。\r\n\r\n### 2-1. 個別メカニズム俯瞰(生む楽しさ付き)\r\n- **ワーカープレイスメント** — 早取り。相互作用を自然に埋め込む。人数で競争激しさが変わる。\r\n- **デッキ/バッグ構築** — 自己表現。「今強いカードは将来デッキを薄める」ジレンマが核。\r\n- **エリアマジョリティ** — 間接対決。「僅差の2位が一番損」が読み合いを生む。\r\n- **セットコレクション** — 目標が明快。同じものを狙うと奪い合い。\r\n- **トリックテイキング** — 少ないコンポーネントで深い読み合い(高いジレンマ密度)。\r\n- **エンジンビルド** — 自己表現の花形。ソリティア化・消化試合化・独走の温床。\r\n- **非対称能力** — リプレイ性を上げるがバランス調整コストが跳ね上がる。\r\n\r\n### 2-2. フィードバックループ ― 独走とキャッチアップの綱引き【心臓部】\r\n\r\n**正のループ**(勝ちがさらに勝ちを生む)は達成感の源泉。悪ではない。課題は「消す」ことでなく「**どこで頭打ちにするか**」。\r\n歯止めの手法:\r\n- 収穫逓減(伸ばすほど効率低下)\r\n- 上限(キャップ)\r\n- コスト逓増(拡大するほど次が高い)\r\n- 時間による強制終了\r\n\r\n> **重要:** 独走が病気になるのは「勝敗確定からゲーム終了までのラグが長いとき」だけ。ラグを短くすれば独走は問題化しない。\r\n\r\n**負のループ**(勝つほど不利)は逆転余地を残すが、効かせすぎると**ゴム紐(rubber-banding)問題**(頑張っても引き戻され、わざと2位に潜む)。\r\n質を分ける決定的違い = **「実力を無効化するか / 手段を与えるか」**:\r\n- 悪い:トップに問答無用の罰、下位に無条件ボーナス → 実力が埋もれる\r\n- 良い:トップは「的」になる(守れば逃げ切れる)、下位に「選択肢」が開く(活かすかは本人)\r\n\r\n**成熟した設計は正と負を別レイヤーで同時に効かせる:**\r\n正のループ(達成感) + 収穫逓減(上限) + トップ叩き(首位への逆風) + まとめ得点(結果を最後まで伏せる)\r\n\r\n**自己診断4問:** ①正のループはどこか ②その頭打ちはどこか ③首位はどう抑えられるか ④勝敗が見えてから終了まで何手あるか\r\n\r\n### 2-3. キャッチアップ実装カタログ(理不尽さの少ない順)\r\n1. **ターン順補正** — 後手番に補償。最も自然、副作用ほぼなし、効果は穏やか。\r\n2. **コスト逓増/収穫逓減** — 構造的。「罰されている」感覚が出ない(恨みが生じない)。\r\n3. **トップ叩き** — プレイヤー駆動で理不尽さが出ない。ただし2人で不成立/「叩き役の負担」問題(対策:叩きが自分の前進も兼ねる)。\r\n4. **条件付きボーナス** — 無条件でなく条件付きにすると実力が残る。\r\n5. **変動する得点源** — 首位の最適化を陳腐化。長期計画とのトレードオフ。\r\n\r\n> **ゴム紐に転落する境界線:** 補正が「自動発動」か「選択の余地があるか」。自動 = 実力を埋める。選択が要る = 実力が残る。\r\n\r\n### 2-4. ジレンマ設計 ― 面白い選択の中身\r\n**良いジレンマの3条件:** ①どの選択肢にも一長一短(上位互換なし) ②最適解が状況で入れ替わる ③選択の重みをプレイヤーが理解できる(**悩む材料が見えている**)。\r\n\r\n**4つの基本型:**\r\n- **(a) 今か将来か** — テンポ vs 投資。最も普遍的で強力。「いつ投資をやめて刈り取りに移るか」の二次ジレンマも生む。\r\n- **(b) 幅か深さか** — 汎用(安定・上限低)vs 特化(強い・脆い)。収穫逓減があると成立。\r\n- **(c) 確実か賭けか** — リスク/リターン。期待値を均衡させ、局面で傾きが変わると深い。\r\n- **(d) 自分の得か他人の妨害か** — 相互作用の源泉。「妨害が自分の前進も兼ねる」設計が健全に保つ鍵。\r\n\r\n**痩せさせる要因:** 支配的戦略/情報不足(博打化)/選択肢の同質化/トレードオフの不在。\r\n**密度の視点:** 「この手番の長さに見合うジレンマがあるか」(ダウンタイム問題と接続)。\r\n\r\n### 2-5. ランダム性 ― 量ではなく\"位置\"\r\n\r\nランダム性は敵ではない:リプレイ性(発見)・実力差の緩衝・ドラマ(物語)・AP抑制を担う。\r\n\r\n**決定的区別:**\r\n- **入力ランダム性(判断の\"前\"に確定)** — 引いた手札等。**状況対応(挑戦)を生み、負けても納得**(判断に帰属できる)。\r\n- **出力ランダム性(判断の\"後\"に確定)** — 宣言してからダイス。**緊張とドラマ(物語)を生むが、良い判断が覆ると理不尽**。\r\n\r\n> 同じ「ダイスを振る」でも、判断の前か後かで体験は正反対。主軸(挑戦か物語か)で選ぶ。\r\n\r\n**出力ランダム性を飼いならす技法:** 確率の可視化/操作、期待値の保証(下振れの底上げ)、ランダム性の分散(小さな判定を多数回)、緩和手段(保険・ヘッジ)。\r\n\r\n**実力と運の両立:** 入力ランダム性を主軸にし、その活用の巧拙で実力差を出す(運が結果に、実力がプロセスに)。ポーカー型。\r\n\r\n### 2-6. 入力ランダム性を生むメカニズムの比較\r\n**ドラフト3系統:**\r\n- クローズド(ブースター型) — 相手の意図を推測する読みの層。間接的相互作用。\r\n- オープン(共有市場) — 直接的な奪い合いの緊張。情報透明でAPが出やすいが初心者に優しい。\r\n- ダイス・ドラフト — 出力ランダム性を入力に変換する巧妙な仕掛け(振った\"後\"に選ぶ)。\r\n\r\n**その他:** デッキ/バッグビルド(運の総量を自分で設計 → 引きの悪さも半分は自己責任=納得感)、共有場の補充(全員に同じ運 → 実力と運の両立が最もクリーン)。\r\n\r\n**選ぶ指針:** 読み合い→クローズド / 奪い合い→オープン / リスク設計→ビルド系 / ドラマ→ダイス。\r\n\r\n### 2-7. 非対称能力のバランス取り\r\n**深さの3段階:** 浅い(スタート差・調整楽) → 中(能力差・相性でずれ始める) → 深い(ルールが違う。例:ルート。リプレイ性最大・調整は悪夢的)。\r\n\r\n深い非対称は数値では取れない。定石2つ:\r\n- 勝利条件そのものを非対称にする(異なる目的が同じ盤面でぶつかる)\r\n- 相互抑制(メタ的ジャンケン)で関係性の網の中で均衡させる\r\n\r\n> **鉄則:** 完全均衡は目指さず「どの陣営にも勝ち筋がある」を保証。優先順位は**\"最強を弱くする\"より\"最弱を救う\"が先**(勝てない陣営を引いた人の体験が死ぬ)。\r\n\r\n---\r\n\r\n## 3. 認知と心理\r\n\r\n### 3-1. 選択肢の数と認知負荷\r\n判断しやすさの目安:**3〜5個**=快適に比較 / **6〜8個**=負荷が立ち上がる / **十数個以上**=多くの人が全評価を諦めヒューリスティックで決める。\r\n\r\n> **本質:** つらさを決めるのは数そのものでなく認知負荷の総量。\r\n> **負荷 ≒ 選択肢の数 × 一つあたりの評価の深さ × 相互作用の複雑さ**\r\n> チェスの合法手は30以上あるが熟練者はパターン認識で大半を瞬時に切り捨てる。\r\n\r\n**設計は「数を減らす」より「負荷を減らす」**(数を削ると面白さごと削れる):\r\n- 構造化・グルーピング(二段階選択で同時に向き合う数を少数に)\r\n- 局面による自然な絞り込み(良い設計は副次的にこれを持つ)\r\n- 段階的な選択肢の開放(習熟に合わせて増やす)\r\n- 時間軸での分散(1手番あたりの負荷を平準化)\r\n\r\nプレイヤー層で適正数は変わる(ライト=2〜4、ゲーマー=パターン認識前提でより多くても可)。\r\n\r\n### 3-2. アナリシス・パラリシス(分析麻痺)\r\n正体 = 「検討空間の広さ」と「決定の重要度」が両方高いのに**打ち切る基準がない**状態。\r\n発生4条件:①検討空間が広い ②決定が重い(不可逆・高影響) ③情報が十分(**完全情報ほど起きやすい**) ④打ち切る外的圧力がない。\r\n\r\n> APの多くは性格でなく**設計の責任**。構造でコントロールできる。\r\n\r\n**抑制手法(条件別):**\r\n- ①検討空間 → 局面での絞り込み、グルーピング\r\n- ②決定の重さ → 可逆性を上げる、影響を分散(一手に集約しない)\r\n- ③情報 → 適度な隠匿・ランダム性(「読み切れない」と脳は網羅を諦める)\r\n- ④打ち切り → **同時アクション選択**(APとダウンタイムを同時解決。最もエレガント)、緩いタイマー\r\n\r\n> **トレードオフ:** 抑制しすぎると「考える楽しさ(挑戦)」も削る。**「浅くする」のでなく「見通しを良くする」**。②④は手を入れてよい(楽しさを損なわない)、①は削るより整理する。\r\n\r\n### 3-3. 選択肢の\"質\"の設計\r\n質の分類:トラップ(一見良いが悪い)/平凡(状況次第)/支配的(常に最善=選択を殺す)/囮。\r\n**理想:** 「状況によって最善が入れ替わる平凡な選択肢が複数」+「見抜ける罠がいくつか」。\r\n\r\n**囮(トラップ)の扱い ― 諸刃:**\r\n- 良い囮:罠だと**見抜く手がかりが盤面にある** → 洞察が報われる(挑戦・発見)\r\n- 悪い囮:手がかりがなく**経験(暗記)がないと分からない** → 知識ゲー、初心者体験を殺す\r\n\r\n> 境界は一貫して「情報が足りているか」。手がかりのある罠=良いジレンマ、ない罠=意地悪。\r\n\r\n悪い手は「残して学ばせる(発見系)」か「そもそも選べなくして負荷を下げる(挑戦系)」かを主軸で選ぶ。\r\n\r\n### 3-4. 仮説空間には下限もある ― 2択への縮退\r\n\r\n既存則「消去推理が成立するには、仮説空間が有限・公開・列挙可能でなければならない」には、**下限側の条件が書かれていなかった。**\r\n\r\n有限であることは推理の必要条件だが、選択肢が**2択まで縮むと推理は消えて運になる。** 消去はもう働かず、当てずっぽうと区別がつかなくなる。「有限・公開・列挙可能」を満たしていても、要素数が2では消去推理という体験は成立しない。\r\n\r\n> **原則：仮説空間の\"広さ\"には上限（有限であること）だけでなく、下限（推理として機能する最小要素数）もある。** 2択まで縮んだ空間は、形式的には仮説空間の条件を満たしたまま、体験としては推理から運へ転換している。\r\n\r\n**観測例（未確定・判断種別＝実プレイ n=1・事前登録なし）：** 『こたえあわせ』本番で、プレイヤーは2〜3問目に「相手カードの予測に使う数値は、自分の評価か他人の評価かの2択」という構造に気づいた。この観察は正反対の2つの読みを許す。\r\n\r\n- **(a) 気づきの階段：** 一回性の核でも、1問目とは別種の気づきが後続で供給されうる（正の読み）\r\n- **(b) 仮説空間の縮退：** 気づいた瞬間に「あとはどちらか当てるだけ」になり、推理が消えた（負の読み）\r\n\r\n**未確認事項：** 2段目の気づき以降も体験が持続したかは未確認。n=1・事前登録なしのため、本節では(a)(b)いずれとも判定しない。\r\n\r\n---\r\n\r\n## 4. 敗北感の設計\r\n\r\n**プレイヤーの大半は、ほとんどの時間\"負ける側\"にいる。**「また遊びたい」を決めるのは勝利の高揚より敗北の質。\r\n\r\n**良い敗北 vs 悪い敗北の軸 = 「敗因を自分の判断に帰属できるか」:**\r\n- 良い(納得):「あそこでああすれば」→ 学び・再挑戦(「もう一回!」)\r\n- 悪い(理不尽):「どうしようもなかった」→ 無力感(「もういい」)\r\n\r\nこれまで「理不尽」と呼んだもの(出力ランダム性の暴発・手がかりのない囮・キングメイク・早期の詰み)は、**すべて敗因の自己帰属を奪うから理不尽**、と統一的に理解できる。\r\n\r\n**悪い敗北を生む構造:** ①早すぎる敗北確定 ②制御不能な敗因(出力ランダム性)③他者に決められる(キングメイク)④見えなかった敗因(悪い囮)⑤何が悪かったか分からない。\r\n\r\n**良い敗北を設計する手法:** 接戦感を残す(まとめ得点で\"惜しい負け\"を人為的に作る)/敗者にも見せ場・部分的達成/最後まで能動性を保つ(どう負けるかの選択)/敗因を可視化(履歴ログ)/短さという救済(敗北の重さは費やした時間に比例)。\r\n\r\n**協力ゲームの特殊性:** 良い敗北=共有された悔しさ(結束を強める)、悪い敗北=戦犯探し。敗因を個人に集中させない設計が要る。\r\n\r\n**勝者側:** 良い敗北感の設計(接戦を保つ)は同時に良い勝利感も作る(際どい勝利>楽勝)。\r\n\r\n### 4-1. 【重要な但し書き】自己帰属は諸刃\r\n\r\n「自己帰属できる敗北が良い」は**不完全な原則**。自己帰属は程度と文脈を誤ると自責の刃になる。\r\n\r\n- **建設的な帰属:**「あの一手が失敗(可変・行動)」→ 学び。自己効力感を保てる。\r\n- **破壊的な帰属:**「自分はダメだ(不変・能力)」→ 恥・自己否定。再挑戦意欲を削ぐ。\r\n\r\n> 同じ\"自分のせい\"でも、「特定の・可変の・行動」への帰属は健全、「全般的な・不変の・能力」への帰属は有害。\r\n> 丸ごと「実力不足だ」と突きつけるのは、運で負けるのと**同じ無力感の別ルート**(どちらも改善可能性を奪う)。\r\n\r\n**修正された設計目標:** 敗因を「自分の能力」でなく「**自分の特定の選択**」に帰属でき、かつ「**次は改善できる**」と思える形で提示する。\r\n\r\n**辛い自己帰属を避ける手法:**\r\n- 敗因を\"一手\"に局所化(全般化を防ぐ。履歴ログが効く)\r\n- **\"運の逃げ場\"を適度に残す**(自責の緩衝材。完全情報・無運のゲームは負けが100%実力に帰属し精神的にハード)\r\n- 改善の道筋を見せる(成長の可視化)\r\n- 負けの意味を軽くする(短さ・軽いトーン)\r\n\r\n**プレイヤー動機で最適点が逆に振れる:**\r\n- 挑戦を楽しむ層 → 改善可能な形での自己帰属を(運の逃げ場は控えめでよい。ダークソウル型)\r\n- 社交・気晴らしの層 → 自己帰属を和らげる緩衝を厚めに(運・軽さ・全員参加)\r\n\r\n> 核心 = 「**\"敗因は自分にあると気づける\"ことと\"自分を責めさせる\"ことの間の細い線**」を引くこと。前者(気づき)は残し、後者(自責)は緩衝する。\r\n\r\n---\r\n\r\n## 5. アーク設計 ― 時間軸での統合\r\n\r\nアーク=ゲーム全体の緊張・体験の変化の曲線。個別技法が「点」なら、アークはそれを繋ぐ「線」。多くの罠は**特定フェーズ固有の病**だった。\r\n\r\n### 3幕それぞれの役割と固有課題\r\n- **序盤(立ち上げ)** — 可能性の広がり(発見)。課題=選択肢最多・情報最少で**APが起きやすい**+序盤で詰む理不尽。勘所=可逆性を高く、方向を決めやすく。\r\n- **中盤(展開)** — 読み合い・駆け引き。課題=**独走が発生・可視化**+認知負荷のピーク。勘所=キャッチアップ・トップ叩きが主に効く。\r\n- **終盤(収束)** — クライマックス。課題=**消化試合化の温床**。勘所=新しい判断材料(変動得点源)+まとめ得点で結果を伏せる。終盤は\"惰性\"でなく\"最高潮\"に。\r\n\r\n### 緊張曲線の型\r\n- 右肩上がり(クレッシェンド) — 最も満足度が高い。「最後の1手番で決まる」が理想。終盤設計が全て。\r\n- 波型(緩急の反復) — 長時間ゲームの疲労を防ぐ。あえて緩む時間は退屈でなく回復。\r\n- 平坦型 — 避けたい(間延び)。\r\n- 多くの名作 = 基本は右肩上がり + 途中に波。\r\n\r\n### アークを作る仕掛け\r\nフェーズの明示的な切り替え(時代・エポック)/逓増するスケール(後半ほど大きな選択)/情報の段階的開示/加速する終了トリガー。\r\n\r\n### 終了条件(エンドゲーム)【アーク最重要点】\r\n型:固定型(予測可能・機械的)/達成型(レースが緊張を生む・操作の駆け引き)/枯渇型(可視のカウントダウンで終盤の緊張を自動生成)。\r\n\r\n典型的問題:「あと1ターン」問題(不完全燃焼)/終了トリガーの操作/キングメイク的な終了。\r\n\r\n> **良い終了設計:** 終了が**予告される**(全員が数ターン前に察知でき刈り取りへ移行できる)。枯渇型が優れるのは可視のカウントダウンゆえ。**理想は、終了の瞬間が緊張の最高潮と一致すること。**\r\n\r\n**長さの鉄則:** 緊張曲線を維持できる長さを超えると間延びする。**\"少し物足りない\"で終わる方が\"長すぎた\"より満足度が高い。**\r\n\r\n---\r\n\r\n## 6. テーマ性 ― 機構に意味を与える層\r\n\r\nテーマ性は機構論と**直交する軸**でありながら全てに浸透する。「機構が体、テーマが魂」。\r\n\r\n### メカニクスとの3つの関係\r\n- **① 乖離(塗装)** — 後付けの無関係なテーマ。すぐ数字だけ見られる。害はないがテーマの楽しさを取り逃す(多くのユーロ)。\r\n- **② 調和** — メカニクスの動きがテーマ上の出来事と一致。ルールを世界の出来事として直感的に理解できる。\r\n- **③ 融合(theme as mechanic)** — テーマがなければメカニクスが存在意義を失う。半協力そのものが恐怖を生成する(ネメシス)。どちらが先とも言えない。\r\n\r\n> テーマを主軸に据えるなら②以上、没入・物語を売りにするなら③を目指す。軽い抽象ゲームは①でも成立する。\r\n\r\n### 調和したテーマの実利\r\n- ルール学習コストを下げる(テーマは記憶の足場)\r\n- 意思決定を直感的にする(物語的判断が計算より速い=認知負荷を下げる)\r\n- 記憶に残る体験を生む(エピソード記憶 → 語り草 → リプレイ動機)\r\n- 感情移入と没入(敗北感も濃くなる)\r\n\r\n### 乖離の原因(壊すもの)\r\n- **テーマ的に不自然な最適行動**(最多の破壊要因。「仲間を見殺しが最適」で我に返る)。対策=テーマ的に\"らしい\"行動がメカニクス的にも報われる整合。\r\n- メカニクスがテーマの感情を裏切る(ホラーなのに恐怖の瞬間がない)。\r\n- 抽象化しすぎたインターフェース(操作が数値移動に還元される)。\r\n\r\n### 設計プロセスの2流派\r\n- **メカニクス・ファースト**(ユーロ) — 構造を先に、後からテーマ。完成度は高いが乖離リスク。\r\n- **テーマ・ファースト**(アメリトラッシュ/ナラティブ) — 体験を先に、それを再現する機構。没入は強いが機構にガタ。\r\n\r\nどちらから出発しても、優れた作品は最終的に②③の統合に着地させる。\r\n\r\n### 統合度チェック\r\n- 「テーマを別のものに差し替えても成立するか?」成立=①、しない=③寄り。\r\n- 「最適プレイはテーマ的に\"らしい\"か、裏切るか?」\r\n- 「ルールをテーマの言葉で説明できるか?」\r\n- 「プレイ後、\"点数\"でなく\"出来事\"として語れる瞬間があったか?」\r\n\r\n> テーマは機構の弱さを完全には救えない(機構が破綻すればテーマも空回り)。両者は噛み合って初めて相乗する。\r\n\r\n---\r\n\r\n## 結:全体の統合\r\n\r\nすべての技法は、時間軸と体験の層で整理し直せる:\r\n\r\n| 局面/層 | 主な課題 | 対応技法 |\r\n|---|---|---|\r\n| 序盤 | AP・方向づけ | 選択肢設計・可逆性 |\r\n| 中盤 | 独走 | フィードバックループ・キャッチアップ |\r\n| 終盤 | 消化試合化 | 変動得点源・まとめ得点 |\r\n| 全体(時間) | 緊張曲線の維持・終了 | アーク設計・敗北感の早期確定回避 |\r\n| 全体(意味) | 体験に意味を与える | テーマ統合 |\r\n\r\n**背骨の再掲:**「意味のある選択を、リプレイに耐える形で、時間を通じて途切れさせず、意味を伴わせる」。\r\n\r\nつまるところ、良いゲームとは ―― 良いメカニクスを持つだけでなく、それらが**正しい順序で立ち上がり、正しいタイミングで頂点を迎え、正しい瞬間に終わり、その全体に意味(テーマ)が宿っている**もの。個別技法は「意味のある判断を、敗者も含めた全員が、最後まで持てる」という一点に奉仕している。\r\n\r\n\r\n---\r\n\r\n# 第2部 実例編(ケーススタディ)\r\n\r\n第1部(体系)を、具体的な名作で裏づけるケーススタディ集。\r\n\r\n> **4作の位置づけ:**\r\n> ネメシス・ルート・パンデミックが「**プレイヤー間の関係**」という軸の3頂点(半協力・全面競争・純粋協力)を、\r\n> 軽量ゲームが「**予算**」という軸の極(圧縮の極限)を示す。\r\n> 前3作=「構造を選ぶと何と戦うか」、軽量ゲーム=「予算を削ると何が残るか」。\r\n\r\n---\r\n\r\n## 総括表(先に全体像)\r\n\r\n| 軸 | ネメシス | ルート | パンデミック | 軽量ゲーム |\r\n|---|---|---|---|---|\r\n| 構造(§1) | 半協力(協力を裏切りが侵食) | 全面競争(深い非対称) | 純粋協力 | 様々(主軸1点に凝縮) |\r\n| 主軸の楽しさ(§0) | 物語・恐怖(幻想) | 挑戦・自己表現・発見 | 挑戦・物語 | 主軸1つに全振り |\r\n| 緊張の出所 | 裏切りの疑念+システム | プレイヤーの政治 | システム(敵)のみ | 濃い選択+相互作用 |\r\n| 固有の急所 | バランスのswing | 初心者卓での崩壊 | 奉行問題 | 欠陥が丸裸になる |\r\n| ランダム性(§2-5) | 出力を積極活用 | ほぼ排除 | 敵側に配置 | 短さ+反復で分散 |\r\n| 非対称能力の目的(§2-7) | 勝利条件の分岐 | 遊び方の分岐(発見) | 奉行の抑制 | 浅い非対称に留める |\r\n| 正のループ(§2-2)の置き場 | ― | プレイヤー(要トップ叩き) | 敵(脅威が加速) | 短さで独走を回避 |\r\n| テーマ融合度(§6) | ③融合(差替不能) | ②調和(メカ先) | ②調和(機能的) | ①塗装が多い |\r\n| アーク駆動(§5) | システム駆動 | プレイヤー駆動 | システム駆動 | 圧縮/波型 |\r\n| 原則への態度 | 意図的に破る | 極限まで守る | 構造の宿命と格闘 | 本質だけ残す |\r\n\r\n---\r\n\r\n## CASE 1:ネメシス ― 「原則を破っていい場合」\r\n\r\n**主軸:物語・恐怖。ネメシスは\"納得感\"の原則をあえて破る作品。**\r\n\r\n### 骨格(§1)\r\n「表は協力・裏に自分の勝利」型の半協力の理想的実装。秘密の個人目標が他者の生存や船の行き先と衝突。「協力しないと全滅、しすぎると勝てない」綱渡り。エイリアンが強く協力を強制し、秘密目標が終盤で必ず利害を割る。**前半共闘→後半で裏切り顕在化**という時間的ねじれが、そのままアークを形成。\r\n- **奉行問題の封じ:** 秘密目標により「あいつの指示に従うべきか?でも敵対目標かも」という疑念が支配を成立させない(§1の定石=秘密情報が奉行を殺す)。\r\n\r\n### テーマ融合(§6-③)― 教科書\r\n「別テーマに差し替え可能か?」→ ほぼ不能。メカニクスが恐怖を生成している。\r\n- **侵入者バッグ(ノイズ):** 出力ランダム性(§2-5)を恐怖の演出そのものに転化。「袋に手を突っ込むまで何が出るか分からない緊張」。\r\n- **汚染機構:** 「悪いカードのデッキ構築」で手札が自分の首を絞める。ボディホラー(自分の体を信じられない恐怖)をメカニクスが直接生む。\r\n- **重要:** §6の「乖離の最大要因=テーマ的に不自然な最適行動」の**逆**。テーマ的に\"らしい\"行動(疑う・慎重に動く・感染を隠す)がそのまま最適 → 没入が冷めない。\r\n\r\n### ランダム性 ― 原則を\"あえて破る\"(§2-5)\r\n理論編では「出力ランダム性は納得感を下げる、ユーロは入力を好む」と述べた。**ネメシスは真っ向から逆らう**(戦闘ダイス・出現バッグ、完璧に立ち回っても即死)。「swingy」批判を受ける。\r\n- **だがこれは設計ミスでなく意図的なトレードオフ。** 主軸が「挑戦」でなく「物語・恐怖」で、**出力ランダム性は物語を生む**。戦闘が計算可能なら恐怖でなくパズルになる。**理不尽さこそホラーの燃料。**\r\n- **教訓:** 原則は「守るべき法則」でなく「トレードオフの地図」。主軸次第で最適点が動く。\r\n\r\n### 敗北感(§4)\r\n- 全滅=共有された悔しさ(良い協力的敗北)。\r\n- 戦犯リスクは「そいつには裏切る理由(秘密目標)があった」で個人攻撃を役割に変換。テーマが対人感情の緩衝材。\r\n- **§4-1との関係:** 制御不能な死は理屈上「悪い敗北」のはず。だが**「運の逃げ場が自責を和らげる」**の応用で成立。死が運に左右されるから「実力不足で死んだ」と思わずに済み、「宇宙は理不尽」で片付く。**出力ランダム性が敗北を実力の格付けから守る。**\r\n\r\n### アーク(§5)― システム駆動のクレッシェンド\r\n序盤=静かな探索(恐怖の溜め)/中盤=強個体蓄積・遭遇増(利害の亀裂)/終盤=脱出ポッド争奪で**協力→裏切りの相転移**がクライマックスと一致。船の崩壊=可視のカウントダウン(枯渇型、§5)。終了の瞬間が緊張の最高潮と一致する理想を体現。\r\n\r\n### 非対称(§2-7)\r\n秘密目標で「勝利条件の非対称化」(§2-7の定石①)を実装。ただし**§2-7の鉄則「最弱を救う」は未達成**(引いた目標で難易度がばらつく)。これも「恐怖ゲームでは理不尽に詰むことも体験の一部」という思想の現れ。\r\n\r\n---\r\n\r\n## CASE 2:ルート ― 「原則を守り切るとどうなるか、その代償」\r\n\r\n**深い非対称という調整の悪夢に正面から挑み、原則を極限まで追求。かわいい絵の下に設計の最難問。**\r\n\r\n### 非対称(§2-7)― 「深い非対称」の最前線\r\n市場で最も先鋭的な「深い非対称(ルールが違う)」。陣営を変えると別のゲームになる。\r\n- **マルキ(猫):** 拡大・生産のエンジンビルド。**正のフィードバック最強**、放置で独走。\r\n- **アイリー(鳥):** 「決意」を毎ターン全実行の縛り。失敗で内乱・崩壊。自分で自分を追い込む。\r\n- **アライアンス(同盟):** ゲリラ型。**他陣営の攻撃が逆に燃料**(迫害されるほど支持増)。負のループを内蔵。\r\n- **放浪者:** 単独行動、関係性で得点。ほぼ別ゲー。\r\n\r\nリプレイ性(発見)は桁違いだが、代償として調整は悪夢的(リリース後も継続調整)。\r\n\r\n### 非対称バランスの2定石を\"両方\"使う(§2-7)\r\n- **定石①勝利条件の非対称化:** 共通30点だが到達経路が完全に別 → 能力の絶対比較が無意味に。\r\n- **定石②相互抑制(メタジャンケン):** どの陣営も特定の相手に強く特定に弱い。これがそのまま**キャッチアップ機構(§2-3)**として働く。\r\n\r\n### 核心 ― 「トップ叩き」への依存とその代償(§2-3, §4)\r\n**ルートのバランスは、プレイヤーによる的確なトップ叩きを\"前提\"に成立。** 正のフィードバックは意図的に強いまま残され、止めるのはシステムでなく他プレイヤーの政治判断。\r\n- **問題①スキル依存:** 全員が盤面を読み首位を認識し協調して叩く必要。初心者卓では機能せず独走が通る。「経験者同士だと絶妙、初心者を含むと壊れる」の正体。\r\n- **問題②キングメイク隣接(§1, §4):** 「誰を叩くか」が「誰を勝たせるか」になりうる。直接攻撃可能ゆえ危険が常に隣。\r\n- **評価:** トップ叩き(§2-3で好評価)の**光と影を極限まで引き受けた**。バランスをシステムでなくプレイヤーに委ねた栄光と代償。\r\n\r\n### 認知負荷(§3)― 学習の壁\r\n自分の陣営だけでなく**全陣営の狙い・弱点**の理解が必要(トップ叩きの前提)。負荷=数×深さ×陣営数。学習曲線が急、APも起きやすい。\r\n- テーマ・アート(§6)で入口の障壁を下げるが、緩和は入口まで。「見た目優しく中身硬派」の由来。\r\n\r\n### テーマ性(§6)― 「調和」だが「融合」ではない\r\n②調和寄り。各陣営のメカニクスは勢力の「らしさ」と調和(猫=官僚的統治、同盟=抵抗、鳥=硬直した貴族制)。\r\n- **だがネメシスほどの③ではない。** 「差し替え可能か?」→ 抽象的エリア支配として成立してしまう(戦争ゲーム的下地)。**メカニクス・ファースト**で作られ後からテーマを調和させた。\r\n- **2作の最大の学び:** 同じ非対称・同じ高評価でも、テーマとの結び方の思想が正反対(ネメシス=テーマ先、ルート=メカ先)。\r\n\r\n### アーク(§5)― プレイヤーが作る流れ\r\nネメシスと対照的に、緊張曲線をほぼプレイヤーの相互作用が作る。終了=達成型(30点先取、レース自体が緊張)。達成型の弱点(操作・キングメイク的終了)も抱える。\r\n- **§5への2解答:** システム駆動(ネメシス)=確実に盛り上がるが運で振れる / プレイヤー駆動(ルート)=人間次第で最高にも凡庸にも。\r\n\r\n---\r\n\r\n## CASE 3:パンデミック ― 「純粋協力の宿命=奉行問題」\r\n\r\n**秘密目標も裏切りもない、全員が完全に同じ側。裏切りを取り除くと、協力ゲームは\"自分自身(奉行)\"と戦うことになる。**\r\n\r\n### 骨格(§1)― 純粋協力と唯一の敵\r\n秘密目標がなく情報も利害も完全一致。ネメシスで奉行を殺していた「疑念」がない。結果、**一番上手いプレイヤーが全員の手番を最適指示できてしまう**(quarterbacking)。他プレイヤーはコマを動かす\"手\"に成り下がる。\r\n- **これが純粋協力の構造的急所。** パンデミックの設計はほぼ「奉行の成立をどう防ぐか」の物語。\r\n\r\n### 奉行問題への対抗策(§1, §3)\r\n- **手①役割の非対称(§2-7応用):** 各自が\"自分にしかできないこと\"を持つと奉行が全代行できない。非対称を**発見でなく奉行抑制**のために使う(ルートと逆の目的)。\r\n- **手②情報の部分的隠蔽:** 手札のやり取りに制約。より強い協力ゲーム(ザ・クルー、ハナビ)は相談自体を禁じる。系譜は「秘密情報が奉行を殺す(§1)」の緩やかな適用。\r\n- **手③読み切れなさ(§3-2応用):** 盤面が刻々悪化し相互作用が複雑で、一人が最適解を計算しきれない。**AP抑制の技法(読み切れなさ)を奉行抑制に転用。**\r\n- **正直な評価:** それでも強者がいると奉行は起きやすい。純粋協力の宿命で、後のハナビ・ザ・クルー(情報遮断で物理的に不可能化)への出発点。\r\n\r\n### 敵の設計(§2-2, §5)― 「システムが相手」の緊張\r\n競争ゲームは緊張を他プレイヤーに外注できるが、純粋協力は自前でシステムに作り込む。\r\n- **正のループを\"敵側\"に(§2-2反転):** 感染は放置ほど悪化しアウトブレイク連鎖。正のループを脅威に持たせ「対処が遅れると雪だるま式」の焦燥を生む。\r\n- **アウトブレイク連鎖=物語(§0)の生成装置:** 「南米崩壊が連鎖して3都市アウトブレイク」は点数でなく出来事として語れる。\r\n- **加速する終了トリガー(§5):** エピデミックで感染加速、プレイヤー山札枯渇=時間切れ敗北(枯渇型)。緊張曲線を自動生成。\r\n\r\n### 敗北感(§4)\r\n- 共有された敗北(§4)。僅差の敗北(あと1ターンで治療薬)が強く再挑戦を誘う。敗因分散で§4-1の「自分はダメだ」が起きにくい。\r\n- **だが純粋協力ゆえの戦犯リスク:** ネメシスの秘密目標のような緩衝がなく、「お前があの手番でああしなければ」という明確で反論しにくい戦犯が生じうる。奉行問題と地続き。\r\n- **緩衝:** 感染カードの引き(運)をシステムに持たせ、§4-1「運の逃げ場が自責を和らげる」を応用。戦犯探しを「ウイルスの理不尽」へ逸らす。\r\n\r\n### テーマ性(§6)― 機能的な調和\r\n②調和(ネメシス③とルート②メカ先の中間)。「感染症と戦う」がメカニクスと自然一致、直感で腑に落ちる。ただし差し替え可能(反乱鎮圧・消火でも成立)。\r\n- **真価は§4の緩衝:** 「世界を救う」テーマが敗北を「個人の失敗」でなく「人類の試練」に昇華。\r\n\r\n---\r\n\r\n## CASE 4:軽量ゲーム ― 「予算を削ると何が残るか」(体系の純度計)\r\n\r\n**カテゴリとしての解剖。重量級が\"精巧な機構\"で解く問題の多くを、軽量級は\"短さ\"で解く。**\r\n(例:ラブレター、それは俺の魚だ!、ニムト、パーティ系)\r\n\r\n### 制約が最初の判断を変える(§0, §3)\r\n- **主軸1点への凝縮:** §0「主軸を絞れ」が選択でなく強制。ラブレター=推理一点、ニムト=バッティング読み一点。\r\n- **同時に向き合う要素を極小に(§3-1):** 選択肢を2〜4個に。ラブレターの手番は基本2択。\r\n- **核心洞察:** 軽量は「浅い」のでなく「**選択肢は少ないが1つの選択が濃い**」。負荷=数×深さの、数を切り詰め深さに全振り。トリックテイキングのジレンマ密度(§2-4)が全体思想に。\r\n\r\n### 独走を\"時間切れ\"で解く(§2-2, §5)\r\n精巧な独走抑制(収穫逓減・トップ叩き・まとめ得点)の予算がない → §2-2の最シンプル解**「時間による強制終了」**。§2-2「独走が病気になるのは確定〜終了のラグが長いときだけ」を、ゲーム自体を短くして消す。\r\n- **短さで代替される問題群:** ダウンタイム(§1)・AP(§3-2)・敗北の重さ(§4「短さという救済」)。§4「敗北の重さは時間に比例」の短い側に振り切り、敗北感設計を大幅免除。\r\n- **多数回プレイ:** 複数ラウンド制が§2-5「ランダム性の分散(大数の法則)」を無料で実現。短さと反復が運と実力の両立を提供。\r\n\r\n### アーク(§5)\r\n- **A:超圧縮クレッシェンド** ― ラブレターはカードが減るほど推理精度が上がり緊張増。**アークは長さでなく構造の問題。**\r\n- **B:波型の反復** ― 複数ラウンドが各々小さな山場。ラウンド間の仕切り直しが§5「緩む時間=回復」。\r\n- 終了条件は単純で、§5の繊細な問題(操作・あと1ターン)がほぼ発生しない。\r\n\r\n### 何が本質で何が贅沢品か ― 軽量ゲームの選別\r\n**死守される(=本質):**\r\n- **意味のある選択(§2-4):** 選択肢2つでも濃さは絶対譲らない。選択肢が少ないぶん「偽の選択肢」は即バレでゲーム崩壊。**数は削れるが質は削れない。**\r\n- **適切なランダム性の位置(§2-5)。**\r\n- **相互作用(§1):** マルチプレイヤー・ソリティアを許さない。\r\n\r\n**捨てられる(=文脈次第の贅沢品):**\r\n- 精巧な独走抑制機構(§2-2〜3)→ 短さで代替。\r\n- 敗北感の丁寧な緩和(§4)→ 短さで代替。\r\n- 深い非対称(§2-7)→ 重すぎる。\r\n- テーマ融合(§6-③)→ 描く時間がない。多くは①塗装(ラブレターの求愛設定はほぼ塗装)。\r\n\r\n> **設計論の\"最後の砦\"= 「意味のある選択」と「相互作用」。** 他の全て(独走抑制・敗北緩和・非対称・テーマ融合)は予算がなければ削れるが、この2つを削るとゲームとして成立しない。背骨が予算ゼロまで切り詰めても残る本質だと実証。\r\n\r\n### 軽量ゲーム固有の難しさ ―「簡単に作れる」の罠\r\n- **ごまかしが効かない:** 要素が少なく1つの欠陥が全体を占める。2択の片方が支配的(§2-4)なら100%崩壊。削ぐほど残った粗が目立つ。\r\n- **引き算の設計:** 機能を足す重量級と逆。「このルールは本当に必要か、なくても選択の質が保てるなら削る」の反復。ラブレター16枚は「足りない」でなく「これ以上削れないぎりぎり」。\r\n\r\n---\r\n\r\n## 全体を貫く最終結論\r\n\r\n**「プレイヤー間の関係構造を決めると、\"戦うべき固有の敵\"が決まり、設計努力を注ぐ先が決まる」**\r\n- 純粋協力(パンデミック)→ 敵は**奉行問題**。\r\n- 全面競争・深い非対称(ルート)→ 敵は**バランスとキングメイク**。\r\n- 半協力(ネメシス)→ 敵は**協力と裏切りの綱渡り**。\r\n- 構造は自由な選択だが、選んだ瞬間に固有の急所が宿命として付く。良い設計はその急所に工夫を集中させたもの。\r\n\r\n**「予算を削ると、設計論の何が本質かが見える」(軽量ゲーム)**\r\n- 膨大な技法のほとんどは、「意味のある選択を、リプレイに耐える形で、時間を通じて、全プレイヤーに、途切れさせない」という一点を、より大きな予算でより豊かに達成するための道具。\r\n- 予算が増えるほど道具は増え体験は豊かに(重量級)。減るほど道具は削られ「濃い選択」と「相互作用」だけが残る(軽量級)。**背骨は予算の大小にかかわらず常に同じ。**\r\n\r\n**そして原則の本質(ネメシス vs ルート):**\r\n- 原則を破ったネメシスも守り切ったルートも、どちらも名作。**正解は一つでなく、主軸をどこに置くかで守るべき原則すら入れ替わる。** 同じ出力ランダム性が、ネメシスには味・ルートには毒。テーマ融合が、原則違反を\"欠陥\"から\"味\"に変える。\r\n\r\n\r\n---\r\n\r\n# 第3部 メカニクス各論編\r\n\r\n個別メカニクスを「何を素材にジレンマを作るか」で地図化する。\r\n\r\n> **本編を貫く見取り図:**\r\n> メカニクスは「何でジレンマを作るか」で分類できる ――\r\n> **空間**(移動系)/ **資源**(循環系)/ **時間**(同時進行系)/ **人間関係**(社会系)。\r\n> そして各系統は固有の「バランスが宿る場所」を持つ。\r\n\r\n---\r\n\r\n## 0. 分割統治とその親戚(「私が切り、あなたが選ぶ」)\r\n\r\n**分割統治(divide and choose):** 公平性を、ルールでなく**プレイヤー同士の利害**で自動担保する。切る人は「どう分けても損しない=均等に分ける」に追い込まれる。動機設計で公平が創発する。\r\n\r\n- **多人数版分配(San Marco型):** 手番プレイヤーが束を2〜3山に分け、他が順に取り、本人が最後に残りを取る。「自分が最後」ゆえ均等に分けざるを得ない。切り手が回るのが肝。\r\n- **ダッチオークション(逆せり):** 価格が下がり、最初に「買う」と言った人が取る。早い=確実だが高い、待つ=安いが奪われる。少ない手数で全員に緊張。\r\n- **モダンアート型の競り見本市:** 1作に複数の競り方式が同居。「同じ\"競る\"でも方式で別の読み合い」。\r\n- **プレス・ユア・ラック(インカの黄金):** 続けるほど利益増、ある確率で全損。全員同時に「進む/降りる」を伏せて公開 → 運試しが読み合いに。降りる人が増えるほど残りの取り分増(分配のねじれ)。\r\n\r\n**共通の美学:** 動機・構造で公平や緊張を\"創発\"させる。少ない部品で濃い体験。\r\n\r\n---\r\n\r\n## 1. 移動系メカニクス ― 空間でジレンマを作る\r\n\r\n> **系統の設計原理:バランスが「盤面の静的設計」に宿る。** 労力は「何をできるか」より「どんな地形で動かすか」に向かう。\r\n\r\n### 1-1. ロンデル(空間軸)\r\n円環のアクションを、駒を進めた分だけ選ぶ。1〜3マス無料、それ以上はコスト。\r\n- **核心:「やりたいアクション」と「安く行けるアクション」が構造的にずれ続ける。** 位置関係が§2-4のジレンマ(今か将来か)を毎手番生成。\r\n- **美点:** 選択肢は常に数個(§3-1快適ゾーン)で低認知負荷なのに深い。円環ゆえ周回計画を強制、連続使用に自然なコスト(§2-2収穫逓減に似た抑制)。\r\n- **急所:アクションの配置順が命。** 相性の良いアクションを隣接させると黄金ルート=支配的戦略化。よく使うもの同士を離すとジレンマが生まれる。追加コストの値付けが緊張を決める。\r\n\r\n### 1-2. マンカラ/種まき(数量軸)\r\n一つの器の中身を全部取り、隣接マスへ一粒ずつ配る。着地点と通過マスが結果を左右。\r\n- **核心:一つの「拾う場所」の決断が、複数マスの変化と着地点を同時に確定。** 「逆算のパズル」。ロンデルが位置なら、マンカラは**数量分布**でジレンマを作る。\r\n- **美点:** 配る物理動作が心地よい(§0感覚)。完全情報だが規模を抑えれば読める楽しさとAP回避を両立。配るたび盤面が変わり流動的(発見)。\r\n- **急所:規模と複雑性。** マス・種が多いとAP地獄(ファイブ・トライブスが重い理由)。支配的な回収ルートを防ぐ(マス数を工夫、特殊マス)。終盤の計算ゲー化に注意。\r\n\r\n### 1-3. ピック&デリバリー(移動=輸送)\r\nある地点で積み、別地点で降ろして報酬。巡回セールスマン問題の楽しい版。\r\n- **核心:「積む場所」と「降ろす場所」が同時に最適でないと効率が出ない。** 経路の最適化がパズル。需給が時間変動すると§2-4(今か将来か)が空間上に。\r\n- **急所:他プレイヤーとの経路の絡み。** 独立配送だと§0ソリティア化。同じ荷・ルートの奪い合い、先行配送で価格下落など経路の競合を作る。ブラスは「他人の線に相乗り」で相互依存を実装。\r\n\r\n### 1-4. ネットワーク構築(移動経路を\"作る\")\r\n地点同士を自分の線で接続。2系統:\r\n- **排他型(チケット・トゥ・ライド):** 引かれた線は他人が使えない=早取り競争。隠し目標(繋ぎたい都市)を読み合い、要衝を先に押さえる(§2-4のd型が一石二鳥で立つ)。\r\n- **共有型(パワーグリッド、鉄道株):** 他人の線も対価付きで使える=相乗りの経済。先行投資が後続にタダ乗りされる(§2-2の綱引き)。\r\n- **急所:マップの地理がバランスの大半を決める。** 要衝集中=独走。代替路の有無を地理で調整。マップ自体がデザイン。\r\n\r\n### 1-5. 軌跡が残る移動(移動が盤面を変える)\r\n通った経路が痕跡として残り以降に影響。\r\n- **負の軌跡(それは俺の魚だ!):** 通った氷が消え盤面が縮小・分断。「自分の島に籠るか機動力を保つか」のジレンマが盤面縮小から生まれる。§5のアーク(終盤の緊張)が物理的縮小で自動生成。\r\n- **急所:不可逆性ゆえの序盤の重さ。** 序盤の一手で詰む理不尽(§4-1, §3-2)。対策=不可逆性を時間で逓増(序盤は広く緩やか)。\r\n\r\n### 1-6. 追跡・非対称移動(移動=情報)\r\n片方が移動を隠し、片方が痕跡から推理して追う(§1の一人vs全員 × 移動)。\r\n- **核心:移動が情報戦。** スコットランドヤードは交通手段が手がかりを漏らす。「速く動くと足がつく、慎重だと逃げ切れない」ジレンマ。\r\n- **急所:情報開示のさじ加減が全て。** 出しすぎ=即包囲、隠しすぎ=追い手が作業。逃げ手と追い手の両方が同じくらい面白いかが最難関。\r\n\r\n---\r\n\r\n## 2. 正の軌跡 vs 負の軌跡 ― 特論\r\n\r\n「それは俺の魚だ!」の**負の軌跡(通れなくなる)**に対し、**正の軌跡(他plのメリットになる)**の採用例:\r\n- **共有線路(18xx、ブラス):** 敷いた線を他plも使える。先行優位だが後続にタダ乗りされる。\r\n- **フェロモン/踏み分け道(アリ系):** 通った跡が強化され後続が効率的に通れる。\r\n- **軌跡が資源・得点源:** 通った跡にマーカーを残し誰でも回収可(発見の共有)。\r\n\r\n**正の軌跡の固有の急所=フリーライダー問題:** 投資したインフラを無料で使われると「誰も最初に敷きたがらない」。解決策2つ:\r\n1. **先行者に十分な見返り**(敷設時に得点/収入、本人使用は優先/割安)\r\n2. **タダ乗りに対価**(通行料で軌跡が収入源に → 「使われて嬉しい」に反転。18xxの妙)\r\n\r\n→ **鍵は「足跡を残した本人にも、それ以上のメリットが返る」二重化。**\r\n\r\n| | 負の軌跡 | 正の軌跡 |\r\n|---|---|---|\r\n| 盤面推移 | 縮小・分断 | 拡大・接続 |\r\n| アーク(§5) | 終盤に緊張↑ | 終盤に可動域↑ |\r\n| 相互作用 | 妨害・奪い合い | タダ乗り・相乗りの経済 |\r\n| 急所 | 不可逆な破壊の理不尽 | フリーライダー問題 |\r\n| §2-2との対応 | 陣取り的な正のFB | キャッチアップ的な負のFB |\r\n\r\n→ **同じ「軌跡が残る」でも、破壊か建設かで独走とキャッチアップのどちらに効くかが変わる。** 値付け次第でキャッチアップにも独走にも振れる。\r\n\r\n---\r\n\r\n## 3. 循環系メカニクス ― 資源でジレンマを作る\r\n\r\n**循環 = 使ったものが形を変えて手元/場に戻り再利用される。** デッキ構築(引く→使う→捨てる→戻る)は一形態にすぎない。\r\n\r\n> **系統の設計原理:バランスが「循環の速度」に宿る。** 速すぎ=独走、遅すぎ=停滞。\r\n\r\n### 3-1. バッグビルド(トークンが巡る)\r\nデッキの山札を袋に。順序なくランダムに掴む → 入力ランダム性(§2-5)がより細粒度。\r\n- トークンは組み合わせて機能 → 「引いた複数トークンで何ができるか」の即興パズル。\r\n- 自分で袋を設計 → 「引きの悪さも半分は自己責任」の納得感(§2-5)。\r\n- **急所:袋の希釈問題。** 弱トークンを足すほど強トークンを引きにくい(§2-2収穫逓減が確率で自動発生=優れた自己抑制)。袋のサイズと強弱比率が主戦場。\r\n\r\n### 3-2. ワーカーの循環(労働力が巡る)\r\n置いたワーカーがどう戻るかに妙。\r\n- 時間差回収 → 手元のワーカー数に波、投入タイミングが読み(§2-4今か将来か)。\r\n- 成長/変質して戻る → 労働者自体が循環で変化。\r\n- **急所:回収周期=ゲームのテンポ。** 遅すぎ=手詰まりの停滞、速すぎ=普通のワープレに退化。\r\n\r\n### 3-3. 歯車・ロータリー型(時間が巡る)\r\nリソース/アクションの側が円環を巡る(ロンデルの逆)。\r\n- **ツォルキンの歯車:** 置いたワーカーが回転で強いマスに運ばれる。「早く回収し弱い効果か、待って強い効果か」(§2-4)を物理的回転で表現。**時間がリソースとして循環。**\r\n- 自動進行するので「いつ介入するか」だけを決める(プレス・ユア・ラックに近い少決断)。**待つことが能動的戦略に。**\r\n- **急所:自動進行速度と介入コストのバランス。** 「待つリスク(機会損失)」を適切に効かせる。\r\n\r\n### 3-4. 循環する共有資源(リソースが場を巡る)\r\nリソースが個人所有でなく場・プレイヤー間を巡る。\r\n- 受け渡し型(売った商品が他人の在庫に)、市場型(需給で価格が上下=市場自体が循環系)。\r\n- 「自分が使うと誰かに渡り自分に返るかも」の相互依存 → §0ソリティアを構造的に防ぐ。\r\n- **急所:循環が閉じ(総量保存=ゼロサムでギスギス)か開き(生産消費で増減=発展的だが独走)か。** 開閉度がトーンを決める。\r\n\r\n### 3-5. エンジンとしての循環(変換が巡る)\r\nA→B→C→得点の変換の鎖。ループを組めば自己触媒的な輪(デッキ以外での実装)。\r\n- **急所:正のフィードバックの塊(§2-2)。** 自己増殖=独走の温床。歯止め(収穫逓減・上限・時間切れ)が必須。\r\n\r\n**循環系の共通本質:「消費が終わりでなく次の始まりになる」→ 長期的な巡りの設計を考えさせる。** §2-4(今か将来か)が構造として常時作動。急所は常に「巡りの速度」。\r\n\r\n---\r\n\r\n## 4. 時間軸メカニクス ― 時間でジレンマを作る\r\n\r\nターン制の前提そのものを外す唯一の系統。「時間」自体をジレンマの素材にする。\r\n\r\n### 4-1. 同時手番(Simultaneous Action)\r\n全員が同時に秘密裏に選び一斉公開。時間は離散的。\r\n- 下位型:同時プロット(ロボラリー)/同時選択+バッティング(ニムト、七不思議ドラフト)/ブラインド入札。\r\n- **同時性が2大問題を構造的に消す:**\r\n  - **ダウンタイム消滅(§1):** 全員同時に考える。10人でも一人用と同速。\r\n  - **AP抑制(§3-2):** 他人の手が見えず完全読みが原理的に不可能 → 網羅計算を封じる(最もエレガントなAP対策)。\r\n- **急所:** 解決順序の裁定(衝突時のルール)/計画倒れのカオス(諸刃 ―― パーティなら味、戦略なら理不尽。主軸§0次第)。\r\n\r\n### 4-2. リアルタイム(Real-Time)\r\n手番概念が消え時間が連続。思考時間そのものが希少資源。\r\n- 協力RT(キャプテン・ソナー)/RTパズル(ギャラクシー・トラッカー)/スピード系(ドブル)。\r\n- **熟考のジレンマとは正反対の楽しさ:** 「考える前に体が動く」快感、スリル、パニックの笑い。§0の感覚・交流に全振り。\r\n- **急所:**\r\n  - 熟考の楽しさを丸ごと捨てるトレードオフ(戦略層に物足りず、パーティ層に最高)。\r\n  - 反射神経の個人差が残酷で§4-1「運の逃げ場」がない(「遅かった」は能力に直帰属)。→ **協力RT**が敗北感を「チームの奮闘」に変換して救う。\r\n\r\n### 4-3. デジタル/オンライン実装の要点(自作向け)\r\n- 同時手番・RTは**物理で実装困難、デジタルが圧倒的有利**(同時入力の一括解決、正確な時間刻み、自動裁定)。イベント基盤と好相性(同一タイムスタンプのイベント群をサーバー一括解決)。\r\n- **通信遅延(レイテンシ)の壁:** RTで速さを競うと回線差が実力差になり不公平(§4理不尽)。→ **オンライン自作はフルRTより「同時手番」(ラウンド内は時間無制限、公開だけ同時)の方が公平で御しやすい。** 同時公開はサーバー権威で厳密処理。\r\n\r\n### 4-4. 位置づけ\r\n- **同時手番=既存設計に足せる\"調味料\"**(独走もジレンマもそのままにテンポだけ改善)。悩んだとき気軽に検討可。\r\n- **リアルタイム=ゲームの根本性格を決める\"主軸\"**(採用した瞬間、熟考ゲームでなくなる)。最上流で決める。\r\n\r\n---\r\n\r\n## 5. 社会系メカニクス ― 人間関係でジレンマを作る\r\n\r\nルールで完全には規定できない「言葉・約束・嘘・信頼」を素材にする。設計者は\"場\"を用意し、ドラマはプレイヤーが生成する。\r\n\r\n### 5-1. 交渉(Negotiation)\r\n言葉で取引・約束・脅迫。核心は**約束の拘束力の有無**。\r\n- 拘束的(システムが履行保証=安全だが浅い)/**非拘束的(約束を破れる=信頼と裏切りのドラマ)**。「約束が破れるからこそ約束に意味が生まれる」逆説。\r\n- §0の交流・物語を最強に生む。価値がコンポーネント外(頭と口の間)で創造される。\r\n- **急所:** キングメイクと密接(§1。負けてる人の交渉が王を作る)/社交性への依存(口達者が有利、内向的に不利)/テーブルの空気・現実の人間関係への波及(ディプロマシー=友情破壊)。→ 裏切りに「役割だから」の免罪符を(ネメシスの秘密目標§4)。\r\n\r\n### 5-2. 投票(Voting)\r\n集団決定をプレイヤー投票で。核心は**個人利益と集団決定の食い違い** → 票の交換・説得・連合。\r\n- 「多数派形成」のパズルを社会的に解く。投票結果の公開が信頼関係を組み替える。\r\n- **急所:** 支配的連合の固定化(多数派の暴政=§2-2独走の社会版)/議論のダウンタイムと社交性依存。\r\n\r\n### 5-3. 同盟(Alliance)\r\n一時的協力関係。核心は**いつ裏切る/解消するかのタイミング**。\r\n- 動的同盟は誰と組むか流動的。協力と競争の相転移(§1ネメシス構造)がプレイヤー判断で起きる。\r\n- **キャッチアップ(§2-3)を社会的に実装** ―― トップ叩き同盟が自然発生。ルート(実例編)の緊張の言語版。\r\n- **急所:裏切りの損得のバランス。** 裏切り得すぎ=同盟が最初から不成立(疑心暗鬼の均衡)、コスト高すぎ=固定化して独走。\r\n\r\n### 5-4. ブラフ(Bluffing)\r\n情報について嘘をつく/隠す/惑わす。核心は**「読もうとする相手を逆に読む」再帰的読み合い**。\r\n- 隠匿情報(§情報設計)を能動的に操作する一段上の層。プレイヤーの意志で情報非対称を作る。\r\n- **急所:** 嘘が時々成功し時々見破られる絶妙な確率が必要(常に成功=情報無意味、常に露見=誰も嘘つかず)/経験差の残酷さ(§4能力への直帰属)。\r\n\r\n### 5-5. 正体隠匿 ― 社会系の総合芸術\r\n人狼・レジスタンス・シークレットヒトラー。**交渉・投票・同盟・ブラフが全て統合。**\r\n隠された陣営(ブラフ)を推理し(発見§0)、追放を投票で決め、信頼できる者と組み(同盟)、言葉で疑いを操作(交渉)。§1の通り発見依存で情報が割れると死に、5人以上を要求。\r\n- **本質:ゲームの本体が盤面でなくプレイヤー間の会話そのもの。** コンポーネントは会話の口実。\r\n\r\n### 5-6. 社会系の設計哲学\r\n他系統は設計者が体験を**コントロール**できるが、社会系は**場を用意するだけで体験はプレイヤーが生成**。再現性が低くプレイヤー依存が極端。3つの帰結:\r\n1. **設計は「保証」でなく「誘発」** ―― 交渉が起きる利害対立は作れるが、面白い交渉になるかはプレイヤー次第。ドラマが生まれる土壌を整備するまで。\r\n2. **プレイヤー依存が最大の強みでも弱みでも** ―― 合う卓では最濃のドラマ、合わない卓では機能不全。万人向けでないことが前提。\r\n3. **ゲーム外への波及に責任** ―― 裏切り・遺恨・騙し合いが現実の関係に影響。感情への配慮(免罪符・短さ)が§4以上に重要。\r\n\r\n> **社会系を貫く核心:「約束が破れるからこそ、約束に価値が生まれる」。**\r\n> ルールで縛れば安全だが魂を殺す。**\"ルールが手を出さない空白を意図的に残す\"** ―― 他系統がルールで体験を作り込むのと正反対。空白が人間同士のドラマを招き入れる。\r\n\r\n---\r\n\r\n## 全体の統合 ― メカニクスの地図\r\n\r\n| 系統 | 素材 | ジレンマの源 | バランスが宿る場所 | 固有の急所 |\r\n|---|---|---|---|---|\r\n| 移動系 | 空間 | 距離・分布・経路・痕跡・情報 | 盤面の静的設計(地理・並び・マス数) | 支配的ルート、不可逆性 |\r\n| 循環系 | 資源 | 巡りの中の今か将来か | 循環の速度 | 速すぎ独走/遅すぎ停滞 |\r\n| 時間軸系 | 時間 | 情報の時間差/思考時間の希少化 | 同時性・時間圧の設計 | カオスの許容度、レイテンシ |\r\n| 社会系 | 人間関係 | 約束・嘘・信頼 | ルールの空白 | キングメイク、社交性依存、遺恨 |\r\n\r\n**共通して見えること:**\r\n1. 優れたメカニクスは「素材(移動/資源/時間/言葉)を、それ以上の何かに変換する」ことで濃さを生む。ただ動く・使う・待つ・話すだけなら作業。別の意味の層が乗ると一手が多義的になる。\r\n2. 各系統は固有の「バランスが宿る場所」を持ち、設計者の労力の向き先が系統ごとに違う。\r\n3. すべては背骨(意味のある選択を、リプレイに耐える形で、時間を通じて、全プレイヤーに、途切れさせない)に奉仕する道具。\r\n\r\n\r\n---\r\n\r\n# 第4部 コンポーネント論 ― 物理層と「影」\r\n\r\n第3部が「何でジレンマを作るか」(空間/資源/時間/人間関係)を扱ったのに対し、\r\n本部はその**一段下の層** ―― 「その素材を、物理的に何で表すか」を扱う。\r\n\r\n> **本編を貫く見取り図:**\r\n> **コンポーネントとは「保持できる状態 × 情報の公開度 × 自然に誘発される操作」のパッケージである。**\r\n> コンポーネントを選んだ瞬間に、そのゲームの**情報環境の大枠が決まる**。\r\n> 案A(実践記録集・第1記録)の死因「メカニクスには相性の良い情報環境がある」は、\r\n> 物理層に降りると **「核が要求する情報環境を、無料で提供してくれるコンポーネントを選べ」** になる。\r\n>\r\n> そして本部の中核は **§3「影」** ―― 情報を粗い層と細かい層に分け、粗い層だけを公開する技法。\r\n> 我々はこれを**3つの作品で別々に再発明していた**。名前がなかったために、対症療法として散逸していた。\r\n> 影は3種に分かれる:**静的**(設計者が決める土台)/ **動的・発信型**(自ら晒す)/ **動的・取得型**(どの層を見るか選ぶ=デジタル固有)。\r\n> そして **§5** で、影を「操作」として一般化し、**操作 × コンポーネントの行列**を作る ――\r\n> **空白のマスが、そのまま新メカニクス探索の座標になる。**\r\n\r\n---\r\n\r\n## 1. 各コンポーネントの解剖\r\n\r\n### 1-1. サイコロ ― 「記憶を持たない乱数」＋「面数ぶんの状態保持装置」\r\n\r\n「乱数発生装置」という定義に、2つの性質を足す必要がある。\r\n\r\n**① 記憶がない乱数。** 毎回の試行が独立で、確率は常にリセットされる。\r\n「3回外れたから次は当たるはず」が成立しない ―― これが山札(引くほど残りが確定する=**記憶のある乱数**)との最大の違い。\r\nドラマは生むが、**カウンティングという技術介入の余地がない**。\r\n§2-5の入力/出力ランダム性の区別とは独立した、**「乱数の記憶性」**という別の軸である。\r\n\r\n**② 振った後は、面数ぶんの状態トラッカーに変わる。** 出目を上に向けて置けば、\r\n「回して減らす耐久値」「ダイスプレイスメントの資源」になる。乱数装置と状態保持装置の二役を、\r\n**振る/置くという操作の切替だけで往復できる**。\r\nさらに面を書き換えれば(カスタムダイス)、**確率分布そのものが設計・改造の対象**になる(=分布のビルド)。\r\n\r\n**③ 公開が自然。** 振った瞬間に全員に見える。秘匿するにはカップという追加装置が要る(ブラフダイス系)。\r\n→ **秘匿のコストが高いコンポーネント。**\r\n\r\n### 1-2. コマ・トークン ― 「位置の記録装置」。単体では情報を持たない\r\n\r\nコマの本質は、**盤という座標系とセットで初めて情報になる**こと。\r\nコマ自体が持つ情報は「色(所有者)」「形(種類)」程度で、意味の大半は**「どこにあるか」**が担う。帰結:\r\n\r\n- **完全公開が基本姿勢。** 盤上のコマは全員に見える。コマで秘匿を作るには物理的発明が要る\r\n  ―― ガイスターは**「向き」**で所有者だけに見える情報を作った(=§3「影」の一形態)。\r\n  スコットランドヤードは**「コマを盤から消す」**ことで秘匿した。\r\n- **物理特性そのものがメカニクスになれる唯一級のコンポーネント。** 積む・倒れる・傾く。\r\n  人力の物理演算装置(第1作『針の上の女神たち』はここに賭けた)。\r\n- **移動の過程が観測される。** カードは「出す」瞬間しかないが、コマは**経路が見える**。\r\n  第3部の移動系(軌跡・追跡)は、すべてこの性質の上に立っている。\r\n- **トークンの「個数」= アナログな数値記録装置。** 数える手間と引き換えに、\r\n  資源の増減が手触りと視覚量で伝わる(§0感覚)。\r\n\r\n### 1-3. カード ― 「多状態の情報スイッチ × 順序を保持する束」\r\n\r\n**1枚が遷移できる情報状態の数が、全コンポーネント中で最多。** これがカードを情報設計の万能素材にしている。\r\n\r\n| 状態 | 誰に見えるか |\r\n|---|---|\r\n| 場に表 | 全員(公開) |\r\n| 手札 | 自分だけ(私的) |\r\n| 山札・伏せ札 | 誰にも見えない(全秘匿) |\r\n| 1人に見せる | 選択的公開 |\r\n\r\nさらに:\r\n\r\n- **山札 = 「順序付きの未来」。** シャッフルは乱数生成だが、引き切り型なので**記憶のある乱数**\r\n  (枯渇=可視のカウントダウン §5 / カウンティング可能)。\r\n  **山札操作 = 未来の編集。** デッキ構築とは「自分の乱数源を自分で設計すること」であり、\r\n  「引きの悪さも半分は自己責任」という納得感(§2-5)の物理的根拠がここにある。\r\n- **ルールの運搬装置。** テキストが書けるため、例外処理をルールブックからコンポーネントへ外部化できる\r\n  (「カードはルールに勝る」)。基本ルールを薄く保ったまま多様性を積める。\r\n- **ただし構造的リークがある。** 手札の**枚数**は隠せない。カードの向き、整理の仕草、\r\n  スリーブの摩耗 ―― §3で扱う「意図しない影」の温床。\r\n\r\n### 1-4. タイル ― カードとコマの中間種\r\n\r\n裏表を持ち(秘匿可・引く=乱数)、置くと**盤面そのものを構築する**。\r\n**「共有の公開状態を、プレイヤーが不可逆に作っていく」**のはタイル固有(カルカソンヌ)。\r\n盤を**固定物でなく成果物**にできる。終了条件を「盤の完成」に接続しやすい(§5)。\r\n\r\n### 1-5. 袋 ― 触覚の山札\r\n\r\n順序すら持たない(掴むまで確定しない)ため、**シャッフル不要で常時ランダム**。\r\n**戻せる**(トークンを袋に返す)ので、山札より循環系(第3部§3)と相性が良い。\r\n**手を突っ込む感触が演出そのものになる** ―― ネメシスの侵入者バッグは、\r\n出力ランダム性を恐怖に転化した(第2部 CASE1)。\r\n急所は**希釈問題**(弱トークンを足すほど強トークンを引きにくい = 収穫逓減が確率で自動発生)。\r\n\r\n### 1-6. 衝立 ― 「秘匿の変換装置」\r\n\r\n単体では何もしないが、**任意の公開コンポーネントを私的化する**。\r\nコマ・資源・盤面に秘匿を後付けできる唯一の汎用手段。\r\n言い換えれば、**「秘匿のコストが高いコンポーネント」に、追加部品でコストを払って秘匿を買う**装置。\r\n\r\n### 1-7. 紙とペン ― 不可逆・私的・状態空間が無限\r\n\r\n書ける内容に制限がなく、消せない。\r\n**全員が同じ乱数(共有ダイス)を、私的な紙に書き分ける**構造は、\r\n「実力と運の両立が最もクリーン」(§2-6の共有場補充と同型)。\r\nロール&ライトの強さの正体はここにある。\r\n\r\n### 1-8. ダイヤル・回転盤 ― 連続値の同時秘密選択\r\n\r\nカードでは離散値しか出せない領域を埋める。\r\n**「連続量を、同時に、秘密裏に決める」**が可能になる(キャプテン・ソナー型)。\r\nデジタルではスライダーで自明に実装できるため、**物理でだけ特別なコンポーネント**とも言える。\r\n\r\n---\r\n\r\n## 2. 横断比較 ― 「乱数の質」と「秘匿のコスト」\r\n\r\n### 2-1. 乱数装置の比較\r\n\r\n| | サイコロ | 山札 | 袋 | タイル引き |\r\n|---|---|---|---|---|\r\n| 記憶 | **なし**(毎回独立) | あり(枯渇する) | あり(戻せば回復) | あり |\r\n| 技術介入の余地 | 振り直し・固定効果 | カウンティング・山札操作 | 中身の設計(ビルド) | 残り枚数の推理 |\r\n| 秘匿のコスト | **高**(公開が自然) | **無料**(伏せるだけ) | **無料** | 低(両対応) |\r\n| アークとの関係(§5) | 平坦(常に同じ確率) | **枯渇=自動カウントダウン** | 構成次第 | 盤の完成=終了条件化 |\r\n\r\n> **実践的な含意:「どの乱数装置を選ぶか」は確率の問題ではなく、記憶・介入・アークの問題である。**\r\n> 同じ1/6でも、サイコロなら緊張は毎回リセットされ、山札なら終盤へ向けて確定していく。\r\n\r\n### 2-2. 秘匿のコストという視点\r\n\r\n| 秘匿が無料 | 秘匿が高価 |\r\n|---|---|\r\n| カード(伏せる/手札にする) | サイコロ(カップが要る) |\r\n| 袋・山札(構造的に見えない) | コマ(盤上=公開が前提。ガイスター的発明が要る) |\r\n| タイル(裏返す) | 紙とペン(公開する方が難しい ―― 逆に「共有が高価」) |\r\n\r\n> **原則:核が要求する情報環境を先に言語化し、それを\"無料で\"提供するコンポーネントを選ぶ。**\r\n> 逆らうと、衝立・カップ・特殊な向き ―― といった**追加装置(=ルールの複雑化)**を必ず払うことになる。\r\n\r\n---\r\n\r\n## 3. 【中核】影(かげ) ― コンポーネントの情報層\r\n\r\n### 3-1. 定義\r\n\r\n> **影 ＝ 形は伝えるが、中身は伝えない情報層。**\r\n> 情報を**粗い層**と**細かい層**に分け、**粗い層だけを公開する**技法。\r\n\r\n「カードの裏が影を落とす」「山札トップの影が見える」「手札の影が相手に漏れる」のように動詞で使える。\r\n分析・シミュレーション文脈での厳密な言い方は**粗視化(coarse-graining)**。同じものを指す。\r\n\r\n**適用範囲はカードに限らない。** チップ・タイル・コマ・メーター・スコア ―― 情報を持つあらゆる要素に落とせる。\r\n\r\n**影には3種類ある**(詳細は§3-10・§3-12):\r\n- **静的な影** = 設計者が濃さを決める(裏の色、チップのレベル)。読みの**土台**を作るが、それ自体は決断を生まない\r\n- **動的・発信型** = プレイヤーが自分の選択で落とす(麻雀の副露・リーチ)。**落とすこと自体が決断になる**\r\n- **動的・取得型** = プレイヤーが「どの層を見るか」を選ぶ(光源の選択)。**物理では不可能=デジタル固有**\r\n\r\n### 3-2. 我々は既に3回、これを別々に再発明していた\r\n\r\n| 作品 | 粗い層(公開) | 細かい層(秘匿) |\r\n|---|---|---|\r\n| 第1作『針の上の女神たち』 | 体重の「気配」(軽め/普通/重め) | 正確な体重 |\r\n| 第2作『握るか、逃げるか』 | 危険度メーターの**4段の帯** | 正確な危険度の値 |\r\n| 第3作『魔女の調合』 | **チーム合計点**のみ | 各自の個人点 |\r\n| (既存作)海底探険 | チップの**レベル(1〜4)** | 正確な得点 |\r\n\r\n> **これらは全て同一の技法である。** 名前がなかったために、各作品で「対症療法」として個別に発明され、\r\n> 資料の別々の章に散逸していた。**名づけの目的は、これを再利用可能な一つの道具にすること。**\r\n\r\n**重要な観察:** 第1作の「気配」は**失敗**した(「軽め/普通/重め の3段階では、その後の行動選択に与える影響が小さすぎた」)。\r\n第3作の「チーム合計のみ」は**成功**した(候補数が7通り→438通りに広がり、読みは行動へ一本化された)。\r\n**同じ技法が、成否を分けた。** その差を測る軸が、以下の3つである。\r\n\r\n> 【注記 2026-07-15】「7通り→438通り」という数値は現行実装(V3プール)では再現しない。\r\n> リバランス前の旧プールに対する値だった可能性が高い。現行実装での再計算値と検証手法は\r\n> `sim/witch_privacy/魔女の調合_秘匿性数値再現_結果.md` を参照。定性的結論(チーム合計のみの公開は\r\n> 個人点全公開より秘匿性が高い)は現行実装でも支持される。\r\n\r\n### 3-3. 影の実例カタログ\r\n\r\n**型A:影 = 階層/種別。表 = 正確な値**(最も汎用的)\r\n- **海底探険** ―― 遺跡チップは片面にレベル(点の数)、反対面に正確な得点。\r\n  **拾うときは値を見ずに受け取る**。「大まかな期待値は分かるが、正確な値は分からないまま賭ける」の教科書。\r\n- Innovation ―― 10の時代それぞれに固有の裏面\r\n- Splendor / 7 Wonders ―― レベル・時代ごとに裏が違う(=別の山)\r\n- Betrayal at House on the Hill ―― タイルの裏が階層(地下/1階/2階)を示す\r\n\r\n> ただしA群の大半は、影が**「山を分ける」ために使われている** ――\r\n> 「どの山から引くか」という選択肢の提示であって、「混ざった山のトップが読める」ではない。**ここに空白がある。**\r\n\r\n**型B:影 = 順序・序列**\r\n- キングドミノ ―― 裏の数字が強さの序列を示す(表を見る前に、優劣だけが分かる)\r\n\r\n**型C:表裏の役割を反転させる**\r\n- **ハナビ** ―― カードを外向きに持つ。「自分だけが見えない」という反転\r\n- **ガイスター** ―― コマの裏の色が本人だけに見える(コマで影を実装した稀有な例)\r\n\r\n**反例:「影の不在」こそが生命線のゲーム**(同じくらい重要)\r\n- **スカル** ―― 花とドクロが裏から区別できないことが、ゲームの全て\r\n- **Dead of Winter** ―― 危機への供出が裏向きで、誰が裏切ったか分からない\r\n- **TCG(MTG等)** ―― 裏の均一性が**大会規則で強制**される。摩耗で識別可能になった「マークドカード」はイカサマ扱い\r\n\r\n> **「裏に情報を載せる/載せない」は、それ自体が設計上の重大な選択であって、既定値ではない。**\r\n\r\n### 3-4. 軸1:解像度 ―― 影の濃さ\r\n\r\n表と裏の情報量の比。**ここに狭い帯がある。**\r\n\r\n| 影の濃さ | 何が起きるか | 対応する死因 |\r\n|---|---|---|\r\n| **濃すぎる** | 裏でほぼ中身が確定し、引く前に答えが計算で出る | **遅信の死因**(答えが計算で一意に出る) |\r\n| **良い帯** | 「大まかな期待値は分かるが、正確な値は分からない」 | ―― (海底探険のレベル制がここ) |\r\n| **薄すぎる** | 情報が行動選択に影響しない。ただの飾り | **共犯の死因**(どちらでもいい) / 第1作の「気配」 |\r\n\r\n> **実践記録集の総括「生きた選択は、両極の間の狭い帯にしか存在しない」が、**\r\n> **\"影の濃さ\"という測定可能な一つのパラメータに落ちる。** これが名づけの最大の見返り。\r\n\r\n**測り方(第3作で確立済み):** N回観測後に、秘匿情報の候補が何通りに絞れるかをシミュレーションする。\r\n(実測例:個人点を全公開=約7通り[特定]/チーム合計のみ=約438通り[読めるが特定不可])\r\n\r\n> 【注記 2026-07-15】この実測例(約7通り/約438通り)は現行実装(V3プール)では再現しない。\r\n> リバランス前の旧プールに対する値だった可能性が高い。**ただし「N回観測後に候補数をシミュレーション\r\n> で測る」という測り方そのものの有効性は、現行実装での再検証でも変わらず成立する。**\r\n> 現行実装での再計算値と検証手法は `sim/witch_privacy/魔女の調合_秘匿性数値再現_結果.md` を参照。\r\n> 定性的結論(チーム合計のみの公開は個人点全公開より秘匿性が高い)は現行実装でも支持される。\r\n\r\n### 3-5. 軸2:方向 ―― 影は誰に落ちるか\r\n\r\n同じ「影」でも、**落ちる方向でゲームの性格が全く変わる。**\r\n\r\n| 方向 | 効果 | 例 |\r\n|---|---|---|\r\n| **未来に落ちる** | 山札トップの種別が見える → **出力ランダム性が入力ランダム性に化ける**(§2-5)。「判断の後」が「判断の前」になり、負けても納得できる方向へ変換される | 海底探険(次の階層が見えている) |\r\n| **他者に落ちる** | 手札の構成が相手に漏れる → **ブラフと読みの土台**。「構成は公開・中身は秘匿」 | (実例が薄い=空白) |\r\n| **自分にだけ落ちない** | 反転。他人が自分より自分を知っている | ハナビ |\r\n\r\n> **「未来と他者の両方に、同時に影を落とす」設計は、実例が見当たらない ―― 独自性の候補。**\r\n\r\n**【重要な接続】他者に落ちる影が作る情報環境は、案Aの核が要求していたものそのもの。**\r\n案A(見なかったことの証明)の死因は「全面非公開の中では、一点の公開シグナルが機能しない」だった。\r\n要素2が輝くには **「大半が見えていて、一点だけ隠れている」情報環境**が要る、と結論づけていた。\r\n影を他者に落とすと、まさにそれが手札に生まれる:\r\n\r\n> **「あいつが赤を3枚持っている」ことは全員に見える。だが赤の中のどれかは分からない。**\r\n\r\n**案Aの核は、まだ生きている。載せるべき土台の候補が、ここにある。**\r\n\r\n### 3-6. 軸3:等価交換 ―― 影を濃くしたら、どこかを暗くする\r\n\r\n第3作で確立した原則:**情報を\"増やす\"追加ルールは、たいてい難易度を下げる**(=初心者補助になる)。\r\n影は情報を増やす方向の技法である。したがって:\r\n\r\n> **鉄則:影を濃くしたら、その分だけ表を深くする。**\r\n> 海底探険はこれをやっている ―― レベルを公開する代わりに、**レベル内の得点の幅を大きく取った**。\r\n> 影だけを足すと、読み合いは浅くなる。\r\n\r\n### 3-7. 影の判定基準(チェックリスト)\r\n\r\n名前がついた瞬間、**あらゆる場所に影を足したくなる誘惑**が生まれる。\r\nこれは資料が繰り返し警告する「対症療法の連鎖」の、最も起きやすい形である。\r\n共犯のA・B・C基準と同じ形式で、判定基準をセットで持つこと。\r\n\r\n> **第一問:この影は、どの決断を割るために存在するのか?**\r\n> 答えられないなら、その影は装飾である。\r\n\r\n- [ ] **解像度**:影が濃すぎて、行動が計算で一意に決まらないか?(遅信の死因)\r\n- [ ] **解像度**:影が薄すぎて、行動選択に影響を与えないか?(第1作「気配」の死因)\r\n- [ ] **測定**:N回観測後の候補数の減り方を、シミュレーションで測ったか?\r\n- [ ] **方向**:この影は、未来/他者/自分 のどこに落ちているか? 意図した方向か?\r\n- [ ] **等価交換**:影を濃くした分、どこかで表を深くしたか?\r\n- [ ] **意図しない影**:隠しているはずの値が、見た目の構造(位置・サイズ・アニメ・枚数・仕草)から漏れていないか?\r\n      (第1作:カードの高さで種類が判明 / 第2作:危険度メーターの白い線が正確な値を漏らした)\r\n- [ ] **土台との相性**:その決断は「賭け」か「パズル」か? パズルに影を落としていないか?(§3-11)\r\n- [ ] **落とし先**:プレイヤーに落とす影なら、**確定したコミットメント**に落ちているか?(未確定な計画に落ちると死ぬ §3-11)\r\n- [ ] **共食い**:足そうとしている**静的な影**が、既存の**動的な影**を陳腐化させていないか?(§3-10)\r\n- [ ] **取得型のコスト**:「影を取りに行く」行為に代償があるか?(無料なら常に取るのが最適=偽の選択肢 §3-12)\r\n\r\n### 3-8. 意図しない影 ―― 最も頻出するバグ\r\n\r\n**影は、設計しなくても勝手に発生する。** 過去3作すべてでこれが起きた:\r\n\r\n| 作品 | 意図しない影 |\r\n|---|---|\r\n| 第1作 | 秘匿カードの**高さ(見た目のサイズ)**から種類が推測できた |\r\n| 第2作 | 危険度メーターの**「正確な位置を示す白い線」**が、隠しているはずの数値を漏らした |\r\n| 共犯(遺跡版) | 同数時の**処理順序**から体力が漏れた |\r\n| (物理一般) | カードの**摩耗・スリーブの傷**(マークドカード) / 手札の**枚数** |\r\n\r\n> **原則:「値を隠す」実装をしたら、その値に依存する他の見た目の要素がないか、逆算的に確認する。**\r\n> **秘匿すべき情報は「送らない」。「送るが隠す」は秘匿ではない。**(第3作の結論)\r\n\r\n**ただし ―― 意図しない影は、必ずしもバグではない。**\r\n麻雀の**盲牌**(指で牌を触って判別する)は、設計されていない影でありながら、\r\n禁止されずに**技術として受容された**。分岐点は:\r\n\r\n> **その影を読む力が「練習で身につく技術」なら → 機能になる**(盲牌)\r\n> **「運や物理条件で決まる」なら → ノイズ/不正になる**(マークドカード、印刷のブレ)\r\n\r\n**意図しない影を発見したら、\"消す\"か\"技術として昇華させる\"かを選ぶ。**\r\n消す前に、一度は後者を検討する価値がある(詳細は§5-5)。\r\n\r\n### 3-9. デジタルでの拡張 ―― 物理では不可能な影\r\n\r\n方法論編(第5部)の「物理の制約が外れたら何ができるか」の、最も具体的な鉱脈がここにある。\r\n\r\n**物理の限界:**\r\n- 裏に情報がある山札は、**公正にシャッフルできない**(シャッフル・カット中に裏が見え、山札操作が不正になる)。\r\n  TCGがマークドカードを禁じるのと同じ問題を、意図的に導入することになる。\r\n- 影の濃さは、印刷した瞬間に固定される。全員に同じ影が落ちる。\r\n\r\n**デジタルなら:**\r\n- シャッフルはサーバ側で確定し、**「トップの色だけ」をクライアントに配信できる** → 上記の不正問題が消える\r\n- **影の粒度を人ごとに変えられる**(「あなただけは2段階細かく見える」= 非対称能力を情報層で実装)\r\n- **影が時間で変質する**(深く潜るほど影が薄くなる = 濁った水。テーマ融合§6-③の余地)\r\n- **影を資源で買える**(「トップを覗く」ではなく「トップの色だけを買う」= 情報そのものを価格付けする)\r\n- **影の濃さを動的に調整できる**(アーク設計§5:序盤は濃く、終盤は薄く)\r\n\r\n> **「影の濃さ」を、印刷物の固定値ではなく、動的な設計変数として扱えること ―― これがデジタルの鉱脈。**\r\n\r\n---\r\n\r\n### 3-10. 【重要】静的な影 と 動的な影\r\n\r\n麻雀を「影」の目で見直すと、**麻雀は影だらけ**であることに気づく。\r\n\r\n| 麻雀の要素 | 影として見ると |\r\n|---|---|\r\n| **副露(鳴き)** | 手牌の一部を実体として公開。**速さと引き換えに、自分で影を濃くする選択** |\r\n| **リーチ** | 「テンパイした」という**粗い層だけ**を強制公開し、引き換えに打点を得る。**影の等価交換そのもの** |\r\n| **ドラ表示牌** | 山の1枚を公開し、全員に価値構造の粗い情報を与える |\r\n| **裏ドラ** | 影を一切落とさない完全秘匿。判断の後に確定=純粋なドラマ装置(§2-5出力ランダム性) |\r\n| **捨て牌** | **行動が落とす影**。最も雄弁で、最も操作可能 |\r\n\r\n> **麻雀の影は、すべて「プレイヤーが自分の選択で落とす影」である。**\r\n\r\nここから、影を2種類に分ける必要が出てくる。\r\n\r\n| | **静的な影** | **動的な影** |\r\n|---|---|---|\r\n| 濃さを決めるのは | **設計者**(裏の色、チップのレベル、帯表示) | **プレイヤー**(副露・リーチ・投入量・宣言・公開) |\r\n| 正体 | 情報環境の**設定**(前提条件) | **メカニクスそのもの** |\r\n| ジレンマを生むか | **生まない**(読みの土台になるだけ) | **生む**(影を落とすこと自体が決断になる) |\r\n| 例 | 海底探険のレベル / 危険度の4段の帯 / チーム合計のみ公開 | 麻雀の副露・リーチ / 共犯の投入量 / 案Aの「見なかったことの証明」 |\r\n\r\n> **原則:動的な影のほうが、ほぼ常に強い。**\r\n> 影を落とすかどうかが決断になり、**「利益と引き換えに手の内を晒すか」**というジレンマが自動生成されるため。\r\n> 静的な影は、それ自体では決断を生まない ―― **動的な影が読まれるための\"文脈\"を用意する土台**である。\r\n\r\n**【設計上の警告】静的な影は、動的な影を陳腐化させうる。**\r\n麻雀に「手牌の色構成が勝手に見える」静的な影を足すと、副露の情報コストが相対的に安くなり、\r\n「晒すか否か」という決断が痩せる ―― **下位互換の追加**にしかならない。\r\n静的な影を足すときは、既存の動的な影を殺していないか必ず検査する(§3-7の第一問)。\r\n\r\n**【案Aの死因の再診断】案Aの核「見なかったことの証明」は、動的な影の一形態だった。**\r\n「見ずに取った事実を自ら公開する」= 自分で粗い情報を落とす行為。\r\n案Aが死んだのは、**周囲に静的な影が一つも無く(全面非公開のインカ型)、動的な影だけが宙に浮いた**から。\r\nシグナルを受け取る側に、それを解釈する文脈が存在しなかった。\r\n\r\n> **処方箋:静的な影で「読みの土台(文脈)」を作り、その上に動的な影をシグナルとして載せる。**\r\n> これが、案Aが要求していた **「大半が見えて、一点だけ隠れている」情報環境**の作り方である。\r\n\r\n---\r\n\r\n### 3-11. メカニクス別の相性 ―― どの土台に影を落とすか\r\n\r\n> **影の第一原理:**\r\n> **影は「賭けとして設計された決断」と噛み合い、「パズルとして設計された決断」を毒する。**\r\n\r\n影の主題は**「粗い推定で決断させること」**。したがって掛け算(核が主役)になるのは、\r\n決断がもともと**賭け**であるメカニクス。\r\n決断が**パズル(最適化)**であるメカニクスに影を落とすと、隠された細部は単なる**ノイズ**になり、\r\n判断の後に確定する出力ランダム性(=理不尽側 §2-5)に堕ちる。\r\n\r\n| メカニクス | 相性 | 理由 |\r\n|---|---|---|\r\n| **プレス・ユア・ラック** | **◎掛け算** | 決断が元々「進むか降りるか」の賭け。影が賭けに**粒度**を与える(海底探険が実証) |\r\n| **競り・オークション** | **◎掛け算** | 核が「不確実な価値に値をつける」こと。影=入札対象の輪郭。**ウィナーズ・カースが自動生成される** |\r\n| **分割統治(切る/選ぶ)** | **◎掛け算** | 切る側と選ぶ側で**影の濃さを変えられる**(非対称な影)。『魔女の調合』の直系の発展形 |\r\n| **ブラフ** | **◎掛け算** | 影のないブラフは「無からの嘘」。影があると**見えている輪郭と中身のズレを操作**できる=嘘に土台ができる |\r\n| 同時秘密入札 | ○ | 公開されるのが合計だけ=**集計そのものが影**(共犯の投入量がこれ) |\r\n| ドラフト | ○ | 「影だけ見て取る」＋「何を取ったかが相手への影になる」の二重構造 |\r\n| エリアマジョリティ | △足し算 | 駒の強さに影を落とせば成立するが、核(僅差の2位が損)は情報でなく数の問題。影は脇役 |\r\n| ワーカープレイスメント | △ | 核は早取り競争。影を落としても競争構造は変わらず、単に不便になる |\r\n| **セットコレクション** | **✕**(条件付き) | 下記 |\r\n| **エンジンビルド・最適化系** | **✕毒** | 決断がパズル。隠れた細部=ノイズ。「組み上げたら安かった」= 努力と無関係に結果が決まる理不尽 |\r\n\r\n#### なぜセットコレクションは毒なのか(構造的診断)\r\n\r\nセットコレクションの決断は**「どの集合にコミットするか」= 型の一致**。ここに影を落とすと、\r\n**どちらに振っても壊れる**:\r\n\r\n- **型を影にする**(型が見える/値が隠れる) → 構造的決断(何を集めるか)が**全部解ける**。\r\n  残る不確実性は「集めきった後の点数」だけ = **判断の後に確定する出力ランダム性**。計画が努力と無関係に報われる/報われない。\r\n- **値を影にする**(大きさは分かる/型が隠れる) → 集めるという行為自体が博打になり、\r\n  **セットコレクションの本体(計画)が消える**。\r\n\r\n> **セットコレクションには、影を落とす場所がどこにもない。**\r\n> 型を見せれば計画が解け、型を隠せば計画が消える。(第5部§6で「足し算の土台」として退けた判断は、\r\n> 影の観点ではさらに強く「毒」と判定される)\r\n\r\n#### ただし ―― 麻雀が示す唯一の生存路\r\n\r\n麻雀はセットコレクションでありながら、影が機能している。理由は**影の落とし先**にある:\r\n\r\n> **未確定な\"計画\"に影を落とすと死ぬ。確定した\"コミットメント\"に影を落とすと、読み合いになる。**\r\n\r\n副露は「もう決めてしまった部分」を晒す。リーチは「もう完成した」という事実だけを晒す。\r\nどちらも**後戻りできない確定事項**であり、それゆえシグナルとして意味を持ち、読みの対象になる。\r\n\r\n#### まとめ:影の落とし先で原理が分かれる\r\n\r\n| 影の落とし先 | 生きる条件 | 死ぬ条件 |\r\n|---|---|---|\r\n| **世界に落ちる影**(山札の色・チップのレベル・盤面) | 決断が**賭け**である | 決断が**パズル**である |\r\n| **プレイヤーに落ちる影**(手牌・投入量・宣言) | **確定したコミットメント**に落ちる | **未確定な計画**に落ちる |\r\n\r\n---\r\n\r\n### 3-12. 【設計仮説・未検証】取得型の影 ―― 光源の選択\r\n\r\n§3-10 で影を「静的/動的」に分けたが、動的な影はさらに2種類に割れる。\r\n**影は、出すだけでなく、取りに行くこともできる。**\r\n\r\n| | 誰が決めるか | 情報の向き | 例 |\r\n|---|---|---|---|\r\n| **静的な影** | 設計者 | 世界 → 全員(土台) | 海底探険のレベル / チップの裏 |\r\n| **動的・発信型** | プレイヤー | 自分 → 他者 | 麻雀の副露・リーチ / 案Aの「見なかったことの証明」 |\r\n| **動的・取得型** | プレイヤー | 世界 → **自分だけ** | (下記) |\r\n\r\n**取得型の影 = 「影のないカードを選び、自分で影を落とす」。**\r\n物理では原理的に不可能(同じ1枚が、Aにはスートを、Bにはランクを見せることはできない)。\r\n**第5部の言う「デジタルネイティブの鉱脈」の、最も直接的な鉱床。**\r\n\r\n#### 光源という比喩\r\n\r\n影を落とすには光が要る。ここから拡張が自然に出る:\r\n\r\n> **同じカードでも、当てる光の角度によって、違う影が落ちる。**\r\n> スートの光を当てればスートが見え、数字の光を当てれば数字が見える。**両方は当てられない。**\r\n\r\n**「光源をどこに置くか = どの軸で粗視化するか」が、そのままプレイヤーの決断になる。**\r\n静的な影が「設計者が選んだ粗視化の軸」だったのに対し、取得型の影は**軸の選択をプレイヤーに渡す**。\r\n\r\n#### 【最重要】コストがなければ即死する\r\n\r\n取得型の影には構造的な罠がある。\r\n**情報を得るだけで代償がないなら、常に光を当てるのが最適** → 偽の選択肢化(§2-4)。\r\nこれは『魔女の調合』の**毒味役の罠**と完全に同型\r\n(「使うとチームが得をする消耗リソースは、使わない選択が非合理になり、選択肢が死ぬ」)。\r\n\r\nコスト設計の候補:\r\n\r\n1. **排他** ―― スートか数字か、**どちらか一方しか見えない**。\r\n   → 粗視化の軸そのものが決断になる。**最もエレガント**(追加ルールを一切足さずにコストが生まれる)\r\n2. **資源** ―― 光を当てるのに酸素/時間/手番を払う\r\n3. **★公開** ―― **「光を当てた」という事実が、他者への影になる**\r\n\r\n**3番が決定打。取得型の影が、自動的に発信型の影を生む。**\r\n\r\n> 「あいつは今、あのカードにスートの光を当てた」\r\n> ―― **何を見たかは分からないが、何を知りたかったかは分かる。**\r\n\r\n情報を取りに行く行為そのものが意図を漏らすため、**一方通行の情報吸い上げにならず、読み合いが閉じる。**\r\n\r\n#### 適用例:神経衰弱 ―― 2つの読み方があり、片方は罠\r\n\r\n**(a) 全員が同じ層(スート)を見られる** → **弱い。**\r\nこれは結局ただの**静的な影**(対称・設計者が決めた粗視化)であり、\r\nしかも神経衰弱の核は**記憶=パズル**である。§3-11の第一原理により **影はパズルを毒する** ――\r\n探索空間が分割されて楽になるだけで、ジレンマは生まれない。\r\n\r\n**(b) プレイヤーごとに見える層が違う**(私はスート、あなたはランク、彼は色) → **本命。**\r\n\r\n- **強制的な相互依存**:私だけではペアを特定できない。他人の層と合わせないと解けない\r\n  → マルチプレイヤー・ソリティア(§0)が**構造的に不可能**になる\r\n- **奉行問題(§1)が構造的に消える**:**誰も全体を見られない**ため、指揮の座が存在しない\r\n- **ハナビの鏡像**:ハナビ=「自分のカードだけ見えない」/ これ=「自分だけ違う層が見える」\r\n\r\n#### 【重要】遅信が達成できなかったものを、これは達成しうる\r\n\r\n遅信(実践記録集・第2記録)の狙いは\r\n**「誰も全体の\"今\"を知れないから、奉行の座が存在しない」**だった。\r\nだが**時間の霧は、計算で埋まった** ―― 決定論的成長ゆえ引き算で復元でき、\r\n「答えが計算で一意に出る」という死因に直結した。\r\n\r\n> **層の霧は、計算では埋まらない。**\r\n> 他人が見ている層の**内容**は、演繹では復元できない(それは規則ではなく、事実だから)。\r\n> **遅信の核が要求していた構造が、\"時間\"ではなく\"情報層\"でなら成立する可能性がある。**\r\n\r\n#### 【重要】案Aの核が、ここで生き返る\r\n\r\n> **「光を当てなかったことの証明」**\r\n\r\n案A(見なかったことの証明)の死因は「全面非公開の中では、一点の公開シグナルが機能しない」\r\n= **受け手に解釈の文脈がなかった**ことだった(§3-10の再診断と同じ構造)。\r\n\r\nこの系では、文脈が最初から存在する:\r\n- **静的な影**(全員が見える粗い層)が読みの土台を作り、\r\n- その上に **「誰がどこに光を当てたか / 当てなかったか」** がシグナルとして載る\r\n\r\n**「あいつは、あのカードを見られたのに、見なかった」が、初めて意味を持つ。**\r\n案Aの要素2が要求していた「大半が見えて、一点だけ隠れている」情報環境が、ここに成立する。\r\n\r\n#### 懸念(未検証・正直に)\r\n\r\n1. **土台の選択が生死を分ける。** 神経衰弱(=記憶=パズル)は弱い土台。\r\n   §3-11で◎がついたのは**競り・分割統治・PYL・ブラフ**。特に有望なのは:\r\n   - **情報非対称の競り** ―― 「私には品物の\"重さ\"しか見えず、彼には\"色\"しか見えない」\r\n     → **ウィナーズ・カースが構造的に生成される**\r\n   - **層の違う分割統治** ―― 切る側と選ぶ側で見える層が異なる\r\n     → 『魔女の調合』の実装資産をほぼそのまま流用できる\r\n2. **認知負荷の上限。** 層が多いと「誰が何を見ているか」の追跡が破綻する。\r\n   **3〜4人・層は2〜3種が上限**と推定(遅信4人版で確認した「追跡上限」と同型)。\r\n3. **計算化リスク。** カード枚数が少なく層が少ないと、全部解けてしまう(=遅信の死因の再現)。\r\n   **候補絞り込みシミュレーション**(N手番後に何通りに絞れるか)を、設計の早い段階で回すこと。\r\n\r\n> **本節は設計仮説であり、机上・実装のいずれでも未検証。**\r\n> ただし「取得型の影」という区分そのものは、既存作(ハナビ・麻雀)の分析にも遡及して使える。\r\n\r\n---\r\n\r\n### 3-13. 【実証】NPCの「個性」に影は落とせるか ―― 方策既知の透明性と、行動/評価ノイズの非対称性（第3作ソロNPC検討・2026-07）\r\n\r\n第3作『魔女の調合』のソロモード検討で、**「NPCの手札を解読する楽しさ」を作れるか**を\r\nシミュレーションで検証した。結論は否定的だったが、影の理論（本章§3）に新しい軸を追加する\r\n実証データが得られた。詳細は `sim/witch_solo_npc/` の各計測結果MDを参照。\r\n\r\n#### 【原理】方策既知のNPCは、最適観測者に対して原理的に透明である\r\n\r\nNPCが「λ・τ等の固定パラメータに従うソフトマックス方策」で動く場合、観測者（推定エンジン）が\r\nその方策を知っていれば、6儀式分の行動系列を説明できる手札仮説は原理的に少数へ収束する。\r\nこれは**候補数の下限がソフトマックスの温度（読みやすさ）ではなく方策の既知性そのものに\r\n起因する**ことを意味し、**隠匿を狙う系のNPC設計一般に適用される原理**として扱ってよい\r\n（本節の残りは、この原理からの帰結を実測で辿ったもの）。\r\n\r\n#### 【発見】行動ノイズと評価値ノイズの非対称性 ―― 隠すなら評価に、能力を守るなら行動に触らない\r\n\r\nNPCの「読みにくさ」を作る手段を2種類試した：\r\n\r\n| ノイズの入れ方 | 候補数を広げる効果 | NPCの実力（能力下限D・平均チームpct） |\r\n|---|---|---|\r\n| **行動ノイズ**（softmax温度τで選択を揺らす） | あり | **天井58.5%**（60%基準に届かない全12組。`sim/witch_solo_npc/魔女の調合_ソロNPC方策_計測結果_v2.md`） |\r\n| **評価値ノイズ**（気まぐれカードによる疑似好みバイアス。得点計算には無関与） | あり | **66〜77%**（60%基準を全8組で上回る。`sim/witch_solo_npc/魔女の調合_ソロNPC方策_計測結果_v3.md`） |\r\n\r\n行動そのものを揺らす（softmax温度）と、揺らぎが**意思決定の質**まで劣化させてしまい、\r\n「読みにくいが弱いNPC」にしかならない。一方、**得点に影響しない偽の好み（気まぐれ）で\r\n評価だけを歪める**と、実際の意思決定は正しい手札に基づいたまま「見かけの動機」だけを\r\n曇らせられるため、能力を保ったまま行動を読みにくくできる。\r\n\r\n> **原則：NPCの個性・不透明性を作るなら、行動（softmax温度）ではなく評価（内部の動機付け）に\r\n> ノイズを入れる。行動へのノイズは、隠匿と能力がトレードオフになり両立しない。**\r\n\r\n（ただし本節末尾の通り、評価値ノイズも「解読される楽しさ」そのものは救えなかった。\r\n効いたのは能力の保持だけである）\r\n\r\n#### 【発見】読みの成長Δ≈0 ―― 「相手が読めてくる実感」はプレイ内学習からは生まれない\r\n\r\n「1プレイ内で観測を重ねるほど、相手の手札を言い当てられるようになる」かを、\r\n最初の選択者の予測的中率が儀式を追うごとに伸びるか（Δ = 儀式5-6平均 − 儀式1-2平均）で測った。\r\n**全12組でΔはほぼゼロ近傍**（`sim/witch_solo_npc/魔女の調合_ソロNPC方策_計測結果_v2.md` §3）。\r\n的中率が最初から高い組は最後まで高いだけで、低い組は最後まで低いままだった。\r\n\r\n> **含意：マルチプレイで感じる「回を重ねるほど相手が読めてくる」という実感の正体は、\r\n> 1プレイ内の情報獲得（プレイ内学習）ではなく、対戦前から持っている社会的事前知識\r\n> （＝相手の性格・傾向を最初から知っていること）である可能性が高い。**\r\n> これは今回のシミュレーションでは直接検証していない仮説だが、Δ≈0という否定的結果と、\r\n> 後述のタイプ開示方式への転換（§3-13の帰結）は、この仮説を前提にしている。\r\n\r\n#### 【発見】読みの機能的価値は、解読が死んでも頑健に生き残った\r\n\r\n「手札を解読する楽しさ」は成立しなかったが、**「一貫して振る舞う相手には、NPCが応えてくれる」**\r\nという機能的価値（B-1基準：一貫方策プレイヤーが無作為プレイヤーを個人点合計で上回る）は、\r\n**検証した3方策族・計35組（v1:15組+v2:12組+v3:8組）すべてで成立**した\r\n（効果量+94%〜+142%。各結果MDのB1列を参照）。\r\n\r\n> **タイプ開示ソロが賭けているのは、この「読みの機能的価値」の部分であり、\r\n> 「手札を解読する楽しさ」ではない。** 前者は3方策族全滅の中でも一貫して生き残った\r\n> 唯一の実証済み価値であり、後者は原理的に成立しないと分かった価値である。\r\n\r\n#### 【設計判断】タイプ開示方式 ―― 欠落部品（社会的事前知識）の補填\r\n\r\n上記の知見を踏まえ、design chatは「NPCの性格タイプを対戦前から開示する」方式へ転換した。\r\nこれは、上で仮説として挙げた「マルチプレイの読みは社会的事前知識に依る」という欠落部品を、\r\n**ソロ側に人工的に補填する**設計判断である。ゲームルール自体は無改変（タイプ＝NPCの\r\n方策パラメータの違いに過ぎず、好み配布・得点計算など核のロジックには一切手を入れていない）。\r\nプロトタイプ実装は `proto/witch_solo_proto.html`（詳細は引き継ぎ資料MD参照）。\r\n\r\n---\r\n\r\n## 4. コンポーネント選択の設計含意(まとめ)\r\n\r\n1. **コンポーネント選択 = 情報環境の選択。**\r\n   カードを選べば秘匿は無料、コマを選べば公開が基本、サイコロを選べば秘匿は高価。\r\n   核が要求する情報環境を先に言語化し、それを無料で提供するコンポーネントを選ぶ。\r\n\r\n2. **新メカニクス探索の\"物理版\"。**\r\n   方法論編は「物理の制約を外したら何ができるか」でデジタルの鉱脈を探した。同じ列挙は逆向きにも使える ――\r\n   **各コンポーネントの物理特性のうち、まだ組み合わされていないものを探す。**\r\n   デッキ構築ですら「束＋シャッフル＋購入」という既存アフォーダンスの未踏の組み合わせだった。\r\n   (探索の座標例:「サイコロの面の書き換え × 山札操作」=分布の編集を伏せて行う /\r\n   「タイルの裏表 × コマの向き」=ガイスター型の秘匿を盤面構築に載せる)\r\n\r\n3. **デジタル化とは、アフォーダンスの棚卸しである。**\r\n   デジタルは物理制約を消すが、**物理が無料で提供していた\"保証\"も消す。**\r\n   物理の山札は「誰も中を見ていない」ことが場の監視で保証されるが、\r\n   デジタルでは「DBに送らない」設計で再構築しなければならない(第3作のB方式)。\r\n   逆に、**手札枚数の漏洩のように、物理では隠せないものをデジタルなら隠せる。**\r\n   → デジタル化は「コンポーネントの性質を一つずつ、保証ごと再実装するか・意図的に変えるか」の選別作業。\r\n   **その選別で最も大きな鉱脈が「取得型の影」(§3-12)** ―― 物理では1枚のカードが全員に同じ影しか落とせないが、\r\n   デジタルでは**プレイヤーごとに違う層を見せられる**。\r\n\r\n4. **影は、設計論の共通言語である。**\r\n   秘匿・情報設計・評価の表示・UI の漏洩 ―― これまで別々の章に散っていた論点は、\r\n   すべて「影をどこに、どの濃さで、どの方向に落とすか」という一つの問いに還元できる。\r\n\r\n---\r\n\r\n## 5. 【探索の座標系】操作 × コンポーネント の行列\r\n\r\n### 5-1. 影は「操作」である ―― だから転写できる\r\n\r\n**影はカード固有の技法ではない。** 影とは、コンポーネントが持つ次元の一つ(=情報)を、\r\n粗い層と細かい層に割る**操作(operation)**である。\r\n\r\n同様の操作は他にもあり、そして決定的に重要なのは:\r\n\r\n> **操作は、コンポーネント間で転写できる。**\r\n> **そして、転写されていないマスが、そのまま新メカニクス探索の座標になる。**\r\n\r\nこれは既に歴史が証明している。\r\n**デッキ構築(カード) → バッグビルド(トークン) → ダイス構築(Dice Forge / Quarriors)** は、\r\n**同一の操作(=乱数源を自分で設計する)が、3つのコンポーネントに転写された履歴**である。\r\n誰も無から発明していない。**操作を横に滑らせただけ**。\r\n\r\n### 5-2. 行列\r\n\r\n| 操作 | カード | サイコロ | コマ | トークン/袋 | 盤 |\r\n|---|---|---|---|---|---|\r\n| **①影(層化)** | 海底探険・Innovation | **空白** | **ストラテゴ**・ガイスター | 麻雀牌(盲牌) | 戦争の霧 |\r\n| **②視点化(観測者依存)** | ハナビ・**取得型の影(未踏)** | **空白** | ガイスター | ― | 霧(デジタル) |\r\n| **③ビルド(乱数源の設計)** | デッキ構築 | Dice Forge・Quarriors | ― | バッグビルド | ― |\r\n| **④多義性(排他的な二役)** | Race for the Galaxy | ダイスプレイスメント(値=労働力) | ― | **共犯の体力**(投入=脱出) | ― |\r\n| **⑤痕跡(使うと跡が残る)** | ― | **空白** | それは俺の魚だ(負)・18xx(正) | ― | レガシー |\r\n| **⑥共有乱数** | 共有場の補充 | ロール&ライト | ― | ― | ― |\r\n\r\n### 5-3. 【発見1】サイコロの行が、空白だらけである\r\n\r\n③④⑥は埋まっているのに、**①影と②視点化が空いている。** 理由は明白:\r\n\r\n> **サイコロは「公開が自然」なコンポーネント**(§2-2の秘匿コスト表)。振った瞬間に全員に見える。\r\n> だから歴史上、**誰もサイコロに影を落とそうとしなかった。**\r\n> **そしてデジタルでは、その制約が消える。**\r\n\r\n- **影のあるサイコロ** = 「振ったが、粗い結果しか分からない乱数」。\r\n  判定を振って返ってくるのが「成功/失敗」ではなく **「たぶん大丈夫」** だけ\r\n- **視点化されたサイコロ** = 「同じ1回のロールが、人によって違って見える」。**物理では原理的に不可能**\r\n\r\n**【重要】これは我々が既に半分発明している。**\r\n第2作『握るか、逃げるか』の **危険度メーターの4段の帯**(正確な値を隠し、粗い層だけを見せる)は、\r\n**影を落とした確率変数**そのものである。名前がなかったために、これを「対症療法」に分類しかけた。\r\n\r\n**唯一の既存例に近いもの:キャメルアップ** ―― ピラミッド内に残っているダイスの**色**は分かるが、\r\n**出目**は分からない。粗い層が公開され、それが賭けのオッズを作る。\r\n**「賭けゲームの土台が、影のかかった乱数である」ことの実証**であり、\r\n§3-11で◎とした「影 × 競り/賭け」の相性を、既存作が裏づけている。\r\n\r\n### 5-4. 【発見2】コマの影には、完成された名作がある ―― ストラテゴ\r\n\r\n**ストラテゴ**:駒の**存在と位置**(粗い層)は完全に見えるが、**階級**(細かい層)は見えない。\r\nしかも ――\r\n\r\n> **前進してくる駒は、強い駒かもしれない。**\r\n> **行動が、影の上に載るシグナルになる。**\r\n\r\nこれは案A(実践記録集・第1記録)が要求していた\r\n**「大半が見えていて、一点だけ隠れている」情報環境**の、**完成された物理的実装**である。\r\n\r\n> **§3-10の処方箋「静的な影で文脈を作り、その上に動的な影をシグナルとして載せる」は、**\r\n> **ストラテゴで既に実証済みだった。** 我々の診断は正しかったが、新しくはなかった ―― それでよい。\r\n> 新しいのは、そこに**取得型の影(§3-12)を足す**こと。\r\n\r\n### 5-5. 【発見3】意図しない影は、必ずしもバグではない ―― 盲牌\r\n\r\n麻雀牌は指で触って判別できる(**盲牌**)。これは設計されていない影(§3-8)だが、\r\n**禁止されずに\"技術\"として受容された。**\r\n\r\n> **意図しない影の分岐点:**\r\n> **その影を読む力が「練習で身につく技術」なら → 機能になる**(盲牌、カードの癖の読み)\r\n> **「運や物理条件で決まる」なら → ノイズ/不正になる**(マークドカード、印刷のブレ)\r\n\r\n§3-8は「意図しない影 = 常にバグ」と読める書き方をしていたが、**これは不正確**。\r\n正しくは:**意図しない影を発見したら、\"消す\"か\"技術として昇華させる\"かを選ぶ。**\r\n消す前に、一度は後者を検討する価値がある。\r\n\r\n### 5-6. 使い方 ―― 空白のマスを掘る\r\n\r\n**この行列は、方法論編(第5部)の「未踏の組み合わせを体系的に探す」を、物理層で実行する道具である。**\r\n\r\n現時点で最も有望な空白:\r\n\r\n1. **サイコロ × 影**(=影のかかった乱数) → **§6で実際に掘削した。有望だが、致命的な穴も同時に発見**\r\n   → 賭け・競りとの相性が構造的に良い(キャメルアップが傍証)。第2作の危険度帯を一般化できる\r\n2. **サイコロ × 視点化**(=同じロールが人によって違って見える)\r\n   → 物理では絶対に不可能。**デジタルネイティブの最深部**\r\n3. **カード × 取得型の影**(§3-12)\r\n   → 光源の選択。魔女の調合の実装資産が流用できる\r\n4. **サイコロ × 痕跡**(=振った出目が盤に残り続ける)\r\n   → 未検討。掘る価値は不明\r\n\r\n> **注意:行列の空白は「未踏」を意味するが、「有望」を意味しない。**\r\n> 空白の多くは「誰も思いつかなかった」のではなく「試して死んだ」可能性がある。\r\n> 空白を見つけたら、**第1部のチェックリスト(§2-4→§2-2→§3→§4-1)と、§3-7の影の判定基準に必ず通すこと。**\r\n\r\n---\r\n---\r\n\r\n## 6. 【掘削記録・設計仮説】サイコロの影 ―― 乱数を「リスク」から「曖昧性」へ\r\n\r\n§5-3で「サイコロ × 影」を空白として特定した。ここを実際に掘った記録。\r\n\r\n### 6-1. 検討した構想\r\n\r\n> 色の異なる大量のサイコロがあり、**全プレイヤー共通**。各サイコロは**面の構成が全て異なる**。\r\n> **出目の分布は誰にも公開されていない。**\r\n> プレイヤーは、振られた出目の観測から **「どのサイコロが優秀か」を見分けて**勝利へ向かう。\r\n\r\n### 6-2. 既存作の探索 ―― ほぼ空白。そして「無い理由」が構造的\r\n\r\n**この構造の既存作は見当たらない。** 理由は物理制約にある:\r\n\r\n> **物理では、サイコロの面は隠せない。** 手に取ってひっくり返せば誰でも6面を読める。\r\n> **「分布の秘匿」は、物理コンポーネントとして原理的に不可能。**\r\n\r\n象徴的な傍証:**H.I.D.E.(Hidden Identity Dice Espionage)** ――\r\n「隠しアイデンティティ・ダイス」を名乗りながら、**全ダイスの面はマニュアルに掲載されている**。\r\n隠せるのは「どのダイスを取ったか」だけで、「そのダイスが何か」は隠せなかった。\r\n\r\n**最も近い親戚:『アルケミスト』** ―― 素材の隠された属性を、実験と観測から推論するゲーム。\r\n**そしてこの秘匿を\"アプリ\"で実現している。**\r\n→ **「隠された属性の推論」をやろうとした瞬間、デジタルの助けが要ることの、既存作による実証。**\r\n\r\nその他の親戚:Zendo / エレウシス(=帰納推論。ただし対象は確率でなく**規則**)。\r\n**ライアーズダイスは正反対**(分布は既知・結果が未知)。\r\n\r\n### 6-3. 【本質】乱数の意味が変わる ―― リスク → 曖昧性\r\n\r\n| | 分布 | 結果 | 不確実性の種類 |\r\n|---|---|---|---|\r\n| **全ボードゲーム史のサイコロ** | **既知** | 未知 | **リスク(risk)** |\r\n| **この構想** | **未知** | **観測可能** | **曖昧性(ambiguity / Knightian uncertainty)** |\r\n\r\nボードゲームのサイコロは、例外なく「分布が既知で、結果だけが未知」の装置だった。\r\n**それを反転させると、乱数のカテゴリそのものが変わる。**\r\n\r\n### 6-4. なぜ強いか ―― §2-5 と §4-1 が同時に解ける\r\n\r\n**曖昧性は、観測によって減る。= 学習できる。= 技術になる。**\r\n\r\n- **運が結果に、実力がプロセスに**(§2-5「実力と運の両立」の理想形) ―― 出目は運だが、**見極めは実力**\r\n- **敗北の帰属**(§4-1) ―― 「運が悪かった」ではなく **「見極めを誤った」**\r\n  (= 特定の・可変の・行動への帰属 = 健全)\r\n- **同時に、運の逃げ場も残る** ―― 「**サンプルが足りなかった**」(= 自責の緩衝材)\r\n\r\n> **§4-1が理想として掲げた「敗因は自分の判断に帰属できるが、自責にはならない」が、構造的に成立する。**\r\n> **方法論編(第5部§4)の「敗北感=最強のフィルター」を、満点で通る核。**\r\n\r\n### 6-5. 自動的に湧いてくる構造\r\n\r\n1. **探索 vs 活用(多腕バンディット問題)**\r\n   ―― 「もっと振って見極めるか、今の推定で刈り取るか」。\r\n   **§2-4(a)「今か将来か」の、数学的に純粋な形**。最も普遍的で強力なジレンマ型。\r\n2. **情報が公共財になる**\r\n   ―― 共有のサイコロを誰かが振ると、**全員がタダで学ぶ**。\r\n   → **「誰が最初にコストを払って探索するか」のフリーライダー合戦**。\r\n   **第2作『握るか、逃げるか』の監査(volunteer's dilemma)と同型** ―― 既に一度掘り当てた鉱脈。\r\n3. **推定そのものが私的情報になる**\r\n   ―― 「あのサイコロが当たりだと気づいた」ことを、**行動から悟られないように隠す**。\r\n   ブラフ層(§5-4 社会系)が自動生成される。\r\n\r\n### 6-6. 【致命的な穴】核と病が同じ場所にある可能性\r\n\r\n> **出目が全員に全公開なら、全員の事後推定が一致する。**\r\n> 同じデータ → 同じ事後分布 → **情報非対称がゼロ**\r\n> → 残るのは「誰が正確にベイズ計算できるか」 → **答えが計算で一意に出る**\r\n> ―― **これは遅信(実践記録集・第2記録)の死因の完全な再現。** しかもAP地獄(§3-2)＋初心者虐殺つき。\r\n\r\n**方法論編の生死判定「その欠点は、長所を殺さずに直せるか?」を、必ず通すこと。**\r\n案B・方向i型(核の魅力と最大の病が同じ場所にある)と、同型の危険がある。\r\n\r\n| 対策 | 評価 |\r\n|---|---|\r\n| 観測を私的にする(自分が振った結果しか見えない) | ○ だが「情報が公共財」という美点を殺す |\r\n| 記憶負荷で個人差を出す | **✕ 記憶ゲーム化。技術でなく苦行**(§3-1認知負荷) |\r\n| 振れる回数を希少にする(全員が不完全なまま決断) | ○ 有効。ただし単体では不十分 |\r\n| **観測にさらに影を重ねる**(結果でなく「粗い結果」だけ見える) | ◎ **影の二段重ね**。推定に個人差が残る |\r\n| **早取り / 競り**(「当たりだ」と気づいても、取れるのは1人だけ) | **◎◎ 下記** |\r\n\r\n### 6-7. 【合流】掘ると、必然的に「競り」に着地する\r\n\r\n**推定が全員一致していても、「確信の度合いに値をつけて競る」なら、ゲームは死なない。**\r\n\r\n- 全員が「このサイコロは良さそうだ」と思っている → **だからこそ競り上がる**\r\n- 落札するのは**最も高く評価した者** = **最も過大評価した者**\r\n  → **ウィナーズ・カースが、構造的かつ純粋形で発生する**\r\n- **エルズバーグの逆説**:人間は曖昧性を過小評価する\r\n  → **現実の人間心理が、そのままゲームの駆け引きになる**(§6 テーマ融合の理想形に近い)\r\n\r\n> **「サイコロの影」を掘ると、必然的に「情報非対称の競り」(§3-11で◎判定)に着地する。**\r\n> **2つの糸が、ここで合流した。**\r\n> (実践記録集・第2記録の総括「**探索は合流する**」――\r\n> 案Aで追った核が案Cで結実したのと、同じパターンの再現)\r\n\r\n> **【その後の更新 → §6-9】** 設計者の原体験を確認した結果、指が止まったのは\r\n> **「競り(値をつける)」ではなく「早取り(取られる前に取るか、待つか)」**の瞬間だった。\r\n> 本節の推論(競りへの着地)は理屈としては正しいが、**核はもう一段手前にあった。**\r\n> 採用したのは**早取り + バッティング**。§6-9を正とする。\r\n> ―― **理屈の美しさより、設計者が固まった瞬間を優先する**(共犯の最大の教訓の実践)。\r\n\r\n### 6-8. 次の検証項目(未着手)\r\n\r\n- [ ] **事後分布の収束速度**:何回の観測で、全員の推定が「実用上一致」してしまうか(シミュレーション)\r\n- [ ] **曖昧性の残し方**:サイコロの種類数 × 面の分散 × 観測回数 の、どの領域で「読めるが確定しない」帯に入るか\r\n- [ ] **競りとの接合**:落札対象は「サイコロそのもの」か「そのサイコロを振る権利」か\r\n- [ ] **§4-1の実証**:「見極めを誤った」という敗北が、本当に納得感を生むか(=人間テストでしか分からない)\r\n- [ ] **計算ゲーム化の検査**:上級者が電卓的に最適化できてしまわないか(=遅信の死因の再検査)\r\n\r\n---\r\n### 6-9. 【核の確定】設計者が固まった瞬間 ―― 「待つか、今取るか」\r\n\r\n§6-8の検証項目を回す前に、共犯の教訓(**「設計の芯は、自分が実際に固まった瞬間から取り出せ」**)に従い、\r\n設計者の原体験を確認した。**指は止まった。** その言語化:\r\n\r\n> **「相手に取られる前に、強そうなダイスを取るか。**\r\n> **それとも、もっと観測を重ねて\"本当に強いか\"を確かめるか ―― 取られるリスクを見越して。」**\r\n\r\n#### 構造の診断:時間が、二つの量を逆向きに動かす\r\n\r\n> **情報は時間とともに増える**(振るほど確信が持てる)。\r\n> **機会は時間とともに減る**(他人に取られる)。\r\n> **二つの欲しいものが、同じ「時間」という一つの資源を奪い合っている。**\r\n\r\nこれは遅信の診断が要求した条件 ――\r\n**「二つの欲しいものが同じ資源を奪い合っていないと、ジレンマは生まれない」** ―― を正面から満たす。\r\nまた、共犯の「言い訳システム」が持っていた美点(**時間とともに利得と正当性が逆方向に働く**)と**同じ形**である。\r\n\r\n#### これが §6-6 の致命的な穴を殺す\r\n\r\n§6-6の警告は「全員の推定が一致したら情報非対称がゼロになる」だった。\r\n**だが早取り構造では、推定の一致は問題にならない。**\r\n\r\n- **取れるのは1人だけ**なので、全員が「当たりだ」と気づいた瞬間は、**チキンレースの開始**であってゲームの終わりではない\r\n- 最大の読みは **「他人はまだ気づいていないか?」** になる\r\n\r\n> **答えを割るのが、計算ではなく「読み切れない他者」に戻った。**(共犯の記録が到達した結論そのもの)\r\n\r\n#### 接合部:「同時に気づいた」をどう裁くか ―― バッティング\r\n\r\n全員が同時に「これだ」と思ったとき、手番順で決めるのは恣意的で理不尽(§4-1)。\r\n→ **同時秘密選択(バッティング)** を採用候補とする。\r\n\r\n- 誰も見ていないダイス → **単独で、安く確保できる**\r\n- 全員が狙ったダイス → **取り合いになって潰れる/高くつく**\r\n- → **最高の一手は「みんながまだ気づいていない当たり」を見つけること**\r\n\r\n> **「自分だけが気づいている」ことに価値が生まれ、情報の私的価値が復活する。**\r\n> 読みの構造は **「他人の推定を推定する」** になる ――\r\n> 設計者の原体験(コヨーテ=相手の宣言から自分を推測 / スカル=あえて定石を外す)と、同じ思考の芯。\r\n\r\n#### 残る穴と、その解 ―― 取得型の影(§3-12)の合流\r\n\r\n**穴:振ると全員が学ぶなら、誰も振りたがらない**(探索コストを払った者が損する = フリーライダー問題)。\r\n\r\n**解:振る = そのダイスに「光を当てる」行為(§3-12 取得型の影)。**\r\n\r\n> **振った本人は、正確な出目を見る。他人には、粗い影しか見えない。**\r\n\r\n- 振る人に**私的な優位**が生まれる(= 探索する動機ができる)\r\n- だが **「あいつがあのダイスに光を当てた」** ことは全員に見える → **意図が漏れる**\r\n- → **「調べたい。だが調べると、興味を持っていることがバレる」**\r\n- **探索そのものが、シグナルになる**(= 動的・取得型の影が、動的・発信型の影を生む。§3-12の予測どおり)\r\n\r\n#### 3本の糸の合流\r\n\r\n| 糸 | 発見の経緯 | 果たす役割 |\r\n|---|---|---|\r\n| **サイコロの影**(分布が未知) | §5-3の空白マスから | 曖昧性 → **見極めが技術になる**(§4-1が解ける) |\r\n| **取得型の影**(光を当てる) | §3-12の設計仮説から | **探索に私的優位を与える / 意図を漏らす** |\r\n| **早取り + バッティング** | 設計者の原体験から | **待つことに他者リスクを与える / 推定の一致を緊張に変える** |\r\n\r\n3つとも別々の日に、別々の理由で見つかったものであり、**相互に穴を塞いでいる。**\r\n→ 案C記録の上位判定 **「穴の対策が核を拡張する案は、強い」** を通過している。\r\n\r\n#### 核の定義(A・B・C) ―― 以降、全ての追加要素をこれで検査する\r\n\r\n- **A(曖昧)**:ダイスの強さは、観測からしか推定できない。**確定できない**\r\n- **B(希少)**:確保できるのは1人だけ。**待てば、失う**\r\n- **C(伝播)**:自分の観測は、粗い影として他人にも伝わる。**調べる行為が意図を漏らす**\r\n\r\n> **A・B・C に奉仕しない要素は、すべて削る。**(共犯で有効だった規律)\r\n\r\n#### 懸念(未解決・優先度順)\r\n\r\n1. **スラックの検査**(共犯の死因の再来防止) ――\r\n   「待つ」が実際に選べるだけの余裕があるか。**待つのが常に損/常に得**なら、選択は飾り。\r\n   共犯の「0〜4が実質4一択」を絶対に繰り返さない\r\n2. **安全均衡** ―― 「全員が最後まで待つ」が均衡にならないか。\r\n   → **終了トリガーが必須**(ダイスが尽きる、ラウンド上限)。共犯の要件2「核が尽きたら速やかに終わる」\r\n3. **記憶ゲーム化** ―― 観測履歴の暗記は苦行。**履歴は常時公開ログにする**(判断の補助はOK、肩代わりはNG)。\r\n   ただし**ログを出すと計算ゲーム化のリスク**。救いは、**ログに残るのが「粗い影」なら、集計しても確定しない**こと\r\n4. **「優秀なダイス」の定義が未設計** ―― 得点構造・テーマとも未定。ただし**核が先**(§0の設計順序)\r\n5. **キングメイク** ―― 早取りは直接妨害に隣接。全体への早取りなので狙い撃ちにはなりにくいが、要監視\r\n\r\n---\r\n### 6-10. 【MVP確定案】核を最も際立たせる形\r\n\r\n§6-9で核(A曖昧・B希少・C伝播)を確定した後、3つの未定事項\r\n(優秀さの定義 / 確保後の用途 / 手番構造)を、**すべて核の一点に奉仕させる**形で解いた。\r\n\r\n#### 核の最終形(§6-9より一段鋭い言い方)\r\n\r\n> **調べれば、確信は増す。だが、調べれば、奪われる。**\r\n\r\n「時間が情報と機会を奪い合う」の、より鋭い形。\r\n**「調べる」という行為そのものが、自分を追い込む。** 以降、全要素をこの一点で検査する。\r\n\r\n#### ① 優秀さの定義 → 二層(共通価値 + 私的価値)\r\n\r\n| 層 | 中身 | 何を生むか |\r\n|---|---|---|\r\n| **共通価値** | 期待値が高い = 誰にとっても良い | **取り合い**(B) / **ウィナーズ・カース** |\r\n| **私的価値** | 「自分が欲しい目」が出やすい | **「あいつは何を欲しがるか」の読み**(C) |\r\n\r\n現実のオークション理論(common value + private value)と同型。理論的裏付けがある。\r\n\r\n- **共通価値だけ**にすると:全員が同じデータから同じ結論に達し、**他人の内部状態を読む必要が消える**(§6-6の穴が残る)\r\n- **私的価値だけ**にすると:取り合いが減り、**B(希少)が死ぬ**\r\n\r\n**私的価値の効果:**\r\n\r\n> **本当に自分が欲しいダイスほど、光を当てられない。**\r\n> **調べれば「私はこれが欲しい」と宣言するのと同じだから。**\r\n> → **「調べずに取るか、調べてバレるか」**\r\n\r\n> **【訂正 → §6-11】** 当初、これを「案Aの核(見なかったことの証明)の復活」と評価したが、**誤りだった。**\r\n> MVPでは**「誰が何を振ったか」が公開**であるため、**\"誰が何を知っているか\"が完全に追跡可能**であり、\r\n> 「調べずに取る」は**検証可能=ブラフにならない**(純粋な賭けにとどまる)。\r\n> **本物のブラフは別の場所にある。詳細は§6-11。**\r\n\r\n**「ピックの失敗=即敗北」への対策:** 1人が3〜4個確保する設計にする(§2-5ランダム性の分散 / §4-1の緩衝)。\r\n\r\n#### ② 確保後の用途 → 直接対決は捨てる。ダイスは「自分の乱数源」になる\r\n\r\n**雑魚狩り問題を回避するため、直接対決・相対評価は採らない**\r\n(共犯:「排他的な奪い合いは駆け引きを終わらせる」/ 第2作:「winner-take-allは戦略多様性を潰す」)。\r\n\r\n> **確保したダイスは、以降\"自分の手番で振る乱数源\"になる。**\r\n> **早く取れば、長く使える。だが確信が薄い。**\r\n> **遅く取れば、確実だ。だが使う時間が短い。**\r\n\r\n**「情報と機会が時間を奪い合う」が、得点構造として直接実装される。**\r\n\r\n副産物:\r\n1. **答え合わせが公開で継続進行する** ―― 使うたびに真の姿が晒される。\r\n   第1作の最大の教訓(**秘匿情報は答え合わせとセットでないと機能しない**)が構造的に満たされる\r\n2. **§4-1が完璧に立つ** ―― 「あのダイスを信じたのが間違いだった」(帰属可能)\r\n   ＋「サンプルが足りなかった」(運の逃げ場)の両立\r\n3. **正のループと負のループが同じ一軸に内蔵される** ―― 早取り=有利(長く使える)だが情報が少ない /\r\n   遅取り=不利(短い)だが確実。**キャッチアップ機構を別途足す必要がない**(§2-2)\r\n\r\n#### ③ 手番構造 → 「振る」と「取る」が食い合う。バッティングは撤回\r\n\r\n**§6-9で提案したバッティング(同時秘密選択)は撤回する。手番制の早取りで足りる。**\r\n\r\n- 手番に選べるのは**1つだけ**:**「1つのダイスを振る」**か**「1つのダイスを取る」**\r\n- 誰かが取れば、それで終わり\r\n- → **「次の自分の手番まで、あのダイスは残っているか?」** が、そのまま読みになる\r\n\r\n**「手番順で決まるのは恣意的では」という懸念は誤りだった。**\r\n取り逃すのは**自分が待つと決めたから**であり、**「一手番、待ちすぎた」は最も自己帰属可能な敗北**(§4-1)。\r\nバッティングを外すとルールが1つ消え、核が濃くなる(共犯:**「簡素化は面白さを削らない」**)。\r\n\r\n#### MVP ルール骨格\r\n\r\n```\r\n【手番】次のどちらか1つだけ:\r\n  ① 振る — ダイス1つを振る。自分は正確な出目を見る。\r\n           他人には「粗い影」だけが見える。\r\n           そして「誰があのダイスに光を当てたか」は全員に見える。\r\n  ② 取る — ダイス1つを確保する(早い者勝ち)。以降、それは自分の乱数源になる。\r\n\r\n【得点】確保したダイスを、自分の手番で振って得点する。\r\n       振ると、真の姿が全員に晒れていく。\r\n\r\n【終了】ダイスが尽きる、またはラウンド上限。\r\n```\r\n\r\n#### 一言テスト(共犯の検出器)\r\n\r\n> 「隠された強さのダイスを、**調べたい。だが調べると、欲しがっていることがバレて、奪われる。**」\r\n> ―― **核が、説明の中心に登場している。**\r\n> (共犯の失敗 = 「協力して発掘して、貢献度順に拾い集める」に**裏切りが登場しなかった**、の逆)\r\n\r\n#### 懸念(未解決・優先度順)\r\n\r\n1. **私的価値(秘密目標)は、MVPでは外すべきかもしれない。**\r\n   核(A・B・C)は共通価値だけでも成立する。まず**引き算した骨だけ**を回し、\r\n   「他人を読む必要が本当に足りないか」を確認してから足すのが、共犯の教訓(引き算の設計)に忠実。\r\n   **足すのは簡単、抜くのは難しい。**\r\n2. **「粗い影」の解像度が最大の綱渡り。**\r\n   濃すぎれば計算ゲーム(遅信の死因)、薄すぎれば無意味(第1作の「気配」の死因)。\r\n   **必ずシミュレーションで測る**(§3-4の候補絞り込み手法を流用)。\r\n3. **スラック未検証(最優先)。**\r\n   「振る手番」と「取る手番」の交換レートが悪いと、どちらか一択になる\r\n   (共犯の「0〜4が実質4一択」の再来)。**最初に測るべき数値。**\r\n\r\n---\r\n### 6-11. 【訂正と発見】ブラフはどこにあったか ―― 「知識状態」は公開されている\r\n\r\n#### 訂正:「調べずに取る」はブラフではない\r\n\r\n§6-10で「調べずに取る = 案Aの\"見なかったことの証明\"の復活」と評価したが、**これは誤りだった。**\r\n\r\n> **MVPでは、データは私的だが、「誰が何を知っているか」は完全に公開されている。**\r\n> (誰がどのダイスを振ったかが全員に見えるため)\r\n> **検証可能なものは、ブラフにならない。**\r\n\r\n「調べずに取った」人が何を知っているかは、全員に**計算可能**(=「何も知らない」ことが確定している)。\r\n豪胆さのシグナルではあっても、ブラフではない。\r\n\r\n> **一般化:秘匿情報ゲームでは「データの秘匿」と「知識状態の秘匿」を区別せよ。**\r\n> **データだけ隠しても、\"誰が何を調べたか\"が見えていれば、二次の情報(知識状態)は公開されている。**\r\n> **ブラフが立つのは、二次の情報が隠れているときだけ。**\r\n\r\n#### 発見:本物のブラフは、手番構造の中に無料で存在していた\r\n\r\n手番構造を見直すと、こうなっている:\r\n\r\n```\r\nA が #7 を振る（Aの手番は終了）→ 粗い影が全員に公開される\r\n        ↓\r\nB の手番。B は #7 を取れる。\r\n```\r\n\r\n> **調べたら、その手番は終わっている。次の人に、取られる。**\r\n> ―― **核(調べれば奪われる)の、最も直接的な実装。手番構造だけで既に出ていた。**\r\n\r\nそしてここに**本物のブラフ**が立つ:\r\n\r\n- **Bの読み:**「Aは正確な値を見た。**取りに来るなら、良いダイスだ。** 横取りするか?」\r\n- **だがAが取りに来ないなら、悪いダイスだ。**横取りは損\r\n- **Aの読み:**「取ってしまえば勝ち。だが**次の自分の手番までは、Bに取られる**」\r\n- **Aは「欲しくないフリ」ができるか?** → 一巡待てばできる。**だが待てば奪われる**\r\n\r\n> **本物のブラフは「調べたのに取らない」の側にあった。**\r\n> **「調べずに取る」は、ブラフではなく純粋な賭け ―― それで十分に核である。**\r\n> **しかもこの読み合いは、ルールを1行も足さずに存在している。**\r\n\r\n#### 検討したが、MVPでは採らない案:「初期の私的な影」\r\n\r\n「開始時に各自がランダムなダイスの粗い情報を私的に持つ」(Cryptid / アルケミストの定石)。\r\n**ブラフは成立する**(誰が最初から何を知っているか不明 = 二次の情報が隠れる)。**だが採らない:**\r\n\r\n- **核と直交している(足し算)** ―― 核は「調べる/奪われる」の緊張であって、初期配布の運ではない\r\n- **情報が運で配られる** ―― 引きの不公平が§4-1の帰属を壊す\r\n- **MVPは骨だけで回す**(共犯の教訓:引き算。**足すのは簡単、抜くのは難しい**)\r\n\r\n#### 【拡張候補・保留】有限プール ―― 核を\"強化する\"ブラフ層\r\n\r\nブラフ層が薄いと判明した場合の**第一候補**。\r\n\r\n> **全ダイスの面の値の\"内訳\"だけが公開されている**\r\n> (例:全16個×6面=96面。「0が10面、1が12面…」という総量だけが既知)\r\n\r\n- ダイス#3を正確に知ると、**残り全部の推定が更新される**(=カウンティング)\r\n- → **「調べずに取る」が、\"他のダイスを調べた結果からの推論\"として正当化されうる**\r\n  → **検証不能 → ブラフ復活**(= 二次の情報が隠れる状態を、追加ルールなしで作れる)\r\n- → **調べる価値が二重になる**(そのダイス自体 ＋ 全体の推定更新) → **「調べたい」圧力が上がる**\r\n- → だが調べれば奪われる → **「奪われる」圧力も上がる**\r\n- **両方が同時に強くなる = ジレンマが濃くなる。核を強化する。**\r\n\r\n**副産物:** 終盤ほど推定が収束する = **緊張が自動的に右肩上がりになる**(§5の枯渇型アーク)。\r\n\r\n**構造的意義:** これは**§5-2の行列の空白を埋める操作**そのもの ――\r\n**山札の性質(記憶のある乱数・カウンティング可能)を、サイコロに移植する。**\r\n\r\n**懸念:** カウンティングは計算ゲーム化・記憶負荷・AP地獄に直結する(**遅信の死因**)。\r\n救いは、**影が粗く、ダイスが大量なら、完全なカウンティングは人間には不可能**であること ――\r\nヒューリスティックに落ちて、個人差 = 技術になる。**ただし実測が必要。**\r\n\r\n#### MVPの方針(確定)\r\n\r\n1. **案Aの核(見なかったことの証明)の復活は、MVPでは諦める。** 骨が動いてから拡張として検証する\r\n2. **「調べずに取る」= 純粋な賭け。それで十分。** ブラフは「調べたのに取らない / 他人が調べたダイスを横取りする」の側にある\r\n3. **有限プールは、ブラフ層が薄いと分かったときの第一候補**として保留\r\n\r\n---\r\n### 6-12. 【設計決定】ダイスの面は「重複あり」―― 演繹でなく帰納にする\r\n\r\n**問い:** 各ダイスの6面は、すべて異なる値にするか(重複なし)? 同じ値が複数あってよいか(重複あり)?\r\n\r\n**結論:重複あり。一択である。**\r\n\r\n#### 決定的な理由:演繹か、帰納か\r\n\r\n| | 重複なし(6面すべて異なる) | **重複あり** |\r\n|---|---|---|\r\n| 情報の性質 | **演繹**(集合の同定・マスターマインド型) | **帰納**(分布の推定・ベイズ型) |\r\n| 十分に振ると | **完全に判明する** | **永遠に確定しない** |\r\n| 情報の終点 | **ある**(6面見たら終わり) | **ない**(収穫逓減) |\r\n| **核A(確定できない)** | **死ぬ** | **構造的に守られる** |\r\n\r\n**核Aの定義は「確定できない」。重複なしにした瞬間、この核が死ぬ。**\r\n\r\n#### さらに決定的:重複なしは支配戦略を生む\r\n\r\n重複なしだと、**情報に「完成」がある**(6面全部見たら、それ以上振っても無価値)。\r\n\r\n> → **「見切るまで振る、それから決める」が支配戦略化する。**\r\n> → **「どこで打ち切るか」というジレンマ(§2-4a 今か将来か)が、崖になって消える。**\r\n\r\n重複ありだと、**振るほど推定は良くなるが、決して完成しない = 収穫逓減**。\r\n\r\n> → **「もう一回振るか、もう十分か」が、永遠に判断であり続ける。**\r\n> → **探索/活用のジレンマが、最後まで生き続ける。**\r\n\r\n#### §4-1(敗北感)も、重複ありが守る\r\n\r\n- **重複あり** → 負けたとき「**サンプルが足りなかった**」という**運の逃げ場が残る**(自責の緩衝材)\r\n- **重複なし** → 「調べれば分かったのに調べなかった」= **完全な自己責任** = **自責の刃**\r\n\r\n**「読み切れるはずだったのに読み切れなかった」は、運で負けるのと同じ無力感の別ルート**(§4-1の但し書き)。\r\n\r\n> **「同じ目が出たとき、それが同じ面か違う面か区別がつかない」―― この曖昧さこそが、核の本体である。**\r\n> (§6-3「乱数をリスクから曖昧性に変える」の、実装上の正体)\r\n\r\n#### 【副産物】「強さ」は期待値だけではない ―― 分散が私的価値の源泉になる\r\n\r\n重複を許すと、**分散**が生まれる:\r\n\r\n- ダイスX = `[0,0,0,10,10,10]` ―― 期待値5、**高分散**\r\n- ダイスY = `[4,5,5,5,5,6]` ―― 期待値5、**低分散**\r\n\r\n**どちらが優秀かは、得点構造による。**\r\n\r\n> **これが「私的価値」(§6-10①)の自然な源泉になる。**\r\n> 「安定して稼ぎたい人」と「一発が欲しい人」で、欲しいダイスが違う。\r\n> → **秘密目標カードを足さなくても、共通価値/私的価値の二層が実装できる可能性がある。**\r\n\r\n(拡張候補として保留。MVPは骨だけで回す。)\r\n\r\n#### 【実装上の警告】面を完全ランダム生成してはいけない\r\n\r\n面を独立にランダム生成すると、**「たまたま全ダイスが似た強さ」の回**が発生する。\r\nその回は**見極めが無意味**になり、**核が空転する**。\r\n\r\n> **当たりダイスと外れダイスが確実に存在することを、配布で保証する。**\r\n> (第3作『魔女の調合』の教訓「**配布の健全性**」と同型)\r\n\r\n具体案:期待値の階層(高/中/低)を一定数ずつ用意し、その中で面をランダム生成する。\r\n\r\n**ただし階層を作りすぎると、影の解像度次第で「一目で分かる」ことになりかねない。**\r\n\r\n> **「当たりは確かに存在するが、少数の観測では見分けられない」――**\r\n> **この帯を探すことが、シミュレーションの本丸である。**\r\n\r\n---\r\n### 6-13. 【シミュレーション実測】核の修正 ―― C(伝播)は毒だった\r\n\r\nMVP(§6-10)をモンテカルロで検証した結果、**当初の設計は3回死んだ。**\r\nその3つの死因と、修正後に見えた構造を記録する。\r\n\r\n#### 死因1:得点に「稼働期間」を乗せると、情報が絶対に勝てない\r\n\r\n初期実装:得点ロールも手番を消費し、確保後は毎手番振って得点する。\r\n\r\n| 戦略 | 得点 |\r\n|---|---|\r\n| 調べずに即取り | **75.1** |\r\n| 1回調べてから取る | 13.2 |\r\n| 2回以上調べる | **0.0** |\r\n\r\n> **得点 = 確保数 × EV × 稼働期間(R − 確保ラウンド)**\r\n> **1ラウンド待つコスト = 13.5点。1手番の調査で得られるEV改善 = 0.065点。**\r\n> **時間の価値が、情報の価値の200倍あった。**\r\n\r\n**→ 修正:確保フェーズと得点フェーズを分離する。** 全員が同じ回数だけ振る。\r\nこれで「早取りの利得」は「良いダイスを確実に取れる」だけになり、待機の利得(情報)と釣り合う。\r\n\r\n> **一般教訓:「情報を得る行動」と「得点を得る行動」が同じ資源(手番)を食い合うとき、**\r\n> **得点側に\"時間に比例する報酬\"があると、情報は構造的に敗北する。**\r\n> **探索/活用を成立させたいなら、得点は時間に対して中立でなければならない。**\r\n\r\n#### 死因2:【最重要】影を他人に漏らすと、タダ乗りが最適になり、調査が死ぬ\r\n\r\nフェーズ分離後、調査に価値は出た(鏡像戦:調べない108点 < 1回調べる120点)。\r\n**だが、他人が調べているとき、自分は調べずに即取りするのが最適だった**(130.8 vs 116.4)。\r\n\r\n> **ナッシュ均衡 = 「全員が調べない」(108点)。全員が調べれば120点。**\r\n> **完全な公共財ゲーム。合理的プレイヤーは全員\"調べない\"に収束し、核が消える。**\r\n\r\n**「漏れ」の閾値を実測した(leak = 他人が得る帯情報の重み):**\r\n\r\n| leak | 均衡での最良応答 | タダ乗り誘因 |\r\n|---|---|---|\r\n| **0.00**(結果は一切漏れない) | **d=1(調べる)** | **なし** |\r\n| 0.15 | **d=0(調べない)** | **★あり(+16.8)** |\r\n| 0.30 / 0.50 / 1.00 | d=0 | ★あり |\r\n\r\n> **漏れの許容量は、ほぼゼロ。少しでも結果が漏れると、即座にタダ乗りが最適になる。**\r\n\r\n**→ 核の修正が必要だった。**\r\n\r\n| | 当初のC(§6-9) | **修正後のC** |\r\n|---|---|---|\r\n| 内容 | 「自分の観測は、**粗い影として他人にも伝わる**」 | 「**調べるという行為**が、他人に見える」 |\r\n| 影の向き | 世界 → 全員 | **世界 → 自分**(自分にも粗い帯しか見えない) |\r\n| 他人が得るもの | 粗い結果 | **行動だけ**(誰がどれを調べたか) |\r\n| 結果 | **タダ乗りで核が死ぬ** | **調査に私的優位が生まれ、核が生きる** |\r\n\r\n> **これは第3作『魔女の調合』の最重要教訓の、完全な再確認である:**\r\n> **「秘匿情報ゲームでは\"行動\"を読ませる。数値は出すほど秘匿を壊す。」**\r\n> 今回は「秘匿を壊す」だけでなく、**探索のインセンティブごと破壊した。**\r\n\r\n**そして「影」の正しい向きが確定した:**\r\n> **影 = 「自分が世界から得る情報の粗さ」であって、「他人に漏れる情報」ではない。**\r\n> 1回振っても粗い帯しか分からない → **収穫逓減** → 「もう一回調べるか」が永遠に判断であり続ける。\r\n> 他人に見えるのは **「あいつがあのダイスを調べた」という行動の影だけ**(= C・伝播はここに残る)。\r\n\r\n#### 修正後の実測 ―― スラックは存在した\r\n\r\n**leak=0 / フェーズ分離 / spread=3.5 での鏡像戦:**\r\n\r\n| 調査深さ d | 得点 | 判定 |\r\n|---|---|---|\r\n| d=0(調べない) | 107.98 | **損** |\r\n| d=1 | 112.09 | ○ |\r\n| **d=2** | **112.58** | **最良** |\r\n| d=3 | 112.08 | ○ |\r\n| d=4〜6 | 111.6 → 110.8 | **逓減(調べすぎは損)** |\r\n\r\n> **「調べないと損。調べすぎても損。最適は狭い帯にある。」**\r\n> **= 選択が生きている**(共犯の死因「実質一択」を回避した)。\r\n\r\n**spread(面の分散)が、最適な調査深さを制御することも確認:**\r\n\r\n| spread | 最良 d |\r\n|---|---|\r\n| 2.0 | d=1 |\r\n| 3.0〜4.5 | d=2 |\r\n| 6.0 | d=3 |\r\n\r\n→ **spread = 影の解像度の実質的な制御パラメータ**(§6-12の予測どおり)。\r\n\r\n#### 【未解決・次の課題】効果量が小さすぎる\r\n\r\n**最大の問題:調べても得点が4%しか変わらない**(108 → 112.6)。\r\n確保ダイスの平均EVは 4.50 → 4.69、高ティア確保数は 0.75個 → 0.82個(16個中4個が高ティア)。\r\n\r\n> **「調べても、大して変わらない」= 共犯の死因「どっちでもいい」のリスク。**\r\n> **構造は正しくなったが、\"見極めの価値\"がまだ足りない。**\r\n\r\n原因:16個から3個を選ぶのに、使える調査手番が7回しかない。**探索空間に対して情報が足りなすぎる。**\r\n\r\n**調整候補(未検証):**\r\n- ダイス数を減らす(16 → 10)= 探索空間を絞る\r\n- 確保フェーズを長くする\r\n- ティア差を広げる(高7/中4.5/低2 → 高8/中4.5/低1)\r\n- 得点を非線形にする(良いダイスの価値を跳ね上げる)\r\n\r\n---\r\n### 6-14. 【核の実証】横取りNPCを入れた瞬間、核が立った ―― そして重大な検証ミスの記録\r\n\r\n#### 検証ミス:核の3分の1を実装せずに「核が弱い」と結論しかけた\r\n\r\n§6-13までのシミュレーションは、**NPCが互いを一切見ていなかった。**\r\n「誰が何を調べたか」を戦略に使っていない ―― **C(伝播)を、まるごと実装していなかった。**\r\n\r\nしたがって測っていたのは:\r\n\r\n> **「一人で遊んだとき、調査は得点を上げるか?」= ソリティアの情報価値(+10.8%)**\r\n\r\n**核はそこにない。核はこれである:**\r\n\r\n> **「あいつがあのダイスを調べている。良いダイスなのか? 先に取ってしまうか?」**\r\n\r\nさらに**横取りの利得は、情報価値の全額**である ――\r\nAが3回掘って確信したダイスをBが奪えば、Bが得るのは全知の価値(EV 7.1 vs ランダム 4.5 = **+58%**)。\r\n**調査した本人ではなく、それを見ていた人が丸取りする。**\r\n\r\n> **【自戒】NPCが互いを見ていないシミュレーションは、心理戦の核を測れない。**\r\n> **資料に何度も書いてある教訓を、設計中に自ら踏んだ。**\r\n> **「核が弱い」という結論が出たら、まず\"核を実装したか\"を疑え。**\r\n\r\n#### 横取りNPCを入れた結果 ―― 核は立っていた\r\n\r\n**実装:** 「誰が何回掘ったか」を公開情報にする。\r\n**1回目の調査はノイズ(任意選択)、2回目以降がシグナル**(=手応えを感じて掘り返した)。\r\n横取り屋は「他人が2回以上掘ったダイス」を奪う。\r\n\r\n**基準3人=(深く掘る + 横取りする)の中で、逸脱者が掘る深さを変える(3000戦):**\r\n\r\n| 掘る深さ | 得点 | 確保EV | **被横取り** | 勝率 |\r\n|---|---|---|---|---|\r\n| **0(掘らない)** | 108.20 | 4.51 | 0.00 | **19.6%** ← 損 |\r\n| **1(1回だけ掘って即取り)** | **125.49** | **5.23** | **0.00** | **36.1%** ← **最良** |\r\n| **2以上(深く掘る)** | 116.57 | 4.86 | **1.13回** | 25.3% ← 奪われる |\r\n\r\n> **深く掘れば確信は増す。だが2回目からシグナルが出て、奪われる。**\r\n> **掘らないのも損。深く掘るのも損。最適は狭い帯にある。**\r\n> ―― **設計者が最初に言語化した核が、そのまま数値になった。**\r\n\r\n**被横取りの内訳が決定的:**\r\n- d=1 → 被横取り **0.00回**(1回では興味を悟られない)\r\n- d=2以上 → 被横取り **1.13回**(掘り返した瞬間、露見する)\r\n\r\n**「1回目はノイズ、2回目からシグナル」という情報構造が、そのまま均衡を作っている。**\r\n\r\n#### 「誰も掘らない」は均衡ではない(循環が閉じている)\r\n\r\n全員が横取り屋(掘らない)の中で、1人が d=1 で掘ると **+29点**。\r\n→ **掘る人が必ず得をする** → 全員が掘りに来る → 掘り合いになる → 深く掘った者が奪われる。\r\n**均衡が内部にあり、循環が閉じている。**\r\n\r\n#### 核の最終確認(A・B・C)\r\n\r\n- **A(曖昧)** ✓ 重複ありの面 → 帰納 → 何回調べても確定しない\r\n- **B(希少)** ✓ 取れるのは1人。待てば失う\r\n- **C(伝播)** ✓ **掘り返す行為が、意図を漏らす。深く掘るほど、身が露わになる**\r\n\r\n> **一言テスト:「調べたい。だが掘り返せば、欲しがっていることがバレて、奪われる。」**\r\n> **核が、説明の中心に登場している。**\r\n\r\n#### 【重要】設計判断の分岐点の記録\r\n\r\nシミュレーション結果(ソリティア情報価値 +10.8%)を見て、\r\n**「核が弱い。競りに切り替えるべきか」と一度は疑った。**\r\n設計者が **「核が間違いだったのか?」** と問い返したことで、検証の欠陥に気づいた。\r\n\r\n> **設計者の「それ、本当に測れてる?」は、シミュレーションのバグを指す。**\r\n> (資料の教訓「設計者の\"なんか変\"は、ほぼ常に構造的な問題を指す」の、**検証側での再現**)\r\n> **正しい核を捨てて、理屈で導いた土台(競り)に逃げるところだった。**\r\n\r\n---\r\n### 6-15. 【中止】『影の賽』―― 死因と、そこから得た最重要原理\r\n\r\n**§6-9〜6-14 で立ち上げた設計を、プロトタイプ2本を経て中止した。** その記録。\r\n\r\n#### 設計者の言葉（2回、同じことを言われていた）\r\n\r\n> **1回目:「同じサイコロを振って執着していることが、強いダイスという風につながってない」**\r\n> **2回目:「ダイスを再度振る事が、その人のダイスに対する評価のシグナルにならない」**\r\n\r\n**1回目の診断を受け取らず、構造をいじって延命させた。これが最大の失敗。**\r\n(資料の教訓「**設計者の\"なんか変\"は、ほぼ常に構造的な問題を指す**」の、6回目の的中)\r\n\r\n#### 死因 ―― これは調整では直らない、論理的性質だった\r\n\r\n> **人は、確信できないものを調べる。確信したものは、調べない。**\r\n\r\n- 明らかに良い → **取る。もう調べない**\r\n- 明らかに悪い → **捨てる。もう調べない**\r\n- **判断がつかない → 調べ続ける**\r\n\r\n> **したがって「たくさん調べている」= 「判断がつかない」= 「たぶん平凡」。**\r\n> **探索行動は\"不確実性\"のシグナルであって、\"選好\"のシグナルではない。**\r\n\r\n**これはベイズ更新の論理的帰結**であり、パラメータ(賽の数・覗き枠・影の粗さ・ラウンド数)を\r\nどう振っても**絶対に反転しない**。**§6-6で自ら警告した「核と病が同じ場所にある」構造だった。**\r\n\r\n#### 【最重要原理】この失敗から取れた、汎用的な教訓\r\n\r\n> ## **「情報を集める行為」は、選好のシグナルにならない。**\r\n> ## **選好を信頼できる形で伝えるのは、「コストを払う行為」だけである。**\r\n\r\n| 行為 | 何のシグナルか |\r\n|---|---|\r\n| **調べる・観測する・覗く** | **不確実性**(「私はまだ分からない」) |\r\n| **賭ける・入札する・支払う** | **選好**(「私はこれに価値を認める」) |\r\n| 麻雀の**副露** | **コミット**(資源を払って手を晒した) |\r\n| 麻雀の**リーチ** | **完成**(後戻りできない宣言) |\r\n| **調べた上で\"手放す\"** | **選好の負のシグナル**(=レモン市場。後述§6-16) |\r\n\r\n> **「読ませたい心」がある設計なら、読ませる対象は\"調査\"ではなく\"支払い\"でなければならない。**\r\n> **§3-10で「動的な影」と呼んだものの正体は、実は「コストを払った行為の影」だった。**\r\n> 麻雀の副露・リーチが機能するのは、**それが情報行為ではなく\"支払い\"だから。**\r\n\r\n#### 【追記 2026-07】シグナル原理の拡張 ―― 影の競りプレイテストより\r\n\r\n上の原理は「発信にコストがあること」を必要条件として示した。\r\n影の競りのプレイテスト(2026-07:「情報を得るメリットがない」「マイナス面で突っ張る意味がない」)で、\r\n**コストは必要条件であって十分条件ではない**ことが判明した。3つの原理として追記する。\r\n\r\n**1. 選択肢の成立条件**\r\n\r\n> **ある行動が「選択肢」であるためには、それが最善手になる状況が実在しなければならない。**\r\n> メリット・デメリットが釣り合わない(常に劣後する)行動は、盤面にあっても**選択肢ではなく飾り**である。\r\n\r\n出典: 影の競り 2026-07 プレイテスト ―― マイナス面での突っ張りは常に劣後し、\r\n「ブラフ」という選択肢は盤面に存在していなかった。\r\n\r\n**2. シ
