<script>
/* ============================================================
   ★キャッシュ自己修復
   meta の Cache-Control は文書自体には効かない（ブラウザが無視する）。
   そこで：
     ① 残存する Service Worker を強制解除（「シークレットなら見える」の主犯）
     ② サーバから no-store で自分自身を取り直し、版番号を比較
     ③ 古ければ「?v=新版」という別URLへ飛ぶ → キャッシュが原理的に効かない
   ============================================================ */
(function(){
  const PAGE_VER = "1.4";

  // ① 残存 Service Worker を解除（過去の実験などで残っていると、強制リロードすら効かなくなる）
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then(rs => rs.forEach(r => r.unregister()))
      .catch(()=>{});
  }
  if (window.caches && caches.keys) {
    caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(()=>{});
  }

  // ② サーバの最新版を確認（キャッシュを完全に無視して取得）
  const url = location.pathname + "?cb=" + Date.now();
  fetch(url, { cache: "no-store" })
    .then(r => r.ok ? r.text() : null)
    .then(t => {
      if (!t) return;
      const m = t.match(/PAGE_VER\s*=\s*"([\d.]+)"/);
      if (!m) return;
      const latest = m[1];
      if (latest !== PAGE_VER) {
        // ③ 別URLへ飛ぶ（?v= が付くのでキャッシュが効かない）。無限ループ防止つき
        const done = sessionStorage.getItem("cb_" + latest);
        if (!done) {
          sessionStorage.setItem("cb_" + latest, "1");
          location.replace(location.pathname + "?v=" + latest);
        } else {
          console.warn("新しい版 v" + latest + " があります。手動で再読み込みしてください。");
        }
      }
    })
    .catch(()=>{});
})();
</script>

 const o=c.createOscillator(),g=c.createGain();o.type=t||"sine";o.frequency.setValueAtTime(f,s);
 if(to)o.frequency.exponentialRampToValueAtTime(to,s+d);g.gain.setValueAtTime(0,s);
 g.gain.linearRampToValueAtTime(v||.11,s+.012);g.gain.exponentialRampToValueAtTime(.0008,s+d);
 o.connect(g);g.connect(c.destination);o.start(s);o.stop(s+d+.03);}

function fogPct(){const P=R.P,NC=R.COMPS.length;let cov=0;
  const Cb=(n,r)=>{let x=1;for(let i=0;i<r;i++)x=x*(n-i)/(i+1);return x;};
  for(let k=0;k<=NC;k++)cov+=(k%2?-1:1)*Cb(NC,k)*Math.pow((NC-k)/NC,P);
  return 100*(1-cov);}

function c1EnsureBlindPrediction(){
  if(!S||S.mode!=="c1")return null;
  S.blindPredictionMemo??=Object.fromEntries(S.playerIds.slice(1).map(id=>[id,{prediction:null,updatedAt:null}]));

function c1UpdateBlindPrediction(playerId,value){
  const memo=c1EnsureBlindPrediction();if(!memo?.[playerId])return;

     // ★ 各自が見える成分（ランダム・ダブリあり・非公開）

function newLot(){
  const v=R.COMPS.map(()=>R.CMIN+rn(R.CMAX-R.CMIN+1));
  S.lot={v,total:v.reduce((a,b)=>a+b,0)};
  S.price=0;S.lastBidder=-1;S.bidLog=[];
  S.c1Drops=[];
  S.live=[...Array(R.P).keys()].filter(p=>S.money[p]>=1);
  // 現行は毎品ランダム。C1実験は固定席のまま時計回りに交代する。
  S.starter=S.mode==="c1"?S.round%R.P:(S.live.length?S.live[rn(S.live.length)]:0);
  S.cur=S.starter;
  S.phase="auction";
  if(S.mode==="c1")c1EnsureBlindPrediction();
  lg(`── 第${S.round+1}の原石 ── ${R.NAMES[S.starter]} から開始`);
  ptSave();
  render();
  if(!S.live.includes(S.cur))setTimeout(next,0);
  else if(S.cur!==0)setTimeout(npcTurn,600);
}

const seen=(p)=>S.lot.v[S.lens[p]];
const estimate=(p)=>(1+TASTE)*seen(p)+compEV*(R.COMPS.length-1);  // 見える成分は自分にとって高価値

function bid(p){
  const beforePrice=S.price,beforeMoney=S.money[p],beforeLive=S.live.slice();
  if(S.price+1>S.money[p]){return drop(p,true);}
  S.price++;S.lastBidder=p;S.bidLog.push({p,price:S.price});
  SFX.bid();lg(`${R.NAMES[p]} が ${S.price} で競る`);
  ptAction(p,"bid",beforePrice,S.price,null,beforeMoney,beforeLive);
  next();
}
function drop(p,forced){
  const beforePrice=S.price,beforeMoney=S.money[p],beforeLive=S.live.slice();
  S.live=S.live.filter(x=>x!==p);
  if(S.mode==="c1")S.c1Drops[p]=S.price+1;
  SFX.pass();lg(`${R.NAMES[p]} が降りた${forced?"（資金切れ）":""}`);
  ptAction(p,"drop",beforePrice,null,S.price+1,beforeMoney,beforeLive);
  next();
}
function next(){
  if(!S)return;
  if(S.live.length<=1){hammer();return;}
  do{S.cur=(S.cur+1)%R.P;}while(!S.live.includes(S.cur));
  // 一巡して自分がラストビッダーなら終了
  if(S.live.length===1){hammer();return;}
  if(S.cur===S.lastBidder&&S.live.length>=1){hammer();return;}
  ptSave();
  render();
  if(S.cur!==0)setTimeout(npcTurn,550);
}
function hammer(){
  const w=S.live.length===1?S.live[0]:S.lastBidder;
  S.phase="reveal";
  if(w===undefined||w<0||S.price===0){
    lg("誰も競らなかった。流札。");
    S.hist.push({v:S.lot.v,total:S.lot.total,w:-1,price:0,bidLog:S.bidLog});
  }else{
    S.money[w]-=S.price;S.won[w].push({v:S.lot.v,total:S.lot.total,price:S.price});
    const net=S.lot.total-S.price;
    SFX.hammer();setTimeout(()=>SFX.reveal(),350);
    lg(`🔨 ${R.NAMES[w]} が ${S.price} で落札 — 真の価値 ${S.lot.total} → 損益 ${net>=0?"+":""}${net}`);
    S.hist.push({v:S.lot.v,total:S.lot.total,w,price:S.price,bidLog:S.bidLog});
  }
  ptFinalizeStone(w);
  render();
}

/* ---- NPC ---- */
// ★履歴から「誰がどの成分を見ているか」を推定する（核の実装）
function inferLens(p){
  // 各成分仮説について尤度を積む: その人が高く競った品で、その成分が高かったか
  const sc=R.COMPS.map(()=>0);
  for(const h of S.hist){
    const bids=h.bidLog.filter(b=>b.p===p);
    const top=bids.length?bids[bids.length-1].price:0;
    if(top===0&&!h.bidLog.some(b=>b.p===p))continue;
    // その人の「熱意」= 落札価格に対する追随度
    const zeal=top-(h.total/2);          // 高く競った=正
    R.COMPS.forEach((_,i)=>{ sc[i]+=zeal*(h.v[i]-2); });  // その成分が高い品で熱心だったか
  }
  const mx=Math.max(...sc), ex=sc.map(x=>Math.exp((x-mx)/12));
  const sum=ex.reduce((a,b)=>a+b,0);
  return ex.map(x=>x/sum);              // 各成分を見ている確率
}
const NPC_PROF=[{opt:1.0,read:1,curse:1},{opt:1.0,read:1,curse:1},{opt:0.85,read:1,curse:1.4},
                {opt:1.1,read:0.3,curse:0.3},{opt:0.95,read:1,curse:0.8},{opt:1.05,read:0.6,curse:1.1}];
/* C1: 自分の盲点真値は参照しない。公開行動の価格差を α=.15 で弱く反映する。 */
function npcTurnC1(p){
  const cfg=NPC_PROF[p],blind=S.lens[p],E=compEV;
  const visibleSum=S.lot.v.reduce((a,v,i)=>a+(i===blind?0:v),0);
  let blindEst=E;
  const publicBids=S.bidLog.filter(b=>b.p!==p);
  if(cfg.read>0&&publicBids.length){
    const top=Math.max(...publicBids.map(b=>b.price));
    const prior=visibleSum+3*E;
    blindEst+=Math.max(-2,Math.min(2,(top-prior)*0.15*cfg.read));
  }
  const dropped=[...Array(R.P).keys()].filter(q=>q!==p&&!S.live.includes(q));
  if(cfg.read>0&&dropped.length)blindEst-=0.2*cfg.read*dropped.length/(R.P-1);
  const nRiv=S.live.length-1;
  const curseAdj=cfg.curse*(nRiv>0?nRiv/(R.P-1):1)*E*1.26;
  const limit=Math.round((visibleSum+3*blindEst-curseAdj)*cfg.opt);
  if(S.price+1<=limit&&S.price+1<=S.money[p])bid(p);else drop(p);
}
function npcTurn(){
  if(!S||S.phase!=="auction")return;
  const p=S.cur;
  if(!S.live.includes(p))return next();
  if(S.mode==="c1")return npcTurnC1(p);
  const cfg=NPC_PROF[p];
  const E=compEV, T=TASTE, NC=R.COMPS.length;
  const mySeen=seen(p);
  let totalEst = mySeen + E*(NC-1);      // 素朴推定

  // ★①「降りた」情報を読む: 見た上で降りた = その成分は低い
  const dropped=[...Array(R.P).keys()].filter(q=>q!==p&&!S.live.includes(q));
  if(cfg.read>0&&dropped.length>0){
    const lows=dropped.map(q=>{
      const b=S.bidLog.filter(x=>x.p===q);
      const top=b.length?b[b.length-1].price:0;
      return top - T*E;                  // その人の総額推定 ≈ 降りた価格 - 私的価値分
    });
    const implied=Math.min(...lows), naive=mySeen+E*(NC-1);
    if(implied<naive) totalEst = naive - (naive-implied)*0.5*cfg.read*(dropped.length/(R.P-1));
  }
  // ★②「あいつが何を見ているか」を推定し、その入札を解釈する（核）
  const rivals=S.live.filter(q=>q!==p);
  if(cfg.read>0&&S.hist.length>=2&&rivals.length>0){
    let info=0,wsum=0;
    for(const q of rivals){
      const b=S.bidLog.filter(x=>x.p===q);
      if(!b.length)continue;
      const top=b[b.length-1].price;
      const pr=inferLens(q);
      // あいつが私と同じ成分を見ている確率 → その入札に新情報はない
      const same=pr[S.lens[p]];
      const newInfo=1-same;              // ★違うものを見ている確率 = 情報価値
      // あいつの入札が示唆する総額 ≈ top - T*E
      info += (top - T*E) * newInfo;
      wsum += newInfo;
    }
    if(wsum>0.2){
      const implied=info/wsum;
      // ★追随はしない（呪いが悪化する）。上方修正は控えめに、下方修正は素直に
      const k = implied<totalEst ? 0.45 : 0.15;
      totalEst = totalEst + (implied-totalEst)*k*cfg.read;
    }
  }
  // ★③呪いの警戒: 落札できる = 自分が最も楽観的だった
  const nRiv=S.live.length-1;
  const curseAdj = cfg.curse * (nRiv>0?nRiv/(R.P-1):1) * E*(NC-1)*0.42;
  const est = totalEst + T*mySeen - curseAdj;
  const limit=Math.round(est*cfg.opt);
  if(S.price+1<=limit&&S.price+1<=S.money[p])bid(p);
  else drop(p);
}

/* --- 開始（ホスト）--- */
async function startOnline(){
  if(ON.spec||!isHost())return E("ホストのみ開始できます");
  const sv=DB.seats||{};const n=DB.meta.n;
  if(onlineIsC1()&&![3,4].includes(n))return E("C1オンライン実験は3人または4人専用です");
  for(let i=0;i<n;i++) if(!sv[i]||!seatAlive(sv[i])) return E("全席が埋まっていません（"+n+"人卓）");
  const nc=DB.meta.nc, rounds=DB.meta.rounds;
  if(!ON.lots){ON.lots=genLots(nc,rounds);localStorage.setItem(lsKey(),JSON.stringify(ON.lots));}
  // 現行は見える1面、C1は自分の盲点以外だけを各席のprivへ配る。
  const priv={},money={};
  const assigned=onlineIsC1()?shuffledFacetsN(n):null;
  if(assigned)saveHostBlinds(assigned,DB.meta.gameId);
  for(let i=0;i<n;i++){
    const lens=onlineIsC1()?assigned[i]:rn(nc), see={};
    for(let r=0;r<rounds;r++) see[r]=onlineIsC1()?ON.lots[r].map((v,k)=>k===lens?null:v):ON.lots[r][lens];
    priv[i]={playerId:sv[i].uid,lens,see}; money[i]=DB.meta.money;
  }
  const live=[...Array(n).keys()];
  const first=onlineIsC1()?c1OnlineStart(0,n,live):{starter:null,cur:live[rn(n)]};
  await withRetry(()=>ref().update({
    priv, money,
    game:{round:0,price:0,cur:first.cur,starter:first.starter,last:-1,live:live.join(","),phase:"auction",bids:""},
    "meta/phase":"playing",
  }));
  DB.priv=onlineIsC1()?{[ON.seat]:ptClone(priv[ON.seat])}:ptClone(priv);
}
/* --- 競り（transaction で原子的に）--- */
async function oBid(){
  if(ON.spec)return;
  await withRetry(()=>ref("game").transaction(g=>{
    if(!g||g.phase!=="auction"||g.cur!==ON.seat)return;                 // 権限＋位相ガード
    const money=DB.money[ON.seat]||0;
    if(g.price+1>money)return;
    g.price++; g.last=ON.seat;
    g.bids=(g.bids?g.bids+"|":"")+ON.seat+":"+g.price;
    return advance(g);
  })).then(r=>{if(r.committed)SFX.bid();});
  maybeHammer();
}
async function oDrop(){
  if(ON.spec)return;
  await withRetry(()=>ref("game").transaction(g=>{
    if(!g||g.phase!=="auction"||g.cur!==ON.seat)return;
    g.live=g.live.split(",").filter(x=>Number(x)!==ON.seat).join(",");
    return advance(g);
  })).then(r=>{if(r.committed)SFX.pass();});
  maybeHammer();
}
function advance(g){
  const live=g.live?g.live.split(",").map(Number):[];
  if(live.length<=1){g.phase="hammer";return g;}
  let c=g.cur, n=DB.meta.n, guard=0;
  do{c=(c+1)%n;}while(!live.includes(c)&&guard++<20);
  if(c===g.last){g.phase="hammer";return g;}
  g.cur=c;return g;
}
/* --- 槌（誰でも解決できる。transactionで二重解決を防ぐ）--- */
async function maybeHammer(){
  if(ON.spec)return;
  const g=DB.game; if(!g||g.phase!=="hammer")return;
  // 解決役は「原石を持つホスト」。ホスト不在なら待つ
  if(!ON.lots)return;
  const r=g.round, live=g.live?g.live.split(",").map(Number):[];
  const w=live.length===1?live[0]:(g.last>=0?g.last:-1);
  const v=ON.lots[r], total=v.reduce((a,b)=>a+b,0);
  await withRetry(()=>ref("hist/"+r).transaction(h=>{
    if(h)return;                                                        // 既に解決済み
    return {v:v.join(","),total,w:(g.price>0?w:-1),price:g.price,bids:g.bids||""};
  }));
  if(g.price>0&&w>=0){
    await withRetry(()=>ref("money/"+w).transaction(m=>(m||0)-g.price));
  }
  await withRetry(()=>ref("game/phase").set("reveal"));
  SFX.hammer();setTimeout(()=>SFX.reveal(),300);
}
/* --- 次の原石へ（参加者だけ。transactionで一度だけ進む）--- */
async function oNext(){
  if(ON.spec)return;
  const g=DB.game; if(!g||g.phase!=="reveal")return;
  onlineActionPointerReady=false;onlineActionUnlockAt=performance.now()+350;
  const n=DB.meta.n, rounds=DB.meta.rounds, nr=g.round+1;
  if(nr>=rounds){ await finishOnline(); return; }
  await withRetry(()=>ref("game").transaction(x=>{
    if(!x||x.phase!=="reveal"||x.round!==g.round)return;                 // 既に進んでいる
    const live=[...Array(n).keys()].filter(i=>(DB.money[i]||0)>=1);
    if(!live.length)return;
    const start=onlineIsC1()?c1OnlineStart(nr,n,live):{starter:null,cur:live[rn(live.length)]};

async function finishOnline(){
  if(ON.spec)return;
  const up={"meta/phase":"ended","game/phase":"end"};
  // ★v1.4修正: 目の公開は全privを持つホストだけが書く。
  //   v1.3では非ホストが終幕させると null で消してしまい、決算の目と得点が壊れた
  if(isHost()){
    const lens=onlineIsC1()&&isHost()&&Array.isArray(ON.blinds)?ON.blinds.slice():[];
    if(!lens.length)for(let i=0;i<DB.meta.n;i++)lens.push((DB.priv&&DB.priv[i]&&DB.priv[i].lens)!=null?DB.priv[i].lens:0);
    up["reveal/lens"]=lens.join(",");
  }
  await withRetry(()=>ref().update(up));
  SFX.win();
}
/* 非ホストが終幕させた場合の修復：ホストが「終了なのに目が未公開」を見つけたら書く（冪等） */
function maybeRevealLens(){
  if(!DB.meta||DB.meta.phase!=="ended")return;
  if(DB.reveal&&DB.reveal.lens!=null)return;
  if(!isHost()||ON.spec)return;
  const n=DB.meta.n, lens=onlineIsC1()&&isHost()&&Array.isArray(ON.blinds)?ON.blinds.slice():[];
  if(!lens.length)for(let i=0;i<n;i++){const p=DB.priv&&DB.priv[i]; if(!p||p.lens==null)return; lens.push(p.lens);}
  withRetry(()=>ref("reveal/lens").set(lens.join(","))).catch(()=>{});
}
/* 終了時の目の公開はホストが行う。ホストが必ず全privを読むために購読を足す。 */
function ensureHostPriv(){
  if(isHost()&&!ON.spec&&!onlineIsC1()&&!ON._hostPriv){
    ON._hostPriv=true;
    const r=ref("priv");const cb=r.on("value",sn=>{const v=sn.val()||{};for(const k in v)DB.priv[k]=v[k];maybeRevealLens();});
    ON.unsub.push(()=>r.off("value",cb));
  }
}

function calcOnlineScores(){
  const m=DB.meta,hist=DB.hist||{};
  const lensArr=(DB.reveal&&DB.reveal.lens!=null)?String(DB.reveal.lens).split(",").map(Number):null;
  return [...Array(m.n)].map((_,p)=>{
    let t=DB.money[p]||0;
    for(const k in hist){const x=hist[k];if(x.w!==p)continue;
      const v=String(x.v).split(",").map(Number);
      const L=lensArr?lensArr[p]:(DB.priv[p]&&DB.priv[p].lens!=null?DB.priv[p].lens:0);
      t+=x.total+TASTE*v[L];}
    return t;});
}

/* ★IME保護: 入力中(変換中/フォーカス中)の再描画は、入力欄をDOMごと壊し、
   日本語変換が途中で確定してしまう（例: 「あきら」と打つと「あ」だけ残る）。
   → 変換中は再描画を保留し、フォーカス中の input は値とカーソルを復元する。 */
let _ime=false, _pendingRender=false;
document.addEventListener("compositionstart",()=>{_ime=true;});
document.addEventListener("compositionend",()=>{_ime=false;if(_pendingRender){_pendingRender=false;render();}});
function _guardRender(fn){
  return function(){
    if(_ime){ _pendingRender=true; return; }                       // 変換中は描画しない
    const ae=document.activeElement;
    const keep=(ae&&ae.tagName==="INPUT")?{id:ae.id,v:ae.value,s:ae.selectionStart,e:ae.selectionEnd}:null;
    const r=fn.apply(this,arguments);
    if(keep&&keep.id){
      const el=document.getElementById(keep.id);
      if(el&&document.activeElement!==el){
        el.value=keep.v; el.focus();
        try{ el.setSelectionRange(keep.s,keep.e); }catch(_){}
      }
    }
    return r;
  };
}

  <li><b class="neg">誰の ${T("目")} にも映らない ${T("面")} が、あるかもしれない（この卓ではおよそ ${Math.round(fogPct())}% の石で起きる）。</b><br>
   → そのとき、卓の全員が濁りの中で競り合っている。<b>これが ${T("勝者の呪い")} の温床。</b></li>
  <li><b class="pos">あなたの ${T("目")} が見抜いた ${T("面")} は、あなたにとって3倍の価値を持つ</b>（＝${T("自分の価値")}）。<br>
   （あなたの工房は、その面を活かす技を持っている。他の商人にはできない）</li>
 </ul>

 <h3>競り</h3>
 <p>${T("競り上げ")} ―― 値は1ずつ上がる。順番に <b>「追う」か「降りる」</b>。<b class="neg">降りたら、二度と戻れない。</b><br>
 最後に残った者が石を得て、その額を払う。<b>そして石は割られ、すべてが明かされる。</b></p>

 <h3>読み方</h3>
 <p><b>「あいつが高く追った」</b> = あいつの ${T("目")} が見た ${T("面")} は、高い。<br>
 <b>「あいつが降りた」</b> = あいつの ${T("目")} が見た ${T("面")} は、低い。<b>降りは、嘘をつけない。</b><br>
 ―― <b class="neg">だが、あいつがどの面を見ているのかが分からない。</b></p>
 <p><b>競りの記録</b>（割られた石の中身 × 各人の ${T("上限")}）が、卓に積み上がっていく。<br>
 <b style="color:var(--gold2)">「梟は、色の良い石でいつも粘る。……あの男の目は、色か」</b><br>
 ―― 他人の目は、その積み重ねからしか、読めない。</p>

 <h3>⚠️ 罠</h3>
 <p><b>「あいつが高く追っている。なら良い石だ」と追随すると、負ける。</b><br>
 落札できたということは ―― <b>あなたが、卓で最も楽観的だったということだ。</b>（${T("勝者の呪い")}）</p>

 <h3>⌨ 操作</h3>
 <ul>
  <li><b>Space</b> または <b>Enter</b> … <b>追う</b>（値を1上げる）</li>
  <li><b>Esc</b> または <b>X</b> … <b>降りる</b></li>
  <li>マウス／タップでも同じことができます。<b>競り上げは1ずつなので、キーボードの方が速い。</b></li>
  <li>あなたの番になると、<b>音が鳴り、タブの見出しが点滅</b>します（別タブを見ていても気づけます）。</li>
 </ul>

 <h3>勝敗</h3>
 <p><b>最終得点 = 残った資金 + 競り落とした石の ${T("自分の価値","あなたにとっての価値")}</b>。<br>
 安く、良い石を。<b>高く買いすぎれば、損をする。</b></p>

 <h3>用語集</h3>
