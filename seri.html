<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'">
<title>影の競り｜一時停止中</title>
<style>
:root{color-scheme:dark;--bg:#0d0f14;--panel:#161a22;--line:#343b49;--ink:#eee7d7;--muted:#aaa598;--gold:#e0b352}
*{box-sizing:border-box}
html,body{min-height:100%}
body{margin:0;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 50% 20%,rgba(224,179,82,.12),transparent 34rem),var(--bg);color:var(--ink);font-family:"Yu Mincho","Hiragino Mincho ProN",serif}
main{width:min(680px,100%);padding:clamp(28px,6vw,52px);border:1px solid var(--line);border-radius:16px;background:rgba(22,26,34,.94);box-shadow:0 24px 80px rgba(0,0,0,.45);text-align:center}
.eyebrow{margin:0 0 16px;color:var(--gold);font:700 12px/1.5 system-ui,sans-serif;letter-spacing:.18em}
h1{margin:0;font-size:clamp(30px,7vw,48px);letter-spacing:.12em}
.notice{margin:28px auto 0;font-size:clamp(17px,3.5vw,21px);line-height:1.9}
.detail{margin:18px auto 0;color:var(--muted);font:14px/1.8 system-ui,sans-serif}
a{display:inline-block;margin-top:30px;padding:11px 18px;border:1px solid var(--gold);border-radius:999px;color:var(--gold);font:700 14px/1.2 system-ui,sans-serif;text-decoration:none}
a:hover,a:focus-visible{background:var(--gold);color:var(--bg)}
</style>
</head>
<body>
<main>
  <p class="eyebrow">SECURITY MAINTENANCE</p>
  <h1>影 の 競 り</h1>
  <p class="notice">『影の競り』オンライン版は、<br>セキュリティ構造の更新のため一時停止しています。</p>
  <p class="detail">旧ルームの作成・参加・観戦機能は利用できません。安全な新バージョンの準備が整うまでお待ちください。</p>
  <a href="index.html">ゲーム一覧へ戻る</a>
</main>
</body>
</html>
