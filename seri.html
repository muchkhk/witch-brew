function nextLive(live,seat){for(let d=1;d<=4;d++){const n=(seat+d)%ST.meta.n;if(live.includes(n))return n}return live[0]}
async function sendAction(type){try{if(ST.spectator||ST.seat==null||!ST.game)return;const action={id:`${user.uid.slice(-8)}-${now()}-${crypto.getRandomValues(new Uint32Array(1))[0]}`,type,round:ST.game.round,price:ST.game.price,createdAt:now()};await roomRef.child(`actions/${ST.seat}`).set(action)}catch(e){fail(e)}}
async function processAction(seat,action){if(actionBusy||!isHost()||!ST.game||ST.meta.phase!=="playing")return;actionBusy=true;try{const result=await roomRef.child("game").transaction(g=>{if(!g||g.phase!=="auction"||g.curSeat!==seat||g.round!==action.round||g.price!==action.price||g.lastActionId===action.id)return;let live=String(g.live).split(",").map(Number);if(action.type==="bid"){const cash=Number(ST.money[seat]||0);if(g.price+1>cash)return;g.price+=1;g.curSeat=nextLive(live,seat)}else if(action.type==="drop"){live=live.filter(x=>x!==seat);if(!live.length)return;g.live=live.join(",");if(live.length===1){g.phase="reveal";g.curSeat=live[0]}else g.curSeat=nextLive(live,seat)}else return;g.lastActionId=action.id;return g},undefined,false);if(result.committed&&result.snapshot.val()?.phase==="reveal")await resolveRound(result.snapshot.val())}catch(e){if(e?.code!=="PERMISSION_DENIED")fail(e)}finally{actionBusy=false}}
async function resolveRound(g){if(!isHost()||!g||g.phase!=="reveal")return;const existing=(await roomRef.child(`history/${g.round}`).get()).val();if(existing)return;const hostPrivate=ST.allPrivate[user.uid]||ST.privateData,l=hostPrivate?.lots?.[g.round];if(!l)return;const winner=Number(String(g.live).split(",")[0]),cash=Number(ST.money[winner]||0);const up={};up[`history/${g.round}`]={winnerSeat:winner,price:g.price,values:l,createdAt:now()};up[`money/${winner}`]=Math.max(0,cash-g.price);try{await roomRef.update(up)}catch(e){if(e?.code!=="PERMISSION_DENIED")throw e}}
async function hostRepair(){if(!isHost())return;if(ST.game?.phase==="reveal"&&!ST.history?.[ST.game.round]){try{await resolveRound(ST.game)}catch(e){fail(e)}}}
async function advanceRound(){try{if(!isHost()||ST.game?.phase!=="reveal"||!ST.history?.[ST.game.round])return;const nr=ST.game.round+1;if(nr>=ST.meta.rounds){await finishGame();return}const live=Array.from({length:ST.meta.n},(_,i)=>i).filter(i=>Number(ST.money[i]||0)>0);if(live.length<2){await finishGame();return}const starter=nr%ST.meta.n,cur=live.includes(starter)?starter:nextLive(live,starter);await roomRef.child("game").set({round:nr,phase:"auction",price:0,curSeat:cur,starter,live:live.join(","),lastActionId:""})}catch(e){fail(e)}}
async function finishGame(){await roomRef.child("game").update({phase:"end"});await roomRef.child("meta/phase").set("ended");const lenses={};for(const p of Object.values(ST.allPrivate))lenses[p.seat]=p.lens;await roomRef.child("reveal").set({lenses,createdAt:now()})}

function hostWaiting(){const hostSeat=Object.values(ST.seats).find(s=>s?.uid===ST.meta?.hostUid);return ST.meta?.phase==="playing"&&(!hostSeat?.lastSeen||now()-hostSeat.lastSeen>30000)}
function seatList(){const ul=node("ul");for(let i=0;i<(ST.meta?.n||0);i++){const s=ST.seats[i],money=ST.money[i];ul.append(node("li",{class:`seat ${i===ST.seat?"mine":""}`},node("span",{},s?s.name:`空席 ${i+1}`,i===ST.seat?"（あなた）":""),node("span",{class:"muted"},money==null?"":`💰 ${money}`)))}return ul}
function historyView(){const box=node("div",{class:"history"});for(const k of Object.keys(ST.history||{}).map(Number).sort((a,b)=>a-b)){const h=ST.history[k],winner=ST.seats[h.winnerSeat]?.name||`席${h.winnerSeat+1}`;box.append(node("div",{},`第${k+1}ラウンド：${winner} ／ ${h.price} ／ [${Object.values(h.values).join(", ")}]`))}return box}
function scores(){const result=[];const lenses=ST.reveal?.lenses||{};for(let i=0;i<ST.meta.n;i++){let score=Number(ST.money[i]||0);for(const h of Object.values(ST.history||{}))if(h.winnerSeat===i){const v=Object.values(h.values).map(Number);score+=v.reduce((a,b)=>a+b,0)+2*Number(v[lenses[i]]||0)}result.push({seat:i,score})}return result.sort((a,b)=>b.score-a.score||a.seat-b.seat)}

function renderHome(){const oldName=localStorage.getItem(NAME_KEY)||"";const name=node("input",{id:"name",maxlength:12,value:oldName,autocomplete:"nickname"});const code=node("input",{id:"roomCode",maxlength:6,placeholder:"6文字コード",autocomplete:"off"});code.addEventListener("input",()=>code.value=normalizeCode(code.value));const saved=readSolo();const soloButtons=node("div",{class:"row"},node("button",{class:"primary",onclick:startSolo},"solo・C1を始める"),saved?node("button",{onclick:resumeSolo},"前回のsoloを再開"):null,saved?node("button",{class:"danger",onclick:discardSolo},"前回の記録を破棄"):null);app.replaceChildren(panel(node("h2",{},"soloで遊ぶ"),node("p",{class:"muted"},"人間1人＋NPC3人のC1。Firebase認証とRealtime Databaseを使用しません。"),soloButtons),panel(node("h2",{},"オンラインで遊ぶ"),status(user?`匿名認証済み UID末尾: ${user.uid.slice(-6)}`:"匿名認証中（soloは開始できます）",user?"ok":""),node("div",{class:"grid"},node("label",{},"名前",name),node("label",{},"人数",node("select",{id:"players"},node("option",{value:3},"3人"),node("option",{value:4},"4人"))),node("label",{},"ルール",node("select",{id:"rule"},node("option",{value:"current"},"標準"),node("option",{value:"c1"},"C1盲点ルール"))),node("label",{},"ルームコード",code)),node("div",{class:"row"},node("button",{class:"primary",onclick:createRoom,disabled:!user},"部屋を作る"),node("button",{onclick:()=>joinRoom(false),disabled:!user},"参加する"),node("button",{onclick:()=>joinRoom(true),disabled:!user},"観戦する")),status(ST.error,"error"),status(ST.notice,"ok")),panel(node("h2",{},"v2の信頼境界"),node("p",{class:"muted"},"プレイヤーは自分の秘匿情報だけを読めます。観戦者は共有情報のみを読みます。ホストは進行・採点のため全秘匿情報を扱う信頼主体です。")))}
function renderRoom(){
  const body=[];
  const role=ST.spectator?"観戦者":isHost()?"ホスト":`席${ST.seat+1}`;
  const headerRow=node("div",{class:"row"},
    node("span",{class:"code"},ST.room),
    node("button",{onclick:()=>navigator.clipboard?.writeText(ST.room)},"コードをコピー"),
    node("span",{class:"badge"},role));
  const metaLine=ST.meta?node("p",{class:"muted"},`${ST.meta.n}人 ／ ${ST.meta.rounds}ラウンド ／ ${ST.meta.rule==="c1"?"C1盲点ルール":"標準"} ／ v${ST.meta.version}`):status("同期中…");
  body.push(panel(headerRow,metaLine,hostWaiting()?status("進行役の再接続を待っています","error"):null,status(ST.error,"error"),status(ST.notice,"ok")));
  if(!ST.meta){app.replaceChildren(...body);return}
  if(ST.meta.phase==="lobby"){
    const start=isHost()?node("button",{class:"primary",onclick:startGame,disabled:Object.keys(ST.seats).length!==ST.meta.n},"ゲーム開始"):status("ホストの開始を待っています");
    body.push(panel(node("h2",{},"ロビー"),seatList(),start));
  }else if(ST.meta.phase==="playing"){
    const g=ST.game;
    if(!g){
      body.push(panel(status("ゲーム状態を同期中…")));
    }else{
      let secret;
      if(ST.spectator)secret=node("p",{class:"secret"},"観戦中：プレイ中の秘匿情報は表示されません");
      else if(!ST.privateData)secret=node("p",{class:"secret"},"秘匿情報を同期中…");
      else if(ST.meta.rule==="c1"){const values=decodeC1View(ST.privateData.see[g.round]);secret=node("div",{class:"secret"},node("p",{},`あなたの盲点：${COMPONENTS[ST.privateData.lens]}（この面は価値で3倍）`),node("p",{},values.map((v,i)=>`${COMPONENTS[i]}=${v==null?"？":v}`).join(" ／ ")))}
      else secret=node("p",{class:"secret"},`あなたが見える ${COMPONENTS[ST.privateData.lens]}：${ST.privateData.see[g.round]}`);
      let action=status(g.phase==="reveal"?"ラウンド結果を確定しました":"他のプレイヤーの操作を待っています");
      if(g.phase==="auction"&&g.curSeat===ST.seat){
        action=node("div",{class:"row"},
          node("button",{class:"primary",onclick:()=>sendAction("bid"),disabled:g.price+1>Number(ST.money[ST.seat]||0)},`追う（${g.price+1}）`),
          node("button",{class:"danger",onclick:()=>sendAction("drop")},"降りる"));
      }
      const advance=isHost()&&g.phase==="reveal"
        ?node("button",{class:"primary",onclick:advanceRound,disabled:!ST.history[g.round]},g.round+1>=ST.meta.rounds?"最終結果へ":"次のラウンドへ")
        :null;
      body.push(panel(node("h2",{},`第${g.round+1}ラウンド`),node("div",{class:"price"},`現在価格 ${g.price}`),secret,seatList(),action,advance));
      body.push(panel(node("h2",{},"履歴"),historyView()));
    }
  }else{
    let result=status("公開情報を作成中…");
    if(ST.reveal){
      result=node("div");
      for(const [i,x] of scores().entries()){
        const player=ST.seats[x.seat]?.name||`席${x.seat+1}`;
        result.append(node("p",{class:i===0?"mine":""},`${i+1}位 ${player}：${x.score}点 ／ ${ST.meta.rule==="c1"?"盲点":"目"} ${COMPONENTS[ST.reveal.lenses[x.seat]]}`));
      }
    }
    body.push(panel(node("h2",{},"ゲーム終了"),result,historyView()));
  }
  body.push(node("div",{class:"row"},node("button",{onclick:leave},"退出してトップへ")));
  app.replaceChildren(...body);
}
function leave(){detach();clearSession();Object.assign(ST,{room:"",seat:null,spectator:false,meta:null,seats:{},game:null,money:{},history:{},privateData:null,allPrivate:{},reveal:null,error:"",notice:""});render()}
function render(){if(appMode==="solo")renderSolo();else if(!ST.room)renderHome();else renderRoom()}
render();bootstrap();
</script>
