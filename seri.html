<script>
/* ============================================================
   ★キャッシュ自己修復
   meta の Cache-Control は文書自体には効かない（ブラウザが無視する）。
   そこで：
     ① 残存する Service Worker を強制解除（「シークレットなら見える」の主犯）
     ② サーバから no-store で自分自身を取り直し、版番号を比較
     ③ 古ければ「?v=新版」という別URLへ飛ぶ → キャッシュが原理的に効かない
   ============================================================ */
(function(){
  const PAGE_VER = "1.3";

  // ① 残存 Service Worker を解除（過去の実験などで残っていると、強制リロードすら効かなくなる）
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.getRegistrations()
      .then(rs => rs.forEach(r => r.unregister()))
      .catch(()=>{});
  }
  if (window.caches && caches.keys) {
    caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(()=>{});
  }

  // ② サーバの最新版を確認（キャッシュを完全に無視して取得）
  const url = location.pathname + "?cb=" + Date.now();
  fetch(url, { cache: "no-store" })
    .then(r => r.ok ? r.text() : null)
    .then(t => {
      if (!t) return;
      const m = t.match(/PAGE_VER\s*=\s*"([\d.]+)"/);
      if (!m) return;
      const latest = m[1];
      if (latest !== PAGE_VER) {
        // ③ 別URLへ飛ぶ（?v= が付くのでキャッシュが効かない）。無限ループ防止つき
        const done = sessionStorage.getItem("cb_" + latest);
        if (!done) {
          sessionStorage.setItem("cb_" + latest, "1");
          location.replace(location.pathname + "?v=" + latest);
        } else {
          console.warn("新しい版 v" + latest + " があります。手動で再読み込みしてください。");
        }
      }
    })
    .catch(()=>{});
})();
</script>

<script>
/* ---- 音 ---- */
let AC=null,muted=false;
function ac(){try{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==="suspended")AC.resume().catch(()=>{});}catch(e){}return AC;}
function tn(f,d,t,v,dl,to){const c=ac();if(!c||muted)return;const s=c.currentTime+(dl||0);
 const o=c.createOscillator(),g=c.createGain();o.type=t||"sine";o.frequency.setValueAtTime(f,s);
 if(to)o.frequency.exponentialRampToValueAtTime(to,s+d);g.gain.setValueAtTime(0,s);
 g.gain.linearRampToValueAtTime(v||.11,s+.012);g.gain.exponentialRampToValueAtTime(.0008,s+d);
 o.connect(g);g.connect(c.destination);o.start(s);o.stop(s+d+.03);}
const SFX={bid(){tn(620,.07,"triangle",.09,0);tn(820,.06,"sine",.05,.04);},
 pass(){tn(300,.12,"sine",.08,0,180);},
 hammer(){tn(220,.16,"square",.11,0);tn(160,.22,"sine",.09,.08);},
 reveal(){[523,659,784].forEach((f,i)=>tn(f,.4,"sine",.06,i*.07));},
 win(){[523,659,784,1047].forEach((f,i)=>tn(f,.55,"triangle",.06,i*.08));},
 click(){tn(480,.04,"triangle",.06,0);},
 turn(){tn(784,.14,"sine",.11,0);tn(1047,.2,"sine",.10,.11);}};
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT")return;
  if(help){ if(e.key==="Escape"){help=false;render();} return; }
  const on=ON.room&&DB.game&&DB.game.phase==="auction"&&DB.game.cur===ON.seat&&!ON.spec;
  const solo=!ON.room&&S&&S.phase==="auction"&&S.cur===0&&S.live.includes(0);
  if(e.code==="Space"||e.key==="Enter"){ e.preventDefault();
    if(on){ac();oBid();} else if(solo){ac();bid(0);} }
  else if(e.key==="Escape"||e.key==="x"||e.key==="X"){ e.preventDefault();
    if(on){ac();oDrop();} else if(solo){ac();drop(0);} }
},false);
document.addEventListener("click",e=>{const b=e.target.closest("button");if(b&&!b.disabled){ac();SFX.click();}
 if(!e.target.closest(".tm"))document.querySelectorAll(".tm.show").forEach(x=>x.classList.remove("show"));},true);

/* ---- ルール ---- */
// ★人数ごとの推奨構成（「誰の目にも映らない面」が 55〜78% になるよう面数を調整）
const SETUP={
  2:{NC:3,ROUNDS:6, MONEY:30},
  3:{NC:3,ROUNDS:6, MONEY:30},
  4:{NC:3,ROUNDS:8, MONEY:34},
  5:{NC:4,ROUNDS:10,MONEY:38},
  6:{NC:4,ROUNDS:12,MONEY:38},
};
const ALLC=[{k:"色",e:"🔴",f:"色味"},{k:"透",e:"💧",f:"透明度"},{k:"輝",e:"✨",f:"輝き"},{k:"大",e:"💎",f:"大きさ"}];
const ALLN=["あなた","鴉","鳶","梟","鷺","隼"];
const R={P:4,ROUNDS:8,MONEY:34,COMPS:ALLC.slice(0,3),CMIN:-2,CMAX:6,NAMES:ALLN.slice(0,4)};
function setPlayers(n){
  const c=SETUP[n];
  R.P=n; R.ROUNDS=c.ROUNDS; R.MONEY=c.MONEY;
  R.COMPS=ALLC.slice(0,c.NC); R.NAMES=ALLN.slice(0,n);
}
const CC=["var(--c0)","var(--c1)","var(--c2)","var(--c3)","var(--c4)","var(--c5)"];
const rn=n=>Math.floor(Math.random()*n);
// 「誰の目にも映らない面」が生じる確率（包除原理）
function fogPct(){const P=R.P,NC=R.COMPS.length;let cov=0;
  const Cb=(n,r)=>{let x=1;for(let i=0;i<r;i++)x=x*(n-i)/(i+1);return x;};
  for(let k=0;k<=NC;k++)cov+=(k%2?-1:1)*Cb(NC,k)*Math.pow((NC-k)/NC,P);
  return 100*(1-cov);}
const compEV=(R.CMIN+R.CMAX)/2;               // 成分の期待値 = 2
const TASTE=2;                                // 私的価値: 見える成分は (1+TASTE) 倍
let S=null,help=false,err="";
const E=m=>{err=m;render();setTimeout(()=>{err="";render();},4000);};

function newGame(n){
  if(n)setPlayers(n);
  S={round:0,money:new Array(R.P).fill(R.MONEY),won:[...Array(R.P)].map(()=>[]),
     // ★ 各自が見える成分（ランダム・ダブリあり・非公開）
     lens:[...Array(R.P)].map(()=>rn(R.COMPS.length)),
     lot:null,price:0,cur:0,live:[],lastBidder:-1,
     phase:"auction", // auction | reveal | end
     hist:[],log:[],bidLog:[]};
  lg(`開始 — ${R.P}人 / ${R.COMPS.length}面 / 原石${R.ROUNDS}個 / 資金${R.MONEY}`);
  newLot();
}
const lg=m=>{S.log.unshift(m);if(S.log.length>80)S.log.pop();};
function newLot(){
  const v=R.COMPS.map(()=>R.CMIN+rn(R.CMAX-R.CMIN+1));
  S.lot={v,total:v.reduce((a,b)=>a+b,0)};
  S.price=0;S.lastBidder=-1;S.bidLog=[];
  S.live=[...Array(R.P).keys()].filter(p=>S.money[p]>=1);
  // ★開始入札者は毎品ランダム（席の有利不利を消す）
  S.starter=S.live.length?S.live[rn(S.live.length)]:0;
  S.cur=S.starter;
  S.phase="auction";
  lg(`── 第${S.round+1}の原石 ── ${R.NAMES[S.starter]} から開始`);
  render();
  if(S.cur!==0)setTimeout(npcTurn,600);
}
/* 推定: 見えている成分 + 未知成分の事前期待値 */
const seen=(p)=>S.lot.v[S.lens[p]];
const estimate=(p)=>(1+TASTE)*seen(p)+compEV*(R.COMPS.length-1);  // 見える成分は自分にとって高価値

function bid(p){
  if(S.price+1>S.money[p]){return drop(p,true);}
  S.price++;S.lastBidder=p;S.bidLog.push({p,price:S.price});
  SFX.bid();lg(`${R.NAMES[p]} が ${S.price} で競る`);
  next();
}
function drop(p,forced){
  S.live=S.live.filter(x=>x!==p);
  SFX.pass();lg(`${R.NAMES[p]} が降りた${forced?"（資金切れ）":""}`);
  next();
}
function next(){
  if(!S)return;
  if(S.live.length<=1){hammer();return;}
  do{S.cur=(S.cur+1)%R.P;}while(!S.live.includes(S.cur));
  // 一巡して自分がラストビッダーなら終了
  if(S.live.length===1){hammer();return;}
  if(S.cur===S.lastBidder&&S.live.length>=1){hammer();return;}
  render();
  if(S.cur!==0)setTimeout(npcTurn,550);
}
function hammer(){
  const w=S.live.length===1?S.live[0]:S.lastBidder;
  S.phase="reveal";
  if(w===undefined||w<0||S.price===0){
    lg("誰も競らなかった。流札。");
    S.hist.push({v:S.lot.v,total:S.lot.total,w:-1,price:0,bidLog:S.bidLog});
  }else{
    S.money[w]-=S.price;S.won[w].push({v:S.lot.v,total:S.lot.total,price:S.price});
    const net=S.lot.total-S.price;
    SFX.hammer();setTimeout(()=>SFX.reveal(),350);
    lg(`🔨 ${R.NAMES[w]} が ${S.price} で落札 — 真の価値 ${S.lot.total} → 損益 ${net>=0?"+":""}${net}`);
    S.hist.push({v:S.lot.v,total:S.lot.total,w,price:S.price,bidLog:S.bidLog});
  }
  render();
}
function nextRound(){
  S.round++;
  if(S.round>=R.ROUNDS||S.money.every(m=>m<1)){finish();return;}
  newLot();
}
function finish(){
  S.phase="end";SFX.win();
  lg("=== 決算 ===");render();
}
const myValue=(p,v)=>v.reduce((a,b)=>a+b,0)+TASTE*v[S.lens[p]];
const score=p=>S.money[p]+S.won[p].reduce((a,c)=>a+myValue(p,c.v),0);

/* ---- NPC ---- */
// ★履歴から「誰がどの成分を見ているか」を推定する（核の実装）
function inferLens(p){
  // 各成分仮説について尤度を積む: その人が高く競った品で、その成分が高かったか
  const sc=R.COMPS.map(()=>0);
  for(const h of S.hist){
    const bids=h.bidLog.filter(b=>b.p===p);
    const top=bids.length?bids[bids.length-1].price:0;
    if(top===0&&!h.bidLog.some(b=>b.p===p))continue;
    // その人の「熱意」= 落札価格に対する追随度
    const zeal=top-(h.total/2);          // 高く競った=正
    R.COMPS.forEach((_,i)=>{ sc[i]+=zeal*(h.v[i]-2); });  // その成分が高い品で熱心だったか
  }
  const mx=Math.max(...sc), ex=sc.map(x=>Math.exp((x-mx)/12));
  const sum=ex.reduce((a,b)=>a+b,0);
  return ex.map(x=>x/sum);              // 各成分を見ている確率
}
function npcTurn(){
  if(!S||S.phase!=="auction")return;
  const p=S.cur;
  if(!S.live.includes(p))return next();
  const PROF=[{opt:1.0,read:1,curse:1},{opt:1.0,read:1,curse:1},{opt:0.85,read:1,curse:1.4},
              {opt:1.1,read:0.3,curse:0.3},{opt:0.95,read:1,curse:0.8},{opt:1.05,read:0.6,curse:1.1}];
  const cfg=PROF[p];
  const E=compEV, T=TASTE, NC=R.COMPS.length;
  const mySeen=seen(p);
  let totalEst = mySeen + E*(NC-1);      // 素朴推定

  // ★①「降りた」情報を読む: 見た上で降りた = その成分は低い
  const dropped=[...Array(R.P).keys()].filter(q=>q!==p&&!S.live.includes(q));
  if(cfg.read>0&&dropped.length>0){
    const lows=dropped.map(q=>{
      const b=S.bidLog.filter(x=>x.p===q);
      const top=b.length?b[b.length-1].price:0;
      return top - T*E;                  // その人の総額推定 ≈ 降りた価格 - 私的価値分
    });
    const implied=Math.min(...lows), naive=mySeen+E*(NC-1);
    if(implied<naive) totalEst = naive - (naive-implied)*0.5*cfg.read*(dropped.length/(R.P-1));
  }
  // ★②「あいつが何を見ているか」を推定し、その入札を解釈する（核）
  const rivals=S.live.filter(q=>q!==p);
  if(cfg.read>0&&S.hist.length>=2&&rivals.length>0){
    let info=0,wsum=0;
    for(const q of rivals){
      const b=S.bidLog.filter(x=>x.p===q);
      if(!b.length)continue;
      const top=b[b.length-1].price;
      const pr=inferLens(q);
      // あいつが私と同じ成分を見ている確率 → その入札に新情報はない
      const same=pr[S.lens[p]];
      const newInfo=1-same;              // ★違うものを見ている確率 = 情報価値
      // あいつの入札が示唆する総額 ≈ top - T*E
      info += (top - T*E) * newInfo;
      wsum += newInfo;
    }
    if(wsum>0.2){
      const implied=info/wsum;
      // ★追随はしない（呪いが悪化する）。上方修正は控えめに、下方修正は素直に
      const k = implied<totalEst ? 0.45 : 0.15;
      totalEst = totalEst + (implied-totalEst)*k*cfg.read;
    }
  }
  // ★③呪いの警戒: 落札できる = 自分が最も楽観的だった
  const nRiv=S.live.length-1;
  const curseAdj = cfg.curse * (nRiv>0?nRiv/(R.P-1):1) * E*(NC-1)*0.42;
  const est = totalEst + T*mySeen - curseAdj;
  const limit=Math.round(est*cfg.opt);
  if(S.price+1<=limit&&S.price+1<=S.money[p])bid(p);
  else drop(p);
}


/* ============ オンライン基盤 ============ */
const VER="1.3";
/* --- 手番通知（音 + タブのタイトル点滅）--- */

const ON={room:null,seat:null,uid:null,spec:false,lastSync:0,conn:false,unsub:[],lots:null};
/* ★名前の検証（1箇所に集約） */
function getName(){

function uid(){let u=localStorage.getItem("ks_uid");if(!u){u="u"+Math.random().toString(36).slice(2,10);localStorage.setItem("ks_uid",u);}return u;}
function code4(){const A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let c="";for(let i=0;i<4;i++)c+=A[rn(A.length)];return c;}
const rpath=(k)=>"rooms/"+ON.room+(k?"/"+k:"");
const ref=(k)=>_db.ref(rpath(k));
const nowMs=()=>Date.now();
function lsKey(){return "ks_lots_"+ON.room;}

/* --- 原石の生成（ホストのみ）。全値はDBに出さず、ホストのlocalStorageに保持 --- */
function genLots(nc,rounds){
  const L=[];for(let r=0;r<rounds;r++){const v=[];for(let i=0;i<nc;i++)v.push(R.CMIN+rn(R.CMAX-R.CMIN+1));L.push(v);}
  return L;
}
async function createRoom(name,n){
  if(!name||!name.trim())return E("名前を入力してください");
  if(!FB_OK)return E("Firebaseが未設定です（ファイル冒頭の FIREBASE_CONFIG を設定してください）");
  setPlayers(n);
  ON.room=code4();ON.uid=uid();ON.seat=0;ON.spec=false;
  const nc=R.COMPS.length;
  const lots=genLots(nc,R.ROUNDS);
  ON.lots=lots; localStorage.setItem(lsKey(),JSON.stringify(lots));
  await withRetry(()=>ref().set({
    meta:{host:ON.uid,phase:"lobby",n:R.P,nc,rounds:R.ROUNDS,money:R.MONEY,t:nowMs(),ver:VER},
    seats:{0:{uid:ON.uid,name:name,lastSeen:nowMs()}},
  }));
  attach();
}
async function joinRoom(name,c){
  if(!name||!name.trim())return E("名前を入力してください");
  if(!c||c.trim().length!==4)return E("合言葉を4文字で入力してください");
  if(!FB_OK)return E("Firebaseが未設定です");
  ON.room=c.toUpperCase();ON.uid=uid();ON.spec=false;
  const meta=(await withRetry(()=>ref("meta").get())).val();
  if(!meta)return E("その合言葉の卓はありません");
  setPlayers(meta.n);
  // 空席を探す（transactionで席を確保）
  const res=await withRetry(()=>ref("seats").transaction(sv=>{
    sv=sv||{};
    for(const k in sv) if(sv[k]&&sv[k].uid===ON.uid){return sv;}      // 再入場
    for(let i=0;i<meta.n;i++){ if(!sv[i]||!seatAlive(sv[i])){ sv[i]={uid:ON.uid,name:name,lastSeen:nowMs()}; return sv; } }
    return;                                                            // 満席
  }));
  if(!res.committed)return E("満席です（観戦なら入れます）");
  const sv=res.snapshot.val();
  for(const k in sv) if(sv[k]&&sv[k].uid===ON.uid) ON.seat=Number(k);
  attach();
}
async function spectate(c){
  if(!c||c.trim().length!==4)return E("合言葉を4文字で入力してください");
  if(!FB_OK)return E("Firebaseが未設定です");
  ON.room=c.toUpperCase();ON.uid=uid();ON.seat=null;ON.spec=true;
  const meta=(await withRetry(()=>ref("meta").get())).val();
  if(!meta)return E("その合言葉の卓はありません");
  setPlayers(meta.n);
  attach();
}
const seatAlive=(x)=>x&&x.lastSeen&&(nowMs()-x.lastSeen<30000);   // 30秒タイムアウト（前作教訓#4）

/* --- 購読 --- */
let DB={meta:null,seats:{},game:null,money:{},hist:{},priv:{},reveal:null};
function attach(){
  detach();
  const on=(k,f)=>{const r=ref(k);const cb=r.on("value",sn=>{f(sn.val());ON.lastSync=nowMs();render();},err=>E("同期エラー: "+err.message));ON.unsub.push(()=>r.off("value",cb));};
  on("meta",v=>DB.meta=v);
  on("seats",v=>DB.seats=v||{});
  on("game",v=>{DB.game=v; if(v&&v.phase==="hammer"&&!ON.spec) setTimeout(maybeHammer,120);});
  on("money",v=>DB.money=v||{});
  on("hist",v=>DB.hist=v||{});
  on("reveal",v=>DB.reveal=v);
  // ★観戦は全員の priv を読む（＝全情報が見える）。プレイヤーは自席のみ
  if(ON.spec) on("priv",v=>DB.priv=v||{});
  else on("priv/"+ON.seat,v=>{DB.priv={};DB.priv[ON.seat]=v;});
  _db.ref(".info/connected").on("value",sn=>{ON.conn=!!sn.val();
    if(sn.val()&&!ON.spec&&ON.seat!=null){
      ref("seats/"+ON.seat+"/lastSeen").onDisconnect().set(0);
    }});
  if(!ON.spec&&ON.seat!=null){
    ON.hb=setInterval(()=>{ref("seats/"+ON.seat+"/lastSeen").set(nowMs()).catch(()=>{});},12000);
    ref("seats/"+ON.seat+"/lastSeen").set(nowMs());
  }
  // ホストならlocalStorageから原石を復元
  const raw=localStorage.getItem(lsKey()); if(raw){try{ON.lots=JSON.parse(raw);}catch(e){}}
}
function detach(){ON.unsub.forEach(f=>{try{f();}catch(e){}});ON.unsub=[];if(ON.hb)clearInterval(ON.hb);}
const isHost=()=>DB.meta&&DB.meta.host===ON.uid;
const myLens=()=>{const p=DB.priv&&DB.priv[ON.seat];return p?p.lens:null;};
const mySee=(r)=>{const p=DB.priv&&DB.priv[ON.seat];return p&&p.see?p.see[r]:null;};

/* --- 開始（ホスト）--- */
async function startOnline(){
  if(!isHost())return E("ホストのみ開始できます");
  const sv=DB.seats||{};const n=DB.meta.n;
  for(let i=0;i<n;i++) if(!sv[i]||!seatAlive(sv[i])) return E("全席が埋まっていません（"+n+"人卓）");
  const nc=DB.meta.nc, rounds=DB.meta.rounds;
  if(!ON.lots){ON.lots=genLots(nc,rounds);localStorage.setItem(lsKey(),JSON.stringify(ON.lots));}
  // ★各席に「見える面」と「その面の値だけ」を配る（他人の面は送らない）
  const priv={},money={};
  for(let i=0;i<n;i++){
    const lens=rn(nc), see={};
    for(let r=0;r<rounds;r++) see[r]=ON.lots[r][lens];
    priv[i]={lens,see}; money[i]=DB.meta.money;
  }
  const live=[...Array(n).keys()];
  await withRetry(()=>ref().update({
    priv, money,
    game:{round:0,price:0,cur:live[rn(n)],last:-1,live:live.join(","),phase:"auction",bids:""},
    "meta/phase":"playing",
  }));
}
/* --- 競り（transaction で原子的に）--- */
async function oBid(){
  if(ON.spec)return;
  await withRetry(()=>ref("game").transaction(g=>{
    if(!g||g.phase!=="auction"||g.cur!==ON.seat)return;                 // 権限＋位相ガード
    const money=DB.money[ON.seat]||0;
    if(g.price+1>money)return;
    g.price++; g.last=ON.seat;
    g.bids=(g.bids?g.bids+"|":"")+ON.seat+":"+g.price;
    return advance(g);
  })).then(r=>{if(r.committed)SFX.bid();});
  maybeHammer();
}
async function oDrop(){
  if(ON.spec)return;
  await withRetry(()=>ref("game").transaction(g=>{
    if(!g||g.phase!=="auction"||g.cur!==ON.seat)return;
    g.live=g.live.split(",").filter(x=>Number(x)!==ON.seat).join(",");
    return advance(g);
  })).then(r=>{if(r.committed)SFX.pass();});
  maybeHammer();
}
function advance(g){
  const live=g.live?g.live.split(",").map(Number):[];
  if(live.length<=1){g.phase="hammer";return g;}
  let c=g.cur, n=DB.meta.n, guard=0;
  do{c=(c+1)%n;}while(!live.includes(c)&&guard++<20);
  if(c===g.last){g.phase="hammer";return g;}
  g.cur=c;return g;
}
/* --- 槌（誰でも解決できる。transactionで二重解決を防ぐ）--- */
async function maybeHammer(){
  const g=DB.game; if(!g||g.phase!=="hammer")return;
  // 解決役は「原石を持つホスト」。ホスト不在なら待つ
  if(!ON.lots)return;
  const r=g.round, live=g.live?g.live.split(",").map(Number):[];
  const w=live.length===1?live[0]:(g.last>=0?g.last:-1);
  const v=ON.lots[r], total=v.reduce((a,b)=>a+b,0);
  await withRetry(()=>ref("hist/"+r).transaction(h=>{
    if(h)return;                                                        // 既に解決済み
    return {v:v.join(","),total,w:(g.price>0?w:-1),price:g.price,bids:g.bids||""};
  }));
  if(g.price>0&&w>=0){
    await withRetry(()=>ref("money/"+w).transaction(m=>(m||0)-g.price));
  }
  await withRetry(()=>ref("game/phase").set("reveal"));
  SFX.hammer();setTimeout(()=>SFX.reveal(),300);
}
/* --- 次の原石へ（★誰でも押せる。transactionで一度だけ進む）--- */
async function oNext(){
  const g=DB.game; if(!g||g.phase!=="reveal")return;
  const n=DB.meta.n, rounds=DB.meta.rounds, nr=g.round+1;
  if(nr>=rounds){ await finishOnline(); return; }
  await withRetry(()=>ref("game").transaction(x=>{
    if(!x||x.phase!=="reveal"||x.round!==g.round)return;                 // 既に進んでいる
    const live=[...Array(n).keys()].filter(i=>(DB.money[i]||0)>=1);
    if(!live.length)return;
    return {round:nr,price:0,cur:live[rn(live.length)],last:-1,live:live.join(","),phase:"auction",bids:""};
  }));
}
async function finishOnline(){
  const lens=[];for(let i=0;i<DB.meta.n;i++)lens.push((DB.priv&&DB.priv[i]&&DB.priv[i].lens)!=null?DB.priv[i].lens:0);
  await withRetry(()=>ref().update({
    "reveal/lens":(ON.spec||isHost())?lens.join(","):null,             // 終了時に全員の目を公開
    "meta/phase":"ended","game/phase":"end"}));
  SFX.win();
}
/* 終了時の目の公開はホストが行う（privを読めるのはホスト自身の席だけなので、
   全席分は「観戦者/ホスト」が持つ。ホストが必ず全privを読むために購読を足す） */
function ensureHostPriv(){
  if(isHost()&&!ON.spec&&!ON._hostPriv){
    ON._hostPriv=true;
    const r=ref("priv");const cb=r.on("value",sn=>{const v=sn.val()||{};for(const k in v)DB.priv[k]=v[k];});
    ON.unsub.push(()=>r.off("value",cb));
  }
}

/* ★用語集（1箇所に集約）― 本文とツールチップの両方がここを参照する。面数に応じて動的に変わる */
function gloss(){
 const n=R.COMPS.length, list=R.COMPS.map(c=>c.e+c.f).join("・");
 return {
  面:`石の価値を決める${n}つの要素（${list}）のこと。各 -2〜+6。マイナスもある。`+(n>=4?"（5人以上の卓では 💎大きさ が加わり、4つになる）":""),
  目:"あなたが見抜ける「面」のこと。ゲームを通じて変わらない。他人がどの目を持つかは非公開。",
  真の価値:`${n}つの面の合計。石が割られる（＝落札される）まで、誰にも分からない。`,
  自分の価値:"真の価値 ＋ あなたの目の面 ×2（＝あなたの目の面は3倍で効く）。あなたの工房は、その面を活かす技を持つ。",
  勝者の呪い:"買えたということは、あなたが卓で一番高く見積もったということ。つまり買い手は、たいてい買いすぎている。だから「高く追う者」に釣られてはいけない。",
  競り上げ:"値が1ずつ上がっていく方式。順番に「追う」か「降りる」を選ぶ。一度降りたら、その石には戻れない。",
  上限:"その人が、その石で最後に付けた値段。ここまで追って降りた（＝そこが限界だった）という記録。",
 };
}

/* ★IME保護: 入力中(変換中/フォーカス中)の再描画は、入力欄をDOMごと壊し、
   日本語変換が途中で確定してしまう（例: 「あきら」と打つと「あ」だけ残る）。
   → 変換中は再描画を保留し、フォーカス中の input は値とカーソルを復元する。 */
let _ime=false, _pendingRender=false;
document.addEventListener("compositionstart",()=>{_ime=true;});
document.addEventListener("compositionend",()=>{_ime=false;if(_pendingRender){_pendingRender=false;render();}});
function _guardRender(fn){
  return function(){
    if(_ime){ _pendingRender=true; return; }                       // 変換中は描画しない
    const ae=document.activeElement;
    const keep=(ae&&ae.tagName==="INPUT")?{id:ae.id,v:ae.value,s:ae.selectionStart,e:ae.selectionEnd}:null;
    const r=fn.apply(this,arguments);
    if(keep&&keep.id){
      const el=document.getElementById(keep.id);
      if(el&&document.activeElement!==el){
        el.value=keep.v; el.focus();
        try{ el.setSelectionRange(keep.s,keep.e); }catch(_){}
      }
    }
    return r;
  };
}
